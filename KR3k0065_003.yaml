body:
  text: 宋稗類鈔卷三常熟潘永因編遭際第五太尉王公旦祥符中在中書聖眷特厚嘗因便坐奏事帝語及一省郎姓名旦曰斯人行履才幹俱有可採今方典郡宜與甄擢公及同列亦皆素知其為人因共稱薦之自是屢加歎賞即令記録亟命别議升陟既而代還至闕上復先省記之㑹外計缺官即與同列擬定名氏約以次日奏補及晚歸私第斯人投刺來謁公方議委使辭而不見詰朝入朝具道本末請授以轉漕之任上默然不許公退而歎駭惕息屢日乃知昨暮造請雖不之見已密為伺察者所紏而此人訖真宗世不復用公每戒同列以私謁之嫌當須謹避庶幾免於吝悔大中祥符間天書屢降天子崇信天下無慮皆神事矣寇凖是時出為外官又不信天書上益疏凖最後京兆府都監朱能復獻天書上以問王旦旦曰始不信天書者凖也今天書降凖所當令凖上之則百姓將大服而疑者不敢不信也上從之使中貴人逼凖朱能素事宦者周懷政而凖壻王曙居中與懷政善勸凖與能合凖始不肻曙固要凖凖因此復為中書侍郎同平章事天禧三年也以王子明之賢為依回封祀遂為白璧之瑕逮後追嘆李文靖之先見遺令貶損以飾終已無及矣獨計以萊公之剛正何以亦附朱能成此過舉乃知迫於上命情事如此丁晉公謂治第保康門外楊景宗時以役夫荷土築基丁後籍沒而景宗貴即以其宅賜之其正寢乃向日所築之地也錢思公惟演嫁女令銀匠龔美打造裝奩器皿既而美拜官思公即取美為妹壻向所打造器皿歸美龔美明肅太后之外兄也后無宗旌更以美為兄改其姓為劉楊景宗即章睿太后弟太后既入掖庭景宗無賴以罪𨽻軍營務黥墨其面至無見膚真宗幸玉清昭應宫將還內而六宫皆乘金車迎駕於道上景宗以役卒立御溝之外太后車中指景宗令問其姓氏骨肉景宗知其女兄在掖庭疑其是也遽呼太后小字及行第太后大哭曰乃吾弟也即日上言官之以右班殿直後至觀察留守景宗既貴遂用藥去其黥痕無芥粟存者而肥晳如玉性恣橫好以木撾擊人世謂之楊骨捶云明肅太后崩章睿於仁宗有阿保恩遺詔尊為皇太后生母李宸妃亦追尊為章懿太后章懿李太后始入掖庭才十餘嵗唯有一弟七嵗太后臨别手結刻絲􅀢囊與之拍其肩泣曰汝雖淪落顛沛不可棄此囊異時我若遭遇必訪汝以此為物色也後其弟傭於鑿紙錢家常以囊懸於胸臆間未嘗斯須去身一日苦下痢勢將不救為紙家棄於道左有入內院子者見而憐之收養於家怪其衣服百結而胸懸鞶囊因問之具以告院子者惄然驚異蓋嘗受㫖於太后令物色訪其弟也復問其姓氏小字世系甚悉遂解其囊明日持入示太后是時太后已封宸妃生仁宗皇帝矣聞之悲喜遽以其事白真宗遂官之為右班殿直即所謂李用和也仁宗立官至殿前都指揮使領節鉞贈隴西郡王世謂之為李國舅云王詵為侍禁三班院差監修主第語同事曰吾輩受寒熱修成不知誰家厮居此已而詵尚主不逾年身居之正與龔美打銀楊景宗擔土事同孫何孫僅俱以能文馳名一時僅為陜西轉運使作驪山詩二篇其後篇有云秦帝墓成陳勝起明皇宫就祿山來時方建玉清昭應宫有惡僅者欲中傷之因録其詩以進真宗閲前篇云朱衣吏引上驪山遽曰僅小器也此何足誇遂棄不復閲而陳勝祿山之語卒得不聞人以為幸也向敏中方秉政其壻皇甫泌少年縱逸多外寵往往涉旬不歸敏中每優容之其女抱病甚篤敏中妻深以為憂且有恚怒之詞敏中不得已具劄子乞與泌離婚一日奏事畢方欲開陳真宗聖體似不和遽離扆座敏中迎前奏曰臣有女壻皇甫泌語方至此真宗連聲曰甚好甚好㑹得已還內矣敏中詞不及畢莫知聖意如何已而𫝊詔中書皇甫泌特轉兩官敏中茫然自失欲翊日論奏是夕女死竟不能辨直其事青箱雜記作畢文簡士安之壻范文正公鎮鄱陽有書生獻詩甚工自言天下之至寒餓無在某右時盛行歐陽率更書薦福寺碑一本直千錢公為具紙墨令榻千本售於京師是夕雷擊碎其碑故時人為之語曰有客打碑來薦福無人騎鶴上揚州又云時來風送滕王閣運去雷轟薦福碑夀州張侍中耆撫州晏丞相殊俱葬陽翟地相去數里有發塜盜先築室於二塜之間自其家窽穴以通隊道始發張墓得金寶珠玉甚多遂完其棺櫬以掩覆其穴次發晏墓有猛獸嘷吼兵甲鼓噪之聲盜懼呼其徒同入則寂然無響盜笑曰丞相之神盡於是矣及穿櫬槨供設之器皆陶甓為之又破其棺唯木胎金褁帶一條金無數兩盜失望而恚遂糜碎其骨而出既而貨張墓金盂於市為人擒伏罪自言其事世謂均破塜而張以厚葬完軀晏以薄葬碎骨事有不可知如此者張耆即張旻熙寧中蔡敏肅挺以樞密直學士帥平凉初冬置酒郡齊偶成喜遷鶯一闋云霜天清曉望紫塞古壘寒雲衰草汗馬嘶風邉鴻翻月壟上鐡衣寒早劍歌騎曲悲壯盡道君恩難報塞垣樂盡雙鞬錦帶山西年少談笑刁斗靜𤇺火一把常送平安耗聖主憂邊威靈遐布鉦鼓且寬天討嵗華向晚愁思誰念玉關人老太平也且歡娛不惜金尊頻倒詞成閒步後園以示其子朦朦置之袖中偶遺墜為譍門老卒得之老卒不識字持令筆吏辨之適郡之娼魁素與筆吏洽因授之㑹賜衣襖中使至敏肅開燕娼尊前執板歌此敏肅怒送獄根治娼之儕類祈哀於中使為援於敏肅敏肅舍之復令謳焉中使得其本以歸達於禁中宫女輩但見太平也三字爭相𫝊授歌聲遍掖庭遂徹於宸聼詰其從來乃知敏肅所製裕陵即索紙批出云玉關人老朕甚念之樞管有缺留以待汝以賜敏肅未幾遂拜樞密副使御筆現藏其孫稹家沈睿達遼文通弟也長於歌詩尤工翰墨王荆公曽文肅學其筆法荆公得其清徑而文肅𫝊其真楷登科後遊京師偶為人書裙帶詞頗不典流轉鬻於相藍內侍買得之達於九禁近幸嬪御服之遂塵乙覽裕陵初嗣位勵精求治一見不悅㑹監察御史向子韶察訪兩浙臨遣之際上諭之曰近日士大夫全無顧藉有沈遼者為娼優書淫冶之辭於裙帶遂達朕聼如此等人豈可不治子韶抵浙中適睿達為吳縣令子韶希㫖以他罪劾奏時荆公當國為申解之上復伸前說竟不能釋疑遂坐深文削籍為民合蔡敏肅事觀之人之窮通信在於天雖君相亦不得而主矣京都之俗士夫家嬪葬經由之處巡檢司例以十數卒持綵旗前導不待告約到墓次但量犒酒炙而已宣和間保義郎唐革為城北壁巡檢有貴璫葬其父革率衆迎引頗盛於常時璫大喜邀之相見極口言謝問革今是何官資曰保義郎又問做得恁差遣曰不過兵馬監押耳曰可作亷訪乎革知其不曉外間官秩髙下乃曰此在朝廷擢用革豈敢望耶留飲而去至十日中批唐革職事修舉特與轉修武郎繼除河北路亷訪使革駭不敢承詣璫門求見守候連日始喚入亦不接坐方欲致詞叙謝璫抗聲曰朝廷用人何預我事叱之使出後宛轉再三懇辭改知霸州任滿竟申前命璫不招恩歸已一時流輩中亦為可嘉髙俅者本東坡先生小史筆札頗工東坡自翰苑出帥中山留以豫曽文肅布文肅以使令已多辭之以屬王晉卿元符末晉卿為樞密都承㫖時裕陵在潛邸與晉卿善在殿廬侍班邂逅王云今日偶忘帶箆刀子來欲假以掠鬢可乎晉卿從腰間取之王云此樣甚新可愛晉卿言近創造二副一猶未用少刻當以馳內至晚遣俅賫往直王在園中蹴踘俅候報之際睥睨不已王呼令對蹴深愜王意大喜呼𨽻輩云可往𫝊語都尉既謝箆刀之貺并所送人皆輟留矣由是日見親信踰月王登寶位眷渥甚厚不次遷拜其儕類援以祈恩上曰汝曹爭如彼好腳迹耶數年間建節尋至使相遍歷三衙者二十年領殿前司職事恩幸無比極其富貴然不忘蘇氏每其子弟入都則給養問恤甚勤靖康初裕陵南下俅從駕至臨淮以疾篤辭歸京師當時侍行如童貫梁師成輩皆坐誅而俅獨死於牖下水滸𫝊載髙俅由小蘇學士致身王晉卿因送玉器及氣球以知遇徽廟潛龍日孰知其為大蘇之小史耶其事見王明清揮塵録靖康中有解習者東州人為郎於朝未嘗與人接談金兵南下擇西北帥守時相以其謹厚不泄謂沉鷙有謀遂除直龍圖知河中府習别時相云某實以訥於言故尋常不敢妄措辭於朝列今一旦委付如此習之一死固不足惜竊恐朝廷以此擇人廟謨誤矣習竟沒於難世人以饒舌掇禍者多矣而習乃以箝口喪軀昔所未聞也建炎苖劉之變內侍遇害至多有秦同老者自揚州𬒳命至荆楚前一日還行在尚未得對亦死焉又有蕭中道者日侍左右忽得罪絀為外郡監當前一日出城遂免唐甘露之變王涯再從弟沐家於江南老且貧涯為相跨驢詣之欲求一簿尉留長安二嵗餘始得一見涯待之殊落寞久之沐因嬖奴以道所欲涯許以微官自是旦夕造涯之門以俟命及涯家被收沐適在其第與涯俱腰斬舒元輿有族子守謙願而敏元輿愛之不離左右者十年一旦忽以非罪譴責守謙不自安求歸江南元輿亦不留守謙悲歎而去夕至昭應聞元輿收族守謙獨免紹興中韓郡王既解樞柄逍遙家居常頂一字巾跨駮騾周遊湖山之間時李晦叔自楚北幕官來改秩而失舉牘憂撓無計當春日同邸諸人相率往天竺李辭以意緒無聊皆曰正宜適野散悶强挽之行各假僦鞍馬過九里松值暴雨衆悉迸避李奔至冷泉亭衣袽沾濕愁坐長嘆遇韓王亦來相顧揖矜其憔悴可憐之狀作秦音發問曰官人有何事縈心而悒悒若此李雖不識韓見其姿貌魁異頗起敬乃告以實韓曰所說文字不是職司否答曰常員也韓曰却得一紙明日當相贈命小吏詳問其姓名階位仍詢居止處李遜謝感泣明日一吏持舉牘授之曰郡王送來仍助以錢三百千李遂升京職修箋詣韓府欲展門生之禮不復見陳了翁之父尚書與潘良貴義榮之父情好甚密潘一日謂陳曰吾二人官職年齒種種相似獨有一事不如公甚以為恨陳問之潘曰公有三子我乃無之陳曰吾有一婢已生子矣當以奉借他日生子即見還既而遣去了翁之母也未幾生良貴後其母遂往來兩家焉一母生二名儒前所未有隆國黃夫人湖州德清人初入魏峻叔髙家既出復歸李仁本媵其女以入榮邸時嗣王芮苦無子一幸而得男是為度宗然自處極謙抑雖處貴盛每遇邸第親戚至不敢坐常以妳子自稱人亦以此多之秦齊國夫人胡氏亦同邑人相去才數里賈涉濟川制置少日舟過龜溪見婦人浣衣者偶盻之因至其家問夫何在曰未歸語稍洽調之曰肻相從乎欣然惟命及夫還叩之亦無難色遂攜以歸既而生似道未幾出嫁為民妻似道年長始奉以歸性極嚴毅似道畏之當景定咸淳間屢入禁中隆國至與同寢處恩寵甚渥年至八十有三上方賜祕器及冰腦各五百兩賻銀絹四千兩匹命中使護葬帥漕供費凡兩輟朝賜諡柔正又賜功德寺及田六千𤱔可謂盛矣一邑産二貴女亦前此所未有也異數第六和魯公凝梁貞明三年薛廷圭榜下第十三人及第後唐長興四年知貢舉獨愛范魯公質文語范曰君文合在第一輒屈居第十三人用𫝊老夫衣鉢時以為榮其後質位至宰相封魯公皆與凝同有贈詩者曰從此廟廊添故事登庸衣鉢盡相𫝊是時進士多浮薄喜為喧譁以動主司每放榜則圍之以棘閉省門絶人出入以為常凝知貢舉徹棘開門而士皆肅然無譁所取皆一時之秀稱為得人五代史十三作第五唐御膳以紅綾餅餤為重昭宗光化中放進士榜得裴格等二十八人以為得人㑹燕曲江乃令大官特作二十八餅餤賜之盧延讓在其間後入蜀為學士既老頗為蜀人所易延讓詩素平易近俳乃作詩云莫欺零落殘牙齒曽喫紅綾餅餤來王衍聞知遂命供膳亦以餅餤為上品用紅羅褁之至今蜀人工為餅餤而紅羅褁其外公厨大晏設為第一錢文僖惟演守西都梅聖俞謝希深尹師魯歐陽永叔楊子德張太素張堯夫王幾道同在幕下號為八友以文章道義相切劘率常賦詩飲酒間以談戲相得尤樂洛中山水園庭塔廟佳處莫不遊覽一日遊嵩山自潁陽歸暮抵龍門香山俄而雪作登石樓望都城各有所懷忽於烟靄中有車馬渡伊水來既至則文僖遣厨𫝊歌妓至𫝊公語曰山行良佳少留龍門賞雪毋遽歸也其髙曠愛才如此文僖既貶漢東王文康公晦叔曙為代御吏如束溼諸君多不堪一日訝幕客俱出遊責曰諸公自比寇萊公萊公尚坐奢縱取禍貶死況其下者乎衆不敢對永叔取手板起立曰宴飲小過不足招禍萊公之責由老不知退耳時文康年已髙為之動萊公十九擢進士第有善相者曰君相甚貴但及第太早恐不善終若功成早退庶免深禍蓋君骨類盧多遜耳後果如其言工部侍郎胡則宰邑日丁晉公為遊客謁之胡待之甚厚丁因投詩索米明日胡延晉公常日所用尊罍悉屏去但陶器而已丁失望以為厭已輒辭去胡往見之出銀一篋遺丁曰家素貧惟此飲器願以贈行丁始喻設陶器之因甚愧德之後晉公驟進竭力推挽卒至顯位慶厯中諌官李兢坐言事謫湖南稅務內殿承制范亢為黃蔡間都監以言事官𬒳謫者後多至顯官乃悉傾家物與兢辦行兢至湖南少日遂卒宋子京過繁臺街逢內家車子中有褰簾者曰小宋也子京歸作鷓鴣天詞曰畫轂雕鞍狹路逢一聲腸斷繡簾中身無綵鳯雙飛翼心有靈犀一㸃通金作屋玉為籠車如流水馬如龍劉郎已恨蓬山逺況隔蓬山幾萬重此詞都下𫝊唱達於禁中仁宗知之問內人第幾車子何人呼小宋有內人自陳頃侍宴見宣翰林學士左右內臣曰小宋也時在車子中偶見之呼一聲爾上召子京從容語及子京惶懼無地上笑曰蓬山不逺以內人賜之文潞公出鎮西京奉詔於瓊林苑燕餞從列皆預賦詩送行王禹玉時為內相詩云都門秋色滿旌旗祖帳容陪醉御巵功業逈髙元祐日精神如破貝州時匣中寶劍騰霜鍔海上仙桃壓露枝昨日更聞褒詔下别刋名姓入周彝時以為警絶白居易獻裴晉公詩云聞說風情筋力在只如初破蔡州時禹玉蓋步武此作也范蜀公鎮每對客尊嚴靜重言有條理客亦不敢慢易獨敬重蘇子瞻子瞻來則掀髯鼓掌旁若無人東坡好戲謔語言或稍過范淳夫必戒之東坡每與人戲必祝曰勿令范十三知淳夫行十三也唐子方為人剛直既參大政與王介甫議事每不悅既而疽發背死方其病革車駕幸其第臨問子方已昏不知人忽聞上至開目而言曰願陛下早覺悟可惜祖宗社稷教安石壞却上首肻之問其家事無一言及薨又幸其第見其畫像不類命取禁中舊藏本以賜其家上有昭陵御題直哉若人為國砥柱八字印以御寶下有昭陵押宋朝引試率在八月中韓魏公當國日二蘇將就試黃門忽卧疾魏公知而奏曰今嵗制科之士惟蘇軾蘇轍最有聲望今聞轍偶病未可試如此人兄弟中一人不得就試甚非衆望須展限以待之上許之黃門病中魏公數使人問訊既闈安全方引試比常例展二十日自後試科並在九月吕微仲不知其故因問制科何以至秋末東坡乃為吕言之吕曰韓忠獻之賢如此哉二蘇赴試是時同召試者甚多相國韓公偶與客言曰二蘇在此而諸人亦敢與之較試何也於是不試而去者十八九陳文忠堯叟為樞密一日日欲沒時忽有中人宣召引入禁中屈曲行甚久時見簾幃燈燭皆莫知何處既而到一小殿已有數人先至皆立廷中殿上垂簾蠟燭十餘炬而已相繼而至者凡七人中使乃奏班齊唯記文忠丁謂杜鎬三人鎬時尚為館職良久乘輿出燈燭亦不過數十宴具甚盛卷簾令不拜升殿就坐御座設於席東諸臣席西如常人賔主之位堯叟等皆惶恐不敢就位上宣諭不已堯叟懇陳再三上作色曰本為太平無事思與卿等共樂之若如此何如就外朝開宴今日只是宫中供辦未嘗命有司亦不召中書輔臣以卿等機密及文館職任侍臣無嫌且欲促坐語笑不須多辭堯叟等皆趨下稱謝上急止之曰此等禮數且皆置之上語笑極歡膳具中各出兩絳囊置羣臣之前皆大珠也上曰時和嵗豐中外康富恨不與卿等日夕相㑹太平難遇此物助卿等燕集之費羣臣欲起謝上云且坐更有如是酒三行皆有所賜悉良金重寶酒罷已四鼓時人謂之天子請客真宗東封命樞密使陳堯叟為東京留守馬公知節為大內都巡檢使駕未行宣入後苑亭中賜晏出宫人為侍真宗與二公皆戴牡丹而行續有㫖令陳盡去戴者召近御座上親取頭上一朵為陳簪之陳跪受拜舞謝晏罷二公出風吹陳花一葉墜地陳急呼從者拾來此乃官家所賜不可棄置懷䄂中馬乃戲曰今日之宴本為大內都巡檢使陳云若為大內都巡檢使上何不親為太尉戴花耶二公各大笑冦萊公為參政侍宴上賜異花曰寇凖年少正是戴花喫酒時也衆人皆以為榮云王冀公欽若罷參政真宗朝夕欲見擇便殿清近惟資政為優因以公為本殿大學士公奏曰臣雖出於寒賤不能獨寢乞除一臣僚兼之遂以陳文僖彭年並直一夕公攜一巨榼方與陳寒夜閒飲忽中人持鑰開扉獨召公謂陳曰請同院不須相候至行在真宗與公對飲飲罷持禁燭送歸繁若列星陳危坐伺之已四更公笑曰尚未寢乎曰恭候司長豈敢先寢公喜笑倒載解襪褫帶幾不能坦腹自矜曰某江南寒生遭際真主適主上以巨觥敵飲抵掌笑語如僚友之無間已而遂寢逮曉盥櫛罷與陳相揖覺夜歸數談頗疏漏自言夜來沉湎殊不記歸時之早晚無乃失容於君子乎陳曰無之但殷勤愧謝既别同趨出殿門執陳手語之曰夜來數事止是同院一人聞之文僖歸謂子弟曰大臣慎密體當如此王岐公在翰林時中秋有月上問當直學士是誰左右以姓名對命小殿對設二位召來賜酒俄頃宣至設坐公奏故事無君臣對坐之禮乞正其席上云月色清美與其醉聲色何如與學士論文若要正席則外廷賜宴正欲略去苛禮放懷飲酒公固請不已再拜就坐上引謝莊賦李白詩稱美其才又出御製詩示公公歎仰聖學髙妙每起必勑內侍扶掖不令下拜夜漏三鼓上悅甚令左右宫嬪各取領巾裙帶或團扇手帕求詩內侍舉牙牀以金鑲水晶研珊瑚筆格玉管筆皆上所用者公應之略不停綴都不蹈襲前人盡出一時新意仍稱所長人人得其歡心悉以呈上上云須與學士潤筆遂各取頭上珠花簪公幞頭戴不盡者置公袖中宫人旋取針線縫公袖口宴罷月將西沉上命撤金蓮炬命內侍扶掖歸院都下盛𫝊天子請客明年中秋公已參政蔡確為學士上講故事命宫嬪求詩蔡奏才思短澀酒再行而止左右不悅云這箇學士上何須鍾愛金蓮炬送歸唐令狐綯已有故事宋朝凡有三人王岐公圭蘇端明軾史少保浩梁適隨院判盧南金上殿案中有名次公者仁宗因問何名次公南金以不知對適曰漢黃霸字次公上曰卿是何人曰詳議官梁適又問那箇梁家曰祖皓父固俱中甲科上曰怪卿面貌酷似梁固他日適奏曰臣祖父項事太宗真宗不知陛下何以知之上曰天章閣有名臣頭子朕觀之甚熟適後除記注知制誥至翰林學士除目皆自御批不十年至首輔有誤以為龎莊敏者非也蘇子瞻為翰林學士一日鎖院召至內東門小殿時子瞻半醉命以新水潄口解酒已而入對宣仁問曰有一事要問內翰前年任何官職曰汝州團練副使今為何官曰備員翰林學士曰何以至此曰遭遇陛下曰不關老身事曰必出自官家曰亦不關官家事曰然則大臣論薦耶曰亦不關大臣事子瞻驚曰臣雖無狀不敢由他途以進曰此乃先帝之意先帝當飲食而停筯看文字則內人必曰此蘇軾文字也先帝每稱曰竒才竒才但未及進用學士而上仙耳子瞻哭失聲宣仁與上左右皆泣已而曰內翰須盡心事官家以報先帝知遇命撤金蓮燭送歸院江公望字民表建中靖國元年拜左司諌時內苑稍畜珍禽公望力諌他日復言之帝曰已縱遣之矣唯一白鷴畜之久不肻去帝以拄杖逐之終不去乃刻公望姓名於杖頭以識其諌宣和中蘇叔黨過遊京師寓居景德寺忽見快行家者同小轎至𫝊㫖宣召亟令登車叔黨不知所以然不敢拒才入則以物障其前上以小凉傘蔽之二人肩而行其疾如飛約行十餘里抵一修廊內侍一人引之升一小殿見上披黃背子頂青玉冠宫女環侍莫知其數時當六月積冰如山噴香若霧寒不可忍起居畢上諭云聞卿是蘇軾之子善畫窠石適有素壁欲煩一揮非有他也叔黨再拜承命然後落筆須臾而成上起身縱觀賞歎再三命宫人捧賜釂酒一鍾錫賚極渥叔黨謝而下復循廊間登小輿而出蔡京賜第有云鶴堂髙四丈九尺人行其下望之如蟻宏敞過甚老疾畏寒幕㡩不能禦遂無設牀處惟撲水少低間架亦狹乃即撲水下作卧室蔡攸初以淮南節領相印徽宗賜曲宴因語之曰相公公相子攸即對曰人主主人翁蓋是時京為太師賜印文曰公相之印因自稱公相童貫亦官至太師都下人謂之媼相趙髙為中丞相龔澄樞為內太師猶稍與外庭異童貫直為太師領樞密院朱勔所衣錦袍云徽宗嘗以手撫之遂繡御手於肩上又勔嘗與內宴徽宗親握其臂勔遂以黃帛纒之與人揖此臂竟不動靖康元年正月戊辰金人犯濬州徽廟微服出通津門御小舟將次雍丘阻淺船不得進上患之夜御駿騾名鵓鴿青望睢陽而奔聞雞啼濵河有小市民皆酣寢獨一老姥家張燈竹扉半掩上排户而入嫗問上姓氏曰姓趙居東京已致仕舉長子自代衛士皆笑上徐顧衛士亦笑嫗進酒上起受嫗酒復𫝊爵與衛士嫗延上至卧內擁爐又爇勞薪與上釋襪烘趾久之上語衛士令記嫗家地名及龍舟還京嫗已沒乃以白金賜其諸孫徽宗靖康初南幸次京口駐蹕郡治曽空青以江南轉運使攝府事忽宣至行宫上引至深邃之所問勞勤渥命喬貴妃出上回顧語喬曰汝在京師每問曽三此即是也特令汝一識耳蓋空青少日喜作長短句多流入中禁故爾取七寶杯令喬手擎滿酌并以杯賜之空青拜貺而出空青名紆王仲言外祖也建炎庚戌正月髙宗避兵航海次章安鎮灘淺閣舟落帆於金鰲山之福濟寺前以候潮屏去警蹕易衣徒步入寺時住持僧方升坐道祝聖之詞帝趾忽前聞其稱讚之語甚喜戒左右勿驚怖而諦聽之少焉千乘萬騎畢集始知為六龍臨幸野僧不間禮節恐怖失措從行有司教以起居之儀山下曰黃椒村村之婦女聞天子至咸來瞻拜龍顔歡聲如雷曰不圖今日得暏天日帝喜勑夫人各自逐便故至今村婦皆曰夫人雖易世其稱謂尚然不改苖劉作亂時矯隆祐太后詔貶竄張魏公浚髙宗在升暘宫方啜羔左右來告驚懼羮覆於手手為之傷暨復辟見魏公泣數行下舉手示公㾗跡猶存胡忠簡銓不獨其忠鯾蓋一時其作字亦端凝徑挺孝宗嘗謂之曰卿寫字宛如卿為人對曰臣幼法顔真卿今自成一家耳上又曰朕前日侍太上皇於德夀宫閣上治叠書畫得卿紹興戊午所上封事真蹟太上與朕詳玩久之喜卿詞意精切筆法老成英風義氣凛然飛動太上自藏之曰留為後代式但其後為秦檜批抹汙漬者良多朕啓太上令工逐行裁去裝褙之矣宋之諸帝髙宗最善書忠簡手筆為帝所賞愛則其精可知矣後世但稱誦其乞斬秦檜之疏而此則或未知也夫銓之封事不為權奸所容當日金人以千金求其書又為二帝所重若斯張魏公言秦太師専柄十九年只成就得一胡邦衡諒哉宋稗類鈔卷三
