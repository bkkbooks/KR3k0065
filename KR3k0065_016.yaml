body:
  text: 宋稗類鈔卷十六常熟潘永固編權譎第二十七世説原作假譎余易為權譎蓋天下事亦有不得不用詭者但善用之則為權變不善用之則為譎詐此君子小人所由分也皇城使劉承規在太祖朝為黃門小底時氣性不同已有心計官中呼為劉七每令與諸小底數真珠內夫人潛於窗隙覘之未嘗私竊一顆餘皆竊置衣帶中洎太宗即位後有一宫人潛逾垣而出捕獲太宗遲疑間似不欲殺承規輒承意而奏曰此人不可容官家若放却宫人總走臣乞監去處置須是活取心肝進呈太宗甚然之六宫皆拜而泣告承規再三奏不可留於是就太宗前領去送一尼寺中潛逺嫁之却取旋殺豬心肝一具猶熱以合子貯來進呈六宫皆圍合子而哭之良久略揭視之便令承規將去仍傳宣賜承規壓驚銀五錠由是宫掖之間肅然畏法丁謂嘗傾意以媚寇萊公冀得大拜生平最尚禨祥每晨占鳴鵲夜看燈蕊雖出門歸邸亦必竊聽人語用卜吉兆時有無賴于慶貧寒不立計且死凍餒謀於一落第老儒老儒曰汝欲自振必更姓名乃可後得志母相忘慶拜而聽之老儒遂改于為丁名宜祿使投身於謂謂果大喜收之門下不旬月而謂入相此人遂寵冠紀綱雖大僚節使倚藉關説不踰年而宜祿家巨萬矣老儒亦蒙引見得教授大郡至今相傳不解所謂適檢沈休文宋書宰相蒼頭呼為宜祿且復姓丁愈愜所願莫謂晉公眼不讀書也丁晉公從車駕巡幸禮成有詔賜輔臣玉帶時輔臣八人行在祇候庫止有七帶尚衣有帶謂之比玉價值數百萬上欲以賜輔臣足其數晉公心欲之而位在七人之下度必不及已乃謂有司不須發尚衣帶自有小私帶且可服之以謝侯還京别賜可也有司具以聞既各受賜而晉公一帶僅如指濶上顧謂近侍曰丁謂帶與同列大殊速求一帶易之有司奏唯有尚衣御帶遂以賜之其帶熙寧中復歸內府丁晉公既投朱崖幾十年天聖末明肅太后上仙仁宗親攬萬禨當時仇敵多不在要地晉公密草一表極自辨敘言甚哀切更念無緣上達乃封題云啓上昭文相公時王冀公欽若執政丁自海外遣家僮持此啓入京戒云須俟王公對客日靣投其奴如戒冀公得之驚不敢啓遽以上聞洎發之乃表也其間兩句曰雖遷陵之罪大念立主之功多仁宗讀而憐之乃命移道州司馬作詩曰君心應念前朝老十載飄流若斷蓬又曰九萬里鵬容出海一千年鶴許歸遼且作瀟湘江上客敢言瞻望紫宸朝天下之人疑其復用矣穆修聞道州之徙作詩曰却訝有虞刑政失四凶何事亦量移謂失人心如此在崖州日方與客棋其子哭而入詢之云適聞有中使渡海將至矣公笑曰此王欽若遣人來駭我耳使至謝恩畢乃傳宣撫聞也曹翰以罪謫汝州數年一日有內侍使京西太宗密諭之曰卿至汝州當一訪曹翰觀其良苦然慎勿泄我意也內侍如旨往見因弔其遷謫之久翰泣曰罪犯深重感聖恩不殺死無以報敢訴苦耶但衆口食貧欲以故衣質十千以繼粥飯可乎內侍曰太尉有所須敢不應命何煩質也翰固不可於是封褁一復以授內侍收復以十千答之洎回奏翰語及言質衣事太宗命取其復開視之乃一大幅畫障題曰下江南圖太宗惻然念其功即日有旨召赴闕稍復金吾將軍蓋江南之役翰為先鋒也文潞公以樞密直學士知成都時年未四十成都風俗喜行樂公多燕集有蜚語至京師御史何聖從因謁告歸上遣伺察之何將至潞公亦為之動幕客張少愚謂公曰聖從之來無足慮少愚與聖從同郡因迎見於漢州命酒設樂有營妓善舞聖從狎之問其姓妓曰姓楊聖從曰所謂楊臺栁者少愚即取妓項帕羅題詩曰蜀國佳人號細腰東臺御史惜妖嬈從今喚作楊臺栁舞盡春風萬萬條命其妓作栁枝詞歌之聖從極相賞洽後數日聖從至成都頗嚴重一日潞公大作樂以燕聖從迎其妓雜府妓中歌少愚之詩以侑觴聖從每為之醉及還朝潞公之謗遂息紹興中王鐵帥番禺有狼藉聲朝廷除司諌韓璜為廣東提刑令往亷按憲治在韶陽韓才建臺即行部指番禺王憂甚寢食俱廢有妾故錢塘倡也問主公何憂王告之故妾曰不足憂也璜即韓九字叔夏舊遊妾家最好歡須其來強邀之飲妾當有以敗其守己而韓至王郊迎不見入城乃見堂上不交一談次日報謁王宿治具於别館茶罷邀遊郡圃不許固請乃可至别館水陸具陳伎樂大作韓踧踖不安王麾去伎樂隂命諸倡淡籹詐作姬侍迎入後堂劇飲酒半妾於簾內歌韓昔所贈詞韓聞之心動狂不自制曰汝乃在此耶即欲見之妾隔簾故邀其滿引至於再三終不肯出韓益心急妾乃曰司諌曩在妾家最善舞今日能為妾舞一曲即當出也韓醉甚不知所以即索舞衫塗抹粉墨踉蹌而起忽仆於地王急命索輿諸倡扶掖而登歸船昏然酣寢五更酒醒覺衣衫拘絆索燭照鏡羞愧無以自容即解舟還臺不敢復有所問此聲流播旋遭彈劾王迄善罷國初朝廷遣陶榖使江南以假書為名實使覘之丞國李獻以書扺韓熙載曰五栁公驕甚其善待榖至則如李所言熙載謂所親曰陶秀實非端介者其守可隳當令諸君一笑因令歌姬秦蒻蘭衣弊衣詐為驛卒女榖見之而喜遂犯慎獨之戒作長短句贈之明日中主燕客榖凜然不可犯中主持觴立使蒻蘭出歌續斷絃之曲侑觴榖大慚而罷詞名風光好好因緣惡因緣祗得郵亭一夜眠别神仙琵琶撥盡相思調知音少再把鸞膠續斷絃是何年宣城有俗子娶婦甚都而悍於事姑每夫外歸必泣訴其姑凌虐之苦夫常默然一夕於燈下出利創示婦婦曰將安用此夫好謂之曰我每見汝訴我以汝姑之不容我與汝持此去之如何婦曰心所願也夫曰今則未也汝且更與我謹事之一月令汝之勤至而俾姑之虐暴四鄰皆知其由然後我與汝可密行其事人各快其死亦不深窮暴死之由也婦如其言於是怡顔柔語晨夕供侍及市珍羞以進姑即前撫接頓加和悅及一月復乘酒取創玩於燈下呼婦語之曰汝姑日來與汝若何曰已非前日比又一月復扣創問之婦即歡然曰姑今與我情好倍加前日之事慎不可作也再三言之夫徐握創怒視之曰汝見世間有夫殺婦者乎曰有之復見有子殺母者乎曰未聞也夫曰人之生也以孝養為先父母之恩殺身莫報及長而娶婦正為承奉舅姑以長子息耳汝歸我家我每察汝恃少容色不能承順我母乃反令我為此大逆神明其容之乎姑貸汝兩月使汝改過怡顔盡為婦之道與我母待汝之心知曲不在母而安受我刃也其婦戰懼淚如傾雨拜於床下曰幸恕我死我當畢此生承順姑如今日不敢更有少懈也久之乃許其後婦姑交穆播於親黨聞者皆謂此雖俗子而善於調御轉惡為良雖士君子有不能處者矣郭逵為西帥王韶初以措置西事至邉逵知其必生邉患因備邉財賦連及商賈移牒取問韶讀之怒形顔色擲牒於地者久之乃徐取納懷中入而復出對使者碎之逵奏其事上以問韶韶以元牒進初無一字損壞也上不悟韶計不直逵言自是凡逵論韶皆不報而韶遂得志矣种世衡知澠池縣縣旁山上有廟世衡葺之其梁重大衆不能舉世衡乃令縣幹剪髮如手摶者驅數對於馬前云欲詣廟中較手摶傾城隨觀既至謂觀者曰汝曹先為我致廟梁然後觀手摶衆欣然趨下山共舉之須臾而上世衡字仲平放之兄子雄山在南安其上有飛瓦巖相傳僧初結菴時因山伐木但恐山高運瓦之艱積瓦山下誑欲作法飛瓦砌屋不用工師卜日已定逺近觀者數千人僧偽為傭人挑瓦上山觀者欲其速於作法爭為搬運頃刻都盡僧笑曰吾飛瓦只如是耳上官蘇慕恩部落最強世衡皆撫而用之嘗夜與慕恩飲出侍姬以佐酒既而世衡起入內潛於壁隙窺之慕恩竊與侍姬戲世衡遽出掩之慕恩慚懼請罪世衡笑曰君欲之耶即以遺之由是得其死力諸部有二者使慕恩討之無不克詩人鮑郎中當知睦州日嘗言桐廬縣一民兼并刻剝閭里怨之盡詛以死則必為牛一旦死鄰村産一白牛腹旁分明題其鄉社名姓牛主潛報兼并之子亟往窺之悲恨無計恐其事之暴欲以價求之勒百千方售如數贈之贖歸豢於家未幾一針筆者持金十千首於郡曰某民令我刺字於白牛腹下約得金均分今實不均故首之吏鞠刺時之事曰以快刀剃去氄毛以針墨刺字毛起則宛如天生鮑深嫉之黥二姦竄於島夏英公竦知安陸日受敕舉幕職令録為京朝官有節度推官王某者糲食弊衣過為亷慎一馬瘦瘠僅能移步席韉弊不勝騎自二車以下列狀乞以斯人應詔夏亦自知之遂改官宰邑去安陸數百里洎至任素履忽變侈衣靡食恣行貪墨夏俾親舊諭之答曰某乃妙攫也必無敗露請舍人無慮夏嘗謂僚屬曰世之矯偽有如此者時有世賞官王氏任浙西一監初蒞任日吏民獻錢物幾數百千仍白曰下馬常例王見之以為汚已便欲作狀并物申解上司吏輩祈請再四乃令取一匱以物悉納其中對衆封緘置於廳治戒曰有一小犯即發由是吏民警懼課息俱倍比終任榮歸登舟之次吏白廳匱公曰尋常既有此例須有文牘吏齎案至俾舁匱於舟載之而去康倬字為章元祐名將識之子少日不拘細行遊京師生計蕩析遂偶一娼始來即詭其姓名曰李宣德情意既洽為章誑以偕老之計娼槖中所蓄甚富分其半以給姥指天誓日不相棄背買舟出都門沿汴行才數里相與登岸小酌旗亭伺娼之醉為章解纜亟發娼拗怒戟手於河滸為章弗顧也娼既為其所紿倉皇還家後數年為章再到京師過其門娼母子即呼街卒録之為章略無憚色時李孝夀尹開封威令凜然既至府為章自言平時未嘗至都下無由識此曹恐有邈相肖者願試詢之尹以問娼娼曰宣德郎李某也為章遽云已即右班殿直康倬也尹曰誠倬也取文書來為章探懷中取吏部告示文字以呈之尹撫案大怒杖娼之母子令衆通衢慰勞為章而遣之為章自此折節讀書易文資有名於世後來事浸露孝夀聞之嘗以語人曰僕為京兆而康為章能作此竒事可謂大膽矣與之其子也建康緝捕使臣湯某者於儕輩中著能聲蓋羣盜巨擘也一日有少年衣裳楚楚背負小笈投湯自通為鄯沙王小官人趨前致拜湯亦素知其名因使小憩辭曰觀察在此不敢留只今往和州擬假一力負裝至東陽鎮問渡湯疑有它遂擇其徒狙黠者偕往俾偵伺之自離城闉遇肆輒飲已而大吐幾不能步同行者左負笈右扶醉人殊倦甚恚曰湯觀察以其為好手不過一酒徒耳凡七十里扺鎮委頓投床終夕索水喧呶不少休黎明有騎馬扣門者乃湯也密叩同行已悉在途及至邸沉醟狀亟造卧所少年聞湯來則亦扶頭強披衣問故湯謾以他語對之少年笑曰得非疑某沿途有作過否因指同行為證且曰雖然尚有他故願效區區之力湯囁嚅久之曰不敢相欺實以夜來有酒樓失銀器數百兩總所移文制司立限購捕嚴甚少違則受重譴束手無措用是急冒求䇿耳少年微笑曰若然則關係甚大恐妖異所為非人力能措手惟有哀祈所事香火或可徼神物之庇湯哂其醉中語誕荒不復詰力邀同還扺家謾用其説禱之聖堂則所失器物皆燦然橫陳供牀矣湯始大驚以為神方欲出謝之則其人已去盜亦有道其是之謂乎王舒王吳夫人好潔成疾舒王至性任率每不相合自江寧乞歸私第有官藤床吳假用未還郡吏來索左右莫敢言舒王一日跣而登床偃卧良久吳望見即命送還節序交賀之禮不能親至者每以束刺僉名於上使僕遍投之俗以為常劉貢父為館職節日同舍有令從者以書筒盛門狀遍散於人家貢父知之乃呼所遣人坐於别室犒以酒肴因取書筒視之凡與貢父一靣之舊者盡易以已門狀其人既飲食再三致謝遍走巷陌實為貢父投刺而主人之刺遂不得逹癸辛雜識載吳四丈事亦同然類説載陶榖易刺之事正與此相類恐二公效之為戲耳張鄧公當國有遺其子友直珠冠者使者不能徑通劉相沆謂曰我識學士為汝通之因以歸破其書别録一通用已圖書印之留其真本又於珠冠之角小書已名乃復封題如故以授使者使自通之他日以語友直友直大驚劉時權三司判官尋即真俄知制誥苗劉之亂勤王兵向闕朱忠靖勝非從中調護六龍反正有詔以二凶為淮南兩路制置使令將部曲之任時正彥有挾乘輿南走之謀傳不從朝廷微聞而憂之幸其速去其屬張逵為畫計使請鐵劵既朝辭遂造堂袖劄以懇忠靖曰上多二君忠義此必不吝顧吏取筆判奏行給賜令所屬詳檢故事如法製造不得稽滯二凶大喜是夕遂引遁無復譁者時建炎三年四月己酉也明日昧爽將朝郎官傳宿扣漏院白急速事命延之入傳曰昨得堂帖給賜二將鐵劵此非常之典今可行乎忠靖取所持帖偕執政秉燭同閲忽顧問曰檢詳故事曽檢得否曰無可檢又問如法製造其法如何曰不知又問曰如此可給乎執政皆笑傳亦笑曰得之矣遂退後傳論功遷一官靖康之亂柔福帝姬隨北狩建炎四年有女子詣闕稱為柔福自北潛歸詔遣老宫人視之其貌良是問宫禁舊事略能言倣佛但以足長大疑之女子顰蹙曰金人驅逐如牛羊跣行萬里寧復故態哉上惻然不疑即詔入宫授福國長公主下降高世榮汪龍溪行制詞云彭城方急魯元嘗困於靣馳江左既興益夀宜充於禁臠資粧一萬八千緡紹興十二年顯仁太后回鑾言柔福死沙漠久矣始執付詔獄訊狀乃一女巫也嘗遇一宫婢謂之曰子貌甚類柔福因告以宫掖祕事教之為詐遂伏誅前後請給賜賚計四十七萬九千緡古今事未嘗無對成方遂遇雋不疑故其詐不行此女巫若非顯仁之歸富貴終身矣紹興間一郎官疏蕩不檢一朝士與之善朝士家有數妓客至必出以侑酒即官者與一妓私相悅慕而未得間一日郎官折簡寄妓與為私約朝士適見之妓不敢隱具言其故朝士曰然則非爾之過當為爾輩一笑資姑答簡與之期以來夕密會於西廂且云主人適有故之城外越日乃歸此機不可失郎官得簡喜不自勝如期赴之妓已先待於會所引入屏後曲房妓先登榻垂幔命郎官解衣而登暨前褰幔則妓已自榻後潛去朝士者方偃卧榻上瞪目視之即官裸露惶遽欲走則門已閉朝士謾為好辭謔之曰與公厚善何為如此妓女鄙陋不足奉君子之歡已遣歸矣惟公勿訝徐起復曰某家使令稍衆不略相懲彼將觀望無所畏憚乃呼羣僕掖之於柱以巨竹挺撻之二十流血及髁呼服謝罪復謂曰與公素善故不欲聞官薄示庭訓亦不泄於他人也乃遣出亦不與衣其人狼狽遁還明日朝路亦復相見如故云紹興中劉光世在淮西軍無紀律張魏公為都督奏罷之命參謀吕祉往廬州節制光世頗得軍心祉儒者不知變繩束頓嚴諸軍忿怨統制酈瓊率衆縳祉渡淮歸劉豫魏公方宴僚佐報忽至滿座失色公意氣如常徐曰此有説苐恐事泄耳因樂飲至夜分乃為蠟書遣死士持遺瓊言事可成成之不可速全軍以歸金人得書疑瓊分𨽻其衆困苦之邉賴以安南軒言符離之役諸軍皆潰惟存帳下千人某終夕倣徨而先君方熟寢鼻息如雷何氏備史云張魏公素輕鋭喜功好合虗譽専以金帛官爵相牢籠無所靳惜士之貪利嗜進者爭趨之厥嗣南軒復以道學倡父子為當時宗主在朝通要並出其門悉自詭為君子舉世無敢訾貶者淮西酈瓊之叛公論沸騰言路不得已遂疏其罪既而併逐言者於外及符離軍潰國家數十年所積資械蕩棄無餘方且甘寢宴然稱是心學然當萬衆崩解時一人心法遽能收拾否大扺一時黨佞成風掩惡掩美亦何可盡言也紹興間有代北人衛校尉者從襄漢來時楊和王為殿前帥曩在行伍中與結義為兄弟首往投謁楊一見歡如平生仍事以兄禮且令夫人出拜復招飲於堂欵曲􅎋勤而不問其所向兩日後忽浸疏之來則見於外室衛雅意以為楊方得路志在一官故百舍間關赴之至是大失望栖泊過半年疑為人所嫉譛乃告辭又不得通或教使伺其入朝回遮道陳狀楊亦略不與語判狀尾云執就常州于本府某莊內支錢一百貫衛愈不樂念已無可奈何倘得錢尚可治歸裝而一身從北來何由訪楊莊所在正倣徨旋邸遇一客自云是程副將謂之曰無庸憂吾將往常潤當陪君往奉為取之既得錢相從纍日情好無間遂密語之曰吾實欲遊中原君能扶我偕往否衛欣然許之迤邐抵長安入河東以至代郡倩衛買田我欲作一窟于此衛使牙儈為尋置無何得膏腴千畝衛治具待程程亦報席久之乃言曰吾本無意於斯此行盡出楊相公處分初慮公貪小利輕捨鄉里當今兵革不用非展奮功名之秋故遣我相追隨為辦生計所買良田已悉作衛氏名敬以相付於是悉取契劵付之厥值萬緡黯然而别其事甚類蘇秦舍人之資給張儀也和王第六女性極賢淑適向子豐居於霅未有所育王甚念之一日向妾得男楊氏使祕之以為己出且亟報王王喜甚即請告命輕舟往視之向氏聞王來窘甚無䇿以泥其行時王以保寧昭慶兩鎮領殿巖於湖為本鎮乃使人諷郡將往迓之並屬􅐤鞬伺於界首王初以人不知其來及聞官吏郊迎深恐勞煩生事遂中道而返因厚以金繒花果遺其女且撥吳門良田千畝以為粥米故向氏有崑山粥米莊云殿帥楊存中有所親愛吏平居賜豫無算一旦無故怒而逐之吏莫知得罪之由泣拜辭去存中曰無事莫來見我吏悟其意歸以厚資俾其子入臺中為吏居無何御史欲論存中乾沒軍中糞錢十萬餘其子聞知告其父其父奔告存中存中即具劄奏言軍中有糞錢若干椿管某處惟朝廷所用不數日御史果以為言高宗出存中劄示之御史坐妄言被黜而存中之眷日隆逐吏亦兵法之餘智也秦檜當國京下忽闕見錢市間頗皇皇忽一日秦相呼一鑷工櫛髮以五千當二錢犒之諭曰此錢數日有旨不使可早使也鑷工遂與外人言之不三日京下現錢頓出一云民間以乏現鏹告貨壅莫售曰囂而爭京尹曹泳以白檜檜笑曰易耳即席命召文思院官未至趨者絡繹奔而來亟諭之曰適得旨欲變錢法煩公依舊夾錫樣鑄一緡將以進入盡廢現鏹不用約以翼午畢事院官唯而退夜呼工鞲液將以及期富家聞之大窘盡輦宿藏爭取金粟物價大昻泉溢於市既而樣上省寂無所聞矣都堂左揆閣前有榴每著實檜默數焉忽亡其二不之問一日將排馬忽顧謂左右取斧伐樹有親吏在傍倉卒對曰實甚佳去之可惜檜反顧曰汝盜吾榴吏叩頭服文彥博知永興軍舍人母湜鄠人也上言陜西鐵錢不便於民乞一切廢之朝廷雖不從其鄉人多知之市以鐵錢買物者不肯受長安為之亂民多閉肆僚屬請禁之彥博曰如此是愈使擾也召絲絹行人出其家縑帛數百匹使賣之曰納其直盡以鐵錢勿以銅錢也於是衆曉然知鐵錢不廢市肆遂安秦會之當國四方饋遺日至方務德帥廣東為蠟炬以衆香實其中選駛卒持詣相府厚遺主藏吏期必達吏使候命一日宴客吏白燭盡適廣東方經略送燭一􅤮未敢啓命取用之俄而異香滿座察之則自燭中出也亟命藏其餘枚數之適得四十九呼來卒問故曰經略専造此燭供獻僅五十條既成恐不佳試爇其一不敢以他燭充數秦大喜以為奉已之專待方益厚鄭仲為蜀宣撫格天閣畢工鄭書適至遺錦地衣一鋪秦命鋪閣上廣狹無尺寸差秦默然不樂鄭竟失志秦檜之夫人嘗入禁中顯仁太后言近日子魚大者絶少夫人對曰妾家有之當以百尾進歸告檜檜咎其失言與其館客謀進青魚百尾顯仁撫掌笑曰我道這婆子村果然蓋青魚似子魚而非特差大爾檜之姦蓋有鑒於劉宋彭城王義康東府進柑大於供御故事耳秦檜自遭施全狙刺之後常獨處一閣雖奴僕非命不敢輒入季年違豫三衙楊存中成閔趙密往問疾召入室中欵語久之言及近日表勳酒頗佳表勳乃賜酒名也各贈兩器皆降階謝復坐顧無僕使自携出室此亦寓駕馭之意葛天民字無懷初為僧名義銛號朴翁後返初服居西湖上交遊皆名勝士有二侍姬一名如夢一名如幻一日天大寒方擁爐煎茶忽有皂衣闖户將大璫張知省之命即水張太尉也招之至總宜園清坐高談竟日雪甚寒劇且腹餒甚張初不言相招乃似葛自來相訪惟茶話不設杯酌延論至晚一揖而别天民大恚步歸悔為皂衣紿辱抵家見庭户間羅列筐篚布囊楮帛薪炭米酒殽品以至香藥適用之物充牣於前蓋此璫欲餽是物故先戲之使怒而復喜耳華亭金山廟瀕海乃漢霍將軍祠相傳云當錢武肅霸吳越時嘗以隂兵致助故崇建靈宫淳熙末縣人因時節競集一巫方焚香啓祝唱説福沴錢寺正家幹沈暉者獨不生信心語謔玩侮所善交相勸止恐其掇禍巫宣言詈責甚苦暉正與爭辨俄踉蹌仆地涎流於外若厥暈然從僕奔告其家妻子來視拜巫乞命巫曰悔謝不早神已盛怒既執録精魂付北鄷死在頃刻不可救矣妻子倣徨無計但拊尸泣守暉忽奮身起旁人驚散謂強魂所驅沈笑曰我故戲諸人耳初無所覩也巫悚然潛遁闔廟之人亦捨去京師閭閻多信女巫有武人陳五者厭其家崇信之篤莫能治一日含青李於腮紿家人瘡腫痛甚不食而卧者竟日其妻妾憂甚召女巫治之巫降謂五所患是名疔瘡以其素不敬神神不與救家人羅拜懇祈然後許之五佯作呻吟甚急語家人云必得神師入視救我可也巫入按視五乃從容吐青李視之捽巫批其頰而出之門外自是家人無信崇者韓彥古字子師詭譎任數處性不常尹京日范仲西叔為諌議大夫阜陵眷之大用有日矣范素惡韓將奏黜之語頗泄韓窘甚思所以中之范門清峻無間可入乃以白玉為小合滿貯大北珠緘封於大合中厚賂鈴下老兵使因間通之范大怒叱使持去時有所愛妾在旁怪其奩大而輕試啓觀之則見玉合益怪之方復取視玉滑而珠圓分迸四出失手墮地合既碎益不可收拾范見而益怒自起捽妾之冠而氣中仆地竟不起其無狀至此李仁甫燾亦惡其為人弗與交請謁嘗瞰其亡一日知其出往見之則實未嘗出也既見韓延入書室而請曰平日欲一攀屈而不能今幸見臨姑解衣盤礴可也仁甫辭再三不獲遂為強留室有二厨貯書牙籖黃袱扄護甚嚴仁甫問此為何書答曰先人在軍中日得於北方蓋本朝野史編年成書者是時仁甫方修此編既成有詔臨安給筆札就其家繕録以進而卷帙浩博未見端緒彥古嘗欲略觀不可得至是仁甫聞其言亟欲得見之則曰家所祕藏將即進呈不可他示也李益窘再四致禱乃曰且為某飲酒續當以呈李於是為盡量每杯行輒請至酒罷笑謂仁甫曰前言戲之耳此即公所著長編也已為用佳紙作副本裝治就以奉納便可進御矣李視之信然蓋隂戒書吏傳録每一板酬千錢吏畏其威利其償輒先録送韓所故李未成帙而韓已得全書矣仁甫雖憤愧不平而亦幸蒙其成竟用以進其怙富玩世狡猾每若此寧宗恭淑皇后崩中宫未有所屬楊貴妃與曹美人俱有寵韓托胄見妃任權術忌之而曹性柔順勸帝立曹妃性復機警各設席以邀羊車欲決此舉二閣皆同日楊固遜曹使朝而已候於夜曹不悟逮旰酒甫一再行曹未及有請則楊已奏肅帝輦矣上遂起至楊所則得從容且留寢故能舐筆展紙以請奎章上醉即書貴妃楊氏可立為皇后付外施行而長秋復進筆乞又書其一付其兄次山逮曉雙出之中貴所受者未至省而次山已持御筆自白廟堂矣蓋后慮韓匿上批事或中變故兩行之使不可遏耳楊后會稽人其母張氏舊𨽻德夀樂部誕后東朝禁中自是養於宫中既久新樂純熟所生母還民間后在楊才人位下以琵琶𨽻慈福宫舉動當太后意寧宗朝長信宫悅之後憲聖以賜寧宗進位為婕妤后醜其母家會有楊次山者亦會稽人后自謂其兄也遂姓楊氏宋稗類鈔卷十六
