body:
  text: 宋稗類鈔卷二十九常熟潘永因編報應第四十八趙韓王疾夜夢甚惡使道流上章禳謝因請章㫖趙難言之從枕躍起索筆自書曰情關母子弟及自出於人謀計協臣民子賢難違乎天意乃憑幽􅑂遽逞强陽瞰臣血氣之衰肆彼魘呵之厲信周祝霾魂於鳩訴何晉巫雪魄於雉經倘合帝心誅既不誣管蔡幸原臣死事堪永謝朱均云云密封令弗發向空焚之火正爇函而此章為大風所掣吹墮朱雀門為人所得傳誦於時趙韓王久病無生意解所寶雙魚犀帶遣親吏甄潜詣上清太平宫醮謝道士姜道元為公叩幽都乞神語神曰趙某開國勳臣奈何冤纍不可避姜又叩曰冤者為誰神以淡墨一巨牌示之濃烟罩其上但識牌末一火字而已道元以告公曰我知之矣必秦王庭美也當時自是渠與盧多遜遣堂吏趙白交通事露遘禍咎豈在吾嗚呼一聞火字即知必是秦王心下事其可打過或云普病見廷美坐於牀側與之忿爭而卒唐路巖為相密奏臣下有罪應賜死皆令死者剔取結喉三寸以驗其實至巖賜死乃自罹其酷行刑之地乃楊收死所蓋收為巖所陷者盧相多遜貶朱崖知開封府李符白趙普曰朱崖雖在海外水土不甚惡春州近在內地至者無生還宜以多遜改竄春州外示寬宥而實置之必死之地普頷之月餘符坐事貶宣州行軍司馬上怒未已欲再貶嶺外普具述其事即以符知春州到任未浹旬而卒元豐六年王荆公改春州為陽春縣𨽻南恩州既改為縣自此獲罪者遂不至其地趙普以秦王廷美居西京非便諷李符上言安置房州又恐符言泄乃坐符他事貶之符固枉做小人普亦忍矣哉徐鉉竄邠州而卒其家挈喪歸葬道出一邑時索湘為邑宰忽一官自稱江南放叟徐鉉來謁曰僕有少懇僕在江南為學士時嘗為人以一寶帶投執政變一獄雖事不枉法然不免以贓名汚身今旅魂過海帝廟下恐不為帝所容君為邑宰廟籍鄉版皆𨽻於君君為吾謝之帝必難拒言訖不見湘感其誠乃為禱謝柩舟過果無纎瀾虞薄暮鉉復來謝含喜歘然而去以此知受贓枉法者無所容於天地之間張尚書詠守成都夜夢詣紫府真君繼請到西門黃承事真君降階接之禮甚恭揖尚書坐承事下夢覺莫知所謂明日問左右西門有黃承事否左右云有命召之戒令具常服來既至果如夢中所見者問平生有何陰德真君禮遇如此承事云别無他長惟每嵗收成時以錢三萬緡收糴米糧俟至新陳未接之際糶與細民價例不增升斗如故在我初無所損而小民得濟所急尚書嘆曰此宜居吾之上也使兩吏掖之而拜承事名兼濟其子孫青紫不絶云夏英公素好術數凡陰陽山水之說無不收逮其薨於洛中得善地以葬時其子龍圖安期以貴顯當開塋域不自督促委之幹者其地乃古一侍中葬穴也其故槨碑刻具在幹者以大事迫期遂諱不白而易之取棺碑於旁近埋之既葬未幾龍圖死其婦挈家資數萬改適其次子又得罪廢斥沈遼睿逺言嘉祐中其兄文通自越赴杭所經諸堰皆集牛以運舟是時夏暑堰上露宿以俟之夜久人靜聞以行相呼云今吾輩有何生活答曰明日沈幾兒子過於越任杭州又云沈幾早有子知杭州乎嘆息不已使臣者審其聲甚椎重非人聲又深夜野次更無外人其言氣非流俗因熟察之乃堰數牛也張藝叟聞其事而言曰既以行呼豈非沈之親朋耶因果之說凡祿厚而無功澤於民者即轉生為象牛駝馬復以大力償衆人耳梅尚書和勝執禮嘗序送吳仲儀提㸃江西路刑獄云劉夔侍郎自負有道術功行一旦上章解組竟入武彛山樓居遐想日俟仙去俄有神降之言罪莫大於殺人汝抱大罪奈何興妄念於帝所夔叩首自列生平修謹雖微物不敢殺而況於人神曰昔提㸃某路刑獄時某縣入某死罪州如之汝弗察也其罪入均夔於是悵然悔咎不可及又嘗聞陳睦提㸃兩浙路刑獄㑹杭州民有妾夏沉香者浣衣井傍其嫡子適墮井其妻謂沉香擠之訟於州三易獄不合睦怒劾掾别委掾攝治之既獄具即以才薦遂逐三掾而殺沉香東坡詩所謂殺人無驗終不快此恨終身恐難了蓋有激云他日睦還京師久之無所授聞廟師邢頗從仙人游乃密叩以未來事邢終拒弗之答尋語所親曰如沉香何睦為之震汗廢食屢日故滄州節度使朱信本銀夏部落以軍功起家纎嗇聚斂為時所鄙於京師龍和曲築大第外營田園內造邸舍日入㑹算何啻千緡其長子任供奉官以信在不敢自専但厚利貸於富室其劵詞有鐘聲才絶本利齊到之語蓋謂信一瞑目即還也於是私募僕夫十餘輩飾以珍異袍帶令伺宅傍俟其出擁掖而去鞍馬服玩備極華美其黨皆京師搖唇鼓舌游手無賴日有十數贊其嬉游則稱信陵孟嘗誇其用度則鄙石崇王愷諂佞互攻聾騃不悟而復大言人間之物靡有難至錢去便到其速如神至於筵㑹有奉其歡心者器皿之具盡傾以與之嘗謂盡此生逸樂惟我而已至信卒時已用過十餘萬及信葬畢籍其餘者比信時十去五六加以恣縱蕩費更踰於前以至鬻田園邸舍未周嵗而日入之緡亦絶其弟方四嵗乳母與家人竊議若此不改我輩皆為餒鬼乳母乃抱小兒詣府陳訴是時真宗在壽邸尹開封聞之赫然怒具以上言舉餘財盡與弟供奉者斥出之一簮不著其手仍除其班籍因兹索然無歸寄跡旅店乃歷自來游從處求衣食往既數四皆有厭心遂於京師代獄卒搖鈴警夜聊足糊口素不服勞又以疏怠被逐京師貨藥者多假㺯獅子猢猻為戲聚集市人供奉者形質么麼頦頰尖薄克肖猢猻復委質於戲場韋頸跳擲不已旁觀者為之汗顔而彼殊無怪也公侯之裔一旦如此有其父必生其子何足怪耶唐盧坦字保衡始仕為河南尉時杜黃裳為尹召坦諭曰某巨室子與惡人游破産盍察之坦曰凡居官亷雖大臣無厚蓄其能積財者必剝下致之如子孫善守是天富不道之家不若恣其不道以歸之於人也黃裳驚異其言謝絳吳人雅秀有詞藻景祐中知制誥然輕黠利唇舌人罕測其心時謂之士面觀音與范諷同年素為諷所薄及龎籍訟諷兩被黜時王堯臣當制絳求代草其詞籍誥末曰季孫行父之功吾不忘矣蓋指諷為四凶也論者益畏之未幾出守南陽疾亟自噬舌噀其血肉而卒聞者深鑒之陳公洎為開封功曹時章憲太后臨朝族人杖死一卒公當驗問太后遣中使十數輩諭㫖吏惶懼欲以病死聞洎獨正色曰彼實冤死待我而申奈何懼罪而驗不以實乎爾曹但勿預吾當任咎乃手自為牘以白府尹程琳大喜曰官人用心如此前程非琳所及即為入奏雖大忤㫖而公論歸之既而太后原其族人公亦不及罪自是遂顯清名不數年歷官清要其孫道履皆以詞學為一時聞人蓋陰德之報也舊制沙門島黥卒溢額則取一人投於海殊失朝廷寬宥之意馬默知登州建白乞後溢額選年深至配所不作過者移本州牢城以廣好生之德神宗深然之著為定例後馬夢有告之者爾本無子耳無壽上帝以爾請貸罪人賜一子且益壽云罪人定額官給糧者才三百人溢額則糧不足且地狹難容寨主李慶一任至殺七百餘人默以貸罪人事獲報生子純字子約紹興中為江西漕時梁企道楊祖為帥每强盜敕下貸命必配潮州諭部吏至郊外即投之江中子約云使其合死則自正典刑以其罪止於流故赦其生猶或自新既斷之後即平人爾倘如此與殺無罪之人何以異乎二公由此不咸後以他事交訴於朝俱罷去默字處厚仕至諫議大夫壽八十子約亦以大中大夫致仕壽八十一而終馬巨濟之父中年未得子母為置妾媵偶獲一處子質色殊麗父欣然納之但每對鏡理髮即避匿有沮喪之容密詢其故乃垂泣曰某父守官某所不幸物故不獲歸葬鄉里母乃見鬻得值將畢葬事今父死未經卒哭尚約髮以白繒而以絳綵蒙之懼君之見耳無他故也涓父惻然乃訪其母以女歸之且為具舟載其資裝遣送是夕涓母夢羽人告之云天錫爾子慶流涓涓後生巨濟即以涓名之涓既赴御試畢夢人告之曰子欲及第須作十三魁涓歷數其在太學及預薦送止作十二魁心甚憂之逮至賜第則魁冠天下果十三魁也李士衡為館職使髙麗一武臣為副髙麗禮幣贈遺之物士衡皆不關意一切委於副使時船底疏漏副使以士衡所得縑帛藉船底然後實已物以避濕漏至海中遇大風船欲傾覆舟人大恐請盡棄所載不爾船重必難免副使倉皇取載物投之海中不暇揀擇約投及半風止船定既而檢㸃所投皆副使物士衡所得在船底一無所失王韶晚年頗悔取熙河時事嘗游金山寺以因果問衆僧皆言以王法殺人如舟行壓殺螺蚌自是無心韶猶疑之時有刁景純者比韶為前輩亦學佛多在金山忽一日與韶邂逅於長老坐間韶復舉前話以問衆答如初刁獨無語韶曰十八丈以為何如刁曰但打得過賢心下否韶曰不知十八丈以為打得過否刁曰以某所見賢打過不得曰何以知之曰若打得過自不問也韶亦不自安後數嵗害發背終日闔眼醫者告之曰看病亦當看眼色樞密試開眼看韶曰安敢開眼斬頭截腳人有許多在前月餘遂卒當韶未病前涇原宰王直溫一夕忽夢奉天符令斷王韶公事直溫熟視罪人頗殷肥矬矮其吏宣判將韶決脊杖配洪州覺而以韶名字問人或告以樞密使王韶亦殷肥矬矮直溫異之未幾聞韶罷樞密謫官洪州發背而卒大觀中有人於京師賣靴忽見其父葬時一靴在焉詰之鋪翁云一官員携來修俟其後至可問有頃其人果來乃其父也拜之不顧但取靴乘馬而去士人追隨約二三里度力不可及乃呼曰生為父子何無一言相教其父曰爾可學鎮江葛蘩士人遂造蘩問何以為幽冥所重蘩對曰豫始者日行一利人事嗣後或一或三或數四或十今四十餘年未嘗少廢又問何以為利人事蘩指坐間踏子曰此物置之不正則觸人足豫為正之若人渴與以杯水皆利人事也但隨其事而利之上至卿相下至乞丐皆可以行惟在長久而已後有異僧見蘩在淨土境中蓋其能以利人為急則日用無非利人之事矣劉元城貶梅州章惇輩必欲殺之郡有王豪凶人也以資得官往來京師見惇自言能殺元城惇大喜即除本路轉運判官其人驅車速進及境郡守遣人告元城元城略處置後事與客笑談飲酒以待之至夜半忽聞鐘聲問之則其人忽嘔血死矣秦檜父嘗為靜江府古縣令守帥胡舜陟欲為檜父立祠於縣以為逢迎計縣令髙登剛正士也堅不奉命舜陟大怒文致其罪送獄鍛鍊備極慘毒未數日舜陟忽殂登乃獲免大理寺評事胡夢昱以直言貶象郡過桂林帥錢宏祖欲害之未及有所施行亦暴亡嗚呼謂天不佑忠賢可乎胡淡菴謫嶺南士大夫多凌蔑之否則畏避之方務德滋本亦檜黨待之獨加禮淡菴深德之檜死其黨皆逐務德入京謀一差遣不可得栖栖旅館淡菴偶與王梅溪語及其事梅溪曰此君子也率館中諸公訪之且揄揚其美務德由此遂晉用可見君子贏得做君子小人枉了做小人龍舒人劉觀任平江許浦監征其子堯舉字唐卿因就嘉禾流寓試僦舟以行舟人有女堯舉調之舟人防間甚嚴無由得間既引試舟人以其重扃棘圍無他慮也日出市貿易而試題適唐卿私課既得意出院甚早比兩場皆然遂與舟女得諧私約觀夫婦一夕夢黃衣二人馳至報榜云郎君首薦觀前欲視其榜傍一人忽掣去云劉堯舉近作欺心事天符殿一榜矣覺言其夢而協頗驚異俄而拆卷堯舉以雜犯見黜主文皆歎惜其文既歸觀以夢語之且詰其近作何事匿不敢言次舉雖首薦於舒亦竟不第建炎初劇盜張遇起江淮間所至噬螫無噍類衆且數十萬其禆將馬吉者狀絶魁偉善用兵然頗仁慈每戒軍士勿妄殺人曰為盜脫饑耳得食則已奈何廣殺凡虜獲士人及僧道輒條别善遇之有疾病視其起居飲食甚篤士卒得婦女以獻者置别室訪其親戚還之無所歸擇配嫁之一日遇宴帳下諸人有譛之者曰是收軍情者遇怒欲斬之呼至數其罪吉嘻笑自若曰賊殺賊豈須有罪耶何云云如是我死固分耳即就地坐瞑目合爪視之死矣遇雖殘忍亦為變色左右至流涕古稱得道至人以至佛菩薩多𨼆盜賊牢獄屠沽釣獵中以救人如吉殆是耶入內都知宣慶使陳永錫言上皇朝內人有兩劉娘子其一人年近五旬志性素謹自入中年即飯蔬誦經有程課宫中呼為看經劉娘子其一乃上皇藩邸人敏於給事每上食則就案析治脯修多如上意宫中呼為尚食劉娘子樂禍而喜暴人之私一日有小宫嬪微忤上㫖潜求救於尚食既諾之而反從中下石小嬪知之多取紙筆焚之云我且上訴於天帝即自縊死不踰月兩劉娘子同日而亡時五月三日也至輿尸出閣門棺斂初舉尚食之衾而其首已斷旋轉於地視之則羣蛆藂雜而穢氣不可近繼啓看經之衾香馥集人面色如生於是內人知者皆稽首云善惡之報昭示如此不可不為之戒也章思文福唐人家世貧窶思文以鈎距心計致富初一武臣監秀州華亭縣鹽場贓汚不法多受亭户賄賂任思文以為肘臂約所得中分之武臣者以方在任欲匿其跡故受賂多寄思文所信之不疑也秩滿受代往取思文盡乾沒不與武臣者不勝忿恨致疾以死思文暮年始生一子鍾愛之而其子幼則多病治療之費竭産不恤年六七嵗竟死思文慟悼恨不身代之也蓋棺之際痛不能捨復舉面羃撫之則其子面已變如向武臣之狀盛怒勃然懼而亟瘞之衛仲逵字子逵秀州華亭人為館職時因病入冥府立於庭下俟命有四人者坐其上西向少年者呼曰為他試一檢三人難之少年曰若不檢如何行遣三人曰渠已是合還何必檢恐出手不得爾少年意不可回摳衣吏諭意吏捧牙盤而上中置紅黑牌二紅者金書善字黑者白書惡字少年指黑牌吏持以去少焉吏人捧簿書出盈庭即有一稱橫前兩皆有柈吏舉其簿置東柈柈重壓至地地為動搖衛立不能安三人皆失色云向固云不可檢今果爾奈何少年亦慘沮有悔意須㬰曰更與檢善看吏又持紅牌去忽西北隅微明如落照狀一朱衣道士捧玉盤出四人皆起立道士居中而坐望玉盤中文書僅如箸大吏持下置西柈柈亦壓地而東柈髙舉向空大風歘起卷其紙蔽天如烏鳶亂飛無一存者四人起相賀命席延衛坐衛拱手曰仲逵年未四十平生不敢為過惡何由簿書充塞如此少年曰心善者惡輕心惡者惡重舉念不正此即書之何必真犯衛謝曰是則然矣敢問善狀何事也少年曰朝廷興工修三山石橋君曽上書諫此乃奏藁也衛曰雖曽上疏朝廷不從何益於事曰事之行止在君非臣也君言得用豈但活數萬人命君當位極人臣奈惡簿頗多猶不失八座勉之遂遣人導歸後位至吏部尚書河南民家婦某元兵下江南婦被虜姑與夫行求數年得之湖南婦已妻千户某饒於財情好甚洽視夫姑若途人會有㫖凡婦人被虜許夫贖取敢匿者死某懼罪亟遣婦婦堅不行夫姑留以俟婦閉其室弗與通遂號慟頓絶而去行未百步青天無雲而雷回視婦已震死矣大德間荆南境內有九人山行值雨避於路傍舊土洞中忽有一虎來居洞口咆哮怒視目光射人內一人素愚八人者密議虎若不得人烏得去因紿愚者先出我輩共掩殺之愚者意未決遂各解一衣縛作人形擲而出之虎愈怒八人併力排愚者於外虎即銜置洞口怒視如前須㬰土洞壓塌八人皆死愚者獲生夫當顛沛患難之際乃欲以八人之智而陷一人之愚其用心亦險矣天道果夢夢耶神鬼第四十九雒陽大內興立自隋唐五代至聖朝藝祖嘗欲都之開寶末幸焉而宫中多見怪且適霖雨徒雩祀謝見上帝而歸是後至宣和又為年百五十久虛曠蓋自金鑾殿後雖白晝人不敢入入則多有異蠆或大於斗蛇率為巨蟒日夜絲竹歌哭之聲不絶也宣和末有監官吳本者武人恃氣不畏事夏月因納凉於殿廡間至晡時候天尚未昏黑從者堅請歸舍不聽俄忽聞蹕聲自內出即有衛從繽紛執紅綃金龍燭者數十對成行羅列中一人衣黃衣如帝王狀胸間尚帶鮮血擁從甚盛徐行由殿廡從本寓舍前過本與其從者急趨入户避之得詳瞰焉最後有一衛士似怒本納凉故妨其行蹤也乃以手兩指按其卧榻之四足遂穿磚而陷於地頃刻轉他殿而去遂忽不見本大駭自是不敢宿止其中矣因圖畫所見遍以示人雒陽士大夫多傳之曰此必唐昭宗也冀公王欽若淳化二年自懷州赴舉與西州武覃偕行途次圃田忽失公所在覃遂止於民家散僕尋之俄見僕濶步而至驚悸言曰自此數里有一神祠見公所乘馬弛韁宇下某徑至蕭屏有門吏約云令公適與王相歡飲不可入也某竊窺見其中果有笙歌杯盤之具覃急與僕同往見公已來將半酣矣詢之笑而不答覃却到民家指公㑹處乃裴晉公廟覃心異之登第後不數年為翰林學士使兩川回軺至褎城驛方憩於正寢將吏忽見導從自外而至中有一人云唐宰相裴令公入謁公欣然接之因密謂公大用之期乃懷中出書一卷示公以富貴默定之事言終而𨼆及公登庸出俸新圃田神祠為文記之韓退之木居士詩偶然題作木居士便有無窮求福人蓋當時以枯木類人形因以乞靈也今在衡州之耒陽縣元豐初年旱暵縣令禱之不應柝而焚之主僧道符乃更刻木為形而祠之張藝叟南遷郴州過而見之題詩於壁云波穿火透本無竒初見潮州刺史詩當日老翁終不免後來居士欲奚為山中雷雨誰宜主水底蛟龍睡不知若使天年俱自遂如今已復長孫枝豫每憤南方淫祠之多所至有之陸龜蒙所謂有雄而毅􅉳而碩者則曰將軍有溫而願哲而少者則曰某郎有媪而尊嚴者則曰姥有婦而容者則曰姑而三吳尤甚所主之神不一或曰太尉或曰相公或曰夫人或曰娘子村民家有疾病不服藥劑惟神是恃事必先禱之謂之問神茍許其請雖冒險以觸憲網必為之倘不諾其請卒不敢違也凡禱必許以牲牢祀謝刲物命所費不資禱而不驗病者已殂猶償所許之祭曰弗償其禍必甚無知之俗以神之禦災捍患為可惴惴然不敢少懈也近世士大夫家亦漸習此風其稍有識者心知其非而見女子之易惑故牽於閨幃之愛亦遂徇俗殊可駭歎且神聰明正直而一者也豈有以酒食是嗜而竊福以叨餮於愚鹵之民豈所謂聰明正直者耶至於嶽也瀆也古先賢德有功於人載在祀典血食一方者吾敢不欽奉之乎所謂郎者姑者安能禍福於忠信之士吾所未信也世豈無一狄公為一革之木居士既為令之所焚矣彼庸髠者復假托以惑衆此尤可笑云余又聞蜀人言陳子昻閬州人州有陳拾遺廟語訛為十姨遂更廟貌為婦人裝飾甚嚴有禱亦或驗利之所在茍僅得豚肩巵酒子昻且屈為婦人勉應之不辭則新木居士亦奚為不可乎聞者絶倒溫州有土地杜拾姨無夫五髭鬚相公無婦州人迎杜十姨以配五髭鬚合為一廟杜拾姨為誰杜拾遺也五髭鬚為誰伍子胥也若少陵有靈豈不對子胥笑曰爾尚有相公之稱而我乃為十姨何雌我耶大小孤山在江湖中嶷然獨立而世俗轉孤為姑小孤側有石磯謂之澎浪磯遂轉為彭郎磯云彭郎者小姑壻也故小姑廟像乃一婦人其額為聖母廟西京龍門山在伊水上自端門望之如雙闕故謂之闕塞而山口有廟曰闕口廟廟中神像甚勇手持一屠刀尖鋭按膝而坐問其居人云此乃豁口大王也北方有牛王廟畫百牛於壁而牛王居其中問牛王為何人乃冉伯牛也陳州城外有厄臺寺乃孔子絶糧之地今其中有一字王佛云是孔子像舊榜文宣王因風雨洗剝但存王一字而釋氏附㑹為一字王佛也其侍者冠服猶是顔淵之狀如杜甫之作十姨天下如是不可勝數六一居士曰石曼卿自少以詩酒豪放自得其氣貌偉然詩格竒峭又工於書筆畫遒徑兼顔栁為世所珍余家嘗得南唐後主澄心堂紙曼卿為余以此紙書其籌筆驛詩詩曼卿平生所自愛者至今藏之號為三絶曼卿卒後其故人有見之者云恍惚如夢中言我今為鬼仙所主芙蓉城欲呼故人往游不得憤然騎一素騾去如飛其後又降於亳州一舉子家又呼其舉子去不得因留詩一篇其一聫云鶯聲不逐春光老花影長隨日腳留神仙事怪不可知其詩頗類曼卿語舉子不能道也洪州學正張某天性刻薄老而益甚雖生徒告假亦靳不與學官給五日則改為三日給三日則改為二日他皆類是衆憾之有張鬼子者以形容似鬼得名衆使為作陰府追鬼以怖張老鬼子欣然曰願奉命然㺯假須似真要得一𡨕司牒乃可衆曰牒式當何如曰曽見人為之乃索紙以白􅈨細書而自押字於後是夜詣州學學門已扄鬼子入自隙間衆駭愕張老見之怒曰畜生何敢然必諸人使爾夜怖我笑曰奉陰府牒追君張索牒讀未竟鬼子露其巾有兩角橫其首張老驚號即死鬼子出立於庭言曰吾真牛頭獄卒奉命追此老偶渡水失符至今二十年懼不敢歸今賴諸秀才力得以反命㺯假却成真矣拜謝而逝舊𫝊荆州江亭柱間有詞云簾卷曲欄獨倚山展暮天無際淚眼不曽晴家在吳頭楚尾數㸃雪花亂委撲漉沙鷗驚起詩句欲成時沒入蒼烟叢裏黃魯直讀之凄然曰似為余發也不知何人所作筆勢類女子又淚眼不曽晴之句疑為鬼是夕夢女子曰我家豫章吳城山附客舟至此墮水不得歸登江亭有感而作不意公能識之魯直驚悟曰此必吳城小龍女輩也時建中靖國元年云至乾道六年吳明可芾守豫章其子登科同年生朱景父因孫來見得攝新建尉值府中葺吳城龍王廟命之董役忽憶荆州詞以為語意憤抑悽斷殆非龍宫嫺雅出塵之度為賦玉樓春一闋書於女祠壁云玉階瓊室氷壺帳恁地水晶簾不上兒家住處隔紅塵雲氣悠揚風淡蕩有時閒把蘭舟放霧鬢霜鬟乘翠浪夜深滿載月明歸畫破琉璃千萬丈是夜夢旌幢羽葆儀衛甚盛𫝊言龍女來謁宴飲寢昵如經一日夜言談瀟灑風儀穆然將别謂朱曰君前身本南海廣利王幼子行游江湖為我家壻妾實得奉箕帚今君雖以宿緣來生朱氏然吳城之念正爾不忘以故得祿多在豫章之分須君官南海陽祿且盡當復諧佳偶言訖愴别而去既覺亟書其事識之特未悟南海語耳後浸淫病瘠家人疑其有祟挽使罷歸明年丁艱服闋調𡊮州分宜主簿須次家居縣之士子昔從為學者相率來謁因話𡊮州風土偶及主簿廨前有南海王廟朱恍然自失明日抱疾遂不起竟未嘗得至官凡兩攝職於豫章所謂多得祿者如是而已意其初撰詞時方寸墮妄境故契神女之夢豈黠鬼乘念託以為奸者與資聖寺在海鹽縣西寺有寶塔極髙峻四面層層㸃燈照東海行舟者皆望此為標的焉有海濱業戶某與兄弟泛舟入洋口接鮮風濤驟惡舟楫悉壞俱溺於海其家日夕號泣一夕夢其夫歸曰我未出海時先夢神告曰來日有風波之厄不可往吾不信遂死於此初墜海時彈指隨波已去數百里今在海潮鬼部中極苦每日潮上皆我輩推擁而來他佛事祭享皆為諸鬼奪去我不可得獨有資聖塔燈光明功德浩大耳其妻因鬻家資入寺設燈願次夕又夢夫來云今得升一等矣洪揚祖嚴州人入太學以三含法釋褐嘉熙庚子間為京局官一日偕友人泛湖至三賢堂登岸縱步得小徑松竹蕭然頗訝前是未覩行數武新宅一所青衣候門曰娘子待官人久矣衆與俱入主人延客啜茶於堂則姣然少婦也謂洪曰别來安否洪恍然曰娘子誰氏婦人曰官人遽忘妾耶洪諦視良久念姻戚間無有而其貌頗類舊所狎妓漫曰子非某人乎婦人曰是也洪曰子下世久矣吾嘗燒香送喪湖上今乃不死豈而家紿我乎婦人笑曰妾果死矣曰死則何以在是曰世間如我者甚多特人不識耳因相與道故舊臨别謂洪曰世事可知得嬉且嬉三十年後此為血池衆出門大驚曰吾曹乃白日見鬼耶使其僕插竹記路明日率十餘友再往則榛翳無跡不可復辨矣其甥黃宗仁為洪撰墓志不敢盡言但云公遇異人告之將來世變遂以詩酒自娛世事罕嬰懷抱云又開禧中有一官人到部僦旅摟而居後樓亦一官人以妾自隨前樓人聽其言語歌聲宛然亡妾也心甚訝之一日俟其主出推窗呼之妾亦倚窗而望前樓人曰汝非某人乎曰是也曰汝死久矣何為在此曰世間如我輩不少苐不為人所覺耳前樓人見國事日非常懷杞憂因問曰汝在陰間必知陽世事國祚如何曰不逺矣但視浙江潮若不來國必亡矣至理宗時潮頭漸擊西興浙江亭遂為沙漲之地李通判者忘其名一女既笄遴擇佳壻久未有可意者一日有陳察推者通謁與李有舊叙話甚欵因言近喪偶且及期矣言及歔欷流涕且言家有二女皆已及嫁思念逝者悲不自勝李女自青瑣間窺之竊謂侍婢曰是人篤於情義如此決非輕薄者得為之配亦幸矣因再三詢其姓氏每言輒及之陳時年逾强仕瘠黑而多髯容狀塵垢素好學能詩妙書札李喜之每歎曰使其年貌稍稱吾女亦足壻矣女聞之竊謂傅姆曰女子托身惟擇所歸年之少長貌之美醜豈論也哉由是家人頗識女意媒議他姻則默不樂父母怪之曰豈宿緣耶乃遣媒通約陳初固拒以年長非偶其議屢格則女輒憂忿或愠不食父母憂之固請不得已乃委禽焉女喜甚既成婚伉儷和鳴撫二女如已出謂陳曰女已長婚對當及時不宜緩也朝夕屢以為言且廣詢媒妁不半載而嫁其長女傾資奉之陳曰季女尚可二三年妻曰不然趣之尤力陳辭曰縱得壻今無以備奩具妻曰但求壻吾為營辨又數月亦受聘亟議嫁遣陳曰奈何妻忽謂陳曰君昔貯金五十星於小罌中埋牀下盍取用之豈於已女而有吝耶陳大驚曰汝何從知之但笑而不言蓋陳實嘗埋金他人無知者因取用之不期年而二女皆出適妻謂陳曰吾責已塞今無餘事矣當置酒相賀乃與陳對飲極量歡甚各大醉而寢翼旦寢覺妻忽驚遽大呌曰此何所耶顧陳曰爾何人耶陳大驚疑其心疾媵侍輩圍守妻驚恐惶惑問曰我何為在此媵侍曰夫人成親一年豈不省耶妻都不曉俄其父母至撫慰之因歷言其本末妻大慟曰父母生女不為擇配此人醜老可惡忍以我棄之耶不肯留乃送其家自言恍如夢覺前事皆不知之陳亦悟埋金之事惟其亡妻知之疑其繫念二女而魂附李女以畢姻嫁也後竟仳􅍣而改醮焉異哉福州海商楊氏父子三人同溺於大洋共附一木遂漂墜鬼國中烟火聚落悉如人世但其人形軀枯悴生理窮窶每相報云去每州每縣赴法會則各有喜色往往盡室以行大率醉歸挾餘饌分餉三楊賴以充饑或數日不值枵腹竟夕居數年不堪鬼氣薰蒸父兄皆死惟幼子存一旦見飛符使者從天而下訪問此子衆鬼謀曰使去則不可若不去又已有他姓名令隨隊而行戒瞑目勿開既登塗耳畔聞風雨波濤之聲甚厲良久腳履平地見僧振鈴呪食衆合掌盡入引楊生蔽身大樹之上時持食物出餽忽振鈴羣誦大悲呪楊少年時能之自墮異域已廢忘一聽其聲便能憶亦隨口持諷鬼不復相親會散掃跡楊倣徨到曉往來見者指為猿猱乃下樹與人說本末始認得夜來法席正其家也楊氏一門且疑且畏妻亦不敢深相認識經日驗其無他方悲泣存問積久漸復人色建康巨商楊二郎本以牙儈起家數販南海往來十有餘年纍資千萬淳熙中遇盜於鯨波同行盡遭害楊偶先墮水得免逢一木抱之沉浮漂至一島捨而登岸信腳行入一洞男女雜沓爭來聚觀多裸形而聲音可辨認一婦人若最尊者稱為鬼國母侍衛頗衆令引當前問之曰汝願住此否楊自念無計可脫姑委命逃生應曰願住母即分付小鬟為治一室使為夫婦約近二年久飲食起居與世間無異嘗有駛卒持書至曰真仙邀迎國母請赴瓊室即命而出自此旬日或一月必往其衆悉從楊獨處洞中他日言於母乞侍行母曰汝是凡人欲去不得如是者纍纍致懇忽許之飄然履虛如躡烟雲至一館宇優樂盤殽極為豐潔主者占位而坐鬼母導楊伏於桌幃戒以屏息勿動移時宴罷乃焚燒楮鏹漸次聞人哭聲審聽之蓋其妻子與姻戚也楊從桌下出喚家人名皆以鬼物交口唾罵惟妻泣曰汝沒大海杳無消息當時發喪行服招魂卜葬今夕除靈故設水陸道場追薦莫是别有强魂附托耶楊曰我元不曽死具道所遇曲折方信為然鬼母在外招喚繼以怒罵然不能相近少頃寂然楊氏呼醫用藥調治幾嵗顔狀始復臨安府天慶觀有老道士劉虛靜年七十餘寓雲安堂旦於天尊像前注香冥禱禮甚䖍至觀有小道士伏暗中默聆其禱乃云虛靜年老單羈一身常恐一旦數盡身膏草野若䝉上天賜以白金十星為身後之備志願足矣小道士乃取白蠟範為小錠俟其夕禱即遙擲其旁虛靜得之驚異伏謝再三不復細視姑謹藏之語其徒曰人之誠悃常患不至耳雖天道髙逺而聽甚卑無不從人者小道士復欲戲之因又密求視其所獲請之既數不免示之小道士即懷之疾走以示衆人相與笑其狂昧虛靜從而執之且熟視其物曰此白蠟耳非我所獲者喧譊不置必欲訟之官小道士家素饒於財衆道士勸諭之曰汝若致訟則所廢不止此不若如數償之遂真有所獲雖虛靜一時非意之禱而造物者宛曲取付蓋亦巧矣降仙之事人多疑為持箕者狡獪以愚旁觀或宿搆詩文托為仙語或云能致鬼之能文者紹興斜橋客邸有請紫姑者命櫓為題詩云寒嚴雪壓松枝折斑斑剝盡青虬血運斤巧匠斫削成劍脊半開魚尾裂五湖仙子多竒致欲駕神舟探仙穴碧雲不動曉山橫數聲搖落江天月又湖學甲子嵗科舉後士人有請仙問得失者賦詞云凄凉天氣凄凉院宇孤鴻呌斜月寒燈伴殘漏落盡梧桐秋影瘦鑑古畫難就重陽又近也對黃花依舊此人竟失舉淳祐間有降仙於杭泮者或以鬼譏之大書一詩云眼前清白誰知我口裏雌黃一任君縱使挾山可超海也須覆雨更翻雲或以功名為問答云朝經暮史無閒日北履南鞭知幾年踐履未能求實地榮枯何必問青天報其相譏也又董無益常記女仙三絶句云栁條金嫩不勝鴉青粉墻邊道韞家燕子未來春寂寂小窗和雨夢梨花松影侵壇林觀靜桃花流水石橋寒東風吹過雙蝴蝶人倚危樓第幾欄屈曲闌干月半規藕花香淡水漪漪分明一夜文姬夢只有青團扇子知亦可喜也又宋慶之寓永嘉時遇詔嵗鄉士從之結課者頗衆適逢七夕學徒醵飲有僧法辨者善五星每以八煞為說時人號為辨八煞一士致仙扣試事忽箕動大書文章伯降宋怪之漫云姑置此且求一七夕新詞復請韻宋指辨云以八煞為韻意欲困之忽運箕如飛大書鵲橋仙一闋云鸞輿初駕牛車齊發𨼆𨼆鵲橋咿軋尤雲殢雨正歡濃但只怕來朝初八霞垂彩幔月明銀燭馥郁香噴金鴨年年此際一相逢未審是甚時結煞亦警敏可喜又李知父嘗於貴家觀降仙扣其姓名不答忽作薛稷體大書一詩云猩袍玉帶落邊塵幾見東風作好春因過江南省宗廟眼前誰是舊京人捧箕者皆悚然驚散知為淵聖在天之靈為之凄然又嶽侯死後臨安西溪寨將軍子弟因請紫姑神侯降焉大書其名衆已驚愕請其花押則宛如平日真跡也復書一絶云經略中原二十秋功多過少未全酬丹心似石今誰辨空自遊魂遍九州丞相秦聞而惡之擒治其徒流竄者數人多有死者又鄧端若少時𫝊得召紫姑呪訣而所致皆女仙喜作詩嘗為鄧氏婦女賦衣領及裙帶三絶句清婉可誦衣領篇云小剪雲羅雪色白香媒隨意作真行新詩便是班昭戒勝却閒書坐右銘其二云時樣新裁段色衣不將綵線縷花枝殷勤只要詩仙句繡出分明一段竒裙帶詩云尺六腰圍栁樣輕娉娉嫋嫋最傾城羅裙新剪湘江水緩步金蓮襪底生時庭前桃正花或請賞詠應聲落筆云武陵溪上舊時花兩岸晴紅爛彩霞試問劉郎緣底事花開時節未還家其他所作聫句對皆機警敏捷了不抒思而成又吉州人家邀紫姑正作詩適有美女子在其傍因請詠手即書曰笑折夭桃力不禁時攀楊柳㺯春陰管絃曲裏傳聲慢星月樓前斂拜深繡幕偷回雙舞袖緑窗閒整小眉心秋來幾度挑羅襪為憶相思放却針信筆而成殊不思索頗有雅致沈彥博詠纎手云曽見花梢棟俏枝宛如春筍露𠫭差金叉欲溜輕扶鬢寶鑑重臨淡掃眉雙送鞦韆扶索處半楦羅袖賭􅍐時香腮悶托聞嘶馬忙揭朱簾問阿誰又吳興周權選伯乾道五年知衢州西安縣招郡士沈延年名館生沈能邀紫姑神談未來事多驗尤善屬文清新敏捷出人意表通判方楶宴客就郡借妓周適邀仙因求賦一詞往侑席指瓶內一捻紅牡丹令詠之名瑞鶴仙用捻字為韻意欲以險困之不思而就云覩嬌紅細捻似西子當日留心千葉西都競栽接賞園林臺榭何妨日涉輕羅慢褶費多少陽和調燮向曉來露浥芳苞一㸃醉紅朝頰雙壓姚黃國艷魏紫天香倚風羞怯雲鬟試插便引動狂蜂蝶況東君開宴賞心樂事莫惜獻酬頻叠看相將紅藥翻階尚餘侍妾既成略不加㸃又有召箕仙賦詩以芭蕉一葉置袖扣之即賦一絶云袖裏深藏一葉青知君有意侮神靈今宵試聽西窗雨缺滴瀟瀟一兩聲可謂絶妙此必平生以詩名世者可與八煞之詞類耳又客有降仙者心疑捧箕者自為之因命題賦筆且令作七言律詩頃刻輒就云兔出中山骨欲仙何人扶頴纒尖圓拙夫堪笑堆成塜豪客曽同掃似椽窗下玉蜍涵夜月几間雪繭湧春泉當時定逺成何事輕擲毛錐忽未然縱使人為其速亦不可及也蜀中灌口二郎云是李氷第二子初封王號至徽宗改為真君張魏公用兵禱於其廟夜夢神語之云我向來封王有血食之奉今祭我以素食故無威福之靈今須復封為王當有威靈相助魏公遂乞復其封每嵗人户祭賽殺羊萬頭廟前積骨如山州府亦因之得稅又利路梓潼神極靈兩神若割據兩川然廣德軍祠廣德王姓張名渤前漢吳興郡烏程縣橫山人始於本郡長興縣顯靈鄉發跡役陰兵導河流欲抵廣德縣故東自長興荆溪疏鑿聖瀆王先時與夫人李氏密期每餉至鳴鼓三聲王即自至不令夫人至開河之所厥後因夫人遺飱於鼓為烏啄而鼓鳴王以為餉至至則無有逡巡夫人至鳴其鼓王反不至夫人遂親至河所見王為大豕驅役陰兵開河瀆王見夫人未及變形從此恥之遂不與夫人相見聖瀆之功遂息逃於廣德縣西五里橫山之頂居民思之立廟於山西南隅夫人李氏亦至縣東二里而化時人亦立其廟由是歷漢唐五代以來凡有水旱災沴禱之無不應都人以王故呼豕曰烏羊宋稗類鈔卷二十九
