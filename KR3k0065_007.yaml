body:
  text: 宋稗類鈔卷七常熟潘永因編奢汰宋師伐江南大將獲李後主寵姬夜見燈輒閉目曰煙氣易以蠟炬閉目云煙氣愈甚問之曰然則宫中未嘗點燈耶對曰宫中本閣每至夜則懸大寶珠光照一室如白晝也劉鋹據嶺南置兵八千人専以採珠為事目曰媚川都每以石硾其足入海一行至六百人其溺而死者相屬也久之珠充積內庫所居殿宇梁棟簾箔盡飾以珠窮極奢麗後宋師之入一火而燼趙韓王兩京起第外門皆柴荆不設正寢始入門小􅈦事三間堂中位七間左右分子舍三間南北各七位與堂相差每位東西廡鑿三井後苑亭榭制作雄麗廳事前有椅子十隻式樣古朴坐次分列皆自韓王安排至今不易太祖幸洛初見柴荆既而至堂筵以及後圃哂之曰此老子終是不純堂中猶有當時酒凝如膠漆以水參之方可飲馨烈倍常初河南府嵗課修內木植或不時具俾有司督按乃曰為趙普修宅買木所分尋有旨待趙普修宅了上供韓王治第麻搗錢一千二百餘貫其他可知塗壁以麻搗土世俗遂謂塗壁麻為麻搗真宗建玉清宫自經始及告成凡十四年其宏大瓌麗不可名似逺而望之但見碧瓦凌空聳耀京國每曦光上浮翠彩照射則不可正視其中諸天殿外二十八宿亦各一殿楩柟把梓搜窮山谷璇題金榜不能殫紀朱碧藻繡工色巧絶甍栱欒楹全以金飾入見驚恍褫魄迷其方向所費巨億萬雖用金之數亦不能會計天下珍樹怪石內府竒寶異物充牣襞積窮極侈大餘材始及景靈會靈二宫觀然亦足冠古今之壯麗矣議者以為玉清之盛開闢以來未之有也阿房建章固虛語爾天聖嵗六月中宵暴雨震電咫尺語不相聞俄而光照都城如晝黎明宫災無餘大像穹碑悉墜煨燼見者無不駭歎明肅皇后垂簾對兩府大臣而泣追念先志罷宫使王曾柄相黜判官翰林學士歸西垣授夏竦以修宫使力期興復議論喧然言事者競進説難復乃止太宗志奉釋老崇飾宫廟建開寶寺靈感塔以藏師舍利臨瘞為之悲涕興國構二閣高與塔侔以安大像逺都城數十里已在望登六七級方見佛殿腰腹佛指大皆合抱兩閣又開通飛樓為御道麗景門創上清宫以尊道教殿塔排空金碧照耀皆極一時之盛觀自景祐初至慶厯中不十年間相繼災毁略無遺焉開寶塔成田錫上疏曰衆以為金碧熒煌臣以為塗膏釁血張耆既貴顯嘗啓章聖欲私第置酒以邀禁從諸公上許之既晝集盡歡曰更願畢今夕之樂幸毋辭也於是羅圍翠幕稠疊圍繞髙燒紅燭列屋蛾眉極其殷勤豪侈不可狀每數杯則賓主各少歇如是者凡三數諸公但訝夜漏如是之永暨至撤席出户詢之則云已再晝夜矣古有長夜之飲或以為達曙非也薛許昌宫詞云畫燭燒闌暖復迷殿帷深密下銀泥開門欲作侵晨散已是明朝日向西此所謂長夜飲也宋子京好客嘗於廣厦中外設重幕內列寶炬百味具備歌舞俳優相繼觀者忘疲但覺更漏差長席罷已二宿矣名曰不曉天大宋居政府上元夜在書院內讀周易聞小宋點華燈擁歌妓醉飲翼日諭所親令誚讓云相公寄語學士聞昨夜燒燈夜宴窮極奢侈不知記得某年上元同在某州州學內喫虀煮飯時否學士笑曰却須寄語相公不知某年同某處喫虀煮飯是為甚底丞相陳秀公治第於潤州極為閎壯池館綿亘數百步宅成公已疾甚唯肩輿一登西樓而已人謂之三不得居不得修不得賣不得宋朝以親王尹開封謂之判南衙羽儀列從燦如圖畫京師人嘆曰好一條軟秀天街近日士大夫騎吏繁華者亦號半里橋石延年曼卿居蔡河下曲鄰有一豪家日聞歌鐘之聲其家僮數十人嘗往來曼卿之門曼卿呼一僮問豪為何人對曰姓李氏主人方二十嵗並無昆弟家妾曵綺紈者數十人曼卿求欲見之其僮曰郎君素未嘗接士大夫然喜飲酒屢言聞學士能飲意亦似欲相見試探之一日果使人延曼卿曼卿即著帽往坐於堂上久之方出主人著頭巾繫勒帛不具衣冠見曼卿全不知拱揖之禮引曼卿入一别館供帳赫然坐良久有二鬟妾各持一小槃至曼卿前槃中紅牙牌十餘其一槃是酒凡十餘品令曼卿擇一牌其一槃是饌亦各令擇五品既而二鬟去有妓十餘人樂器粧服亦皆整麗一妓酌酒以進酒罷諸妓執果肴萃立其前食罷則分列左右京師人謂之軟盤酒五行羣妓皆退主人亦翩然而逝略不知揖客曼卿獨步而出言豪者之狀懵然不分菽麥而奉養如此極可怪也他日試使人通鄭重則閉門不納問其近鄰云其人未嘗與人通往還雖鄰家亦不識面古人謂之錢癡信有之石曼卿獨行京師一豪士揖而語曰公幸過我家石許之同入委巷抵大第藻飾宏麗錦繡珠翠殆非人間所擬歌舞歡醉丐書為揮籌筆驛詩數篇以金帛數百千贈之復使騶從送還恍然不知其誰翼日殆無復省所居矣他日遇諸途又遺以白金數兩謂曰詩中意中流水逺愁外舊山青最為佳句徽宗登極之初皇嗣未廣有方士言京城東北隅地協堪輿但形勢稍下儻少增高之則皇嗣繁衍矣上遂命培其岡阜使稍加於舊而果有多男之應自後海內乂安朝廷無事上頗留意苑囿政和間遂即其地大興工役築山號夀山艮嶽命宦者梁師成専董其事時有朱勔者取浙中珍異花木竹石以進號曰花石綱専置應奉局於平江所費動以億萬計調民搜巖剔藪幽隱不置一花一木曾經黃封護視稍不謹則加之以罪斫山輦石雖江湖不測之淵力不可致者百計以出之至名曰神運舟楫相繼日夜不絶廣濟四指揮盡以充挽士猶不給時東南監司郡守二廣市舶率有應奉又有不待旨但進物至都計會宦者以獻者太率霛壁大湖諸石二浙竒竹異花登萊文石湖湘文竹四川佳果異木之屬皆越海渡江鑿城郭而至後上亦知其擾稍加禁戢獨許朱勔及蔡攸入貢竭府庫之積聚萃天下之技藝凡六載而成亦呼為萬嵗山竒花美木珍禽異獸莫不畢集飛樓傑觀雄偉瓌麗極於此矣越十年金人犯闕大雪盈尺詔令民任便斫伐為薪是日百姓奔往無慮十萬人臺榭宫室悉皆拆毁官不能禁也子頃讀國史及諸傳記得其始末如此每恨其他不得而詳後得徽宗御製記文及蜀僧祖秀所作華陽宫記讀之所謂夀山艮嶽者森然在目也因各托其略以備遺忘云御製艮嶽記略曰於是按圖度地庀徒僝工纍土積石設洞庭湖口絲溪仇池之深淵與泗濵林慮靈壁芙蓉之諸山最瓌竒特異瑶琨之石即姑蘇武林明越之壤荆楚江湘南粵之野移枇杷橙柚橘柑榔栝荔枝之木金蛾玉羞虎耳鳯尾素馨渠那茉莉含笑之草不以土地之殊風氣之異悉生成長養於雕闌曲檻而穿石出罅岡連阜屬東西相望前後相續左山而右水沿溪而傍隴連綿彌滿吞山懷谷其東則高峰峙立其下植梅以萬數緑蕚承跌芬芳馥郁結構山根號緣蕚華堂又旁有承嵐崑雲之亭有屋內方外圓如半月是名書館又有八仙館屋圓如規又有紫石之巖祈真之磴攬秀之軒龍吟之堂其南則夀山嵯峨兩峰並峙列嶂如屏瀑布下入堆池池水清泚漣漪鳬堆浮泳水面棲息石間不可勝計其上亭曰噰噰北直絳霄樓峯巒崛起千疊萬復不知其幾十里而方廣兼數十里其西則參术把菊黃精芎藭被山彌塢中號藥寮又禾麻菽麥黍豆粳秫築室若農家故名西莊有亭曰巢雲高出峰岫下視羣嶺若在掌上自南徂北行岡脊兩石間綿亘數里與東山相望水出石口噴薄飛注如獸靣名之曰白龍淵濯龍峽蟠秀練光跨雲亭羅漢巖又西半山間樓曰倚翠青松蔽密布於前後號萬松嶺上下設兩關出關下平地有大方沼中有兩洲東為蘆渚亭曰浮陽西為梅渚亭曰雪浪沼水西流為鳳池東出為研池中分二館東曰流碧西曰環山館有閣曰巢鳳堂曰三秀以奉九華玉真安妃聖像東池後結棟山下曰揮雲廳復由嶝道盤行縈曲捫石而上既而山絶路隔繼之以木棧倚石排空周環曲折有蜀道之難躋攀至介亭最高諸山前列巨石凡三丈許號排衙巧怪巉巖藤蘿蔓衍若龍若鳯不可殫窮麗雲半山居右極目蕭森居左北俯景龍江長波逺岸彌十餘里其上流注山澗西行潺湲為潄玉軒又行石間為煉丹亭凝觀圌山亭下視水際見高陽酒肆清澌閣北岸萬竹蒼翠蓊鬱仰不見天有勝筠菴躡雲臺消間館飛岑亭無雜花異木四面皆竹也又支流為山莊為回溪自山溪石罅搴條下平陸中立而四顧則巖峽洞穴亭閣樓觀喬木茂草或高或下或逺或近一出一入一榮一雕四靣周匝徘徊而仰顧若在重山大壑深谷幽崖之底不知京邑空曠坦蕩而平彛也又不知郛郭寰會紛萃而填委也真天造地設人謀鬼化非人力所能為者此舉其梗槩焉祖秀華陽宫記曰政和初詔作夀山艮嶽於禁城之東陬命閹人董其役舟以載石輿以輦土驅散軍萬人築岡阜高十餘仞增以太湖靈壁之石雄拔峭峙功奪天巧石皆激怒抵觸若踶若齧牙角口鼻首尾瓜距千態萬狀殫竒盡怪輔以磻木癭藤雜以黃楊青竹蔭其上又隨其斡旋盤曲之勢斬石開徑憑險則設磴道飛空則架棧閣仍於絶頂增高樹以冠之搜逺方珍材盡天下良工絶伎而經始焉山之上下致四方珍禽竒獸以億萬計鑿池為溪澗疊石為隄捍隨石之性不加斧鑿因其餘土積為岡陵山骨暴露峰稜如削飄然有雲姿鶴態曰飛來峯高於雉堞翻若長鯨腰徑百尺植梅萬本曰梅嶺接其餘岡種丹杏鴨腳曰杏岫又增土疊石間留隙穴以栽黃楊曰黃楊巘築修岡以植丁香積石其間從而設險曰丁嶂又赭石為山任其自然而植以椒蘭曰椒崖積衆山之末增土為大坡植側柏萬數枝幹柔密揉之不斷結為幢蓋鸞鶴蛟龍之狀曰龍柏坡循夀山而西移竹成林復開小徑至百數步竹有同本而異幹者不可紀極皆四方珍貢又雜以對青竹十居八九曰班竹麓又得紫石滑淨如削靣徑數仞因而為山貼山卓立山隂置木匱絶頂鑿深池車駕臨幸則開閘注水為瀑布曰紫石壁又名瀑布屏從艮嶽之麓琢石為梯石皆溫潤淨滑曰朝真磴又於洲上植芳木以海棠冠之曰海棠洲夀山之西别治園囿曰藥寮其宫室臺榭卓然著聞者曰瓊津殿絳霄樓緑蕚華堂築臺髙九仞周覽都城近若指顧造碧虛洞天萬山環之開三洞為品字門以通前後中建八角亭緣窗檻以瑪瑙石琢其地為龍礎導景龍江東出安逺門以備龍舟行幸東西擷景二園西則溯舟造景龍門以幸曲江池亭復自瀟湘江亭開閘通金波門北幸擷芳堤堤外築壘衛之瀕水蒔絳桃海棠芙蓉垂楊略無隙地又於其旁作野店麓治農圃開東西二關夾懸崖磴凡自苑中登羣峯皆由此出入道絶窄險石多峰稜過者股栗又為勝遊六七曰躍龍澗漾春陂桃花閘堆池迷真洞總名之曰華陽宫大抵衆山環列就中得平蕪數十頃為園囿而闢宫門於西大石百餘枚林立左右名曰神運昭功敷慶萬夀峯獨居道中廣百圍高六仞錫爵盤固侯束石為亭以庇之高五十丈御製記文親灑宸翰碑髙三丈附於石之東南陬其餘衆石或若羣臣入侍帷幄正容凛不可犯或戰栗若敬天威或儼然而立或奮然而起或翼然超羣或竦然危峙或傴僂而趨或奔赴而鬭上既悅之悉與賜號守吏以奎章畫列於石之陽其他軒榭庭徑各有巨石棋列星布並與賜名惟神運峯前巨石以金飾其字餘皆青黛曰朝日升龍望雲坐龍矯首玉龍萬夀老松棲霞捫參御日吐月排雲衝斗雷門月窟蹲螭坐獅堆青凝碧金鰲玉龜疊翠獨秀棲煙嚲雲風門雷穴玉秀玉寶鋭雲巢鳳跱龍雕琢渾成登封日觀蓬瀛須彌老人夀星卿雲瑞靄溜玉噴玉藴玉琢玉積玉疊玉叢秀而在於渚者曰翔鱗立於涘者曰舞仙獨踞洲中者曰玉麒麟冠於夀山者曰南屏小峯附於池上者曰伏犀怒猊儀鳯烏龍列於沃泉者曰留雲宿霧又為藏煙谷滴翠巖搏雲屏積雪嶺其間黃石仆於亭際者曰抱犢天門又有大石二枚配神運峯異其居以壓衆石作亭庇之置於環春堂者曰玉京獨秀太平巖置於緑蕚華堂者曰卿雲萬態竒峯括天下之美藏古今之勝於斯盡矣靖康元年十一月大梁陷都人相與排墻避兵於夀山艮嶽之顛時大雪新霽四望林壑如在玉山璚宇祖秀周覽纍日咨嗟驚愕信天下之僻觀而天造有所未盡也明年春復遊華陽宫而民廢之矣御製記幾二千言又命睿思殿應制李質曹組作賦以進賦各二千三百言復命二臣各作七言百韻詩極其鋪張揚扢俱載王明清揮塵録艮嶽既成以為山在國之艮位故名及金芝産於萬夀峯故改名夀嶽宣和五年朱勔於太湖取石高廣數丈載以大舟挽以千夫鑿河斷橋毁堰拆閘數月乃至會初得燕山之地賜號敷慶神運石石傍植兩檜一夭矯者名朝日升龍之檜一偃蹇者名卧雲伏龍之檜皆金牌金字書之御題云拔翠琪樹林雙檜植靈囿上稍蟠木枝下拂龍髯茂撑拏天半分連卷虹兩負為棟復為梁夾輔我皇構嗟乎檜以和議作相不能恢復中原已兆於半分兩負而一結更是高廟御名要皆天定也艮嶽之取石也其大而穿透者致逺必有損折之慮其法先以膠土實填衆竅其外用麻筋雜泥裹之令員混日曬極堅始用大木為車致於舟中直俟抵京然後浸之水中旋去泥土則省人力而無他慮又萬嵗山大洞數十其洞中皆築以雄黃及盧甘石雄黃則辟蛇虺盧甘石則隂能致雲霧滃鬱如深山窮谷後因經官拆賣有回回者知之因請賣之凡得雄黃數千斤盧甘石數萬斤艮嶽之建諸巨璫爭出新意土木既宏麗矣獨念四方所貢珍禽之在籞者不能盡馴有市人薛翁素以豢擾為優場戲請於童貫願役其間許之乃日集輿衛鳴蹕張黃蓋以遊至則以巨柈貯肉炙梁米翁倣禽鳴以致其類乃飽飫翔泳聽其去來月餘而囿者四集不假鳴而至益狎玩立鞭扇間不復畏遂自命局曰來儀所一日徽祖來幸聞清道聲望而羣翔者數萬焉翁輒先以牙牌奏道左曰萬嵗山瑞禽迎駕上顧罔測大喜命以官賚豫加厚靖康圍城之際有詔許捕馴籞者皆不去民徒手得之以充餐云艮嶽初成令有司多造油絹囊加水溼之曉張於危巒絶巘之間既而雲盡入焉遂括囊滿貯每車駕所臨輒開縱之須臾滃然充塞名曰貢雲前世壘石為山未見大顯著者至宣和艮嶽始興大役連轤輦致不遺餘力其大峰偉秀者不特侯封或賜金帶且各圖為譜然工人特出於吳興蓋其地北連洞庭多産花石而卞山所出類亦秀竒故四方之為山者皆於此中取之浙右假山最大者莫如衛清叔吳中之園一山連亘二十畝位置四十餘亭然秀拔有趣又不如俞子清侍郎家為竒絶蓋子清胸中自有丘壑又善畫故能出心匠之巧峰之大小凡百餘高者至二三丈皆不事餖飣而犀株玉樹森列傍午儼如羣玉之圃竒竒怪怪不可名狀大率如昌黎南山詩中特未知視牛竒章為何如耳乃於衆峯之間縈迥回曲澗甃以五色小石傍引清流激石高下使之有聲淙淙然下注大石潭上蔭巨竹夀藤蒼寒茂密不見天日旁植名藥竒草荔薜女蘿絲紅葉碧潭傍橫石作杠下為石渠潭水溢自此出然潭中多文龜斑魚夜月下照光景零亂如窮山絶谷間也今皆為有力者負去荒田野草淒然動陵谷之感焉政和中將作監賈讜明仲奉詔為童貫治賜第於都城既落成賈往謝之貫云久勞神觀竟未能小欵翼早幸見過點心明仲詰朝往見賓主不交一談頃之一卒持二物若寶蓋瓔珞狀張於貫及已之上視之皆真珠也各命二雙鬟捧卓子一隻至所座前又令庖人持銀鐐竈即廳之側燎火造包子以酒食行凡三每一行易一卓凡果楪酒杯之屬初以銀次以金又次以玉其製作竒絶目所未暏三杯即撤賈辭出歸舍見數人立於門云太傳致意適來大監坐間受用一分器皿及雙鬟悉令持納計其直踰數萬緡賈由此富聞湘中王黼盛時庫中黃雀鮓自地積至棟凡滿三楹蔡京對客點檢蜂兒現在數目得三十稱童貫既敗籍其家有劑成理中丸幾千斤近官籍賈師憲第果子庫糖霜凡數百甕主者以為不可留難載帳册遂輦棄湖中民家瀕湖居者一時多汲得甘水胡椒八百石領軍鞋一屋不足多也王黼宅與一寺為鄰有一僧每日於黼宅旁溝中漉取流出雪色飯洗淨晒乾數年積成一囤靖康城破黼宅骨肉絶食此僧即用所積乾飯復用水浸蒸熟送入黼宅老幼賴之無飢南渡後禁中避暑多御復古選德等殿及翠寒堂納涼長松修竹濃翠蔽日層巒竒岫靜窈縈深寒瀑飛空下注大池池中紅白菡蓞萬柄園丁以瓦盎别種分列水底時易新者庶幾美觀并置茉莉素馨建蘭麝香藤朱槿玉桂紅蕉闍婆簷蔔等南花數百盆於廣庭鼓以風輪清芬滿殿御笐兩旁各設金盆數十架積雪如山紗厨後先皆懸桂伽蘭木真蠟龍涎等香珠百餘蔗漿金碗珍果玉壺初不知人間有塵暑也洪景盧學士嘗賜對於翠寒堂當三伏中膚栗體戰不可久立上問故笑遣中貴人以北綾半臂賜之則其境界可想見矣楊和王沂中居殿巖日建第清湖洪福橋規制甚廣自居其中旁列子舍四皆極宏麗落成之日縱外人遊觀一僧善相宅云此龜形也得水則吉失水則凶時和王方被殊眷從容聞奏欲引湖水以環其居思陵首肻曰朕無不可第恐外庭有語宜密速為之退即督濠寨兵數百且多募民夫夜以繼畫入自五房院出自惠利井蜿蜒縈繞凡數百丈三晝夜即竣事未幾臺臣果有疏言擅灌湖水入私第以擬宫禁者上曉之曰朕南渡之初金人退而羣盜起遂用議者羈縻之策刻印盡封之所有者止淮浙數郡耳會諸將盡平羣盜朕因自誓除土地外凡府庫金帛俱置不問故諸將有餘力以給泉池園圃之費若論平盜之功雖盡以西湖賜之曽不為過況此役已成惟卿容之言者遂止繼而復建傑閣藏思陵御劄且揭上賜風雲慶會四大字於上蓋取大龜昻首下視西湖之象以成僧説自此百餘年間無復火災人皆神之至辛巳嵗其家以閣捨開元佑聖觀説者謂龜失首疑為不祥次年五月竟燬延燎潭潭數百楹不數刻而盡益驗毁閣之禍云宣政極盛時宫中以河陽花蠟燭無香為恨遂用龍涎沉腦屑灌燭內列兩行數百枝熖光香滃鈞天所無也建炎紹興久不進此韋太后旋鑾沙漠復值稱夀高宗極天下之養用宣政故事燃僅列十數炬太后陽若不聞上至奉巵白太后曰此燭頗愜聖意否太后曰爾爹爹每夜常設數百枝賜諸人閣內亦然上因太后起更衣微謂憲聖曰如何比得爹爹富貴樓叔韶鏞初入太學與同窗友厚善休日友謂叔韶寂寂不自聊吾欲至一處求半日適飲醇膳美又有聲色之玩但君性輕脫或以利口敗吾事能息聲則可偕往樓敬諾要約數四乃相率出城買小舟沿葦行將十里舍舟陟小坡行道微高下又二里得精舍門徑絶卑小而松竹花草楚楚然友欵於門即有小童應客主人繼出乃少年僧姿狀秀美進趨安詳殊有富貴家氣象揖客曰久别甚思欵接都不見過何也揖樓為誰友曰吾親也遂偕坐欵語十刻許僧忽回顧日影下庭西笑曰日旰二君餒乎便起推西邊小户入華屋三間窗几如拭玩具皆珍竒喚侍童進點心素膳三品甘芳精好撤器命推窗平湖當前數十百頃其外連山橫陳樓觀森列夕陽返照丹碧紫翠互相映發漁歌菱唱隱隱在耳騁望久之僧以塵尾𫾣闌干數聲俄有小畫舫傍湖而來二美人徑出登岸靚粧麗質王公家不過也僧命具酌指顧間觴豆羅陳窮極水陸左右執事童皆狡好杯行美人更起歌舞僧與友謔浪調笑歡意無間樓神思惝恍正容危坐噤不敢吐一語伺僧暫起挈友臂扣所以友愠曰子但飲食縱觀何用知如許而觴十餘巡夜已艾僧復引客至小閣中卧具皆備曰姑憩此遂去壁外即僧榻試穴隙窺則徑擁二姬就寢友醉甚大鼾樓獨倣徨不寐起如厠一童執燭密詢之此為何地童笑曰官人是親戚何須問樓再至展轉通宵時側耳聽聲但聞鼻息齁齁而已將曉僧已至客寢問安否盥櫛畢引入一院制作尤巧邃簾幕蔽滿庭下竒花盛開香氣蓊勃小山藂竹位置愜當回思夜來境界已迷不能憶逮具食則器用張陳一新獨二姬竟不復出食罷告去僧送之門鄭重而别由他徑繞湖而歸樓惘惘纍日疑所到非人間數問友但笑不答亦許尋舊遊而樓用他故亟歸鄉其後出處參商竟不克再諧趙邦永本姓李李全將也趙南仲愛其勇納之遂更姓趙入洛之師實為統軍嘗過靈壁縣道傍竒石林立一峯巍然崷崒秀潤南仲立馬盻賞久之後數年家居偶有持片石為獻者南仲因詫客以昔年符離所見邦永適在傍聞語即退才食頃數百兵舁一石來植之庭間儼然馬上所矚也南仲喜駭扣所從來則云昔年相公注目之際意謂愛之隨命部下五百人輦歸而未敢以獻適聞譽及始得供玩耳南仲為之一笑吳郡王及韓平原郡王皆豪貴以奢侈相高爭華競靡有石崇王愷之風吳府後翠堂七楹全以石青為飾故名専為諸姬教習聲伎之所一時伶官樂師皆梨園名工吹彈舞拍各有總之者號為部頭每遇節序生辰則於旬日外依月律按試名曰小排當只笙一部已是二十餘人自十月旦至二月終日給焙笙炭五十斤用錦薰籠藉笙於上復以四和香薰之蓋笙簧必用高麗銅為之靘以緑蠟簧暖則字正而清越故必須焙而後可陸天隨詩云妾思冷如簧時時望君暖樂府亦有簧暖笙清之句舉此一事餘可想見也靘音倩注靘䒌青果色也蓋藏果者必以銅青故耳吳郡王益憲聖太后弟也張鎡功甫號約齋循忠烈王諸孫能詩一時名士大夫莫不與遊園池聲伎服玩之麗甲天下嘗於南湖園作駕霄亭於四古松間以巨鐵絙懸之空半當風月清夜與客梯登之飄搖雲表王簡卿侍郎嘗赴其牡丹會云衆賓既集一堂寂無所有俄問左右云香發未答云已發命卷簾則異香自內出郁然滿座羣伎以酒肴絲竹次第而至别有名姬十輩皆衣白襟領皆繡牡丹首帶照殿紅一伎執板奏歌侑觴歌罷樂作乃退復垂簾談論自如良久香起卷簾如前别十姬易服與花而出大抵簪白花則衣紫紫花則衣鵝黃黃花則衣紅如是十杯衣與花凡十易所謳者皆前輩牡丹名詞酒竟姬侍無慮百數十人列行送客燭光香霧歌吹雜作客皆恍然如仙遊也功甫於誅韓有力賞不滿意又欲以故智去史事泄謪象臺而殂談振言蔡京當國一日感寒振與數親客問疾見之後堂東閣中京顧小鬟令焚香久之鬟白香已滿聞近北卷簾聲則見香氣自他室而出其蓬㶿滿室藹若雲霧𪷟𪷟坐客幾不相覩而無煙火之烈京謂客曰香須如此燒乃無煙氣既歸衣冠芬馥非數十兩不能如是之濃也梅花為天下神竒而詩人尤所酷好淳熙乙巳余得曹氏荒園於南湖之濱有古梅數十散漫弗治爰輟地十𤱔移種成列增取西湖北山别圃紅梅三百餘本築堂數間以臨之又夾以兩室東植千葉湘梅西植紅梅各一二十章花時止宿其中瑩潔輝映夜如珂月因名曰玉照後復開澗環之小舟往來未嘗半日捨去頃少保周益公秉鈞日余嘗造東閣坐定顧余曰一棹徑穿花十里滿城無此好風光其佳境可見矣蓋余舊詩尾句衆客相與歆艷值春凝寒又能留花過孟月始盛名人才士題詠層委可謂不負但花方爭艷競秀時非風日晴美不宜兼標韻孤特如三閭大夫首陽二子寧稿山澤終不肻垂首屏氣受世俗湔拂間有身親貌悅而此心落落莫相領會甚至汗褻附近略不自揆花雖眷客然我輩胸中幾為之呼呌稱冤不特三歎屢歎不一歎而足也因審其性情乖合思所以為將護之策凡數月乃得之今疏花宜稱憎嫉榮寵屈辱四事凡若干條揭文堂上使來者視之亦有所警省云紹熙甲寅人日約齋居士書花宜稱淡隂曉日薄寒細雨輕煙佳月夕陽微雪晚霞珍禽清溪小橋竹邉明窗疏籬蒼崖緑苔古銅瓶美人淡粧篸帶花憎嫉狂風連雨烈日苦寒老鴉談時事論差除作詩用調羮驛使事花榮寵主人好事列燭夜賞専作亭館花邉謳佳詞花屈辱俗徒攀折主人慳鄙蟠結作屏與粗婢命名賞花命猥妓酒店插瓶樹下有狗屎枝上晒衣裳青紙屏粉畫生猥巷穢溝邉余掃軌林間不知衰老節物遷變花鳥泉石領會無餘每適意時相羊小園殆覺風景與人為一間引客攜觴或幅巾曵杖嘯歌往來淡然忘歸因排比十有二月燕集次序名之曰四并集非有他故當力行之昔賢有云不為俗情所染方能説法為人蓋光明藏中孰非遊戲若心常清淨離諸取著於有差别境中而能常入無差别定則淫坊酒肆遍厯道場鼓樂音聲皆談般若倘情知物隔境逐源移如鳥黏黐動傷軀命又烏知所謂説法度人者哉聖朝中興七十餘載故家流風淪落幾盡有聞前輩典刑識湖南之清狂者必長哦曰人生不滿百常懷千載憂晝短苦夜長何不秉燭遊一旦相逢不為生客嘉泰元年嵗辛酉十有二月約齋居士書正月嵗節家宴立春日春盤人日煎餅會玉照堂賞梅天街觀燈諸館賞燈叢奎閣山茶湖山尋梅攬月橋看新栁安間堂掃雪二月現樂堂瑞香社日社節玉照堂西湘梅堂東紅梅南湖挑菜餐霞軒櫻桃花杏花莊杏花羣仙繪幅樓前打毬南湖泛舟馬塍看花三月生朝家宴寒食郊遊蒼寒堂西緋碧桃滿霜亭北棠棣碧宇觀笋芳草亭觀草鬬春堂牡丹芍藥宜雨亭千葉海棠豔香館林檎宜雨亭北黃薔薇花院賞煮酒經寮鬬茶四月初八日亦菴早齋南湖放生食糕糜芳草亭鬬草芙蓉池新荷蕊珠洞荼􅐘玉照堂青梅豔香館長春花安間堂紫笑羣仙繪幅樓前玫瑰餐霞軒櫻桃南湖雜花鷗渚亭五色鶯粟花五月清夏堂觀魚聽鶯亭摘瓜安間堂解粽煙波觀看蘆夏至日鵝臠南湖萱花水北書院採蘋鷗渚亭五色蜀葵清夏堂楊梅叢奎閣前榴花摘星軒枇杷六月現樂堂南白酒蒼寒堂後碧蓮碧宇竹林避暑芙蓉池賞荷花約齋夏菊七月叢奎閣前乞巧餐霞軒五色鳯仙花立秋日秋葉玉照堂玉簪應弦齋東葡萄霞川水葒珍林剝棗八月湖山尋桂社日糕會霞川野菊浙江觀潮羣仙繪幅樓觀月杏花莊雞冠黃葵九月重九登城把茰把菊亭採菊蘇堤看芙蓉景泉軒金橘芙蓉池三色拒霜杏花莊芻新酒十月現樂堂暖爐滿霜亭蜜橘煙波館買市杏花莊挑薺詩禪堂試香十一月摘星軒枇杷花冬至節餛飩蒼寒堂水仙羣仙繪幅樓觀雪十二月綺互亭檀香臘梅天街閲市安間堂試燈花院蘭花二十四夜錫果食玉照堂看早梅除夜守歲景定三年正月詔以魏國公賈似道有再造功命有司建第宅家廟賈固辭遂以集芳園及緡錢百萬賜之園故思陵舊物古木夀藤多南渡以前所植積翠四抱仰不見日架廊疊磴幽渺委迤極其營度之巧猶以為未也則隧地通道杭以石梁傍透湖濵架百餘楹飛樓層臺涼亭燠館花卉精妙金翠陸離前揖孤山後據葛嶺雨峰映帶一水橫陳各隨地勢以創構焉堂榭之名有曰蟠翠古松雪香古梅翠巖竒石倚繡雜花挹露海棠玉蘂瓊花茶䕷清勝高宗御扁西湖一曲竒勛理宗御書秋壑遂初容堂度宗御書初陽精舍熙然夢砌臺山之坳曰無邉風月見天地之心水之濵曰琳琅步歸身旱船通名之曰後樂園四世家廟則居第之左焉廟有記一時名士擬作數十獨取平舟楊公棟者刋之石又於第左數百步瞰湖作别墅曰光漾閣春雨觀養樂堂嘉生堂千頭木奴生意瀟然生物之府通名之曰養樂園其傍則廖羣玉之香月鄰在焉别於西鄰之外樹竹千挺架樓臨之曰秋水觀第一春梅塢剡船亭則通謂之水竹院落焉後復葺南山水樂洞賜園有聲在堂介堂愛此留照獨喜玉淵潄石宜晚上下四方之宇諸亭據勝専竒殆無餘恨矣其事志之郡乘從而為之辭曰園圃一也有藏歌貯舞流連光景者有曠志怡神逍遙塵外者有澄想遐觀運量宇宙而遊特其寄焉者竟使苑囿常興而無廢海宇常治而無亂非後天下之樂而樂者其誰能嗚呼當時為此語者亦安知俯仰之間遽有荒田野草之悲哉昔陸務觀作南園記於平原極盛之時尚能勉之以抑畏退休今賈氏當國十有六年諛之者惟恐不極其至況敢幾微及此意乎近時以詩弔之者甚衆李彭老一絶云淫房錦榭曲相通能幾番春事已空惆悵舊時吹笛處壞墻風雨剝青紅賈似道為相日令陳振談玉趙與柟等廣收竒玩珍寶余玠有玉帶殉葬發塜取之劉震孫有玉鈎桶不獻輒罷去人有珍異求不能得則以事罪之建多寶閣一日一登玩一云秋壑當軸以來收畜古銅器法書名畫金玉珍寶俱付廖羣玉辨驗其所狎妓曰潘稱心淳祐間吳妓徐蘭擅名一時吳興烏墩鎮有沈承務者其家巨富慕其名遂駕大舟往遊焉徐知其富初至則館之别室開宴命樂極其精腆至次日復以精縑製新衣奉之至於輿臺各有厚犒如此兼旬日未嘗略有需索沈不能自己以白金五百星并綵縑百匹饋之凡留連半年糜金錢數百萬而歸於是徐蘭之聲播於浙右豪俠少年無不趨赴其家雖不甚大然堂館曲折華麗亭榭園池無不具至以錦纈為地衣乾紅四緊紗為單衾銷金帳幔侍婢執音樂十餘輩金銀寶玉器玩名人書畫飲食受用之類莫不精妙遂為三吳之冠其後死葬於虎邱太學生邊雲遇作墓銘云此亦娼中之貴者其後如富沙之唐媚魏華蘇翠京口邢蕊韓香越之楊花繆翠皆以色藝稱士大夫之不自檢者往往為所汚屢見之於白簡云宋稗類鈔卷七
