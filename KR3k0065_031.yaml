body:
  text: 宋稗類鈔卷三十一常熟潘永因編工藝第五十二開寶寺塔在京師諸塔中最髙而制度甚精都料匠喻皓所造也塔初成望之不正而勢傾西北人怪而問之皓曰京師地平無山而多西北風吹之不百年當正也其用心之精蓋如此國朝以來木工一人而已有木經三卷行于世世傳皓惟一女每卧則交手於胸為結搆狀如此踰年撰成木經三卷今行於世者是也錢氏據兩浙時於杭州梵天寺建一木塔方兩三級錢帥登之患其塔動匠師云未瓦上輕故如此乃以瓦布之而動如初無可奈何密使其妻見喻皓之妻賂以金叉問塔動之因皓笑曰此易耳但逐層布板訖便實釘之則定不動矣匠師如其言塔遂定蓋釘板上下彌束六幕相聨如胠篋人履其板六幕相持自不能動人皆服其精練太平興國中蜀人張思訓製上渾儀其制與舊儀不同最為巧捷起為樓閣數層髙丈餘以木偶為七直人以直七政自能撞鐘擊鼓又為十二神各直一時至其時即自執辰牌循環而出國初兩浙獻龍船長二十餘丈上為宫室層樓設御榻以備游幸嵗久腹敗欲修治而水中不可施工熙寧中宫室黃懷信獻計於金明池北鑿大澳可容龍船其下置柱以大木梁其上乃决水入澳引船當梁上即車出澳中水船乃笐於空中完𥙷訖復以水浮船撤去梁柱以大屋䝉之遂為藏船之室永無暴露之患燕龍圖肅有巧思初為永興推官知府冦萊公好舞柘枝有一鼓甚惜之其環忽脫公悵然以問諸匠皆莫知所為燕請以環腳為鎖簧內之則不脫矣萊公大喜從之燕為人長者博學其漏刻法最精今州郡往往有之陳康肅公堯咨善射當世無雙公亦以此自矜一日嘗射於家圃有賣油翁釋擔而立睨之久而不去見其發矢十中八九但微頷之而已康肅問曰汝亦知射乎吾射不亦精乎翁曰無他但手熟爾康肅忿然曰爾安敢輕吾射翁曰以吾酌油知之乃取一葫蘆置於地以錢覆其口徐以杓酌油瀝之自錢孔入而錢不濕因曰我亦無他惟手熟爾康肅笑而遣之此與莊生所謂斫輪解牛者何以異章友直伯益以篆得名召至京師翰林篆字待詔數人聞其名心未之服俟其至乃共詣之云聞先生之藝久矣願一見筆法以為模式伯益命帖紙數張縱筆作二圖其一縱橫各作十九畫成一棊局其一作十圓圈成一射帖其行筆之粗細間架之疏密無毫髮之失諸人見之大歎驚服再拜而去慶厯中有一術士姓李多巧思嘗木刻一鍾馗髙二三尺右手持鐵簡以香餌置左手中鼠緣手取食則左手扼鼠右手運簡斃之以獻荆王王館於門下㑹大使言月當蝕於昏時李自云有術可禳王試為之是夜月果不蝕王大神之陵州鹽井深五百餘丈皆石也上下甚寬廣獨中間稍狹謂之杖鼓腰舊自井底用柏木為幹上出井口自木幹垂綆而下方能至水井側設大車絞之嵗久井幹摧敗屢欲新之而井中隂氣襲人入者輒死無緣措手惟候有雨入井則隂氣隨雨而下稍可施工雨晴復止後有人以木盤滿中貯水盤底為小竅釃水一如雨㸃設於井上謂之雨盤令水下終日不絶如此數月井幹為之一新井利復舊金陵人有發六朝陵寢得古物甚多有得一玉臂叉兩頭施轉關可以屈伸令圓僅於無縫為九龍繞之功侔鬼神世多謂前古民醇工作率鹵拙是大不然古物至巧正由民醇故也民醇則百工不茍後世風俗雖侈而工之致力不及古人故物多不精武林有為禽蟲戲者蓄龜七枚大小凡七等置龜几上擊鼓以諭之則第一等大者先至几心伏定第二等者從而登其背直至第七等小者登第六等之背乃豎身直伸其尾向上宛如小塔狀謂之烏龜叠塔又蓄蝦蟆九枚於席中置小墩其最大者乃踞坐之八小者左右對列大者作一聲衆亦作一聲作數聲亦如之既而小者一一至大者前㸃首作聲如作禮狀而退謂之蝦蟆說法又練細蟻黃黑二種各有大者為之將領插旗為號一鼓對壘再鼓交戰三鼓分兵四鼓偃旗歸穴謂之螞蟻角􅐥又以蠟嘴鳥作傀儡唱戲曲以𨗳之拜跪起立儼若人狀或使之􅋦旗而舞或寫八卦名帖指使􅋦之縱橫不差或拋彈空中飛騰逐取謂之靈禽演劇雖小技殆有神術焉九江有碑工仲寧刻字甚工黃太史題其居曰琢玉坊崇寧間詔郡國刋元祐黨籍姓名太守呼仲寧使劖之辭曰小人家舊貧窶止因開蘇學士黃內翰詞翰遂至飽暖今日以奸人為名誠不忍下手守義之曰賢哉士大夫所不及也餽以酒而從其請此載揮塵録又正史所載頒蔡京所書元祐姦黨碑刻石於州縣令監司長吏㕔皆刻石有長安石工安民當鐫字辭曰民愚人固不知立碑之意但如司馬相公者海內稱其正直今謂之姦邪民不忍刻也府官怒欲加之罪民泣曰𬒳役不敢辭乞免鐫安民二字於石末恐得罪後世聞者愧之音樂第五十三寇萊公好柘枝舞㑹客必舞柘枝每舞必盡日時謂之柘枝顛今鳯翔有一老尼猶萊公時柘枝妓云尚能歌其曲其曲遍數極多如羯鼓録渾脫解之類好事者往往傳之古之善歌者有語謂當使聲中無字字中有聲凡曲止是一聲清濁髙下如縈縷耳字則有喉唇齒舌等音不同當使字字舉本皆輕圓融入聲中令轉換處無磊塊此謂聲中無字古人謂之貫珠今謂之善過度是也如宫聲字而曲合商用商聲則能轉宫為商歌之此字中有聲也善歌者謂之內裏聲不善歌者聲無抑揚謂之念曲聲無含藴謂之呌曲舞柘枝本出拓跋氏之國流𫝊誤為柘枝也歐文忠公在滁州通判杜彬善彈琵琶公每飲酒必使彬為之往往酒行遂無算故有詩云坐中醉客誰最賢杜彬琵琶皮作絃此詩既出彬頗病之祈公改去姓名而人已𫝊卒不得諱政和間郎官有朱維者亦善音律而尤工吹笛雖教坊亦推之流傳入禁中上皇喻㫖召維試之使教坊善工在傍按其聲樂工皆稱善遂除維為典樂維嘗言琵琶以下撥重為難猶琴之用指深故本色有轢絃護索之稱文忠嘗問琵琶之妙於彬亦以此對乃取使教他樂工試為之下撥絃皆斷因笑曰如公之絃無乃皮為之耶故有皮作絃之句而好事者遂𫝊彬果以皮為絃其實非也唐人記賀懷智以鵾雞筋作絃人固疑之筋比皮似有可作弦之理然亦不應得許長且所貴者聲爾安在以絃為竒耶范文正公喜彈琴然平日止彈履霜一操時人謂之范履霜髙郵人桑景舒性知音聽百物之聲悉能占其災福尤善樂律舊𫝊有虞美人草聞人作虞美人曲則枝葉皆動他曲不然景舒試之良如所傳乃詳其曲聲曰皆吳音也他日取琴試用吳音製一曲對草鼓之枝葉亦動乃謂之虞美人操其聲調與虞美人曲全不相近始末無一聲相似者而草輒應之其律法同管也都下一小兒才三嵗無有難曲按皆中節都市觀者如堵教坊伶人皆稱其妙在母懷食乳撚手指應節蓋宿習也理宗朝張循王府有獻白玉簫管長二尺者中空而瑩薄竒寶也內府所無即時有㫖𥙷官未幾韓蘄王府有獻白玉笙一攢其薄如鵝管其聲清越真希世之珍也此二物皆在軍中日得之北方即宣和故物也飲食第五十四太宗命蘇易簡講文中子有楊素食經上因問食品稱珍何物為最易簡曰臣聞物無定味適口者珍臣止知虀汁為美太宗笑問其故曰臣憶一夕寒甚擁爐燒火乘興痛飲大醉就寢四鼓始醒以重衾所擁咽吻燥渴時中庭月明殘雪中覆一虀盎不暇呼童披衣掬雪以盥手亟引數缶連沃濁肺咀虀數莖燦若金脆臣此時自謂上界仙厨鸞脯鳯臘殆恐不及屢欲作氷壺先生傳因循未暇也太宗笑而然之前輩云一郡之政觀於酒一家之政觀於虀蓋二事若善則其他可知東坡與客論食次取紙一幅書以示客云爛蒸同州羊灌以杏酪食之以匕不以筯南都撥心麵作槐葉溫陶糝以襄邑抹猪炊共城香稻薦以蒸子鵝吳興庖人斫松江鱸鱠既飽以廬山康王谷水烹曾坑鬬品少焉解衣仰卧誦東坡赤壁前後賦亦一大快一作山谷語詩人多用方言俗謂睡美為黑甜飲酒為軟飽故東坡詩云三杯軟飽後一枕黑甜餘東坡謂晨飲為澆書李黃門謂午睡為攤飯放翁詩云澆書滿挹浮蛆瓮攤飯橫眠夢蝶牀莫笑山翁見機晚也勝朝市一生忙東坡自儋耳北歸臨行以詩别黎子雲秀才後批云新釀甚佳求一具理臨行寫此以折菜錢南荒人謂瓶罌為具理世傳涪翁喜苦筍嘗從斌老乞苦筍詩云南園苦筍味勝肉籜龍稱冤莫採録煩君更致蒼玉束明日風雨吹成竹又和坡翁春菜詩云公如端為苦筍歸明日青衫誠可脫坡得詩戲謂坐客云吾固不愛作官魯直欲以苦筍硬差致仕聞者絶倒嘗賦苦筍云苦而有味如忠諌之可活國放翁又從而奬之云我見魏徴殊嫵媚約束兒童勿多取於是世以諌笋目之及觀涪翁所自跋則其所食乃取乎甘非貴乎苦也南康簡寂觀有甜苦笋周益公詩云蔬食山間茶亦甘况逢苦筍十分甜君看齒頰留餘味端為森森正且嚴此亦取其甜耳世人慕名忘味甘心茶苦者果何說哉又涪翁在戎州日過蔡次律家小軒外植餘甘子乞名於翁因名之曰味諫軒其後王子豫以橄㰖送翁翁賦云方懷味諫軒中果忽見金盤橄㰖來想見餘甘有瓜葛苦中真味晚方回然則二物亦可名之諫果也東坡橄㰖詩待得餘甘回齒頰已輸崖蜜十分甜俗諺𫝊南人說橄㰖回味清甘北人云待他回味時我棗兒已甜半日矣坡詩蓋用此意東坡嘗約器之同參玉版器之每倦山行聞玉版欣然從之至簾泉寺燒笋而食器之覺笋味勝問此何名坡曰玉版此老僧善說法令人得禪悅之味器之方悟其戲范忠宣謫居永州以書寄人云此中羊麵無異北方每日閉門餐餺飥不知身之在逺也蘇文忠五帖其獻蠔帖極言蠔之美至令叔黨勿宣𫝊北方君子恐求謫海南以分其味又云惠州市肆寥落日殺一羊不敢與在官者爭買時囑屠買其脊骨骨間亦有微肉熟煮熱酒漉隨意用酒薄㸃鹽炙微焦食之終日摘剔牙綮間如蟹螯逸味率三五日一餔吾子由三年堂庖所飽芻豢滅齒而不得骨豈復知此味乎北人食麵曰餺飥俗語作不托京師中下之戶不重生男每育女則愛護之如擎珠捧璧稍長則隨其姿質教以藝業用備士大夫採擇娛侍名目不一有所謂身邊人本事人供過人針線人堂前人雜劇人拆洗人琴童棋童厨娘等稱就中厨娘最為下色然非極豪貴家不可用嘗聞時官中有婺人某者奮身寒素歷二倅一守然受用淡泊不改儒酸偶奉祠居里便嬖不足使令飲饌且大粗率守念昔留某官處晚膳出都下厨娘烹調極可口適有便介如京謾作承受人書託以物色費不屑較未幾承受人復書曰得之矣其人年可二十餘新回自府第有容藝曉書算旦夕遣以詣直旬餘果至初憩五里頭時遣腳夫先申狀來乃其親筆也字畫端楷歷序慶幸即日伏事左右末乞以四輪接取庶成體靣辭甚委曲殆非庸碌女子可及守一見為之啓顔及入門容止循雅紅裙緑裳參視左右乃退守益喜過望少選親朋皆議舉觴奉賀厨娘遽至請曰未可展㑹明日且是常食五杯五分因請食品菜品資次出書以示之食品第一為羊頭簽菜品第一為蔥虀餘皆易辨者厨娘操筆疏物料內羊頭簽五分各用羊頭十箇葱虀五碟合用蔥五斤他物稱是守固疑其妄然未欲遽示以儉鄙姑從之而密覘其用翊旦厨師告物料齊厨娘發行奩取鍋銚盂勺湯盤之屬令小婢先捧以行璀璨溢目皆白金所為大約計六七十兩至於刀砧雜器亦一一精整旁觀嘖嘖厨娘更圍襖圍裙銀索攀膊掉臂而入據坐交牀徐起取抹批臠慣熟條理真有運斤成風之妙其治羊頭簽也漉置几上别留臉肉餘悉置之地衆問其故曰此皆非貴人所食矣衆為拾頓他處厨娘笑曰若輩真狗子也衆雖怒無語以答其治䓤虀也取䓤微徹過沸湯悉去鬚葉視楪之大小分寸而截之又除其外數重取條心之似韭黃者以淡酒醯浸漬凡所供備芳甘脆美濟楚細膩難以盡其形容食者舉筯無餘相顧稱善既撤席厨娘整襟再拜曰此日試厨萬幸台意須照例優給守方遲難厨娘遽曰豈非待檢例耶探囊取數幅紙以獻曰是昨在某官處所得支賜判單也守視之其例每展㑹動賫絹帛或至百匹錢或至百千無虛拘者守破慳勉副私竊喟歎曰吾輩事力單薄此等酒筵不宜常設此等厨娘不宜常用不兩月尋託他故善遣以還逺近聞而笑之楓忩小牘曰舊京工伎固多竒妙即烹煮盤案亦復擅名如王樓梅花包子曺㜑㜑肉餅薛家羊飯梅家鵝鴨曹家從食徐家瓠羮鄭家油餅王家乳酪段家熝物石逢巴子肉之類皆聲稱於時暨南遷湖上魚羮宋五嫂羊肉李七兒奶房王家血肚羮宋小已之類皆當行不數者宋五嫂余家蒼頭嫂也每過湖上時進肆慰談亦他鄉寒故也悲夫宋五嫂魚羮常經御賞人爭赴之遂成富媪金陵士大夫淵藪家事鼎鐺種種臻妙虀可照靣餛飩湯可注研餅可映字亦可作勸盞飯可打擦擦臺濕麵可穿結𢃄寒具嚼著驚動十里人故都李和煼栗名聞四方他人百計效之終不可及紹興中陳福公長卿及錢上閣愷使金至燕山忽有兩人持煼栗各十褁來獻三節人亦人得一褁自贊曰李和兒也揮涕而去承平時鄜州田氏作泥孩兒態度無窮雖京師工效之莫能及一對至值十縑一牀至三十千一牀者或五或七也小者二三寸大者尺餘無絶大者陸放翁家舊藏一對卧者背有小字云鄜畤田玘製紹興初避地東陽山遂失去金橘産於江西以逺難致都人初不識明道景祐初始與竹子俱來竹子味酸人不甚喜後遂不至而金橘香清味美置之尊俎間光彩的礫如金彈丸都人初亦不知貴後因溫成皇后特好食之由是遂重京師吉州人最珍此果其欲久留者則於菉豆中藏之可經時不變云橘性熱而豆性凉故能久也唐鄧間多大柿初生堅實如石而澀凡百十柿以一榠樝置其中榅桲亦可則紅熟如泥而可食土人謂之烘柿榠樝音冥查果名似梨而酸淮南人藏鹽酒蟹以皂莢半挺置其中則可經嵗不沙周益公洪容齊嘗侍夀皇宴因談肴核上問容齊卿鄉里所産容齊鄱陽人也對曰沙地馬蹄鱉雪天牛尾狸又問益公公廬陵人也對曰金柑玉版笋銀杏水晶䓤上吟賞又問一侍從忘其名浙人也對曰螺頭新婦臂龜腳老㜑牙四者皆海鮮也上為之一笑張景公安人仁宗召見問曰卿江陵有何勝曰兩岸緑楊遮虎渡一灣芳草護龍洲又問所食何物曰新粟米炊魚子飯嫩冬瓜煮鱉裙羮有唐茶品以陽羡為上供建溪北苑未著也貞元中常衮為建州刺史始蒸焙而研之謂研膏茶其後稍為餅樣至本朝建溪獨盛採焙製作士大夫珍尚鑒别俱過於古丁晉公為福建轉運使始製為鳯團後又為龍團貢不過四十餅専以上供雖近臣之家未嘗見也天聖中又為小團其品逈加于大團賜兩府止於一團惟上大齊宿八人兩府共賜小團一餅縷之以金八人析歸以侈非常之賜親知瞻玩𢋫唱以詩熙寧末神宗詔建州製密雲龍其品又加於小團然密雲之出則二團少粗以不能兩好也長沙造茶品極精緻工直之厚輕重等白金士大夫家多有之置几案間以相誇侈初未嘗用也范蜀公與司馬溫公同游嵩山各携茶以行溫公以紙為貼蜀公用小黑木合子盛之溫公見而驚曰景仁乃有茶具耶蜀公聞其言留合與寺僧而去長沙茶器精妙甲天下每副用白金三百星或五百星凡茶之具悉備外則以大銀盒貯之趙南仲帥潭日嘗以黃金千兩為之以進尚方穆陵大喜蓋內院之工所不能為也惠山泉頃嵗亦可致於汴都但未免盆盎氣須用細沙淋過則如新汲時號拆洗惠山泉天台竹瀝水出於髙巖寺僧斷竹梢屈而取之若雜以他水則亟敗蘇才翁與蔡君謨比茶蔡茶精用惠山泉蘇劣用竹瀝水煎方能取勝蔡君謨善别茶後人莫及建安能仁院有茶生石縫間寺僧採造得茶八餅號石嵓白以四餅遺君謨以四餅密遣人走京師遺王內翰禹玉嵗餘君謨𬒳召還闕訪禹玉禹玉命子弟於茶筒中選精品碾待君謨君謨捧甌未嘗輒曰此茶極似能仁石嵓白公何從得之禹玉未信索茶帖驗之乃服王荆公為小學士時嘗訪君謨君謨聞公至喜甚自擇絶品茶親滌器烹㸃以飲公公於夾袋中取消風散一撮投茶甌中併食之君謨失色公徐曰大好茶味君謨大笑且歎公之真率蔡君謨製小團其品尤精於大團一日福唐蔡葉丞祕教召公啜小團坐久復有一客至公啜而味之曰非獨小團兼有大團雜之丞驚呼童詢之對曰本碾造二人茶繼有一客至造不及乃以大團兼之丞神服公之明審羅大經鶴林玉露曰余同年李南金云茶經以魚目湧泉連珠為煮水之節然近世瀹茶鮮以鼎鑊用瓶煮水難以候視則當以聲辨一沸二沸三沸之節又陸氏之法以未就茶鑊故以第二沸為合量而下未若以沸湯就茶甌瀹之則當用背二涉三之際為合量乃為聲辨之詩云砌蟲唧唧萬蟬催忽有千車捆載來聽得松風并澗水急呼縹色緑瓷杯其論固已精矣然瀹茶之法湯欲嫩而不欲老蓋湯嫩則茶味甘老則過苦矣若聲如松風澗水而遽瀹之豈不過於老而苦哉惟移瓶去火少待其沸止而瀹之然後湯適中而茶味甘此南金之所未講者也因𥙷以一詩云松風檜雨到來初急引銅瓶離竹罏待得聲聞俱寂後一甌春雪勝醍醐丁晉公有北碗茶録三卷世多指建州茶焙為北苑故姚寬叢語謂建州龍焙靣北遂謂之北苑此說非也宫苑非人主不可稱按建茶供御自江南李氏始别令取其乳作片或號曰京挺的乳又骨子等每嵗不過五六萬斤迄今嵗出三十餘萬斤其茶以京挺為名又稱北苑亦以供奉得名可知矣李氏都平鄴其苑在北故得稱北苑水心有清輝殿張泊為清輝殿學士别置一殿於內謂之澄心堂紙其曰北苑茶亦猶澄心堂紙耳李氏集有翰林學士張橋作北苑侍宴賦詩序曰北苑皇后之勝槩也掩映丹闕縈回緑波珍禽異獸充其中修竹茂林森其後北山蒼翠遙臨復道之隂南內深嚴近共帷宫之外陋周王之平圃小漢武之上林云云而李氏亦有御製北苑侍晏詩序其略云城之北有故苑焉遇林因藪未愧於離宫均樂同歡尚慚於靈沼以二序觀之因知李氏有北苑而建州造挺茶又始之因取此名無可疑者廬山簡寂觀觀出苦笋而味反甜歸宗寺造醎虀而味反淡山中人語曰簡寂觀前甜苦笋歸宗寺裏淡醃虀蓋紀實也宋稗類鈔卷三十一
