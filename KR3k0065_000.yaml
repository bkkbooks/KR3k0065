body:
  text: 宋稗𩔖鈔提要臣等謹案宋稗𩔖鈔三十六卷國朝潘永因編永因有讀史津逮已著録是書以宋人詩話説部分𩔖纂輯凡五十九門末附搜遺一集以補諸門之所未備亦江少虞事實𩔖苑之流惟皆不著所出是其一失葢明人編輯舊文往往如是永因尚沿其舊習也又如異數門中盧延讓紅綾餅饀事則上及唐末符命門中庚申帝事武備門中泰定間鄧弼事則下及元時謟媚門中徐學詩劾嚴嵩嘉定人有與同姓名者遂改為學謨事併䦨入明代皆失㫁限至武備門中載狄青不祖狄仁傑不去黥文之𩔖分𨽻亦多未允然宋代襍記之書最為汗漫是編掇集英華網羅繁富且分門别𩔖較易檢尋存之亦可資考核也乾隆五十年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6a6ef41f646f99a8494a3c1550e48375ba86bc3c7db1d347ce71f8f5610af31d
