body:
  text: 宋稗類鈔提要臣等謹案宋稗類鈔三十六卷國朝潘永因編永因有讀史津逮已著録是書以宋人詩話說部分類纂輯凡五十九門末附搜遺一集以補諸門之所未備亦江少虞事實類苑之流惟皆不著所出是其一失蓋明人編輯舊文往往如是永因尚沿其舊習也又如異數門中盧延讓紅綾餅饀事則上及唐末符命門中庚申帝事武備門中泰定間鄧弼事則下及元時諂媚門中徐學詩劾嚴嵩嘉定人有與同姓名者遂改為學謨事併䦨入明代皆失斷限至武備門中載狄青不祖狄仁傑不去黥文之類分𨽻亦多未允然宋代雜記之書最為汗漫是編掇集英華網羅繁富且分門别類較易檢尋存之亦可資考核也乾隆五十年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a61aea07bc0507a0326715269fc185e2c783aa106f079db239ea98bce8112415
