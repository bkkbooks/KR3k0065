body:
  text: 宋稗類鈔卷十三常熟潘永因編貞烈第二十二慶厯中賊王則閉門不軌漁城中子女無如趙氏美致帛萬端金千斤聘為婦且曰女若不行即滅爾族父母不敢違獨女不可曰吾雖女子戴天履地十九年矣縱不能執兵討叛奈何妻之泣涕不食父母族人守之以賊所遺服衣之女曰妻賊何服也家人掩其口卒逼以往女登輿自殘於輿中夫識去就知亷恥仗義死節者天下皆以是望士君子而不以望衆庶常以是望男子而不以是望婦人今趙氏一民家女表表節義如是彼士君子號為男子者寧不有愧於心耶靖康二年長樂申屠氏慕孟光之為人自名希光有詩才既適侯官秀才董昌絶口不吟食貧作苦宴如也郡中大豪方六一聞希光美心悅之乃使人誣昌隂重罪罪至族六一復陽為居間得輕比獨昌報殺妻子俱免因使侍者通殷勤強委禽焉希光知其謀謬許之密寄其孤子於昌之所善友人乃求利匕首挾以往好言謝六一因請葬夫而後成禮六一大喜使人以禮葬昌希光則偽為色喜艷裝入室六一既至即以匕首刺之帳中六一立死因復殺其侍者二人至夜中詐謂六一暴病以次呼其家人至則皆殺之盡滅其宗因斬六一頭置囊中至昌葬所祭之明日悉召村民告以故且曰吾將從夫地下遂縊而死夫六一陷人於族乃人不族而已族矣以一文弱婦人奮其白刃全家為戮義憤所激鬼神助之有志竟成豈必鬚眉丈夫哉建炎四年五月楊勍叛卒由建安寇延平道出小常村掠一婦人逼脅欲犯之婦人毅然誓死不受汙遂遇害橫尸道傍賊退人為收瘞之而其尸枕藉處痕迹隱然不滅每雨則其迹乾晴即濕宛如人影往來者莫不嗟異人或削去之隨即復見覆以他土而其迹愈明今三十年矣與順昌軍員范旺事略同但范現迹磚街而此現於土上耳范死以忠婦死以節戴石屏復古未遇時流寓江右武寧有富家翁愛其才以女妻之居二三年忽欲作歸計妻問其故告以曽娶妻白之父父怒妻宛曲解釋盡以奩具贈夫仍餞以辭云惜多才憐薄命無計可留汝揉碎花箋忍寫斷腸句道傍楊栁依依千絲萬縷抵不住一分愁緒捉月盟言不是夢中語後回君若重來不相忘處把杯酒澆奴墳土夫既别遂赴水而死可謂賢烈矣義妓毛惜惜者髙郵妓也端平間别將榮全據髙郵以叛制置使遣人招之不聽全與同黨王安等宴飲惜惜恥於供給安斥責之惜惜曰初謂太尉降為太尉更生賀矣今乃閉門不納使者乃叛逆耳妾雖賤伎不能事叛臣全怒以刀刃裂口立命臠之罵至死不絶口後閫帥以聞特封英烈夫人且賜廟祠潘紫巖有詩曰淮海艷姬毛惜惜蛾眉有此萬人英恨無匕首學秦女向使裹頭真杲卿玉骨花顔城下土冰魂雪魄史間名古今無限腰金者歌舞筵中過一生矢死靡他不意得之娼優下賤可慨夫至元十三年丙子春正月丞相伯顔統兵入杭宋謝全兩后以下皆赴北有王婉儀者題滿江紅詞於壁云太液芙蓉渾不似舊時顔色曽記得春風雨露玉樓金闕名播蘭簪妃后裏暈潮蓮臉君王側忽一朝鼙鼓揭天來繁華歇龍虎散風雲滅千古恨慿誰説對關河百二淚霑襟血驛館夜驚塵土夢宫車曉碾關山月願嫦娥相顧肻從容隨圓缺婉儀之詞傳播中原文天祥讀至末句嘆曰惜也夫人於此少商量矣為之代作一篇云試問琵琶龍沙外怎生風色最苦是姚黃一朵移根仙闕王母歡闌瓊宴罷仙人淚滿金盤側聽行宫夜半雨淋鈴聲聲歇彩雲散香塵滅銅駝恨那堪説想男兒慷慨嚼穿齦血回首昭陽離落日傷心銅雀迎新月算妾身不願似天家金甌缺又和云燕子樓中又捱過幾番秋色相思處青年如夢乘鸞仙闕肌玉暗消衣帶緩淚珠斜透花鈿側最無端蕉影上窗紗青燈歇曲池合髙臺滅人間事何堪説向南陽阡上滿襟清血世態便如翻覆雨妾身元是分明月笑樂昌一段好風流菱花缺婉儀名清蕙字沖華後為女道士五月二日抵上都朝見世皇十二日夜故宋宫人安定夫人陳氏安康夫人朱氏與二小姬沐浴整衣焚香自縊死朱夫人遺四言一篇與衣中云既不辱國幸免辱身世食宋祿羞為北臣妾輩之死守於一貞忠臣孝子期以自新丙子五月吉日泣血書明日奏聞元主命斷其首懸全后寓所是年丞相偏師徇台台之臨海民妻王氏有令姿𬒳掠至師中千夫長殺其舅姑與夫而欲私之婦誓死不可自念且𬒳汚乃陽曰能俾我為舅姑與夫服期月乃可事君子千夫長見其不難於死從所請仍使俘婦雜守之師還挈行過嵊上之清風嶺王氏仰天竊歎曰吾今得死所矣即嚙指寫詩於石上曰君王無道妾當災棄女拋兒逐馬來夫靣不知何日見此身料得幾時回兩行清淚偷頻滴一片愁眉鎖未開回首故山看漸逺存亡兩字實哀哉寫畢即投崖下而死死之日距今八九十年石上血墳起如新寫時不為風雨所剝蝕官府樹石刻碑於死所兼立廟像表於朝封貞婦先是嶽州破時襄陽賈尚書子瓊之婦韓氏乃魏公五世孫名希孟年十有八為遊卒所掠以獻於主將韓知必不免乘間赴水死越三日有得其尸於練裙中題五言長句曰宋未有天下堅正臣禮秉開國百戰功當陳推雄整及侍周幼主臣心常炯炯帝曰卿北伐朔方今有警即日辭陛下盡敵心欲逞陳橋忽兵變不得守箕潁禪讓法堯舜民物普安靜有國三百年仁義道馳騁未改祖宗法天何肆大眚江南無謝安塞北有王猛所以代馬來飛渡以陵境大江限南北今此一舴艋本期固封疆誰謂如畫餅烈火燎崑岡不辨金玉礦妾本良家子性僻守孤梗嫁與尚書兒銜署紫蘭省直以才德合不棄宿瘤癭初結合歡帶誓比日月昞鴛鴦會雙飛比目願常並豈期金石堅化作桑榆景一方遭劫掠六族死俄頃退鷁落迅風孤鸞弔空影簪堅折白玉瓶沉斷青綆一死控冥府憂心長炳炳意堅志不移改邑不改井我本瑚璉器安肻作溺皿志節匪轉石氣噎如吞鯁不作爝火然願為死灰冷貪生念麴蛾乞憐羞虎穽借此清江水葬我全首領皇天如有知定作血靣請願魂化精衛填海使成嶺韓氏死且三十年而其英爽不昧復能託夢趙魏公為書其詩則節婦之名因公之翰墨而愈不朽矣又嶽州徐君寶妻某氏亦同時𬒳掠來杭居韓蘄王府自嶽至杭相從數千里其主者數欲犯之而終以巧計脫蓋氏有令姿主者弗忍殺之也一日主者怒甚將即強焉因告曰俟妾祭謝先夫然後為君婦未晚也主者喜諾即嚴裝焚香再拜默祝南向飲泣題滿庭芳詞一闋於壁上已投大池中而死詞曰漢上繁華江南人物尚遺宣政風流緑窗朱戶十里爛銀鈎一旦刀兵齊舉旌旗擁百萬貔貅長驅入歌樓舞榭風捲落花愁清平三百載典章文物掃地俱休幸此身未北猶客南州破鑑徐郎何在空惆悵相見無由從今後斷魂千里夜夜嶽陽樓噫使宋之公卿將相貞守一節若此數婦者則豈有賣降覆國之禍哉宜乎秦賈之徒為萬世罪人也王貞婦清風嶺事昭然在金石煜然在簡册可徴也後有一人以為無是事作一詩非之其詩曰嚙指題詩似可哀班班駁駁上青苔當初若有詩中意肻逐將軍馬上來後其人絶嗣惜乎其人姓名逸之矣噫世有小人好誣善為惡指正為邪衊忠為姦目亷為貪者視此其亦可以少警哉元楊亷夫亦有題王節婦詩曰介馬馱馱百里程青風後夜血書成祇因劉阮桃花水不似巴陵漢水清後亷夫無子一夕夢一婦人謂曰爾知所以無後乎曰不知婦人曰爾憶題王節婦詩乎雖不能損節婦之名而毁謗節義其罪至重故天絶爾後亷夫既寤大悔更作詩曰天隨地老妾隨兵天地無情妾有情指血齧開霞嶠赤苔痕化作雪江清願隨湘瑟聲中死不逐胡笳拍裏生三月子規啼斷血秋風無淚寫哀鳴後復夢婦人來謝未幾果生一子至元十四年元兵破吉州永新城談氏婦趙抱嬰兒隨其舅姑同匿邑校中為悍卒所獲殺其舅姑執趙欲汚之趙罵曰吾舅姑死於汝吾與其不義而生寧從吾舅姑以死爾遂與嬰兒同遇害血漬於殿兩楹之間入磚為婦人與嬰兒狀久而宛然如新或訝之磨以沙石不滅又煆以熾炭狀益顯古云至誠可以貫金石自有神理存焉汪元量字有大錢塘人當度宗時以善琴出入宫掖元兵入城賦詩云錢塘江上雨初乾風入端門陳陳酸萬馬亂嘶臨警蹕三宫灑淚溼鈴鑾童兒賸遣追徐福厲鬼終須滅賀蘭若説和親能活國嬋娟應是嫁呼韓又曰西塞山前日落處北關門外雨連天南人墮淚北人笑臣甫低頭拜杜鵑亂點更籌殺六更風吹庭燎滅還明侍臣奏罷降元表臣妾簽名謝道清頃之隨三宫北去留滯燕京時有王清惠張瓊英皆故宫人善詩相見輒涕泣元量嘗和清惠詩云愁到濃時酒自斟挑燈看劍淚痕深黃金臺逈少知己碧玉調髙空好音萬葉秋聲孤館夢一窗寒月故鄉心庭前昨夜梧桐雨徑氣瀟瀟入短襟世皇聞其善琴召入侍鼓一再行駸駸乎有漸離之志而無便可乘也遂懇乞為黃冠世皇許之瀕行與故宫人十八人釃酒城隅鼓琴敘别不數聲哀音哽亂淚下如雨張瓊英送以詩云客有黃金白璧懷如何不肻贖奴回今朝且盡穹廬酒後夜相思無此杯元量既還錢塘往來彭蠡間風躅煙裝倐無定居人莫測其去留之迹遂傳以為仙瞿塘之下地名人鮓甕秦少遊嘗謂未有以對南遷度鬼門關乃用為絶句云身在鬼門關外天命輕人鮓甕頭船北人慟哭南人笑日落荒村聞杜鵑汪詩祖此元量自號水雲子一時士流多題咏其事江乃賢詩云一曲絲桐奏未休蕭蕭笳鼓禁宫秋湖山有意風雲變江水無情日夜流供奉自歌南渡曲拾遺能賦北征愁仙人一去無消息滄海桑田空白頭李吟山詩云青雲貴戚玉麟兒曽逐鑾車入紫闈王母窗前窺靣日太原膝上畫眉時滄溟水濶龍何在華表秋深鶴未歸三尺焦桐千古意黃金誰與鑄鍾期馬易之詩云三日錢塘海不波子嬰係組納山河兵臨魯國猶絃誦客過商墟獨嘯歌鐵馬渡江功赫奕銅人辭漢淚滂沱知章喜得黃冠賜野水間雲一釣簑水雲子題王𨗳像有曰秦淮浪白蔣山青西望神州草木零江左夷吾甘半壁只緣無淚灑新亭元朵那者杭城東偉兀氏之女奴也年十九勤敏謹願主卒某郡官所朵那奉主婦日謹主婦亦委以心腹至正壬辰秋寇陷杭劫官民府庫至偉兀氏家不得物乃反接主婦柱下拔刀礪頸上諸侍婢皆散走朵那獨以身覆主婦請代死且告曰將軍利吾財豈利殺人哉凡家之貨寶皆我所藏主母固弗知若免主母死吾當悉以與將軍不吝冦允解主婦縛朵那乃探金銀珠玉幣帛等散置堂上寇爭奪之竟又欲犯朵那身朵那持刀欲自屠曰我主二千石我誓不奴他姓主況汝賊乎寇驚異捨而去朵那泣拜主婦曰棄主貨全主命權也妾受命主鑰貨今失貨而全身非義也請從此死遂自殺時人莫不稱之曰義烈云家範第二十三吕汲公在相位其兄進伯自外郡代還相與坐東府堂上夫人自廊下降階趨謁以二婢挾持而前進伯遽曰宰相夫人不須拜微仲解其意叱二婢使去夫人獨拜於赤日中盡禮而退進伯略不顧勞聞者歎服其家法之嚴吕大防字微仲諡正愍其兄大忠字進伯弟大臨字與叔大鈞字和叔元祐中吕微仲當軸其兄大忠自陜漕入朝微仲虛正寢以待之大忠辭以相第非便微仲曰界以中霤即私家也卒從微仲之請時安厚卿亦在政府父日華尚康寧且具慶焉厚卿夫婦偃然居東序時人以此别二公之賢否陳諫議省華三子堯叟堯咨皆舉狀元堯佐亦中第後堯叟至樞相堯咨至節度使堯佐至丞相而諫議家法甚嚴堯叟娶馬尚書女日執饋馬於朝路遇諫議以女素不習乞免其責諫議答云未嘗使之執饋自是隨山妻下厨耳馬遂語塞三子已貴秦公尚無恙每賔客至其家堯佐及伯季侍立左右坐客踧踖不安求去秦公笑曰此兒子輩耳時人皆以秦公教子有法而以陳氏世家為榮韓宗魏億教子嚴肅不可犯知亳州第二子舍人自西京謁告省覲康公與右相及姪柱史宗彥皆中甲科歸公喜置酒召僚屬之親厚者俾諸子坐於隅坐中忽云二郎吾聞西京有疑獄奏讞者其詳云何舍人思之未能得已訶之再問未能對遂推案索杖大詬曰汝食朝廷厚祿倅二一府事無巨細皆當究心大辟奏案尚不能記則細務不舉可知矣吾在千里外無所干預猶能知之爾叨冒廩祿何顔報國必欲撻之衆賔力解方已諸子股栗屢日不能釋家法之嚴如此所以多賢子孫也韓忠獻四子仲文綜子華絳持國維玉汝縝其後仲文知制誥子華玉汝皆登宰席持國至門下侍郎為本朝之甲族韓魏公琦亦諡忠獻吕希哲字源明正獻公長子正獻教公事事循規矩甫十嵗祁寒暑雨侍立終日不命之坐不敢坐也日必冠帶以見長者平居雖天甚熱在父母長者之側不得去巾襪縳袴衣服惟謹行步出入無得入茶酒肆市井里巷之語鄭衛之音未嘗一經於耳不正之書非禮之色未嘗一接於目公嘗言人生內無賢父兄外無嚴師友而能有成者鮮矣張安國守撫州時年未五十其父總得老人在官一日老人於齋中索紙墨發書有二吏人來聲喏拱立總得問為誰對曰書表司適聞運使發書來祇應總得遣之去却呼安國來曰有撫州書表司是伏事汝我發書汝當伏事我安國侍立候總得修書封題遣發乃退包孝肅家訓云後世子孫仕宦有犯贓濫者不得放歸本家亡殁之後不得葬於大塋之中不從吾志非吾子孫共三十七字其下押字又云仰珙刋石竪於堂屋東壁以詔後世又十四字珙孝肅子也據史孝肅無子當是嗣子大丞相馮公當世記富家翁有宅於村者親既終堂其兄甲敦在原之義友愛其弟乙甚厚乙安樂之未嘗有違言久之乙有室不令日咻其夫使叛其兄乙牽於愛而聽之而甲之所為無不善者欲開隙而無其端於時甲有善馬愛之甚至雖親舊借輒以他馬代之乙欲激其怒伺甲之馬出杖折其足甲歸而見之且喻其意謂其僕曰去之而新是圖甲復有花藥之好列檣數十皆名品也且其手植者焉灌溉壅培不倦其勞也又將緣是以激之乘間鋤而去之甲曰吾欲去是久矣而未果也因犂其地而植之榖乙悔其非且將改之而其室未厭也甲鰥處嬖一妾處之側室未嘗一與家事其婦踵門而數之詬罵毁辱無所不至妾不能堪則訴其主甲因逐其妾婦聞之愧汗浹背且曰妾不幸不及舅姑無以為型以至于此不知伯氏之德宇如是也乃正冠帔而拜於庭以謝不敏卒為善婦以相其夫而肥其家若甲者可謂賢矣鄱陽張吉夫介方娠時其父去客東西川不還張君自為兒時已愴然有感其言語食息未嘗不在蜀也與尚書彭公器資同學作詩云應是子規啼不到致令我父未歸家聞者皆憐之既長走蜀父初無還意乃歸省母復至涪閬往返者三其父遂以熙寧十年三月至自蜀鄉人迎謁歎息或為感泣一時名士咸賦詩以記其事張循王嘗教子姪曰子弟隨父兄顯宦不患人事不熟議論不髙見聞不廣其如居移氣養移體何一旦從事要當痛鋤虛驕之氣昔之照壁後訾量人物指摘儀度見其或𬒳上官詆呵進退失措者莫不羣笑聲聞於外及今趦趄客次庭揖而升回視照壁後竊窺者乃昔日之我也每三復斯言為之慨歎非身歷者不知其言之切當也顔氏家訓曰梁朝全盛之時貴遊子弟多無學術燻衣剃面傅粉施朱駕長􅉉車躡髙齒屐從容出入望若神仙求第則雇人答策公宴則假手賦詩當爾之時亦快士也及離亂之後朝市遷革銓衡無曩日之親當路非當時之黨求之身而無所得施之用而無所用𬒳褐而喪珠失皮而露質當爾之時誠駑才也貴遊子弟宜書此於座右婺源小民詹直紹興九年因醉毆殺鄰婦姚氏法當死其子惠明不在後歸既知乃詣縣乞身代不聽成獄復訴府言無以報罔極恩幸有兩弟可以養母乞代父刑以存父嚙指出血詞甚哀太守曾天遊論以無此法哭拜屢懇方盛夏坐府門灼艾頂上哀懇曾惻然閲狀未竟惠明割左耳擲府廳灑血淋漓一府大驚曾為草奏而繫之獄俟報父見子罵曰我年老殺人償命是本分汝有妻子何得如是及報詔減父罪一等而釋惠明敕至官吏欲驗惠明情之真偽隱詔諭紿以得請擁入市代刑惠明色無悔怖歡呼曰養子防老積榖防飢代父償命情理所宜至市曹始宣恩詔人咸歎美其誠孝時年二十有二曾又狀上乞量加恩賜以勵風俗於是命所居曰嘉福里曰孝悌賜錢三萬帛二匹米二斛陸象山家於撫州金溪纍世義居一人最長者為家長一家之事聽命焉逐年選差子弟分任家事或主田疇或主租稅或主出納或主厨㸑或主賔客公堂之田僅足一嵗之食家人計口打飯自辦蔬肉不合食私房婢僕各自供給許以米附炊每旦附炊之米交至掌厨㸑者置厯交收飯熟按厯給散賔至則掌賔者先見之然後白家長出見欵以五酌但隨堂飯食夜則巵酒杯羮雖久留不厭每晨興家長率衆子弟致恭於祖禰祠堂聚揖於廳婦女道萬福於堂暮安置亦如之子弟有過家長會衆子弟責而訓之不改則撻之終不改度不可容則告於官屏之逺方晨揖擊鼓三疊子弟一人唱云聽聽聽勞我以生天理定若還懶惰必飢寒莫到飢寒方怨命虛空自有神明聽又唱曰聽聽聽衣食生身天付定酒肉貪多折人夀經營太甚違天命定定定程公鵬舉萬里在宋季𬒳掠於興元版橋張萬戶家為奴張以掠得宦女某氏妻之既婚之三日妻自內出見萬里靣有淚痕知其懷鄉即竊謂之曰觀君之才貌非久在人後者何不為去計而甘心於此乎夫疑其試已也訴於張張命撻之越三日復告曰君若去必可成大器否則終為人奴耳夫愈疑之又訴於張張命出之遂鬻於市人家妻臨行以所穿繡鞋一易程一履泣而曰期執此相見矣程感悟奔歸宋以蔭輔官逮元朝統一海宇程為陜西行省參知政事自與妻别已三十餘年義其為人未嘗再娶至是遣人擕向之鞋履往興元訪求之市家云此婦到吾家執作甚勤遇夜未嘗解衣以寢每紡績逹旦毅然莫可犯吾妻異之視如己女將半載以所成布匹償元鬻鏹物乞身為尼吾妻施資以成其志見居城南某菴中所遣人即往尋見以曝衣為由故遺鞋履在地尼見之詢其所從來曰吾主翁程參政使尋其偶耳尼出鞋履示之合亟拜曰主母也尼曰鞋履復全吾之願畢矣歸見程相公與夫人為道致意竟不再出告以參政未嘗娶終不出旋報程移文本省遣使檄興元路路官為具禮委幕屬李克復防護其車輿至陜西重為夫婦焉輟耕録所載如此一本作彭城程萬里尚書文業之子也年十九以父蔭輔國子生時元兵日逼萬里獻戰守和三䇿以直言忤時宰懼罪潛奔江陵未及漢口為元將張萬戶所獲愛其材勇携歸興元配以俘婢統制白忠之女也名玉娘忠守嘉定城破一門皆死惟一女僅存成婚之夕各述流離甚相憐重云云宋稗類鈔卷十三
