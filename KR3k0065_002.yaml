body:
  text: 宋稗類鈔卷二常熟潘永因編吏治第三李文靖為相其同年馬亮責之曰外議以兄為無口瓠公笑曰吾居政府别無所長但中外建議務更張喜激昻者一切告罷聊以此報國耳今國家防制纎悉密若凝脂茍狥所陳一一行之則所傷實多李沆字太初洛州肥鄉人諡文靖錢若水為同州推官時有富民女奴逃亡父母訟於州州録事嘗貸於富民不獲乃劾富民父子共殺女奴罪皆應死富民不勝榜楚自誣服具獄上州皆覆實無反異若水獨疑之留其獄數日録事詣若水詬之曰若受富民錢欲出其死若水笑謝曰今數人當死豈可不少留熟觀其獄辭耶留之且旬日若水詣知州屏人言曰若水所以留其獄者密使人訪求女奴今得之矣因密送於知州所知州垂簾引女奴父母從簾中推女奴示之父母持之而泣乃引富民父子破械縱之其人號泣不肻去曰微使君則某族滅矣知州言此推官之賜其人趨詣若水廳事若水閉門拒之曰知州自求得之我何與焉其人不得入繞墻而哭傾家資飯僧為若水祈福知州欲論奏其功若水固辭曰若水止求人不冤死耳論功非本心也且朝廷若以此為若水功當置録事於何地知州歎服章聖初王平字保衡為許州司理參軍里中女乘驢單行盜殺諸田間褫其衣而去驢逸田旁家收繫之吏捕得驢坐以殺人保衡疑之以狀白府州將老吏素彊了不之聽趣令具獄保衡持益堅守怒曰掾懦耶保衡曰坐懦而奏不過一免耳與其阿㫖以殺無辜又陷公於不義校其輕重孰為愈耶州將因不能奪後數日河南移逃卒至許劾之乃實殺女子者田旁家得活後因衆見州將謝曰微司理向幾誤殺平人保衡後為侍御史生三子俱著名若水字淡成河南人官至同知樞密院事寇萊公知歸州巴東縣每期㑹賦役不出符移唯具鄉里姓名揭縣門民莫敢後者嘗賦詩有野水無人渡孤舟盡日橫之句時以為若得用必濟大川手植雙柏於縣庭民以比甘棠謂之萊公柏五代以來軍卒陵將帥胥吏陵長官餘風至宋猶未除張乖崖為蜀崇陽令一吏自庫中出鬢傍巾下有一錢詰之庫錢也命杖之吏勃然曰一錢何足道而杖即能杖我寧能斬我耶乖崖援筆立判云一日一錢千日一千繩鋸木斷水滴石穿自仗劍下階斬之申臺府自劾崇陽人至今傳之其知益州時有小吏忤乖崖乖崖械其頸吏恚曰枷即易脫即難乖崖曰脫亦何難即就枷斬之吏俱悚懼吕公弼治成都政令尚寬人嫌其少威斷適有營卒犯法當杖扞不受曰寧以劔死公弼曰杖者國法劍者自請既杖而後斬之軍府肅然張詠字復之鄄城人諡忠定别號乖崖張忠定公視事退後有一小㕔子熟睡公詰之汝家有甚事對母久病兄為客未歸訪之果然公翼日差場務一名給之且曰吾㕔上有敢睡者耶此必幽悶使之然耳故憫之洪玉甫云祖宗時非特士大夫能立節義亦自上有以成之耳張乖崖再任成都日夜分時城北門有中貴人到請鑰開門既入見公謂曰朝廷還知張詠在西否況川中兩經兵寇差詠來治亂今中貴夜分入城使民驚擾不知有何急切幹當中貴曰銜命往蛾睂燒香公曰待要先斬後奏先奏後斬耶中貴悚惕曰念某乍離班行不知州府事體公曰若如此道即是却令出西北門宿來早入衙下榜子云奉勑往蛾睂山燒香入內內侍省王某參公判榜子云既銜王命不敢奉留請於小南門出去其嚴正如此歐陽公好推挽後學王向少時為三班奉職勾當滁州一鎮公守滁日有書生為學子不行束修自往詣之學子閉門不接書生訟於向向判其牒曰禮聞來學不聞往教先生既已自屈弟子寧不少高盍二物以收威豈兩辭而造獄書生不喜向判徑持牒以見歐公公一閲大稱其才遂為延譽卒成聞人歐陽公知開封日承包孝肅拯政猛之後一切循理不事風采或以包之政勵公者公答曰凡人材性不一各有長短用其所長事無不舉强其所短政必不逮吾亦任吾所長爾聞者服其言宋均常言吏能𢎞厚雖貪汚放縱猶無所害唯苛察之人身雖廉而巧黠刻剜毒加百姓識者以為確論范文正公用士多取氣節而濶略細故如孫威敏滕達道皆所素重其為帥日辟置幕客多取見居謫籍未牽復人或疑之公曰人有才能而無過朝廷自應用之若其實有可用之材不幸陷於吏議深文不因事起之則遂為廢人矣故公所舉多得士公嘗稱諸葛武侯能用度外人用人者莫不欲盡天下之才常患近已之好惡而不自知也能用度外人然後能周大事孫沔字元規官至觀文殿大學士諡威敏皇祐中吳中大饑時范文正公領浙西發粟及募民輸餉為法甚備吳人喜競渡好為佛事文正縱民競渡太守日出宴於湖上居民空巷出遊大興工役諸寺鼎興又新厫倉吏舍日役千夫監司奏劾杭州不恤荒政嬉遊不節公私興造傷耗民力文正乃自條叙所以宴遊興造皆欲發有餘之財以惠貧者服力之人仰食公私無慮數萬荒政之施莫此為大是嵗兩浙唯杭州宴然民不流徙莆陽一寺建大塔工費巨萬或告陳正仲曰當此荒歲興無益土木公盍白郡禁之正仲笑曰寺僧能自為塔乎莫非傭此邦人也斂於富家散於窶輩是小民藉此得食而贏得一塔也當此荒歲惟恐僧之不為塔耳范文正公嘗立一軍為龍猛軍皆是招收前後作過黔配的人後來甚得其用時人目范公為龍猛指揮使如滕子京孫元規之徒素無節行范公皆羅致之幕下後犯法又極力救解之如劉滬張元亦然云做事時須要此等人用趙清獻公閲道抃治民所在有聲在成都杭越尤著熙寧中以大資政知越州兩浙旱蝗米價踴貴餓死者十六七諸州皆榜衢路立告賞禁人增米價閲道獨榜衢路令有米者任增價糶之於是諸州米商輻輳詣越米價更賤民無饑死者明道末天下旱蝗知通州吳遵路乘民未饑募富室得錢幾萬貫分遣衙校航海糴米於蘇秀使物價不增又使民採薪芻官為收買以其直糴官米至冬大雪即以元價易薪芻與民官不傷財民且蒙利又建茅屋百間以處流移出俸錢置薦席鹽蔬日與飯參俵有疾者給藥以治之其願歸者具舟續食還之本土是嵗諸郡率多轉死惟通民安堵不知其凶嵗也故其民愛之若父母明年范文正公安撫淮浙上公治狀頒下諸郡有范延貴者為殿直押兵過金陵張忠定公時為守因問曰天使沿路來曽見好官員否延貴曰昨過𡊮州萍鄉縣邑宰張希顔著作雖不識之知其好官員也忠定曰何以見之延貴曰自入萍鄉縣境驛𫝊橋道皆完葺田萊墾闢野無惰農及至邑則鄽肆無賭博市易不敢喧爭夜宿邸中聞更鼓分明是以知其必善政也忠定大笑曰希顔固善矣天使亦好官員也即日同薦於朝希顔後為發運使延貴亦閣門祇候皆以能稱富鄭公為樞密副使坐石守道詩自河北宣諭使還道除知鄆州徙青州讒者不已人皆為公危懼㑹河北大饑流民轉徙東下者六七十萬人公皆招納之勸民出粟自為區畫散處境內屋廬飲食醫藥纎悉無不備從者如歸市有勸公非所以處疑弭謗禍且不測公傲然弗顧曰吾豈以一身易此六七十萬人之命哉卒行之愈力明年河北二麥大熟始皆襁負而歸則公所全活也於是雖讒公者亦莫不畏服知不可撓而疑亦因是浸釋嘗見其與一所厚書云在青州二年偶能全活得數萬人勝二十四考中書令逺矣富弼字彥國封鄭國公諡文忠南劒尤溪林積仁宗時為吉州安福令時有張宗嗣者挾妖術作符籙自稱漢師君三十三代孫率其徒自龍虎山至謂能却禍徼福百姓翕然以從積視其印文曰嘻此乃漢賊也昔張陵黃巾之裔𫝊至其孫魯以鬼道教民自號師君竊據漢川垂二十年後敗於曹操而奔陽平關此印所以稱陽平治都功之文今有道之世詎容妖賊苖裔公肆誣罔以害吾治耶於是執送於獄治其罪且聞於朝毁其印而江左妖術遂息仁宗時光祿卿吕璹少為漳州漳浦令為政得人心既去邑人為立祠方在邑時民有死於虎者公哀之於其死處設一穽立榜其旁曰害民者速陷此中明日穽有虎陷焉時又有邑媪之子戲於陳將軍廟盜其所供之果出門而撲於階下以死媼哭之甚哀聽者惻然公因以文訟於廟引盜宗廟酒食律罪當黥而將軍人臣宜處以等殺則盜食供果益不當死且蠢愚者法所赦宜不廢公直也文既焚而媼子復蘇曾魯公以侍讀守鄭州時文潞公自長安召入鄭方在宴席俄報潞公失去銀杯曾曰郡人敢爾必三日可獲若公之從者自為則今日必擒公未以為然逡巡果擒至乃從者也潞公因驚謂曰君知即獲何也曾曰所至有捕盜者從人單露必須易敗潞公以為神明遂引復翰林尹開封至大用相三朝位侍中令守太傅使相致仕曾公亮字明仲晉江人封魯國公諡宣靖范忠宣純仁尹洛謝克家自河陽來至白司馬坡歇店中秣馬見老翁負暄墻下有人告曰黃犢為人所竊矣翁坐負暄如故略不向問須㬰再以失犢告翁容色自若徐曰爾無求必鄰家戲藏爾謝以為有道者異而就問曰翁家失犢再告而不顧何也翁笑曰范公居此孰肻為盜必無此理已而犢果還忠宣當時信及百姓如此范純仁字堯夫吳人文正公仲子官右僕射諡忠宣蔣侍郎堂為江淮轉運使日屬縣例致賀冬至書皆投書即還有一縣使人獨不肻去須責回書呵逐亦不去曰寧得罪不得書不敢回邑時蘇子美在坐頗駭曰皂𨽻如此野狠其令可知蔣曰不然此必健者能使人不敢慢其令如此乃為一簡答之方去子美歸吳中月餘得蔣書曰縣令果健者遂延譽後卒為名臣或云是天章閣待制杜杞蔣堂字希魯常州宜興人官至尚書禮部侍郎國子博士李餘慶知常州性精強果於去惡凶人黠吏畏之如神末年得疾甚困有州醫博士多過惡嘗懼為餘慶所發因其困進利藥以毒之服之洞泄不已勢已危餘慶察其奸使人扶舁坐㕔事召醫博士杖殺之然後歸卧未及席而死葬於橫山人至今畏之過墓者皆下有病瘧者取墓土著牀席間輒差謝諫議泌居官不妄薦士或薦一人則焚香捧表望闕再拜而遣故所薦雖少而無不顯者知襄州日張密學逸為鄧城縣令有善政鄧城去州渡漢水才十餘里泌暇日多乘小車從數吏渡漢水入鄧城界以觀風謠或載酒邀張野酌吟嘯終日而去其髙逸樂善如此張亦其所薦也李孝夀知開封府有舉子為僕所陵忿甚具牒欲送府為同舍勸解久乃釋自取其狀戲學孝夀押字判不用勘案决臀杖二十僕翼日持詣府告其主倣尹書判私决人孝夀即令追之既至具陳所以孝夀幡然謂僕曰如此秀才所判正與我同真不用勘案命吏就讀其狀如數决之是嵗舉子㑹省試於都下數千人凡僕聞之皆畏戢無敢肆者當時莫不稱其敏宋元獻公庠罷相守洛有一舉子行囊中有失稅之物為僕夫所告公曰舉人應舉孰無所攜未可深罪若奴告主此風胡可長也但送稅院倍其稅仍治其奴罪而遣之羅㸃春伯為浙西倉攝平江府有故主訟其逐僕缺錢者究問雖得實而僕黠甚反欲汚其主乃自陳嘗與其主饋之姬通實無有也於是遂令僕自供姦狀甚詳因判云僕既缺主人之錢又且汙染其婢事之有無雖未可知然其自供罪狀已明合從奸罪定斷徒配施行所有女使候主人有詞口根究聞者無不快之王希吕仲衡知紹興郡舉進士有為二試卷異其名皆中選黠者不厭譁然訴之王呼其首問曰爾生幾何年凡幾試矣衆謂憐其潦倒皆以老於場屋對王曰曽中選否曰正為屢試皆不利也王忽作色曰爾曹屢試不一得彼一試而兩得而敢訴耶逐而出之蔡挺為江東提㸃刑獄有處州職官譖本州幕掾姦利事蔡留職官於坐呼掾面證之而初無是事職官慚懼伏罪蔡責之曰汝小人也吾雖可欺奈何譖無過之人乎叱去之自是無復譛毁而人伏其不可欺也林亭長夏愛重隂來引茶甌一散襟忽去却來蜂個個自啼還住鳥深深山家一尺瀟湘雨掃盡雲膄齒頰清驚破午窗箕潁夢轉為風外一松聲豐城孫妙仲兩絶句也妙仲名發崇寧初尉於撫之崇仁才一月凶民陳平為族人陳遇執以為盜後二十日而平之父宗應老且瞽遂死平乃以誣遇之子洵直以為執已為盜時其父為洵直以鐵挺擊傷其首發與覆驗官吳某按之絶無迹狀謂平雅與遇有釁必欲誣遇之子以死平俟其尸胖脹潰爛不可别白後所驗時二十日然後醉其弟訹之使斷一手以訴於州州大驚不復察其事情惟以斷手為决有冤於是帖宜黃簿李涇再覆涇流外人専以迎合為事遂指閲二十日胖脹潰爛之尸為有迹狀以傅㑹之既而獄具發辨之不已州稍悟然業不可盡變乃變其情得不殺而發與吳猶以輕罪罷官蓋崇仁之民前此有避刑名塞逋負而輒殘其肢體者平之奸謀既逞而效之者益衆始惟山谷無賴之民為之至其後市人舒琦吏人吳昕輩亦相繼而作凡此非因州縣沮抑或豫奪不中有激而後為祇欲取必於官司以濟其奸耳發因作截臂行以告在位者庶革其風云吾聞兩臂重於天下不可廢知之不必子華子愚民氣焚胸一忿敢趨死以死視四肢截臂如去指嗚呼巴陵之民何以有此風疾痛利害人所同其心一臂捐糞壤終身廢卧閭閻中前年截臂渠得理今年截臂吾亦爾村南截臂殺平人村北炮烋還凖擬虺民虺民用心若此非吾人有冤自可次第訴毒人何必戕其身聞者若驚喧此弊吾能言其初姑息吏不與杜其源嗟哉惡俗傷仁厚明明有冤宜勿受一奸不濟百奸消共致和平裨在宥張觷初為蔡京子弟師後守南劒設方略拒范汝為全活一城其去行在所也買冠梳雜碎之物不可勝數從者莫測其所以後過南劒老稚迎拜者相屬於道張一一撫勞之且以所買物分遺之至今廟食郡中宗汝霖澤政和初知萊州掖縣時戶部下提舉司科買牛黃以供在京惠民和劑局合藥用督責急於星火百姓競屠牛以取黃既不登所科之數則相與斂錢以賂上下胥吏丐免汝霖獨以狀申提舉司言牛遇嵗疫則病瘠而生黃今太平已久和氣充塞境內牛皆肥腯無黃可取使者不能詰一縣獲免林德崇嘗為劇縣有聲其與監司啓云鳴琴堂上將貽不治事之譏投巫水中必得擅殺人之罪劉潛夫宰建陽亦有一聨云每嗟民力至叔世而張弓欲竭吏才恐聖門之鳴鼓時以為名言信宰邑之難也陳良翰在瑞安瑞安俗號强梗吏治尚嚴陳獨撫之以寬催科不下文符民競樂輸聽訟咸得其情或問陳何術答曰良翰無術第公此心如虛堂懸鏡耳良翰字邦彥紹興五年進士安晚鄭公私居青田府鹿食民稻犬噬殺之府囑守黥犬主幕官擬曰鹿雖帶牌犬不識字殺某氏之犬償鄭府之鹿足矣守從之鄭清之號安晚浙右有富人捨竹園於鄰寺其子後貧落取其笋僧執為盜聞於官守判云當初捨園指望福田既無福田還他竹園武備第四曹冀王彬前後帥師征討凡降四國王江南西川廣南湖南也未嘗殺一無辜功名顯著為諸將之冠諸子賢令瑋琮璨繼領旄鉞陶弼觀王畫像有詩曰搜兵四解降王縳教子三登上將壇梅澗詩話曰太祖命諸將征江南曹彬與諸將約城破之日不妄殺一人載在史冊可考也按曹景建金陵樂官山詩序云南唐初下諸將置酒高㑹樂人大慟殺之聚瘞此山因得名詩云城破轅門宴賞頻伶倫執樂淚沾巾駢頭就戮緣家國愧死南朝結綬人由此觀之當時果不妄殺耶建隆中曹彬潘美伐江南城既破李煜白衫紗帽見二公先見潘設拜潘答之次見曹設拜曹使人迎語之曰介胄在身拜不及答識者善之二公先登舟召煜飲茶船前設獨木腳道煜嚮之國主威儀甚盛一旦獨登舟徘徊不能進曹命左右掖而登焉既一啜茶曹命煜歸辦裝詰旦㑹於此同赴京師未曉如期而赴焉潘始甚惑之曰詎可放歸曹曰適來獨木版尚不能前畏死甚也既許其生赴中國矣焉能取死衆皆服其識量時亦有勸藝祖盡誅降王者以為入則變生藝祖笑曰守千里之國戰十萬之師而為我擒孤身逺客其能為變乎可謂君臣同智矣南俗尚鬼狄武襄青征儂智高時大兵始出桂林之南道旁有一大廟其神甚靈武襄駐節禱之且曰勝負無以為據乃取百錢自持之與神約果大捷則投此期盡錢面也左右諫止倘不如意恐阻師武襄不聽萬衆方聳視已揮手倏一擲則百錢盡紅矣於是舉軍歡呼聲震林野武襄亦大喜顧左右取百釘來即隨錢疏密布地而釘帖之加諸青紗籠覆手自封焉曰俟凱旋當謝神取錢其後破崑崙關敗智髙平雍管及師還如其言取錢與幕府士大夫共視之乃兩字錢也寶元元年党項圍延安七日鄰於危者數矣范侍郎雍為帥憂形於色有老軍校出自言曰某邊人遭圍城者數次其勢有近於今日者敵不善攻卒不能拔今日萬萬無虞某可以保任若有不測某甘斬首范嘉其言壯人心亦為之小安事平此校大蒙賞拔言知兵善料敵者首稱之或謂之曰汝敢肆妄言萬一言不驗須伏法校笑曰君未思也若城果陷何暇殺我聊欲安衆心耳狄青之征儂智高也自過桂林即以辨色時先鋒行先鋒既行青乃出帳受衙罷命諸將坐飲酒一巵小餐然後中軍行率以為常及頓軍崑崙關下翼日將度關辰起諸將俟立既久而青尚未出殆至日高親吏疑之遽入帳周視則不知青所在諸將方相顧驚怛俄有軍候至曰宣徽𫝊語諸官請過關喫食方知青已微服同先鋒出關矣儂智高守崑崙關青至賔州值上元節令大張燈燭首夜宴將佐次夜宴從軍三夜饗軍校首夜樂飲徹曉次夜二鼓青忽稱疾暫起如內久之使人喻孫元規令暫主席行酒少服藥乃出數使勸勞坐客至曉未得退忽有持報者云是夜三鼓青已奪崑崙寶元中党項犯寨時新募萬勝軍未經戰陳遇冦多北狄青為將一日盡取萬勝旗付虎翼軍使之出戰冦望其旗易之全軍徑趨為虎翼所破殆無遺類又青在涇原嘗以寡當衆度必以竒勝預戒軍中盡捨弓弩皆執短器令軍中聞鉦一聲則止再聲則嚴陳而陽却鉦聲止則大呼而突之士卒皆如其教才遇敵未接戰遽聲鉦士卒皆止再聲皆却敵兵大笑相謂曰孰謂狄天使勇鉦聲止忽前突之敵兵大亂相蹂踐死者不可勝計也又嘗與賊戰大勝追奔數里賊忽壅遏山路士卒知其前必遇險皆欲進擊青遽鳴鉦止之賊得引去驗其處果臨深澗將佐皆悔不擊青獨曰不然奔亡之冦忽止而拒我安知非謀軍已大勝殘冦不足利得之無所加萬一失利隳前功矣後平嶺冦儂智高亦不乘危深入青之用兵主勝而已臨利而能戒其過人處也狄漢臣起行伍纍戰功致位樞府既貴或請去其面文笑不答時特以酒濯面使其文顯仁廟亦喻滅之對曰臣非不能姑欲留以為天下黥卒之勸上由此彌重之狄武襄為樞密使有狄梁公之後持公畫像及告身十餘道詣青獻之以為青之逺祖青謝曰一時遭際安敢自附梁公厚酬而還之比之郭崇韜哭汾陽之墓青所得多矣王德用為定州路總管日訓練士卒久之士殊可用㑹契丹有諜者來覘或請捕殺之德用曰吾正欲其以實還告百戰百勝不如不戰勝也明日故大閲士皆踴躍思奮乃陽下令具糗糧聽吾旗鼓所向覘者歸告謂漢兵且大入遂來議和曹南院瑋知鎮戎軍日年十九嘗出戰小捷賊便引去瑋偵賊去已逺乃緩驅所掠牛羊輜重而還頗失部伍賊聞瑋逐利行遲師又不整返襲之瑋愈緩行得地利處止以待賊衆將至使人謂之曰軍逺來必甚疲我不欲乘人之怠請休憩士馬少遲决戰賊方苦疲甚皆欣然嚴軍歇良久各鼓軍而進大破之徐謂其下曰吾知賊已疲故為貪利以誘之比其復來已行百里矣若乘鋭便戰猶有勝負逺行之人若小憩則足痺不能立人氣亦䦨吾以此取之瑋在軍能得人死力平居甚暇及用師出入若神一日張樂飲僚吏中坐失瑋所在明日徐出視事而賊首己擲庭下矣賈同造瑋欲按邊邀與俱同問從兵安在曰已具既出就騎見甲士三千環列初不聞聲曹瑋帥秦州當趙德明叛邊庭駭動瑋方與客對奕吏報有叛卒投德明者瑋奕如常至於再三徐顧吏曰此吾所遣後勿復言德明聞殺投者卒遂不復叛太尉曹南院瑋知渭州日夏人撓邊有智將靺鞨與渭對壘下十餘寨宿兵十餘萬夏人嵗遣數百騎精鋭覘視兩界曹患靺鞨智勇計欲間之令探騎伺彼巡邊兵來適靺鞨病踰月不能起曹乃於界首設一大祭賵􅉠器物照曜原野用祝版云大宋具位曹某昭告於夏國都護某人公纍以䗶書約提所部歸我大宋待公之來不期天喪吉人事無終始令百騎守寨下望其兵近即舉火自燒故遺祝文并所用銀器千餘兩悉皆棄而遁歸夏兵盡掠祝版祭器而去後旬日夏人殺靺鞨其下二十餘帳反側不安率衆內附拓地數百里獲生口數萬牛馬槖駝不可勝計元昊有腹心將號野利王天都王者各統精兵最為毒害种世衡謀欲去之野利嘗令浪裏賞乞媚娘三人詣世衡乞降世衡知其詐曰與其殺之不若因以為間留使監稅出入騎從甚寵有紫山寺僧法嵩世衡察其堅朴可用延致門下誘令冠𢃄因出師以獲賊功白於帥府表授三班階職充指揮使又為力辦其家事凡居室騎從之具無不備嵩酗酒狎博無所不為世衡待之愈厚嵩既感恩一日世衡忽怒謂嵩曰我待汝如子而隂與賊連何相負也械繫數十日極其楚毒嵩終不怨曰嵩丈夫也公聽奸人言欲見殺有死耳居半年世衡察其不負為解縳沐浴延入卧內厚撫謝之曰汝無過聊相試耳欲使為間其苦有甚於此者汝能為我卒不言否嵩泣允之世衡乃草遺野利書膏蠟致衲衣間密縫之仍囑之曰此非濵死不得泄若泄時當言負恩不能成將軍之事也又以畫龜一幅棗一蔀遺野利野利見棗龜度必有書索之嵩目左右又對無有野利乃封信上元昊元昊召嵩并野利至數百里外詰問遺書嵩堅執無書至箠楚極苦終不說又數日私召至其宫乃令人問之曰不速言死矣嵩終不說乃命曳出斬之嵩乃大號而言曰空死不了將軍事矣吾負將軍吾負將軍其人急追問之嵩於是褫衲衣取書進入移刻命嵩就館而隂遣愛將假為野利使使世衡世衡疑是元昊使未即相見只令官屬日即館含勞問問及興州左右則詳至野利所部多不悉適擒生蕃數人世衡令於隙中密覘之生蕃因言使者姓名果元昊使乃引見使者厚遣之世衡度使返嵩即還而野利報死矣世衡既殺野利又欲并去天都因設祭境上書祭文於版述二將相結有意本朝悼其垂成而敗其祭文雜紙幣中有賊至急爇之以歸版字不可遽滅賊得之以獻元昊天都亦得罪元昊既失腹心將悔恨無及乃定和議嵩復姓為王嵩後官至諸司使至今邊人謂之王和尚沈存中補筆談亦載此事云世衡厚遣嵩以軍機密事數條與之曰可以此藉手臨行解所服絮袍贈之曰邊地苦寒以此為别至彼須萬計求見遇乞即野利王非此人無以得其心腹嵩如所教間關求通遇邏者覺而疑之執於有司數日或發袍領中得世衡與遇乞書詞甚欵密嵩初不知領中書元昊苦之備至終不言情元昊因疑遇乞殺之遷嵩於北境亡歸事稍異據筆談則領中書并嵩不知嵩膽才壯似更竒東軒筆録載所與書云只候信回得報當如期舉兵入界惟盡以一箱人馬為內應儻獲元昊當以靖難軍節使西平王奉償云云宋守約為殿帥自入夏日輪軍校十數輩捕蟬不使得聞聲有鳴於前者皆重笞之人頗不堪神宗一日以問守約曰然上以為過守約曰臣豈不知此非理但軍中以號令為先臣幸遭承平總兵殿陛無所信其號令故寓之捕蟬耳蟬鳴固難禁而臣能使必去若陛下誤令守一障庶幾或可使人帝以為然守約開封人神宗以禁旅驕惰為簡練之法屯營可併者并之守約率先推行約束嚴峻或言其持軍太急帝密戒之對曰臣為陛下明紀律不忍使恩出於臣而怨歸於上帝喜雄州北門外民居極稠而甕城甚窄刺史李允則欲展之而嫌於南北通好恐疑生事門外有東嶽祠允則出白金為大香爐及他供器導以鼓吹居人爭獻金帛故不設備為盜所竊乃大出募賞所在張榜捕賊甚急久之不獲遂聲言盜自北至移文北界興版築以護神祠不踰旬而就遼人不以為怪既浚濠起月堤嵗修褉事召界河戰棹為競渡縱北人遊觀而不知其隂習水戰也州北舊多陷馬坑城下起樓為斥堠望十里自罷兵後人莫敢登允則曰南北既講和安用此為命徹樓塞坑為諸軍蔬圃浚井疏洫列畦隴築短垣縱橫其中植以荆棘而其地益阻隘因治坊巷徙浮屠北原上州民旦夕登望三十里下令安撫司所治境有隙地悉種榆久之榆滿塞下顧謂僚佐曰此步兵之地不利騎戰豈獨資屋材耶元豐間劉舜卿知雄州蕃諜夜竊其關鎖去吏密以聞舜卿亦不問但使易其門􅀈大之後數日蕃諜送盜者并以鎖至舜卿曰吾未嘗亡鎖命加於門則大數寸蕃大慚沮盜者亦得罪王子醇帥熙河日西戎欲入冦先使人覘虛實邏者得之其衣緣中獲一書盡記人馬芻糧之數官屬皆欲支解以狥子醇判杖背二十刺面番賊决訖放歸六字縱之是時適有戌兵步騎甚衆芻糧亦富敵人得諜書知有備其謀遂寢建炎中興張韓劉嶽為將人自為法當時有張家軍韓家軍之語四帥之中韓嶽兵尤精常時於軍中角其勇健者另為之籍每旗頭押隊闕於所籍中又角其勇力出衆者為之將副有闕則於諸隊旗頭押隊內取之别置親隨軍謂之背峞悉於四等人內角其優者補之一入背峞諸軍統制而下與之抗禮犒賞異常勇健無比凡有堅敵遣背峞軍無有不破者燕北人呼酒瓶為峞大將之酒瓶必令親信人負之行道中見人有負罍者則指曰此背峞也故諸帥用以名軍峞即罍北人語訛故云嶽武穆征羣盜過廬陵託宿㕓市質明為主人汛掃門宇洗滌盆盎而去郡守供帳餞别於郊師行將絶謁未得通問大將軍何在殿者對曰已雜偏裨去矣韓忠武在鎮江一日抵晚令帳前提轄王權至金山仍戒不得用船渡懇給浮環偕一卒至西津遂泅以渡登岸寺僧叵測疑為鬼神詰得其詳以手加額因指適所厯處皆黿鼉穴曰官既不死他日必貴權後果建節蘄王每召軍佐飲巨觥無算不設果肴王權一日竊懷一蘿蔔蘄王見之大怒曰小子如此口饞俾趨前以手按額痛不可忍隨成痕腫既乃復與之飲紹興末陸務觀謁陳魯公康伯留飯未食而楊郡王存中來白事魯公留陸便坐見之時存中方不為朝論所與陸年少意亦輕之趨幕後聽其言㑹語及邊事存中曰士大夫多謂當列兵守淮北因圖進取中原萬一不能支即守大江未晚此說非也士唯氣全乃能堅守若俟其敗北則士氣已喪非特不可守淮兼亦不能守江矣今據大江之險以老彼師自有可勝之理若我師克捷士氣已倍彼奔潰不暇然後徐進而北圖復中原其間曲折尚多兵豈易言哉陸不覺太息曰老將要是所長因退以語朝士多不解也陳康伯字長卿弋陽人封魯國公諡文正配享孝宗廟廷曲端字平甫鎮戎軍人知書善屬文作字竒掉長於兵略屢戰有聲張浚宣撫川陜以為都統制知渭州與吳玠皆有重名陜西人為之語曰有文有武是曲大有謀有勇是吳大婁室寇邠州日端屢戰皆捷至白店原撒離喝乘高望師懼而號泣金人目之為啼哭郎君其為敵所畏如此既而浚欲大舉未測其意先使張彬往覘之端曰兵法先較彼已今敵可勝止婁宿孤軍然將士輕鋭不減前日我不過止合五路兵耳然將士無以大異於前兼敵之入冦因糧於我我常為客彼常為主今當反之按兵據險時出偏師以擾其耕彼不得耕必將取糧於河東是我為主彼為客不一二年間必自困斃可一舉而滅也萬一輕舉後憂方大彬以其言復命浚不恱端既與浚異趣時王庶為宣撫司參謀與端有隙吳玠亦憾端屢交譖之浚入其說於是徙端恭州置獄命其讐武臣康隨為提刑鞠治端既赴逮知必死仰天長吁指其所乘戰馬鐵象云天不欲復中原乎惜哉泣數行下左右皆泣初至獄即進械坐之鐵籠熾火逼之渴甚求飲與之酒九竅流血而死年四十一時建炎四年八月也陜西軍士皆流涕悵恨多叛去者浚尋得罪詔追復端職制曰頃失意於權臣卒下獄而譴死恩莫追於三宥人將贖以百身其後金歸河南之月又詔諡壯愍制曰屬委任之非人致刑誅之橫被興言及此流涕何追端為涇原都統日有叔為遍將戰敗誅之既乃發喪祭之以文曰嗚呼斬副將者涇原都統制也祭叔者姪曲端也尚饗一軍畏服其紀律極嚴魏公嘗按視端軍端執檛以軍禮見傍無一人公異之謂欲㸃視端以所部五軍籍進公命㸃其一則於庭開籠縱一鴿以往而所㸃之軍隨至張為愕然既而欲盡觀於是悉縱五鴿則五軍頃刻而集戈甲煥燦旗幟精明魏公雖面獎而心實忌之浚自興州移司閬州端嘗作詩曰不向關中圖事業却來江上泛扁舟其重得罪以此端在蜀日又詩云破碎江山不足論何時重到渭南村一聲長嘯東風裏多少未歸人斷魂亦可見其志也而國史本𫝊乃曰曲端之死時論或以為冤然觀其狠愎自用輕視其上縱使得志終亦難御況動違節制未有功之可言乎此雖史臣委曲為魏公庇然失其實矣信如所言則秦檜之殺嶽飛亦不為過或又比之孔明斬馬謖直筆之難也惜哉淳熙間髙廟配享洪景盧舉此為魏公罪迄不得侑食信菴先生開閫維揚時偶入教場取芟草二卒所帶便袋題姓名懸梁間越兩月忽俾緝捕呼至亟命釋縳飲以大白時回易庫納息錢二百袋一袋萬瓶楮也俾各負一袋環行三匝曰能益乎曰能曰汝等健兒當力戰取富貴用義袋中錢小篋僅藏三十二楮豈不辱國呼盧百萬大丈夫事也且各負兩袋去用用盡再來取高沙凱還人困馬疲恱道傍假山令諸軍隨意負歸衆怒多棄於半途其餘至者稱石輕重售以銀而棄石於野其鼓舞駕馭有賞徙木傲黔布罵趙將之風趙葵字南仲衡山人方次子封冀國公諡忠靖稱信菴先生元人鄧弼身長七尺目有紫稜開合閃閃如電能以力雄人鄰牛方鬭不可縻拳其脊折仆地市門石鼓十人舁弗能舉兩手持之以行泰定末德王執法西御史臺造書數千言袖謁之閽不為通鄧曰若不知關中有鄧伯翊耶連擊踣數人聲聞於王命入厯問其能顧左右曰姑試之問所須曰鐵鎧良馬各一雌雄劒二王即命給與隂戒善槊者五十人馳馬出東門外然後遣弼往王自臨觀弼至衆槊並進弼虎吼而奔人辟易五十步面目無色已而烟塵漲天但見雙劍飛舞雲霧中連斬馬首墮地血涔涔滴王撫髀歡曰壯士壯士命酌酒勞弼由是名振一時王薦之於朝㑹丞相與王有吝格不行弼環視四體嘆曰天生一具銅筋鐵骨不使立功萬里外乃稿死牖下命也遂入王屋山為道士宋稗類鈔卷二
