body:
  text: 宋稗𩔖鈔卷三十四常熟潘永因編丹青第五十七唐張彦逺著厯代名畵記十卷自軒轅時至㑹昌元年能畫者三百七十餘人其叙畫之源流曰夫畫者成教化助人倫窮神變測幽㣲與六籍同功古先聖王受命膺籙則有龜字效靈龍圖呈寳自巢燧已來皆有此瑞庖犧氏𤼵於滎河中典籍圖畫萌矣軒轅氏得於温洛中史皇蒼頡狀焉是時也書畫同體而未分象制肇創而猶畧無以𫝊其意故有書無以見其形故有畫按字學之部其六曰鳥書在幡信上書端象鳥頭者則畫之流也顔光禄云圖載之意有三一曰圖理卦象是也二曰圖識字學是也三曰圖形繪畫是也又周官教國子以六書其三曰象形則畫之意也是故知書畫異名而同體也洎乎有虞作繪繪畫明矣既就彰施仍深比象於是禮樂大闡教化由興故能揖讓而天下治廣雅云畫𩔖也爾雅云畫形也説文曰畫畛也象曰畛畔所以畫也釋名云畫挂也以采色挂物象也故鍾鼎刻則識魑魅而知神姦旂章明則昭軌度而備國制清廟肅而尊彝陳廣輪度而疆理辨以忠以孝盡在於雲臺有烈有勛皆登於麟閣見善足以戒惡見惡足以思賢故陸士衡云宣物莫大於言存形莫善於畫此之謂也其論畫六法曰昔謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨𩔖傅采五曰經營位置六曰𫝊模移寫自古畫人罕能兼之彦逺試論之曰古之畫或能遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得形似而氣韻不生以氣韻求其畫則形似在其間矣上古之畫迹簡意澹而雅正顧陸之流是也中古之畫細宻精緻而臻麗展鄭之流是也近代之畫煥爛而求備今人之畫錯亂而無㫖衆工之迹是也夫𧰼物必在乎形似形似須全其骨氣骨氣形似皆本乎立意而歸乎用筆顧愷之曰畫人最難次山水次狗馬其臺閣一定器耳差易為也斯言得之至於鬼神人物有生動之可狀須神韻而後全故韓子曰狗馬難鬼神易狗馬乃凡俗所見鬼神乃譎怪之狀斯言得之至於經營位置則畫之總要然今之畫人麤善寫貎得其形似則無其氣韻具其采色則失其筆法豈曰畫也其論畫體工用榻寫曰夫畫物特忌形貎采章歴歴具足甚謹甚細而外露巧宻所以不患不了而患於了既知其了亦何必了此非不了也若不識其了是真不了也夫失於自然而後神火於神而後妙失於妙而後精精之為病也而成謹細自然者為上品之上神者為上品之中妙者為上品之下精者為中品之上謹而細者為中品之中余今立此五等以包六法以貫衆妙其間詮量可有數百等孰能周知非夫神邁識髙情超心慧者豈可議乎知畫宋郭若虚著圖畫見聞志六卷自唐㑹昌元年至神宗熙寧七年能畫者二百七十四人其論製作楷模曰大率圖畫風力氣韻固在當人其如種種之要不可不察畫人物必分貴賤氣貎朝代衣冠釋門有善巧方便之顔道像具修真度世之範帝王崇上聖天日之表外譯得慕華欽順之情儒賢見忠信禮義之風武士多勇悍英烈之貌隠逸識肥遯髙世之節貴戚尚紛華侈靡之容天帝明威福嚴重之儀鬼神作魗䰩尺者反馳趡於鬼反之狀士女宜秀色婑鳥果反媠奴坐反之態田家有醇甿朴野之真畫衣紋林石用筆全𩔖于書衣紋有重大而條暢者有縝細而勁健者勾綽縱掣理無妄下以狀髙側深斜卷摺飄舉之勢林木有樛枝梃榦屈節皴皮紐裂多端分敷萬狀作怒龍驚􅚣之勢聳凌霄翳日之姿山石多作礬頭亦為稜面落筆便見堅重之性皴澹即生窊凸之形破墨之功尤難畫畜獸全要停分向背筋力精神肉質肥圓毛骨隐起畫龍窮遊泳蜿蜒之妙得回蟠升降之宜畫水湯湯若動使觀者有浩然之氣畫屋木折算無虧筆畫勻壯深逺透空畫花竹有四時景候隂陽向背筍篠老嫩苞蕚先後自然艷麗閒野逮諸園蔬野草咸有出土體性畫禽鳥識形體各件之異悟翔舉飛集之態其論氣韻非師曰謝赫六法精論萬古不移然而骨法用筆以下五法可學如其氣韻必在生知固不可以巧宻得復不可以嵗月到黙契神㑹不知然而然其論用筆得失曰凡畫氣韻本乎遊心神采生於用筆意在筆先筆周意内畫盡意在像應神全夫内自足然後神閒意定神閒意定則思不竭而筆不困也畫有三病皆繫用筆一曰版二曰刻三曰結版者腕弱筆癡全虧取與物狀平𥚹不能圓混也刻者運筆中疑心手相戻勾畫之際妄生圭角也結者欲行未行當散不散似物凝滯不能流暢也其論古今優劣曰佛道人物士女牛馬近不及古山水林石花竹禽魚古不及近何以明之且顧愷之陸探微張僧繇呉道元及閻立徳立本皆純重雅正性出天然吳生之作為萬世法號曰畫聖張萱周昉韓幹戴嵩氣韻骨法皆出意表後之學者終莫能到故曰近不及古如李成闗仝范寛董源之迹徐熙黄筌居宷之蹤前不藉師資後無復繼踵者借使二李三王之軰復起邊鸞陳庶之倫再生亦将何以措手於其間哉故曰古不及近鄧椿著畫繼十卷自熙寧七年至孝宗乾道三年能畫者一百一十九人其論逺曰畫之為用大矣盈天地間者萬物悉皆含毫運思曲盡其態而所以能曲盡者止一法耳一者何也曰𫝊神而已矣世徒知人之有神而不知物之有神此若虚深鄙衆工謂雖曰畫而非畫者葢止能𫝊其形不能𫝊其神也故畫法以氣韻生動為第一而若虚獨歸于軒冕巖穴有以哉又曰自昔鍳賞家分品有三曰神曰妙曰能獨唐朱景真譔唐賢畫録三品之外更增逸品其後王休復作益州名畫記乃以逸為先而神妙能次之景真雖云逸格不拘常法用表賢愚然逸之髙豈得附於三品之末未若復休首推之為當也又有畫繼補遺一卷不知誰所譔則自乾道以後至理度間能畫者八十餘人爾後陳徳輝著續畫記一卷再自高宗建炎初至㓜主徳祐乙亥能畫者一百五十一人然與畫繼補遺則相出入者耳二書僅可考閲姓名無足觀也趙希鵠洞天清録集云古畫多直幅至有畫身長八尺者雙幅亦然横披始於米氏父子非古制也河北絹經緯一等故無背面江南絹則經麤而緯細有背面唐人畫或用搗熟絹為之然止是生搗令絲匾不碍筆非如今煑錬加漿也古絹自然破者必有鯽魚口與雪絲偽作者則否古畫色墨或澹黑則積塵所成自有一種古香可愛若偽作者多作黄色而鮮明不塵暗此可辨也米芾畫史云古畫若得之不脱不須背裱若不佳換裱一次背一次壊屢更矣深可惜葢人物精神髪采花之穠艶蜂蝶只在約略濃澹之間一經背多或失之也古畫至唐初皆生絹至吳生周昉韓幹後來皆以熟湯湯半熟槌如銀版故作人物精采入筆今人收唐畫必以絹辨見紋麤便云不是唐非也張僧繇閻令畫皆生絹南唐畫皆麤絹徐熙絹或如布絹素百破必好畫裂文各有辨長幅横卷裂紋横横幅直卷裂紋直各隨軸勢裂也直斷不當一縷嵗乆卷自兩頭蘇開斷不相合不作毛搯亦蘇不可偽作其偽者快刀直過當縷兩頭依舊生作毛起搯又堅紉也溼染者色棲縷間乾熏者烟臭上深下淺古紙素有一般古香真絹色澹雖百破而色明白精神采色如新惟佛像多經香烟熏損本色染絹作温香色棲塵文間最易辨仍葢色上作一重古破不直裂須連兩三經不可偽作國朝東楚湯垕字君載號采真子著畫鍳一卷論厯代名畫悉有依據其雜論曰古人作畫皆有深意運使落筆莫不各有所主况名下無虛士相𫝊既乆必有過人處今人看畫出自己見不經師授不閲記録但合其意者為佳不合其意者為不佳及問其如何是佳則茫然失對僕自十七八嵗時便有迂濶之意見圖畫愛玩不去手見鍳賞之士便加體問徧借記録髣髴成誦詳味其言歴觀名迹參攷古説始有少悟若不留心不過為聼聲隨影終不精鍳也燈下不可看畫醉餘酒邊不可看畫俗客尤不可示之卷舒不得其法最為害物至於庸人孺子見畫必看妄加雌黄品藻本不識物亂訂真偽令人短氣古人畫藁謂之粉本前軰多寳畜之葢其草草不經意處有天然之妙宣和紹興所藏粉本多有神妙古人作畫有得意者多再作之如李成寒林范寛雪山王詵烟江叠障不可枚舉㸔畫如㸔美人其風神骨相在體肌之外者今人㸔古迹必先求形似次及𫝊染次及事實殊非賞鑒之法也元章謂好事家與賞鍳家自是兩等家多資力貪好名勝遇物收置不過聼聲此謂好事若鍳賞則天資高明多閲𫝊録或自能畫或深畫意每得一圖終日寳玩如對古人不能奪也觀六朝畫先觀絹素次觀筆法次觀氣韻大概十中可信者一二有御府題印者尤不可信古畫東移西掇撏補成章此弊自髙宗朝莊宗古始也余友人吳興夏文彦字士良號蘭渚生其家世藏名蹟鮮有比者朝夕玩索心領神㑹加以遊于畫藝悟入厥趣是故鍳賞品藻萬不失一因取各畫記圖畫見聞志畫繼續畫記為本参以宣和畫譜南渡七朝畫史齊梁魏陳唐宋以來諸家畫録及𫝊記雜説百氏之書搜潛剔秘網羅無遺自軒轅時至宋幼主徳祐乙亥得能畫者一千二百八十餘人又女真三十人本朝自至元丙子至今九十餘年間二百餘人共一千五百餘人其考覈誠至矣其用心良勤矣所論畫之三品葢擴前人所未𤼵論曰氣韻生動出於天成人莫窺其巧者謂之神品筆墨超絶𫝊染得宜意趣有餘者謂之妙品得其形似而不失規矩者謂之能品古人畫墨色俱入網縷精神逈出偽者雖極力髣髴而粉墨皆浮於縑素之上神氣亦索然葢古人筆法圓熟用意精到初若率易愈玩愈佳今人雖極工緻一覽而意盡矣唐及五代絹素麤厚宋絹輕細望而可别也御題畫真偽相雜往往有當時名筆臨摹之作故秘府所藏臨摹本皆題為真迹惟明昌所題最多具眼自能識也吁可謂真知畫者哉夫畫家各有𫝊派不相混淆如人物其白描有二種趙松雪出於李龍眠李龍眠出於顧愷之此所謂鐡線描也馬逺則出於吳道子此所謂蘭葉描也其法固自不同畵山水亦有數家闗仝荆浩其一家也董源僧巨然其一家也李成范寛其一家也至李唐又一家也此數家筆力神韻兼備後之作畵者能宗此數家便是正脈若南宋馬逺夏圭亦是髙手馬人物最勝其樹石竹筆甚遒勁夏圭若用焦墨是畵家時出者然只是院體山水之為物禀造化之秀隂陽晦暝晴雨寒暑朝昏晝夜隨行改步有無窮之趣自非胸中丘壑汪洋如萬頃波者未易學也如六朝至唐初畵者雖多筆法位置鮮得古意自王維張璪畢寵鄭䖍之軰出深造其理五代荆闗又别出新意一洗前習迨於宋朝董源李成范寛三家鼎立前無古人後無來者山水之法始備三家之下各有入室弟子二三人終不逮也唐明皇令韓幹觀御府所藏畫馬幹曰不必觀也陛下廐馬萬匹皆臣之師李伯時工畵馬曹輔為太僕卿太僕廨舍國馬皆在焉伯時每過之必終日縱觀至不暇與客語大概畵馬者必先有全馬在胸中若能積精儲神賞其神駿乆乆則胸中有全馬矣信意落筆自超妙所謂用意不分乃凝於神也山谷詩云李候畵骨亦畵肉筆下馬生如破竹生字下得最妙東坡文與可竹記云竹之始生一寸之萌耳而節葉具焉自蜩腹蛇跗以至于劍㧞十尋者生而有之也今畫者節節而為之葉葉而累之豈復有竹乎故畵竹者必先得成竹於胸中執筆熟視乃見其所欲畵者急起從之振筆直遂以追其所見如兔起鶻落少縱則逝矣東坡善於畵故其論精確如此曽巢雲無疑工畵草蟲年邁愈精嘗自言其少時取草蟲籠而觀之窮晝夜不厭又恐其神之不完也復就草地之間觀之於是始得其天方其落筆之際不知我之為草蟲耶草蟲之為我耶此與造化生物之機緘葢無以異非有法之可𫝊也江南中主時有北苑使董源善畵尤工秋嵐逺景多寫江南真山不為竒峭之筆其後建業僧巨然祖述源法皆臻妙理大抵源及巨然畵筆皆宜逺觀其用筆甚草草近視之幾不𩔖物象逺觀則景物粲然幽情逺思如觀異境如源畵落照圖近視無功逺觀村落杳然深逺悉是晚景逺峰之頂宛有返照之色此妙處也郭熙河陽温縣人以畫得名其子思後登科熙喜甚乃於縣庠宣聖殿内圖山水窠石四壁雄偉清潤妙絶一時自云平生所得極意於此筆矣熙能為逺景意趣益新畧不相雜貴人家收熙一景山水二十四幅挂髙堂上森然若在林壑間未易得也思後為待制乃重資以收父畵欲晦其迹也廬州東林寺有畵須菩提像梵相竒古筆法簡易真竒畵也題曰戊辰樵人王翰作追憶其時開寳四年也南唐自周顯徳五年用中原正朔國中士大夫以為耻故江南諸寺觀中碑多不題年號但書甲子而已當時江南布衣徐熙偽蜀翰林待詔黄筌皆以善畵著名尤長於花竹蜀平黄筌并弟居寳惟亮皆𨽻翰林圖畫院擅名一時其後江南平徐熙至京師送圖畵院品其畵格諸黄畵花妙在著色用筆極細殆不見墨迹但以輕色染成謂之冩生徐熙以墨筆畵之殊草草畧施丹粉而已神氣逈出别有生動之意筌惡其軋已言熙麄惡不入格罷之熙之子乃效諸黄之格更不用墨筆直以粉色圖之謂之没骨圖工與諸黄不相下筌等不復能瑕疵遂得齒院品然其氣韻皆不及熙逺甚世𫝊修老子廟廟有吳道子畵壁老杜所謂冕旒俱秀𤼵旌斾盡飛揚者也官以其壁募人買有隐士以三百千得之於是閉門不出者三年廼以車載壁沉之洛河廟亦落成矣壁當再畵郡以請隐士隐士弗辭有老畵工夤縁以至者衆議誰當畵東壁隐士以讓畵工畵工不敢當讓者再三隠士遂就東壁畵天帝初落筆作前驅二人工就視之不語而去工亦畵前驅二人隠士往觀亦不語而去於是各解衣盤礴慘澹經營不復相顧及成工來觀其初有不相許之色漸觀其次迤邐咨嗟擊節及見輦中人工愧駭下拜曰先生之才不可當也某自是焚作具不敢復言畵矣或問之工曰前驅賤也骨相當嗔目怒髯可比騶馭近侍清貴也骨相當清竒龎秀可比臺閣至於輦中人則帝王也骨相當龍姿日表也可比至尊今先生前驅乃作清竒龎秀某竊謂賤𨽻若此則何以作近侍近侍雖可强力少加則又何以作輦中之人也若貴賤之狀一等則不足以為畵矣今觀先生所畵前驅乃吾近侍也所畫近侍乃吾輦中人也洎觀輦中之人其神宇骨相葢吾生平未嘗見者此所以使吾慚愧駭服隐士曰此畵天上人也爾所作怒目虬髯則人間人耳人間人則面目氣象皆塵俗雖爾藝與他工不同要之但能作人間畵耳工往自毁其壁以家貲償之請隠士畢其事武宗元真廟朝比部員外郎也畵手妙一時中岳告成召宗元圖羽儀於壁以名手十餘人從行既至武獨占東壁遣羣工居西幕以幃帳羣工規模未定武乃畵一長脚幞頭執撾者在前諸人愕然且怪笑之問曰比部以上命至乃畵此一人何耶武曰非爾所知既而武畵先畢其間羅列森布大小臣僚下至厮役貴賤形止各當其分幾欲飛動諸人始大服名畵李成以山水供奉禁中然以子姓饒貲為宫市珠玉大商不易為人落筆惟性嗜香藥名酒人亦不知獨相國寺東宋藥家最與相善每往醉必累日不特紙素揮灑盈滿箱篋即舖門兩壁亦為淋漓潑染識者謂畵壁最入神妙惜在白堊上耳神宗禁中忽得吳道子畵鍾馗像因使鏤板賜二府吳冲卿時為相欲贈以常例王禹玉曰上前未有特賜此出異恩當稍増之乃贈五千其後遂為故事明年除日復賜例授五千冲卿因戲同列曰一馗足矣衆皆大笑宣和間一二大臣恩幸既殊將命之人有飲食果實而得五十千者日或至一再賜也藏書畵者多取空名偶𫝊為鍾王顧陸之筆見者爭售此所謂耳鑒又以觀畵而以手模之相𫝊以為色不印指者為佳畵此又在耳鑒之下謂之揣骨聼聲歐陽公嘗得一古畵牡丹叢其下有一猫永叔未知其精妙丞相正肅吳公與歐公家相近一見曰此正午牡丹也何以明之其花披哆而色燥此日中時花也猫眼黒晴如線此正午猫眼也有帶露花則房斂而色澤猫眼早暮則晴圓正午則如一線耳此亦善求古人之意也范忠宣舊藏一江都王馬李伯時見之稱嘆失措借歸累日用意模寫竟不能下手復還之但以粉牌榜其上云神妙上上品江都王馬云某㸔之累日不能下手聊留數字以見歸向之意時米元章為郎每到相府求觀不興言唯遶屋狂呌而已宣和間李伯時畵幾與吳生等有持其一二紙取美官者踵相繼而伯時無恙時但諸名士鑒賞得好詩數十篇爾趙廣合淝人本李伯時家小史伯時作畫每使侍左右乆之遂善畵尤工作馬幾能亂真建炎中䧟賊賊聞其善畵使圖所掠婦人廣毅然辭以實不能畵脇以白刅不從遂斷右手拇指遣去而廣畵實用左手亂定惟畵觀音大士而已又數年乃死今士大夫所藏伯時觀音多廣筆也元祐間黄秦諸君子在館暇日觀畵山谷出李龍眠所作賢已圖博奕摴蒱之儔咸列焉博者六七人方据一局投迸盆中五皆六而一猶旋轉不已一人俯盆疾呼旁觀皆變色起立纎濃態度曲盡其妙相與歎賞以為卓絶適東坡從外来睨之曰李龍眠天下士顧效閩人語耶衆賢怪請其故東坡曰四海語音六皆合口惟閩音則張口今盆中皆六一猶未定法當呼六而疾呼者乃張口何也龍眠聞之亦笑而服蓬省羣玉堂屏有坡翁所作石竹相𫝊淳熙間南安縣某人取之長樂僧寺壁間去其故土而背施髹漆匣以持獻曾海野曽後復獻韓平原韓誅籍録送官唐韓晉公滉鑒古好書聞建業古壁餘蕭子雲一蕭字遷置南徐海榴堂右壁朝夕對玩後李約載以入洛特建精室藏之因題為蕭齋米元章酷嗜書畵尤工臨寫嘗從人借古畵自臨榻榻竟并以真􅎓本歸之俾其自擇而莫辨也巧偷豪奪故所得為多元章知漣水日客鬻戴嵩牛圖元章借留數日以摹本易之而不能辨後客持圖來乞還真本元章怪而詰之曰爾何以别之客曰牛目中有牧童此則無也又在真州謁蔡攸於舟中攸出右軍王畧帖示之元章驚歎求以他畵易之攸意以為難元章曰公若不見從某不復生即投此江死矣因大呼據舩舷欲墮攸遽與之蜀中杜處士好書畵所寳以百數有戴嵩牛一軸尤所愛錦囊玉軸常以自隨一日曝書畵有牧童見之撫掌大笑曰此畵闘牛也牛鬭力在角尾搐入兩股間今乃掉尾而鬬謬矣處士笑而然之古語云耕當問奴織當問婢不可改也黄筌畵飛鳥頸足皆展或曰飛鳥縮頸則展足縮足則展頸無兩展者驗之信然乃知驗物不審雖畵師且不能況其大者乎翟院深北海人工畵山人年少時為本郡伶人一日郡守宴集方在庭執樂忽逰目若有所寓頓失鼓節樂工舉其過而劾之守詰其故院深具以情對曰性本善畵操撾之次忽見浮雲在空宛若竒峰絶壁真可以為畫範目不兩視因失鼔節守歎而釋之戴琬京師人在翰林恩寵特異工畵翎毛花竹嘗得入閣供奉後因求畵者甚衆徽宗聞之封其臂不令私畵故其畵𫝊世者鮮唐吳道元入供奉為内教博士非有詔不得畵王晉卿家舊寳徐處士碧檻蜀葵圖但二幅晉卿每歎闕其半徽廟一旦訪得之乃從晉卿借半圖晉卿惟命但謂端邸愛而欲得其秘爾徽宗令匠者裱成全圖招晉卿以觀因卷以贈一時盛𫝊人已悚異厥後禁中謂之就日圖者是也太上天縱雅尚已著龍潛之時矣及踐祚後酷意訪求自崇寧始命宋喬年掌御前書畵喬年後罷法而繼以米芾軰至末年上方所藏率舉千計實熙朝盛事也曩於宣和嵗癸卯嘗得見其目若唐人用硬黄臨二王帖至三千八百餘幅顔魯公墨迹至八百餘幅歐虞褚薛及唐名臣李太白白樂天等書不可勝㑹獨兩晉人則有數矣至二王破羌洛神諸帖真竒絶葢亦為多焉又御府所秘古來丹青其最髙逺者以曹不興元女授黄帝兵符圖為第一曹髦卞荘子刺虎圖第二謝雉烈女完節圖第三自餘始數顧陸僧繇而下不興者吳孫權時人曹髦乃髙貴鄉公也謝雉亦晉人烈女謂緑珠實當時所筆又如顧長康古賢圖戴逵破琴圖黄龍負舟圖皆神絶不可一二紀次則鄭法士展子䖍有北齊後主幸晉陽圖文書法從圖之屬大率竒特甚至唐人圖牒已不足數然度人經乃禇河南所書而閻博陵繪其相𩔖多有此于今無復兹睹矣每令人氣短劉夫人建炎中掌内翰文字善畵人物師古人筆法及冩宸翰酷似髙宗甚愛之畵上用奉華堂印印有大小又有一印云閉闗頌酒之裔葢用劉伯倫事又有端文圖書劉貴妃臨安人入官為紅霞帔遷才人累遷媫妤婉容紹興二十四年進賢妃頗恃寵驕侈嘗因盛夏以水晶飾脚踏帝見之命取為枕妃懼撤去之金主亮大舉南侵謂其倖臣秘書監張仲軻曰向者梁珫嘗為朕言宋有劉貴妃者姿質美艷今一舉而兩得之所謂因行掉臂也王直方詩話云歐陽公盤車圖詩云古畵畵意不畵形梅詩詠物無隐情忘形得意知者寡不若見詩如見畵東坡作韓幹畵馬詩曰韓生畵馬真是馬蘇子作詩如見畵世無伯樂亦無韓此詩作畵誰當㸔又云論畵求形似見與兒童鄰賦詩必此詩定非知詩人又云少陵翰墨無形畵韓幹丹青不語詩此畵此詩今已矣人間駑驥謾爭馳余以為若論詩畵於此盡矣然晁以道和公詩云畵寫物外形要物形不改詩𫝊畵外意貴有畵中態又足補坡公之未備也度攴員外郎宋廸工畵尤善為平逺山水其得意者有平沙雁落逺浦帆歸山市晴嵐江天暮雪洞庭秋月瀟湘夜雨烟寺晚鐘漁村落照謂之八景好事者多𫝊之往嵗小窰村陳用之善畵廸見其畵山水謂之曰汝畵信工但少天趣用之深服其言曰常患其不及古人者正在於此廸曰此不難耳汝先當求一敗墻張絹素訖倚之敗墻之上朝夕觀之觀之既乆隔素見敗墻之上髙平曲折皆成山水之象心存目想髙者為山下者為水坎者為谷缺者為澗顯者為近晦者為逺神領意造怳然見其有人禽草木飛動往來之象了然在目則隨意命筆黙以神㑹自然境皆天就不𩔖人為是謂活筆用之自此畵格得進劉斯立學易堂記云圖畵對面稍熟似覺厭之則别展挂行步徙倚玩之忽漫驚目更有新意家所藏甚儉由此常若有餘東坡䟦畵苑云君厚畵苑處不充篋笥岀不汗牛馬明窗凈几有坐卧之安髙堂素壁無舒卷之勞而人物禽魚之變態山川草木之竒姿粲然陳前亦好事者之一適也宋稗𩔖鈔卷三十四
