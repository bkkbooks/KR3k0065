body:
  text: 宋稗類鈔卷一常熟潘永因編君範第一藝祖受命之三年密鐫一碑立於太廟寢殿之夾室謂之誓碑用銷金黃幔蔽之門鑰封閉甚嚴因敕有司自後時享及新天子即位謁廟禮畢奏請恭讀誓詞獨一小黃門不識字者一人從餘皆逺立庭中不敢仰視上至碑前再拜跪瞻默誦訖復再拜而出羣臣及近侍皆不知所誓何事自後列聖相承皆踵故事嵗時伏謁恭讀如儀不敢泄漏靖康之變悉取禮樂祭祀諸法物而去門皆洞開人得縱觀碑止髙七八尺濶四尺餘誓詞三行一云柴氏子孫有罪不得加刑縱犯謀逆止於獄中賜盡不得市曹刑戮亦不得連坐支屬一云不得殺士大夫及上書言事人一云子孫有渝此誓者天必殛之後建炎中曹勛自金回太上寄語祖宗誓碑在太廟恐今天子不及知云藝祖御筆用南人為相殺諫官非吾子孫刻石東京內中雖人才之出無定處其後王荆公變法吕惠卿為謀主章惇蔡卞繼之卒致大亂聖言誠如日矣一云太祖親寫南人不得坐吾此堂刻石政事堂上自王文穆大拜後吏輩故壞壁因移石他處後寖不知所在既而王安石章惇相繼用事為人竊去云太祖得天下破上黨取李筠征維揚誅李重進皆一舉蕩滅知兵力可用僣僞可平矣嘗語太宗曰中國自五代以來兵連禍結帑廪虛竭必先取西川次及荆廣江南則國用富饒矣今之勍敵正在契丹自開運以後益輕中國河東正扼兩蕃若遽取河東便與兩蕃接境莫若且存繼元為我屏翰俟我完實取之未晚故太祖末年始征河東太宗即位即舉平晉也廟算如此正如髙棋布子著著爭先錢俶初入朝既而賜歸國羣臣多請留俶而使之獻地太祖曰吾方征江南俾俶歸治兵以攻其後則吾之兵力可減半江南若下俶敢不歸乎既而皆如所處三徐名著江左皆以博洽聞而騎省鉉又其嶽嶽者也㑹修述職之貢騎省實來及境例差官押伴朝臣皆以辭令不及為憚宰相亦難其選請於藝祖曰姑退朝朕自擇之有頃左璫𫝊宣殿前司具殿侍中不識字者十人以名入宸筆㸃其中一人曰此人可在廷皆驚中書不敢請趨使行殿侍者茫不知所由弗獲已竟往渡江始燕騎省詞鋒如雲傍觀駭愕其人不能答徒唯唯騎省叵測聒而與之言居數日既無相酬者騎省亦倦且默矣其亦不戰而屈人兵之上䇿歟三徐衛尉卿延休騎省鉉內史鍇承平時國家與遼歡盟文禁甚寬輅客者往來率以談謔詩文相娛樂元祐間東坡實膺是選遼使素聞其名思以竒困之其國有一對曰三光日月星凡以數言者必犯其上一字於是遍國中無能屬者有以請於坡坡唯唯謂其介曰我能而君不能亦非所以全大國之體四詩風雅頌天生對也盍先以此復之介如言方共歎愕坡徐曰某亦有一對曰四德元亨利使雎盱欲起辨坡曰而謂我忘其一耶謹閟而言兩朝兄弟邦卿為外臣此固仁宗之廟諱使臣出意外大駭服既又有所談輒為坡逆敓使自愧弗如及白溝往返齚舌不敢復言矣太祖初命曹武惠彬討江南潘美副之將行賜宴於講武殿酒三行彬等起跪於榻前乞面授處分上懷中出一實封文字付彬曰處分在其間自潘美以下有罪但開此竟斬之不必奏禀二臣股栗而退迄江南平無一犯律者比還復賜宴講武殿酒再行二臣起跪於榻前奏臣等幸無敗事昨面授文字不敢藏諸家即納於上前上徐自發封示之乃白紙一張也上神武機權如此初特以是申軍令耳使果犯而發封見為空紙則必入覆請亦不至於専僇矣太祖天性不好殺其取江南也戒曹秦王潘鄭王曰江南本無罪但朕欲大一統容他不得卿等勿妄殺人曹潘兵臨城久不下乃奏曰兵久無功不殺無以立威太祖覽之赫怒批還其奏曰朕寧不得江南不可妄殺詔至城已破計城破日乃批狀時天人相感如此唐李淳風作推背圖五季之亂王侯崛起人有幸心故其學益熾開口張弓之讖吳越至以遍名其子而不知兆昭武基命之烈也宋興受命之符尤為著明藝祖即位始詔禁䜟書懼其惑民志以繁刑辟然圖𫝊已數百年民間多有藏本不可復收拾有司患之一日趙韓王以開封具獄奏因言犯者至衆不可勝誅上曰不必多禁正當混之耳乃命取舊本自已驗之外皆紊其次而雜書之凡為百本使與存者並行於是𫝊者懵其先後莫知其孰訛間有存者不復驗亦棄弗藏矣開寶戊辰藝祖初修汴京大其城址曲而宛如蚓詘焉耆老相𫝊謂趙中令鳩工奏圖初取方直四面皆有門坊市經緯其間井井繩列上覽而怒自取筆塗之命以幅紙作大圈紆曲縱斜旁注曰依此修築時人咸罔測多病其不宜於觀美熙寧乙卯神宗在位思欲改作鑒苑中牧豚及內作坊之事卒不敢更第增陴而已及政和間蔡京擅國亟奏廣其規以便宫室苑囿之奉命䆠侍董其役凡周旋數十里一撤而方之如矩墉堞樓櫓雖甚藻飾而蕩然無曩時之堅朴矣一時張皇侈其功賞靖康金人南犯粘罕斡離不揚鞭城下有得色曰是易攻下令植炮四隅隨方而擊之城既引直一炮所望一壁皆不可立竟以此失守沉幾逺睹至是始驗開寶初車駕親征僞漢引汾水灌太原城時盛夏藝祖露臂跣足亦不褁頭手持刀坐黃蓋下督兵吏運土築堤以堰汾河城上望見矢石雨坌不避也水浸城者僅餘數版且乘舟載炬焚其譙門幾陷㑹班師焉其後遼有使於僞漢者見水退而城始大圯乃笑曰南朝但知壅水灌城之利更不知灌而决之則無太原矣王審琦微時與太祖相善後以佐命功尤為親近性不能飲太祖每燕近臣常盡歡而審琦但持空杯太祖意不愜一日酒酣舉杯祝曰審琦布衣之舊方共享富貴酒者天之美祿惜不令飲之祝畢顧審琦曰天必賜汝酒量可試飲審琦受詔不得已輒連引滿盡釂無苦自是每侍燕輒飲可與衆輩退還私第則如故太宗始嗣位思有以帖服中外者一日輦下市肆有丐者不得乞因倚門大罵主人遜謝久不得解衆方擁門聚觀中忽一人躍出以刀刺丐者死遺其刀而去㑹日已暮追捕莫獲翊日奏聞太宗大怒謂猶仍五季亂習乃敢中都白晝殺人即嚴索捕期必得有司懼罪久之跡其事乃主人不勝其憤而殺之耳獄具太宗喜曰卿能用心若是雖然第為朕更一覆母枉焉且攜其刀來不數日尹再登對以獄詞并刀上太宗問審乎曰審矣於是顧旁小內侍取吾鞘來小內侍惟命即奉刀內鞘中因拂袖而起入曰如此寧不妄殺人太平興國中諸降王薨其羣臣或宣怨言太宗盡收置之館閣使修羣書如冊府元龜文苑英華太平御覽廣記之類卷帙既浩博并豐其廪膳贍給以役其心後多老死於文字之間云學士院玉堂太宗曽親幸其所至今惟學士上日許正坐他日皆不敢獨坐故事堂中設視草臺每草制則具衣冠據臺而坐今不復如此但存空臺而已玉堂東承㫖閣子窗槅上有火燃處太宗嘗夜幸玉堂蘇易簡為學士已寢遽起無燭不可覓衫帶宫嬪乃自窗槅中引燭入照之至今不欲易以為玉堂一盛事真宗在儲宫太宗朂令學草書乃再拜曰臣聞王者事業功侔日月一照使𨼆微盡曉草書之跡誠為祕妙然達者蓋寡儻臨事或誤則罪有所歸焉豈一照之心哉謹願罷之太宗大喜顧謂之曰他日英主也真宗好文雖以文辭取士然必視其器識每御崇政殿賜進士及第必召其髙第三四人並列於庭更察其形神磊落者始賜第一人及第或取其所試文辭有理趣者徐奭鑄鼎象物賦云足惟下正詎聞公餗之傾欹鉉乃上居實取王臣之威重遂置第一蔡齊置器賦云安天下於覆盂其功可大亦冠多士咸平五年南省試進士有教無類賦王沂公為第一賦盛行於世其警句有云神龍異禀猶嗜欲之可求纎草何知尚薰猶而相假時有輕薄子擬作四句云相國寺前熊翻筋斗望春門外驢舞柘枝議者以為言雖鄙俚亦著題也真宗祀汾而還駕過伊闕親灑宸翰為銘勒石文不加㸃羣臣皆呼萬嵗其文曰夫結而為山融而為谷設險阻於地理資守拒於國都足以表坤載之無疆示神州之大壯者也矧復洪源南導髙岸中分夏禹濬川初闢關塞周成相宅肇建王城風雨所交形勢斯在靈葩珍木接畛而揚芬盤石檻泉奔流而激響寶塔千尺蒼崖萬尋祕等覺之真身刻大雄之尊像豈獨勝游之是屬故亦景貺之潛符躬薦兩圭祝汾隂而祈民福言旋六轡臨雒宅而觀土風既周覽於名區乃刋文於真銘曰髙闕巍峩羣山迤邐乃固王域是通伊水形勝居多英靈萃止螺髻遍摩鴈塔髙峙奠玉河濱回輿山趾鳴蹕再臨貞䂥斯紀仁宗聖性仁恕尤惡湥文獄官有失入人罪者終身不復進用至於仁民愛物孜孜惟恐不及一日晨興語近臣曰昨夜因不寐而甚饑思食燒羊侍臣曰何不降㫖取索仁宗曰比聞禁中每有取索外面遂以為例誠恐自此逐夜宰殺以備非時供應則嵗月之久害物多矣豈可不忍一夕之餒而啓無窮之殺也時左右皆呼萬嵗至有感泣者又嘗春日步苑中屢回顧皆莫測聖意及還宫中顧嬪御曰渴甚可速進熱水嬪御進水且曰大家何不外面取水而致久渴耶仁宗曰吾屢顧不見鐐子茍問之即有抵罪者故忍渴而歸聖性仁恕如此慶厯中郎官呂覺者勘公事回因登對自陳衣緋已久乞改章服上曰待别差遣與卿換朕不欲因鞫獄與人恩澤慮刻薄之徒望風希進加入人罪耳王素為諌官論王德用所進女口仁宗初詰之曰此宫禁事卿何從知素曰臣職在風聞有之則陛下當改無之則為妄𫝊何必詰其從來也仁宗笑曰朕真宗子卿王旦子與他人不同自有世契德用所進女口實有之在朕左右亦甚親近且留之如何素曰若在疏逺雖留可也臣之所論正恐親近仁宗色動呼近璫曰王德用所進女口各支錢三百貫即今令出內東門了急來遂涕下素曰陛下既以臣奏為然亦不須如此之遽且入禁中徐遣之上曰朕雖為帝王然人情同耳苟見其涕泣不忍出則恐朕亦不能出之卿且留此以待報素曰陛下從諌古哲王所未有天下社稷幸甚久之中使奏宫女已出門矣上復動容而起貝州卒王則據城叛詔明鎬往討久無功參知政事文彥博請行仁宗欣然遣之且曰貝字加文為敗卿必擒則矣未逾月而捷報聞蜀中一舉子獻詩太守云把斷劍門燒棧道成都别是一乾坤守械其人奏之仁宗曰此乃老秀才急於仕䆠而為之不足治也可授以司戶參軍其人到任不一年慚恧而死故事郊而肆赦奉祠不敬不以赦論治平中郎中易知素貪叨賜食大官醉飽失容御史以不敬聞韓魏公請論如律謂不行後將廢禮英宗不許曰寧以他事坐之士以飲食得罪使何面目見士大夫乎秦國大長公主薨神考賜挽詞三首曰海濶三山路香輪定不歸帳深空翡翠珮冷失珠璣明月留歌扇殘霞散舞衣都門送車返宿草自春菲又曰曉發城西道靈車望更遙春風空魯館明月斷秦簫塵入羅衣暗香隨玉銷芳魂飛北渚那復可為招又曰慶自天源發恩從國愛申歌鐘雖在館桃李不成春水折空還沁樓髙影隔秦區區㑹稽市無復獻珠人聖製如此雖穆王黃竹漢高大風之詞莫可擬其髣佛噫豈特前代帝王蓋古今詞章之工者無此作也神宗皇帝一日行後苑見牧猳㹠者問何所用牧者對曰自祖宗以來長令畜之自稚養之以至大則殺之更養稚者前朝不敢易竟不知果安用神宗沉思久之詔付有司禁中自今不得復畜居數月衛士忽獲妖人急欲血澆之禁中卒不能致方悟太祖之逺略熙寧中作坊以門巷委狹請直而寬廣之神宗以太祖創始當有逺慮不許既而衆工作苦持兵奪門欲出為亂一老卒閉而拒之遂不得出捕之皆獲神宗病甚不能言宣仁謂曰我欲為汝改某事某事凡二十餘條神宗皆㸃頭獨至青苗法再三問終不應熙寧初神宗與二王禁中打毬子上問二王欲賭何物徐王曰臣不賭别物若嬴時只告罷了青苗法承平時揚州郡治之東廡扃鎖屋數間上有建隆元年朱漆金書牌云非有緩急不得輒開宣和元年盜起浙西詔以童貫提師討之道出淮西見之焚香再拜啓視之乃弓弩各千愛護甚至儼然如新貫命絃以試之其力倍後來而製作精妙不可跂及士卒皆歎服施之於用以致成功此蓋太祖皇帝親征李重進時所留者仰知經武之略明見於二百年之前如此政和四年六月戊寅御筆取㑹到入內內侍省所轄苑東門藥庫所藏鴆鳥蛇頭葫蔓藤鈎吻草毒汁之類品數尚多皆屬川廣所貢典掌官吏三十餘人契勘元無支遣顯屬虛設蓋自五季亂離紀綱頽廢多用此物以勦不臣者沿襲至今日自藝祖以來好生之德洽於人心若干憲網莫不明置典刑誅殛市朝何嘗用此自今可悉罷貢額並行停進仍廢此庫放散官吏比附安排應毒藥并盛貯器皿並交付軍器所仰於新城門外曠濶逈野處焚棄其灰燼於官地埋瘞分明封堠標識無使人畜近犯疾速措置施行仰見祐陵仁厚之心德及豚魚如此祖宗開國以來西北兵革既定故寬其賦役民間生業每三畝之地止取一畝之稅緣此公私富庶人不思亂政和間謀利之臣建議以為彼處減匿稅賦乃創置一司號西城所命內侍李彥主治之盡行根刷拘催専供御前支用州縣官吏無郤顧之心竭澤而漁急如星火其推行為尤者京東漕臣王宓劉寄是也人不堪命遂皆去而為盜河北蜂起遊宦商賈已不可行至靖康初智勇俱困有啓於欽宗者命斬彥竄宓寄以狥下寬恤之詔然無鄉從之心矣其後散為巨冦於江淮間如張遇曹成鍾相李成之徒皆其人也髙宗好養鵓鴿躬自收放有士人題詩曰鵓鴿飛騰繞帝都暮收朝放費工夫何如養箇南來鴈沙漠能𫝊二帝書髙宗聞之召見士人即補以官髙宗在德壽宫每進膳必置匙筯兩副食前多品擇取欲食者以别筯取置一器中食之必盡飯則以别匙減而後食吳后嘗問其故對曰不欲以殘食與宫人食也南渡後有司降樣下外郡置御爐炭胡桃紋鵓鴣色者若干斤知婺州王居正論奏髙宗曰朕平居衣服飲食且不擇美惡隆冬附火止取溫暖豈問炭之紋色也詔罷之宣和間宗室圍爐次索炭既至訶斥左右云炭質紅今黑非是蓋嘗供熟火也以此類推之豈識世事艱難髙宗嘗語吕頤浩曰朕在宫中每天下奏案至莫不熟閲再三求其生路有至夜分卿可以此意戒刑寺官凡於治獄切當留心勿草草頤浩再拜賀即以上㫖喻之紹興壬子詔知大宗正事安定郡王令疇訪求宗室伯字號七嵗以下者十人入宫備選十人中又擇二人焉一肥一癯乃留肥而遣癯賜銀三百兩以謝之未及出思陵忽云更子細觀乃令二人乂手並立忽一猫走前肥者以足蹴之上曰此猫偶爾而過何為遽踢之輕易如此安能任重耶遂留癯而逐肥者癯者乃阜陵也肥者名伯浩後終於溫州都監孝宗居髙宗喪百日後尚進素膳毁瘠特甚吳夫人者潛邸舊人也屢以過損為言上堅不從夫人一日密諭尚食內侍潛以雞汁等雜素饌中以進上食之覺爽口詢所以然內侍恐甚以實告上大怒皇太后聞之過宫力解乃出吳夫人於外內侍等罷職有差廟號曰孝冝矣孝宗初年恢復之志甚鋭而於時謀臣猛將雕喪略盡財屈兵弱卒不得逞厥後畜積稍羡又嘗有意用兵祭酒芮國器奏曰陛下只是被數文腥錢作使何不試打算了得幾番犒賞上曰朕未之知也待打算報卿後打算只了得十三番犒賞於是用兵之意又寢孝宗鋭志大功新進逢意務為可喜淳熙中上益明習國家事老成鄉用一日躬朝德壽從容宴飲玉音曰天下事不必乘快要在堅忍終於有成而已上再拜請書紳歸而大字揭於選德殿壁辛丑廷䇿多士有一卷首曰天下未嘗有難成之事人主不可無堅忍之心上覽而是之遂為第一蓋親擢也壽皇在宫中常攜一漆拄杖宦官宮妾莫敢睨視嘗逰後苑偶忘攜焉特命小黃門取之二人竭力曳以來蓋精鐵也上方有意中原故隂自習勞苦如此劉恭甫奏事便殿見一馬在殿前不動問王公明曰此木刻者上於萬幾之暇御以習據鞍騎射也淳熙已酉孝宗退居重華宫有淨室終日宴坐其間几上惟書籍及筆墨楮研而已近璫嘗奏髙宗皇帝留下寶器圖畫陛下盍時取觀壽皇曰先帝中興功德盛大故宜享此朕豈敢自比先帝皆鎖閉不開符命第二附先兆轉生王朴仕周為樞密使五代自朱梁以用武得天下政事皆歸樞密院至今言二府當時宰相行文書而已時緣用兵朴多宿禁中一日謁見世宗屏人顰蹙且倉皇嗟嘆曰禍起不久矣世宗因問之曰臣觀元象大異所以不敢不言世宗云如何曰事在宗社陛下不能免而臣亦先當之今夕請陛下觀之可以自見是夜與世宗微行自厚載門出至野次止於五丈河旁中夜後指謂世宗曰陛下見隔河如漁燈者否世宗隨亦見之一燈熒熒然迤邐甚近則漸大至隔岸火如車輪矣其間一小兒如三四嵗引手相指既近岸朴曰陛下速拜之既拜漸逺而沒朴泣曰陛下既見無復可言後數日朴於李榖坐上得疾而死世宗既伐幽燕道𬒳病而殂至明年而天授皇宋矣火輪小兒蓋國家火德之兆云藝祖受命元年秋三佛齊來貢時尚不知皇宋受禪也貢物有通天犀中有形如龍擎一蓋其龍形騰上而尾少向左成形其文即宋字也真主受命豈偶然哉藝祖即以此犀為帶每郊廟則繫之郭祖微時與馮暉同里閈相善也椎埋無賴靡所不至既而各竄赤籍一日有道士過之業雕刺二人因令刺之乃於郭項右作雀左作榖馮則以臍作瓮中作鴈數隻戒曰爾曹各於項臍自愛異日雀􅔷榖鴈出瓮此亨顯之符也郭祖秉鉞之後雀榖稍近及踐祚雀遂􅔷榖焉馮之鴈亦自瓮中纍纍而出果位方鎮太祖征李筠以太宗為大內都㸃檢都民驚曰㸃檢作天子矣更為一天子地耶此又人口木簡也藝祖在周朝受命北征至陳橋驛為三軍推戴時太后眷屬以下盡在定力文院有司將搜捕主僧悉令登閣而固其扃鑰俄而大搜索主僧紿曰皆散走不知所之甲士入寺升梯且發鑰見蛛網絲布滿其上而塵埃凝積若纍年不曽開者乃相告曰是安得有人遂皆返去有頃藝祖已踐祚矣梁寶志銅牌記多識未來事云有真人在冀州閉口張弓左右邉子子孫孫萬萬年江南中主名其子曰𢎞冀吳越錢鏐諸子皆連𢎞字期以應之孰知宣祖正當之也宣祖太祖父名𢎞殷曹翰圍江州三年城將破太祖嘉其盡節於所事遣使諭翰城下日拒命之人盡赦之使人至獨木渡大風數日不可濟及風止而濟則翰已屠江州無遺類適一日矣唐吏部尚書張嘉福奉使河北逆韋之亂有敕處斬尋遣使人赦之使人馬上昏睡遲行一驛比至已斬訖與此相類楊文公之生其胞䕃始脫則見兩鶴翅交掩塊物而蠕動其母急令密棄諸溪流始出戶而祖母迎見啓視之則兩翅歘開中有玉嬰轉側而啼舉家驚異非常器也張乖崖成都還日臨行封一紙軸付僧文鑒大師上題云請於乙卯嵗五月二十一日開後至祥符八年當其嵗也時凌侍郎䇿知成都文鑒至是日持見凌公曰先尚書向以此囑某已若干年不知何物也乞公開之洎開乃所畫野服攜笻黃短褐一小真也題其旁云依此樣寫於仙逰閣上兼自作贊云乖則違衆崖不利物乖崖之名聊以表德徒勞丹青繪寫凡質欲明此心垂之無斁凌公竒之於大慈寺閣龕以祠焉蓋公以祥符七年甲寅五月二十一日薨開真之日當小祥也王冀公欽若微時薄遊臨川寄食蔡參政門館天寒冀公無𬒳夜中凍甚竊入僕魁陳超𬒳中睡定超方夢有數人叱曰宰相睡何得同牀耶即舁至戶外超甚驚愕不敢近冀公自此謹待之兼盡力相助公後貴顯所以存問於超者甚至超子亦舉進士王欽若字定國新喻人封冀國公諡文穆仁宗晚年不豫漸復康平忽一日命宫嬪妃主游後苑乘小輦東向欲登城堞遙見小亭榜曰迎曙帝不說即時回輦翼日上仙而英宗登極蓋曙乃英宗御名也又哲宗朝嘗創一堂退繹萬幾學士進名皆不可意乃自製曰迎端意謂迎事端而治之未幾徽宗由端邸即大位仁宗嘗御便殿有二近侍爭辨仁宗問之曰甲言貴賤在命乙言由至尊帝默然即以二小金合各書數字藏於中曰先到者保奏給事有勞推恩封閉甚嚴先命乙攜一往東門司約及半道命甲攜一繼往無何內東門司保奏甲推恩問之乃是乙半道傷足甲遂先到帝歎曰信有命哉胡宿每語後進曰萬事真實有命人力計較不得吾平生未嘗于人他安能陶鑄我自有命在枉費却閒工夫枉用却閒心力信得命便養得氣不挫折也元豐中王岐公圭作宰相王和父安禮尹京兆上眷甚渥且將大用岐公乘間奏曰京師術者皆言王安禮明年二月作執政神宗怒曰執政除拜由朕豈由術者之言他日縱當次𥙷特且遲之明春安禮果拜左丞圭曰陛下乃違前言何也上默然久之曰朕偶忘記信知果是命耶撫之臨川北郭二十里間有地名曰虎頭洲郡人死不能葬者必詣其所焚之因揚骸灰於水中治平元年撫人李權夢親朋張樂送至洲上甚不悅告人曰吾其死乎俄而𬒳鄉薦遂登第調處州司理乃悟虎頭為處字而洲為州也歐陽文忠公慶厯末夜泊采石渡舟人鼾睡潮至月黑公滅燭方寢微聞呼聲曰去未舟尾答曰有參政宿此不可擅去齊料幸攜至公私念曰舟尾逼浦且無從人必鬼也通昔不寐五鼓聞岸上獵獵馳驟聲舟尾曰齊料幸見還岸上且行且答曰道場不淨竟無所得而歸公異之後日遊金山與長老瑞新語此事驚曰某夜有施主設水陸攜室人至方拜忽乳一子俄腥風滅燭一衆盡恐乃公宿采石之夜也公後果參大政自參知政事除蔡州而公求退之鋭者亦其前知然耶黃魯直熙寧初宿石塘寺寺有鬼靈異僧敬信之一夕夢曰分寧黃刑部至僧曰侍郎乎尚書乎曰侍郎也魯直南遷已六十親故憂其禍大又南方瘴霧非菜肚老人所宜魯直笑曰宜州者所以宜於人也且石塘鬼侍郎之言豈欺我哉魯直竟殁於宜州較采石之鬼何愚智相去三十里豈魯直癡絶故欺之耶頴川一異僧能知人宿命時歐陽永叔領郡事見一妓口氣常作蓮花香心頗異之舉以問僧僧曰此妓前生為尼好轉妙法蓮花經三十年不廢以一念之差墮身娼賤後因郡㑹妓適侍傍公因以僧語告之且問今亦曽轉蓮經否妓曰某不幸為妓日事應接何暇轉經公命取蓮經令讀一閲如流宛若素習試以他經則不能也公益異之一作公婢名胡媚娘王元之禹稱在黃日作竹樓與無愠齊記其末云後人公退之餘召髙僧道侶烹茶煉藥則可矣若易為廄庫厨𫝊則非吾徒也後安信可至訪之則樓且半圯而齊已更為馬廄矣求其記則庖人亦取刻石壓羊肉信可歎曰元之豈前知耶抑其言遂為䜟耶於是樓與齊皆葺如舊而以其記龕之於壁中大夫徽猷閣安詠信可宣和初守齊安下車訪東坡雪堂遺址雖存堂瓦木已為兵馬都監拆而為教場亭子矣信可即呼都監責之且命復新之堂成多燕飲其上信可亦善為詩在黃有詩云萬古戰爭餘赤壁一時形勝屬黃岡韓魏公慶厯中以資政殿學士帥淮南一日後園中有芍藥一幹分四岐岐各一花上下紅中間黃蕊間之名金纒腰又謂之金帶圍初無種有時而出則城中當有宰相公異之開一㑹欲招四客以賞之以應四花之瑞時王岐公圭為大理寺評事通判王荆公安石為大理評事僉判皆召之尚少一客以州鈐轄諸司使忘其名官最長遂取以充數明日早衙鈐轄者申狀暴泄不至尚缺其一命取過客厯求一朝官足之過客中無朝官惟有陳秀公升之時為大理寺丞遂命同㑹至中筵剪四花四客各簪一花甚為盛集後三十年間四人皆為宰相洛中士人張起宗以訓䝉為生居於㑹節園側年四十餘一日行於內前見有西來行李甚盛問之曰文樞密知成都回也姬侍皆騎馬錦繡蘭麝溢人眼鼻起宗自歎曰同丙午生相逺如此傍有瞽者輒曰秀才我與汝算命因與藉地卜者出算子約百餘布地上幾長丈餘凡閲兩時曰好笑諸事不同但三十年後有某星臨某所兩人皆同當並案而食者九箇月起宗後七十餘嵗時文公亦居於洛起宗視其交逰飲宴者皆一時貴人輒自疑曰余安得並案而食乎一日公獨遊㑹節園問園側教學者為誰左右以張對公命請至及見大喜問其甲子又與之同因呼為㑹節先生公每召客必預召赴入㑹無先生則不往公為主人則拐於左公為客則拐於右並案而食者將及九月公之子及甫知河陽府公往視之公所居私第地名東田有小姬四人謂之東田小籍共升大車隨行祖於城西有伶人素不平之因為口號曰東田小籍已登油壁之車㑹節先生暫别玳筵之宴坐客微笑自此潞公復歸洛不復召之矣邉鎬為謝靈運後身故小字康樂范淳夫為鄧仲華後身故名祖禹張平子後身為蔡伯喈鄒陽後身為東坡居士即其習氣似皆不誣也東坡在儋耳語其子過曰我决不為海外人近日頗覺有還中州氣象乃滌研焚香寫平日所作八賦當不脫誤一字以卜之寫畢大喜曰吾歸無疑矣後數日廉州之命至八賦墨迹初歸梁師成後入禁中閩中記言南臺沙合必出宰輔至和中閩人潘有實為省郎自負王佐才每遇鄉人必問南臺江可褰裳過否或云未則色不悅逮章郇公入樞府之明年沙始交遂大拜尋而吳丞相育曽侍中公亮陳丞相升之皆相繼輔弼惟曽公泉人他皆建人吳章皆浦城人又其後如章子厚諸公繼踵而起盛哉古𫝊沙合出相比年遂為洲蓋名世賚弼殆天啓然章郇公得象守洪州嘗因晏客擲骰賭酒乃自默占如異日登台輔成貴采一擲得佛面浮圖遂緘祕其骰至為相猶在世𫝊山谷老人前身為女子云山谷自有記刻石於涪陵江上石至春夏為江水所浸故世未有模𫝊者其記言山谷與東坡先生同謁清老清語坡是五祖戒和尚後身而山谷前身則一女子我不能詳語俟異日學士至涪陵自有告者山谷意謂涪陵非遷謫不至既坐黨籍再貶涪陵未幾夢一女子告之云某生前誦法華經發願後身為男子得大智慧為一時名人今學士某前身也學士年來患腋氣者緣某所葬棺朽有蟻居於兩腋之下故致斯疾耳今此地後山有某墓學士能啓之除去蟻聚則腋患可愈也既覺果訪得之因如其言且為再易棺修掩甫畢而腋氣果不藥而除神祖幸祕書省閲江南李主像見其人物儼雅再三歎訝而徽宗生生時夢李主來謁然其文采風流過李主百倍及北狩女真亦用江南國主見藝祖故事徽宗夢錢王再三乞還兩浙明日與鄭后言朕夜來被錢王索取兩浙甚急鄭后奏云昨妾夢亦然須臾報韋妃誕髙宗既三日徽宗臨視戲妃曰酷似浙臉蓋妃籍雖貫開封而原占於浙亦遂成南渡之讖云錢王夀八十一髙宗亦夀八十一以夢讖參之良不誣矣哲宗在位既久而皇嗣未立密遣中貴往泰州天慶觀問徐神翁徐但書吉人二字付之既還奏呈左右皆無知其說者又元符以來殿庭朝㑹及常起居看班舍人必秉笏巡視班列懼有不盡恭者連聲云端笏立既而哲宗升遐徽以端邸入承大統而吉人二字乃潛藩之名徐神翁字太更名守信泰州海陵人居冲真坊樂真橋之側嘉祐初執役天慶觀持帚灑掃十數年人無識者止呼為徐二翁蔣之竒號為神翁宣和中燕諸王於禁中髙宗以困於酒倦甚小憩幄次徽宗忽詢康王何在左右告以故徽宗幸其所視之甫入即返驚愕默然內侍請於上云適揭簾之次但見金龍丈餘蜿蜓榻上不欲呼之所以亟出歎息久之云此天命也由是異待焉顯仁太后在沙漠尚未知髙宗即位嘗用象戲局子褁以黃羅書康王字貼於將上焚香禱曰今三十二子俱擲於局若康王字入九宫者必得天位一擲其將子果入九宫他子皆不近后以手加額喜甚即具奏徽廟大喜復謂后曰瑞卜昭應異常可無慮矣隂陽家流窮五行術數不得為亡至一切聽之反棄人事斯失矣是以古人行道而委命不敢用億中以為信也蔡元長生慶厯之丁亥其月當壬寅日當壬辰時為辛亥在昔幼時言命者或不多取之及逢時遇主位極人臣而後操術者爭談格局之髙推富貴之繇徒足發賢者之一笑耳大觀改元嵗復丁亥東都順城門內有鄭氏者貨粉於市家頗贍給俗號鄭粉家偶以正月五日亥時生一子嵗月日時適與魯公合其家大喜極意撫愛謂且必貴時人亦為之傾聳長則恣其所欲為鬭雞走犬一切不禁也始年十有八春末攜妓從浮浪人躍犬馬遊金明自苑中歸上下悉大醉馬忽躍入波水中浸而死五行之不足信如此蔡元度娶王荆公之女封福國夫人止一子談天者多言其壽命不永元度夫婦憂之一日盡呼術者之有名如林開之徒集於家相與决其疑云當止三十五嵗元度顧其室云吾夫婦老矣可以放心豈復見此逆境耶其子後竟至乾道中壽八十而終然其初以恩幸為徽猷閣學士靖康初蔡氏既敗例遭削奪恰年三十五蓋其祿盡之嵗繇是而知五行又不可謂盡無也熙寧元豐間有僧化成以命術聞於京師蔡元長兄弟始赴省試同往訪焉時問命者盈門彌日方得前既語以年月率爾語元長曰此武官大使臣命也他時衣食不闕而已餘不可望也語元度曰此命甚佳今嵗便當登第十餘年間可為侍從又十年為執政然决不為真相晚年當以使相終既退元長大病其言元度曰觀其推步鹵莽如此何足信哉更俟旬日再往訪之僧已不復記憶再以年月語之率爾而言悉如前說兄弟相顧大驚然是年遂同登科自是相繼貴顯於元長則大謬如此而元度終身無一語之差以此知世所謂命術者類不可信其有合者皆偶中也蔡侍郎凖少年時出入常有二人見於馬或肩輿之前若先驅或前或却問之從者皆無所見凖甚懼謂有冤魂百方禳祛皆不能遣既久亦不以為事慶厯四年生京而一人不見又二年生卞乃遂俱滅元符末都城童謡有家中兩箇蘿蔔精之語而其末章云撞著潭州海藏神至崇寧中賣餕饀者又有一包菜之語其事皆驗而京於靖康初貶死於長沙豈潭州海藏亦應於此耶元絳字厚之初知荆南嘗夢至仙府與三人連書名旁有告之曰君三人蓋兄弟也覺而思之不知所謂既入翰林為學士韓持國維楊元素繪在院一日書奏列名三人偏旁皆從絲始悟夢中兄弟之意既而持國元素皆𥙷外公得尹京兆後三年復同元素還職而鄧文約綰相繼為直院則三人之名又皆從絲蓋始終皆同以此知升沉進退决非偶然者一作元厚之少時曽夢人告之異日當為翰林學士須兄弟數人同在禁林厚之自思素無兄弟疑此夢為不然熙寧中厚之除學士同時相先後入學士院一韓持國維一陳和叔繹一鄧文約綰一楊元素繪并厚之名絳五人名皆從絲始悟兄弟之說陳秀公丞相與元參政厚之同日得疾陳忽寄聲問元安否曰參政之疾當即痊矣某雖小愈亦非久世者絳請其說秀公曰某病中夢至一所金碧煥目室間羅列甕器甚多上皆以青帛羃之具題曰元參政香飯也某問其故有守者謂某曰元公自少至老每食度不能盡則必減别器未嘗殘一食此甕所貯皆其餘也世人每食不盡則狼籍委棄皆為掠剩所罰至於減算奪祿無有免者今元公由此當更延十年福算也後數月而秀公薨元果安享耆壽陳升之字𤾉叔建陽人封秀國公諡成肅深狡多數善𫝊㑹以取富貴張無盡丞相為河東大漕日於上黨訪得李長者古墳為加修治且發土以驗之掘地數尺得一大盤石石面平瑩無他銘欵獨鐫天覺二字故人𫝊無盡為長者後身張商英字天覺别號無盡蜀州人諡文忠授法兜率從悅長者名通𤣥唐開元時人屏跡山居心窮𤣥奧著論釋華嚴二十餘年始成趺坐而化蔡忠懷確持正少年嘗夢為執政仍有人告之曰俟汝父作狀元時汝為執政也持政覺而笑曰鬼物乃相戲乎吾父老矣方致仕閒居乃云作狀元何也後持正果作執政一日侍殿上聽唱進士第狀元乃黃裳也持正不覺失驚且歎夢之可信也持正父名黃裳乃泉州人晚年為陳州幕官遂不復歸持正年二十許時家苦貧衣服垢敝一日與郡士人張湜師是同行張亦貧儒也俄有道人至注視持正久之因謾問曰先輩狀貌極似李德裕持正以為戲已因戲問曰為相乎曰然南遷乎曰然復相師是曰當為卿監家五十口時指持正云公當死矣道人既去二人大笑以為狂後持正謫新州凡五年一日得師是書云以為司農無𥙷然闔門五十口居京師食貧近蒙恩守汝州持正讀至此忽憶道人之言遂不復讀數日得疾而卒蔡丞相持正為府界提舉曰有人夢至一官府堂宇髙邃上有具冕服而坐者四人傍有指謂之曰此宋朝宰相次第所坐也及仰視之末乃持正也既寤了不解至公有新州之命始悟過嶺宰相盧寇下至公為四也王將明􅀈父行可初知臨泉時將明為編修官行可問異人王老志他日官所至書太平宰相四字遺之即以墨塗抹其字故韓子蒼獻將明生日詩一絶句云百里青雲發軔時驊騮絶足看奔馳太平宰相何人識唯有巫咸得預知蓋謂此也建炎航海之役張俊既戰而棄鄞烏珠入之即日集賈舟募瀕海之漁者為鄉道遂將犯蹕而風濤稽天盤薄不得進烏珠怒躬命巨艘張帆徑前風益猛桅舞舷側窘懼欲却而未脫諸口也遙望大洋中𨼆𨼆一山顧問海師此何所對曰陽山烏珠慨然歎曰昔唐斥境極於隂山吾得至此足矣遂下令反棹其日御舟將如館頭亦遏於風不爾幾殆蓋天佑以開中興云龍舒在淮最殷富金自南侵浙江無所不至獨不入其境說者謂其語忌蓋舒之比音輸也昭州山水佳絶郡圃有亭名天繪建炎中吕巫為守以天繪近金國號思有以易之時徐思川避地於昭吕乞名於徐久而未獲復乞於范滋乃以清暉易之一日徐䇿杖過庭仰視新榜忽檢得亭記於積壤中亟滌石觀之乃丘濬寺丞所作也其記云余擇勝得此亭名曰天繪取其景物自然非人力所能摹寫耳後某年某日當有俗子易名清暉者可為一笑還考范更題之日竟無毫髮差也丘濬徽州黟縣人厯官殿中丞因讀易悟損益二卦能通數知未來興廢嘗謂家人曰吾壽終九九後果八十一卒程師孟知洪州於府中作靜堂自愛之無日不到為詩題於石曰每日更忙須一到夜深還是㸃燈來李元規見而笑曰此無乃是登溷詩乎秦㑹之初得疾遣前宣州通判李季設醮於天台桐柏觀季以善奏章自名行至天姥嶺下憩小店中邂逅一士人頗有俊氣問李曰公為太師奏章乎曰然士人搖首曰徒勞耳數年間張德逺當自樞府再相劉信叔當總大兵捍邉若太師不死安有是事耶季不敢復與語即上車去醮之明日而秦公卒張忠獻浚字德逺劉武穆錡字信叔宣和末有題字數行於寶籙宫瑶仙殿左扉云家中木蛀盡南方火不明吉人歸塞漠亘木又摧傾始不可辨後靖康之變方知家中木宋也南方火乃火德吉人亘木乃二帝御名宣和元年秋道德院奏金芝生車駕幸觀因幸蔡京家鳴鑾堂置酒時京有詩徽宗即席賜和曰道德方今喜迭興萬邦從化本天成定知金帝來為主不待春風便發生其後女真起海上滅遼國陷中原以金為號以宣和七年冬犯京師以十二月二十五日城陷太史預借立春出土牛以迎新嵗竟無助於事則徽宗賜和之句甚切其讖又徽宗崇寧間曽夢青童從天而下出一玉牌上有字曰丙午昌期真人當出上覺默疏於簡札謂丙午年是昌盛之時真人當降乃預製詔書具陳夢意令天下尋訪異人至乙已冬內禪欽宗即位意當丙午之期矣而次年乃有北狩之禍乃悟曰丙午是猖獗之期而女真之人出也道君改元宣和人或離合其字曰一旦宋亡此與梁蕭巋離合後周宣政為字文亡日同楚州有賣魚人姓孫頗知人災福時呼孫賣魚宣和間上皇聞之召至京師館於寶籙宫道院一日懷蒸餅一枚坐一小殿時日髙拜跪既久上覺微餒孫見之即出懷中蒸餅云可以㸃心上雖訝其異然未肻接孫云後來此亦難得食也時莫悟其言明年遂有沙漠之行建炎中錢公載鎮長安有道人從河東來謁錢與之有舊問其來故曰吾本寓某縣比有風氣絶不佳一邑人當有災殃甚劇故捨去耳是時邉警方熾但意其為是而轉徙也後月餘得鄰郡報彼縣白日地陷居人盡沒錢嗟異其前知欲呼語之㑹日暮至平旦乃招之店人言道人房正在店墻下昨夜過半墻忽頽遂遭壓死錢大驚嘆謂此人能知於前而不能審於後豈冥數已定非智慮算度所可脫耶崔公誼者鄧州學生纍舉不第因舅氏賈魏公䕃𥙷莫州任丘簿熙寧初河北地震未已而公誼秩滿挈家已南行數程一夕宿孤村馬鋪中風電隂黑夜半有急叩門呼崔主簿在否言莫州有書崔披衣遽起未開門先問何人書曰無書只教𫝊語崔主簿君合係地動壓殺人數輒敢擅逃過河已收魂岱嶽到家速來逮開門寂無所覩崔自度必死乃兼程送其妻孥至壽陽次日遂卒時崔妻父陳宗儒知壽州斡離不陷汴京殺太宗子孫幾盡宋臣有詣其營者觀其貌絶類藝祖伯顔下臨安有識之者後於帝王廟見周世宗像分毫不爽世又𫝊王介甫為秦王廷美後身髙宗乃錢王後身髙宗嘗宴大臣見張循王俊持一扇有玉孩兒扇墜上識是十年前往四明誤墜於水屢尋不獲乃詢於循王對曰臣於清河坊鋪家買得召問鋪家云得於提籃人復遣根問回奏云於候潮門外陳宅厨娘處買得又遣問厨娘云破黃花魚腹中得之奏聞上大悅以為失物復還之兆鋪家及提籃人𥙷校尉厨娘封孺人循王賞賜甚厚真文忠公德秀建寧浦城人起自白屋先是有道人於山間結菴煉丹將成忽一日入定語童子曰我去後或十日五日即還慎勿輕動我屋子數日忽有叩門者童子語以師出未還其人曰我知汝師死久矣今已為冥司所録不可歸留之無益徒臭腐耳童子騃甚不悟其為魔遂舉而焚之道者旋出定歸已無及繞菴呼號曰我在何處如此月餘不絶鄉落為之不安適有老僧聞其言厲聲答之曰你說尋我你却是誰於是遂絶時真母方娠忽見一道者入室遂産西山幼頴悟絶人家貧無從得書往往假之他人及剽學里儒為舉子業未幾登第終為世儒宗史丞相浩與覺長老善一日邀覺至第問之曰和尚與我孰好覺見其堂中羅綺爛盈粉黛環列謾曰丞相富貴好老僧何敢比也既自省曰此念一差積嵗蒲團功夫盡廢終當墮落泥滓一日浩坐㕔上忽見覺突入堂中使人往寺廉之則報覺死矣茶頃後院弄璋浩默然知為覺也遂以覺為小字及長名曰彌逺是佛位中人有人作詩規之曰前身元是覺闍黎業障紛華總不迷到此更須睁隻眼好將慧力運金鑱彌逺比周楊后出入宫禁外議甚譁有人作咏雲詞譏之曰往來與月為儔舒卷和天也蔽王蓋縣丞福州長溪人嘉定初宦遊京湖時方經金兵殺人至多積骸如山有未絶者夜見炳燭呵殿而來以為冦也懼甚屏息窺之旋聞按籍呼名死者輒起應已復仆次至王亦起應之則又聞其有言曰此人未當死乃舉籍唱曰二十年後當於辰州伏法既得免投僧舍為行者適郡倅眉山家坤翁來游寺中喜其淳謹而文曰肻從我乎欣然而就家人亦愛之家有女適史植齊季溫之子使從之以往遂居史已而史得辰州欲以自隨王猛憶前事具白辭行史曰吾為郡守豈不能庇汝乃勉從之至郡逾年史幼女戲後圃為蛇所繞王因擊蛇併女斃焉史怒竟致之法距聞神言恰二十年宋祖建隆庚申受禪後聞陳希彞只怕五更頭之言命宫中轉六更方嚴鼓鳴鐘殊不省庚與更同音也至理宗景定元年厯五庚申越十七年宋亡而五更頭之數信矣宋祖以乙亥命曹翰取江州後三百年乙亥吕師䕫以江州降元以丙子受江南李煜降後三百年丙子少帝為元所虜以已卯滅漢混一天下後三百年己卯宋亡於崖山宋祖生於丁亥而建國於庚申元太祖之降生與建國之年亦同宋興於後周顯德七年時恭帝八嵗亡於德祐元年少帝四嵗諱㬎顯德二字不期而合又同廟號亦曰恭帝周有太后在上禪位於太祖宋亦有太后在上歸命於大元北客有詠前朝詩云當日陳橋驛裏時欺他寡婦與孤兒誰知三百餘年後寡婦孤兒亦𬒳欺又咏汴京青城云萬里風霜空緑𣗳百年興廢又青城蓋金之亡亦聚其諸王於青城而殺之咸淳十年度宗大漸大內建醮保安太乙宫唐道録素以精䖍著名行持章伏壇出神層霄𬒳罡風吹擊遂排神馭氣得至魔王界內又為天花墜壓乃竭力作法直造天門天神又行麾叱乃默叩祖師云自傳法以來有辭即達未嘗過差未審何罪若此有天丁𫝊祖師張真君法㫖引至三省敷陳所奏始得騰送奏院看詳呈覆祖師云昨奉上帝敕命不許受宋國表章但其辭意䖍切難以抑遏乃命有司引押唐某詣玉階適逢下界公事稠衆中見真君引致一神人衣粧皆如天帝但簪下辮髮耳有十數人各荷青冊一擔在庭下伺候忽𫝊帝㫖云宋國人民疆土付汝執掌神人祗拜而退其荷冊者皆隨去傍有天丁謂某言宋國厯數盡矣汝章不達由此也唐還不敢泄露至元革命方與人言之前此相𫝊徽宗親臨寶籙醮宫一日啓醮道士至醮壇拜章伏地久之方起上詰其故答曰適至上帝所值奎宿奏事良久方畢始能上其章上嘆訝問曰奎宿何神所奏何事對曰所奏不可知此宿乃本朝蘇軾帝大驚先是崇觀間以黨籍禁蘇公文辭并墨跡而毁之政和中不惟弛其禁且欲玩其文詞墨跡一時士大夫從風而靡為是故也至元十一年甲戍宋之咸淳十年也秋七月元世祖命中書右丞相伯顔總制大軍取宋諭之曰朕聞曹彬不嗜殺人一舉而定江南汝其體朕心法彬事毋使吾赤子橫罹鋒刃伯顔叩首奉命惟謹明年乙亥春諸郡望風降敗伯顔遣員外郎石天麟詣闕奏聞世皇喜顧謂侍臣曰朕兵已到江南宋之君臣必知畏恐兹若遣使議和邀索嵗幣想無不從者遂敕伯顔按兵乃命禮部尚書亷希賢侍郎嚴忠範計議官宋德秀祕書丞柴紫芝等齎奉國書使宋次建康希賢等借兵衛送伯顔曰方今兩軍相厄互有設險宜令行人先往道意若便擁兵前進吾恐别生罅隙則和議之事必難成矣希賢等堅請乃簡閲鋭卒五百畀之至獨松關戍關者宋浙西安撫使參議官張濡也以為北兵叩關率衆掩擊殺忠範希賢𬒳執病創死世皇聞之大怒趣進攻嗟夫宋之亡始以拘留使者肇敵兵之興終以誤殺使者激世皇之怒耳藉使獨松之使不死宋之存亡未可知其亦有數也歟宋未下時江南謡曰江南若破百鴈來過當時莫喻其義及宋亡蓋知指丞相伯顔也賈平章魯港之師嘗與北軍議定嵗幣講解約於來日各退師一舍以示信既而西風大作北軍之退西者旗幟皆東指孫虎臣意以為北軍順風進師遂倉忙告急於賈賈以為北軍失信而相紿遂鳴鑼退師及知其誤則軍潰已不可止矣是以南軍既退之後越一宿而北軍始進蓋以此也嗚呼天乎宋少帝在燕京淒涼無賴時汪水雲以黃冠放還少帝作詩送之云寄語林和靖梅花幾度開黃金臺下客應是不歸來元文宗潛邸金陵日嵗當戊辰適太平興國寺鑄大鐘為金數萬斤方在冶上至其所取鑲嵌碧珠指環默祝曰若天命在躬此當不壞即投液中鐘成其欵有曰皇帝萬嵗珠宛然在其上若故識之而堅固完好光采明發不少灼毁萬目驚覩歡歎如一及登大寶方與近侍言向時祝天之讖宋稗類鈔卷一
