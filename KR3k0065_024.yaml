body:
  text: 宋稗類鈔卷二十四常熟潘永因編稱譽第四十宋景文云左太沖詩曰振衣千仭岡濯足萬里流使人飄飄有世表意不減嵇康目送飛鴻語歐陽文忠公在潁上日取新唐書列傳令其子棐讀而卧聽之至藩鎮傳敘嗟賞曰若皆如此其筆力亦何可及公平日少許人惟服韓稚圭嘗因事歎曰屢百歐陽修何敢望韓公東坡詩文落筆輒為人傳誦每一篇到歐公為終日喜前後類如此一日與其子棐論文因及東坡公歎曰汝記吾言三十年後世上人更不道著我也崇寧間海內外稱坡公詩文不復有言歐公者張安道與歐陽文忠素不相能安道守成都日文忠為翰林蘇明允父子自眉州走成都將求知於安道安道曰吾何足為重乃為作書辦裝使人送至京師謁文忠文忠得明允父子所著書亦不以安道所薦為嫌大笑曰後來文字當在此即極力推挽天下髙此兩人東坡初登第以書謝梅聖俞聖俞以示歐陽文忠公公答梅書略云不意後生能達斯理也吾老矣當放此子出一頭地故東坡送朝美叔詩云醉翁遣我從子遊翁如退之踐軻丘尚欲放豫出一頭酒醒夢斷四十秋蓋敘書語也東坡初為趙清獻公作表忠觀碑或持以示王荆公公讀之沉吟曰此何語耶時有客在傍遽詆訿之公不答讀至再三又携之而起且行且讀忽歎曰此三王世家也客大慚王荆公在鍾山有客自黃州來公曰東坡近日有何妙語客曰東坡宿於臨臯亭醉解而起作成都勝相院經藏記千有餘言點定才一兩字有寫本適留船中公立遣人取至時月出東南林影在地公展讀於風簷喜見眉鬚曰子瞻人中龍也然有一字未穩客請之公曰日勝日負不若曰如人善博日勝日貧耳東坡聞之拊手大笑亦以公為知言吕正獻公平日最不喜人博嘗云勝則傷人敗則傷儉一本坡公原作日貧荆公改為日負見野客叢書日負更覺蘊藉東坡守彭城參寥嘗往見之坡遣官妓馬盻盻索詩參寥笑口占絶句云多謝尊前窈窕娘好將幽夢惱襄王禪心已作沾泥絮不逐春風上下狂坡喜曰豫嘗見栁絮落泥中私謂可以入詩偶未曾收拾乃為此老所先可惜也參寥於內外典無所不窺能文章尤善為詩秦少遊與之友契嘗在臨平道中作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡一見為寫而刻石宗婦曹夫人善丹青作臨平藕花圖人爭傳寫蓋不獨寶其畫也蘇子瞻自海外歸與米元章書云嶺海八年親友曠絶亦未嘗關念但念吾元章邁往凌雲之氣清雄絶俗之文超妙入神之字何時見之以洗我積年瘴毒耶兩日來疾有增無減兒子於何處得寶月觀賦琅然誦之老僕卧聼未半蹶然而起恨二十年相從知元章不盡若此賦當過古人不論今世也天下豈盡如我輩聾聵耶公不久當自有大名不勞我輩説也元章答云更有知不盡處修楊許之業為帝宸碧落之遊異時相見乃知也其高自標置如此東坡嘗語少子過曰秦少遊張文潛才識學問為當世第一無能優劣少遊下筆精悍心所默會而口不能傳者能以筆傳之然而氣韻雄拔踈通秀朗當推文潛二人皆辱與豫遊同升而並黜有自雷州來者遞至少遊所惠詩文居蠻獠中久得此如在齊聞韶也汝可記之勿忘吾言東坡曰意盡而言止者天下之至言也然言止而意不盡尤為極致又曰某平生無快意事惟作文章意之所到則筆力曲折無不盡意自謂世間樂事無踰此者崇寧大觀間朝廷禁止蘇公文章賞錢增至八十萬禁愈嚴而傳愈盛往往以多相誇士大夫不能誦坡詩便自覺氣索而人謂之不韻參寥常與客評詩客曰世間故實小説有可以入詩者有不可以入詩者惟東坡全不揀擇入手便用如街談巷説一經坡手似神仙點瓦礫為黃金自有妙處參寥曰老坡牙頰間别有一副爐鞲他人豈可學耶座客無不以為然黃山谷云先生道義文章名滿天下所謂青天白日奴𨽻亦知其清明者也心悅而誠服者豈但中分魯國哉士之不遊蘇氏之門與嘗升其堂而畔之者可知也當先生之棄海濵其平生交遊多諱之矣而王周彥萬里致醫藥以文字乞品目此豈流俗人炙手求熱救溺取名者哉潭州一巨賈私藏蚌胎為關吏所搜盡籍之皆南海明珠也在仕無不垂涎而愛之太守而下輕其估悉自售焉唐質肅公介時以言事謫潭倅分珠獄發奏方入仁宗預料謂近侍曰唐介必不肯買案具奏核上覽之果然真所謂知臣莫若君也唐李洞字才江苦吟有聲慕賈浪仙之詩鑄其像事之誦賈島佛不絶口時以為異五代孫晟初名鳯又名忌好學尤長於詩為道士居廬山蘭寂宫常畫賈島像置屋壁晨夕事之人以為妖蓋酸醎之嗜固有異世而同者長江簿何以得此於人哉凡人著書立言正不必合於一時後世有揚子雲當自知之黃魯直晚年懸東坡像於室中每晨衣冠薦香肅揖甚敬或以同時聲名相上下為問則離席驚避曰庭堅望蘇公門弟子耳安敢失其序承暉生自富貴居家頗類寒素常置司馬光蘇軾像於室中曰吾師司馬而友蘇公黃山谷嘗與座客論王介甫文一客曰魯直不知前輩亦未深許介甫也嘗見歐陽公一帖乃答人論介甫文言此人而能文角而翼者也此帖今在孫元忠家其子甚祕之非氣類者不以出示然就帖中語考之乃是介甫方辭起居注時也黃魯直年十七八時自稱清風客俞清老見而目之曰竒逸通脫真驥子墮地也黃魯直見謝無逸詩歎曰使在館閣當不減眺張朝補之無咎張耒文潛蔣希魯家有楊文公與王魏公一帖用半幅紙有折䀶其略云昨夜進士蔣堂携所作文來極可喜不敢不布聞子瞻曰夜得一士旦以告人察其情若喜而不寐者世言文公為魏公客公經國大謀人所不知者獨文公得與觀此帖不特見文公好賢下士之急且得一士必亟告之其補於公者亦多矣片紙折封猶見前人至誠相與簡易平實不為虛文安得復有隱情皆可為後世法蘇子由云莊周養生一篇誦之如神龍行空爪趾鱗翼所及皆自合規矩程伯淳嘗至天寧寺方飯見趨進揖遜之盛歎曰三代威儀盡在是矣龔殿院彥和清介自立少有重名元祐間僉判瀛州與弟大壯同行尤特立不羣曾文肅子宣帥瀛州欲見不可得一日經過彥和邀其弟出不可辭也遂出相見即為置酒從容終日乃去因題詩壁間其末句云自慙太守非何武得向河陽見兩龔江公著初任洛陽尉久旱微雨作詩云雲葉紛紛雨腳勻亂花柔草長精神雷車却碾前山過不灑原頭陌上塵司馬文正公於士人家立借紙筆修刺謁之且為稱薦由此知名李覿字子範𡊮州人元豐二年以特奏名推名尉吉州太和縣時豫章先生為令贈之詩曰乃兄自是文章伯之子今為矍鑠翁蓋覿乃李觀之弟也觀字夢符初試南宫賦偶落韻有司愛其策為取特旨由是登第以著作佐郎知臨江軍清江縣時歐陽文忠公扶護太夫人喪歸廬陵舟過清江太守請觀為文以祭之太守訝其簡率觀曰無深訝也既而文忠擊節稱之其文曰昔孟軻亞聖母之教也有子如軻雖死何憾尚享觀初為太學官因上言役法不合出通判處州題詩一絶於直廳之壁曰十謁朱門九不開利名淵藪且徘徊自知不是公矦骨夜夜江山入夢來吕太尉惠卿赴延安帥道出西都時程正叔居里中謂門人曰吾聞吕吉甫未識其面明且西出必經吾門我且一覘之逮旦了無所聞詢之則過已久矣道旁多不知正叔歎曰夫以從者數百人馬數千行道中能使悄然無聲馭衆如此可謂整肅矣立朝雖多可議其才亦何可掩陳無已與眺以道俱學文於曽子固無已晚得詩法於黃魯直他日二人論文以道曰吾曹不可負曾南豐既而論詩無已曰吾此一瓣香須為山谷道人燒也劉原父文章敏贍嘗直舍人院一日追封皇子公主九人方下直為之立馬却坐一揮九制成文辭典麗各得其體真天才也歐陽文忠公聞而歎曰昔王勃一日草五王策未足尚也米元章與李端叔曰老夫懶作文但傳得東坡嶺外文時一微吟清風颯然顧同味者難得耳王質景文在太學與九江王阮齊名阮嘗曰聼景文談如讀酈道元水經名川支渠貫穿周匝無有間斷咳唾皆成珠璣紹聖中用蔡京之請置元祐黨籍刻石禁中時尚書省國子監亦有石刻國子監有無名子以朱大題其碑上曰千佛名經陳瑩中題元祐黨籍碑曰嗚呼漢世得人於斯為盛錢忱伯誠妻瀛國夫人唐氏正肅公之孫既歸錢氏紹聖初隨其姑長公主入謝欽宗向后於禁中先有戚里婦數人在焉俱從后步過受釐殿同行者皆仰視讀釐為離夫人笑於旁曰受禧也取宣室受釐之義耳后喜回顧主曰好人家男女終是别蓋后亦以是謂也施聖與嘗使金親王至不肯退班一時稱其有守後金使至闕問館伴云師點今居何官館伴宇文價於班列中指聖與示之金使恍然曰一見正人令人眼明宋贈鄂王嶽飛諡忠武文曰李將軍口不出辭聞者流涕藺相如身雖已死凛然猶生又曰易名之典雖行議禮之言未一始為忠愍之號旋更武穆之稱獲睹中興之舊章灼知皇祖之本意爰取危身奉上之實仍采勘定禍亂之文合此兩言節其一惠昔孔明之志興漢室子儀之光復唐都雖計效以或殊在秉心而弗異垂之典册何嫌今古之同辭賴及子孫將與河山而並久然今天下嶽祠皆稱武穆此未定之諡當稱忠武為宜詆毁第四十一郭昱狹中詭僻登顯德進士耻赴常調獻書於宰相趙普自比巢由朝議惡其矯激故不調後復伺普望塵自陳普笑謂人曰今日甚榮得巢由拜於馬前吳僧贊寧頗讀儒書博覽強記而辭辨縱橫人莫能屈時有安鴻漸者文辭雋敏尤好嘲咏嘗街行遇贊寧與數僧相隨鴻漸指而嘲曰鄭都官不愛之徒時時作隊贊寧應聲答曰秦始皇未坑之輩往往成羣時皆善其捷對鴻漸所道乃鄭谷詩云愛僧不愛紫衣僧也太祖嘗與趙中令普議事不合喟然曰安得宰相如桑維翰者與之謀乎普對曰使維翰在陛下亦不用蓋維翰嗜錢太祖曰茍用其長亦當護其短措大眼孔小賜十萬貫則塞破屋子矣國初宋琪沈義倫俱在黃閣時久旱既雨復不止廣陌塗淖琪厭之謂義倫曰可謂燮成三日雨而義倫遽對曰調得一城泥藝祖知而耻大臣之不學楊徽之聞而抵掌曰不意中書再生沈宋丁晉公為玉清昭應宫使每遇醮祭即奏有仙鶴儛於殿廡之上及記真宗東封方升中展事而羣鶴迎繞前後瀰望不知其數至於天書所降亦必奏有鶴導之時寇萊公判陜府一日坐山亭中有烏鴉數十飛鳴而過萊公笑顧屬僚曰使丁謂見之當復目為仙鶴矣每自以令威之裔好言仙鶴故世號為鶴相猶唐李逢吉呼牛僧孺為丑座也丁晉公詩有天門九重開終當掉臂入王元之見曰入公門鞠躬如也天門豈可掉臂入乎此人必不忠夏竦嘗統師西伐揭榜塞上云有得元昊頭者賞錢五百萬貫爵西平王元昊使人入市賣箔陜西荻箔甚髙倚之食肆外佯為食訖遺去至晚食肆竊喜以為有所獲徐展之乃元昊購竦之榜懸箔之端云有得夏竦頭者賞錢兩貫文竦聞之急令藏掩而已喧播逺近竦大慚沮許懷德為殿帥嘗有一舉人因懷德乳姥求為門客懷德許之舉子曵襴拜於庭下懷德據座受之人謂懷德武人不知事體密謂之曰舉人無沒階之禮宜少降接也懷德應之曰我得打乳姥關節秀才只消如此待之文潞公入相因張貴妃也貴妃父堯封嘗為彥博父洎門客貴妃因認彥博為伯父亦欲得士大夫為助耳彥博知成都貴妃以近上元令織異錦為獻彥博遂令工人織金線燈籠載蓮花中為錦又為秋千以備寒食貴妃始衣之以見上上驚曰何處有此錦妃正色曰昨令成都文彥慱織來以嘗與妾父有舊然妾安能使之蓋彥博奉陛下耳上色怡自爾屬意彥慱自成都歸不久參知政事貝州王則叛朝廷遣明鎬往討之賊將破上以近京甚憂之一日宫中語曰執政大臣無一人為國家分憂者日日上殿無有取賊意貴妃明日密令人語彥博明日上殿乞身往破賊上大喜以彥博任統軍至則鎬已下貝州則成擒矣捷書至遂就路拜彥博同平章事後因監察御史唐介疏論召彥博殿上靣質竒錦事數件皆實有詔彥博守故官出知許州明年上元中官有詩曰無人更進燈籠錦紅粉宫中憶佞臣上聞此句亦笑仁宗一日幸張貴妃閣見定州紅瓷器帝怪問曰安得此物妃以王拱辰所獻為對帝怒曰嘗戒汝勿通臣僚餽遺不聼何也因以所持柱斧碎之妃愧謝久之乃已妃又嘗侍宴於端門服所謂燈籠錦者上亦怪問妃曰彥博以陛下眷妾故有此獻上終不樂或曰潞公夫人遺妃公不知也唐子方之貶梅堯臣作書竄詩曰皇祐辛卯冬十月十九日御史唐子方危言初造膝曰朝有巨姦臣介所憤疾願條一二事臣職敢妄率巨姦宰相博邪行世莫匹曩時守成都委曲媚貴昵銀璫插左貂窮臘使馳驛邦媛將夸侈中賫金十鎰為我寄使君竒紋織纎密遂傾西蜀巧日夜急鞭抶紅經緯金鏤排科鬬八七比比雙蓮花篝燈戴星出幾日成一端馳行如鬼疾明年觀上元𬒳服穩稱質燦然驚上目遽爾有薄詰既聞所從來接對似未失且云奉至尊於妾豈能必遂回天子顔百事容丐乞臣今得初陳狡猾彼非一偷威與賣利次第推甲乙是惟隂猾雄仁斷宜勇黜必欲至太平在列無如弼弼亦昧平生况臣不阿屈臣言天下公奚以身自恤君傍有側臣喑啞橫詆斥指言為罔上廢汝還蓬蓽是時白此心尚不畏斧鑽雖令禦魑魅甘且同飴蜜既如勿可懼復以強詞窒帝聲亦大厲論奏不容必介也容甚間猛士股為憟立貶嶺外春速欲為異物內外臣恟恟陛下何未悉即敢救者誰襄執左史筆謂此儻不容盛美有所咈平明中執法懷疏又堅述介言或似狂百豈無一實恐傷四海和幸勿若倉卒亟許遷英山衢路有嗟咄翼日宣白麻稱快口盈溢阿附連諌官去若懷絮虱其問因獲利竊笑等蚌鷸英州五千里瘦馬行䭿䭿毒蛇噴曉霧晝與嵐氣沒妻孥不同塗風浪過蛟窟存亡未可知旅館愁傷骨飢僕時後先隨猿拾橡栗越林多蔽天黃柑維丹橘萬室通釀酤撫逺無禁律醉去不須錢醒來弄明瑟山水仍竒怪巳可消愁鬱莫作楚大夫懷沙自沉汩西漢梅子真出為吳市卒市卒且不慚况兹别秉秩始堯臣作此詩不示人及歐陽文忠公為編其集時有嫌避又削去此詩是以人少知者以潞公之賢而疑其有此及閲梅聖俞之詩而疑益甚後乃知此事出於碧雲騢乃襄陽魏秦所作而嫁其名於堯臣者其書詆毁時賢雖范文正狄武襄輩俱不能免人亦何苦用心若是范文正公始以獻百官圖譏切吕許公坐貶饒州梅聖俞時官旁郡作靈烏賦以寄所謂事將兆而獻忠人返謂爾多凶公亦作賦報之有言知我者謂吉之先不知我者謂凶之類及公秉政聖俞久困意公必援已而漠然無意所薦乃孫明復季秦伯聖俞有違言遂作靈烏後賦以責之略云我昔閔汝之忠作賦弔汝今主人誤豐爾食安爾巢而爾不復啄叛臣之目伺賊壘之去反憎鴻鵠之不親愛燕雀之來附意以其西師無成功世頗以聖俞為隘荆公素輕沈文通遘以為寡學故贈之詩曰翛然一榻枕書卧直到日斜騎馬歸及作文通墓志遂云公雖不嘗讀書或規之曰渠乃狀元此語得無太過乃改讀書作視書又嘗見鄭毅夫獬夢仙詩曰授我碧簡書竒蟠丹砂讀之不可識翻身凌紫霞大笑曰此人不識字不勘自承毅夫曰不然吾乃用太白語也公又笑曰自首減等白詩云遺我鳥迹書飄然落岩間其字乃上古讀之了不間東坡云李白尚氣乃自招不識字不如韓愈崛強云我寧屈曲自世間安能隨汝巢神山也富鄭公初甚欲見黃山谷及一見便不喜語人曰將謂黃某如何原來只是分寧一茶客陳無已詩話云某公用事排斥端士矯飾偽行范蜀公詠僧房假山詩曰倐忽平為險分明假奪真某公指荆公也又一假山詩云安石作假山其中多詭怪雖然知是假爭奈主人愛世以為東坡所作王荆公素不樂滕元發鄭毅夫目為滕屠鄭酤然二公豪邁殊不病其言毅夫為內相一日送客出郊過朱亥冡俗謂之屠兒原者因作詩曰髙論唐虞儒者事賣交負國豈勝言慿君莫笑金椎陋却是屠酤解報恩王荆公知制誥一日賞花釣魚宴內侍各以金楪盛釣餌藥置几上安石食之盡明日仁宗謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也常不樂之後安石自著日録厭薄祖宗仁宗為甚每謂漢文不足取其心薄仁宗也故一時大臣富弼文彥博韓琦皆為其詆毁云熙寧七年四月王荆公罷相鎮金陵是秋江左大蝗有無名子題詩賞心亭曰青苗免役兩妨農天下嗷嗷怨相公惟有蝗蟲感恩德又隨旌斾過江東荆公一日餞客至亭上覽之不悅而莫知作者為何人王荆公柄國時有人題相國寺壁云終嵗荒蕪湖浦焦貧女戴笠落柘條阿儂去家京洛遙驚心寇盜來攻剽人皆以為夫出婦憂荒亂也及荆公罷相子瞻召還諸公飲蘇寺中以此詩問之蘇曰於貧女句可以得其人矣終嵗十二月也十二月為青字荒蕪田有草也草田為苖字湖浦焦水去也水旁去為法字女戴笠為安字柘落木條剩石字阿儂是吳言合吳言為誤字去家京洛為國寇盜為賊民蓋言青苖法安石誤國賊民也文思副使方圭好為惡詩逢人即誦數十篇其言喋喋可憎宋丞相庠以資政殿學士知揚州圭假道淮上一日宋宴客於平山堂圭談詩於坐宋惡之欲已圭之詞時望見野外一牛就樹磨癢宋顧坐客胡恢曰青牛恃力狂挨樹恢應聲答曰妖鳥啼春不避人宋公大笑圭曉其意洎飲罷至客次奮拳擊恢衆救之而免劉貢父作給事中時鄭穆學士表請致仕狀過門下省劉謂同舍曰宏中請致仕為年若干答者云鄭年七十三劉遽曰慎不可遂其請問其故劉曰且留取伴八十四底時潞公年八十四再起平章事潞公聞之甚不懌宏中穆字也蘇子瞻曰豫一日醉卧有魚頭鬼身者自海中來云廣利王請端明豫披褐黃冠而去亦不知身入水中但聞風雷聲有頃豁然明目疑入水晶宫其下驪目夜光文犀尺璧南金火齊不可仰視間以珊瑚琥珀廣利佩劍冠服而出從二青衣豫曰海上逐客重煩邀命有頃東華真人南溟夫人亦至出鮫綃丈餘命豫賦詩豫寫竟進廣利諸仙迎看稱妙獨廣利旁一冠簮者謂之鱉相公進言蘇軾不謹祝融二字犯王諱王大怒斥出豫退而歎曰某到處被鱉相公厮壞東坡一日會客坐客舉令欲以兩卦名證一故事一人云孟嘗門下三千客大有同人一人云光武兵渡滹沱河既濟未濟一人云劉寬婢羮汙朝衣家人小過東坡云牛僧孺父子犯罪大畜小畜蓋指荆公父子也司馬溫公之亡當明堂大享朝廷以致齋不及奠肆赦畢蘇子瞻率同輩以往程正叔固爭引論語子於是日哭則不歌子瞻曰明堂乃吉禮不可謂歌則不哭正叔又諭司馬諸孤不得受弔子瞻戲曰頥可謂燠糟鄙俚叔孫通司馬文正公薨時程正叔以臆説斂之正如封角狀東坡嫉其怪妄因怒詆曰此豈信物一角附上閻羅大王者耶唐虞堯卿以傭保起家托附權勢盜用鹽鐵錢六十萬緍畢師鐸之亂廣陵陷亡命為仇所殺棄尸衢中其妻以紙絮葺棺斂之好事者題其上曰信物一角附至阿鼻地獄請去斜封送上閻羅大王坡語本此東坡云石介作三豪詩其略云曼卿豪於詩永叔豪於文而杜默師雄豪於歌也永叔亦贈默詩云贈之三豪篇而我濫一名默之歌少見於世初不知之後見其一篇云學海波中老龍聖人門前大蟲皆此等語甚矣介之無識也永叔不欲嘲笑之者公素惡爭名且為介諱也吾觀杜默豪氣正是京東學究飲私酒食瘴死牛肉醉飽後所發者也作詩狂怪至盧同馬異極矣若更求竒便作杜默矣劉元城言哲宗皇帝嘗因春經筵講罷移坐小軒中賜茶自起折一柳枝程頥為説書遽起諌曰方春萬物生榮不可無故摧折哲宗色不平因擲棄之溫公聞之不樂謂門人曰遂使人主不欲親近儒生正為此輩太后聞之歎曰怪鬼壞事吕晦叔亦不樂其言也云不須得如此沈明逺寓簡曰程氏之學自有佳處至椎魯不學之人竄趾其中狀類有德其實土木偶也而盜一時之名東坡譏罵略無假借人或過之不知東坡之意懼其為楊墨將率天下人流為矯虔庸惰之習也闢之恨不力耳豈過也哉張文潛耒嘗問張安道云司馬君實直言王介甫不曉事是如何安道云賢只消去看字説文潛云字説也只是二三分不合人意安道云若然則足下亦有八九分不解事矣劉貢父言每見介甫道字説便待打諢杜少陵宿龍門詩云天闕象緯逼王介甫改闕為閲黃山谷對衆極言其是劉貢父聞之曰直是怕他章子厚為侍從遇其生朝會客門人林特以詩為夀子厚出詩示客指其頌德處歎以為工特頗不平忽曰昔人有令畫工傳神以其不似命别為之既又以為不似凡三四易畫工怒曰若畫得似處是甚模樣滿座烘然章惇罷相俄落職林公希為舍人當制詞云悻悻無大臣之節怏怏非少主之臣章相寄聲曰此一聨毋乃太甚林答曰長官發惡雜職棒毒無足怪也紹聖初召拜首台翰林曾子宣草麻洎庭宣有赤舄几几南山巖巖之語時大夫語云今則几几巖巖奈硜硜鞅鞅乎章子厚與蘇子瞻小時相善一日章坦腹而卧適子瞻自外來章摩其腹以問子瞻曰公道此中何所有子瞻曰都是謀反底家事趙挺之為御史彈黃魯直除右丞不當蓋係御史中丞孫覺之壻户部尚書李常之甥左司郎中黃亷之姪翰林學士蘇軾歌笑詼諧之友曾布以翰林學士權三司坐言市易事落職知繞州舍人許將當制頗多斥詞許是曾公所引心不自安往曾許謝過曾曰君不聞宋子京之事乎昔晏元獻當國子京為翰林學士晏愛宋之才雅欲旦夕相見遂稅一第於旁近延居之遇中秋啓燕晏召宋出妓飲酒賦詩達旦方罷翼日罷相宋當草詞頗極詆斥至有廣營産以植私多役兵而規利之語方子京揮毫之際昨日餘酲尚在左右觀者亦駭蓋此事由來逺矣何足校耶許憮然而去蘇子由以為晏之罷相由仁宗恨其撰章懿太后志文不實更以其名在圖讖欲加重罰賴子京止以他罪罪之得免深譴也蔡卞妻七夫人是荆公女頗知書能詩詞蔡每有國事先謀之牀第然後宣於廟堂時執政相語曰吾輩每日奉行者皆其咳唾之餘也蔡拜右相家宴張樂伶人揚言曰右丞今日大拜都是夫人裙帶中外傳以為笑張天覺言近世文館寂寞向所謂有文者歐陽修己老劉敞已死王圭王安石已登兩府後來所謂有文者皆五房檢正三舍直講崇文校書間有十許人今日之所謂詞臣者曰陳絳曰王益柔曰許將而已覺嘗評之陳絳之文如欵假學驥筋力雖勞而不成步驟王益柔之文如村夫織機杼雖成幅而不成錦繡許將之文如稚子吹塤終日喧呼而不合律吕此三人者皆以出辭令行詔誥而揚作外庭者也今其文如此恐不足以發帝猷炳王度矣王景亮與鄰里仕族浮薄子數人結為一社純事嘲誚士大夫無問賢否一經諸人之目無有不𬒳不雅之名者嘗號其里為豬嘴關元祐間吕惠卿察訪東京吕天姿清瘦每説語輒以雙手指畫社人因目為説法馬留時邵箎以上殿泄氣出知東平邵髙鼻圈鬈髯社人目為泄氣師子景亮又從而足為七字對曰説法馬留為察訪泄氣師子作知州惠卿大銜之因諷部使者發以他事舉社皆虀粉矣蓋口之為業非獨發人隂私敗人成事賈禍斂怨禍亦及之宋元祐黨籍碑成於蔡氏父子其意則王安石啓之也安石嘗作曹杜詩以寓意謂神姦變化自古難知辨之而不疑者惟禹鼎焉魑魅合謀蓋非一日太丘之社其亡也晚蓋以喻新法異意之人將為宋室之禍也其後門生子壻相繼得政果鑄寶鼎列元祐諸賢司馬光而下姓名於其上以安石比禹績而以司馬諸公為魑魅吕惠卿載諸謝章曰九金聚粹畫圖魑魅之形自此黨論大興賢才消伏卒致邊疆不守赤縣丘墟一言喪邦安石之謂也後金兵入汴見鑄鼎之象而歎曰宋之君臣用舍如此焉得久長遂怒而擊碎之崇寧間初興學校州郡建學聚學糧日不暇給士人入辟雍皆給劵一日不可緩緩則謂之害學政議罰不少貸已而置居養院安濟坊漏澤園所費尤大朝廷課以為殿最往往竭州郡之力僅能枝梧諺曰不養健兒却養乞兒不管活人只管死尸建中靖國初有前與紹聖共政者欲反其類道建議盡召元祐流人還朝以為身謀未幾元祐諸人並集不肯為之用則復逐之而更召所反者既至亦惡其翻覆排之尤力其人卒不得安其位而去張藝叟時以元祐人先罷居長安里中間之壁間適有扇架戲題其下曰扇子解招風本要熱時用秋來挂壁間却被風吹動時競傳之以為笑陳和叔繹為舉子時通率少檢後舉制科驟為質村淳古之狀時謂之熟熱顔回熙寧中孔文仲對制策言時事有可痛哭歎息者執政惡而黜之繹時為翰林學士語於衆曰文仲狂躁真杜園賈誼也王平甫曰曰杜園賈誼可對熟熱顔回合坐大噱繹有慚色杜園熱熟皆當時鄙語魏秦道輔自號臨漢隱君著東軒雜録續録訂誤詩話等書又有一書譏評巨公偉人闕失目曰碧雲騢取莊獻明肅太后垂簾時西域貢名馬頸有旋毛文如碧雲以是不得人御間之意嫁其名於梅堯臣聖俞蔡攸嘗賜晏禁中徽宗頻以巨觥宣勸之攸懇辭不任杯酌將至顛踣上曰就令灌死亦不至失一司馬光也由是言之則上之尊光而薄攸至矣然光已死不免追奪而攸迄被寵眷是可歎也王黼雖為相然事徽廟極褻宫中使內人為市黼為市令若東昏之戲一日上故責市令撻之取樂黼窘呼曰告堯舜免一次上笑曰吾非唐虞汝非稷契也又一日與踰垣微行黼以肩承帝趾墻峻微有不相接處上曰聳上來司馬光黼應曰伸下來神宗皇帝君臣相謔乃爾徐神翁自海陵到京師蔡魯公謂徐云且喜天下太平是時河北盜賊方定徐云太平天上方遣許多魔君下生人間作壞世界蔡云如何識得其人徐笑云太師亦是蔣頴叔為發運使至泰州謁徐神翁坐定一無所説將起忽自言曰天上人間都不定疊蔣因叩之曰天上已遣五百魔王來世間作官安得定疊蔣復叩以身之休咎徐謂之曰發運使亦是一赤天魔王也宣和末黃安時曰亂作不過一二年矣天使蔡京八十不死病亟復蘇是將使之身受禍也天下其能久無事乎靖康兵亂宣和舊臣悉已逺竄安時居夀春歎曰造禍者全家盡去嶺外避地却令我輩橫尸路隅耶安時卒死於兵可哀也汪彥章投李伯紀啓云孤忠貫日正二儀傾側之中凛氣橫秋揮萬騎笑談之頃又云士訟公冤咸舉幡而集闕下帝從民望令免胄以見國人其贊美至矣及居翰苑草伯紀謫詞乃云朋姦罔上有虞必去於歡兜欺世盜名孔子先誅於正卯又云專殺尚威傷列聖好生之德信讒喜佞為一時羣小之宗伯紀真君子而醜詆至此且與前啓又何反也當時亦有以此問彥章者彥章云我前啓自直一翰林學士而彼不我用安得不醜詆之是可笑也渡江初吕元直作相堂厨每廳日食四千至秦會之當國每食折四十餘千執政有差於是始不會食胡明仲侍郎曰雖欲伴食不可得矣蜀人任子淵好謔鄭宣撫剛中自蜀召還蓋秦會之欲害之也鄭治蜀有惠政人猶覬其復來暨聞秦氏之指俱大失望衆中或曰鄭不來矣子淵對曰秦少恩哉當時稱其敢言南渡諸將俱封王尊榮安富而張循王俊尤善治生其罷兵而歸嵗收租米六十萬斛紹興間內宴有優人作善天文者云世間貴人必應星象我悉能窺之法當用渾天儀設玉衡若對其人窺之見星而不見人玉衡不能卒辦用銅錢一文亦可乃令窺光堯云帝星也秦師垣曰相星也韓蘄王曰將星也張循王曰不見其星衆皆駭復令窺之曰中不見星只見張郡王在錢眼內坐殿上大笑洪景盧奉使其父忠宣嘗薦之景盧為金困辱而歸太學諸生作詞云洪邁被拘留垂哀作楚囚七日忍飢猶不耐堪羞蘇武曽經十九秋厥父既無謀厥子安能解國憂萬里歸來誇舌辨村牛好擺頭時不擺頭蓋洪好搖頭也孝宗時大旱有詔迎天竺觀音就明慶寺請禱或作詩曰走殺東頭供奉班傳宣聖旨到人間太平宰相堂中坐天竺觀音却下山趙溫叔雄由是免相真文忠公德秀負一時重望端平更化人傒其來若元祐之涑水翁也是時楮輕物貴民生頗艱意真儒一用必有建明轉移之間立可致治於是民間為之語曰若欲百物賤直待真直院及童馬入朝敷陳之際首以尊崇道學正心誠意為苐一義繼而復以大學衍義進愚民無知乃以其言為不切於時務復以俚語足前句云喫了西湖水打了一鍋麵市井小兒囂然誦之繼參大政未及有所建置而薨魏了翁督師亦未及有所經略而罷臨安優人裝一儒生手持一鶴别一儒生與之邂逅問其姓名曰姓鍾名庸問其手持何物曰大鶴也因傾蓋歡然呼酒對飲其人大嚼洪吸酒肉靡有孑遺忽顛仆於地數人曵之不動中一人乃批其頰大罵曰説甚中庸大學吃了許多酒肉一動也動不得遂一笑而罷西山省試主文有輕薄子作賦云誤南省之多士真西山之餓夫沈子固先生曰道學之名起於元祐盛於淳熙其徒甚盛其間假此以欺世者真可噓枯吹生凡治才賦者則目為聚斂開閫扞邉者則目為粗材讀書作文者則指為玩物喪志留心吏事者則斥為刀筆舞文蓋其所讀者止四書近思録通書太極圖西銘及諸家語録之類自詭其學能正心齊家至於治國平天下故為之説曰為天地立心為生民立極為前聖繼絶學為萬世開太平凡為州為縣為監司必須建立書院及道統諸賢之祠或刋注四書衍緝近思録等文則可釣聲譽致通顯下而士子時文必須引以𥪡義則亦擢巍科而稱名士否則立身如溫國文章氣節如東坡皆非本色也於是天下之士競趨之稍有違異其黨必擠之為小人雖時君亦不得而辨之其氣焰可畏如此然所言所行了不相顧往往皆不近人情之事馴至淳祐咸平則此弊極矣是時為朝士者必議論憒憒頭腦冬烘弊衣菲食出則乘破竹轎舁之以村夫髙巾破履人望而知其為道學君子顯達清要旦夕可致也然其家囊金匱帛至為市人所不為賈師憲獨持相權惟恐有攘之者則專用此輩列之要路名為尊崇道學其實幸其闒茸不才不致掣其肘以是馴致萬事不理喪身亡國鳴呼孰謂道學之禍不甚於典午之清談乎陳同甫亦曰今世之儒士自謂得正心誠意之學者皆風痺不知痛癢之人也舉一世安於君父之大讎而方且揚眉拱手以談性命不知何者謂之性命乎周公謹有言世有一種淺陋之士自視無堪以為進取之地輒亦自附於道學之名褒衣博帶危坐濶步或鈔節語録以資高談或低眉合眼號為默識而試叩其所學則古今無所聞知考驗其所行則義利無所分别此聖門之大罪人也同甫所嫉者正為此輩爾世有嘐嘐然以不仕為高而其經營反甚於躁進者或不得間而入故為小異以去矯托恬退往往竊浮聲而躋榮膴世終不悟也俗謔有窮書生欲噉饅頭計無從得一日過市見有列肆而鬻者輒大呼仆地主人驚問曰吾畏饅頭主人曰安有是理乃設百許枚空室閉之徐伺於外寂不聞聲穴壁窺之則以兩手摶撮而食殆過半矣亟開門詰其然曰吾見此忽自不畏主人知其紿怒而斥曰若尚有畏乎曰有猶畏臘茶兩碗耳理宗朝嘗欲舉行推回畝田之令議而未決至賈似道當國卒行之有人作詩曰三分天下二分亡猶把山川寸寸量縱使一丘添一畝也應不似舊封疆又云量盡山田與水田只留滄海與青天如今那有間州渚寄語沙鷗莫浪眠又有作沁園春詞云道過江南泥墻粉壁右具在前述何縣何鄉里住何人地佃何人田氣象蕭條生靈憔悴經界從來未必然惟何甚為官為己不把人憐思量幾許山川况土地分張又百年西蜀巉巖雲迷鳥道兩淮清野日警狼煙宰相弄權姦人罔上誰念干戈未息肩掌大地何須經理萬取千焉樞密使文及翁錢塘遺事作陳藏一亦嘗作百字令詠雪以譏之云沒巴沒鼻煞時間做出漫天漫地不問髙低併上下平白都教一例鼓弄滕六招邀巽二只恁施威勢識它不破至今道是祥瑞最苦是鵝鴨池邉三更半夜誤了吳元濟東郭先生都不管掩上門兒穩睡一夜東風三竿紅日萬事隨流水東皇笑道山河原是我的賈似道當國御史陳伯大奏立士籍凡應舉及免舉人州縣給厯一道親書年貌世系及所肆業於厯首執以赴舉過省參對筆迹異同以防偽濫時有詩譏之云戎馬掀天動地來襄陽城下哭聲哀平章束手全無䇿却把科場惱秀才又有作沁園春云國步多艱民心靡定誠吾隱憂歎浙民轉徙怨寒嗟暑荆襄死守閲嵗經秋寇未易支人將相食識者深為社稷羞當今亟出陳大諌箸借留矦迂濶為謀天下士如何可籍收况君能堯舜臣皆稷契世逢湯武業比伊周政不必新貫宜仍舊莫與秀才做盡休勸吾元老廣四門賢路一柱中流又詞云士籍令行條件分明逐一排連問子孫何習父兄何業明經詞賦右具如前最是中間娶妻某氏試問於妻何與焉鄉保舉那當著押開口論錢祖宗立法於前又何必更張萬萬千算行關改會限田放糴生民凋瘁膏血俱朘只有士心僅存一脈今又艱難最可憐誰作俑陳堅伯大附勢專權似道令人販鹽百艘至臨安賣之太學生有詩云昨夜江頭長碧波滿船都載相公鹺雖然要作調羮用未必調羮用許多景定甲子七月初二日彗見東方昭示天邉有詔責巳求直言京庠唐棣上言指切賈丞相云大臣德不足以居功業之髙量不足以展經綸之大七司條例一旦變更薪茗榻藏香椒積壓與商販爭微利致兩浙無富家夾袋不收拾人才而遍諸賤伎之姓名化地不斡旋陶冶而恣行非僻之方術挾不肖之騃弟以卿月而弄風月於花衢招無賴之博徒以秋􅊤而厭溪􅊤於槐闥踏青泛緑不思萬井之蕭條醉醲飽鮮遑恤百貨之騰踊劉良貴賤丈夫也乃倚之以揚鷹犬之威董宋臣非巨蠧哉復縱之而出虎兕之押人心怨怒致此彗妖誰秉國鈞盍執其咎嘉泰開禧間郭倪位殿巖賔客日盛相與慫慂直以為卧龍復出酒後輒咏三顧頻煩兩朝開濟之句屏風扇靣一一皆書此二句遂逢當軸意以興六月之師吳衡守旴𣅿過見之於揚倪迎謂曰君所謂洗腳上船也豫生西陲如斜谷祁山皆狹隘可守而不可出豈若得平衍空曠之地掉鞅成大功顧不快耶陳景俊為隨軍漕先行燕之中席酌酒曰木牛流馬則以煩公衆咸笑之倬既潰於符離僎又敗於儀真自度不復振對客泣數行下時彭法傳師為法曹好謔適在座謂人曰此帶汁諸葛也傳者莫不拊掌唐源休受朱泚偽官自比蕭何之功入長安日首收圖籍時人笑之目曰火迫鄼矦正可作對也杭僧溫日觀善畫蔔萄性嗜酒唯楊總統飲以酒則不一沾唇見輒罵曰掘墳賊掘墳賊至元丙子淮南閫帥夏貴歸附大元授中書左丞至己卯嵗死有贈以詩云自古誰無死惜公遲四年問公今日死何似四年前又有弔其墓云享年八十三而不七十九嗚呼夏相公萬代名不朽昔宋禇彥回身事二姓弟照歎曰使淵作中書而死不當是一名士耶世德不昌令有期頥之夀宋稗類鈔卷二十四
