body:
  text: 宋稗𩔖鈔卷三十二常熟潘永因編古玩第五十五鄱陽張世南宦遊紀聞云辨博書畫古器前軰葢嘗著書矣其間有論議而未詳明者如臨摹硬黄響榻是四者各有其説今人皆謂臨摹為一體殊不知臨之與摹逈然不同臨謂置紙在旁觀其大小濃澹形勢而學之若臨淵之臨摹謂以薄紙覆上隨其曲折婉轉用筆曰摹硬黄謂置紙熱熨斗上以黄蠟塗勻儼如枕角毫釐必見響榻謂以紙覆其上就明窗牖間映光摹之辨古器則有所謂𣢾識臘茶色朱砂斑真青緑井口之𩔖方為真古其製作有雲紋雷紋山紋輕重雷紋垂花雷紋鱗紋細紋粟紋蟬紋黄目飛亷饕餮蛟螭虬龍麟鳯熊虎龜蛇鹿馬象鸞䕫犧蜼鳬雙魚蟠虺如意圜絡􅌉雲百乳鸚耳貫耳偃耳直耳附耳挾耳獸耳虎耳獸足䕫足百獸三螭穟草瑞草帶若蚪結之勢星帶四旁飾以星象輔乳鍾名用以節樂者碎乳鍾名大乳三十六外復有小乳周之立䕫雙䕫之𩔖凡古器制度一有合此則以名之如雲雷鍾鹿馬洗鸚耳壺之𩔖是也如有𣢾識則以𣢾識名如周叔夜鼎齊侯鍾之𩔖是也古器之名則有鍾大曰特中曰鍾小曰編鼎尊罍彛舟𩔖洗而有耳卣音酉又音由中尊器也有攀葢足𩔖壺瓶爵斗有耳有流有足流即觜也巵觶之鼓切酒觴也角𩔖彛而無柱桮敦簠其形方簋𩔖鼎而矮葢冇四足豆獻牛偃切無底甑也錠徒徑切又都定切斚觚鬲形製同鼎漢志謂空足曰鬲鍑才宥切似釡而大其實𩔖小瓮而有環盉户戈切又胡卧切盛五味之器也似鼎而有葢有觜有執攀壺其𩔖有四曰圓曰匾曰方曰温盫于舍切覆葢也似洗様而腰大有足有提攀瓿蒲後切𩔖壺而矮鋪𩔖豆鋪陳薦獸之義罌𩔖釡鑑盛水器上方如斗鏤底如風窗下設盤以盛之匜代支切沃盥器盤洗盆鋗呼𤣥切𩔖洗玉篇云小盆也杅磬錞鐸鉦𩔖鍾而矮鐃戚鐓飾物柄者奩鑑即鋭節鉞戈矛盾弩機表坐旂鈴刀筆杖頭蹲龍宫廟乗輿之飾或云闌楯間物鳩車兒戯之具提梁龜蛇硯滴車輅托轅之屬此其大概難於盡備然知此者亦思過半矣所謂𣢾識乃分二義𣢾謂陰字是凹入者刻畫成之識謂陽字是挺出者正如臨之與摹各自不同也臘茶色亦有差别三代及秦漢間器流𫝊世間歲月寖乆其色㣲黄而潤澤今士大夫間論古器以極薄為真此葢一偏之見也亦有極薄者有極厚者但觀製作色澤自可見也亦有數百年前句容所鑄其藝亦精今鑄不及畢竟黒而燥須自然古色方為真古器也趙􅛽鵠洞天清録集古鍾鼎彛器辨云夏尚忠商尚質周尚文其制器亦然商器質素無文周器雕細密此固一定不易之論而夏器獨不然余嘗見夏琱戈於銅上相嵌以金其細如髪夏器大抵皆然歲乆金脱則成陰窾以其刻畫者成凹也銅器入土千年純青如鋪翠其色子後稍澹午後乗陰氣翠潤欲滴間有土蝕處或穿或剥並如蝸自然或有斧痕則是偽也銅器墜水千年則純緑色而瑩如玉未及千年緑而不瑩其蝕處如前今人皆以此二品體輕者為古不知器大而厚者銅性未盡其重止能減三分之一或減半器小而薄者銅性為水土蒸淘亦盡至有鉏擊破處並不見銅色惟翠緑徹骨或其中有一線紅色如丹然尚有銅聲傳世古則不曾入水土惟流𫝊人間色紫褐而有硃砂班甚者其班凸起如上等辰砂入釡以沸湯煑之良乆班愈見偽者以漆調朱為之易辨也三等古銅並無腥氣惟土古新出土尚帶土氣乆則否若偽作者熱摩手心以擦之銅腥觸鼻所謂識紋𣢾紋亦不同識乃字以紀功所謂銘書鍾鼎夏用鳥跡商則蟲魚周以蟲魚大秦用大小漢以小𨽻書三國𨽻書晉宋以來用楷書唐用楷𨽻三代用陰識謂之偃蹇字其字凹入也漢以來或用陽識其字凸間有凹者或用刀刻如鐫碑葢陰識難鑄陽識易為决非三代物也顔色臭味足矣夫二書之論銅器固已粲然具備然清修好古之士又不可不讀經傳紀録以求其源委如薛尚功𣢾識法帖及重廣鍾鼎韻七卷者宣和博古圖吕大臨考古圖王俅嘯堂集古録黄睿東觀餘論董逌廣川書䟦等書皆當熟味徧參而㫁之以經庶可精鑒也錢思公生長富貴而性儉約閨門用度為法甚謹子弟軰非時不能輒取一錢公有一珊瑚筆格平生尤所珍惜常置之几案子弟有需錢者輒竊而藏之公即悵然自失乃榜於家庭以十千購之居一二日子弟佯為求得以獻公欣然以十千與之他日有欲錢者又竊去一歲中率五七如此公終不悟也六一居士曰余家有玉罌形製甚古始得之以為碧玉在頴時嘗以示僚属坐間兵馬鈐轄鄧保吉真宗朝老内臣也識之曰此謂之翡翠云禁中寳物皆藏宜聖庫庫中有翡翠盞一隻所以識也其後余偶以金環于罌腹信手磨之金屑紛紛如研中磨墨王荆公受賜玉帶濶十四稻號玉抱肚真廟時趙徳明所貢至紹興中王氏猶藏之曾孫奉議郎璹始復進入禁中東坡為李伯時作洗玉池銘曰世忽不踐以用為急秦漢以還龜玉道熄六器僅存五瑞莫輯趙璧歸玩魯璜盗竊䑕亂鄭璞鵲抵晉棘維伯時父吊古啜泣道逢玉人解驂推食劍璏􅀈珌錯落其室晚𫉬拱寶遂空四璧哀此命世乆就淪蟄時節沐浴以幸斯石孰推是心施及王國如伯時父琅然環玦援手之勞終睨莫拾得喪在我匪玉欣戚抽翰銘之維以咏徳伯時自為跋曰元祐八年余時仕京師居紅橋子第得陳峽州馬臺石愛而致之齋中一日東坡過謂余曰斵石為沼當以所藏玉時出而浴之且刻其形於四旁予為子銘其脣而號為洗玉池而所謂玉者凡一十六雙琥璩三鹿盧環琫珌璊瑑杯水蒼珮螳螂鉤佩柄珈瑱拱璧是也伯時既下世池亦堙晦徽宗嘗即其家訪之得於積壤中其子因避時禁磨去銘文以授使者於是置宣和殿十六玉唯鹿盧環從葬龍眠餘悉歸内府東坡有與李方叔公據葢恐方叔賣所遺玉鼻騂為立公據以便之公據劵也山谷跋曰子瞻妙墨作劵或責方叔當成之安用汲汲索錢此又不識痒痛者從傍論砭疽爾蔡君謨為歐陽文忠書集古録目序刻石其字尤精勁為世所珍文忠以䑕鬚栗尾筆銅緑筆格大小龍茶惠山泉等物為潤筆君謨大笑以為太清而不俗後月餘有人遺文忠以清泉香餅一篋者君謨聞之歎曰香餅來遲使我潤筆獨無此一種佳物清泉地名香餅石炭也用以焚香一餅之火可終日不滅王禹玉作龎潁公神道碑其家送潤筆金帛外参以古法書名畫三十種杜荀鶴及第試卷亦是其一翰林學士王寓謝賜筆扎記云宣和七年八月二十一日一夕凡草四制翼日遣中使至玉堂賜以上所常御筆研等十三事紫青石研一方琴光漆螺甸匣一宣和殿墨二斑竹筆一金華筆格一塗金鎮紙天禄二塗金研滴蝦蟆一貯黏麯塗金方奩一鎮紙象尺二薦研紫栢牀一王方啟封時研間漬墨未乾奩中餘麯猶存承平文物之盛可想見也王著字知微一字成象成都人偽蜀明經及第蜀平赴闕太宗以字書訛舛辟士人刪定有以著薦者加著作佐郎令模閣帖著有研格書奩銘云爰有愚叟棲此陋室風雨可蔽戸庭不出知足為富娯老為逸貂冠蟬冕虎皮羊質處之勿疑永爾終吉同時以酒失儀之王著别是一人虞夏而降制器尚象後世由漢武帝汾陰得寶鼎因更其年元而宣帝於扶風亦得鼎𣢾識曰王命元臣官此物色及後和帝時竇憲勒燕然還南單于遺憲仲山甫古鼎有銘憲遂上之凡此數者咸見諸史記所彰灼者迨魏晉六朝隋唐亦數數言𫉬古鼎器梁劉之遴好古愛竒在荆楚聚古器數十百種又獻古器數種於東宫皆金錯字然在上者初不大以為事獨國朝來寖乃珍重始則有劉原父侍讀為之倡而成於歐陽文忠公又從而和之則若伯父君謨東坡數公云爾初原父號博雅有盛名曩時出守長安號多古簋敦鏡甗尊彛之屬因自著一書號先秦古器記而文忠喜集往古石刻遂又著書名集古録咸載原父所得古器銘𣢾由是學士大夫雅多好之此風遂一煽矣元豐後又有文士李公麟者出公麟字伯時實善畫性希古則又取生平所得暨其覩聞者作為圖狀説其所以而名之曰考古圖𫝊流至元符問太上皇即位憲章古始眇然追唐虞之思因大崇尚及大觀初乃倣公麟之考古作宣和殿博古圖所藏者大小禮器則已五百有㡬世既知其貴愛有一器動直金錢數十萬後至百萬不翅者於是天下塜墓破伐殆盡矣獨政和間為最盛尚方所貯至六千餘數百器遂盡見三代典禮文章而讀先儒所講説殆有可哂者始端州上宋成公之鍾而後得以作大晟及是又𫉬𬒳諸制作於是聖朝郊廟禮樂一旦遂復古跨越先代當有㫖以所藏列崇政殿暨兩廊召百官宣示焉當是時天子尚留心政治儲神穆清因從𤨏闥密窺聽臣僚訊知為誰樂其博識味其議論喜于人物而百官弗覺也時所重者三代之器而已若秦漢間物非殊特葢亦不收及宣和後則咸蒙貯録且累數至萬餘若岐陽宣王之石鼓西蜀文翁禮殿之繪像凡所知名罔間巨細逺近悉索入九禁而宣和殿後又剏立保和殿者左右有稽古𫝊古尚古等諸閣咸以貯古玉印璽諸鼎彛禮器法書圖畫盡在然世事則益爛漫上志衰矣非復前日之敦尚考驗者俄遇僣亂都邑傾覆所謂先王之制作古人之風烈悉入金營夫以孔父子産之景行召公散季之文辭牛鼎象樽之規模龍瓿雁燈之典雅當時蒐羅聚積不知耗㡬許之物力一旦坐付他人磨室故鼎竟無返日言之可為於邑至于圖録規模則班班尚在期流𫝊於不朽云作古器説宣和間内府尚古器士大夫家所藏三代秦漢遺物無敢𨼆者悉獻於上而好事復争尋求不較重價一器至有直千緡者利之所趨人競捜剔山澤發掘塜墓無所不至往往數千載之藏一旦皆見呉珏為光州固始令光申伯之國而楚之故封也間有異物以僻逺人未之知乃令民有罪皆入古器自贖既而罷官㡬得五六十器與余遇汴上出以相示其間半猶三代物後余中表繼為守聞之㣲用其法亦得十餘器范之才為湖北察訪有紿言澤中有鼎不知大小耳見於外其間可過六七歲小兒亟以上聞詔本部使者發民掘取凡境内陂藪悉乾之穿地數十丈訖無有之才尋見讁崇寧中朝廷定雅樂下靈壁縣造石磬磬成每泝汴進納縣别有小河取都下稍徑或由此河載磬以入則磬聲率不協律此理殆不可曉酉陽雜爼曰厯城縣光政寺有磬石形如半月膩光欲滴扣之聲及百里北齊時移於都内使人擊之其聲杳絶却令歸本寺扣之聲如故時人語曰磬神聖戀光政宣和殿所藏殷王鉞長三尺餘一段美玉文藻精甚三代之寶也後歸大金今入大元毎大朝會必設於外廷輟耕録所載劈正斧以形製攷之疑即此鉞宣和間蔡州一士人書屋中忽見小蛇文章陸離蜿蜒几格間毎已時輒至午乃𨼆去士人異之捕置鐵絲籃中迨午則堅冷化為石矣質巧天成鬼工不能加明已復蠕動既而復為石而屈伸蟠結之狀日日不同士人寶之攜至京見中人梁師成師成嘆曰此神物造化之所寓禁中有玉䑕玉兔或以時見即其𩔖也士人遂獻之章申公蓄一古銅蟾蜍研滴毎注水滿中置之研側不假人力而蟾蜍口出泡泡隕則滴水入研已而復吐腹空而止米元章見而異之求以古畫博易申公不許姑蘇士人家有玉蟾蜍一枚皤腹中空毎焚香置爐邊烟盡歸腹中乆之復自蟾蜍口噴出亦異物也毗陵士大夫有仕成都者九日出遊偶藥市見一銅鼎已破闕旁一人贊取之既得叩何所用曰歸以數爐炷香環此鼎香皆聚於中試之果然乃名聚香鼎初不知何代物而致此異劉卿任待制言宣和時王黼宴從官於私第毎客各出一寳器勸酒侍兒捧一物至卿任前宛若叠縠俄而瀉酒其中錚然有聲隨酒漲起酒滿如常盃飲盡復如故名破壺盃云是南方軟琉璃也思陵妙悟八法留神古雅當干戈俶擾之際訪求法書名畫不遺餘力清燕之餘展玩摹榻不少厭怠四方獻奉無虗日又於榷塲購北方遺失物故紹興内府所藏不減宣政惜乎鑒定諸人如曹勛宋貺龍大淵張儉鄭藻平協劉炎黄冕魏茂實任原軰人品不髙目力苦短凡經前軰品題者盡皆拆去故御府所藏多無題識源委授受歲月考訂邈不可求為可恨耳嘉泰間章文莊公潁以右史直禁林時宇文紹節挺臣為司諌指公為謝深甫子肅丞相之黨出知温陵既而公入為言官遍歴三院為中執法時挺臣以京湖宣撫使知江陵府入覲除端明學士徑躋宥府而挺臣懐前日之疑次且不敢拜文莊識其言乃抗疏言公論出一時之見豈敢以報私憾乞趣紹節受職未㡬公亦登政地相得甚驩一日宴聚公出所藏玉盃侑酒色如截肪真于闐産也坐客皆誇賞之挺臣忽旁睨㣲笑曰異哉先肅愍公虗中使金日嘗於燕山𫉬玉􅌉徑七寸餘瑩潔無纎瑕或以為宣和殿故物平日未嘗示人今觀此色澤殊似於是坐客咸欲快覩趣使取之既至則玉色製作無毫髪異衆客驚詫以為干鋣之合不足多也公因舉盃以贈挺臣而挺臣復欲以􅌉奉公相與遜讓者乆之不决時李璧季章在坐起曰以􅌉足盃於事為順僉書不得辭也公遂謝而藏之徐以他物為報文莊公少好雅潔居一室必汎掃巧飾陳列琴書親朋或譏其齷齪無逺志一日大書素屛曰陳蕃不事一室而欲掃除天下吾知其無能為矣作小詞極有思致其小重山云栁暗花明春事深小欄紅藥已抽簪雨餘風軟碎鳴禽遲遲日猶帶一分陰把酒莫沉吟身閒無箇事且登臨舊遊何處不堪尋無尋處惟有少年心李淳風論辨真玉云其色如肥物所染𫾣之其聲清引若金磬之餘響絶而復起殘聲逺沉徐徐方盡頃唐州任參政之子喻字義可收一璧凝滑如脂略無蟻缺惟有兩粟大赤􅉳葢尸沁也擊之清韻悠揚政如淳風之說與世所見水蒼玉不可同日而語晉天福中平居誨從使于闐為判官作記紀其採玉處之玉河在國城外源出崑崙山西流千三百里至國界牛頭山分為三一曰白玉河在城東三十里二曰緑玉河在城西二十里三曰烏玉河在緑玉河西七里源雖一玉隨地變故色不同每歲五六月水漲玉隨流而至多寡由水大小水退乃可取方言曰撈玉國主未採禁人輙至河濵大觀中添創八寳從于闐求大玉一日忽有國使奉表至故事下學士院召譯表語而後答詔其表云日出東方赫赫大光照見西方五百國五百國條貫主師子黒汗王表上日出東方赫赫大光照見四天下四天下條貫主阿舅大官家你前時要者玉自家甚是用心力只為難得似你尺寸的自家已令人兩河尋訪纔得似你尺寸的即奉上也當時𫝊以為笑後果得之厚大逾二尺色如截肪昔未始有也大抵玉分五色惟青碧一色髙下最多端帶白色者漿水亦分九等上之上之中之下中之上之中之下下之上之中之下宣和殿有玉等子以諸色玉次第排定凡玉至則以等子比之髙下自見今内帑有金等子亦此法道君皇帝以于闐玉益八寳為九寳其文曰範圍天地幽贊神明保合太和萬壽無疆王初寮草詔曰太極函三運神功於八索乾元用九増寳厯於萬年八索用九可謂切事犀之𩔖不一生邕筦之内及交趾者角紋如麻燥而少潤來自舶上出大食者理潤而倒光采瑩徹若𫝊以膏甚有花紋而尤異者曰通天犀或如日星或如雲月或如葩葉或如山水或飛走或龍魚或成神仙宫殿至有衣冠杖履眉目毛羽鱗角完具若繪畫然為世所貴其價不貲或以為犀愛一物玩之久則物形漸入角中是又不可以理推者其紋有正挿有腰鼓挿方其未解時雖海人亦未知其異故波斯以象牙為白暗犀角為黑暗言其難識别也犀之通天者自顧其影則怖故常飲濁水不欲照見其角耳取犀之法多於山麓植木如羊豕棧犀前足短止則憑木而息久之木蠧而折犀亦踣焉土人因格殺之犀亦歲退角自培土埋僻處時復發視驗其有無人跡得之潛易以木角犀不能辨若直取之則徙竄他山不可復得矣犀紋以麄細為貴賤貴者有通天花紋或云通天者是其病理不可知也通天犀腦上角千歲者長且鋭白星徹端能出氣通天則能通神可破水駭鷄抱朴子曰通天犀有白理如緜者以盛米雞見即駭其真者刻為魚衘入水水開三尺俗所謂離水犀者是也犀以黒為本其色黒而黄曰正透黄而有黒邊曰倒透正者世人貴之南中有偽者磨之漸熱乃驗犀性涼磨之不熱大觀間京師和劑局一日請得内帑藥犀百數中一株大絶常犀因不敢用復納上朝廷命工解以為帶工覩之極駭歎以為聖徳感召所致葢倒透中反成正透面猶黄蠟中有異雲一朶雲中夭矯一金龍飛盤拏空角爪俱全遂為御府第一號瑞雲􅌉龍御帶一云犀工董進善别犀一日御藥郝隨呼至其第出數犀示之董於内指一犀曰此犀大異餘常物也郝語之曰汝先名其中物狀為何董曰不知此犀曾經衆工審定否郝曰衆工已皆具名狀供證獨留以驗汝精識耳即盡出衆工所供凡三十餘狀董閲畢内推一土所供云是正透牙魚者且言不意此人目力至此以進觀之乃一翔龍所恨左角微短耳郝未試其言亦大異之即令具軍令狀云若果不謬輒當奏賞既刳視悉如所言有詔製為帶成以進御錫賚有加徳夀在北内頗屬意玩好孝宗極先意承志之道時網羅人間以供怡顔㑹將舉慶典市有北賈攜通犀帶一因左璫以進於内帶十三銙銙皆正透有一夀星扶杖立上得之喜不復問價將為元日夀巵之侑賈索十萬緡既成矣傍有璫見之從賈求金不得則擿之曰凡夀星之扶杖者杖過於人之首且詰曲有奇相今杖直而短僅至身之半不祥物也亟宣視之如言遂却之此語既聞遍國中無復售者韓似夫嘗言出使金國見金主所繫犀帶倒透中正透如圓鏡狀光綵絢日似夫注視久之金主云此石晉少主歸獻耶律氏者唐世所寳日月帶也又命取磁盆一枚示似夫云此亦石主所獻中有畫雙鯉存焉水滿則跳躍如生覆之無他矣二物誠絶代之珍也陶器自舜時便有三代迄於秦漢所謂甓器是也今土中得者其質渾厚不務色澤未俗尚靡不貴金玉而貴銅磁遂有秘色窰器世言錢氏有國日進奉之物臣庶不得用故云秘色陸龜蒙詩云九千風露越窰開奪得千峰秘色來如向中宵盛沆瀣共稽中散鬬遺桮乃知唐世已有非始於錢氏本朝以定州白磁器有芒不堪用遂命汝州造青窰器故河北唐鄧耀州悉有之以瑪瑙末為油唯供御揀退方許出賣世尤艱得故汝窰為魁江南則處州龍泉窰質頗麤厚政和間京師自置窰燒造名曰官窰中興渡江有卲成章提舉後苑號邵局襲故京遺製置窰於修内司造青器名内窰澄泥為範極其精緻油色瑩徹為世所珍後郊壇下别立新窰比舊窰大不侔矣餘如烏泥窰餘杭窰續窰皆非官窰比若謂舊越窰不復見矣窰器俱謂之磁器者葢河南磁州窰最多故相沿名之柴窰最古成器不可得今人得其碎片俱用以裝飾玩具世傳世宗燒造時所司請其色御批云雨過天青雲破處這般顔色做將來柴窰之外有定汝官哥四種皆宋器也哥窰與龍泉窰皆出處州龍泉縣南宋時有章生一生二弟兄各主一窰生一所陶者為哥窰以兄故也生二所陶者為龍泉以地名也其色皆青濃澹不一其足皆鐵色亦濃澹不一舊聞紫足今少見焉惟土脈細薄油水純粹者最貴哥窰則多㫁文號曰百圾破龍泉窰至今温處人稱為章窰饒州景徳鎮陶器所自出大觀間窰變一旦色如丹砂説者謂熒惑纒度照臨而然物反常為妖窰户亟碎之不敢以進御以非可歲供物也供上之磁器惟取其端正合制瑩無瑕疵色澤如一者耳民間燒磁舊聞有一二變者大者亦毁之盞甖小者藏去鬻諸富室價與金玉等窰變雖珍竒上之不得用於宗廟朝廷而下之使人不敢用不免毁裂竟同瓦礫而𤨏𤨏者以供富室私玩奚以變為哉王蜀報朱梁信物有金稜碗越瓷器致語云金稜含寳碗之光秘色抱青瓷之響乃呉越錢鏐事梁所燒秘磁相沿以奉柴世宗所謂柴窰者其色如天其聲如磬精妙之極今不可復覩矣宣和中宫中重異香廣南所進篤耨龍涎亞悉金顔雪香褐香軟香之𩔖篤耨有黒白二種黒者每貢數十觔白者止三觔以瓠壺盛之香性薰漬破之可燒號瓠香白者毎兩直八十千黒亦三十千外庭得之以為珍異又貢猫兒眼睛能息火燃炭方熾投之即滅亦云能解蠱毒之藥政和四年太上於奉宸庫中得龍涎香二琉璃缶多分錫大臣近侍其形製最大而外視無甚佳毎以一豆許爇之輙作異花氣芬郁滿座終日畧不歇於是太上始竒之命籍被賜者隨數多寡復收歸禁中因號曰古龍涎諸大璫争取一餅可直百緡金玉為穴而以青絲貫之佩於頸時於衣領間摩挲相示以為誇炫龍涎出大食國近海傍常有雲氣罩山間即知有龍睡其下或半載或二三載土人更相守視俟雲散則審龍已去往視必得龍涎涎遺石上為太陽所爍則結聚成片隨守視人多寡均給之或不平更相讐殺一云龍涎入香能收斂腦麝氣雖經數十年香味仍在一云龍涎於香本無損益但能聚烟耳和香而用真龍涎焚之則翠烟浮空結而不散坐客可用一剪以分縷所以然者蜃氣樓臺之餘烈也宣和時嘗造香於睿思東閣南渡後如其法造之時號東閣雲頭香今日燕集往往焚香以娯客葢亦有謂黄帝云五氣各有所主惟香氣凑脾漢以前無焚香者自佛入中國然後有之楞嚴經云純燒沉水無令見火此正佛燒香法孔雀毛著龍腦則相綴禁中以翠尾作箒毎幸諸閣擲龍腦以避穢過則以翠尾掃之皆聚無有遺者玫瑰油出北朝色瑩白而氣芬馥不可名狀法用衆香煎煉北人極珍之毎報聘禮物中止一合奉使者例𫉬一小甖其法秘不傳也宣和間周武仲憲之使金過磁州時葉著宣逺為守祝周云回日願以此油分餉既反命以油贈之葉云今不須矣比禁中厚賂金使遂得其法煎成賜近臣色香更勝北來者婦翁蔡京新寄數合且云公還朝必有索者今反獻一合周亦不受也方珍國篚所輸不過一合而貴近之家餽遺數倍足以知其侈靡之甚也端研下巖色紫如猪肝密理堅緻理潤而澤儲水發墨扣之有聲但性質堅礦㫁裂尤多瑕疵秋楓巖石色㣲澹可亞下嵓堅潤不及梅根巖一名中巖桃花巖一名上巖二巖石俱皆沙壤相雜無水泉色澹而燥肌理稍麤然中巖又勝上巖新坑石色帶紅紫其文細密材質厚大無瑕然止是崖石頗乏堅潤後厯石與新坑略相似又處其次西坑六崖石色青㣲黒佳者如歙石麤羅紋而發墨過之石眼圓暈數重青白黄黒相間極大者為最勝土人以晶瑩圓明無瑕翳者為活眼形模相𩔖不甚鮮明者為淚眼形體畧具内外皆白殊無光彩者為枯眼端溪硯有三種曰巖石曰西坑曰後厯石石色深紫襯手而潤扣之清逺石上有㸃青緑間暈圓小而𦂳者謂之鸜鵒眼此巖石也採於水底最為貴重其次色赤呵之乃潤亦有鸜鵒眼色紫文慢而大乃西坑石其下青紫色向明側視有碎星光㸃如沙中雲母石理極慢乾而少潤鸜鵒眼反大𩔖偏斜不𦂳謂之後厯石西坑研三當巖石之一後厯硯三當西坑之一李後主嘗買一研山徑長纔踰尺前聳三十六峰皆大猶手指左右則引兩阜坡陀而中鑿為研及江南國破硯山因流𫝊數十家為米老元章所得後米歸丹陽念將卜宅久未就而蘇仲恭學士之弟素稱好事有甘露寺下並江一古基多羣木唐晉人所居時米欲得宅而蘇覬得研於是王彦昭侍郎兄弟與登北固為之和會蘇米竟相易米後號海嶽菴者是也研山藏蘇氏未㡬索入九禁矣雲烟過眼録曰米氏研山後歸宣和御府今在台州戴覺民家極珍秘不可見之晏元獻夫人宋初功臣王超女樞密使徳用妺也有一研甚竒王氏舊物也號𫝊壻研初𫝊晏元獻次𫝊富鄭公三𫝊馮文簡四𫝊史聖予五傳滕子濟皆登二府真盛事也又有古犀帶一亦元獻舊物并歸滕氏丁晉公自海外徙光臨終以巨篋寄郡帑中上題云後五十五年有姓丁者來此作通判可付開之至是歲有丁僑者來佐郡政即晉公之孫計其所留年月尚未生啟視之乃黒匣貯端研一枚上有小竅以一棋子覆之掲之有水一泓流出無有歇時温潤不可名狀丁氏子孫世寶之又陳公密子縝知端州日聞部内有富民蓄一研甚竒至破其家得之研面世所謂熨斗焦者成一黒龍奮迅之狀二鸜鵒眼以為目毎遇陰晦則雲霧輒興公密殁歸於張仲謀詢政和間遂歸内府祐陵置於宣和殿為書符之用靖康之亂龍徳宫服御多為都監王殊藏匿事露思陵欲誅之王子裳為棘卿為之營救以此研為謝至今藏於家二研真希世之寳也又聞北客云今内府有佳研名蒼龍横沼其說正與前所云相合疑即此研云大觀東庫物有入而無出只端研有三千餘枚張滋墨世謂勝李廷珪亦無慮十萬觔高平吕老造墨常山遇異人𫝊燒金訣煆出視之瓦礫也有教之為研者研成堅潤宜墨光溢如漆毎研首必有一白書吕字為誌吕老死法不授子而湯陰人盗其名而為之甚衆持至京師毎研不滿百錢之值至吕老所遺好竒之士有以十萬錢購一研不可得者研出於陶而以金鐵物劃之不入為真悟靖處士王衷天誘所藏沉泥研正紫色而堅澤如端溪石扣之鏗然有聲以金鐵劃之了無痕釁或疑是澤州吕老所作而研首無吕字其製巧妙非俗士所能為天誘云米元章見之名孫真人研是非故無所稽考自是一種佳物也歙之大姓汪氏一夕山居漲水暴至遷寓莊户之廬莊户硯工也夜有光起於支牀之石異而取之使琢為研石色正天碧細羅文中涵金星七布列如斗宿狀輔星在焉因目之為斗星研汪自是家道饒益懼為强者所奪秘不語人毎為周旋人一出必焚香再拜而視之方臘之亂亡之矣周仁熟與米元章交契一日米言得一研非世間物殆天地秘藏待我而識之答曰公雖名博識所得之物真􅎓居半特善誇耳米起取於笥周亦隨起索巾滌手者再若欲敬觀狀米喜出研周稱賞不已且云誠為尤物未知發墨如何命取水未至亟以唾㸃磨墨米變色曰公何先恭後倨研汙矣不可用為公贈繼歸之竟不納米自言春和便思弄筆札手龜不作乃可自滌研若不自滌者書皆不成曾公衮見黄實師是嘗言生平有二事稍堪自慰元豐甲子為淮東提舉除夜泊汴口見蘇子瞻植杖立對岸若有所俟歸舟中以揚州厨釀二尊雍酥一奩遺之後十五年為發運使時大暑泊清淮樓見米元章衣犢鼻自滌研於淮口索篋中獨得小龍圑二餅亟遣人送入趂其滌研未畢也栁公權記青州石末研墨易冷凡頑石捍堅磨墨者用力太過而疾則兩剛相拒必熱而沫起俗言把筆如壯夫磨墨如病兒貴其輕也石末本瓦研唐世尚未知有端歙石當是以瓦質不堅磨墨無沫耳今或急於磨墨而沫起但取耳中塞一粟許投之不過一蕞磨即不復見物性相制固有不可知者研之美者無過於端溪而唐詢彦猷作研録乃以青州黒山紅絲石為冠以為紅絲石理黄者其絲紅理紅者其絲黄文之美者則有旋轉其絲凡十餘重次第不亂資質潤美發墨乆為水所浸漬即有膏液出焉此石之至靈者非他石可與較議故列之於首米元章則以唐州方城山葛仙公巖石為冠以為方城巖石石理白者視之如玉瑩如鑑光而着墨如澄泥不滑稍磨之則已下而不熱生泡發墨生光如漆如油歲久不退常如新成有君子一徳之操色紫可愛聲平而有韻二公俱於翰墨留意者其説俱未當也紅絲石文彩誠如彦猷之説但石理麄慢殊不發墨特堪為几案之玩耳方城石色如端溪堅重縝密作研極剉墨不數磨而已盈研元章性急以磨墨甚易為快耳然多損筆墨士人謂之筆墨劊子上古無墨竹挺㸃漆而書中古方以石磨汁或云是延安石液至魏晉時始有墨丸乃漆烟松煤夾和為之所以晉人用凹心硯欲磨墨貯潘耳自後有螺子墨亦墨丸之遺製唐髙麗歲貢松烟墨用多年老松烟和䴢鹿膠造成至唐末墨工奚超與其子廷珪自易水渡江遷居歙州南唐賜姓李氏廷珪父子之墨始集大成然亦尚用松烟廷珪初名廷邽故世有奚廷邽墨又有李廷珪墨或有作庭珪字者偽也墨亦不精熈豐間張遇供御墨用油烟入腦麝金箔謂之龍香劑元祐間潘谷墨見稱於時自後蜀中蒲大韶梁杲徐伯常及雪齋齊峰葉茂實翁彦卿等出世不乏墨惟茂實得法清黒不凝滯彦卿莫能及中統至元以來各有所傳可以倣古近世墨工多名手自潘谷陳瞻張谷名振一時之後又有常山張順九華朱覲嘉禾沈珪金華潘衡之徒皆不愧舊人宣政間如闗珪闗瑱梅鼎張滋田守元曾知惟亦有佳者唐州桐栢山張浩製作精緻膠法甚竒遂壓京都之作前者數工所製好墨者往往韜藏至今存者尚多予舊有此癖收古今數百笏種種有之渡江時為人疑篋之重以為金玉竊取之殊可惜也今尚餘一巨挺極厚重印曰河東解子誠又一圭印曰韓偉昇膠力皆不乏精采與新製敵可與李氏父子甲乙也士大夫留意詞翰者往往多喜收蓄惟李格非文叔獨不喜之嘗著破墨癖説云客有出墨一函其製為璧為丸為手握凡十餘種一一以錦囊之詫曰昔李廷珪為江南李國主父子作墨絶世後二十年乃有李承晏又二十年有張遇自是墨無繼者矣自吾大父始得兩丸於徐常侍鉉其後吾父為天子作文章書碑銘法當賜黄金或天子寵異則以此易之余於是以兩手當心捧研惟謹不敢議然余私怪余用薛安潘谷墨三十餘年皆如吾意不覺少有不足不知所謂廷珪墨者用之當何如也他日客又出墨余又請其説甚辨余曰吁余可以不愛墨矣且子之言曰吾墨堅可以割然余割當以刀不以墨也曰吾墨可以置水中再宿不腐然吾貯水當以盆罃不用墨也客復曰余説未盡凡世之墨不過二十年膠敗輒不可用今吾墨皆百餘年不敗余曰此尤不足貴余墨當用二三年者何苦用百年墨哉客辭窮曰吾墨得多色凡用墨一圭他墨兩圭不逮余曰余用墨毎一二歲不能盡一圭往往失去乃易墨何嘗苦少墨也唯是説刷碑印文書人乃常常少墨耳客心欲取勝曰吾墨黒余曰天下固未有白墨雖然使其誠異他墨猶足尚乃使取研屏人雜錯以他墨書之使客自辨客亦不能辨也因恚曰天下竒物要當自有識者余曰此正吾之所以難也夫碔砆之所以不可以為玉魚目之所以不可以為珠者以其用之才異也今墨之用在書苟有用於書與凡墨無異則亦凡墨而已焉烏在所寳者嗟乎非徒墨也世之人不攷其實用而眩於虗名者多矣此天下寒弱禍敗之所由兆也吾安可以不辨於墨世人論墨多貴其黒而不取其光光而不黒固為棄物黒而不光索然無神采亦復無用要使其光清而不浮湛湛如小兒目睛乃為佳也茶欲其白墨欲其黒方求黒時嫌漆白方求白時嫌雪黒然墨磨隔宿則色暗茶碾過日則香減頗相似也茶以新為貴墨以古為佳又相反也茶可於口墨可於目蔡君謨老病不能飲則烹而玩之吕行甫好藏墨而不能書則時磨而小啜之此又可以發來者之一笑也彭門寇鈞國家其先世所藏李廷珪下至潘谷十三家墨㫁珪殘璧粲然滿目東坡先生臨郡日取試之為書杜詩十三篇各於篇下書墨工姓名因第其品次云子瞻云未知一生當著㡬兩屐吾有佳墨七十枚而猶取不已不近愚耶石昌言蓄李廷珪墨不許人磨或戯之云子不磨墨墨將磨子今昌言墓木拱矣而墨故無恙李公擇見墨輒奪公卿間抄取殆遍近有人從渠許來云懸墨滿堂此亦通人之一蔽也余嘗有詩戯之云非人磨墨墨磨人此語殆可凄然云昭陵晚歲内宴與大臣侍從從容談笑且以香藥名墨遍賚焉一人得李超墨而蔡君謨所得乃廷珪時覺其人竊歎有不足色因密語能易之乎其人唯唯葢但習聞廷珪為貴而不知有超也既易輒欣然及宴罷騎從出内門去將分道君謨於馬上長揖曰還知廷珪是李超兒否何薳春渚記聞曰余嘗於章序臣家見一墨背列李承宴李惟益張谷潘谷四人名氏序臣云是王量提學所製患無佳墨取四家㫁碎者再和膠成之自謂勝絶此其見遺者因謂序臣曰此亦好竒之過也余聞製墨之妙正在和膠今之造佳墨者非不擇精烟而不能佳絶者膠法謬也如不善為文而取五經之語以已意合而成章望其髙古終不能佳也序臣曰東坡先生亦嘗欲為雪堂義墨何也余曰東坡葢欲與衆共之而患其髙下不一耳非所為集衆美以為善也宣州筆工諸葛氏自右軍以來世其業其筆制散卓也當元符崇寧時士大夫如米元章軰之好事者争所寶愛亦皆散卓耳及大觀間已有黄魯直様作棗心者蔡魯公不獨喜毛頴亦多用長鬚主簿遂有魯公筆毫様俄又為蔡元度出觀文様既數數更其調度奔走時好至與挈竹臨閭閻貸雞子入奴臺手抄圭撮者争先步武矣政和後諸葛之名於是頓息周弁陽言先君善書體兼虞栁余書學栁不成學歐又不成不自知其拙往往歸過筆墨諺所謂不善操舟而惡河之曲也雖然前軰善書者亦莫不留意於此焉王右軍少年多用紫紙中年用麻紙又用張永義製紙取其流麗便於行筆蔡中郎非流紈豐素不妄下筆韋誕云用張芝筆左伯紙任及墨兼此三具又得巨手然後可以建經丈之字方寸千言韋㫤善書而妙於筆故子敬稱為竒絶漢世郡國貴兎惟趙為勝歐陽通用狸毛筆皇象云直措毫筆委曲宛轉不叛散滑密沾汙墨須多膠紺黟者如此逸豫餘日手調適而心嘉娯正可小展試世惟米家父子及薛紹彭留意筆札元章謂筆不可意者如朽竹篙舟曲筯哺物此最善喻然則古人未嘗不留意於此獨率更令臨書不擇筆並得如意要是古今能事耳宋稗𩔖鈔卷三十二
