body:
  text: 宋稗類鈔卷十二常熟潘永因編忠義第二十一徐鉉歸朝為左散騎常侍遷給事中太宗一日問曾見李煜否鉉對以臣安敢私見之上曰卿第詣之但言朕令卿往見可矣鉉遂徑詣其居望門下馬但一老卒守門徐言願見太尉卒言有旨不得與外人接鉉云奉旨來見老卒進報徐入立庭下久之老卒遂取舊椅子相對鉉遙見止之曰但正衙一椅足矣頃間李主紗帽道服而出鉉方拜而遽下階引其手以上鉉辭賔主之禮李主曰今日豈有此禮鉉引椅少偏乃敢坐後主相持大笑及坐默不言忽長吁嘆曰當時悔殺了潘佑李平鉉既去有旨召對詢後主何言鉉不敢隱遂有秦王賜牽機藥之事牽機藥者服之前却數十回頭足相就如牽機狀又後主七夕在賜第命故伎作樂聲聞於外太宗聞之大怒又傳小樓昨夜又東風及一江春水向東流之句并坐之遂被禍云後主虞美人詞云春花秋月何時了往事知多少小樓昨夜又東風故國不堪回首月明中雕輪玉砌應猶在只是朱顔改問君還有幾多愁恰似一江春水向東流太平興國中吳王李煜薨太宗詔侍臣撰神道碑時有與徐鉉爭名欲中傷之因奏知吳王事迹莫若徐鉉為詳太宗遂詔鉉為之鉉遽請對而泣曰臣舊事李煜陛下容臣存故主之義乃敢奉詔太宗許之鉉為碑但推言厯數已盡天命有歸而已其警句云東鄰遘禍南箕扇疑投杼致慈親之惑乞火無里婦之談始勞因壘之師終後塗山之會又有偃王仁義之比太宗覽讀歎賞每對宰臣稱其忠異日復得鉉所撰吳王挽詞三首尤加咨挹今記者二首曰倐忽千齡盡冥茫萬事空青松洛陽陌芳草建康宫道德遺文在興衰自古同受恩無報補反𬒮泣塗窮土德承餘烈江南廣舊恩一朝人事變千古信書存哀挽周原道銘旌鄭國門此生雖未死寂寞已消魂蘇叔黨過坡公季子也翰墨文章能世其家士大夫以小坡目之靖康中得蒞真定赴官次河北道遇緑林脅使相從叔黨曰若曹知世有蘇內翰乎吾即其子也肯隨爾輩求活草間耶通夕痛飲翼日視之卒矣惜乎世不知其此節也賈表之公望文元公孫也資稟甚豪嘗謂仕當作御史排擊姦邪否則為將帥攻討頑梗餘皆不足為也平居惟好獵常自飼犬有妾態氏者為之飼鷹鷂寢食之外但治獵事曰此所以寓吾意也晚守泗州翁彥國勤王久留泗上不進表之詰責之且約以不復餉其軍彥國愧而去及張邦昌偽赦至率郡官哭於天慶觀聖祖殿而焚其赦書偽命不能越泗而南所試才一郡而所立已如此許頴之問獵徒謂之賈大夫云四明陳秀實禾政和初為右正言明目張膽展盡底藴時稱得人除給事中會宦官童貫黃經臣恃貴幸驕險且與中執法盧航相為表裏搢紳側目莫敢言者禾曰吾備位臺誎朝廷有至可慮者一遷給舍則非其職此而不言後悔何及未受告命即抗疏上言力陳漢唐之禍不可不戒此隙一開異日有不可勝言者惟陛下留意於未然論列既久上以日晚頗飢拂衣而起禾牽挽上衣泣奏曰陛下少留容臣罄竭愚衷上為少留禾曰此曺今日受陛下之利陛下他日受危亡之禍孰為重輕願陛下擇之上衣𥚑脫落曰正言碎朕衣矣禾奏曰陛下不惜碎衣臣又豈惜碎首以報陛下其言激切上為之變色且曰卿能如此朕復何憂內侍請上易衣上止之曰留以旌直節翼日經臣率其黨訴於上前曰國家極治如此安得此不祥之語繼而盧航上章謂禾一介書生言事狂妄東臺之除既寢復責授信州監酒久之自便丐祠奉親還里先是陳瑩中寓居郡中禾交遊日久又遣其子正彚來從學後瑩中論列蔡元長得罪禾上書力為救解及正彚告發蔡氏事父子俱就逮監獄者知瑩中與禾遊謂言必自禾發移文取證禾答以事誠有之罪不敢逃人謂禾曰豈宜以實對禾曰禍福死生吾自有處豈肯以一死易不義耶倘得分賢者罪固所願也朝廷指以為黨勒停宣和中起守龍舒以卒獻陵嗣位未幾而汴梁失守躬蹈大難以紓京邑之酷天下歸仁炎興中天八駿忘返朝野咸有攀龍髯泣烏號之痛任元受時為下僚率中原搢紳為位佛宫而致哀焉併作疏文以敘其志文贍意直讀者灑涕其詞曰時巡萬里羣心久阻於望霓歲閲三星仙蹕俄遷於奔電悲纒率土冤薄層空臣等迹忝簪纓心增荼蓼從君以出始慚晉國之亡臣御主而還終愧趙家之養卒攀號奚及摧殞何窮嘗聞無罪而殺一夫尚復有辭而籲上帝矧茲二載喪我兩君義不戴天叩九閽而靡訴禮應投地希十力之可憑爰竭蚍蜉之忱仰干龍象之馭恭惟大行孝慈淵聖皇帝夙躋上哲遽屬多艱嗣服幾年躬勤庶政遙羇玄朔祗為蒼生已深露蓋之嗟更劇輬車之慘遺弓安在憑几莫聞萬乘墨縗將禦秦師之難六軍縞素咸聲義帝之冤自憐草野之蹤莫效涓埃之報惟依妙果式佐神遊伏願法證三乘趣超十地如天子名為善寂萬有皆空猶世尊身入涅槃一真不壞兜離響滅恆聞梵唄之潮音區脫塵空來即寶華之法會然後神明助順中外謀全載木主以徂征誓修幽壤之怨奉梓宫而旋穸冀慰在天之靈建炎初朱辨孝章以兩宫通問使為金人所拘亦作徽廟哀辭其序曰臣等茂林豐草被雨露於當年異域殊鄉犯風霜於將老節上之旄盡落口中之舌徒存歎馬角之未生魂消雪窖攀龍髯而莫逮淚灑冰天王倫自金還得其辭帝讀之為灑涕官其子三人徽宗殂於五國城洪皓方流遞冷山聞之北面泣血􅍾文以祭容齋三筆云先忠宣遣使臣沈珍往燕山建道場於開泰寺作功德疏曰千歲厭世莫遂乘雲之仙四海遏音同深喪考之戚况故宫為禾黍改館徒饋於秦牢新廟洊衣冠招魂漫歌於楚些雖遣河東之賦莫止江南之哀遺民失望而痛心孤臣久摯惟嘔血伏願盛德之祠傳百世以彌昌在天之靈繼先后而不朽北人讀之亦墮淚爭相傳誦此疏疑即世所謂􅍾文以祭者楚州東漸民張卨家巨富好施與務濟貧困不責人之報年方壯遭亂流離骨肉散落獨與一僕羇栖於射陽湖中乞食以活為賊所掠求貨不得縳於大木之下將生啖之已刲股數臠僕竄既脫矣見之慟哭而出舉身遮護而拜賊曰此是我主雖本富豪今赤身逃難尚無飯喫豈得更挾財貨如欲飽其肉則又瘦瘠願膾我以代之賊雖嗜殺亦為義所激聞言嗟異亟解卨縳并僕釋去且遺以錢帛逮紹興中淮上安定卨歸里資産尚嬴百萬僕亦存卨以弟待之張氏子弟悉事之如諸父王達者屯田郎中李曇僕夫也事曇久曇親信之既而去曇應募為兵以選入捧日營凡十餘年會曇以子學妖妄言事父子械繫御史臺獄上怒甚獄急平生執友無一人敢餉問之者達旦夕守臺門不離給飲食候信問者四十餘日曇貶恩州别駕仍即時監防出城諸子皆流嶺南達追哭送之防者遏之達曰我主人也豈不得送之乎曇河朔人不習嶺南水土其家人皆辭去曰我不能從君之死鄉也數日曇感恚自縊死旁無家人達使毋守曇尸出為之治喪事朝夕哭如親父子見者皆為流涕殯曇於城南佛舍然後去嗚呼達賤𨽻也非知有古忠臣烈士之行又非矯迹求令名以取膴仕也獨能發於天性至誠不顧罪戾以救其故主之急終始無倦如此豈不賢哉嗟乎彼所得於曇不過一飯一衣而已今世之士大夫因人之力或致位卿相已而故人臨不測之患屏手側足戾目窺之猶懼其禍之延及已也若畏猛火逺避去又或從而擠之以自脫敢望其憂恤拯救也耶彼雖巍然衣冠類君子哉稽其行事則此僕夫必羞之四明戴獻可者疏財尚氣喜從賢士大夫遊處而家世雄於財凡客至必延𣢾士聞風而歸者皆若平生歡也獻可死止一子伯簡年十八九未厯世故暴承家業用度無藝里中惡少因得與交狎邪不數歲破家止有昌國縣魚鹽竹木之利尚存舊僕楊忠主之自獻可無患時出納無纎毫欺伯簡家業既蕩獨忠所掌猶可賴為衣食資遂往焉忠拜哭盡哀日與婦共事之籍其資財之簿以獻伯簡大喜謂我固有之物仍復妄為其遊從輩聞之又欲誘蕩焉忠哭諌不顧一日伯簡與其徒會飲呼蒲忠挺刃而前執其尤者捽首頓之地數曰我事主人三十餘年郎君年少爾輩誘之為不善家産掃地幸我保有此業汝必欲蕩之靡有孑遺耶我斷汝首告官請死報吾主人於地下又大叱令伏地受刃其人哀號伏罪請自今不敢復至忠噤咽良久收刃却立曰爾畏死紿我耶其人號曰請自今不敢復至忠曰如此貸爾命再至必屠裂爾軀遂出帛數端曰可負此亟去其人疾走忠遂揮涕謝伯簡曰老奴驚犯郎君自今改前所為但聽老奴盡心力役不二三年舊業可復不然老奴當即日自沉於海不忍見郎君餓死以貽主人門户羞也伯簡慚泣自是謝絶羣不逞修謹自守一聽忠所為果數年盡復田宅忠事之彌謹吁忠其賢矣哉真不負其名矣其視幸主人之禍敗從而取之者孰非忠之罪人乎唐琦開封人紹興衛士也髙宗南渡金帥海金琶八追至紹興太守李鄴以城降琦資性忠勇誓與敵偕死以報國一日鄴方與琶八並馬而行琦持二大甓登小閣上祝曰願天相我一擊殺此兩賊不幸甓中馬琦𬒳執琶八曰大金兵數百萬汝殺我一人何益琦曰願碎爾腦以愧降汝者耳因罵鄴曰我月請官一石米且不肯負國汝受國厚恩乃甘心從逆尚得為人耶琶八怒曰汝願何以死琦曰我願以布褁尸灌油焚三日琶八如其言焚之琦恐琶八追及髙宗故以焚尸緩其程耳會稽帥傳嵩請為立廟祀之琦以衛士自奮古今罕儔至以焚尸緩追則假太尉之風矣異哉孝宗追復嶽武穆官爵收召其子孫令給還原資主者具當時沒入之數止九千緡耳其斃於獄也實請具浴拉脅而殂獄卒隗順負其尸出葬於北山之漘身故有一玉環亦以徇樹雙橘於上識焉將死囑其子曰異時朝廷求而不獲必懸官賞購之汝始以告棺上一鉛筒有棘寺勒字吾埋殯之符也後果訪其瘞不得以一斑職為賞其子乃上告官悉如所言而尸色如生尚可更斂禮服也嶽少保既死獄籍其家僅金玉犀帶數條及鎖鎧兜鍪南蠻銅弩鑌刀弓劍鞍轡布絹三千餘匹粟麥五千餘斛錢十餘萬書數千卷而已視同時諸將如某某等莫不寶玩充堂寢田園占畿縣享樂壽考妻兒滿前禍福頓懸天道亦自有不可知者飛墓在棲霞下其子雲附焉名人佳士多以詩弔之天台陶九成詩云精忠祠宇西湖上再拜荒墳感昔遊斷碣草深蒙􅀢空山日落呌軥輖天移宋祚難恢復帝幸燕雲困掠囚逆檜陰圖傾大業思陵無意問神州偷安甫遂邦家志飲痛甘忘父母讎信使北和憐屈膝䇿文南駐忍含羞兩宫五國瞻征幟丹詔班師下節樓萬里長城真自壞中興武績遂云休嗚呼竟死姦邪手顛沛誰為社稷憂黯黯冤魂遊狴犴紛紛雨淚灑貔貅惟餘滿地萇𢎞血不見中流祖逖舟氛􅟓已塵金匼匝冤旒終換鐵兜鍪姓名竹帛書千載父子英雄土一邱老樹尚知朝禹穴遺黎總解説王猷復田起廢憐僧寺移􅊾褒嘉賴省侯聖世即今崇祀典佇看寵渥到松楸武穆家謝昭雪表云青編塵乙夜之觀白簡悟壬人之譖最工武穆有滿江紅詞云怒髮衝冠憑欄處瀟瀟雨歇擡望眼仰天長嘯壯懷激烈三十功名塵與土八千里路雲和月莫等間白了少年頭空悲切靖康耻猶未雪臣子恨何時滅駕長車踏破賀蘭山缺壯志飢餐讎恨肉笑談渴飲胸奴血待從頭收拾舊山河朝天闕紹興間金人遣其祕書監劉陶來聘因問嶽飛以何罪而死館伴者無以對但曰意欲謀叛為部將所告以扺誅陶曰江南忠臣善用兵者止有嶽飛所至紀律甚嚴秋毫無犯所謂項羽有一范增而不能用所以為我擒如飛者其亦江南之范增乎館伴者默不能對秦檜聞之約束勿奏俄以不職貶其人胡淡菴上書乞斬秦檜金人聞之以千金求其書三日得之君臣失色曰南朝有人蓋足以破其陰遣檜歸之謀也乾道初金使來猶問胡銓今安在張魏公曰秦太師専柄十九年只成就得一胡邦衡秦檜秉權䆮久植黨締交牢不及破髙皇首更大化懲言路壅蔽之弊召湯元樞鵬舉於外執法殿中繼遷侍御史時有選人任盡言者居下僚好慷慨論事聞其除亟以啓賀之曰伏審光奉明綸榮躋橫榻國朝更西都三府之制故御史不除大夫端公居南司五院之中與獨坐迭為憲長自昔雖稱于雄劇比歲或乖于選掄汙我霜臺賴公雪耻輒陳管見少助風聞請言有宋之姦臣無若亡秦之巨蠧十九載輔國而専政亘古無之二百年列聖之貽謀掃地盡矣乃若糊名而較藝亦復肆志而任私敢以五尺之童連冠兩科之士老牛舐犢愛子誰無野鳥為鸞欺君獨甚公攘名器報微時簞食之恩峻立刑誅鉗當世搢紳之口一時謫籍半坐流言父子至於相持道路無復偶語每除言路必預經筵蓋緣乳臭之雛實預金華之講受其頥旨應若影從忠臣不用而用臣不忠實事不聞而聞事不實逮政府樞庭之有闕必諌官御史而後除第圖復鷹犬之報而搏吠已憎奚顧塵鵷鷺之班而孤危主勢私竊富貴之壟斷豈止於子弟而為卿仰奪造化之罏錘至不容人主之除吏方當寧之意未罪魏其而在位之中専阿王氏致學官之獻侫假題目以文姦引前代興王之詩為其孫就試之讖旋從外幕擢至中都冀招致於妖言啓包藏之異意忠憤扼腕智識寒心上愧漢臣既乏朱雲之請劍下慚唐室未聞林甫之斫棺坐令存圽之姦備極寵榮之典正緣和議常贊睿謀故聖主念功務曲全於體貌然憲臺議罪當明正於典刑賞當功所以示朝廷之至恩罰當罪所以貽臣子之大戒政若偏廢國將若何敢為上言莫如君重恭惟侍御氣剛而志烈學老而才雄自親擢於宸𠂻即大符於民望明目張膽士林日講於讜言造膝沃心天下咸受其陰賜雖直道盡更其覆轍而宏綱獨漏於吞舟惟九重之委任䆮隆故四海之責望尤備願言彈擊無置渠魁矧今日之新除有昔人之故事韋仁約自稱雕鶚才固絶倫張文紀不問狐狸惡惟誅首縱黃壤之已隔在白簡以難逃使六合之間忠義之心如日九泉之下邪侫之骨常寒庶幾紹興湯御史之名不在慶厯唐子方之下其他世俗之諂語諒非方正所樂聞側聽褒遷别當修致湯得之喜袖以白上天顔甚悅一時公議遂大申矣任字元受有集名小醜楊誠齋為之序仕亦不大顯盡言事母盡孝母老多病未嘗離左右每自言其毋得疾之由或以飲食或以燥濕或以語話稍多或以憂喜微過皆朝夕侯之無毫髮不盡五臟六腑中事皆洞見曲折不待切脈而後知故投藥必效雖名醫不逮也張魏公作都督欲辟之入幕乃力辭曰盡言方養親使得一神丹可以長年必持以遺老母不以獻公况能舍溫凊而與公軍事耶魏公歎息而許之光堯之喪金使來弔祭京仲逺以檢正假禮部尚書為報謝使康元弼館伴錫燕汴亭仲逺因元弼請免燕不許請撤樂如哀告遺留使亦不許至期促入席傳呼不絶仲逺曰若不撤樂有死而已不敢即席元弼等知不可奪乃傳言曰請先拜酒果之賜徐議撤樂仲逺方率其屬拜受北典籖連呼曰北朝燕南使敢不即席聲甚厲仲逺趨退復位甲士露刃闔扉仲逺令左右叱曰南使執禮何物卒徒乃敢阻遏排闥而出元弼等以聞其主仲逺留館俟命賦詩云鼎湖龍馭去無蹤三遣行人意則同敬使原應修燕禮銜哀豈合對伶工設令耳預笙鏞末只願身靡鼎鑊中已辦滯留期得請不辭築館汴江東越七日始獲免樂之命既還孝宗勞之曰卿能守禮如此為朕增氣何以賞卿對曰北朝畏陛下威德非畏臣也政使臣死於北亦其分耳敢覬賞乎上喜謂宰相曰京鏜今之毛遂也除權侍郎以至大用襄樊自咸淳丁卯𬒳圍以來生兵日增既築鹿門之後水陸之防日密又築田河虎頭及鬼關於中以挺出入之道自是孤城困守者凡四五歲往往扼關隘不克進所幸城中有宿儲可堅忍然所用鹽薪布帛為急時張漢英守樊城募泅者置蠟書髻中藏積草下浮水而出謂鹿門既築勢須自荆郢進援既至隘口守者見積草頗多鈎致供焚㸑用遂為所獲於是郢鄧之道復絶矣既而荆閫移屯舊郢州而諸帥重兵皆駐新郢及均州河口以扼要津又重賞募死士得三千人皆襄鄧民兵之驍悍善戰者求將久之得民兵部官張順張貴軍中號張貴為矮張所謂大張都統小張都統者其智勇素為諸軍所服先於均州上流名中水峪立硬寨造水哨輕舟百艘每艘三十人鹽一袋布二百匹且令之曰此行有死而已或非本心亟去毋敗吾事人人感激思奮歲五月漢水方生於二十二日稍進團山下越二日又進髙頭港口結方陳各船置火鎗火炮熾炭巨斧徑弩夜漏下二刻起矴出江以紅燈為號貴先登順為殿乘風破浪徑犯重圍至磨江灘以上敵舟布滿江面無罅可入鼓勇乘鋭凡斷鐵絙攢􅍻數百屯兵數萬皆披靡避其鋒轉戰一百二十餘里二十五日黎明乃抵襄城城中久絶援聞救至人踴躍氣百倍及收軍點視則獨失張順軍中為之短氣越數日有浮尸逆流而上被介胄執弓矢直抵浮梁視之順也身中四鎗六箭怒氣勃勃如生軍中驚以為神結冡殮葬立廟祀之然自此圍益密水道連鎖數十里以大水下撒星樁雖魚鱉不能度矣外勢既蹙貴乃募壯士至夏節使軍求援得二人能伏水中數日不食使持書以出至樁若柵則腰鋸斷之徑達夏軍得報而還許以軍五千駐龍尾洲以助夾擊克日既定貴提所部軍點視登舟失帳前親隨一人乃宿來有過遭撻者貴驚嘆曰吾事泄矣然急出乘未及知耳乃乘夜鼓譟衝􅊳斷絙破圍冒進衆皆辟易既渡險要之地時夜半天黑至小新城敵方覺遂以兵數萬邀擊之貴又為無底船百餘艘中植旗幟各立軍士於兩舷以誘之敵皆競躍以入溺死者以萬餘亦昔人未出之竒也至勾林灘將近龍尾洲逺望軍船櫛櫛旗幟紛披貴軍皆喜躍舉流星以示之軍船見舉火皆前相迎逮勢近欲合則來軍皆北軍也蓋夏軍前二日以風水驚疑退屯三十里而北軍得逃卒之報遂據洲上以逸待勞猝不及備殺傷殆盡貴身背被數十鎗力不支遂為生得至死不屈是歲十一月十七夜也北軍以四降卒輿尸至襄以示援絶且諭之降吕帥文煥盡斬四卒以貴附葬順冡為立雙廟而祀之以比巡逺明年正月十三樊城破三月十八襄陽降此天意非人力也同時有武功大夫范大順者與順貴同入襄及城降仰天大呼曰好漢誰肯降便死也做忠義鬼就所守分地自縊而死又有右武大夫馬軍統制牛富樊城守禦立功尤多城降之際傷重不能步乃就戰樓觸柱數四投身火中而死郝經字伯常元中統元年拜翰林侍讀學士充國信使使宋賈似道拘之真州凡十有六年始得歸先是有以雁獻者命畜之雁見公輒鼓翼引吭似有所訴者公感悟擇日率從者具香案北向拜舁雁至前手書尺帛親繫雁足而縱之其辭曰霜落風髙恣所如歸朝回首是春初上林天子援弓繳窮海纍臣有帛書中統十五年九月一日放雁獲者勿殺國信大使郝經書於真州忠勇軍營後虞人獲之苑中以聞世皇惻然曰四十騎留江南曾無一人雁比乎遂進師南侵越二年而宋亡臨安將危日文天祥語幕官曰事勢至此為之奈何客曰一團血文曰何故客曰公死某等請皆死文笑曰君知昔日劉玉川乎與一娼狎情意綢密相期偕老娼絶賔客一意於劉劉及第授官娼欲與赴任劉患之乃紿曰朝例不許擕家願與汝俱死必不獨行也乃置毒酒令娼先飲以其半與劉劉不復飲矣娼遂死劉乃獨去今日諸君得無效劉玉川乎客皆大笑文文山死宋而其弟璧號文溪者仕元時有詩云江南見説好溪山兄也難時弟也難可惜梅花各心事南枝向暖北枝寒逮元皇慶中丞相子升仕為集賢學士奉使贑州道卒時有挽之者云地下修文同父子人間讀史各君臣按升是璧之子丞相子道生佛生並流離中死亡治命以升為後耳張毅夫千載廬陵人丞相文信公友也公貴顯時屢以官辟不就暨公𬒳執北行毅夫偕行至燕寓於公囚所側近日以美饌餽凡三載始終如一且潛置一櫝藏公元收拾骸骨襲以重囊南歸付公家葬之後公之子忽夢公怒曰繩鋸髮斷明日起視果有繩束髮其英爽尚如此劉須溪紀其事贊於公畫像上曰間居忽忽萬古咄咄天風慘然如動生髮如何尋約亦念束芻豈其英爽猶纍形軀同時之人能不顙泚昔忌其生今妒其死鄧中齋剡字光薦丞相信國公客也宋亡以義行著其所賦鷓鴣詞有曰行不得也哥哥瘦妻弱子嬴牸馱天長地久多網羅南音漸少北語多肉飛不起可奈何行不得也哥哥其意可見矣其所贊文丞相像有曰目煌煌兮疏星曉寒氣英英兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼孰謂斯人不在人間時虞伯生集挽丞相詩曰徒把金戈挽落暉南冠無奈北風吹子房本為韓仇出諸葛安知漢祚移雲暗鼎湖龍去逺月明華表鶴歸遲何須更上新亭飲大不如前灑淚時閩人謝皋羽翺倜儻有大節刻厲憤激不混流俗意所不顧雖萬夫莫回每慕屈平托興逺遊因號睎髮子宋亡文天祥被執翺悲不能禁嚴有子陵臺孤絶千尺時天涼風急挾酒登之設天祥主跪酬號慟取竹如意擊石作楚歌招之其辭曰魂來兮何極魂去兮江水黑化為朱鳥兮其咮焉食歌闋竹石俱碎失聲大哭作西臺慟哭記其志益汗漫不可禦視世間無足當其意者謝君直枋得號疊山信州弋陽人宋景定間校文發策問權姦誤國趙氏必亡忤賈似道貶興國軍三年遇赦得還元兵南下郡城潰棄家入閩至元二十三年御史程文海承旨留夢炎等交薦纍召不赴二十六年春正月福建行省參知政事魏天祐復被詔旨集守令戍將迫蹙上道臨行以詩别常所往來者曰雪中松柏愈青青扶植綱常在此行天下豈無龔勝潔人間不獨伯夷清義髙便覺生堪舍禮重方知死甚輕南八男兒終不屈皇天上帝眼分明夏四月至京師不食死鄭所南先生字思肖號憶翁福州連江人宋太學上舍應博學宏詞科剛介有志節元兵南下叩闕上疏犯新禁衆爭目之由是遂更今名曰肖曰南曰憶義不忘趙北面他姓也隱居吳下有田數十𤱔寄之城南報國寺以田歲入入寺為祠其祖禰遇諱必大慟寺下而先生併館穀於寺一室蕭然坐必南向歲時伏臘望南野哭而再拜乃返人莫識焉誓不與朔客交往或於朋友坐上見有語音異者輒引起人咸知其狷潔亦弗為怪喜佛老教工畫墨蘭疏花簡葉不求甚工畫成即毁之不妄與人其所自賦詩以題蘭皆險異詭特蓋以攄其憤悶云貴要者求其蘭尤靳弗與庸人孺子頗契其意者則反與勿計邑宰求之不得知其有田因脅以賦役取先生怒曰頭可斷蘭不可畫嘗自寫一弓長丈餘髙可五寸許天真爛熳超出物表題云純是君子絶無小人深山之中以天為春凡平日所作詩多寓意於宋其題鄭子封孰曰天垂古色映柴門千古傳家事且存此世但除君父外不曾别受一人恩譏宋臣之復仕元也其題畫蘭曰求則不得不求或與老眼空濶清風萬古譏一世之士無足當其意也其題畫菊曰花開不並百花藂獨立疏籬趣未窮寧可枝頭抱香死何曾吹墮北風中又曰禦寒不藉水為命去國自同金鑄心自謂志節不為元氏富貴所奪也其題畫像曰不忠可誅不孝可斬敢懸此頭於洪洪荒荒之表以為天下不忠不孝之榜樣譏夫忘國而事讐也平生寡欲而好遊凡遇窮山大澤必彌日忘返咄咄書空心與口語人爭視之彼則蔑如也著書甚多有太極濟錬文一帙多隱語艱苦難讀莫知所謂書後題二十字云大無工十空經臣嘔血三斗書此後有巨眼者當識之云晚年究性命之學竟以夀終葬於姑胥之西所南先生當宋社既墟無䇿自奮著心史六萬餘言鐵函重匱外著大宋鐵函經五字內題大宋孤臣鄭思肖百拜書十字沉於吳門承天寺眢井中崇禎戊寅冬寺僧達浚井得之自德祐癸未至崇禎戊寅實三百五十六年矣宋太學生會稽唐珏字玉潛家貧聚徒授經營􅎵􅔱以養母當至元戊寅冬總江南浮屠楊璉真伽怙恩橫肆勢熖爍人窮驕極淫不可具狀發趙宋諸陵至斷殘支體攫珠𥜗玉匣焚其胔棄骨草莽間唐聞之痛憤亟貨家具并執劵行貨得數百金乃市酒醪烹羊豕招里中少年狎坐轟飲酒酣少年起請曰君儒者若是將何為唐慘然具告以收瘞寢園遺骸事衆歡諾中一人曰發邱中郎將耽耽餓虎事露奈何唐曰余籌之熟矣今四郊多暴骨取竄以易誰復知之乃斫文木為匱紉黃絹為囊各署曰某陵某陵分委而散遣之蕝地以藏為文以告詰旦事訖來集出金酬之戒勿泄越七日總浮屠下令裒陵骨雜置牛馬枯骼中造塔錢塘以納之名曰鎮南杭民悲憤不忍仰視了不知陵骨之猶存也葬後又於宋常朝殿掘冬青樹植於所函土上作冬青行曰馬箠問髐形南面欲起語野麕尚屯束何物敢盜取餘花總飄蕩白日哀后土六合忽怪事蛻龍卧茅宇老天鑒區區千載護風雨又曰冬青花不可折南風吹涼積香雪遙遙翠蓋萬年枝上有鳯巢下龍穴君不見犬之年羊之月霹靂一聲天地裂復有夢中詩四首曰珠亡忽震蛟龍睡軒弊寧忘犬馬情親拾寒瓊出幽草四山風雨鬼神驚一杯自築珠邱土雙匣親傳竺國經只有東風知此意年年杜宇泣冬青昭陵玉匣走天涯金粟堆寒起暮鴉水到蘭亭轉嗚咽不知真帖落誰家珠鳬玉雁又成埃斑竹臨江首重回猶憶去年寒食節天家一騎捧香來由是唐之義風震動吳越名雖髙困固自若明年己卯後上元兩日唐出觀燈歸忽坐􅯠息奄奄若將絶者良久始蘇曰吾見黃衣吏持文書來告曰王召君導我往觀闕巍峩宫宇靚麗殆非人間有一冕旒坐殿上數黃衣貴人逡巡降揖曰藉君掩骸其有以報唐乃升謁造王前王謂曰汝受命窶且貧兼無妻若子今忠義動天帝命錫汝伉儷子三人田三頃拜謝降出遂覺罔知其由也踰時越有治中𡊮俊齋至始下車為子求師有以唐薦者一見置賔館一日問曰吾渡江聞有唐氏瘞宋諸陵骨子豈其宗耶左右指君曰此是已𡊮大駭拱手曰君此舉豫讓不能抗也曳之坐北面納拜焉禮敬特加情𣢾益篤叩知家徒四壁惻然嗟矜語左右曰唐先生家甚寒吾當料理使有室有田以給左右逢迎爰諏爰度不數月二事俱愜聘婦偶故國之公女負郭食故國之公田所費一一自𡊮出人固竒唐之節而又竒唐之遇兩髙之爾後獲三丈夫子鼎立頎頎凡夢中神所許稽其數無一不合右唐義士傳所載如此乃雲溪羅有開所撰也及見遂昌鄭明德元祐所書林義士事迹云宋太學生林德陽字景曦號霽山當楊總統發掘諸陵寢時林故為杭丐者背竹籮手持竹夾遇物即以夾投籮中鑄銀作兩許小牌百十繫腰間賄西番僧曰餘不敢望收得髙孝兩帝骨斯足矣果得兩朝骨為兩函貯之歸葬於東嘉其詩有夢中作十首其一曰一抔未築珠宫土雙匣親傳竺國經只有東風知此意年年杜宇哭冬青又曰空山急雨洗岩花金粟堆寒起暮鴉水到蘭亭更嗚哽不知真帖落誰家又曰喬山弓劍未成灰玉匣珠襦一夜開猶記去年寒食日天家一騎捧香來餘七首尤悽怨則忘之葬後林於宋常朝殿掘冬青一株置於所函土堆上又有冬青花一首曰冬青花冬青花花時一日腸九折隔江風雨清影空五月深山落微雪石根雲氣龍所藏尋常螻蟻不敢穴移來此冡非人間曾識萬年觴底月蜀魂飛繞百鳥臣夜半一聲山竹裂又一首有曰君不記羊之年馬之月霹靂一聲山石裂一事也胡以兩人相符若此載考之齊人周草窗密癸辛雜識所記云楊髠發陵之禍起於天長寺閩僧聞號西山者成於演福寺剡僧澤號雲夢者初天長為魏憲靖王墳寺聞欲媚楊髠遂獻其寺旋又發魏王冡多得金玉於是貪叨之想駸駸及於諸陵澤復一力贊成之時有中官陵使羅銑者守陵不去與之極力爭執為澤痛箠脅之以刃令人逐去大哭而出遂先啓寧宗理宗度宗楊后四陵劫取寶玉極多理陵所藏尤牣啓棺之初有白虹貫空蓋寶氣也理宗之尸如生其下籍以錦錦之下復承以細簞一小童攫取擲地有聲始知為金絲織成或告以含珠有夜明者乃倒懸其尸樹問瀝取水銀凡三日竟失其首或謂西畨僧匿之蓋回回俗欲得帝王髑髏可以壓勝致富故盜去耳事竟羅陵使買棺製衣收殮大慟垂絶鄰里為之感泣是時四山皆聞哭聲晝夜不絶尋復發徽欽髙孝光五帝孟韋吳謝四后陵初徽欽葬五國城數遣使祈請於金人欲歸梓宫凡七年而後許髙宗親至臨平奉迎易緦服寓於龍德别宫一時羣公論功受賞官帑月費不資先是選人楊偉貽書執政乞奏聞命大臣於神櫬最下處斫視之驗其虗實弗許既而禮官請如安陵故事梓宫入境即承之以槨仍納衮冕翬衣於槨中不改殮從之至是被發二陵皆空無一物徽陵朽木一段欽陵木燈檠一具而已蓋當時已料其真偽不可審聊以慰一時之人心而二帝遺骸浮沉沙漠初未嘗返也髙陵骨髮盡化略無寸餘止錫器數件端研一枚孝陵亦蛻化無餘僅存頂骨小片內有玉爐瓶一副古銅鬲一隻澤並取之昔聞得道之士蛻骨而仙未聞并骨化去者光陵與諸后儼然如生羅陵使亦如前棺殮後悉從火化可謂忠且義矣陵中金錢以萬計皆為尸氣所蝕如銅鐵狀諸凶棄而不取往往村民排礫得之聞有得貓睛異寶者一田翁於孟后陵得一髻其髮長六尺餘其色紺碧髻根有短金叉乃持歸􅍥置佛堂中奉事之由此家業日熾凡得金錢之家非病即死翁恐甚亟送龍井洞中而此翁今成富家矣方移理宗尸時澤在傍以足蹴其首以示無懼隨覺竒痛一點起於足心自此苦足疾數年以致潰爛雙股墮落十指而亡而聞亦負楊髠之勢豪奪鄉人資産後為少年數輩狙伺道間執而臠之就繫主者以為罪不加衆各受杖而已據此諸陵骨俱為羅陵使棺殮又髙陵骨髮盡化孝陵止存頂骨小片不知唐義士所易林義士所收者又何骨也姑並存之以待考林和靖先生豈亦有頷珠者而楊髠亦發其墓焉聞棺中一無所有止有端研一枚元世祖二十一年甲申桑哥為相與江南浮屠總攝楊輦真珈相表裏嗾僧嗣古妙髙上言欲毁宋諸陵實利其徇寶也明年乙酉正月桑哥矯制可其奏於是發諸陵又裒諸帝遺骼建白塔於杭故宫曰鎮南以厭勝之截理宗頂以為飲器未幾楊輦真珈事敗飲器亦籍入於官以賜帝師發陵時義士唐珏玉潛雷門先生與尚書省架閣林景熙竊痛之陰相躬拾不盡遺骨葬别山中植冬青為識遇寒食則密祭之珏後獲黃袍引兒報德之夢果生子珙為名儒羅雲溪為傳其事謝翺為托穸詞作冬青引曰冬青樹山南垂九日靈禽居上枝白衣穜年星在尾寅月也根到九泉護龍髓恆星晝殞夜不見七度山南與鬼戰願君此心慎勿移此樹終有開花時山南金粟光離離白衣人拜地下起靈禽啄粟枝上飛解者曰謂應在庚金竄甲木也元運絶於甲辰已開先於貞白之詩宋烏啄粟於甲木又開先於唏髮之句此豈偶然之作哉輿鬼託枯骨之靈靈禽託宋烏之子果天意耶人事也張郢州世傑擁德祐景炎祥興於海上各擁兵南北岸一夕大風雨皆不利張覆舟而薨翼蚤獲尸棺殮焚化其膽如斗大而焚不化諸軍感慟忽雲中見金甲神人且云今天亡我關係不輕後身當出恢復矣故陸樞密君實挽之有云曾聞海上鐵斗膽猶見雲中金甲神蓋紀實也宋稗類鈔卷十二
