body:
  text: 宋稗類鈔卷十一常熟潘永因編才幹第十九戚里有分財不均者更相訟張齊賢曰是非臺府所能決臣請自治之齊賢坐相府召訟者問曰汝非以彼分財多汝所分少乎曰然具欵乃召兩吏令甲家入乙舍乙家入甲舍貨財無得動分書則交易明日奏聞上曰朕固知非君不能定也馬軍副都指揮使張旻被旨選兵下令太峻兵懼謀為變上召二府議之王旦曰若罪旻則自今帥臣何以御衆急捕謀者震驚都邑陛下數欲任旻以樞密今若擢用使解兵柄反側者當自安矣上謂左右曰王旦善處大事真宰相也西夏趙德明求糧萬斛王旦請敕有司具粟百萬於京師而詔德明來取德明大慚曰朝廷有人乃止契丹奏請歲給外别假錢幣真宗以示旦旦曰東封甚迫車駕將出以此探朝廷之意耳可以歲給三十萬外各借三萬仍諭次年額內除之契丹得之大慙次年復下有司契丹所借金帛六萬事屬微末仰依常數與之今後永不為例蓋不借則違其意徒借又無其名借而不除則無以塞僥幸之望借而必除又無以明中國之大如是處分方妥祥符中中禁火丁晉公主營繕宫室患取土逺公乃令鑿通衢取土不日皆成巨塹乃決汴水入塹中引諸道竹木排筏及船運雜材盡自塹中入公門事畢却以斥棄瓦礫灰壤實於塹中復為街衢一舉而三役濟計省費以億萬計真宗幸澶淵丁謂知鄆州兼齊濮等州安撫使時契丹深入民大驚爭趨楊劉渡舟人邀利不急濟謂取死罪囚詐作駕舟人立命斬之舟遂集民乃得渡遂立部分使沿河執旗幟擊刁斗自衛契丹乃引去張忠定知益州民有訴主帥帳下卒恃勢嚇取民財者其人聞知縋城夜遁詠差衙役往捕之戒曰爾生擒得則渾衣撲入井中作逃走投井申來是時羣黨訩訩聞自投井故無他説又免與主帥有不協名吕正惠公端為相保安軍奏獲李繼遷母樞密副使冦凖欲斬於保安軍北門之外端以為必若此非計之得者也請對具道凖言且言昔項羽得太公欲烹之漢髙祖曰願分我一杯羮夫舉大事者固不顧其親况繼遷異類悖逆之人哉且陛下今日殺繼遷之母繼遷可擒乎不然徒樹怨讐而益堅其叛心耳冝置於延州使善養視之以招徠繼遷雖不能即降終可以繫其心而母生死之命在我矣上拊髀稱善曰微卿幾誤我事人凡臨事無大小皆貴乎智智者何隨機應變足以弭患濟事者是也小而文潞公幼年之浮毬司馬溫公幼年之擊甕亦皆於倉卒之中有變通之術張乖崖守蜀兵火之餘人懷反側一日大閲方出軍衆忽嵩呼乖崖亦下馬隨衆東北望三呼攬轡復行衆不敢歡真宗不豫李文定公迪以宰相宿內祈禳時太子尚幼八大王元儼頗有威名問疾留禁中屢日不出執政患之偶翰林司以金盂貯熱水過王所需也文定取案上墨筆攪水中盡黑王見之大駭意其為毒也即上馬去文潞公知成都大雪會客帳下卒有誶語共拆井亭燒以禦寒軍將以聞公徐曰今夜誠寒亭弊矣正欲改造更有一亭可盡拆為薪樂飲如常明日乃究問先拆亭者杖而流之趙從善尹臨安宦寺欲窘之一日內索朱紅卓子三百隻限一日辦從善命於市中取茶卓一樣三百隻糊以清江紙用朱漆塗之咄嗟而成兩宫幸聚景園回索火炬三千枝限以時刻從善命於倡家取竹簾束之頃刻而辦辛幼安在長沙欲於後圃造樓賞中秋時已八月初旬矣吏匂他皆可辦惟瓦難辦幼安命於市上每家以錢一百賃簷前瓦二十片限兩月以瓦收錢於是瓦不可勝用嘉煕間江西洞丁反吉州萬安宰黃炳鳩兵守備一日五更探報冦且至炳亟遣巡尉領兵迎敵衆皆曰空腹奈何炳曰第速行飯即至矣炳乃率吏輩攜竹籮木桶沿市民之門曰知縣買飯時人家晨炊方熟皆有熟飯熟水厚酬其值負之以行於是士卒皆飽餐一戰破冦康定中河西用兵石曼卿與吳安道遵路奉使河東既行安道晝訪夕思所至郡縣考圖籍見守令按視民兵芻粟山川道路莫不究盡利害尚慮未足以副朝廷眷使之意而曼卿吟詩飲酒若不為意者一日安道曰朝廷不以遵路不才得與曼卿並命今一道兵馬糧芻雖已留意而竊懼愚不能燭事以曼卿之才如略加之意則事無遺舉矣曼卿笑曰國家大事安敢忽耶已熟計之矣因條舉將兵之勇怯芻糧之多寡山川之險易道路之通塞纎悉具備如宿所經慮者安道大驚服以為天下竒才且嘆其不可及也建炎初駕幸錢塘而留張忠獻浚於平江為後鎮時湯東野適為守將一日聞有赦令當至心疑之走白張公公曰亟遣吏屬解事者往視緩驛騎而先取以歸湯遣官發視乃偽詔也度不可宣而事已彰灼卒徒急於望賜懼有變復謀之張公公曰今便發庫錢示行賞之意乃屏偽詔而陰取故府所藏登極赦書置輿中迎登譙門讀而張之即去其階禁無敢輒登者而散給金帛如郊賚時于是人情略定乃決大計金人犯闕鑾輿南幸寇退以宗公汝霖尹開封初至物價騰貴至有十倍於前者郡人病之公謂參佐曰此易事自都人率以食飲為先當治其所先緩者不憂不平也密使人問米麵之值且市之計其值與前此太平時初無甚增乃呼庖人取麵令作市肆籠餅大小為之及取糯一斛令監軍使臣如市酤醖酒各估其值而籠餅枚六錢酒每觚七十足出勘市價則餅二十酒二百也公先呼作坊餅師至訊之曰自我為舉子時來京師今三十年矣籠餅枚七錢而今二十何也豈麥價髙倍乎餅師曰自都城經亂以來米麥起落初無定價因襲至此某不能違衆獨減使賤市也公即出兵厨所作餅示之且語之曰此餅與汝所市重輕一等而我以日下市值會計新麵工值之費枚止六錢若市八錢則有二錢之息今為將出令止作八錢敢擅增此價而市者罪應處斬今借汝頭以行吾令也即斬以徇明日餅價仍舊亦無敢閉肆者次日呼官酤任修武至訊之曰今都城糯價不增而酒值三倍何也任恐悚以對曰某等開張承業欲罷不能而都城自遭冦以來外居宗室及權貴親屬私釀至多不如是無以輸官麯之值與工役油燭之費也公曰我為汝盡禁私酒汝減值百錢亦有利入乎任叩頭曰若爾則飲者俱集多中取息足辦輸役之費公熟視久之曰且寄汝頭在頸上出率汝曹即換招榜一角止作百錢足不患乎私醖之攙奪也明日出令敢有私造麯酒者捕至不問多寡並行處斬於是傾糟破觚者不勝其數數日之間酒與餅值既並復舊其他物價不令而次第自減既不傷市人而商旅四集兵民歡呼稱為神明之政時杜克守北京號南宗北杜云故老言賈丞相當國時內後門火飛報已至葛嶺賈曰火近太廟乃來報言竟後至者曰火已近太廟賈乘兩人小肩輿四力士以鎚劍護轎里許即易轎人倐忽至太廟臨安府已為具賞犒募勇士樹皂纛列劊手皆立具於呼吸間賈下令肅然不過曰火到太廟斬殿帥令甫下火沿太廟八風兩殿前卒肩一卒飛上斬八風板落火即止登驗姓名轉十官就給金銀賞之賈才術若此類亦可喜紹定辛卯臨安之火比辛酉加五分之三雖太廟亦不免而史丞相府獨存洪舜俞詩云殿前將軍猛如虎救得汾陽令公府祖宗神靈飛上天可憐九廟成焦土時殿帥蓋馮榯也吳興富翁莫氏者暮年忽有婢懷娠翁懼其嫗妒且以年邁慙其子婦若孫亟遣嫁之已而得男翁歲時給以錢米繒絮不絶其夫以鬻粉羮為業子稍長且十許歲莫翁告殂里巷羣不逞遂指為竒貨悉造婢家唁之婢方哭則謂之曰汝富貴至矣何以哭為問其説乃曰汝之子莫氏也其家田園屋業汝子皆有分盍歸取之不聽則訟之可也其夫婦皆曰吾固知之奈貧無資何曰我輩當貸汝即為作數百千丈約且曰我為汝經營事濟則償我然實無一錢止為作衰服被其子以往且戒曰汝至靈幃則大慟且拜拜訖可亟出人問汝謹勿應我輩當伺汝於屋左某家當即告官可也其子謹受教既入其家哭且拜一家駭然辟易嫗罵欲毆逐之莫氏長子亟前曰不可是將破吾家遂抱持之曰汝非花樓橋賣羮之子乎曰然遂引拜其母曰此汝母也吾乃汝長兄也汝當拜又遍指其家人曰此為汝長嫂此為汝次兄若嫂汝皆當拜又指曰此為汝長姪此為次姪汝當受其拜既畢告去曰汝吾弟當在此伴喪安得去即命櫛濯盡去故衣易新衣使與諸兄弟同寢處已又呼其所生論之以月廩歲衣如翁在日且戒以非時毋輒至亦欣然而退羣小方聚委巷茶肆俟之久不至既而物色之乃知己納相視大沮計略不得施他日投牒持劵訴其子負貸錢郡逮莫嫗及其子問之遂備陳首尾太守唐少尉彖嘆服曰其子可謂孝義矣於是盡以羣小置獄杖脊編置焉頃刻而弭姦計化有事為無事且家完而能承先志又博孝義之名一舉而數善備矣品行第二十太祖時實儀在翰林忽一日宣入禁中行至屏障間覘見太祖猶衩衣潛身却退中書謂曰官家坐多時請速進見竇曰聖上衩衣必是未知儀來但奏云宣到翰林學士竇儀太祖聞之遂起索衫帶著後方召見儀素稱方正其自重應爾同時陶穀為學士嘗晚召對太祖褻服御便殿穀望見將前而復却者數四左右催宣甚急穀終倣徨不進太祖笑曰此措大索事分顧左右取袍帶來上束帶竟穀乃趨入太宗一日謂宰臣曰朕何如唐太宗衆皆曰陛下堯舜也何太宗可比李文正昉獨無言徐誦白樂天詩曰怨女三千放出宫死囚四百來歸獄太宗曰朕不如也張知白守亳亳有豪士修佛廟成知白召穆修作記記成不書士名士以五百金遺修求載名於記修投金庭下促治裝去曰吾寧糊口為旅人終不以匪人汚吾文也富鄭公為樞密使英宗初即位賜大臣永昭陵遺留器物已拜賜又例外獨賜公加千公力辭東朝遣小黃門諭公此微物不足辭雖家人亦以為不害大體屢辭恐違中旨公曰此固微物要是例外也大臣例外受賜不辭若人主例外作事何以止之竟辭不受張宣徽安道守成都眷籍娼陳鳯儀後數年王懿敏仲儀出守蜀安道祝仲儀致書與之仲儀至郡呼鳯儀曰張尚書頃與汝留情乎鳯儀泣下仲儀曰亦嘗遺尺牘今尚存否曰逮今蓄之仲儀曰尚書有信至汝可盡索舊帖吾欲觀之不可隱也遂悉取呈韜於錦囊甚密仲儀謂曰尚書以剛徑立朝少與多讐汝毋以此黷公乃取書付鳯儀并囊盡焚之後語安道甚感之張文定公安道平生未嘗不衣冠而食嘗暑月與其壻王鞏同飯命鞏褫帶而已衫帽自如鞏顧見不敢公曰吾自布衣諸生遭遇至此一飯皆君賜也享君之賜敢不敬乎子自食某之食雖衩衣無害也鞏字定國王旦子素諡懿敏諸子中鞏素最知名孫資政沔出帥環慶宿管城值夏州進奉使至或言當避驛者公曰使夏國王自入朝亦外臣也猶當在某下况陪臣乎遂宿白沙仁廟聞而嘉之石守道為舉子時寓學於南都固窮苦學世罕共比王侍郎瀆聞其勤約嘗以􅌉飱遺之守道謝曰甘脆者亦某之願但常享之則可若止修一餐則明日何以復繼朝享膏梁暮厭粗糲人之情也某所以不敢當賜王大嗟重之范文正公為舉子時讀書南都學舍留守有子居學見公食粥歸告其父以公厨食饋公不食留守子曰大人聞公清苦故遺以食物而不下筯得非以相凂為罪乎公謝曰非不感厚意蓋食粥安之已久今遽享盛饌後日豈能復啖此粥乎二公同時人其所守相類若此石介字守道兖州人王瀆應天府虞城人堯臣父也明道先生嘗憩一僧寺夜聞察察有聲命火燭之乃鼠於佛臍中銜一書欲出先生取視之乃丹書也即手抄訖而納舊本佛腹明日召塑工補其孔先生後如其法鋉月餘人見其屋有光以為火競趨撲之至則非也遂不復鋉試以將成之丹塗銀器塗處輒成金或諷先生服之先生曰吾腹中安可著此與一道士善擬傳之比至先生已易簀矣元祐初起文潞公平章軍國重事召程正叔為崇政殿説書正叔以師道自居每侍講色甚莊繼以諷諫上畏之潞公對上恭甚進士唱名侍立終日上屢曰太師少休潞公頓首謝立不去時年九十矣或謂正叔曰君之倨視潞公之恭議者以為未盡正叔曰潞公三朝大臣事幼主不得不恭吾以布衣為上師傳其敢不自重吾與潞公所以不同也識者服其言范忠宣永州命下公之諸子聞韓少師維謫均州其子告惇以少師執政日與司馬公論議多不合得免行欲以忠宣與司馬公議役法不同為請以白公公曰吾用君實薦以至宰相同朝論事不合即可汝輩以為今日之言不可也有愧而生者不若無愧而死諸子遂止神宗嘗對章惇稱張安道之美問惇識否惇退以告吕惠卿惠卿明日與安道同行入朝告以上語且曰行當大用矣安道縮鼻不對其夕安道適與客坐惇呵引到門謁入安道使謝曰素不相識不敢受謁惇慚怍而退范蜀公有子弟赴官乞書詣見朝貴公不許曰仕宦不可廣求人知受恩多則難為立朝荆公熙寧初召還翰苑初侍經筵之日講禮記曾子易簀一節曰聖人以義制禮其詳見于牀第之間君子以仁行禮其勤至於垂死之際姑息者且止之辭也天下之害未有不由於且止者也王荆公初參大政一日因閲宴元獻小詞荆公曰為宰相何詎作詞平甫曰彼亦偶然自喜而為爾顧其事業亦不止此時吕惠卿為館職亦在坐遽曰為政必先放鄭聲况自為之乎平甫正色曰放鄭聲不若逺侫人吕大慚范淳甫祖禹嘗語李方叔云李文正有言士人當使王公聞名多而識面少此最名言蓋寧使王公訝其不來無使王公厭其不去范祖禹其母夢鄧禹至寢室而生遂以為名初字夢得溫公以傳稱鄧仲華篤行淳備故改字浮甫劉安世年既老名望益重梁師成用事心服其賢令人啖以大用因勸為子孫計安世笑曰吾為子孫不至是矣廢斥三十年未嘗有一點墨與當朝權貴吾欲為元祐完人見司馬光於地下不可破戒也還其書不答陳瑩中初任頴川教官時韓持國為守開宴用樂語左右以舊例必教授為之公因命陳陳曰朝廷師儒之官不當撰俳優之文公聞其言不以為忤而薦於朝元遺山好問裕之北方文雄也其妹為女冠文而艷張平章當揆欲娶之使人囑裕之辭以可否在妹妹以為可則可張喜自往訪覘其所向至則方自手補天花板輟而迎之張詬近日所作應聲答曰補天手假暫施張不許纎塵落畫堂寄語新來雙燕子移巢别處覔雕梁張悚然而出吕元直頤浩作相遇堂吏絶嚴一日有忤意者輒批其頰吏官品已髙慚於同列乃叩頭曰故事堂吏有罪當送大理寺凖法行遣今乃受辱如蒼頭某輩賤役不足言望相公少存朝廷體面吕大怒曰今天子巡行海甸大臣皆著草履行沮洳中此何等時汝輩要存體面俟大駕返舊京還汝體面未遲羣吏相顧稱善而退髙宗南幸方在道中每泊近岸執政登舟朝謁行於沮洳則躡芒鞋吕元直時為相顧同列曰草履便將為赤舄既而旁舟水深乃積稻稈以進參政范覺民曰稻秸聊以當沙堤髙宗在徽宗服中用白木椅子錢大主入覲見之曰此檀香椅子耶張媫妤掩口笑曰禁中用胭脂皂莢多相公已有語更敢用檀香作椅子時趙鼎張浚作相趙鼎在潮五年杜門謝客時事不挂口及移吉陽軍有謝上表曰白首何歸悵餘生之無幾丹心未泯誓九死以不移秦檜見之曰此老倔強猶昔金人來取趙彬等三十人家屬詔歸之時洪皓曰昔韓起謁環於鄭鄭小國也能引義不與金既限淮官屬皆吳人宜留不遣彼方困於蒙兀姑示強以嘗中國若遽從之則知我虛實謂秦無人益輕我矣檜變色曰公無謂秦無人自紹興講和以來金使經由官私牌額悉以紙蒙覆之蓋常年之例也隆興間金使往天竺山燒香過太學門臨安尹命吏持紙羃太學二字有直學程宏圖者襴襆立其下曰太學賢士之關國家儲才之地何歉於逺譯堅執不令登梯吏以白尹尹以上聞阜陵嘉歎久之遂免至今循之宏圖後登第上記其姓名擢大理司直遷丞而卒太學藴道齋有小池忽一鷗飛來容與甚久一同舍生題詩云朝來池上有新事火急報教同舍知昨夜雨餘春水滿白鷗飛下立多時讀者賞其藴藉胡汲仲長儒號石塘特立獨行剛介有守趙松雪嘗為羅司徒奉鈔百錠為先生潤筆請作乃父墓銘先生怒曰我豈為宦官作墓銘耶是日先生正絶糧其子以情白坐客咸勸受之先生郤愈堅一毫不苟取雖凍餒有所不顧也先生送蔡如愚歸東陽詩有云薄糜不繼襖不暖謳吟猶是鍾球鳴語之曰此余祕密藏中休糧方也宋稗類鈔卷十一
