body:
  text: 宋稗𩔖鈔卷二十七常熟潘永因編尤悔第四十四衮江南録云江南周后隨後主歸朝封鄭國夫人例隨命婦入宫每入輒數日而岀必大泣罵後主聲聞於外後主多宛轉避之又韓玉汝家有李主歸朝後與金陵舊宫人書云此中日夕只以眼淚洗面王文正公旦從東封車駕回過陜處士魏野寄以詩云聖朝宰相年年出公在中書十二秋西祀東封俱已了好來相伴赤松游旦袖此詩求退遂得請冦萊公凖自永興被召野亦以詩送之云好去上天辭富貴却來平地作神仙公得詩不恱後二年貶通州每題前詩於窗間朝夕吟哦之說者謂萊公之南遷不如文正之早退然公題驛亭詩未必不晩悟於魏處士者其詩云沙堤築處迎丞相驛使催時送逐臣到了輸他林下客無榮無辱自由身夫榮辱猶是小事若夫一朝綰印千里輿棺此又更輸牖下老人一著也丁朱崖當政日宴私第忽語於衆曰嘗聞江南國主鍾愛一女為擇佳婿須少年美風儀有才學門第髙者或曰洪州劉生為郡參謀年方弱冠風骨秀美大門嘗任貳卿博學有文可以充選國主亟令召至見之大喜尚主拜駙馬都尉鳴珂鏘玉出入禁闥甲第珍寳竒玩豪華富貴冠於一時未幾主告殂國主悲悼不勝曰吾將不復見劉生削其官一物不與遣還洪州生恍疑夢覺觸物如失丁笑曰某他日不失作劉㕘謀也未幾有海上之行籍其家孑然南去富鄭公晚居西都嘗㑹客於第中邵康節與焉因食羊肉鄭公顧康節曰煑羊惟堂中為勝堯夫所未知也康節云野人豈識堂食之味但林下蔬筍則常喫耳鄭公赧然曰弼失言劉孟節槩天資絶俗酷愛山水好為詩慷慨多大節舉進士及第為幕僚一任不得志棄官歸青之南有冶原乃歐冶子鑄劍之地山竒水清旁無人烟叢筠古木氣象幽絶富鄭公鎮青為築室原上居之每游山獨挈飯一甖窮探幽險無所不至夜則宿於巖石之下或屢日乃返不畏虎豹蛇虺嘗寓龍興僧舍之西軒往往凭欄静立慨想世事吁唏獨語或以手拍欄杆自詠詩曰讀書悞我四十年幾囘醉把欄杆拍吕惠卿與王荆公相失惠卿服除荆公為宫使居鍾山吕以啓講和曰惠卿啓合乃相從疑有殊於天屬析雖或使殆不自於人為然以情論形則已析者宜難於復合以道致命則自天者詎知其不人如某叨蒙一臂之交謬意同心之列㤀懐履坦失戒同巇闗弓之泣非踈碾足之辭未已而溢言皆達茀氣並生既莫知其所終兹不疑於有敵而門墻責善數移兩解之書殿陛對休親奉再和之詔固其願也方且圖之重罹苫塊之憂遂稽竿牘之獻然以言乎昔則一朝之過不足害平生之歡以言乎今則八年之間亦將隨數化之改内省凉薄尚無細故之嫌仰揆髙明夫何舊惡之念恭惟觀文特進相公知德之與達命之情親疎㝠於所同愛憎融於不有氷炭之息豁然倘示於至恩桑榆之收繼此請圖於改事側躬以待唯命之從荆公答曰安石啓與公同心以至異意皆縁國事豈有他哉同朝紛紛公獨助我則我何憾於公人或言公吾無預焉則公亦何尤於我趍時便事吾不知其說焉考實論情公亦宜照於此開諭重悉覽之悵然昔之在我誠無細故之疑今之在公尚何舊惡足念然公以壯烈方進為於聖世而某薾然衰疾將待盡於山林趍舍異事則相煦以濕不若相㤀之愈也趍召想在朝夕惟良食自愛王吕隙末曲全在吕荆公之答或法或巽操縱可以隨意獨計吕之負恩反噬喪心厚顔為此曲筆亦復委婉曲折若此荆公初執政用惠卿為心腹惠卿指擿教導以濟其惡青苗助役議出其手仍為公畫刼持上下之䇿大率多用刑獄以震動天下及公去位薦以自代既得志恐公復召欲逆閉其途凡可以中公者無不用至𤼵其私書且曰無使齊年知齊年者馮京也荆公與京同生戊子故謂之齊年公由是得罪蔡元長既南遷中路有㫖追取所寵姬慕容邢武者三人以金人指名來索也元長作詩以别云為愛桃花三樹紅年年歲歲惹春風如今去逐他人手誰復尊前念老翁初元長之竄也道中市飲食於居民問之知為蔡氏皆不肯售至有隨以詬罵者元長轎中獨歎曰京失人心一至於此至潭州作詞曰八十衰年初謝三千里外無家孤行骨肉各天涯遙望神京泣下金殿五曽拜相玉堂十度宣麻追思往昔謾繁華到此畨成夢話後數日卒門人吕川卞老醵錢塟之先是海陵徐神翁寫字與人多驗蔡京得東明二字皆謂東明向日之象可卜富貴未艾及京貶死潭州城南五里外東明寺盧多遜南遷朱崖踰嶺憇一山店店嫗舉止和淑頗能談京華事盧因訪之嫗不知盧也曰家故汴都累代仕宦一子仕州縣盧丞相違法治一事子不能奉誣竄南荒到纔周嵗盡室淪喪獨餘殘老一身流落居此意實有待盧丞相欺上㒺下倚勢害物天道昭昭行當南竄未亡間庶或見於此一快宿憾耳因號呼泣下盧不待食促駕而去吕辨者蔡元長門人也蔡罷相珠履盡散獨吕送至長沙因乗間問蔡云公高明逺識洞鑒今古亦知國家之事必至於斯乎蔡答云非不知也將謂老身可以幸免宣和間芒山有盗臨刑母來與之訣盜對母云願如小兒時一吮母乳死且無憾母與之乳盜嚙斷乳頭流血滿地母死盜因告刑者曰吾少也盜一菜一薪吾母見而喜之以至不檢遂有今日故恨殺之此不可為訓存之以見義方之教當於嬰孩也紹興和議成顯仁太后將還欽宗挽其裾曰寄語九哥吾南歸但為太乙宫主足矣他無望於九哥也后與誓曰吾先歸茍不來迎瞽吾目既歸所見大異不敢言未幾后失明募醫療者莫効有道士應募入宫金鍼一撥左翳脱然復明更求治其右道士笑曰一目視物已足其一存誓言可也后惕然起拜曰師聖人知吾之𨼆謝遺一無所受但曰太后不相㤀累脩靈泉縣朱仙觀足矣拂衣而出時上方視朝仗下急跡訪之無所得後王剛中帥成都而得㫖東朝圗朱仙像進入儼然當日道士也高宗母顯仁韋太后北歸至臨平因問何不見大小眼將軍或對曰岳飛死獄矣遂怒帝欲出家乃服道裝終身焉當是金人畏飛相𫝊其狀貌故后習聞之耳不知后北轅時飛尚未知名也曹泳侍即妻碩人厲氏餘姚大族女始嫁四明曹秀才與夫不相得仳離而歸再適泳時尚武弁不數年以秦㑹之婣黨易文階驟擢至徽猷閣守鄞元夕張燈州治大合樂宴飲曹秀才携家往觀見碩人服用精麗左右供侍備極尊嚴謂其母曰渠乃合在此中享富貴吾家豈能留歎息久之泳日益顯為户部侍郎尹京㑹之歿泳調新州而亡碩人挈二子取喪歸塟子復不肖家貧蕩析至不能給朝餔趙徳老觀文亦厲氏壻碩人從父媦也憐其貧老無倚招至四明里第養之終身碩人間出訪親舊過故夫曹秀才廬門庭整潔花竹蓊荗顧使婢曰我當時能自安於此豈有今日因泣下數行二十年間夫妻更相悔羡世態翻覆不可料如此方泳盛時鄉里奔走承迎唯恐後獨碩人之兄厲徳斯不然泳衘怒帥越時徳斯為里正泳風邑官脅治百端冀其祈己竟不屈㑹之甫殂乃遣一介致書於泳啓封乃樹倒猢猻散賦一篇洎新州之貶又以詩贈行云斷尾雄雞不畏犧憑依掇禍復何疑八千里路新州瘴歸骨中原是幾時泳得詩憤極然無如之何黄徳潤事阜陵人或議其循黙淳熙末上將内禪一日退朝留二府賜坐從容諭及倦勤之意諸公交賛公獨無語上顧曰卿以為何如對曰皇太子聖徳誠克負荷顧李氏不足母天下宜留聖慮上愕然色變公徐奏陛下問臣臣不敢自黙然臣既出此語自今不得復覲清光陛下異日思臣之言欲復見臣亦不可復得矣退即求去甚力夀皇在重華宫每撫几歎曰悔不用黄洽之言或至淚下光宗逾年不朝重華宫夀皇居常怏怏一日登望潮露臺聞委巷小兒争閙呼趙官家者夀皇曰朕呼之尚不至枉自呌耳凄然不樂自此不豫尹穡字少稷博學工文閉户讀書不汲汲於仕進諸公薦之與陸務觀同賜出身後附麗湯思退力排張魏公以是除諫議公論始薄之後貶嶺南屢年蒙恩北歸周益公素與之善便道來訪謂益公曰某三十年閉户讀書養得少名思之不審所得於彼者幾何而破壊掃地雖悔何及悵然久之益公毎舉之以為士大夫末路之戒李全擾淮時史彌逺在廟堂束手無䇿有訛𫝊全軍已渡江過行在京師人民惶惶彌逺夜半忽披衣而起有愛寵林夫人見其意似非常亦推枕隨之忽見彌逺欲投池中林急扶起泣告曰相公且少耐區處數日後得趙葵捷書彌逺死已久一夕其家聞叩門聲曰丞相歸舉家駭匿比入門燈轎紛紜升堂即席子婦皆出羅拜訊慰平生厯厯囑家事索紙筆題詩云𡨕路茫茫萬里雲妻孥無復舊為羣早知泡影須㬰事悔把恩仇抵死分賈秋壑徳祐乙亥八月生日建醮青詞云老臣無罪何衆議之不容上帝好生奈死期之已迫適值垂弧之旦預陳易簀之辭竊臣際遇三朝始終一節為國任怨但知存大體以杜私門遭時多艱安敢顧㣲軀而思末路屬封豕長蛇之薦食率驕兵悍將以徂征違命不前致成酷禍措躬無所惟冀後圖衆口皆詆其非百喙難明此謗四十年勞悴悔不為留侯之保身三千里流離猶恐置霍光於赤族仰慚覆載俯媿劬勞伏願皇天后土之鑒臨理考度宗之昭格三宫霽怒收瘴骨於江邊九廟闡靈掃兵氛於境外此時已無廖王諸客矣葢似道手筆也常州蘇掖仕至監司家富而性嗇每置産吝不與直争一文至失色尤喜乗人窘急時以㣲資取竒貨嘗置别墅與售者反復甚苦其子在旁曰大人可増少金我輩他日賣之亦得善價也父愕然自是少悟士大夫競𫝊其語傷逝第四十五雷宣徽有終頗涉道書因讀史廢書流涕曰功名者貪夫之釣餌横戈開邊枝劍討叛死生食息之不顧及其死也一棺戢身萬事都已悲夫錢思公謫居漢東日撰一曲曰城上風光鶯語亂城下烟波春拍岸緑楊芳草幾時休淚眼愁腸先已斷情懐漸變成衰晚鸞鏡朱顔驚暗換昔年多病厭芳尊今日芳尊惟恐淺每歌之酒闌則垂涕時後閤尚有故國一白髪姬乃鄧王俶歌鬟驚鴻也曰吾憶先王將薨預誡挽鐸中歌木蘭花引紼為送今相公其將亡乎果薨於隋鄧王舊曲亦有帝鄉烟雨鎖春愁故國山川空淚眼之句頗相𩔖江幾鄰休復云胡翼之凶訃至京錢公輔學士與太學生徒百餘人詣興國寺戒壇院舉哀又自陳師䘮給二日假近時無復此事胡瑗字翼之熙寧三年京輔猛風大雪草木皆稼厚者氷及數寸既而華山震阜頭谷圮折數十百丈蕩搖十餘里覆壓甚衆唐天寳中氷稼而寧王死故當時諺曰冬凌樹稼逹官怕又詩有泰山其頺哲人其萎之說衆謂大臣當之未數年而司徒侍中魏國韓公𤦺薨王荆公作挽詞畧曰氷稼嘗聞達官怕山頺今見哲人萎葢謂是也司馬温公隧碑賜名清忠粹徳紹聖初磨毁之際大風走石羣吏莫敢視獨一匠氏揮斤而擊未盡碎忽仆於碑下而死蘇子瞻云昔劉原父酒酣誦陳季弼告陳元龍語因自仰天太息此自原父舒其胸中磊塊之氣吾嘗作詩云平生我亦輕餘子晚嵗人誰念此翁記原父語也原父没尚有貢父在每與語强人意今復死矣何時復見此俊傑人乎東坡初入荆溪有樂死之語繼而抱疾稍革徑山老惟琳來候坡曰萬里嶺海不死而歸宿田里有不起之憂非命也耶然生死亦細故耳後二日將屬纊聞根先離琳叩耳大聲曰端明勿㤀西方坡言西方不無但個裏著力不得語畢而終李秃翁曰西方不無此便是疑信之間若真實信有西方正好著力如何説著力不得也東坡訃至京師王定國及李豸皆有疏文張耒時知潁州聞坡卒為舉哀行服出俸錢於薦福禪寺修供以致師尊之哀乃遭論列謫房州别駕李方叔祭東坡文有云道大不容才高為累皇天后土鑒平生忠義之心名山大川還千古英靈之氣識與不識誰不䀌傷聞所未聞吾將安放時氷華居士錢濟明祭坡文有降鄒陽於十三世夫豈偶然繼孟軻於五百年吾無間也之句氷華云元祐劉貢父夢至一官府案間文軸甚多偶取一軸展視之云在宋為蘇軾逆數而上十三世云在西漢為鄒陽元祐黨籍皆一時名賢逮宣和中徃徃多在鬼録獨劉器之范徳孺二公在未幾器之訃至晁以道對賔客誦南嶽新摧天柱峯之句至哽咽不得語客皆抆睫以道徐曰耆哲凋喪殆盡緩急將奈何客曰世未嘗乏材前輩雖殄瘁之感安知無後來之秀以道曰人材於世譬如名方靈藥之於病世之集名方儲靈藥者多矣然不肯先疾而備至於疾既彌留始閱方書而治藥材不如見成湯劑為應所須而取効速也時坐客無不深味其言有為吕與叔挽詩云曲禮三千目躬行四十年韓子華兄弟皆為宰相門有梧桐京師人以桐木韓家呼之以别魏公也子華既下世陸司農為作挽章云棠棣行中排宰相梧桐名上識韓家皆紀其實也宋稗𩔖鈔卷二十七
