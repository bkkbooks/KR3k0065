body:
  text: 宋稗類鈔卷二十常熟潘永因編詩話作詩要健字撑拄要活字斡旋如紅入桃花嫩青歸栁葉新弟子貧原憲諸生老伏虔入與歸字貧與老字乃撑拄也生理何顔面憂端且嵗時名豈文章著官應老病休何與且字豈與應字乃斡旋也撑拄如屋之有柱斡旋如車之有軸文亦然詩以字文以句世譏馮瀛王道依阿詭隨不能死節嘗考質其生平行事亦多侃侃不顧避處王荆公雅愛道謂其能屈身以安人如諸佛菩薩行富文忠公稱以為孟子之所謂大人其所作詩雖淺近而多諳理今附録之詩曰窮達皆由命何勞發歎聲但知行好事莫要問前程冬去氷須泮春來草自生請君觀此理天道甚分明又云莫為危時便愴神前程往往有期因須知海嶽歸真主未省乾坤陷吉人道德幾時曽去世舟車何處不通津但教方寸無諸惡狼虎叢中也立身古今詩話云太祖采聽明逺每邉事纎悉必知有使者自蜀還上問劍外有何事使者曰但聞成都滿城誦朱山長苦熱詩曰煩暑鬱蒸無避處涼風清冷幾時來上曰蜀民望王師也又考勻臺符岷山異事云梓潼山人李堯夫吟咏尤尚譏刺謁蜀相李昊昊戲曰何名之背時耶堯夫厲色對曰甘作堯時夫不樂蜀中相因是堯夫為昊所擯知蜀主國柄隳紊生民肆擾吟苦熱詩云炎暑鬱蒸無處避涼風消息幾時來以是知此詩乃堯夫非朱山長也清冷二字不逮消息逺甚曹衍衡陽人太平興國初石熙寧出守長沙以衍所著野史繳薦之因得召對袖詩三十章上進首篇乃鷺鷥貧女兩絶句蓋託意也鷺鷥云波瀾靜處立身孤氄雪攢霜腹轉虛盡日灘頭延頸望能消大海幾多魚貧女云自恨無媒出嫁遲老來方始遇佳期滿頭白髮為新婦笑殺豪華年少兒太宗大喜召試學士院除東宫洗馬楊侍讀徽之以能詩聞太宗知其名索其所著以百篇獻上卒章曰少年牢落今何幸叨遇君王問姓名太宗和賜且語近臣曰徽之文雅可尚操履端正拜禮部侍郎選十聨寫於御屏梁周翰之詩曰誰似金華楊學士十聨詩在御屏風江行云犬吠竹籬沽酒客鶴隨苔岸洗衣僧寒食云天寒酒薄難成醉地逈樓高易斷魂塞上云戍樓煙自直戰地雨長腥嘉陽川云青帝已教春不老素娥何惜月長圓又云浮花水入瞿塘峽帶雨雲歸越雋州哭江為云廢宅寒塘水荒墳宿草煙花夜云春歸萬年樹月滿九重城僧舍云偶題巖石雲生筆門繞松庭露濕衣湘江舟行云新霜染楓葉皓月借蘆花宿東林云開盡菊花秋色老落遲桐葉雨聲寒楊朴魏野皆咸平景德間隱士朴居鄭州野居陜皆號能詩朴性僻常騎驢往來鄭圃每欲作詩即伏草中冥搜或得之則躍出適遇之者無不驚蜀人魏野隱居不仕宦喜為詩以詩著名卜居陜州東門之外有陜州平陸縣詩云寒食花藏縣重陽菊繞灣一聲離岸櫓數點别州山最為警句所居頗瀟灑當世顯人多與之遊冦忠愍尤愛之嘗有贈忠愍詩云好向上天辭富貴却來平地作神仙後忠愍鎮北都召野坐門下北都有妓女美貌而舉止生硬士人謂之生張八因府會忠愍令乞詩於野野贈之詩曰君為北道生張八我是西州熟魏三莫怪樽前無笑語半生半熟未相諳吳正憲憶陜郊詩云南郭迎天使東郊招隱人隱人謂野野有子名間亦有清譽魏野嘗從冦萊公遊陜府僧舍各有留題後復同遊見萊公之詩已用碧紗籠護而野詩塵昏滿壁時有從行官妓頗慧黠即以袂就拂之野徐曰若得常將紅袖拂也應勝似碧紗籠萊公大笑野贈公詩有何時生上相明日是中元以公七月十四日生故也又曰有官居鼎鼐無地起樓臺冦萊公詩野水無人渡孤舟盡日橫之句深入唐人風格初授歸州巴東令人皆以冦巴東呼之以比前趙渭南韋蘇州之類然富貴之時所作詩皆凄楚愁怨嘗為江南春二絶云波渺渺栁依依孤村芳草逺斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸又曰杳杳煙波隔千里白蘋香散東風起日落汀洲一望時愁情不斷如春水余嘗謂深於詩者盡欲慕騷人清悲怨感以主其格語意清切脫灑孤邁則不無殊不知清極則志飄感深則氣謝萊公富貴時送人使嶺南云到南只十里過山應萬重人以為警絶晚竄海康至境首雷吏呈圖經迎拜於道公問州去海近逺曰只可十里憔悴奔竄已兆於此矣李虛已侍郎字公受少從江南先達學為詩後與曽致堯倡酬曾每曰公受之詩雖工恨啞耳虛已初未悟後得沈休文所謂前有浮聲後有切響遂精於格律以其法授晏元獻元獻以授二宋自是遂不傳然江西諸人每謂五言苐三字七言苐五字要響亦此意也晏元獻公雖起田里而文章富貴出於天然嘗覽李慶孫富貴曲云軸裝曲譜金書字樹記花名玉牌公曰此乃乞兒相未嘗諳富貴者故余每咏吟富貴不言金玉錦繡而唯説其氣象若樓臺側畔楊花過簾幕中間燕子飛梨花院落溶溶月栁絮池塘淡淡風之類是也公嘗自以此句語人曰窮兒家有此景致也無公之佳句宋莒公皆題於齋壁若無可奈何花落去似曾相識燕歸來靜尋啄木藏身處間見遊絲到地時樓臺冷落收燈夜門巷蕭條掃雪天已定復搖春水色似紅如白野棠花之類莒公嘗謂此數條使後之詩人無復措詞也晏元獻公赴杭州道過洛陽憩大明寺暝目徐行使侍史誦壁間詩板戒其勿言爵里姓名終篇無幾又使别誦一詩云水調隋宫曲當年亦九成哀音已亡國廢沼尚留名儀鳯終無迹鳴蛙只廢聲凄涼不可問落日下蕪城徐問之江都尉王琪詩也召至同飯又同步遊池上時春晚已有落花晏云每得句書墻壁間或彌年未嘗強對且如無可奈何花落去至今未能對也王應聲曰似曽相識燕歸來自此辟置又薦館職遂躋侍從山谷南還至南華竹軒令侍史誦詩板亦戒勿言爵里姓名久之有一絶云不用山僧供帳迎世間無此竹風清獨拳一手支頥卧偷眼看雲生未生徐觀姓名曰果吾學士葛敏修也祥符天禧中楊大年錢文僖晏元獻劉子儀以文章立朝為詩皆宗尚李義山號西崑體後進多竊義山語句賜宴優人有為義山者衣服敗弊告人曰吾為諸館職撏扯至此聞者歡笑大年漢武詩曰力通青海求龍種死諱文成食馬肝待詔先生齒編貝忍令索米向長安義山不能過也子儀畫義山像寫其詩句列左右貴重之如此宋莒公兄弟皆以高名擢用仁宗朝當時文章多人未有二公比者少時作落花詩為時膾炙莒公詩云一夜東風拂苑墻歸來無處剩凄涼漢皇佩冷臨江濕金谷樓危到地香淚臉補痕勞獺髓舞臺收影費鸞腸南朝樂府休𢋫曲桃葉桃根盡可傷景文詩云墜素翻紅各自傷青樓煙雨忍相忘欲飛更作回風舞已落猶成半面粧滄海客歸珠迸淚章臺人去骨微香可憐舞意傳雙蝶盡委花心與蜜房歐陽文忠公詩話國朝浮圖以詩名者九人劍南希畫金華保暹南粵文兆天台行肇洋州簡長青城惟鳯江東宇昭峩睂懷古淮南惠崇九僧詩極不多崇到長安有人遊曲江少草入未央深之句為時所稱崇非但能詩畫亦有名世謂惠崇小景者是也畫史紛紛何足數惠崇晚出吾最許荆公詩云爾僧惠崇不但繪事精妙詩句亦清逺有氷雪松霞之韻嘗作句圖書其所最得意如嶺暮春猿急江寒白鳥稀掩門清桂老出定白髭長鳥歸杉墮雪僧定石沉雲空潭聞鹿飲疏樹見僧行磬斷蟲聲出峯迥鴈影沉繁霜衣上積殘月馬前低移家臨醜石租地得靈泉􅋊月楚山曉孤煙江廟春松風吹髮亂巖溜濺棋寒雲􅋊僧掃石風動鶴歸林禽寒時動竹露重忽翻荷野人傳相鶴山吏學彈琴地遙羣馬小天濶一雕平河分岡勢斷春入燒痕青地形吞蜀盡江勢抱蠻迥露下牛羊靜河明桑柘空霜多秦木逈雲盡漢山孤夜間潮動舸秋逈月臨城葉落風中盡蟲聲月下多扇聲猶泛暑井氣忽生秋湘雲隨鴈斷楚路背人遙關河雙鬢白風月一燈青松風傳夕磬溪霧擁春燈圭竇先知曉盆池别見天孤雲還靜境逺籟發秋空古戌生煙直平沙落日遲來時雲擁衲别夜月隨笻古木風煙盡寒潭星斗深梅堯臣以詩名家歐陽修與為詩友自謂不及堯臣語人曰凡詩意新語工得前人所未道者斯為善矣必能狀難寫之景如在目前含不盡之意見於言外然後為至也歐陽文忠公嘗愛林逋詩草泥行郭索雲木呌鈎輈之句以為語新而屬對親切郭索蟹行貌也楊雄太玄曰蟹之郭索用心躁也鈎輈鷓鴣聲也李羣玉詩云方穿詰曲﨑嶇路又聽鈎輈格磔聲荆公金陵詩云紅梨無葉庇華身黃菊分香委路塵嵗晚蒼官才自保日高青女尚橫陳蒼官松也青女霜也楞嚴經云當橫陳時味如嚼蠟以言道人處世間雖有欲而無味也蓋荆公自謂如蒼官自保但青女橫陳不能已耳此言近於雅謔殊有深意又云木落岡巒因自獻水歸洲渚得橫陳王荆公嘗題一絶於旻扇云白馬津頭驛路邉隂森喬木帶漪漣斜陽一馬匆匆過夢寐如今十五年本集不載王荆公見道傍大松人取以代燈因賦詩云虬角龍髯不可攀亭亭千文蔭南山應嗟無地逃斤斧豈願爭明爝火間公自注云松意尚不願採於匠石充棟梁之用况肯區區與螢爝爭明於頃刻間耶王荆公詩蕭蕭搏黍聲中日漠漠春鋤影外天搏黍鶯春鋤鷺也郭祥正字功甫有逸才詩多新意丞相荆公過金山寺於壁間得長篇讀之反覆諷咏間知功甫所為由此見重最愛其兩句云鳥飛不盡暮天碧漁歌忽斷蘆花風又曽題人山居一聨云謝家莊上無多景只有黃鸝三兩聲公乃命工繪為圖自題其上云此是功甫題山居詩處即遣人以金酒鍾并圖遺之王禹玉寄程公闢詩云儛急錦腰迎十八酒酣玉􅊦照東西樂府六么曲有花十八古有玉東西杯其對甚新香泛釣筒萍雨夜緑搖花塢栁風春舒亶信道詩也信道清才而詩刻削有如此者又有云空外水光風動月暗中花氣雪藏梅又云宿雨閣雲千嶂碧野花弄日一村香又云萬􅊤水澄知月白千林霜重見松高皆警句也劉莘老丞相和王定國雪中絶句云𡊮安只有高眠興謝朓空餘後會難十萬健兒春瘴近飛花宜過海南山定國云公無乃學歐陽公耶蓋晏元獻為樞密使時西師未解嚴會天雪陸子履與歐陽公同謁之晏置酒西園歐即席賦雪詩有主人與國同休戚不惟喜悅將豐登須憐鐵甲冷徹骨四十餘萬屯邉兵晏由是銜之語人曰韓愈亦能作言語赴裴令公宴但云園林窮勝事鐘鼓樂清時劉和詩時正元豐間朝廷方問罪安南故定國援以為戲東坡在黃日每有燕集醉墨淋漓不惜與人至於營妓供侍扇題帶畫亦時有之有李琪者小而慧頗知書坡亦每顧之終未嘗獲公賜至公移汝將祖行酒酣琪奉觴再拜取領巾乞書公熟視久之令其磨研墨濃取筆大書云東坡七載黃州住何事無言及李琪即擲筆袖手與客笑談坐客相謂語似凡易又不終篇何也至將撤具琪復拜請坡大笑曰幾忘出場繼書云恰似西川杜工部海棠雖好不留詩一座擊節盡醉而散韓退之詩云水作青羅帶山為碧玉簮栁子厚詩云海上羣山似劍鋩秋來處處割愁腸東坡為之對曰繫悶豈無羅帶水割愁還有劍鋩山子瞻渡江和介甫遊蔣山詩介甫指峯多巧障日江逺欲浮天撫几歎曰老夫一生作詩無此兩句陳傳道嘗於彭門壁間見書一聨一鳩鳴午寂雙燕話春愁後以語東坡世謂公作然否坡笑曰此乃唐人得意句僕安能道此東坡熙寧十年知徐州李邦直因沂山龍祠祈雨有應作詩寄東坡東坡和之末云半年不雨坐龍慵但怨天公不怨龍今來一雨何足道龍神社鬼各無功無功日盜大倉粟嗟我與龍同此責勸農使者不汝容因君作詩先自劾邦直來謁東坡因戲笑言承示此詩只是勸農使者不管恁地事元豐三年東坡下御史獄嘗供此詩云本為龍神慵惰不為天行雨却使人心怨天公以譏諷大臣不任職不能燮理隂陽却使人心怨天子以天公比天子以龍神社鬼比執政大臣及百職事也吟哦傲兀仰晤巖月遇巘迎崖銀刓玉齕黿鼉噞喁雁鶩嵲屹卧玩我語聱牙岋嶫右江行見月四言也江郊璁龍雲水蒨絢崎岸斗入洄潭輪轉先生悅之布席開宴初日下照潛鱗俯見意釣忘魚樂此竿線優哉遊哉玩物之變右江郊四言詩也皆東坡作而本集不載東坡元祐末為禮部尚書夢人送喜雪詩云是王仲至所與覺後惟記一聨仲至因足以成章云曉雪誰驚是後時土膏方得助甘滋嵗功已覺三元近春事何憂一覺遲此一聨乃得於夢中者不著寒梅容觸冒半留紅杏惜離披神交彼此無勞辨更為公題述夢詩動地隋兵至君王尚晏安須知天下窄不及井中寬樓外峯交白溪邉血染丹無情是殘月依舊恁欄干廬山王元甫紹聖間敕賜高尚處士所作景陽井詩也東坡嘗跋云豫聞江南王元甫郭功甫皆有詩名子南歸過九江因道士胡羽邀求謁之元甫云吾不見士大夫五十年矣竟不可見山谷云詩意無窮而人之才有限以有限之才追無窮之意雖淵明少陵不得工也然不易其意而造其語謂之換骨法窺入其意而形容之謂之奪胎法如鄭谷十月菊曰自緣今日人心别未必秋香一夜衰此意甚佳而病在氣不長西漢文章雄深雅健者其氣長故也曽子固曰詩當使人一覽語盡而意有餘乃古人用心處所以荆公菊詩曰千花萬卉雕零後始見間人把一枝又如李翰林詩曰鳥飛不盡暮天碧又曰青天盡處沒孤鴻其病如前所論山谷作登達觀臺詩曰瘦藤拄到風煙上乞與間人眼界開不知眼界濶多少白鳥去盡青天回凡此之類皆換骨法也顧况詩曰一别二十年人堪幾回别其詩簡拔而立意精確如荆公作與故人詩云一日君家把酒杯六年波浪與塵埃不知烏石江邉路到老相逢得幾回樂天詩曰臨風杪秋樹對酒長年身醉貌如霜葉雖紅不是春如東坡南中作詩云兒童悮喜朱顔在一笑那知是醉紅凡此之類皆奪胎法也學者不可不知山谷黔中晚年詩句得意未及成者有云人得遨遊是風月天開圖畫即江山以為尤所珍愛者不肯輕足成之更有山圍燕坐圖畫出水作夜窗風雨來之句亦不讓前聨也退之有詩贈同遊者喚起窗全曙催歸日未西無心花裏鳥更與盡情啼魯直曰余兒時便哦此詩而了不解其意自出陜右吾年五十八矣時春晚偶憶此詩方悟喚起催歸二禽名也古人於小詩用意精深如此况其大者乎蓋其學問淵源有五石六鷁之旨催歸子規也喚起聲如絡緯圓轉清亮偏於春晚鳴江南謂之春喚眺説之以道作感事詩云干戈雖作墻東客疾病猶存研北身上句用避世墻東王君公事而研北身乃漢上題襟集段成式書云杯宴之餘常居研北又云長疏研北天機素少又云筆下詞人研北諸生蓋言几案面南人坐硯之北也晏叔原聚書甚多每有遷徙其妻厭之謂有類乞兒搬漆碗叔原戲作詩曰生計唯兹碗搬擎豈憚勞造雖從假合成不自埏陶阮杓非同調顔瓢庶共撡朝盛負餘米暮貯藉􅋊糟幸免墦間乞終甘澤畔逃挑宜笻作杖捧稱葛為𫀆儻受桑間餉何堪井上螬綽然真自許呼爾未應叨世久輕原憲人方逐子敖願君同此器珍重到霜毛王仲至與秦少遊謁恭敏李公飯於間燕堂即席聨句云黃葉山頭初帶雪緑波尊裏暫回春欽臣已聞璧月瓊枝句更著朝雲暮雨人觀老愧紅粧翻曲妙喜逢佳客放懷新欽臣天明又出桃源去仙境何時再問津觀仲至使遼回謁李公席中賦詩云窮廬三月已淹留白草黃雲見即愁滿袖塵埃何處洗李家池上海棠洲李方叔嘗作寒食詩云千株密炬出嚴闉走馬天街賜近臣我亦茅簷自鑽燧煨針燒艾檢銅人徐思叔題貧樂圖首句云乃翁畫灰教兒書嬌兒赤骭玉雪膚厥妻曝日輔破𥜗弊筐何有金十奴楊伯子和云三間破屋一床書錦心繡口氷肌膚自紉枯葉作袴襦此君便是長鬚奴王才臣和云大兒阻飢頗廢書小兒忍寒粟生膚婦縱有禈無一𥜗不敢緣此相庸奴三詩皆佳而後出者尤竒李彭商老有建除體贈韓子蒼云滿朝以詩鳴何獨遺大雅平生黃葉句摸索便知價蓋子蒼自館職斥宰分寧縣時也子蒼有館中詩最為時所推故商老有黃葉之句云其全篇云朔風吹雪晝多隂日暮擁階黃葉深倦鵲繞枝翻凍影征鴻摩月墮孤音推愁不去還相覔王荆公詩閉户欲推愁愁終不肯去與老無期稍見侵劉賔客詩與老無期約到來如等間遊宦衣冠少時事病來無復一分心東坡謫居於黃五年赤壁有巨鶻巢於喬木之巔後賦所謂攀棲鶻之危巢俯馮夷之幽宫是也韓子蒼靖康中守黃州三月而罷因遊赤壁而鶻已去作詩示何次仲迂叟云緩尋碧竹白沙遊更挽藤梢上上頭豈有危巢尚棲鶻亦無塵迹但飛鷗經營二頃將歸去眷戀羣山為少留百日使君何足道空餘詩句滿江樓次仲和答云兒時宗伯寄吾州諷誦高文至白頭二賦人間真吐鳳五年溪上不驚鷗􅀢嘗見水人猶怒鶻有危巢孰敢留珍重使君尋故迹西風悵望古城樓二詩皆及鶻巢皆推賦而言也農桑不擾嵗常登邉將無功吏不能四十二年如夢覺春風吹淚過昭陵此詩題於仁宗寢宫不著名氏韓子蒼表出之趙明誠在建康日其妻李易安每值天大雪必戴笠披蓑循城逺覽以尋詩為事得句必邀其夫𢋫和明誠每苦之徽廟一日幸來夫人閣就灑翰於小白團扇書七言十四字而天思稍倦顧在側侍璫云汝有能吟之客可令續之乃薦鄰居太學生既宣入內侍省恭讀宸製不知睿裁云何乞為取旨或續句呈或就書扇左上曰朝來不喜餐必惡阻也當緣此意足句以續於扇續進上大喜會將䇿士生於未奏名下徑使造廷賜以第焉上御詩曰選飰朝來不喜餐御厨空費八珍盤生續曰人間有味俱嘗遍只許江南一點酸康與之在高皇朝以詩章應制與左璫狎適睿思殿有徽廟御畫扇繪事特為卓絶上時持玩流涕以起羮墻之悲璫偶下直竊携至家而康適來留之燕飲漫出以示康紿璫入取殽核輒泚筆几間書一絶於上曰玉輦宸遊事已空尚餘奎藻繪春風年年花鳥無窮恨盡在蒼梧夕照中璫有頃出見之大恐而康已醉無可奈何明日伺間叩頭請死上大怒亟取視之天威頓霽但一慟而已建炎中駕駐維揚康伯可與之上中興十䇿名振一時後秦檜當國伯可乃傳會求進擢為臺郎嘗與檜對局格天閣下檜戲曰此卒渡河是爾將軍之疥癩伯可徐應曰今皇御極視公宰相如腹心檜大喜撤棊酣飲終日而罷檜死伯可亦貶五羊陸士規布衣工詩秦檜喜之嘗挾秦書干臨川守餽遺不滿意升堂嫚罵守懼以書白秦自解秦怒甚陸請見不出猶令其子小相者見之問其近作陸誦其黃陵廟一絶云東風吹草緑離離路入黃陵古廟西帝子不知春又去亂山無主鷓鴣啼小相入誦之秦吟賞再四即命相見待之如初諌議大夫宋文淵齊愈宫詞云禁城春水碧溶溶流出桃花萬片紅葉上細看無一字始知玉女怨春風睢陽道中云竹溪噎絶雨才通無數深紅間淺紅山店落英春寂寂青旗吹盡栁花風向來松檜喜無恙坐久忽聞南澗鐘隱隱修廊人語絶四山滳瀝雪鳴風靖康末金人欲立異姓齊愈書張邦昌姓名示人後為李綱所誅辛稼軒觴客滕王閣詩人胡時可通謁閽人辭焉呵詈愈甚辛使前曰既稱詩人先賦滕王閣有佳句則預坐即題曰滕王高閣臨江渚衆大笑再書云帝子不來春已暮鶯啼紅樹栁搖風猶似當年舊歌舞乃相與宴而厚賙之山隂陸放翁務觀之出也韓平原實招致之所作南園閲古泉二記時雖稱頌而有規勸之忠焉故平原敗而猶得免禍其題武林詩皇輿久駐武林宫汴洛當時未易同廣陌有風塵不起長江如練水常通樓臺飛舞祥煙外鼓吹喧呼明月中六十年間幾來往都人誰解記衰翁臨安春霽詩世味年來薄似紗誰憐騎馬客京華小樓昨夜聽春雨深巷今朝賣杏花矮紙斜行間作草晴窗細乳戲分茶布衣莫動風塵歎猶及清明可到家劉漫塘先生與客燕坐指窗外櫻桃唯一實共以為笑忽一客來訪自言能詩因命賦之云燒丹道士藥罏紅枉費先生九轉功一粒丹砂尋不見曉來枝上弄春風衆咸喜之劉山翁汝進漫塘幼子學問宏深文字典雅與客九日遊龍山以塵世難逢開口笑分韻山翁得口字云縱步龍山巔放舟龍蕩口羣然雁鶩行雜之牛馬走我拙不能詩我病不能酒試問賞花人還有菊花否衆服其工漫塘潤州金壇人山溪李南金登第後畫師以冠裳寫其真南金題詩云落魄江湖二十年布衫濶袖褁風煙如今各樣新裝束典却清狂賣却顛有良家女流落可歎者南金贈以詞曰流落今如許我亦三生杜牧為秋娘著句先自多愁多感慨更值江南春暮君看取落花飛絮也有吹來穿繡幌有因風飄墮隨塵土人世事總無據佳人命薄君休訴若説與英雄心事一生更苦且盡尊前今日意休記緑窗睂嫵但春到兒家庭户幽恨一簾煙月曉恐明年雁亦無尋處渾欲倩鶯留住驛路有白塔橋印賣朝京里程圖士大夫往臨安必買以披閲有一人題詩於壁曰白塔橋邉賣地經長亭短驛甚分明如何祗説臨安路不較中原有幾程漢陽郎官湖春日四絶句其一兩山收雨暗平沙遮斷溪梅隔水花留得煙林作圖畫依稀松磴有人家其二空山玉蕊照瓊瑰到處尋花共往回欲識春風最竒處試來同看雨中梅其三朦朧花影月黃昏著意春風入酒痕知是江梅喜佳客倒垂花蕊照清尊其四十日春隂到水亭水邉楊栁一時青梅花過盡桃花惡乞取山􅈨入淨瓶尚書郎李祁蕭逺謫漢陽酒稅時所作也辛卯嵗北來人數百輩寓於襄陽府光孝寺有一人題詩於壁云干戈未定各何之一事無成兩鬢絲蹤迹大綱王粲傳情懷小樣杜陵詩脊令信斷雲千里烏鵲驚飛月一枝安得中山千日酒陶然直到太平時雖未為絶唱讀之亦使人增感也汜石湖詩云朝霞不出門暮霞行千里今晨日未出曉氛散如綺心疑雨再作眼轉雲四起我豈知天道吳儂諺云爾古來占滂沱説者類恢詭飛雲走羣羊停雲浴三豨月當天畢宿風自少女起爛石燒成香汗礎潤如洗逐婦鳩能拙穴居狸有智蜉蝣強知時蜥蝪與聞計垤鳴東山鸛堂審南柯蟻或加隂石鞭或議陽門閉或云逢庚變或自換甲始刑鵝與象龍聚訟非一理不如老農諺影響捷於鬼哦詩敢誇博聊用醒午睡此詩引用占雨事甚詳可喜諺有云日出早雨淋腦日出晏晒殺雁又云月如懸弓少雨多風月如仰瓦不求自下二説尚遺為增補二句云日占出海時月驗仰瓦體諺云乾星照濕土來日依舊雨王全玉作宫體十憶詩李元膺重見之愛其詞意宛轉且曰讀之動人老狂聊復效尤亦作十絶憶行曰屏帳腰支出洞房花枝窣地領巾長裙邉遮定雙鴛小只有金蓮步步香憶坐曰椅上藤花闕靣平繡裙斜綽茜羅輕踏青姊妹頻來喚鴛履貪工不肯行憶飲曰緑蟻頻催未厭多帕羅香軟襯金荷從教弄酒春衫涴别有風流上眼波憶歌曰一串紅牙碎玉􅒱碧雲無力駐晴霄也知唱到關情處緩按餘聲眼色招憶書曰纎玉參差象管輕蜀箋小楷碧窗明袖紗密掩嗔郎看學寫鴛鴦字未成憶博曰小閣爭籌畫燭低錦茵圍坐玉相欹嬌羞慣被諸郎戲袖映春䓤出注遲憶顰曰漫注橫波無語處輕攏小板欲歌時千愁萬恨關心曲却使睂尖學别離憶笑曰從來題目值千金無事羞多始見心乍向客前猶掩斂不知已覺鈿窩深憶睡曰泥嬌成困日初長暫卸輕裙玉簟涼漠漠帳煙籠玉枕粉肌生汗自蓮香憶粧曰宫樣梳兒金縷犀叉梁氷玉刻蛟螭睂間要點雙心事不管蕭郎只畫睂其情致殊妍麗自非風流才思者不能作也政和中大臣有不能詩者因進言詩為元祐學術不可行時李彥章為中丞承望風旨遂上章論淵明李杜而下皆貶之因詆黃張眺秦等請為科禁何清源至修入令式諸士庶習詩賦者杖一百毗陵士人姓李氏家有一女年十六能詩甚有佳句有拾得破錢詩云半輪􅋊月掩塵埃依稀猶有開元字想見清光未破時買盡人間不平事又有彈琴詩云昔年剛笑卓文君豈信絲桐解誤身今日未彈心已亂此心元自不由人楊察侍郎謫信州及召還有士子十二人送於境上臨别察即席賦詩皆用十二事而引用精切士子無能屬和者其詩曰十二天之數今宵席客盈位如星占野人若月分卿極醉巫山側聫吟嶰管清他年為舜牧叶力濟蒼生題古有絶唱者諌議錢公昆題淮隂侯廟曰築壇拜日恩雖厚躡足封時慮已深隆凖早知同烏喙將軍應起五湖心尚書張公方平題徐州歌風臺二絶曰縱酒疏狂不治生中央有土不歸耕偶因亂世成功業更向翁前與仲爭落魄劉郎作帝歸尊前一曲大風辭才如信越猶俎醢安用思他猛士為陳文惠公題華清宫朝元閣云朝元高閣逈秋毫無隱情浮雲忽以蔽不見漁陽城楊至質題茅山詩曰玉胏空浮已字山五門不鎖洞天寬紫花可餌秋尋术紅熖難埋夜見丹畫得一牛方水草飛來三鵠各峰巒仙蹤寂寞高風逺誰為先生指額瘢楊誠齋題淮隂侯廟壁二首其一曰來時月黑過淮隂歸路天花舞故城一劍光寒千古淚三家市出萬人英少年跨下安無忤老父圮邉愕不平人物若非觀嵗暮淮隂何必減文成其二曰鴻溝祇道萬夫雄雲夢何銷武士功九死不分天下鼎一生還負室前鐘古來犬斃愁無蓋此後禽空悔作弓兵火空餘非舊廟三間破屋兩株松眺伯禹載之學問精確少見其比嘗作昭靈夫人祠詩云殺翁分我一杯羮龍種由來事杳冥安用生兒作劉季暮年無骨葬昭靈陳留風俗傳云小黃縣者沛地之黃鄉也沛公起兵野戰喪皇妣於黃鄉天下平定乃使使者以梓宫招魂幽野於是有丹蛇在水自灑濯入於梓官其浴處有遺髻故諡曰昭靈夫人嚴州烏石寺在高山之上有嶽武穆飛張循王俊劉太尉光世題名劉不能書令侍兒意真代書薑堯章題詩曰諸老凋零極可哀尚留名姓壓崔嵬劉郎可是疏文墨幾點燕支涴緑苔蘇州僧仲殊本文士也因事出家有潤州詩云北固樓前一笛風斷雲飛出建昌宫江南二月多芳草春在濛濛細雨中瑞麟香暖玉芙蓉畫蠟凝輝到曉紅數點漏移衙仗北一翻雨滴甲樓東夢遊黃闕鸞巢外身卧彤幃虎帳中報道譙門初日上起來簾幕杏花風此僧仲殊之詩也王左丞安中守平江日會客仲殊與焉繼以疲倦先起熟寐於黃堂中不知客散及覺日已曈曨矣王因罰以此詩始放去瑞麟香安中家所造也姑蘇女子沈清友能詩如晚天移掉泊垂虹間倚蓬窗問釣翁為底鱸魚低價賣年來朝市怕秋風得風人之體詠漁父云起家紅蓼岸傳世緑蓑衣詠牧童云自便牛背穩却笑馬蹄忙得下字之工唐路德延有孩兒詩五十韻盛傳於世近代洛中致政侍郎張公師錫追次其韻和成老兒詩亦五十韻其詩曰鬢髮盡皤然睂分白雪鮮周遮延客話傴僂抱孫憐無病常供粥非寒亦倚綿假溫推擁背借力杖搘肩貌比三峯客年過四皓仙喚方離枕上扶始到門前每愛烹山茗常嫌飣石蓮耳聾如塞纊眼暗似籠煙宴坐羸憑几乘騎困嚲鞭頭搖如轉旋唇動若抽牽骨冷愁離火牙疼却潄泉形骸將就木囊槖尚貪錢膠睫乾眵綴粘髭冷涕懸披裘腰懶繫濯手袖慵揎擡舉衣頻换扶持藥屢煎坐多茵易破行少履難穿喜婢裁裙布嗔妻買粉鈿房教深下幕牀遣厚鋪氊琴聽憐三樂圖張笑七賢看嫌經字小􅀈喜磬聲圓食罷羮流袂杯餘酒帶涎樂來須遣罷醫到久相延褁帽縱橫掠梳頭取次纒長吁思往事多感聽哀絃氣注腰還重風牽口便偏墓松先遣種志石預教鐫客到唯求藥僧來忽問禪養茶懸灶壁晒艾曝簷椽怒僕空睜眼嗔兒謾握拳心驚嫌蹴踘腳軟怕鞦韆局縮同寒狖榷豗似飽鳶觀瞻多目眩牽動即頭旋女嫁求紅燭男婚乞綵箋已聞捐几杖寧更佩韋弦賔客身非與兒孫事已傳養和屏作伴如意拂相連久棄登山屐惟存負郭田呻吟朝不樂展轉夜無眠呼稚臨牀畔看書就枕邉冷疑懷貯水虛訝耳聞蟬束帛非無分安車信有緣伏生甘坐末絳老讓行先拘急將風夜昏沉欲雨天雞皮塵漸漬齯齒食頻填每憶居郎署常思釣渭川喜逢迎佛會羞赴賞花筵徑狹容移檻階危索減磚好生焚鳥網惡殺拆漁船既感桑榆日常嗟蒲栁年長思當弱冠悔不賸狂顛路德延儋州巖相猶子也為朱友謙書記友謙禮待不優作孩兒詩以刺之友謙大怒沉之黃河其詩云情態任天然桃紅兩頰鮮乍行人共看初語客多憐臂膊肥如瓠肌膚軟勝綿長頭才覆額分角漸垂肩散誕無塵慮逍遙占地仙排衙朱榻上喝道畫堂前合調歌楊栁齊聲踏採蓮走堤衝細雨奔巷趂輕煙嫩竹乘為馬新蒲掉作鞭鶯雛金鏇繫猧子綵絲牽擁鶴歸晴島驅鵝入暖泉楊花爭弄雪榆葉共收錢錫鏡當胸挂銀珠對耳懸頭依蒼鶻褁袖學柘枝揎酒殢丹砂暖茶催小玉煎頻邀夀花插時乞繡針穿寶匣拏紅豆妝奩拾翠鈿短袍披案褥尖帽戴靴氊展畫趨三聖開屏笑七賢貯懷青杏小垂額緑荷圓驚滴沾羅淚嬌流汚錦涎倦書饒婭姹憎藥巧遷延弄帳鸞綃映藏衾鳳結纒指𫾣迎使鼓筯撥賽神絃簾拂魚鈎動筝摧雁柱偏棋圖添路畫笛管欠聲鐫惱客初酣睡驚僧半入禪尋蛛窮屋瓦探雀遍樓椽拋果忙開口藏鉤亂出拳夜分圍榾柮朝聚打鞦韆折竹裝泥燕添絲放紙鳶互誇輪水磑相效放風旋旗小裁紅絹書幽截碧箋逺鋪張鴿網低控射蠅弦吉語時時道謠歌處處傳匿窗肩乍曲遮路臂相連鬪草當春徑爭毬出晚田栁傍慵獨坐花底困橫眠等鵲潛籬畔聽蛩伏砌邉傍枝拈舞蝶隈樹捉鳴蟬平島跨蹻上層崖逞捷緣嫩苔車迹小深雪履痕全競指雲生岫齊呼月上天蟻窠尋徑劚蜂穴繞階填樵唱回深港牛歌下逺川壘材為屋木和土作盤筵險砌高臺石危跳峻塔磚忽升鄰屋樹偷上後池船項槖稱師日甘羅作相年明時方在德勸爾減狂顛長安南山下書生作小圃時蒔花木以待遊子一日有金犢車從數女奴皆玉色麗人車中人下飲於庭邀書生同坐生意當時貴人家不出既見欵甚將别出小碧箋書詩為贈云相思無路莫相思風裏楊花只片時惆悵深閨獨歸處曉鶯啼斷緑楊枝李漢老建炎末自簽樞密遷右轄未幾遷知院前後二三月而罷因為梅詩以託意云經霜厯雪忿開遲風笛無情抵死吹鼎實未成心尚苦不甘桃李傍疏籬宋稗類鈔卷二十
