body:
  text: 宋稗類鈔卷二十五常熟潘永因編詼諧第四十二尚書榖使吳越忠懿王宴之因食蝤蛑詢其族類忠懿命自蝤蛑至蜞蚏凡取十餘種以進榖曰真所謂一蟹不如一蟹宴將畢或進葫蘆羮相勸榖下箸忠懿笑曰先王時庖人善為此羮今依樣饌來者榖一語不答榖譏錢氏一代不如一代忠懿以榖有年年依樣畫葫蘆之句故報之陶尚書奉使江南韓熙載遣家妓以奉盥􅓢及旦以書謝有云巫山之麗質初臨霞侵鳥道洛浦之妖姿自至月滿鴻溝舉朝不能會其辭熙載因召家妓詢之云是夕忽當浣濯陶尚書榖本姓唐避石普諱而改焉小字鐵牛李相濤出典河中嘗有書與陶公曰每過中流潛思令德陶初不為意細思方悟蓋河中有張燕公鑄繫橋鐵牛也太宗欲周知天下之事雖疏逺小臣茍欲詢訪皆得登對王禹稱大以為不可上疏有曰至如三班奉職其卑賤可知比因使還亦得上殿云云當時盛傳此語未幾王坐論妖尼道安救徐鉉事謫為商州團練副使一日從太守赴國忌行香天未明倣佛見一人紫𫀆秉笏立於佛殿之側王意恐官髙欲與之敘位其人斂板曰某即可知也王不曉其言而問之其人曰公嘗疏云三班奉職卑賤可知某今官為借職是即可知也王憮然自失聞者莫不大笑盛文肅公度豐肌大腹居馬上前如俯後如仰而眉目清秀丁晉公謂疏瘦靣如刻削二公皆浙人也並以文辭知名梅學士詢在真宗朝久為名臣至慶厯中為翰林侍讀好潔衣服裛以龍麝其在官舍每晨起將視事必焚香兩爐以公服罩之撮其袖以出坐定徐展濃香郁然滿室有竇元賔者五代漢相貞固之孫也以名家子有文行為館職而不事修潔衣服垢汗經時未嘗沐浴時人為之語曰盛肥丁瘦梅香竇臭明孝宗朝元守直為通政使王敞為左通政薑清李浩為參議聲音俱不甚稱時有謠曰元哭王唱薑辣李苦蓋元重濁王尖麗薑則急躁李則氣短皆切中云盛度體豐肥一日自前殿趨出宰相在後盛初不知忽見即欲趨避行百餘步乃得直舍隱於其中石學士見其喘甚問之盛告其故石曰相公問否盛曰不問别去十餘步乃悟罵曰奴乃以我為牛楊文公大年嘗戒門人為文宜避俗語既而公因作表云伏惟陛下德邁九皇門人鄭戩遽請於公曰未審何時得賣生菜于是公為之大笑易之楊大年方與客棋石中立自外至坐于一隅大年因誦賈誼鵩賦以戲之云止於坐隅貌甚間雅石即答云口不能言請對以臆楊名億故云楊文公億有重名嘗因草制為執政者多所塗削甚不平因取稿上塗抹處以濃墨就加為鞋底樣題其旁曰世業楊家鞋底人或問故億曰此謂見别人腳迹當時傳以為笑後舍人草制𬒳墨黜者則相謔曰又遭鞋底祥符中日本國忽梯航稱貢蓋因本國之東有祥光現其國素傳中原天子聖明則此光現真宗喜敕本國建一佛祠以鎮之賜額曰神光朝辭日上親臨遣貢使回乞賜寺記時詞臣當直者文學不甚優贍遂假張學士君房捉刀既傳宣令急撰寺記時張醉飲於􅈨樓遣人遍覓之不得而貢使在閣門翹足而待又中人三促之紫薇大窘後錢楊二公玉堂暇日改間忙令大年曰世上何人得最間司諫拂衣歸華山蓋种放得告還山養病之時也希白曰世上何人號最忙紫薇失却張君房時傳為雅笑張亢滑稽敏捷有門客因會話亢問曰近日作賦乎門客曰近作坤厚載物賦因自舉其破題曰粵有大德其名曰坤亢應聲答曰奉為續兩句可移贈和尚續曰非講經之座主是傳法之沙門龍圖劉煜嘗與內相劉筠聚會飲茗問左右曰湯滚也未左右皆應曰已滚筠曰僉曰鯀哉煜應聲曰吾與點也晏元獻以文章名譽少年富貴性豪俊所至延賔客一時名士多出其門罷樞密副使為南京留守時年三十八幕丁王琪張亢最為上客亢體肥大琪目為牛琪瘦骨立亢目為猴二人互相譏誚琪嘗嘲亢曰張亢觸墻成八字亢應聲曰王琪望月呌三聲一座為之大笑苖振以苐四人及第既而召試館職一日謁晏丞相晏語之曰君久從吏事必踈筆研今將就試宜稍溫習也振率然答曰豈有三十年為老娘而倒繃孩兒者乎晏公俯而哂之既而試澤宫選士賦韻叶有王字振叶之曰率土之濱莫非王由是不中選晏公聞而笑曰苖君竟倒繃孩兒矣石中立喜滑稽天禧中為員外郎時西域獻獅子畜於御苑日給羊肉十五斤石率同列往觀或曰吾輩忝與郎曹反不及一獸石曰汝何不知分彼乃苑中獅子吾曹員外郎耳安可並耶包彈對杜撰為甚的包拯為臺官嚴毅不恕朝列有過必力彈擊故言事無瑕疵者曰沒包彈杜默為詩多不合律故言事不合格者曰杜撰世言杜撰包彈本此湘山野録載盛文肅度撰文節神道碑石參政中立急問曰誰撰盛卒對曰度撰滿堂大笑文肅在杜默之前則知杜撰之説其來久矣章郇公得象與石資政中立素相友善而石喜談諧嘗戲章云昔時名畫有戴嵩牛韓幹馬而今乃有章得象也丁普公在祕閣日凝寒近火嘗以鐵箸於灰燼間書畫同舍伺公暫起燒箸使熱公至為箸所尉曰昨宵通曉不寐為四鄰絃管喧呼所聒同舍曰是必嫁娶之家也公曰非也是時平嵗稔小人輩共樂烙其父母祖先耳丁普公自崖州還坐客論天下州郡何地最隆盛公曰唯崖州地望最重客問其故答曰宰相只作彼州司戶參軍他州何可及文潞公坐客有言新義極迂怪者公笑不答久之曰頗嘗記明皇坐勤政樓上見釘鉸者上呼曰朕有一破損平天冠汝能釘鉸否此人既為完之上曰朕無用此冠以與汝為丁直其人惶恐謝罪上曰俟夜深閉門後獨自戴甚無害也韓縝為秦州以賊殺不辜去官秦人語曰寧逢乳虎莫逢韓玉汝或問莫逢韓玊汝當以何對孫臨最滑稽曰可怕李金吾歐陽公與人行令各作詩兩句須犯徒以上罪者一云持刀哄寡婦下海劫人船一云月黑殺人夜風髙放火天至歐云酒黏衫袖重花壓帽簷偏或問之答云當此時徒以上罪亦做了歐陽文忠公知貢舉省闈故事士子有疑許上請文忠方以復古道自任將明告之以崇雅黜浮期以丕變文格蓋至日昃猶有喋喋弗去者過晡稍閴矣方與諸公酌酒賦詩士猶有扣簾梅聖俞怒曰瀆則不告當勿對文忠不可竟出應鵠𫀆環立觀所問士忽前曰諸生欲用堯舜事而疑其為一事或二事惟先生幸教之觀者閧然笑文忠不動色徐曰似此疑事誠恐其誤但不必用可也內外又一笑有士大夫投啓謝論薦者云措諸事業皆仲尼之皇皇發為文章合唐虞之渾渾以唐虞與仲尼為對可與此士分謗王宣徽拱辰於洛中營第甚侈中堂起屋三層最上曰朝天閣時司馬公亦在洛於私第穿地丈餘作壤室邵康節見富鄭公公問洛中新事邵云近有一巢居一穴處者富為大笑王岐公詩喜用金玊珠璧以為富貴而其兄謂之至寶丹有人云詩能窮人且強作富貴語看何如數日搜索止得一聨云脛脡化為紅玳瑁眼睛變作碧琉璃為之絶倒王介甫為相大講天下水利劉貢父嘗造介甫值一客在坐獻䇿曰梁山泊決而涸之可得良田萬頃但未擇得利便之地貯其水耳介甫俯首沉思貢父抗聲曰此甚不難介甫欣然以為有䇿遽問之貢父曰别穿一梁山泊則足以貯此水矣介甫大笑而止荆公禹玉熙寧中同在相府一日侍朝忽有虱自荆公𥜗領而上直緣其鬚上顧之笑公不自知也朝退禹玊指以告公公命從者去之禹玉曰未可輕去輒獻一言以頌虱公曰如何禹玊笑而應之曰屢遊相鬚曽經御覽荆公亦為之解頥王荆公封舒王配享宣聖廟位居孟子之上與顔子為對其壻蔡元度卞實主之優人嘗因對御戲設孔子正坐顔孟與安石侍側孔子命之坐安石揖孟子居上孟辭曰天下逹尊爵居其一軻僅蒙公爵相公貴為真王何必謙光如此遂揖顔子顔曰回也陋巷匹夫平生無分毫事業公為名世真儒辭之過矣安石遂處其上夫子不能安席亦避位安石惶懼拱手云不敢往復未決子路在外憤憤不能堪徑趨從祀堂挽公冶長臂而出公冶為窘迫之狀謝曰長何罪乃責數之曰汝全不救護丈人看取别人家女壻其後朝論亦頗疑窒於禮文每車駕幸學輒以屏障其面舊制兖鄒二公東西向今郡縣學二公並列於左者蓋靖康撤荆公像之時徒撤而不復正耳大臣至近戚有疾恩禮厚者多宣醫及薨例遣內侍監護葬事謂之敕葬國醫未必皆髙手既𬒳旨須求靣投藥為功病者不敢辭偶藥不中病往往為害敕葬則喪家無預一聽命於監護官不敢復計費惟其所欲至有罄資不能辦者于時諺云宣醫納命敕葬破家蘇長公在維揚一日設客十餘人皆一時名士米元章亦在坐酒半元章忽起立自贊曰世人皆以芾為顛願質之子瞻長公笑答曰吾從衆東坡在元祐以髙才狎侮公卿率有標目獨於司馬溫公不敢有所輕重一日相與論免役差役利害不合及歸舍方卸巾弛帶輒連呼曰司馬牛司馬牛東坡謁吕微仲微仲方寢久不出已而見于便坐其庭中有昌羊盆豢一緑毛龜坡指曰此易得耳唐莊宗時有進六目龜者時伶人敬新磨獻口號云不要閙不要閙聽取龜兒口號六隻眼兒睡一覺抵别人三覺宋初懲五代藩鎮之弊置通判以分知州之權謂之監州有錢昆少卿者餘杭人嗜蟹嘗求輔郡人問其所欲昆曰但得有螃蟹無通判處則可此語風味似普人東坡云欲問君王乞符竹但憂無蟹有監州即用其事昔有黠者滑稽以玩世曰彭祖八百歲而死其婦哭之慟其鄰里共解之曰人生八十不可得而翁八百矣尚何尤婦對曰汝輩自不論爾八百死矣九百猶在也世以癡為九百謂其精神不足也又曰令新視事而不習吏道召胥魁具道笞十至五十及折杖數令遽止之曰我解矣笞六十為杖十四耶魁笑曰五十尚可六十猶癡耶長公取為偶對曰九百不死六十猶癡李覯字泰伯旴江人賢而有文章蘇子瞻諸公極推重之素不喜佛不喜孟子好飲酒一日有逹官送酒數斗泰伯家釀亦熟然性介僻不與人往還一士人知其富有酒無計得飲乃作詩數首罵孟子其一云完廩捐階未可知孟軻深信亦還癡丈人尚自為天子女壻如何弟殺之又云乞丐何曽有二妻鄰家焉得許多雞當時尚有周天子何必紛紛説魏齊李見詩大喜留連數月所與談莫非罵孟子也無何酒盡乃辭去既而又有寄酒者士人再往作仁義正論三篇大率皆詆釋氏李覽之笑曰公文采甚竒但前次𬒳公喫了酒後極索寞今次不敢相留留此酒以自遣懷聞者莫不絶倒梁太祖受禪姚垍受翰林學士上問及裴延裕行止曰頗知其人文思甚捷垍曰向在翰林號為下水船太祖應聲曰卿便自上水船議者以垍為急湍灘頭上水船黃魯直詩曰花氣薰人欲破禪心情其實過中年春來詩思何所似八節灘頭上水船山谷點化前人語而其妙如此詩中三昧手也東坡在惠州天下傳其已死後七年北歸時章丞相方貶雷州東坡見南昌太守葉祖洽葉問曰世傳端明已歸道山今尚爾遊戲人間耶坡曰途中見章子厚乃回返耳王聖塗闢之云蘇子瞻文章議論獨出當世風格髙邁書畫亦精絶有得其真迹者重於珠玉而遇人溫厚有片善即與之傾盡城府論辨酬唱間以談謔謫居黃州日有陳處士携紙筆求書會客方鼓琴遂書曰或對一貴人彈琴者天隂聲不發貴人怪之曰豈絃慢耶對曰絃也不慢其清談善謔類如此東坡在黃州陳季常慥在岐亭時相往來季常喜談養生自謂吐納有所得後季常因病公以書獻之曰公養生之效有成績今又一病彌月雖使臯陶聽之未易平反公之養生正如小子之圓覺可謂害腳法師鸚鵡禪五通氣毬黃門妾也前輩相與可謂善謔也蘇子由在政府子瞻為翰苑有一故人與子由兄弟有舊者來干子由求差遣久而未遂一日來見子瞻且曰某有望內翰以一言為助公徐曰舊聞有人貧甚無以為生乃謀伐冢遂破一墓見一人祼而坐曰爾不聞漢世楊王孫乎祼葬以矯世無物以濟汝也復鑿一冡用力彌艱既入見一王者曰我漢文帝也遺制壙中無納金銀器皆陶瓦何以濟汝復見有二冡相連乃穿其在左者久之方透見一人曰我伯夷也瘠羸靣有飢色餓於首陽之下無以應汝之求其人嘆曰用力之勤無所獲不若更穿西冡或冀有得也瘠嬴者謂曰勸汝别謀於他所汝視我形骸如此舍弟叔齊豈能為人也故人大笑而去元祐初用治平故事命大臣薦士試館職多一時名士在館者率論資考次遷未有越次進用者皆有滯留之歎張文潛朝無咎俱在其間一日二人閲朝報見蘇子由自中書舍人除戶部侍郎無咎意以為平緩曰子由此除不離核謂如果之黏核者文潛遽曰豈不勝汝枝頭乾乎聞者皆大笑東北有果如李每熟不及摘輒便稿土人因取藏之謂枝頭乾故云元祐中一官有婚於中表者已涉溱洧之嫌及夜深女家索催粧詩儐者張仲素朗吟曰舜耕餘草木禹鑿舊山川坐有李程者應聲笑曰禹舜之事吾知之矣郎中曹琰滑稽便捷嘗有僧以詩投獻閲其首篇登潤州甘露閣曰下觀洋子小琰曰何不道卑吠狗兒肥次閲一篇送僧云猿啼旅思悽琰曰何不道犬吠張三嫂座中無不大笑洪舜俞為考功郎應詔言事論臺諫失職詞甚剴切內有其相率勇往而不顧者惟恭請聖駕欵謁景靈宫而已句遂為臺官所劾謂祇見宗廟重事也而舜俞乃云而已有輕宗廟之意因𬒳落三官舜俞自為詩云不得之乎成一事却因而已失三官藝祖幸朱雀門指門額問趙普何不止書朱雀門乃著之字普曰語助詞藝祖曰之乎者也助得甚事洪語本此劉攽博學有俊才然滑稽喜謔玩屢以犯人熙寧中為開封府試官出臨以教思無窮論舉人上請曰此卦大象如何劉曰要見大象當詣南御苑也又有請曰至于八月有凶何也答曰九月固有凶矣蓋南苑豢馴象而榜帖之出常在八月九月之間也馬默為臺官彈奏攽輕薄不當置在文館攽聞而歎曰既為馬默豈合驢鳴吕嘉問提舉市易務三司使曽布劾其違法王荆公惑黨人之説反以為罪曽既隔下朝請而嘉問治事如故攽聞而歎曰豈意曽子避席望之儼然乎望之嘉問字也王彥和汾口吃劉攽嘗嘲之曰恐是昌家又疑非類不見雄名唯聞艾氣蓋以周昌韓非楊雄鄧艾皆吃也又嘗同趨朝聞呌班聲汾謂曰紫宸殿下頻呼汝蓋常朝知班吏多云班班謂之喚班攽應聲答曰寒食原頭屢見君汾與墳同音各以其名為戲也攽又嘗戲王覿曰公何故見賣王答曰賣公直甚分文攽與王介甫最為故舊介甫嘗戲拆其名曰劉攽不直分文攽遂答曰失女便成宕無宀真是妬下交亂真如上頸誤當寧介甫大銜之陳亞揚州人仕至太常少卿年七十卒蓋近世滑稽之雄也嘗著藥名詩百餘首行於世若風月前湖近軒窗半夏涼棋怕臘寒呵子下衣嫌春暖宿紗裁及咏白髮云若是道人頭不老老君當日合烏頭贈祈雨僧詩云無雨若還過半夏和師晒作葫蘆豝之類最膾炙人口又嘗知祥符縣親故多借車馬亞亦作詩曰地居京界足親知托借尋常無歇時但看車前牛領上十家皮沒五家皮覽者無不絶倒常言藥名用於詩無所不可而幹運曲折使各中理在人之智思耳或曰延胡索可用乎曰可沉思久之因朗吟曰布𫀆袖裏懷漫刺到處遷延胡索人聞者莫不大笑又自為亞字謎曰若教有口便啞且要無心為惡中間全沒肚腸外面強生稜角此雖一時俳諧之詞然所寄興亦有深意亞嘗知嶺南思州到任與親舊書曰使君五馬雙旌名目而已螃蟹兩螯八足真實不虛又嘗知潤州幕中有上官弼為亞所親任滿將去謂亞曰郎中才行無玷宜簡調謔亞曰君乃上官鼻也如下官口何弼笑而去蔡君謨以其名獻之曰陳亞有心終是惡陳復之曰蔡襄無口便成衰時以為名對宋初郭忠恕嘲司業聶崇義云近貴全為聵攀龍不是聾雖然三箇耳其奈不成聰聶應聲曰莫笑有三耳何如蓄二心蔡陳相戲所自祖也劉攽與王介同為開封府試官用事忿爭監試陳襄以聞二人皆贖金而中丞吕公著又言責之太輕遂皆奪主判是時雍子方為開封府推官戲攽曰據罪名當坐決臀杖十三攽答曰然吾已入文字矣其詞曰切見開封府推官雍子方身材長大臀腿豐肥臣實不如舉以自代合坐大笑攽之奪主判其實中丞素不樂攽也其謝表略曰彍弩射市薄命難逃飄瓦在前忮心不校又曰在矢人之術唯恐不傷而田主之牛奪之已甚劉貢父為中書舍人一日朝會幕次與三衛相鄰時諸帥兩人出軍伍有一水晶茶盂傳玩良久一帥曰不知何物所成瑩潔如此貢父隔幕謂之曰諸公豈不識此乃多年老兵耳劉貢父初入館乘一騍馬而出或言此豈公所乘亦不慮趨朝之際有從羣者或致奔踶之患耶貢父曰吾將處之也或問何以處之吾令市青布作小襜繫之馬後耳或曰此更詭異也貢父曰吾初幸館閣之除俸入儉薄不給桂薪之用因就亷直取此馬以代步不意諸君督過之深姑為此以掩言者之口耳沈存中為內翰劉貢父與從官數人同訪之始下馬典謁者報云內翰方就浴可少待貢父語同行曰存中死矣待之何益衆驚問其故貢父曰孟子云死矣盆成括衆方悟其為戲石曼卿為集賢校理遊娼館為不逞者所窘曼卿醉與之校為術司所録曼卿詭怪不羈謂主者曰只乞就本廂科決欲詰旦歸館供職廂帥不喻其謔曰此必三館吏人也杖而遣之邊人傳誦一詩云昨日隂山吼賊風帳中驚起紫髯翁平明不待全師出連把金鞭打鐵驄有張師雄者西京人好以甘言悅人晚年尤甚洛中號曰密翁翁出官在邊郡一夕賊馬至界上忽城中失師雄所在至曉方見師雄重衣披裘伏於土窟中西人呼土窟為空尋有人改舊詩以嘲曰昨夜隂山吼賊風帳中驚起蜜翁翁平明不待全師出連著皮裘入土空嘉興聞人德茂名滋老儒也喜留客食然不過蔬豆而已郡人求館客者多就之謀又多蓄書喜借人自言作門牙客充書籍行開豆腐羮店長安有安氏家藏唐明皇骷髏作紫金色其家事之至謹因而富盛後其家析居爭髑髏斧為數片張文潛聞之曰明皇生死為姓安人蒿惱合坐大笑時秦少遊方為賈御史彈劾不當受館職文潛戲少遊曰千餘年前賈生過秦今復爾也聞者以為佳謔林瑀王淶同作直講林謂王曰何相見之濶也王曰遭此霖雨瑀曰今後轉更踈濶王曰何故答云逢此短晷蓋譏王之侏儒元祐間有治春秋陳生與宋門一娼狎一日會飲于曹門因用春秋之文題壁曰春正月會吳姬于宋夏四月復會于曹或譏者就以其文戲之曰秋飢冬大雪公薨君子曰不度德不量力其死於飢寒也宜哉宋行都節序皆有休假惟七夕百司皆不準假有時相問堂吏七夕不作假有何典故吏應曰七夕古今無假時相但唯唯不知其有所侮也栁詞七夕二郎神曰須知此景古今無價紹聖間朝廷貶責元祐大臣及禁毁元祐學術文字有言司馬溫公神道碑乃蘇軾撰述合行除毁於是州牒巡尉毁折碑樓及碎碑張山人聞之曰不須如此行遣只消令山人帶一箇玉册官去碑額上添鐫兩箇不合字便了也碑額本云忠清粹德之碑云彭齊吉州人才辨滑稽無與為對未第時嘗謁南豐宰而宰不喜士平居未嘗展禮一夕虎入縣廨嘻所畜羊棄殘而去宰即以會客彭亦預翼日投詩謝之曰昨夜黃班入縣來分明蹤迹印蒼苔幾多道德驅難去些子豬羊便引來令尹聲聲言有過録公口口道無災思量也解開東閣留取頭蹄設秀才覽者無不絶倒錢穆甫為如臯令會嵗旱蝗發而泰興令獨紿郡將云縣界無蝗已而蝗大起郡將詰之令辭窮乃言縣本無蝗蓋自如臯飛來仍檄如臯請嚴捕蝗無使侵鄰境穆甫得檄輒書其紙尾報之曰蝗蟲本是天災即非縣令不才既自敝邑飛去却請貴縣押來一作米元章雍丘縣事誤也林可山稱和靖七世孫不知和靖不娶已見梅聖俞序中薑石帚嘲之曰和靖當年不娶妻因何七世有孫兒若非鶴種并梅種定是瓜皮搭李皮一相士黃生見黃魯直懇求數字取信為遊謁之資魯直大書遺曰黃生相豫官為兩制夀至八十是所謂大葫蘆種也一笑黃生得之欣然士夫間莫解其意因問之黃笑曰一時戲謔耳某頃年見京師相國寺中賣大葫蘆種仍背一葫蘆甚大一粒數百錢人競買至春種結仍乃瓠爾蓋譏黃術之難信也王觀恃才放誕陸子履慎默於事無所可否觀嘗以方直少之然二人極相善觀嘗寢疾子履往候之觀褁帽坐復帳中子履笑曰體中小不佳何至是所謂王三惜命也觀厲聲曰王三惜命何如六四括囊聞者莫不大笑紹聖中蔡京館伴遼使李儼蓋泛使者留館頗久一日儼方飲忽持盤中杏曰來未開花如今多幸京即舉梨謂之曰去雖葉落安可輕移劉貢父觴客子瞻有事先起劉調曰幸早裏且從容子瞻曰奈這事須當歸各以三果一藥為對強淵明字隱季帥長安辭蔡太史京蔡戲云公今吃冷茶去也強不曉而不敢發問親戚間有熟知長安風物者因以此語訪之乃笑曰長安妓女步武極小行皆遲緩故有吃冷茶之戲毛澤民受知曾文肅擢置館閣文肅南遷坐黨與得罪流落久之蔡元度鎮潤州與澤民俱臨川王氏壻澤民傾心事之惟謹一日家集觀池中鴛鴦元度席上賦詩末句云莫學飢鷹飽便飛澤民即席和以呈元度曰貪戀恩波未肯飛元度夫人笑曰豈非適從曾相公池中飛過來者耶澤民慚不能舉首建中初曾文肅秉軸與蔡元長兄弟為敵有當時文士與文肅啓略云扁舟去國頌聲惟在於曽門䇿杖還朝足迹不登於蔡氏明年文肅南遷元度當國即更其語以獻曰幅巾還朝頌聲咸歸於蔡氏扁舟去國片言不及於曾門士大夫不足養如此錢昻治郡有聲以材能稱於崇觀間短小精悍老而矍鑠嘗帥秦州時童貫初得幸為熙河措置邊事恃寵驕倨將迎不暇獨昻未嘗加禮一日赴天寧開啓待貫之來久之方至昻問之曰太尉來何暮也貫曰偶以所乘驢小而難騎動輒跳躍適方欲據鞍忽盤旋庭中甚久以此遲遲昻曰太尉之驢雄邪貫對曰雄者也昻曰既爾難奈何不若閹之貫一時愧怒而莫能報其後貫大用事卒致遷謫有一士夫于京師買一妾自言是蔡太師府厨中人一日命作包子辭以不能詰之曰既是厨中人何為不能作包子對曰妾乃包子厨中鏤蔥絲者曽無疑乃周益公門下士有委之作志銘者無疑援此事以辭曰某於益公之門乃包子厨中鏤蔥絲者豈能作包子哉吳元中丞相在辟雍試經義五篇盡用字説援據精博蔡京為進呈特免過省以為學字説之勸及作相上章乞復春秋科反攻王氏徐擇之時為左相語人曰吳相此舉雖湯武不能過客不解擇之曰逆取而順守元中甚不能平吳敏字元中真州人南齊胡諧之譖梁州刺史范柏年於武帝曰欲擅一州柏年已受代帝欲不問諧之曰見虎格得而放上山于是賜死紹聖中謫元祐大臣過嶺吕吉甫聞之嘻笑曰捕得黃巢笞而遣之紹聖中貶元祐人蘇子瞻儋州子由雷州黃魯直宜州劉莘老新州皆取其字之偏旁也時相之忍忮如此時有術者曰儋字從立人子曕其尚能北歸乎雷字雨在田上承天之澤也子由其未艾乎宜字乃直字有蓋棺之義魯直其不返乎後東坡北歸子由退老於潁十年乃終魯直竟卒於宜陳瑩中云嶺南之人見逐客不問官髙卑皆呼相公想是見相公常來也宣政間戚里子邢俊臣性滑稽喜嘲咏常出入禁中善作臨江仙末章必用唐律兩句以當調笑徽宗置花石綱石之大者名神運石大舟排聨十尾僅能勝載既至上大喜置艮嶽萬嵗山命俊臣為臨江仙詞以髙字為韻末句云巍峩萬丈與天髙物輕人意重千里送鵝毛又令賦陳朝檜以陳字為韻檜亦髙六七丈圍九尺餘枝覆蔭幾百步詞末云逺來猶自憶梁陳江南無好物聊贈一枝春上容之弗怒也內侍梁師成位兩府甚尊顯用事以文學自命尤自矜為詩因進詩上稱善顧謂俊臣曰汝可為好詞以咏師成詩句之美且命押詩字韻俊臣口占末云欲知勤苦為新詩吟安一箇字撚斷數莖髭上大笑師成恨之譖其漏泄禁中語謫為越州鈐轄太守王嶷聞其名置酒待之醉歸燈火蕭踈明日携詞見府帥敘其寥落之狀末云捫窗摸戶入房來笙歌歸院落燈火下樓臺後復預燕席間有妓秀美而肌白如雪頗有體氣豐甫令乞詞末云酥胸露出白皚皚遙知不是雪為有暗香來座客無不絶倒京師有一樂妓潔白而陋人目曰雪獸頭宣和間鈞天樂部焦德者以諧謔𬒳遇時借以諷諫一日從幸禁苑指花竹草木以詢其名德曰皆芭蕉也上詰之乃曰禁苑花竹皆取於四方在途之逺巴至上林則已焦矣上大笑亦猶鍬澆焦燒四時之戲掘以鍬水以澆既而焦焦而燒也其後毁艮嶽任百姓取花木以充薪亦其讖也宣和中徐申幹臣自諱其名知常州一邑宰白事言已三狀申府未施行徐怒形於色責之曰君為縣宰豈不知長吏名乃作意相侮宰亦好犯上者即大聲曰今此事申府不報便當申監司否則申戶部申臺申省申來申去直待申死即休語罷長揖而去徐雖怒然無以罪之大駕初駐蹕臨安故都及四方士民商賈輻輳又創立官府扁榜一新好事者取以為對云鈐轄諸道進奉院詳定一司敕令所王防禦契聖眼科陸官人遇仙風藥乾濕腳氣四斤丸偏正頭風一字散三朝御褁陳忠翊四世儒醫陸大丞東京石朝議女壻樂駐洎藥鋪西蜀費先生外甥寇保義卦肆如此凡數十聨不能盡記虞雍公允文既却金兵於采石金懲前衄將改圖瓜洲葉樞密義問留鑰金陵時張忠定燾及幕屬馮校書方洪檢詳邁在坐相與勞問畢天風欲雪因留卯飲酒方行警報沓至坐上皆恐葉四顧久之酌巵醪以前曰馮洪二君雖參帷幄實未履行陳舍人威名方新士卒想望勉為國家卒此勳業雍公受巵立曰某去却不妨然記得一小話敢為都督誦之昔有人得一鱉欲烹而食之不忍當殺生之名乃熾火使釡中百沸橫篠為橋與鱉約曰能渡此則活汝鱉知主人以計取之勉力􅐡沙僅能一渡主人曰汝能渡橋甚善更為我渡一遭我欲觀之僕之此行無乃類是乎席上皆笑已而雍公竟如鎮江金主不克渡而弒自此簡上知馴至魁柄義問素不習軍旅會劉錡捷書至讀之至金人又添生兵顧問吏曰生兵是何物葉丞相衡罷相歸金華里中不復問時事但召布衣交日飲亡何一日覺意中忽忽不怡問諸客曰某且死所恨未知死後佳否耳一士人在下坐作而對曰佳甚丞相驚顧問何以知之曰使死而不佳死者皆逃歸矣一往不返是以知其佳也滿座皆笑明年丞相竟不起東陽陳同甫資髙學竒跌宕不羈嘗與客言昔有一士鄰於富家貧而屢空每羡其鄰之樂旦日衣冠謁而請焉富翁告之曰致富不易也子歸齋三日而後告子以其故如言復謁乃命待於屛間設髙几納師資之贄揖而進之曰大凡致富之道當先去其五賊五賊不除富不可致請問其故曰即世之所謂仁義禮智信是也士盧胡而退同甫每言及此輒掀髯曰吾儒不為五賊所制當成何等人耶裴晉公與郎中庾威同生于甲辰裴嘗戲威曰郎中乃雌甲辰也程文惠公與龎潁公同生于戊子程已貴而龎尚為小官嘗戲龎曰君乃小戊子耳後潁公大拜文惠致書賀曰今日大戊子却為小戊子耳潁公笑之秦檜以紹興十五年四月丙子朔賜第望仙橋并銀絹萬兩匹錢千萬綵千縑有詔就第賜宴假以教坊優伶宰執咸與中席優長誦數言而退有參軍前褒檜功德一伶以荷葉交椅從之詼語雜至參軍方就椅忽墜其幞頭乃總髮為髻如行伍之巾後有大環為雙疊勝伶指而問曰此何環曰二勝環伶遽以朴擊其首曰爾但坐太史交椅請取銀絹例物此環掉腦後何也一坐失色檜怒明日下伶於獄有死者於是語禁始益繁芮煜令襟等吻禍蓋其末流也一云楊存中在建康旗上畫雙勝連環謂之二勝環蓋取兩宫北還之意後得美玉琢為帽環以進有一伶在旁髙宗指示之此楊太尉所進二勝環伶人跪捧諦觀徐奏曰可惜二勝環却放在腦後髙宗為之改容秦檜在相位久擅威福士大夫一言合意立取顯美至以選階一二年為執政人懷速化之望故仕於朝者多不肯求外遷時有王仲荀者以滑稽遊公卿間一日坐於秦府賔次朝彥雲集仲荀在隅席輒前白曰今日公相未出堂衆官久伺某有一小語願資醒困何如衆知其善謔爭聳聽之乃抗聲曰昔一朝士出謁未還有客投刺於門閽者告以某官不在客忽勃然發怒叱閽曰汝何敢爾凡人之死者乃稱不在我與某官厚故來相見而敢以此語詛之耶閽惶恐謝曰小人誠不曉諱忌但今謁者例告之如此不審更作何語以謝客客曰苐云某官出外可也閽愀然蹙額曰我官人寧死却是諱出外兩字滿座大噱仲荀出入秦門預褻客談辭多風秦雖煽語禍獨優容之蓋亦一吻流也曹泳為浙漕一日坐客言汪王靈異者泳問汪王若為對有唐永夫者在坐遽曰可對曹漕泳以為工絶愛之曾覿字純甫偶歸正官蕭鷓巴來謁既退復一客至其素所狎也因問曰蕭鷓巴可對何人客曰正可對曾鶉脯覿以為慢已大怒與之絶馬子約純負材自任好靣折人人敬畏之建炎中吕元直作相子約求郡元直拒之徐云有英州見缺公可往否子約曰領鈞旨待先去為相公蓋一宅子奉候夀皇臨御有一川官得郡陛辭有宦者奏知來日有川知州上殿官家莫要笑夀皇問如何不要笑曰外靣有一語云裹上幞頭西字臉恐官家見了要笑只得先奏所謂川知州者靣大而橫濶故有此語來日上殿夀皇見之憶得先語便笑云卿所奏不必宣讀容朕宫中自看愈笑不已其人出外曰早來天顔甚悅以其奏劄稱旨殊不知西字臉先入之言所以動夀皇之笑也隆興間有揚州帥貴戚也宴席間語客曰諺所謂三世仕宦方解著衣喫飯僕欲作一書言衣帽酒殽之制未得書名通判鮮于廣蜀人即對曰公方立勳業今未暇此他時功成名遂休逸林下乃可成書耳請先立名曰逸居集帥不之悟有牛僉判者京東歸正官也輒撡齊音曰安撫莫信他此是通判罵安撫飽食暖衣逸居而無教則近於禽獸是甚言語帥為發怒頳靣而通判欣然有得色張晉彥才氣過人然急於進取子孝祥在西掖時晉彥未老每見湯岐公自薦岐公戲之曰太師尚書令兼中書令是公合做底官職餘何足道所稱之官皆輔臣贈官也謂安國且大用耳晉彥終身以為憾張祁字晉彥其子孝祥狀元及第秦檜羅織下獄檜死乃仕湯思退封岐公祁弟邵字才彥有詩名陜西鳯州伎女雖不盡妖麗然手皆纎白州境內所生栁翠色尤可愛與他處不同又公庫多美醖故世言鳯州有三出謂手栁酒也宣州士人李愈曰吾鄉有四出問何物答云漆栗筆蜜張子韶對䇿有桂子飄香之語趙明誠妻嘲之曰露花倒影栁三變桂子飄香張九成秦少遊善樂府取隋煬帝寒鴉萬點流水繞孤村之句以為滿庭芳詞而首言山抹微雲天黏衰草尤為當時所傳子瞻戲之云山抹微雲秦學士露花倒影栁屯田露花倒影栁永破陳子語也同州澄城縣有九龍廟然止一妃耳土人云馮瀛王之女也夏縣司馬才仲戲題詩云身既事十主女亦妃九龍過客讀之無不一笑才仲名棫溫公姪孫豪傑之士張又延平人少負才入太學有聲為率性齋長甚眇小而多姿製動以苛禮律諸生同舍俱不平之莆田林叔躬亦輕薄士也於是以其名字作詩賦各一首嘲之其賦警聨云身材短小欠曹交六尺之長腹內空虛乏劉義一點之墨詩警句云中分爻兩段風使十橫斜文上元無分人前強出些曲盡形容之妙聞者絶倒慶厯中有試天子之堂九尺賦者或云成湯當陛而立不欠一分孔子歷階而升止餘六寸意用孟子曹交言湯九尺史記孔子九尺六寸事有二主司一以為善一以為不善爭久之不決至上章交訟傳者以為笑乾道中衆客赴郡宴爾日伎樂甚盛一少年勇於見色甫就席中一客以服辭乃命撤樂勸酬次少年責此人曰敗一席之歡者爾也真所謂不自殞滅禍延過客者耶賓主為之哄堂會稽有富人馬生以入粟得官號馬殿幹喜賔客有姬美艷能歌時出佐酒客有梁縣丞者頗黠因與之目成後馬生殂梁捐金得之他日置酒觴客陳無損益之在坐酒酣舉杯屬梁曰有儷語奉上梁諦聽之即琅然髙唱曰昔居殿幹之家爰喪其馬今入縣丞之室毋逝我梁一坐大笑梁憮然不樂無幾病死魏鶴山天寶遺事詩云紅錦綳盛河北賊紫金盞酌夀王妃弄成晚嵗郎當曲正是三郎快活時俗所謂快活三郎即明皇也小説載明皇自蜀還京以駝馬載珍玩自隨明皇聞駝馬所帶鈴聲謂黃幡綽曰鈴聲頗似人言語幡綽對曰似言三郎郎當三郎郎當明皇愧且笑唐司空圖詩云昨日流鶯今日蟬起來又是夕陽天六龍飛轡長相窘更忍乘危自著鞭戒好色自戕者也楊誠齋善謔嘗謂好色者曰閻羅王未曽相喚子乃自求押到何也即此詩之意楊叔賢郎中異眉州人言頃有眉守初視事三日大排樂人獻口號其斷句云為報吏民須慶賀災星移去福星來新守頗喜後數日召優者問前日大排樂詞口號誰撰其工對曰本州自來舊例只用此一首楊叔賢自強人也古今未嘗許人頃為荆州牧時虎傷人楊就虎穴磨巨崖大刻誡虎文如鱷魚之類其略曰咄乎爾彪出境潛遊後改官知鬱林以書託知事趙定基打誡虎文數本書言嶺俗庸獷欲以此化之仍有詩曰且將先聖詩書教暫作文翁守鬱林趙遣人打碑次日本耆申某月日磨崖碑下大蟲咬殺打碑匠二人荆門止以耆狀附遞寄答姑蘇李章敏於調戲偶赴鄰人小集主人素鄙會次章適坐其傍既進饌主人前一煎鮭特大於衆客者章即請於主人曰章與主人俱蘇人每見人書蘇字不同其魚不知合在左邊者是在右邊者是主人曰古人作字不拘一體移易從便也章即引手取主人之魚示衆客曰領主人指揮今日左邊之魚亦合從便移過右邊如何一座輟飯而笑終席乃已安鴻漸有滑稽清才而復內懼婦翁死哭於柩其孺人素性嚴呼入繐幕中詬之曰汝哭何得無淚漸曰以帕拭乾妻嚴戒曰來日早臨定須見淚漸曰唯計既窘來日以寬巾濕紙置於額大叩其顙而慟慟罷其妻又呼入窺之驚曰淚出於眼何故額流漸對曰僕但聞自古云水出髙原唐牛竒章玄怪録載蕭至忠欲出獵羣獸求哀於山神云當令巽二起風滕六致雨翼日風雨蕭不復出郊建炎中張韓擁兵於髙郵時金兵駐楚泗間整師大入二將自料非其敵深以為怯將欲交鋒之際風雨大作敵衆辟易散走損折甚多因遂奏凱范師直方滑稽之雄也為參贊軍事笑云焉知張七韓五乃得巽二滕六力耶聞者為之閧堂梁溪尤延之博洽工文與楊誠齋為金石交淳熙中誠齋為祕書監延之為太常卿又同為青宫寮寀無日不相從二公皆善謔延之嘗曰有一經句請祕監對曰楊氏為我誠齋應曰尤物移人衆皆歎其敏確誠齋呼延之為蝤蛑延之呼誠齋為羊一日食羊白腸延之曰祕監錦心繡腸亦為人所食乎誠齋笑吟曰有腸可食何須恨猶勝無腸可食人蓋蝤蛑無腸也一坐大笑厥後間居書問往來延之則曰羔兒無恙誠齋則曰彭越安在誠齋寄語云文戈却日玉無價寶氣蟠胸金欲流亦以蝤蛑戲之也延之先卒誠齋祭文云齊歌楚些萬象為挫瓌偉詭譎我倡公和放浪諧謔尚友方朔巧發捷出公嘲我酢史彌逺權勢赫烜引布憸壬李和孝梁成大等為之鷹犬搏擊善類士流無恥者多以鑽刺進秩宫宴時有伶人執拳石以大鑽鑽之久而不入嘆曰鑽之彌堅一伶人撲其首曰汝不去鑽彌逺却來鑽彌堅可知道鑽不入也舉座辨栗翼日彌逺杖伶人而出之境一云蜀閫大宴伶為古衣冠數人遊於庭自稱孔門弟子相與言吾儕皆選人遂各言其姓氏曰吾為嘗從事吾為於從政吾為吾將仕遂相與歎吒以選調為淹抑有慫慂其旁者曰子之名不見於七十子固聖門下第盍叩十哲而受教焉如其言見顔閔方在堂羣而請益子騫子蹙額曰如之何何必改兖公應之曰回也不改最後宰我至曰於豫豫改兖公愠曰吾為四科之首而不改汝何為獨改請質諸夫子夫子不答久而曰鑽遂改兖公曰吾非不鑽而鑽彌堅耳夫子曰汝之不改宜也何不鑽彌逺乎韓平原在慶元初其弟仰胄為知閣門事頗與密議時人謂之大小韓求捷徑者爭趨之一日內宴優人有為衣冠到選者自敘覆歷材藝應得美官而留滯銓曹自春徂冬未有所擬方徘徊浩歎適一日者弊帽持扇過其旁遂邀使談庚甲問以得祿之期日者厲聲曰君命甚髙但於五星局中財帛宫微有所礙目下若欲亨逹先見小寒更望成事必見大寒可也侍燕者皆縮頸匿笑徽之祁門客邸壁間一詩乃天族之試南宫者所作其辭曰蹇衛衝風怯曉寒也隨舉子到長安路人莫作親王看姓趙如今不似韓旁有何人細書霍氏之禍萌於驂乘八字墨迹尚新慶元初京尹趙師􅋷請盡以西湖為放生池作亭池上求國子司業髙炳如文虎為記髙故博洽疾時文浮誕痛抑之以故失士心會記中有鳥獸魚鱉咸若商厯以興既已鋟之石本流傳殆不可掩改商為夏痕刻猶存輕薄子作詞以謔之云髙文虎稱伶俐萬苦千辛作箇放生亭記從頭無一句説著官家盡把太師歸美這老子忒無亷恥不知潤筆能幾夏王却作商王只怕伏生是你陳晦行草史集賢制用昆命元龜事閔帥倪侍郎駁之陳屢疏援引唐人及本朝命相制皆用此語史擢陳臺端劾倪削秩罷去或為一聨云舍人舊錯夏商鱉御史新爭舜禹龜聞者絶倒今人於榜下擇壻號臠壻其語蓋本諸袁嵩尤無義理其間或有意不願而為貴勢豪族擁逼不得辭者有一新後輩少年有風姿為貴族之有勢力者所慕命十數僕擁致其第少年欣然而行略不辭避觀者如堵須臾有衣金紫者出曰某惟一女亦不至醜陋願配君子可乎少年鞠躬謝曰寒微得托迹髙門固幸將更歸家試與妻子商量看如何衆皆大笑而散頃嵗兒女合卺之夕壻登髙座賦詩催粧為常禮後皆略去京師貴遊納壻類設次通衢先觀人物嶽母忽笑曰我女如菩薩却嫁箇麻胡子謂其多髯也逮索詩乃大書曰一雙兩好古來無好女從來無好夫郤扇卷簾明點燭待交菩薩看麻胡一座傳觀閧堂餘干有王德者僣竊九十日為王有一士人𬒳執作詔云兩條脛脡馬趕不前一部髭髯蛇鑽不入身坐銀校之椅手執銅鎚之䤪翡􅀢簾前好似漢髙之祖鴛鴦殿上有如秦始之皇一應文武不許著草履上殿德就擒此士人以作詔得免郭巨性善謔攻詞曲以選人入市易務親知每見之必詰問所由郭口喫不能答作河傳咏甘草以見意云大官無悶剛𬒳旁人競來相問又難為子細敷陳且祗將甘草論朴消大戟并銀粉疏風緊甘草間相混及至下來轉殺他人爾甘草有一分張湍為河南司録府當祭社買豬以呈尹而豬宇入湍家湍即捉殺之尹問故湍曰律云豬無故夜入人家主人登時殺之勿論尹大笑為别市豬陳桷待制紹興中嘗從諸大將為謀議官頗好修養之方且自以為得道嘗題其所居曰神仙多是大羅客我比大羅超一格有輕薄者續其後曰行滿三千我四千功成八百我九百有數貴人遇休沐擕歌舞燕僧舍者酒酣誦前人詩因過竹院聞僧話偷得浮生半日間僧聞而笑之貴人問師何笑僧曰尊官得半日間老僧却忙了三日謂一日供帳一日燕集一日掃除也李祐晉臣初在河朔守官監司怒其喏太文對衆責之翼日請見遂極武監司愈怒移文責問祐供狀云髙來不可低來不可乞指揮明降喏樣一箇宋稗類鈔卷二十五
