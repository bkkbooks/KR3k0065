body:
  text: 宋稗𩔖鈔卷三十三常熟潘永因編八法第五十六當世能書咸推蔡君謨然得古人𤣥妙者當遜米元章米亦自負如此嘗有論書一篇及雜書十篇皆中翰墨之病用鷄林紙書贈張太亨嘉甫葢米老得意書也其論書云厯觀前賢論書徴引迂逺比況竒巧如龍跳天門虎卧鳯闕是何等語或遣辭求工去法愈逺無益學者故吾所論要在入人不為溢詞吾書小字行書有如大字惟家藏真蹟䟦尾間或為之不以與求書者心既注之隨意落筆皆得自然備其古雅壯歳未能立家人謂吾書為集古字葢取諸家長處總而成之既老始自成家人見之不知以何為祖也江南吳𡷗登州王子韶大𨽻題榜有古意吾小兒尹仁大𨽻題榜與之等又幼兒尹知代吾名書碑及手書大字更無辨門下許侍郎尤愛其小楷云毎小簡可使令嗣書之謂尹知也老杜作薛稷恵普寺詩云鬱鬱三大字蛟龍岌相纒今有石本得而視之乃是勾勒倒收筆鋒畫畫如蒸餅普字如人握兩拳伸臂而立醜怪難狀以是論之古無眞大字明矣葛洪天台之觀飛白為大字之冠古今第一歐陽詢道林之寺寒儉無精神柳公權國清寺大小不相稱費盡觔骨裴休率意寫碑乃有眞趣不陥醜怪真字甚昜惟有體勢難為不如畫筭勻而勢活也字之八靣惟尚真楷見之大小各自有分智永有八靣已少鍾法丁道䕶歐虞始匀古法亡矣桞公權師歐不及逺甚而為醜怪惡札之祖自桞始世有俗書唐官誥在世為褚陸徐嶠之體殊有不俗者開元以來縁明皇字體肥俗始有徐浩以合時君所好經生字亦自此肥開元以前古氣無復有矣唐人以徐浩比王僧䖍甚失當徐浩大小一倫是猶吏楷也僧䖍蕭子雲𫝊鍾法與子敬無異大小各有分不一倫徐浩為真卿辟客書韵自張顛血脉來教顔大字促令小小字展令大非古也石刻不可學但自書使人刻之已非已書也故必須真蹟觀之乃得趣如顔真卿毎使家僮刻字不㑹主人意修改波撇致大失真惟吉人廬山題名題訖而去後人刻之故皆得其真無做作凡俗差佳乃知顔出於褚也又真蹟皆無𧖟頭燕尾之筆與郭知運爭坐位帖有篆籕氣顔傑思也柳出歐陽為惡醜怪札之祖自此世人始有為俗書葢縁時君所好其弟公綽乃不俗於其兄筋骨之說出於桞世人但以怒張為筋骨凡大字要如小字小字要如大字唯禇遂良小字如大字其後經生祖述間有造妙者大字如小字未之見也世人多寫大字時用力捉筆字愈無筋骨神氣作圓筆如蒸餅大可鄙笑要湏如小字鋒勢備全都無刻意做作乃佳自古及今余不敏實得之榜字固已滿世自有識者知之石曼卿作佛號都無囘互轉折之勢小字展令大大字促令小是張顛教顔真卿謬論葢字自有大小相稱且如寫太一之殿作四窠分豈可作一字肥滿一窠以對殿字乎葢自有相稱大小不當展促也予嘗書天慶之觀天之二字皆四筆慶觀多畫在下各隨其相稱寫之掛起氣勢自𢃄過皆如大小一般雖真有飛動之勢也書至𨽻與大古法大壞矣籀各隨字形大小放百物之狀活動圓健各各自足𨽻乃始有展促之勢而三代法亡矣其雜書十篇云歐虞褚柳顔皆一筆書也安排費工豈能垂世李邕脱子敬體乏纖濃徐浩晚年用力過更無氣骨不如作郎官時婺州碑也董孝子不空皆晚年惡札全無妍媚此自有識者知之沈傳師變格自有超世真軌徐不及也御史蕭誠書太原題名唐人無出其右為司馬係南嶽真君觀碑極有鍾王軌轍餘皆不及矣智永臨集書千文秀潤圓勁八面具備有真蹟自顛沛字起在唐林夫處他人收不及也半山莊臺上故多文公書今不知存否文公學楊凝式書人尠知之予語其故公大賞其見鍳金陵幕山樓臺榜乃闗蔚宗二十年前書想六朝宫殿榜皆如是智永硯心成臼乃能到右軍若穿透始到鍾繇也可不勉之一日不書便覺思澁想古人未嘗片時廢書也因思蘓之才桓公至洛帖字字用意相鈎連非復便一筆直到底也若旋安排即虧活勢耳字要骨格肉須裹筋筋須藏肉貼乃秀潤生布置穏不俗瞼不怪老不枯潤不肥變態真形不貴苦苦生怒怒生怪貴形不貴作作入畫畫入俗皆字病也顔魯公行字可教真便入俗品萬等古人書不如此學吾家多小兒作草字大段有意思少存若天性習慣如自然兹古語也吾夢古衣冠人授以摺紙法書自此差進寫與他人却不曉蔡元度見而驚曰法何太遽異耶此公亦具眼人章子厚以真自名獨稱吾行草欲吾書如排算子然真草須有體製乃佳耳薛稷書慧普寺老杜以為蛟龍岌相纒今見其本乃如柰重兒擡蒸餅勢信老杜不能書也學書湏得趣他好俱忘乃入妙别為一好縈之便不工也世之論書者多謂書不必有法各自成一家此語得其一偏譬如西施毛嬙容貎雖不同而皆為麗人然手須是手足須是足此不可移者作字雖形不同掠須是掠磔須是磔千變萬化此不可移也若掠不成掠磔不成磔縱其精神筋骨猶西施毛嬙而手足乖戾終不為完人盡得師法律度備全猶是奴書然須自此入過此一路乃渉妙境無跡可窺然後入神書貴勁健瘦硬忌肥厚重濁老杜云書貴瘦硬方有神歐陽永叔評書亦曰書之肥者譬如厚皮饅頭食之味必不佳而命之為俗物矣江南李後主善書嘗與近臣語書有言顔魯公端勁有法者後主鄙之曰真卿之書有法而無佳處正如扠手並脚田舍翁耳慎伯筠工書王逢原贈之詩有曰鐵索急纒蛟龍僵葢言其筆法老勁也東坡見其題壁曰此有何佳但似篾束枯竹耳丹陽有戴叔倫碑是其遺跡宣和間蔡寳臣致君收南唐後主書數軸來京師以獻蔡儵約之其一乃王師攻金陵城垂破時倉皇中作一疏禱於釋氏願兵退之後許造佛像若干身菩薩若干身齋僧若干萬員建殿宇若干所其數皆甚多字畫潦草然皆遒勁可愛葢危逼窘急中書也又有㸔經發願文自稱蓮峰居士李煜又有長短句臨江仙云櫻桃結子春光歸盡蜨翻金粉雙飛子規啼月小樓西鈎羅幕惆悵捲金泥門巷寂寥人去後望殘烟草低迷而無結尾劉延仲為補之云何時重聴玉驄嘶撲簾飛絮依約夢回時江南李後主常於黄羅扇上書以賜宫人慶奴云風情漸老見春羞到處魂消感舊逰多謝長條似相識強垂烟態拂人頭讀之可想見其風流也扇至今𫝊在一貴人家太宗留意字書淳化中嘗出内府及士大夫家所藏漢晉以下古帖集為十卷刻石於秘閣世傳為閣帖是也中間晉宋帖多出王貽永家貽永祁公之子國初藏名書畫最多奇蹟而當時摹勒出待詔手筆多凝滯間亦有偽本如李斯書乃李陽氷王宻徳政碑文也石後於禁中被燼絳人潘師旦取閣本再摹藏于家為絳本慶厯間劉丞相沆知潭州亦令僧希白摹刻於州廨為潭本絳本雜以五代近世人書㣲出潭下希白自善書潭本差能得其行筆意元祐間徐王府又取閣本刻於木板無甚精彩建中靖國初曽丞相布當國命劉燾為館職取淳化所遺與近出者别為續法帖十卷字多作燾體又愈下矣仁宗萬幾之暇惟親翰墨而飛白尤神妙凡飛白以㸃畫象形物而㸃最難工至和中有書待詔李唐卿撰飛白三百㸃以進自謂窮盡變態上亦佳之乃特為清浄二字以賜之其六㸃又出三百㸃外尤為奇絶歐陽文忠公云作字要熟熟則神氣完寔而有餘於静坐中自是一樂事又云自蘇子羙死後遂覺筆法中絶近年君謨獨歩當世然謙譲不肻主盟往年余嘗戯謂君謨學書如泝急流用盡氣力不離故處君謨頗笑以為能取譬今思此語已二十餘年竟何如哉又云學書費紙猶勝飲酒費錢徃時王文康公戒其子弟云吾生平不以全幅紙作封皮文康太原人世以晉人喜嗇資談笑信有是哉吾年向老亦不欲多好耗用物誠未足以有益於人然衰年志思不壯於事少能快然亦其理耳張公觀家藏有唐桞公權手筆啓草二紙其一云上翰林桞學士某謬至顯榮皆承闕乏昨者璽書慰勉蘭省遷超雖上意欲壯於軍威在外臣轉深於官謗此皆學士曲垂獎㑹潛為扶持繼音容於北風為主人於東道况兼姻媾早接清華推魏公感外家之情用何氏奉諸姨之敬念深外妹亦愛愚夫道已隔而分更敦官轉尊而志愈下藏之不忘佩以彌芳思奉氷霜邈同雲漢仰計亘霄路於臺閣隔人烟於禁垣嘯傲霞髙從容日近閒揮彩筆時弄紫泥益彰叔寳鸞鶴之姿轉映王恭神仙之狀便當遨乗顥氣濯㺯瑶池秉隂陽之罏錘輔天地之槖籥異時𫉬賜今日先知瞻望風猷常在魂夢某再拜其二曰侍郎頡頏重霄騰凌迥漢列名仙館絶跡人寰潤飾洪猷承迎中㫖金莖瑞露雲表先嘗玉輦靈桃牕間暗識方矜獨歩誰敢争衡况藝奮神工時推妙翰鳯鸞異態龍虎殊姿白首何人墨池誰子後生是畏前聖有言若非思與神凝韻無俗累則安能致兹遒逸超彼等彝窮鍾蔡之楷模入王張之閫域徃者韋相公嘗謂侍郎能以筆諫者今則行執陶鈞坐登台輔終提一筆以絶百僚後命之來延頸而俟某素無勲効叨濫寵榮一授藩垣兩遷官秩猶以據牀操扇麤識孤虚跨馬彎弓未為遲暮誓將丹懇以奉休明所冀侍郎猥録孤㣲終垂庇遇使其晚節無媿平生下情云云兩帖前軰皆䟦為柳筆然非公權亦不能作此但啟中有筆諫語或他人遺柳啟柳自書之耳長安今府宇即唐尚書省府籙㕔前石幢即郎官題名石也張長史書序筆畫端嚴張平生作字詭怪顛倒殆難辨識至為楷法整若軍陣乃知能事之極無所不可蘓才翁筆法妙天下不肯下一世人惟稱范文正書與樂毅論同法黄山谷謂才翁傲睨一世衆人皆側目而文正公待之甚厚故才翁評書少曲董狐之筆耳山谷此評似非君子之言文正公字法實入書家之品才翁非佞語也王荆公字本無所解評者謂其作字似忙世間那得如許忙事而山谷阿私所好謂荆公字法出於楊虚白又謂金陵定林寺壁有荆公書數百字惜未見賞音者何荆公字在當時無一人賞音而山谷獨稱之耶才翁曲筆於范文正公不猶愈山谷獻諛於王安石乎章丞相申公子厚以能書自負性喜揮翰雖在政府暇時日書數幅嘗書論書九事其内一則云吾毎論學書當作意使前無古人凌厲鍾王直出其上始可即自立少分若直爾低頭就其規矩之内不免為之奴矣縱復脱灑至妙猶當在子孫之列耳不能雁行也况於抗衡乎此非茍作大言乃至妙之理也禪家有云見過於師方堪傳授見與師齊减師半徳悟此語者乃能曉吾言矣夫於師法不傳字學廢絶數百年之後欲興起之以繼古人之迹非至強神悟不能至也又云力在手中而不在手中必湏用力而不得用力應須在意而不得在意此可以神遇而不可以言𫝊者也學佛悟吾此語可以撒手到家矣徐州有營妓馬盻者甚慧麗東坡守徐日極喜之盻能學公書得其髣髴公嘗書黄樓賦未畢盻竊傚公書山川開合四字公見之大笑略為潤色不復昜之今碑中四字盻之書也黄魯直戯東坡曰昔右軍書為換鵝字近日韓宗儒性饕餮每得公一帖於殿帥姚麟家換羊肉數斤可名公書為換羊書矣公在翰苑一日以生辰製作紛冗宗儒致簡相寄以圖報書來人督索甚急公笑曰𫝊語本官今日斷屠東坡云劉十五孟父論李十八公擇草書謂之鸚哥嬌謂鸚鵡能言不過數句大率雜以鳥語十八其後稍進以書問僕近日書如何僕答之可作秦吉了矣然僕此書自有公在乾侯之態也謂鸜鵒也黄山谷䟦東坡帖曰東坡書圓勁成就所謂怒猊抉石渇驥奔泉恐不在㑹稽之筆而在東坡之手矣此數十行又兼董孝子碣禹廟詩之妙處士大夫多訾東坡用筆不合古法彼葢不知古法從何出爾杜周云三尺安在哉前王所是以為律後王所是以為令余嘗以此論書而東坡輒絶倒也往時桞子厚劉禹錫譏評韓退之平淮西碑當時道聴塗說者亦多以為然今日觀之果何如耶或云東坡作戈多成病筆又腕著而筆卧故左秀而右枯此又見其管中窺豹不識大體殊不知西施捧心而顰雖其病處乃自成妍今人未解愛重此書逺付百年公論自出但恨封徳彝軰無如許夀及見之耳余書雖不工而酷喜論書固不能如經生軰左規右矩形容王氏獨得其義味曠百世而與之反故作決定論耳山谷又評東坡帖日學問文章之氣鬱鬱葱葱散於筆墨之間此所以他人終莫能及東坡嘗自云吾酒後乗興作數十字覺氣拂拂從十指中出也趙子俊孟籲有東坡書迹甚佳後有一人題云觀此真跡始覺偽者為可笑也最善下語先生翰墨之妙既經崇寧大觀焚毁之餘人間所藏葢一二數也至宣和間内府復加蒐訪一紙定直萬錢而梁師成以三百千取英州石橋銘譚稹以五萬錢掇沈元弼月林堂榜名三字至於幽人釋子所藏數紙皆為利誘盡歸諸貴近并輪積天上矣晁無咎言蘇公少時手抄經史皆一通每一書成輒變一體卒之學成而已迺知筆下變化皆自端楷中來爾不端其本而欺以求售吾知書中孟嘉自可黙識也黄山谷云蘇翰林用宣城諸葛齊鋒筆作字疎疎宻宻隨意緩急而字間妍媚百出古來以文章名重天下例不工書所以子瞻翰墨尤為世人所重今日市人持之以得善價百餘年後想見其風流餘韻當萬金購藏耳盧州李伯時近作子瞻按藤杖坐盤石極似其醉時意態此紙妙天下可乞伯時作一子瞻像吾軰會聚時開置席上如見其人亦一佳事也評東坡書者衆矣劒㧞弩張驥奔猊抉則不能無至於尺牘狎書姿態横生不矜而姸不束而莊不軼而豪蕭㪚容與霏霏如零春之雨森疎掩斂熠熠如從月之星紆徐婉轉纚纚如抽繭之絲恐學者所未到也張友正鄧公之季子少喜學書不出仕有别業價三百萬盡鬻以買紙筆蹟高簡有晋宋人風味尤工於草書故廬在甜水巷一日棄去從水櫃街僦小屋與染工為鄰或問其故答曰吾欲假其縑素學書耳於是與約凢有欲染皂者先假之一端酬二百錢如是日書數端米元章書自得於天資然自少至老筆未嘗停有以紙餉之者不問多寡入手即書至盡乃已元祐末知雍丘縣蘇子瞻自揚州召還乃具飯邀之既至則對設長案各以精筆佳墨紙三百列其上而置饌其旁子瞻見之大笑就坐毎酒一行即伸紙共作字以二小史磨墨幾不能供薄暮酒行既終紙亦盡乃更相易攜去俱自以為平日書莫及也友正既未嘗仕其性介不多與人通故其書知之者少但不逮元章黄山谷與王立之柬有云來日恐子瞻來可備少紙於清凉處設几案陳之如張武筆其所好也徽皇聞米芾有字學一日於瑶林殿張絹圖方廣二丈許設瑪瑙硏李廷珪墨牙管筆金硯匣玉鎮紙水滴召米書之上映簾觀賞令梁守道相伴賜酒果米反繋袍袖跳躍便㨗落筆如雲龍蛇飛動聞上在簾下回顧抗聲曰奇絶陛下上大喜即以御筵筆硏之屬賜之尋除書學博士一日崇政殿對事畢手執劄子上顧視令留椅子上米乃顧直殿云皇帝呌内侍要唾盂閤門彈奏上云俊人不可以禮法拘上嘗問本朝以書名世者數人芾各以其人對曰蔡京不得筆蔡卞得筆而乏逸韻蔡㐮勒字黄庭堅描字蘓軾畫字上曰卿書如何曰臣書刷字芾為書學博士一日上與蔡京論書艮嶽復召芾至令書一大屏顧左右乞宣取筆硏上指御案間硏使就用之書成捧硯跪請曰此硏經賜臣芾濡染不堪復以進御取進止上大笑因以賜之芾舞蹈以謝即抱負出餘墨沾漬𫀆袖而喜見顔色上顧京曰顚名不虚得也京奏曰芾人品誠高所謂不可無一不可有二米芾行書傚羲之詩追李白宗史籕𨽻法師宜官晚年出入規矩深得意外之㫖自謂善書者只得一筆我獨有四靣識者然之寸紙數行人爭售之以為珍玩至於請求碑榜而户外之屨常滿家藏古帖由晋以來者甚富乃名其所居為寳晋齋簮纓好事之流出其所有奇蹟以求䟦語増重其書而芾或喜之即為作古紙臨傚便與真者無辨兼以偉岸不羈口無俗語頎然束𢃄一古君子故贈其詩者有衣冠唐制度人物晉風流之句然議者謂其書神鋒太峻如强弩射千里又如仲由未見孔子時風氣米芾得能書之名似無負於海内芾於真草𨽻不甚工惟於行草誠入能品以芾如六朝翰墨副在筆端故沉著痛快如乘駿馬進退裕如不煩鞭勒無不當人意然意傚其法者不過得外貎髙視濶歩氣若軒昻殊未究其中本六朝妙處醞醸風骨自然超逸也又芾之詩文無蹈襲出風烟之上覺其詞翰固有凌雲之氣覽者當自得之黄山谷在冝州嘗為余若著書後漢書范滂𫝊字徑數寸筆勢飄動葢悼黨錮之漢禍也後百年真蹟逸人間趙忠定得之寳置巾篋縉紳題䟦如牛腰焉既乃躬蹈其禍可謂奇讖忠定之子崇憲字履常守九江刻石郡治四説堂若著倅宜州日黄魯直謪居是邦時黨禁甚嚴士大夫例削扎掃迹若著慨然為之經理館舍敬遇不怠遣二子滋滸奉几杖執諸生禮一日攜紙求書魯直問所欲拱而對曰先生今日舉動無媿東都黨錮諸賢願寫范孟博一𫝊許之遂黙誦大書盡卷僅有二三字疑誤二子相顧愕然魯直顧曰漢書非能盡記也如此等𫝊豈可不熟聞者敬嘆王榮老嘗官於觀州欲渡觀江七日風作不得濟父老曰公篋中必蓄寳物此江神極靈當獻之得濟榮老自顧無所有唯一玉麈尾即以獻之風如故又以端硏獻之風愈作又以宣州包鼎畵虎障子獻之皆不騐夜卧念曰猶有黄魯直草書扇頭題韋應物詩即取視之儻恍之際曰我猶不識鬼寧識之乎試持獻之香火未收天水相照如兩鏡展對南風徐來張㠶一餉而濟竊計神必元祐遷客所為不然何嗜之深耶檇李一士人眈嗜古遺墨購得龍眠歸去來卷順事布景繪境神妙子瞻書其詞曽入勝國内府有虞趙諸公䟦恒展玩不釋手後為楚中學博擕以自隨遷秩將渡洞庭夜夢一神人冠裳齋遫告曰君有東坡龍眠手蹟願出眎可乎士人呈卷神掀髯動色頌賛不已隨拱手而别既覺懷疑及過湖衝風倐起崩浪刮天舟幾覆士人悟昨夢乃惶遽拜祝曰神欲吾卷耶舉篋投之風浪頓息乃知神踪異跡鬼神亦重之也高廟嘗臨蘭亭賜夀皇於建邸後有批字云可依此臨五百本葢兩宫篤學如此世傳智永冩千字文八百本於此可信矣宋諸王孫趙孟堅字子固號彛齋居嘉禾之廣陳修雅博識善筆札工詩文酷嗜法書多藏三代以來金石名蹟遇其㑹意時遂傾家易之不靳也又善作梅竹徃徃得逃禪石室之妙如水僊為尤奇時人珍之襟度瀟爽有六朝諸賢風氣時比之米南宫東西薄遊必挾所有以自隨一舟横陳僅留一席為偃息之地隨意左右取之撫摩吟諷至忘寢食所至識與不識望而知其為米家書畵船也庚申嵗客輦下㑹菖蒲節一時好事者邀子固各攜所藏買舟湖山相與評賞飲酧子固脱㡌以酒晞髪箕踞歌離騷傍若無人薄暮入西冷掠孤山􅋈櫂荗𣗳間指林麓絶茂處瞪目絶呌曰此真洪谷子董北苑得意筆也鄰舟數十皆驚駭絶歎以為真謪仙人異時蕭千巖之姪渷得白石舊藏五字不損本稧叙後歸之俞夀翁子固復從夀翁善價得之喜甚乗舟夜泛而歸至霅之弁山風作舟覆幸值支港行李渰溺無餘子固方𬒳溼衣立淺水中手持稧帖示人曰蘭亭在此餘不足介意也因題八言於卷首云性命可輕至寳是保其帖後歸之悦生堂今復出人間矣宋稗𩔖鈔卷三十三
