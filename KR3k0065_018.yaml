body:
  text: 宋稗類鈔卷十八常熟潘永因編異稟第三十華元郡王允良性好晝睡每自旦酣寢至暮始興盥櫛衣冠而出燃燈燭治家事飲食宴樂達旦而罷則復就枕無日不如此由是一宫之人皆晝卧夕興允良不甚喜聲色亦不為他驕恣惟俾晝作夜性與人殊故觀察使劉從廣燕王壻也常語燕王好坐木馬上每坐則不肯下或飢則就其上具食往往乘興奏樂於前酣飲終日亦其性之異也允良太良幼子燕王元儼子也夏文莊公竦性豪侈稟賦異於人才睡即身冷而僵一如逝者既覺須令人溫之良久方能動人有見其陸行兩車相連載一物巍然問之乃綿帳也以數千兩綿為之常服仙茅鍾乳硫黃莫知紀極晨起每食鍾乳粥有小吏竊食之遂發疽幾不可救張僕射齊賢體質豐大飲噉過人尤嗜肥豬肉每食數斤天夀院風藥黑神丸常所服不過一彈丸公常以五七兩為一大劑夾以胡餅而頓食之淳化中罷相知安陸州安陸山郡未嘗識逹官見公飲噉不類常人舉郡驚駭嘗與賔客會食厨吏置一金漆大桶於廳側窺視公所食如其物投桶中至暮酒漿浸漬漲溢滿桶郡人嗟愕以為享富貴者必有異於人也然晏元獻公清瘦如削其飲食甚微每析半餅以筯卷之抽去其筯捻頭一莖而食此亦異於常人也趙溫叔丞相形體魁梧進趨甚偉阜陵素喜之且聞其飲啖數倍常人會史忠惠進玉海可容酒三升一日召對便殿從容問之曰聞卿健啖朕欲作小點心相請何如趙悚然起謝遂命中貴人捧玉海賜酒至六七皆飲釂繼以金拌捧籠炊百枚遂食其半上笑曰卿可盡之於是復盡其餘上為之一笑其後均役荆南暇日欲求一客伴食不可得偶有以本州兵馬監押某人為薦遂召之燕飲自早逹暮賔主各飲酒三斗豬羊肉各五斤蒸糊五十事公已醉飽摩腹而監押者屹不為動公笑曰君尚能飲否對曰領鈞旨於是再飲數杓復問之其對如初凡又飲斗餘乃罷臨别忽聞其人腰腹間􅒂然有聲公驚曰是必過飽腸裂無疑吾本善意乃以飲食殺人終夕不自安黎明亟遣鈴下老兵往問而典客已持謁白曰某監押見留客次謝筵公愕然延之扣以夜來所聞局蹐起對曰某不幸抱飢疾小官俸薄終嵗未嘗得一飽未免以革帶束之昨蒙賜宴不覺果然革條為之迸絶故有聲耳國初文知州善啖太祖賜犢食盡腰有聲疑其腹裂明日問之曰臣苦飢以帛束之昨賜飽不覺帛斷事與趙同江南逆旅中一老婦啖物不知飽徐德占過之老婦訴以飢其子恥之對德占以蒸餅噉之盡一竹簣約有百餅猶稱飢不已日飰一石米隨而利之飢復如故京兆醴泉主簿蔡繩亦得飢疾每飢立須噉物稍遲則頓仆悶絶懷中常置餅餌雖對貴客亦須齕啖繩有美行博學工文為時聞人終以此不幸無人識其疾者蒲傳正為宋資政有大洗面小洗面大濯足小濯足大澡浴小澡浴小洗面一易湯用二人頮面而已大洗面三易湯用五人肩頸及焉小濯足一易湯用二人踵踝而已大濯足三易湯用四人膝股及焉小澡浴湯用三斛人用五六大澡浴湯用五斛人用八九每日兩洗面兩濯足間日一小浴又間日一大浴口脂面藥薰爐妙香未嘗斯須去側也與王介甫同時共事介甫垢面亂髮衣服生蟣蝨而蒲則如此視南史所稱何佟之一日洗浴十餘遍同其水淫若劉寬經年不洗浣陰子春經年不濯足者相反極矣趙忠惠帥維揚日募僚趙參議有婢慧黠盡得同輩之歡趙昵之堅拒不從疑有異強即之則男子也聞於有司蓋身具二形前後姦狀不一遂置之極刑嘗考之佛書所云博又牟釋迦者謂半月能男半月不能男又有五種不男因生堅妒變半半者二形人中惡趣也晉五行志謂之人痾惠帝時京洛有人兼男女二體亦能兩用人道而性尤淫邪此亂氣所生也玉厯通政經云男女兩體主國淫亂而二十八宿真形圖所載心房二星皆兩體與丈夫婦人更為雌雄此又何耶異物志云靈貍一體自為陰陽故能媚人褚氏遺書云非男非女之身精血散分感以婦人則男脈應診動以男子則女脈順指皆天地不正之氣也盛大監勛紹興初知襄陽單騎之官府治有一樓為公退燕息之所勛嘗獨居樓上屏左右命一老兵守其下卧榻之前置大浴斛取江漢水滿注其中日易新水老兵久而疑之乘勛晝寢登梯隙壁竊視乃見一大鯉魚金鱗頳鬛遊泳斛中如覺有窺者注目壁隙凝然久之老兵驚懼趨下自是撤去浴斛不復取水北夢瑣言曰歸登尚書每浴必屏左右自於浴斛中坐移時或有竊視者見一巨龜吹水也性甚嗇嘗爛一半脾旋割旋噉封其殘者一旦內子於封處割食歸見之大怒其內由是沒身不復食肉楊戩於所居堂後鑿一大池環以廊廡扃鐍周密每至浴時先設巾器并澡豆之屬於池上乃悉屏人躍入水中遊泳率移刻而出人莫能窺一日戩獨寢有盜入其室忽見床上一蝦蟆大幾充牀兩目如金光彩注射盜不覺驚踣於地而蝦蟆已復變為人乃戩也起坐按劒問曰汝為何人盜以實對戩擲一銀香毬與之曰念汝實貧以此賜汝勿為人言所見也盜不敢受再拜而出後以他事繫開封獄自道如此米元章知無為軍喜神怪每雨晹致禱則設宴席於城隍祠東向坐神像之側舉酒若相獻酬往往獲應每得時新茶果之屬輒分以饋神令典客聲喏傳言以致之間有得緡錢於香案之側若神以勞送者嘗晨興呼醮門鼓吏問夜來三更不聞鼓聲吏惶恐言中夜有巨白蛇纒其鼓故不敢近米頷之叱吏去不復問故人皆疑其蟒精一作蔡君謨淳熙間姑蘇有民家姓唐一兄一妹其長皆丈有二尺里人謂之唐大漢不復能嫁娶每行倦倚市簷憩坐如堵墻不可出出輒傾市從觀之日啖斗餘無所得食因適野為巨室受囷粟蓋立囷外則可舉手以致不必以梯也有璫以輅使客見之大驚遂入奏詔廩之殿前司每聲喏如洪鐘德夀時欲見之懼其聚民乃臥之俘於河至望仙專舟焉又江山邑寺有緇童眉長踰尺來淨慈都人爭出視之事聞禁中詔給僧牒賜名延慶寺僧日坐之門護以行馬士女填咽炷香謂之活羅漢吕縉叔以知制誥知潁州忽得疾身漸縮小臨終僅如小兒古人未曾有此疾終無人識有松滋令薑愚無他疾忽不識字數年方稍稍復舊有一人家妾視直物皆曲弓絃界尺之類視之皆如鈎祕書丞張諤嗜酒得竒疾中身而分左常苦寒右則苦熱暑月中著襪袴紗綿相半傳舍人為太學博士日忽得腸癢之疾滿腹作癢又無搔處欲笑難笑欲泣難泣數年而愈參政孟庾夫人徐氏有竒疾每發於聞見即舉身戰栗至於幾絶見母與弟皆然至死不明又惡聞徐姓及打銀打鐵聲嘗有一婢使之十餘年甚得力極喜之一日偶問其家所為業婢曰打鐵疾遂作更不欲見竟逐去之醫莫能施其術陳子直主簿之妻有異疾每腹脹則中有聲如擊鼓逺聞於外腹消則止一月一作醫莫能治有張五星者瞽而慧善辨寶玉此猶是暗中摸索至於能别婦人妍醜聞其聲咳扣問數語即知其人美惡情性趙信國丞相専俾置姬妾并玉器云文苑第三十一宋興一代文章其羽翼經傳者尊長程朱陸具鼓吹休明者推歐蘇王曽俱置弗録寥寥數則譬之小璣拱璧聊供把握九鼎一臠略一染指用收隱僻非多廣博云爾楊文公億欲作文則與門人賔客飲博投壺奕棋笑語喧譁而不妨搆思以小方紙細書揮翰如飛丈不加點每盈一幅則令門人傳録每疲於應命頃刻間成數千言真一代文豪也大年七嵗時對客談論有老成風年十一太宗召對便殿授祕書省正字且謂曰卿離鄉里得無念父母乎對曰臣見陛下一如臣父母上歎賞久之初入館時年甚少故事初授館職必以啓謝執政時公啓事有曰朝無綘灌不妨賈誼之少年坐有鄒枚未害相如之末至一時稱之前輩嘗説北朝致祭皇后文楊大年捧讀空紙無一字隨自撰曰惟靈巫山一朵雲閬苑一團雪桃源一枝花秋空一輪月豈期雲散雪消花殘月缺伏惟尚饗仁宗大喜其才敏給有壯國體洪忠宣公自嶺外徙宜春沒于保昌張子韶致祭其文但云維某年月日具官某謹以清酌之奠昭告於某官之靈嗚呼哀哉伏惟尚饗景靈深美其情哀愴乃過於辭謝希深綘嘗作楊祕監啓事有曰曵鈴其空上念無君子者解組不顧公其如蒼生何大年題於所携扇曰此文中虎也歐陽公嘗云三代以來文章盛者稱西漢希深於制誥尤得其體常楊元白不足多也五季文章卑陋極矣然當時諸僣偽其國亦頗有人嘗遊博白之宴石山號普光禪寺者為屋數椽而已其山逈絶洞穴怪竒得一碑乃偽漢時人為寺記特喜其中兩語云蔬足果足松寒水寒往嵗士人多尚對偶為文穆修張景輩始為平文當時謂之古文穆張嘗同造朝待旦於東華門外方論文次適見有奔馬踐死一犬二人各記其事以較工拙穆修曰馬逸有黃犬遇蹄而斃張景曰有犬死奔馬之下時文體新變二人語皆拙澀當時巳謂之工如坡公嶺外詩敘虎飲水潭上有蛟尾而食之以十字説盡云潛鱗有飢蛟掉尾取渴虎只著渴字便見飲水意且屬對親切一作有犬臥於通衢逸焉蹄而殺之歐文忠公曰使子修史萬卷未已也改為逸馬殺犬於道錢思公雖生長富貴而少所嗜好惟喜讀書坐則讀經史臥則覽小説如厠則閲小詞蓋未嘗須臾釋卷也謝希深亦言與宋公垂同在史館每奏厠必挾書以往諷誦之音琅然聞於逺近其篤學如此歐文忠公因謂希深曰余生平所作文章多在三上乃馬上枕上厠上也蓋惟此尤可以屬思爾公又謂為文有三多看多做多商量多也錢惟演初諡思其子爭之改諡文僖錢思公鎮洛所辟僚屬盡一時俊彥時河南以陪都之要驛舍常缺公大創一館榜曰臨轅既成命謝希深尹師魯歐陽公三人各撰一記期以三日後宴集賔之三子相掎角以成文就出之相較希深之文僅五百字歐公之文五百餘字獨師魯止三百八十餘字而語簡事備復典重有法歐謝二公縮袖曰止以師魯之作納吾二人者當匿之丞相果召獨師魯獻文思公曰何見忽之深已礱三石奉候不得已俱納之然歐公終未服在師魯之下獨載酒往通夕講摩師魯曰大抵文字所忌者格弱字冗諸君文誠髙然少未至者格弱字冗爾永叔奮然持此説别作一記更減師魯文草字而成之尤完粹有法師魯謂人曰歐九真一日千里也思公兼將相之位帥洛止以賓友遇三子創道服笻杖各三每府園文會丞相則夀巾紫褐三人者羽􅌁携笻而從之孫何性落魄而嗜好古文為轉運使日政尚苛峻州縣患之乃求古碑文字磨滅者得數本釘於館中孫至則讀其碑辨識文字以爪搔髮垢而嗅之遂往往至暮不復省録文案梅詢為翰林學士一日書詔頗多屬思甚苦操觚循階而行忽見一老卒卧於日中欠伸甚適梅忽歎曰暢哉徐問之曰汝識字乎曰不識梅曰更快活也真宗即位之次年賜李繼遷名復進封西平王時宋湜宋白蘇易簡張洎在翰林俾草詔册皆不稱旨惟宋公湜深探上意必欲推先帝欲封之意因進辭曰先皇帝早深西顧欲議真封屬軒鼎之俄遷建漢壇之未逮故兹遺命特付眇躬爾宜望弓劍以拜恩守疆垣而效節上大喜不數月參大政夏竦字子喬幼學於姚鉉鉉使為水賦限以萬字竦作三千字示鉉鉉怒不視曰汝何不於水之前後左右廣言之竦益之得六千字鉉喜曰可教矣五代史漢王章不喜文士嘗語人曰此輩與一把算子未知顛倒何益於國算子本俗語歐公據其言書之有古意溫公通鑑改作授之握算不知縱橫不如歐史矣嘉祐中詔宋景文歐陽文忠諸公重修唐書時有蜀人吳縝者初登第因范景仁請於文忠願預官屬之末上書文忠言甚懇切文忠以其年少輕佻拒之縝鞅鞅而去逮夫新書之成乃指摘其瑕疵為糾繆一書至元祐中縝遊宦暛跎老為郡守與五代史纂誤俱刋行之紹興中福唐吳中實元美為湖州教授復刻於郡庠且作後序以為針膏肓起廢疾杜預實為左氏之忠臣然不知縮著書之本意也舊傳歐陽文忠公雖作一二字小簡亦必屬稿其不輕茍如此然今集中所見乃明白顯易若未嘗經意者而自然爾雅東坡大抵相類初不過為藻采也至黃魯直始專集取古人才語以敘事雖造次間必期於工而世所傳宋景文刀筆集雖平文而務為竒險至或作三字韻語近世蓋未之見傳嵩卿給事嘗盛暑中以氷餽同舍其簡云蓬萊道山羣仙所遊清異人境不風自涼火雲騰空莫之能炎餉以氷雪是謂附益讀者大笑而不知其淵源亦有自也歐陽公為韓魏公畫錦堂記云仕宦至將相富貴歸故鄉韓公得之愛賞後數日歐復遣介别以本至云前有未是可換此本韓再三玩之無異前者但於仕宦富貴下各添一而字文義尤暢前輩為文不易如此傳云良工不示人以朴蓋恐見其斧鑿䀶迹也黃魯直嘗於相國寺得宋子京堂史藁一束歸而熟觀之自是文章日進此無他但見其竄易字句與初造意不同而悟入爐鞴之妙耳宋景文修唐史好以艱深之辭文淺易之説歐公思所以諷之一曰大書其壁曰宵寐非楨扎闥洪休宋見之曰非夜夢不祥題門大吉耶何必求異如此歐公曰李靖傳云震霆無暇掩聰亦是類也宋慚而退范蜀公少時與宋子京同賦長嘯却敵騎蜀公先成破題云制動以靜善勝不爭景文見之不復出其所作潛於袖中毁之因謂蜀公曰公賦甚佳更當添以二者字景文賦雖不逮蜀公然破題云月滿邊塞人登戍樓亦竒語也宋宣獻公綬夏英公竦同試童行誦經有一行者誦法華經不過問其習業幾年矣曰十年二公笑且憫之因各取法華經一部誦之夏公七日宋公五日不復遺一字王舒王性酷嗜書雖寢食間手不釋卷或燕居默坐研究經旨常州日對客語未嘗有笑容一日大會賔佐倡優在庭公忽大笑人頗怪之乃共呼優人厚遺之曰汝能使太守開顔可賞也有一人竊疑公笑不由此因乘間啓公公曰疇日席上偶思咸常二卦豁悟微旨自喜有得故不覺發笑耳王荆公作字説時用意良苦置石蓮百許枚几案上咀嚼以運其思遇盡未及益即嚙其指至流血不覺世傳公初生家人見有貛入其産室有頃公生故小字貛郎荆公在蔣山時以近製示蘇子瞻中有騷語云積李兮縞夜崇桃兮炫晝子瞻曰自屈宋沒後無復離騷句法乃今見之荆公曰非子瞻見諛某自負亦如此劉貢甫舊與王荆公遊甚欵每相過必終日荆公為參知政事一日貢甫訪之值其方飯使吏延入書室中見有藁草一篇在硯下取視之則論兵之文也貢甫性強記一過目輒不忘既讀復置故處獨念吾以庶僚謁執政徑入其便坐非是因復趨出侍於廡下荆公飯畢而出始復邀入坐語久之問貢甫近頗為文乎貢甫曰近作兵論一篇草創未就荆公問所論大概如何則以所見藁草為己意以對荆公不悟其窺見己作也默然良久徐取研下藁草裂之蓋荆公平日論議必欲出人意表苟有能同之者則以為流俗之見也國史云慶厯以前學者尚文辭多守章句注疏之學至劉原父為七經小傳始異諸儒之説王荆公修經義蓋本於原父云英宗嘗語及原父韓魏公對以有文學歐陽文忠公曰劉敞文章未甚佳博學可稱也胡武平嘗奉敕撰溫成皇后哀册當時受旨以溫成嘗因禁卒竊發捍衛有功而秉筆者不能文其實公乃用西漢何羅觸瑟馮媛當熊二事以狀其意曰在昔禁闈誰何弛衛觸瑟方警當熊已屬覽者無不歎服胡宿字武平常州晉陵人諡文恭孝宗受禪赦文云凡今發政施仁之日皆得之問安視膳之餘天下誦之洪景嚴筆也孫甫字之翰博學強記尤善言唐事能詳其君臣行事本末以推見當世治亂每為人説如其身履其間而聽者曉然如目見故學者以為終嵗讀史不如一日聞公論也所著唐史記七十五卷論議閎贍書未及成而卒詔取其書藏祕府司馬溫公書其後云孫公昔著此書甚自重惜常别緘其藁於笥必盥手啓之謂家人曰萬一有水火刀兵之急他財貸盡棄之此笥不可失也每公私少間則增損改易未嘗去手其在江東為轉運使出行部亦以自隨過亭傳休止輒取修之會宣州有急變乘驛遽往不暇挈以俱既行其後金陵大火延及轉運廨舍弟子察親負其笥避於沼中島上公在宣州聞之亟還入問曰唐書在乎察對曰在乃悅餘無所問自壯年至於白首乃成亦未以示人文潞公執政嘗就公借之公不與但録姚宋論以與之溫公修列代君臣事迹辟范淳甫祖禹同編修公在書局分職唐史考其成敗治亂得失之迹撮其機要論次成書名曰唐鑑元祐中客有見伊川先生者几案無他書唯印行唐鑑一部先生謂客曰近方見此書自三代以後無此議論崇寧中有見欒城先生於潁昌先生曰老來不欲泛觀他書近日且看唐鑑東坡云子由作栖賢僧堂記讀之便如在堂中見水石陰森草木膠葛也僕當為書之刻石堂上且欲與盧山結緣豫他日入山不為生客也昔有以詩投東坡者朗誦之而請曰此詩有分數否坡曰十分其人大喜坡徐曰三分詩七分讀耳此雖一時戲語然涪翁所謂南窗讀書吾伊聲蓋讀書者其聲正自可聽耳王沔字楚望端拱初參大政上每試舉人多令沔讀試卷沔素善讀縱文格下者能抑揚髙下迎其辭而讀之聽者忘厭凡經讀者每在髙選舉子凡納卷者必祝之曰得王楚望讀之幸也若然則善於讀者不為無助焉蘇子由嘗云豫少作文要使心如旋牀大事大圓成小事小圓轉每句如珠圓徐師川俯是山谷外甥晚年欲自立名客有稱其源自山谷者公讀之不樂答以小啓曰涪翁之妙天下君其問諸水濱斯道之大域中我獨知之濠上曽南豐表中語有云鈎陳太微星緯咸若崑崙渤澥波濤不驚陳履常甚愛之嘗曰此語信為竒偉有謂曽子固南齊書序是一部十七史序不可不熟看其要處云所謂良史者其明必足以周萬事之理道必足以適天下之用智必足以通難知之意文必足以發難顯之情然後其任可得而稱也昔者唐虞有神明之性有微妙之德使由之者不能知知之者不能名其言至約其體至備而為之二典者推而明之所記者豈獨其迹併與其深微之意而傳之無不盡也至於後世諸史事迹擾昧雖有隨世以就功名之君相與合謀之臣未有得赫然傾動天下之耳目而一時偷奪悖理之人亦幸而不暴著於世豈非所託不得其人故耶曽子固初為太平州司戶時張伯玉作守歐陽公與王荆公諸人咸薦之伯玉殊不為禮一日就廳作大排設召子固惟賓主二人亦不交一談既而召子固於書室謂曰人以公為曽夫子必無所不學也子固辭遜而退一日請子固作六經閣記子固為作終不可其意乃謂子固曰吾試為之即令子固代書曰六經閣者諸子百家皆在焉不書尊經也伯玉字公連范文正公客子固年少有才名私以不識字詆之伯玉有所聞故揭示之如此魏昌世衍從陳無已遊最久言無已平生惡人節書以為茍能盡記不忘固善不然徒廢目力而已夜與諸生會宿忽思一事必明燭翻閲得之乃已或以為可待旦者無已曰不然人情樂因循一放過則不復省矣故其學甚博而精尤好經術非如唐之諸子作詩之外他無所知也肅王樞與沈元用同使金館於燕山愍忠寺暇日無聊同行寺中偶有一唐人碑辭皆偶麗凡三千餘言元用素強記即朗誦一再肅王不視且聽且行若不經意元用歸欲矜其敏取紙追書之不能記者闕之凡十四字書畢肅王視之即取筆盡補其缺無遺者又改元用謬誤四五處置筆他語略無矜色元用不覺為之駭服尹少稷穡強記日能誦麻沙板本書厚一寸嘗與吕居仁舍人坐上記厯日酒一行記兩月不差一字胡淡菴見楊龜山龜山舉兩肘視之曰吾此肘不離案三十年然後於道有進張無垢謫橫浦寓城西寶界寺其寢室有短窗每日昧爽輒抱書立窗下就明而讀如是者十四年洎北歸窗下石上雙跌之迹隱然前輩為學勤苦如此然龜山蓋少年事無垢在晚年尤難也童汪錡能執干戈以衛社稷本謂幼而能赴國難耳非性童也翟公巽作童貫誥詞云爾祖汪錡誤也或云故以戲之寓言以貽訓誡若柳子厚三戒鞭賈之類頗似以文為戲如朱希真敦儒東方智士説蕭東夫海藻吳伍百二文亦不無補於世道朱之文曰東方有人自號智士才多而心狂凡古昔聖賢與當世公卿長者皆摘其短缺而非笑之然地寒力薄終身不免飢凍里有富人建第宅甲其國中車馬奴婢鐘鼓帷幄悉備一旦富人召智士語之曰吾將逺遊今以居第貸子凡室中金寶資生之具動用什物器皿皆聽子用不計期年還則歸我富人即登車而出智士杖䇿而入僮僕婢妾大小男婦羅拜堂下各效其所典簿籍以聽命號智士曰假公智士因遍觀居第富貴靡麗勝如王者喜甚忽更衣東走圊仰視其舍卑狹俯閲其基湫隘心鬱然不樂召綱紀僕讓之曰此第髙廣而圊不稱僕曰惟假公教智士因令撤舊營新狹者廣之卑者增之曰如此以當寒暑如此以蔽風雨既藻其梲又丹其楹至於聚籌積灰扇蠅攘蛆皆有法度事或未當朝移夕改必善必竒智士躬執茆帚與役夫雜作手足瘡繭頭蓬面垢晝夜忘食切切焉惟恐圊之未美也不覺閲嵗未落成忽閽者奔告曰阿郎至矣智士倉皇棄帚而趨迎富人勞之曰子居吾第樂乎智士恍然自失曰自君之出吾惟圊是務初不知中堂之溫密别館之虛涼北榭之風南樓之月西園花竹之勝吾未嘗經目後房歌舞之妙吾未嘗舉觴蛛網琴瑟塵栖鐘鼎不知嵗月之及子復歸而吾當去也富人揖而出之智士還於故廬且悲且嘆悒悒而死南宜僚聞而笑之以告北山愚公愚公曰子奚笑哉世之治圊者多矣奚笑哉蕭東夫寓言曰淮右浮屠客日飲於吳市醉而狂攘臂突市人行者皆避市卒以聞吳牧牧録而械之為符移授伍百使護而返之淮右伍百垢浮屠曰狂髠坐爾乃有千里役吾且爾苦也每未晨而即扣執朴驅其後不得休夜則縶其足至奔牛埭浮屠出腰間金市斗酒夜醉伍百而髠其首解墨衣衣之且加之械而繫焉頽壁而逃明日既曉伍百乃醒寂不見浮屠顧壁已頽曰嘻其遁矣既而視其身之衣則墨驚循其首則不髮又械且繫縶不能出戶大呼逆旅中曰狂髠故在此獨失我耳客每見吳人輒道此吳人亦自笑也千巖老人曰是殆非寓言也世之失我者豈獨吳伍百哉生而有此我也均也是不為榮悴有加損焉者也所寄以見榮悴乃皆外物非所謂倘來者耶曩悴而今榮倘來集其身者日以盛而顧揖步趨亦日隨所寄而改曩與之處者今視之良非昔人而其自視亦殆非復故我也是其與吳伍百果有間哉吾故人或駸駸華要當書此遺之姚鎔字乾父號秋圃合沙者儒也記誦甚精著述不茍潦倒餘六旬僅以晚科主天台黃巖學期年而殂雜著數篇議論皆有思致其喻白蟻文云物之不靈告而弗聽俗所謂對牛馬而誦經是已雖然羣生之類皆含佛性況夫螻蟻至微微而有知人但見其往來憧憧而不知其市聲訌訌固自有大小長幼之序前呼後唱之響默傳於寂然無譁之中一種俱白號曰蛇虎族類蕃昌其來自古賦性至巧纍土為室有嘴至剛嚙木為糧遂使修廊為之空洞廣廈為之頽圯夫人營創亦云艱矣上棟下宇欲維安土爾乃鳩居之而不恤蠶食之而無恥余備歷險阻拙事生涯茍作數椽不擇美材既杉欏之無有惟梓松之是裁正爾輩之所慕逐馨香而俱來雖然爾形至微性具五常其居親親無閨門同氣之鬪近於仁其行濟濟有君子遜畔之風近於禮有事則同心協力不約而競集號令信也未雨則含沙負土先事而綢繆智識靈也其徒羽化則空穴餞之於外有同室之義也既靈性之不泯宜善言之可施余之締創爾所見余之艱難爾宜知今與爾畫池為界請遷種類以他適毋入範圍而肆窺茍諄諄而莫聽是對牛馬而誦經以酒酹地爾其知之又效柳河東三戒作三説其一曰福之馬嘉云海有魚曰馬嘉銀膚燕尾大者視睟兒臠而火熽之可致逺常淵潛不可捕春夏乳子則隨潮出波上漁者用此時簾而取之簾為疏目廣袤數十尋兩舟引張之鎚以鐵下垂水底魚過者必鑽觸求進愈觸愈束愈怒則頰張鬛舒鈎著其目致不可脫向使觸網而能退却則悠然逝矣知進而不知退用罹烹醢之酷悲夫其二江淮之蜂蟹云淮北蜂毒尾能殺人江南蟹雄螯堪敵虎然取蜂兒者不論斗而捕蟹者未聞血指也蜂窟於土或木石人蹤迹得其處則夜炳烈炬臨之蜂空羣赴焰盡殪然後連房刳取蟹取蒲葦間一燈水滸莫不郭索而來悉可俯拾惟知趨進而不安其所其隕也固宜其三蜀封溪之猩猩云猩猩人面能言笑出蜀封溪山或曰交趾血以赭罽色終始不渝嗜酒喜屐人以所嗜陳野外而聫絡之伏伺其獶猩猩見之知為餌已遂斥詈其人姓名若父祖姓名且相戒毋墮奴輩計中携儔唾罵而去去後復顧因相謂曰盍嘗試之既而染指知味則冥然忘夙戒相與沾濡徑醉相喜笑取屐加足伏發往往顛連傾仆掩羣無遺嗚呼明知而明犯之其愚又益甚矣百嵗寓翁家所藏燕丹子一序甚竒附載於此目無秦技無人然後可學燕丹子有言不信有劍不神不可不讀燕丹子從太虛置恩怨以名教衡意氣便可焚却燕丹子此荆軻事也有燕丹而後有荆軻也秦威太赫燕怨太激威怨相軋所為白虹貫日和歌變徵我固知其事之不成倚柱一笑所謂報太子而成其為荆卿者乎余本孱夫不能學亦不須讀苐不忍付之宵燭而録之以副豫家卷軸惜無作者姓名耳周申父之翰寒夜擁爐爇火見瓶內所插折枝梅花氷凍而枯因取投火中戲作下火文云寒勒銅瓶凍未開南枝春斷不歸來這回勿入梨雲夢却把芳心作死灰恭惟地罏中處士梅公之靈生自羅浮派分庾嶺形若稿木稜稜山澤之臞膚如凝脂凛凛雪霜之操春魁占百花頭上嵗寒居三友圖中玉堂茅舍總無心金鼎商羮期結果不料道人見挽便離有色之根夫何氷氏相凌遽返華胥之國玉骨擁爐烘不醒氷魂剪紙竟難招紙帳夜長猶作尋香之夢筠窗月淡尚疑㺯影之時雖宋廣平鐵石心腸忘情未得使華光老丹青手段摸索難真却愁冷落一枝春好與茶毗三昧火惜花君子還道這一點香魂今在何處咦炯然不逐東風散只在孤山水月中元儒郝文忠經字伯常有與友人論文法書曰古之為文法在文成之後辭由理出文自辭生法以文著相因而成也非先求法而作之也後世之為文也則不然先求法度然後措辭以求理若握杼軸求人之絲枲而織之經營比次絡繹接續以求端緒未措一辭鈐制夭閼惟恐其不工而無法故後之為文法在未成之前以理從辭以辭從文以文從法資於人而無我是以愈工而愈不工愈有法而愈無法秪為近世之文弗逮乎古矣宋稗類鈔卷十八
