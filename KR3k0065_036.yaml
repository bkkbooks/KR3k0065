body:
  text: 宋稗類鈔卷三十六常熟潘永因編搜遺第六十顔之推曰人足所履不過數寸然而咫尺之途必顛蹶於崖岸拱抱之梁必沉溺於川原者何哉為其傍無餘地也君子之行已也抑亦如之至誠之言人未必信至潔之言物或致疑皆由言行聲名無餘地也或問吕居仁天下歸仁如何居仁作韻語答之曰面前徑路無令窄窄時無過客無過客時徑益荒眼前滿地生荆棘黃山谷云面前徑路常須令寬路徑窄則無著身處况能使人行也以上三言相符彼立已於峻及離人而立於獨者可以警矣吕獻可以追尊濮園事擊歐公如曰首開邪議妄引經證以枉道悅人主以近利負先帝者凡十四章具載奏議中司馬文正作序乃首載歐公諌臣論以為誠言文正之意以獻可能盡歐公所書諫臣之事使歐公得以無怨歟抑亦歐公但能言之獻可實能行之耶不然獻可排歐公為邪反以歐公之論序獻可之奏又以為誠言可乎歐公晚著濮議一書専與獻可辨獨歸過獻可可為甚矣五代時有姓吕為侍郎者三人皆名族俱有後仕于朝為相吕琦晉天福中為兵部侍郎曾孫文惠端相太宗吕夢竒後唐長興中為兵部侍郎孫文穆蒙正相太宗曾孫文靖夷簡相仁宗衣冠最盛吕咸休周顯德中為户部侍郎七世孫正愍大防相哲宗異哉太祖以歸德軍創業升宋州為歸德府後為應天府太宗以晉王即位升并州為太原府真宗以夀王建儲升夀州為夀春府又嘗為襄王升襄州為襄陽府仁宗以升王建儲升建業為江寧府又嘗為慶國公以慶州為慶陽府英宗以齊州防禦使入繼以齊州為興德軍又嘗為宜州刺史巨鹿郡公嶽州防禦使以宜州為慶逺軍邢州為信德府安國軍嶽州為嶽陽軍神宗自頴王升儲以汝陰為順昌府又嘗為安州觀察使光國公以安州為德安府光州為光山軍哲宗自延安郡王升儲升延州為延安府又嘗為東平軍節度使均國公以鄆州為東平府均州為武當軍徽宗自端王入繼升端州為肇慶府又嘗為寧國公平江鎮江軍節度使以寧州為興寧軍平江鎮江並升為府欽宗自定王建儲升定州為中山府高宗以康王中興升康州為德慶府孝宗以建王建儲升建安為建寧府并升隆興寧國常德崇慶諸府皆以其潛藩分建之地也蘇子容聞人語故事必令人檢出處司馬溫公聞新事即便鈔録且記所言之人故當時諺曰古事莫語子容今事勿告君實宣和間申禁東坡文字甚嚴有士人竊㩦坡集出城為門者所獲執送有司見集後一詩云文星落處天地泣此老已亡吾道窮才力漫超生仲達功名猶忌死姚崇人間便覺無清氣海內何曾識古風平日萬篇誰愛憎六丁收拾上瑤宫京尹義其人乃陰縱之王荆公在金陵有僧清曉於鍾山道上見有童子數人持幡幢羽蓋之屬僧問之曰往迎王相公幡上書云中含法性外習塵氛到寺未久聞荆公薨或問李伯紀後來當國蔡京如不死如張邦昌正典刑否晦菴曰靖康名流多是京晚年牢籠出來的人才伯紀亦所不免如李泰發是極硬底人亦為京所羅致他可知已宣政間凡危亡亂字皆禁不得用有人問尹和靖靖康中孰可以為將曰种師道又問孰可以為相良久曰也只教他做秦檜一日在某寺中慶聖節一樹上貼一榜子云秦相公是細作是時陳應之到廟堂問和親之故秦云某意無他但人主有一六十歲老親在逺須要取來相聚因顧左右取國書看檜掩其前後中間有云不求而得可謂大恩蓋指河南也徐師川微時嘗遊廬山遇一宧者鄭諶與之詩曰平生不善劉蕡策色色門中皆有人後徐入樞府鄭時適用事似有力焉二蘇文未出學者爭傳誦徐禧之文禧師川之父黃魯直之妹壻也永樂之敗禧死難嶽太尉本是韓魏公家佃客每見韓家子弟必拜季清言有一鄉人賣文字遇虎其人無走處耳曾聞人言虎識字遂鋪開文字與虎看虎遂去靖康京城不守王時雍盡搜取婦女與金人時號雍為金人外公南渡後福建賦稅猶易辦浙中全是橫斂丁錢有至三千五百者人由此多去計會中使作宫中名字以免稅辛幼安云曾見糞船亦插德夀宫旗字王介甫欲行保伍法以去天下坐食之兵獨此法不曾行得晦菴云有一等人能談仁義之道做事處却乖此與鬼念大悲呪一般更無奈他何胡文定少時性最急嘗怒一兵士至親毆之兵輒抗拒無可如何遂回入書室作小册盡寫經傳中文有寬字者以觀玩從此遂不復卞急文潞公嘗曰人但以彥博長年為慶獨不知閲世既久內外親戚皆亡一時交遊雕喪殆盡所接皆邈然少年無可論舊事者董敦逸吉水永豐村落人哲宗時為吏部侍郎招鄉人之寓太學者以訓童稚童稚業不精進董責之自言幼入上庠甘虀鹽者凡幾年今汝若此何以有成耶其鄉人答曰公言過矣侍郎乃董十郎兒賢郎乃董侍郎兒蓋董起白屋父行第十仁宗慶厯初急於用賢當時有聲望者王兵部素歐陽校理修余校理靖魚工部周詢四人並命作諌官朝野相慶時惟魚望不及三人蔡君謨時為校勘為詩慶之曰御筆親除三諫官士林相賀復相歡魚聞之乃曰豫不與士論何顔復當誎列遂乞辭職朝廷從之乃過臺御史即除蔡代知諌院是時諌院號稱得人魚在臺亦稱職旋拜中丞而卒李端懿李端願問卜人李易簡曰富貴吾不憂但問夀幾何易簡曰二君大長公主之子生而富貴窮奢極欲又求長夀當如貧者何造物如此無乃太不均乎遂不與卜馮當世丞相有答伯庸詩云孔子之文滿天下孔子之道滿天下得其文者公卿徒得其道者為餓夫綿州諸邑各有所出謂之八子巴西紗子魏城扇子羅江犬子神泉榛子彰明附子龍安杏子鹽泉絲子石泉猴子巴西紗一匹重二兩婦人製為夏服甚輕妙魏域以一繭造一扇謂之綿扇輕而可愛紹聖初陸農師曾子開俱以曾預修神宗實録𬒳謫中書舍人林希子中草詞云謂爾同為謗訕則於今其藁不存謂爾有所建明則未嘗爭論而去人以為得實元豐中光祿卿危拱辰為進士時遇五臺山僧號稱知人拱宸以前程問之僧以手帕裏一大錢贈之曰謹守終有所見拱宸祕而識之其後登第死於江南饒州鑄錢監真宗朝簽書樞密院馬公知節武人方直真誠真宗東封下至從臣皆齋戒至嶽下撫問執政曰卿等在路素食不易時宰相臣僚有私食驢肉者馬乃對曰亦有打驢子喫的及還都設宴開封府先命巡吏屏出貧民於城外上御樓見人物之盛喜顧宰臣曰今都城士女繁富皆卿等輔佐之力馬乃奏曰貧者總趕在城外左右皆失色真宗以為誠而親之事多類此馬公一日從駕遊幸羣臣皆賦詩馬素不習文真宗強之奉詔詩成乃奏曰臣不善書乞宣陳堯叟與臣書真宗如其言時陳為首相議者惜之徽宗在藩邸楊震給事左右最為周慎嘗有雙鶴降於中庭左右皆賀震急逐去云是鸛非鶴也又一日芝生寢閣左右復稱慶震急刈除曰是菌非芝由此信任彌篤葑草尚能攔浪藕絲不解留連此一聨東坡在黃時戲書也又云湖上秋風聚螢苑門前春浪散花洲王文甫所居在黃之車湖即武子故居宅枕大江即散花洲也東坡屢過其家戲書此秦少遊南遷舟過南康宫亭廟下見湖月光彩特異因憶昔在雲老惜竹軒所見景色與此不殊其夜夢美人自稱維摩散花天女以維摩像求贊少遊愛其畫謂非吳道子不能作天女戲贈詩曰不知水宿分風浦何異秋眠惜竹軒開道詩詞妙天下廬山對眼可無言少遊贊曰竺儀華夢瘴面囚首口雖不言十分似九應笑蔭覆大千作獅子吼不如搏取淨域丸泥似陶家手既寤因自書之其真迹落雷州天寧寺齊州城西張意諌議園亭有金線泉石甃方池廣袤丈餘泉亂發其下東注城濠中澄徹見底池心南北有金線一道隱起水面以油滴一隅則線紋逺去或以紋亂之則線輒不見水止如故天陰亦不見齊為東方名郡而張氏濟南盛族園池乃郡之勝遊泉之出百年矣士大夫過濟南至泉上者不可勝數而無能究其所以然亦無一人題詠者獨蘇子瞻有詩曰槍旗㩦到齊西境更試城南金線竒然亦不能辨泉之所以有金線也曾南豐亦有金線泉詩曰玉甃常浮皓氣鮮金絲不定路南泉雲依美藻爭成縷月照寒漪巧上弦已繞渚花紅灼灼更縈沙竹翠娟娟無風到底塵埃盡界破氷綃一片天又范諷自給事中謫官數年方歸逰張氏園亭飲泉上有金線珍珠之目水木環合乃厯下之勝景園亭主人乃張寺丞聰也嘗􅌽范晏飲於亭范題一絶於壁云園林再到身猶健官職全拋夢乍醒惟有南山與君眼相逢不改舊時青英州雷震一山梓樹盡枯而生龍腦京師龍腦為之頓賤時熙寧元年七月也王禹玉言於司馬文正公使人就市買之信然一兩直錢千四百味苦而香酷烈又言潭州益陽雷震山裂出米可數十萬斛炊之成飯而腥不可食有賫其米至京師者禹玉以相貽其狀信米也而色黑如炭又言荆襄之間天雨白氂如馬尾長者尺餘瀰漫山谷亦有賫至京師者管輅所謂天雨毛賢人逃者也山谷守當塗日郭功父嘗寓焉一日遇山谷論文山谷傳少遊千秋歲詞嘆其句意之善欲和之而海字難叶功父連舉數海字若孔北海之類山谷頗厭而未有以郤之次日又過山谷問焉山谷答曰昨晚偶得一海字韻功父問其所以山谷云羞殺人也爺娘海自是功父不復論文於山谷矣蓋山谷用俚語以却之也閩賈郁性峭直不容人吏文過為仙遊令及受代有一吏酣醉郁怒曰吾當再典此邑以懲此輩吏揚言公欲再作縣令猶造鐵船渡海也郁聞之不言後復典舊邑時醉吏為庫吏盜官錢數萬下獄具狀郁批榜之尾曰竊銅鏹以潤家非因鼓鑄造鐵船而渡海不假爐錘因決杖徒之未幾移治福清召為御史中丞宋太祖改元乾德竇儀辨其為亡蜀年號太祖歎其博綜及見宋朝類苑江南保大中浚秦淮得石志按其刻有大宋乾德四年凡六字他皆磨滅不可識令諸儒參驗乃輔公祐反江東時年號也此不惟年號同并國號亦同矣宋太祖謀伐燕趙普一代宗臣極論爭抗至曰此際官家何須留意不須留意四字浸入士大夫之心腹幼而聞壯而行而宋之社稷斷送金元之手矣然中令疏云所得者少只於得少之中猶難入手所失者多更於失多之外别有關心自是奏疏名語世傳王荆公與程明道論新法其子元澤囚首跣足攜婦人冠以出大聲曰梟韓琦富弼之首於市法乃得行其氣象失措是一紈袴無賴子弟熙寧中神宗再召荆公衆問公來否元澤乃言大人亦不敢不來然未有一居處衆言居處何難元澤曰不然大人之意乃欲與司馬十二丈卜鄰以其修身齊家事事可為子孫法也其雅馴謹厚又如此何一人迥别乃爾又嘗聞荆公每獨處論量天下人才首屈指於元澤曰大哥是一箇其次即吕吉甫章子厚蔡元度兄弟以下十餘人皆至卿相而元澤則早亡荆公雖偏不至溺愛不明至此豈毁譽成敗皆未足以盡人耶靖康金退之後吳敏孫敏等秉政有十不管之謡云不管太原却管太學不管防秋却管春秋不管炮石却管安石不管肅王却管舒王不管燕山却管聶山不管河界却管舉人免解不管河東却管陳東不管二太子却管立太子腐儒之誤國又豈下於妖人賊子乎建炎時謡曰仕塗捷徑無過賊上將竒謀是受招又曰欲得官殺人放火受招安司馬溫公獨樂園之讀書堂文史萬餘卷晨夕翻閲雖纍數十年皆新若手未觸者嘗謂其子公休曰賈𥪡藏貨貝儒家惟此耳然當知寶惜吾每歲以上伏及重陽間視天氣晴明日即設几案於當日所側羣書其上以曝其腦所以年月雖深終不損動至於啓卷必先視几案潔淨藉以茵褥然後端坐看之或欲行看即承以方版未嘗敢空手捧之非惟手汗漬及亦慮觸動其腦每至看竟一版即側右手大指面襯其沿隨覆以次指面撚而挾過故得不至揉熟其紙每見汝輩多以指爪撮起甚非吾意今浮屠老氏猶知尊敬其書豈以吾儒反不如乎當宜志之宋稗類鈔卷三十六
