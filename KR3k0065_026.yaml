body:
  text: 宋稗𩔖鈔卷二十六常熟潘永因編紕繆第四十三建隆初王師下湖南澧民素不識槖駝村落婦女見而驚異競來觀之有拜而祝者曰山王靈聖願賜福祐及見屈膝而促又走避之曰卑下小人不勞山王下拜軍士見者無不大噱又拾其所遺之糞以線穿聫戴於男女頸項之下用禳兵疫之氣南中相𫝊以為笑北方民家吉凶輒有相禮者謂之白席多鄙俚可笑韓魏公自樞宻歸鄴赴一姻家禮席偶盤中有荔枝欲㗖之白席者遽唱言曰資政喫荔枝請衆客同喫荔枝魏公憎其喋喋因置不復取白席者又云資政惡發也却請衆客放下荔枝魏公為一笑有朝士陸東通判蘇州而權州事因斷流罪命黥其靣曰特刺配某州牢城黥畢幕中相與白曰凡言特者罪不至是而出於朝廷一時之㫖今此人應配矣又特者非有司所得行東大恐即改特刺字為凖條字再黥之頗為人所笑後有薦東之才於兩府者石參政聞之曰吾知其人矣得非權蘇州日於人面上起草者乎慶厯中河北大水仁宗憂形於色有走馬承受公事使臣到闗即時召對問河北水災何如使臣對曰如䘮考妣上黙然既退即詔閤門今後武臣上殿奏事並須直説不得過為文飾楊安國膠東經生也累官至天章閣侍講其為人沽激矯偽言行鄙朴動有可笑每進講則雜以俚下鄽市之語自扆坐至侍臣中官見其舉止已先發笑一日侍仁宗講至一簞食一瓢飲安國操東音曰顔囘甚窮但有一羅粟米飲一葫蘆漿水又講自行束修以上吾未嘗無誨焉安國遽啟曰官家昔孔子教人也須要錢仁宗哂之翼日遍賜講官皆懇辭不拜唯安國受之時又有彭乘為翰林學士文章誥命尤為可笑有邉帥乞朝覲仁宗許其候秋涼即途乗為批答之詔曰當俟蕭蕭之侯爰堪靡靡之行田況知成都府㑹西蜀荒歉饑民流離況始入劍門即發倉賑濟既而上表待罪乘又批答曰才度巖巖之險便興惻惻之情王琪滑稽多所侮誚及乘之死琪為挽詞有最是蕭蕭句無人繼後風葢謂是耳黄州潘大臨工詩家甚貧東坡山谷尤喜之臨川謝無逸以書問有新作否潘答曰秋來景物件件是佳句恨為俗氛所翳耳昨日閒卧聞攪林風雨聲欣然起題其壁曰滿城風雨近重陽忽催租人至遂敗意止於一句奉寄聞者笑其迂濶大臨即潘邠老南唐一詩僧賦中秋月詩云此夜一輪滿至來秋方得下句云清光何處無喜躍半夜起撞鐘城人盡驚李後主擒而訊之具道其事得釋吴中一士人曾為轉運司别試解頭以此自負好託附顯位是時侍御史李制知常州丞相莊敏龎公知湖州士人遊毗陵挈其徒飲倡家顧謂一騶卒曰汝往白李二我在此飲速遣有司持酒肴來俄頃郡厨以飲食至甚豐腆適有一蓐醫在座見其事後至御史家因語及之李君極怪使人捕得騶卒乃兵馬都監所假受士人教戒就使官厨買飲食以紿坐客耳李廼杖騶卒使街司白遣士人出城郡僚有相善者出與之别唁之曰倉卒遽行當何所詣士人應之曰且往湖州依龎九耳聞者莫不大笑有故相逺派在姑蘇嘗嬉遊書寺壁曰大丞相再從姪某嘗遊士人李璋素好俳謔題其傍曰混元皇帝三十七代孫李璋繼至慶厯中衛士有震驚宫掖尋捕殺之時臺臣宋禧上言此葢平日防閑不周所以致患臣聞蜀有羅江狗赤而尾小者其儆如神願養此狗於掖庭以警倉卒時謂之宋羅江又有御史席平因鞫詔獄畢上殿仁宗問其事平曰已從車邉斤矣時謂之斤車御史紹興乙卯以旱禱雨諌議大夫趙霈上言聖節殺鷄鵝太多只令殺猪羊大牲適傳一龍虎大王南侵邉方以為憂胡致堂侍郎云不足慮此有雞鵝御史足以當之嘉定中察院羅相上言越州多虎乞行下措置多方捕殺正言張次賢上言八盤嶺乃禁中來龍乞禁人行太學諸生遂有羅擒虎張尋龍之對御史臺故事凡拜命滿百日無啟事者斥外王平拜御史滿百日而未言事或云王端公有待而發茍言之必大事也一日聞入劄子衆共偵乃彈御膳中有髪其彈詞云是何穆若之容忽睹鬈如之狀宋時侍御史號雜端最為雄劇臺屮㑹聚則於座南設横榻號南牀又曰癡牀言登此牀者倨傲如癡張丞相雅好草聖而不工流輩皆譏笑之丞相自若也一日得句索筆疾書滿紙龍蛇飛動使其姪録之當波險處姪罔然而止執所書問曰此何字丞相熟視久之亦自不辨詬曰何不早問致吾忘之彭淵材初見范文正公畫像驚喜再拜前磬折稱新昌布衣彭几幸𫉬拜謁既罷熟視曰有竒徳者必有竒形乃引鏡自照又捋其鬚曰大略似之矣只無耳毫數莖耳年大當十相具足也又至廬山太平觀見狄梁公像睂目入鬢又前再拜贊曰有宋進士彭几謹拜謁又熟視久之呼刀鑷者使剃其睂尾令作卓枝入鬢之狀家人軰望見驚笑淵材怒曰何笑吾前見范文正公恨無耳毫今見狄梁公不敢不剃睂何笑之乎耳毫未至天也剃睂人也君子修人事以應天奈何兒女子以為笑乎吾每欲行古道而不見知於人所謂傷古人之不見嗟吾道之難行也淵材好談兵曉大樂通知諸國音語嘗咤曰行師頓營每患乏水近聞開井法甚妙時館於太清宫於是日相其地而掘之無水又遷掘數處觀之四旁遭其掘鑿孔穴棋布道士月下登樓之際顰額曰吾觀為敗龜殻乎何四望孔穴之多也淵材不懌又嘗從郭太尉遊園咤曰吾比𫝊禁蛇方甚妙但呪語耳而蛇聴約束如使稚子俄有蛇甚猛太尉呼曰淵材可施其術蛇舉首來奔淵材無所施其術反走汗流脱其冠巾曰此太尉宅神不可禁也太尉為之一笑嘗獻樂書得恊律郎使其從子乘䟦其書曰子落筆當公不可以叔姪故溢美也乗題曰淵材在布衣有經綸志善談兵曉大樂文章葢其餘事獨禁蛇開井非其所長淵材觀之怒曰司馬子長以酈生所為事事竒獨説高祖封六國為失故於本傳不言者著人之美為完𫝊也又於子房傳載之者欲𨼆實也奈何言禁蛇開井乎聞者絶倒紹聖初曾子宣在西府淵材往謁之論邉事極言官軍不可用用士人為良子宣喜之既罷與其從子乗過興國寺和尚食素分茶甚美將畢問奴楊照取錢奴曰忘持錢來奈何淵材色窘乗戲曰兵計將安出淵材以手捋鬚良久目乗趨自後門出若將便旋然乘迫之淵材以手挈㡌搴衣走如飛乘與奴楊照過二相公廟淵材乃敢囘顧喘立靣無人色曰編虎頭撩虎鬚幾不免虎口哉乗又戲曰在兵法何計淵材曰三十六計走為上計淵材迂濶好怪嘗畜兩鶴客至指以誇曰此仙禽也凡禽卵生而此胎生語未卒園丁報曰此鶴夜産一卵大如梨淵材靣發赤訶曰敢謗鶴也卒去鶴輒兩展其脛伏地淵材訝之以杖驚使起忽誕一卵淵材嗟咨曰鶴亦敗道吾乃為劉禹錫佳話所誤自今除佛老孔子之語予皆勘騐要之淵材自信之力但讀相鶴經未熟耳又嘗曰吾平生無所恨所恨者五事耳人問其故淵材斂目不言久之曰吾語不入時聽恐汝曹輕易之問者力請其説乃答曰第一恨鰣魚多骨第二恨金橘太酸第三恨蓴菜性冷第四恨海棠無香第五恨曾子固不能作詩聞者大笑淵材瞠目曰諸子果輕易吾論也李舟大夫客都下一年無差遣乃受昌州議者以去家逺改授鄂倅淵材聞之吐飯大步往謁李曰今日聞大夫改授鄂倅有之乎李曰然淵材悵然曰誰為大夫謀昌佳郡也奈何棄之李驚曰供給豐乎曰非也民訟簡乎曰非也然則何以知其佳淵材曰天下海棠無香昌州海棠獨香非佳郡乎聞者𫝊以為笑淵材遊京師十餘年其家饘粥不給父以書促歸跨一驢攜一布囊親舊相慶曰布囊中必金珠也君官爵雖未入手且使父母妻兒脱凍餒之厄囊中所有可早出之淵材喜見鬚睂曰吾富可埒國汝可拭目以觀既開囊乃李廷珪墨一丸文與可墨竹一枝歐陽公五代史稿草一巨束一士人以鬻書為業盡掊其家所有約百餘千買書將入京中塗遇一士人取書目閱之愛其書而貧不能得家有數古銅器將貨之而鬻書者雅有此癖一見甚喜乃母庸貨也我與汝估其值而兩易之於是盡以隨行之書換數十銅器亟返其家其妻視其行李但見二三布囊磊磈然鏗鏗有聲問得其實乃詈其夫曰你換得他這箇幾時近得飯喫其人曰他換得我那箇也幾時近得飯喫聞者無不絶倒有嘲好古者云以市古物不計直破家無以食遂為乞猶持所有顔子陋巷瓢太王去邠杖號於衆曰孰有太公九府錢乞一枚李寰建節晉州表兄武恭性誕妄又稱好道及蓄古物遇寰生日乃遺箱挈一故皂襖子餉寰曰此是李令公收復京師時所服願尚書功業一似西平寰以書謝後聞知恭生日箱挈一破䐈脂幞頭餉恭曰知兄深慕高真求得一洪崖先生初得仙時幞頭願兄得道一如洪崖賔僚無不大笑劉宋江夏王義恭性愛古物常遍就朝士求之侍中何朂已有所贈而王徴索不已何意不平常出行於道中見狗枷敗犢鼻乃命左右取之還以箱檠貯送遺之牋云承命復取古物今奉上李斯狗枷相如犢鼻張懐素舒州人崇寧元年入京師自稱道術通神雖聾蟲異物能呼遣之至言孔子誅少正卯嘗諌以太蚤楚漢成皐相持亦屢登高觀戰一時公卿皆惑之至大觀中事敗牽引士𩔖吕吉甫蔡元度俱坐之降讁王荆公次子名雱為太常寺太祝素有心疾娶同郡龎氏女為妻逾年生一子雱以貌不𩔖已百計欲殺之竟以悸死又與其妻日相鬬閧荆公知其子失心念其婦無罪欲離異之則恐其誤被惡聲遂與擇壻而嫁之是時工部員外郎侯叔獻者荆公門人也娶魏氏女為妻少悍叔獻死而幃箔不肅荆公奏逐魏氏婦歸本家京師有諺語曰王太祝生前嫁婦侯工部死後休妻進士李居仁與鄭輝為友居仁年踰耳順鬚盡白輝少年輕侮乃呼為李公居仁於是盡摘其鬚去之輝一日見居仁陽驚曰數日不見風彩頓異居仁整容喜曰如何曰昔日皤然一公今日公然一婆矣有一郎官年六十餘置媵侍數人鬚已班白令其妻妾互鑷之妻忌其少恐為羣妾所悦乃去其黒者妾欲其少乃去其白者不踰月頤頷遂空熙寧中省試王射虎侯賦一試卷云講君子必爭之藝飾大人所變之皮又嘗試貴老為其近於親賦一試卷云覩兹黄耉之狀𩔖我嚴君之容一時傳以為笑治平中國學試䇿問體貌大臣進士䇿對曰若文相公富相公皆大臣之有體者若馮當世沈文通皆大臣之有貌者意謂文富豐碩馮沈美少也劉原甫遂目沈馮為有貌大臣李獻臣好為雅言知鄭州時孫次公為陜漕罷赴闕先遣一使臣入京所遣乃獻臣故吏到鄭庭參獻臣甚喜欲令左右延飯乃問之曰餐來未使臣誤意餐者謂次公也遽對曰離長安日都運已治裝獻臣曰不問孫待制官人餐來未其人慚沮而言曰不敢仰昧為三司軍將日曽喫却十三葢鄙語謂遭杖為餐獻臣掩口笑曰官人誤也問曽與未曾餐飯欲奉留一食耳中官杜浙好學文談凡答親舊書若此事甚大必曰兹務孔洪亦此𩔖也熙寧以前凡郊祀大駕還内至朱雀門外忽有緑衣人出道中蹣跚潦倒如醉狀乗輿為之少抳謂之天子避酒客及門兩扉遽闔門内抗聲曰從南來者是何人門外應曰是趙家第幾朝天子又曰是也不是應曰是開門乗輿乃進謂之勘箭舊制郊祀禮成駕還闕門有勘契之儀其制以劄為箭長三尺鏤金飾其端緘以泥金絳囊金吾掌之金塗銅為鏃長三寸其端所以合符也貯以泥金紫囊駕前掌之駕至端門閽吏闔扉以問曰南來者為誰駕前司告曰天皇皇帝奏請行勘箭之鏃奏曰勘訖又審曰是否贊者齊聲曰是三審乃啟扉列班啟居駕乃入契刻檀為魚金飾鱗鬛荆刻檀板為坎足以容魚殿前掌板駕過殿門合魚乃啟扉其制如勘箭之儀熙寧中詔罷其制紹聖間馬從一監南京排岸司適漕使至隨衆迎謁漕一見怒甚即叱之曰聞汝不職本欲按汝何不亟去尚敢來見耶從一惶恐自陳湖湘人迎親竊禄求哀不已漕察其語南音也乃稍霽威云湖南亦有司馬氏乎從一答曰某姓馬監排岸司耳漕乃微笑曰然則勉力職事可也初葢誤認為温公族人故欲害之自是從一刺謁但稱監南京排岸而已𫝊者皆以為笑蔡京改官制奏云太宗皇帝嘗為尚書令殊不知是唐太宗舉朝莫不揶揄而不敢指其非古稱姬姜望姓也後人稱姬妾已誤京改公主為帝姬益謬矣李鄴使金還云金人上馬如龍步行如虎渡水如獺登城如猿時人目為四如給事秦檜主和議金人敗盟入寇檜顧盼朝士問計䇿時張巨山微誦徳無常師檜心異之留與語召諸將為攻戰計即命巨山為奏稿倉卒不仔細起頭兩句云伊尹告成湯曰徳無常師主善為師孔子曰陳力就列不能者止遂急書進呈檜後喜遂播告天下決䇿用兵已而順昌大捷金人遂退檜後専其功擢巨山中書舍人有無名子作詩嘲之一聨云成湯為太甲宣聖作周任徐仲車父名石終身不踐石逢橋則使人負之而趨陳烈弔蔡君謨之喪及門率子弟匍匐而進遵毛詩凡民有喪匍匐救之之義也夫徐幸生江北若在江南則終身無可踐之地陳幸生江南若在江北則當墜汚泥溝澮中矣迂濶可笑乃至於此晉汲桑當盛暑重裘累茵使人扇之恚不清涼斬扇者宋党進當大雪擁鑪酌酒醉飽汗出捫腹徐行曰天氣不正有兵士侍帳外曰小人此處頗正天下人何嘗無對田登作郡自諱其名觸者必怒吏卒多被笞于是舉州皆謂燈為火上元放燈吏人遂書榜揭於市曰本州依例放火三日承平日有宗室名宗漢自惡人犯其名謂漢子曰兵士舉宫皆然其妻供羅漢其子授漢書宫中人曰今日夫人召僧供十八大阿羅兵士太保請官教㸃兵士書都下閧然𫝊以為笑程覃尹京日有治聲唯不甚知字嘗有部民投牒乞執狀造橋覃大書昭執二字有吏在傍見其誤遂白之合是照執今是昭執乃漏下四㸃耳覃遽取筆於執字下加四㸃遂為昭熱焉乾道中駁放秦塤等科名方集議時中司誤以駁為剥衆雖知其非畏中司䕶前遂皆書曰剥可寓一笑紹興末謝景思守括蒼司馬季思佐之皆名伋劉季高以書與景思曰公作守司馬九作倅想郡事皆如律令也聞者絶倒翁肅閩人守江州昬耄代者至既交割猶居右席代者不校也罷起轉身復將入州宅代者攬衣止之曰這箇使不得乾道間林謙之為司業與正字彭仲舉遊天竺小飲論詩談到少陵妙處仲舉微醉忽大呼曰杜少陵可殺有俗子在鄰壁聞之遍告人曰有一怪事林司業與彭正字在天竺謀殺人或問其所謀殺者為誰曰杜少陵也不知是何處人聞者絶倒嶺南監司有但中庸者一日有朝士同觀邸報見嶺南郡守以不法被劾朝㫖令但中庸根勘有一人輒歎曰此郡守必是權貴所主問何以知之曰若是孤寒必須痛治此乃令但中庸根勘即是有力可知同坐者無不掩口其人倖然作色曰崛直宜為諸公所笑竟不悟而去鍾弱翁所至好貶駁榜額字畫必除去之出新意自立名為重書然書實不工人皆苦之嘗過廬陵一山寺有高閣壯麗弱翁與僚屬部曲擁立望其榜曰定惠之閣旁題姓名漫滅弱翁放意稱謬使僧梯取之拭拂就視乃魯國顔真卿書弱翁顧謂客曰似此字畫何不刻石即令刻石傳者以為笑鍾𫝊字弱翁章惇黨也臨平明因寺尼刹也豪僧往來多投是寺每至則呼尼之少艾者供寢寺主苦之於是専設一寮以貯尼之淫濫者供客僧不時之需名曰明因尼站弁陽老人曰余負日茅簷分漁樵半席時見山翁野媪捫身得蝨則置之口中若將甘心焉意甚惡之然揆之於古亦有記焉應侯謂秦王曰得宛臨流陽夏斷河内臨東陽邯鄲猶口中蝨王莽校尉韓威曰以新室之威北係單于頸無異口中蚤蝨陳思王著論亦曰得蚤蝨者莫不靡之齒牙為身害也三人者皆當時貴人其言乃爾則野老嚼蝨葢亦自有典故可發一笑冲晦處士李退夫作事矯怪攜一子遊京師居北郊别墅帶經灌園一日老圃請撒園荽俗𫝊撒此物須主人口誦穢語播之則茂退夫固矜純節執菜子於手撒之但低聲宻誦曰夫婦之道人倫之始云云不絶於口無何客至不能訖事戒其子使畢之其子尤矯於父執餘子呪之曰大人已曽上聞皇祐中館閣以為雅戲凡曰澹話清談則曰宜撒園荽一巡至元間詔天下除道徳經外其餘説謊道經盡行燒毁道士受佛經者為僧不願為僧者娶妻為民時江南釋教都總統楊璉真伽恢復佛寺三十餘所鑑湖天長觀有道士為僧者獻觀於總統云賀知章倚托史彌逺聲勢將寺改觀乞復原曰寺額楊髠從其請真可笑也宋稗𩔖鈔卷二十六
