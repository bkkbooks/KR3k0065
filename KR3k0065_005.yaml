body:
  text: 宋稗類鈔卷五常熟潘永因編諂媚第九韓魏公在永興一日有一幕官來參公一見熟視蹙然不樂凡數月未嘗交一語儀公乘間問公幕官者公初不識之胡然一見而不樂公曰見其額上有塊𨼆起必是禮拜所致當非佳士恁地人緩急怎生倚仗唐來鵬詩云回眸緑水波初起合掌白蓮花未開嘉祐中有王永年者娶宗女求舉於竇卞楊繪得監金耀門書庫永年嘗置酒延卞繪出其妻間坐以左右手掬酒以飲卞繪謂之白玉蓮花盞意亦取鵬詩云程師孟嘗請於王介甫曰公文章命世師孟多幸與公同時願得公為墓志庶𫝊不朽惟公矜許介甫問先正何官師孟曰非也師孟恐不得嘗侍左右欲豫求如椽俟死而刻之耳介甫雖笑不許而心憐之及王雱死有習學檢正張安國披髮藉草哭於柩前曰公不幸未有子今郡君妊娠安國願死托生為公嗣京師為之語曰程師孟生求速死張安國死願託生光祿卿鞏申佞而好進老為省判趨附不已王荆公為相每生日朝士獻詩頌僧道獻功德疏以為夀輿皂走卒皆籠雀鴿就宅放之謂之放生申既不􅈺詩什又不能誦經於是以大籠籠雀詣客次搢笏開籠且祝云願公一百二十嵗時有邉寨之主妻病而虞候割股以獻者逺近駭笑或對曰虞候為縣君割股大卿與丞相放生王荆公當國郭祥正知邵武州武岡縣實封附遞奏書乞以天下之計専聽王安石處畫凡議論有異於安者雖大吏亦當屏黜表辭亦甚暢辨上覽而異之一日問荆公曰卿識郭祥正否其才似可用荆公曰臣頃在江東嘗識之其為人才近縱橫言近闔押而薄於行不知何人引薦而聖聰聞知也上出其章以示荆公耻為小人所薦因極口陳其不可用而止是時祥正方從章惇辟以軍功遷殿中丞及聞荆公上前之語遂以本官致仕朱子語録蘇東坡子過范淳夫子溫皆出梁師成門以父事之又有某人亦然師成妻死溫與過欲喪以母禮方疑忌某人不得已衰絰而往則某人先衰絰在帷下矣師成自謂東坡遺腹子待叔黨如親兄弟諭宅庫云蘇學士使一萬貫以下不須復薛昻賦蔡京君臣慶㑹詩云逢時可謂真千載拜賜應須更萬回時人謂之薛萬回賈秋壑柄國時浙漕朱浚深源每有札子禀事必稱某萬拜覆時人謂之朱萬拜深源晦翁之曾孫也元兵入閩執建寧朱浚欲失降之曰豈有朱晦菴後而節者遂自殺其即此朱萬拜耶而薛昻避蔡京諱至禁其家人俱不得犯或不及檢偶犯者必加笞責昻嘗自誤及或以為言乃舉手自擊其口葉石林為蔡京客故避暑録所書宣政間事尊京曰魯公凡及蔡氏每委曲回互而於元祐斥司馬溫公名建炎紹興初仕宦者供家狀有不係蔡京王黼等親黨一項今日江湖從學者人人諱道是門生石林其矯一時之弊耶宣和初有鄧其姓者留守西京以牛酥百斤遺梁師成江子我端友作牛酥行云有客有客來長安牛酥百斤親自煎倍道奔馳少師府望塵且欲迎歸軒守閽呼語不必出已有人居第一焉其多乃復倍於此台顔顧視初怡然昨朝所獻雖第二桶以純漆麗且堅今君來遲數又少青紙題封難勝前持歸空慚遼東豕努力明年趂頭市元祐名卿朱紱紹聖初不幸坐黨錮崇寧間亦有朱紱者蘇州人初登第欲希晉用上疏自陳與奸人同姓名恐天下後世以為疑遂易名諤蔡元長果大喜不次擢用明嘉靖中浙人徐學詩劾嚴嵩去職蘇之嘉定有同姓名者亟改詩為謨遂登顯要何前後之一轍如此也蔡京為相詣學自嘗饅頭其中沒見識士人以手加額曰太師留意學校毛德昭名文江山人喜大罵劇談紹興初招徠直諌無所忌諱德昭對客議時事率不遜語人莫敢與酬對而德昭愈自若晚來臨安赴省試時秦㑹之當國數以言罪人勢熖可畏有唐錫永夫者遇德昭於朝天門茶肆中素惡其狂乃與坐附耳語曰君素號敢言不知秦太師如何德昭大駭亟起掩耳曰放氣放氣遂疾走而去追之不及楊存中人號為髯閹以其多髯而善逢迎謂形則髯其所為則閹也秦檜在相位建一德格天之閣有朝士賀以啓云我聞在昔惟伊尹格於皇天民到於今微管仲吾其左袵檜大喜超擢之又有選人投詩云多少儒生新及第髙燒銀燭照蛾眉格天閣上三更雨猶誦車攻復古詩檜亦即與改秩時有蜀士投啓於秦其間一聨云乾坤二百州未獲託身之所水陸八千里來歸造命之司秦得之尤喜沈丞相該為樓貯書禮佛其上人謂之五體投地之樓以對一德格天之閣秦㑹之初賜居第時兩浙轉運司置一局曰箔場官吏甚衆専應副賜第事其孫女封崇國夫人者謂之童夫人蓋小名也愛一獅猫忽亡之限令臨安府訪追及期不獲府為考繫鄰居民家官吏至步行求猫凡獅形者悉捕致而皆非也乃賂入宅老卒詢其狀圖百本於茶肆張之京尹曹泳因嬖人以金猫祈懇乃已秦會之嘗問宋參政朴曰某可比古何人朴遽對曰太師過郭子儀不及張子房秦頗駭曰何故對曰子儀為宦者發其先墓無如之何今太師能使此輩屏息畏懾過之逺矣然終不及子房者子房是去得底勳業太師是去不得底勳業秦拊髀太息曰好遂驟遷用至執政秦之叵測如此秦㑹之有十客曹冠以教其孫為門客王㑹以婦弟為親客郭知運以離婚為逐客吳益以愛壻為嬌客施全以剚刃為刺客李季以設醮奏章為羽客龔金以治産為莊客丁䙫以出入其家為狎客曹泳以獻計取林一飛還作子為說客初止有此九客耳秦既死葬於建康有蜀人史叔夜者懷雞絮號慟墓前其家大喜因厚遺之遂為弔客足十客之數一以朱希真為上客曾該為食客曹冠為閒客康伯可為狎客湯鵬舉為惡客某人為詞客張說之為承㫖也士之無耻者皆趨之時富川王質吳興沈瀛俱有聲學校及同官樞屬時譽藉甚每相謂以詣說為戒衆皆聞而壯之一日質潛往詣說升堂瀛己先在相視愕然明日縉紳相𫝊清議鄙之久皆不安而去然則士何貴於文藻宦聲也韓托胄有愛姬小故被譴錢塘令程松夀亟召女儈以八百千市之舍之中堂旦夕夫妻上食事之甚謹姬惶恐莫知所由居數日托胄意解復召之知為松夀所市大怒松夀聞之亟上謁獻之曰頃有郡守辭闕者將挾市去外郡某忝赤縣恐忤鈞顔故為王匿之舍中耳托胄意猶未平姬既入具言松夀謹待禮托胄大喜即日躐除太府寺丞自監察御史踰年進右諌議大夫猶怏怏不滿乃更市一美人獻之名曰松夀托胄追問之曰奈何與大諌同名答曰欲使賤名常逹鈞聽耳托胄憐之即除同知樞密院事托胄有四妾皆郡夫人其三夫人號滿頭花新進者號四夫人尤寵幸通籍宫中慈明嘗召入賜坐四夫人即與慈明偶席其次有十婢均寵有獻北珠冠四枚者托胄喜以遺四夫人十婢者皆慍曰等人耳我輩不堪戴耶托胄患之時趙師􅋷以列卿守臨安聞之亟出十萬緡市北珠冠十枚瞰托胄入朝獻之十婢者大喜分持以去托胄歸十婢咸來謝翼日都市行燈十婢皆頂珠冠而出觀者如堵歸語托胄曰我輩得趙太卿光價十倍王何吝酹一官耶托胄許之遂進師􅋷工部侍郎托胄又嘗與客飲南園師􅋷與焉過山莊竹籬茅舍曰此真田舍景但缺雞鳴犬吠耳少焉有犬嘷叢薄間視之乃師􅋷也托胄大悅益親幸之太學諸生有詩曰堪笑明庭鴛鷺甘作村莊犬雞一日冰山失勢湯燖鑊煮刀刲師􅋷字從善號墻東千里姪也托胄敗有贈之謔詞云侍郎自號東墻曽學犬吠村莊今日不須搖尾且尋土洞深藏􅋷即古擇字托胄用事十四年威行宫省權震宇內嘗鑿山為園下瞰宗廟出入宫闈無度孝宗疇昔思政之所偃然居之老宫人見之往往垂涕顔棫草制言其得聖之清易袚撰答詔以元聖褒之四方投書獻頌者謂伊霍旦奭不足以擬其勳有稱為我王者余嚞請加九錫趙師􅋷乞置平原郡王府官屬托胄皆偃然當之籍沒之晨放逐群婢願認父母者聽以身首服飾去市人利其物詐稱某妾父母者闐閧門巷或牽裙攬臂而往發其家藏斥賣之敗衣破絮亦各分包往往有金珠褁匿蓋諸婢將挈之以為逃計者慈明以四夫人偶坐之憾特命京兆杖一百而遣之流其嗣子於沙門島傅伯夀為江西憲韓托胄用事傅首以啓贄之曰澄清方效於范滂跋扈遽逢於梁冀人無恥矣咸依右相之山我則異於獨仰韓公之斗首明趨向願出陶鎔由是擢用至僉書樞密院事韓敗追三官奪執政賈師憲賜第葛嶺大小朝政就决館中宰執取充位而已當時為之語曰朝中無宰相湖上有平章嘗作半閒亭以停雲水道人每治事畢則入亭中打坐有佞人上糖多令詞大稱其意詞曰天上謫星班群真時往還駕青牛早度函關幻出蓬萊新院宇花外竹竹邉山軒冕倘來間人生閒最難算真閒不到人寰一半神仙先占取留一半與公閒賈師憲臥治湖山母猶在飬每嵗八月八日生辰四方善頌者以數千計悉俾翹館謄考以第甲乙一時𫝊誦為之紙貴陳惟善寶鼎詞云神鰲誰斷幾千年再乾坤初造算當日枰棋如許錯一著詎能重鑄談笑頃又十年生聚處豳風葵棗江如鏡楚氛餘幾猛聽甘泉捷報天衣細意從頭補爛山龍華蟲黼藻宫漏永千門魚鑰截斷紅塵飛不到六街九軌看千貂避路庭院五侯深鎖了一部太平六典一一周公手做赤舄繡裳消得道斑斕衣好儘龍眉鶴髮天上千秋難老甲子平頭才一過未說汾陽考看金盤露滴瑤池龍尾放班回早廖瑩中木蘭花慢云請諸君著眼來看我福華編記江上秋風鯨漦漲雪雁徼迷烟一時幾多人物只我公隻手護山川爭覩階符瑞象又扶紅日中天因懷下走奉􅐤鞬磨盾夜無眠知重開宇宙活人萬萬合夀千千鳬鷖太平世也要東還赴上是何年消得清時鍾鼓不妨平地神仙陸景思甘州歌云滿清平世界慶秋成看看斗米三錢論從來治國掄功第一無過豐年辦得閒民一飽餘事笑談間若問平戎策微妙難𫝊玉帝要留公住把西湖一曲分入林園有茶爐丹竈更有釣魚船覺秋風未曽吹著但砌蘭長倚北堂萱千千嵗上天將相平地神仙奚倬然齊天樂云金颷吹盡人間暑連朝㺯凉新雨萬寶功成無人解得秋入天機深處閒中自數幾心酌乾坤手斟霜露護了山河共看光景在銀兔而今神仙正好向清空覓箇冲淡襟宇帝念群生如何肻便從我乘風歸去彝猶洞府把月杼雲機教它兒女水逸山明此情天付與趙從橐陂塘柳云指庭前翠雲金雨霏霏香滿仙宇一清透徹渾無底秋水也無流處君試數此樣襟懷頓得乾坤住閒情半許聽萬物氤氲從來形色每向靜中覷琪花落相接西池夀母年年弦月時序荷衣菊佩尋常事分付兩山容與天證取此老平生可向青天語瑶巵緩舉要見我何心西湖萬頃來去自鷗鷺郭居安聲聲慢云捷書連晝甘灑通宵新來喜沁堯眉許大擔當人間佛力須彌年年八月八日長記他三月三時平生事想祗和天語不道人知一片閒心鶴外被乾坤繫足虹玉圍腰閶闔雲邉西風萬籟吹齊歸舟更歸何處是天教家在蘇堤千千嵗比周公多箇彩衣且侑以儷語云綵衣宰輔古無一品之曾參衮服湖山今有半閒之姬旦所謂三月三者蓋頌其庚申坪草湖之捷而歸舟乃舫齊名也賈大喜既而語客曰此詞固佳但失之太俳安得有著綵衣周公乎賈師憲庚申嵗自江上奏功而歸凡其家從行諸客皆推恩賞廖瑩中以籌幄之勞轉官之外復特賜黃金百兩廖遂用之鑄匜盤以為酒器且俾楊尚書平舟棟作古勒銘於器云皇帝御極之三十七年國有大功一相禹胼曰余瑩中與隨斾旃余手扶余後手牽曰公何之敵脅是穿奇勝草坪受降馬前公一何勇敵一何恐余訖濟南公飰余共推漢倒江洗兵不用彼徒彝矣公歸余從內金惟精上賞是重文昌子孫世寶是用誰其銘之史臣楊棟廖瑩中字羣玉號藥洲邵武人登科為賈平章似道之客嘗除大府丞知某州皆以在翹館不赴於咸淳間命善工翻刻淳化閣帖十卷絳帖二十卷皆逼真仍用北紙佳墨模榻與元本並行於時嘗撰福華編以紀鄂功雖誇張過實然其文古雅頗奇可喜似道褫職之夕與瑩中相對痛飲悲歌雨泣五鼓方罷歸舍不復寢命愛姬煎茶服氷腦數握姬覺之急奪救已無及矣持其妾而泣曰勿哭勿哭我從丞相二十年一日傾敗得善死足矣言畢而死瑩中嘗為園湖濱有世綵堂在勤堂芳菲徑紅紫莊桃花流水之曲緑䕃芳草之間賈師憲嘗刻奇奇集萃古人用兵以少勝多如赤壁淝水之類蓋自詫其援鄂之功也又開全唐詩話三帙及自選本朝十三朝國史如類說例為百卷名悅生堂隨抄其所援引書多目所未見者復命婺州碑工王用和翻定武蘭亭凡三年而後成至賞之以勇爵纖髮無遺恨幾與真本相亂又縮為小字刻之靈壁石號玉版蘭亭楊駙馬賜第清湖巨璫董宋臣領營建之事拓四㫄民居以廣之太學生方大猷之居最逼近璫意其必雄據未易與語一日具禮物往訪之方延入坐璫未敢有請方遽云今日內轄相訪得非以小屋近墻欲得之否璫愕不復對方徐曰內轄意謂某太學生必將梗化所以先䝉見及某便當首獻作倡就案即書契與之璫以成契奏知穆陵大喜視其直數倍酬之方作表謝有云普天之下莫非王土一毫以上悉出君恩上毛詩下東坡謝表並全句自是擢第登朝皆由此徑而梯焉科名第十太宗臨軒放㮄三五名以前皆出二郡符遷擢榮速陳堯叟王曽初中第即登朝領太史之職賜以朱韍爾後狀元登第者不十餘年皆望柄用每殿廷臚𫝊第一則公卿以下無不聳觀雖至尊亦注視焉自崇政殿出東華門𫝊呼甚寵觀者擁塞通衢人肩摩不可過錦韉繡轂角逐爭先至有登屋而下瞰者庶士傾羡歡動都邑洛陽人尹洙意氣橫躒好辨人也嘗曰狀元登第雖將兵數十萬恢復幽薊逐强蕃於窮漠凱歌勞還獻捷太廟其榮亦不可及也太宗時親試進士每以先進卷者賜第一人及第孫何與李庶幾同在場屋皆有時名庶幾文思敏速何苦思遲㑹言事者上言舉子輕薄為文不求義理惟以敏速相誇因言庶幾與舉子於餅肆中作賦以一餅熟成一韻者為勝太宗聞之大怒是嵗殿試庶幾最先進卷遽叱出之由是何為第一陳正敏遁齊閒覽梁灝八十二嵗雍熙二年狀元及第其謝啓云白首窮經少伏生之八嵗青雲得路多太公之二年後終祕書監卒年九十餘此語既著士大夫亦以為口實及以國史考之梁公字太素雍熙二年廷試甲科景德元年以翰林學士知開封府暴疾卒年四十二子固亦進士甲科至直史館卒年三十二史臣謂梁方當委遇中塗天謝明白如此遁齊之妄不待攻也真宗東封六月放梁固以下進士及第祀后土於汾隂放張師德以下進士及第固父狀元灝師德父狀元華魏野詩曰封禪汾隂連嵗㮄狀元俱是狀元兒淳化二年武當山道士鄧若拙出神至一處見二仙官議曰來春進士榜有宰相三人而一人名極低奈何一人曰高下不可易也獨科甲可易耳道士既覺與其徒言之明年唱名上適有宫中之喜因謂近臣曰第一甲多放幾人言止即止遂唱第一甲上意亦忽忽忘之至三百人方悟是年孫何榜三百五十三人而第一甲三百二人第二甲五十一人丁謂第四人王欽若第十一人張士遜第二百六十人後士遜入相致仕遊武當若拙弟子為公言之王沂公曽布衣時以所業質吕文穆公蒙正卷有早梅句曰雪中未問和羔事且向百花頭上開文穆公曰此生次第已安排作狀元宰相矣後皆盡然鄭毅夫獬自負時名國子監以第五人送意甚不平謝主司啓有李廣事業自謂無雙杜牧文章止得第五又云騏驥已老甘駑馬以先之巨鼇不靈因頑石之在上主司深銜之他日廷策主司復為考官必欲黜落以報其不遜有試業似獬者枉遭斥逐而發封則獬乃第一人及第嘉祐中士人劉幾好為怪險之語學者翕然效之遂成風俗歐陽公深惡之㑹公主文决意痛懲凡為斯譎者一切棄黜有一舉人論曰天地軋萬物茁聖人發公曰此必劉幾也戲續之曰秀才刺試官刷乃以朱筆塗抹之自首至尾謂之紅勒帛大批謬字榜之既而果幾也復數年公為御試考官而幾仍在廷公曰除惡務盡今必痛斥輕薄子以清文章之害有一士人論曰太上收精藏明於冕旒之下公曰吾已得劉幾矣既黜乃吳人蕭稷也是時試堯舜性之賦有云故得靜而延年獨髙五帝之夀動而有勇形為四罪之誅公大稱賞擢為第一及唱名乃劉輝有識之者此即劉幾也公愕然久之陳文忠公堯叟字唐夫端拱二年狀元及第文惠公堯佐字希元端拱二年進士康肅公堯咨字嘉謀咸平三年狀元及第三人皆秦國公省華之子也方希元登第之明年賜緋與父省華同日改祕書丞故唐夫有啓事云蟾桂驪珠連嵗有弟兄之美魚章象簡同時聨父子之榮樂平三洪皆忠宣公皓之子也兄弟連中詞科紹興十三年忠宣公以徽猷學士入翰苑紹興二十九年其仲子文安公遵始入西省隆興二年文惠公適繼之乾道二年文敏公邁又繼之相距二十二年故景盧有謝表云父子相承四上鑾坡之直弟兄在望三陪鳯閣之遊二事實為有宋儒林之盛世以登科為折桂此謂郤詵對策東堂自云桂林一枝也自唐以來用之溫庭筠詩云猶喜故人新折桂自憐羈客尚飄蓬其後以月中有桂故又謂之月桂而月中又言有蟾故又改桂為蟾以登科為登蟾宫用却詵事固已可笑而展轉相訛復爾然文士亦沿襲因之弗悟也燒尾之義或謂虎化為人唯尾不化須為焚除乃得成人或謂魚躍龍門唯尾不化必雷火燒之乃成為龍或又謂新羊入羣為諸羊所觸火燒其尾則定祥符中西蜀有二舉人同硯席既得舉貧甚干索旁郡以辦行將迫嵗始離鄉里懼引保後時窮日夜以行至劍門張惡子廟號英顯王其靈蠁震三川過者必禱焉二子過廟已昏晚大風雪苦寒不可夜行遂禱於神各占其得失且祈夢為信就廟廡下席地而寢入夜風雪轉甚忽見廟中燈燭如晝殽俎甚盛人物紛然往來俄呵導自逺而至聲振四山皆嶽瀆貴神也既就席賔主勸酬如世人二子大懼潛起伏暗處觀焉酒行忽一神曰帝命吾儕作來嵗狀元賦當議題一神曰以鑄鼎象物為題既而諸神分綴一韻且各刪潤雕改又商確久之遂畢朗然誦之曰當召作狀元者魂魄授之二子默喜私相謂曰此正為吾二人逮將曉神復如前傳呼而去二子素聰警盡記其賦亟寫於書帙後相與拜賜鼓舞而去在道笑語欣然唯恐富貴之逼身也志氣揚揚至御試二子坐東西廊題出果鑄鼎象物賦韻腳盡同東廊下者下筆思廟中所書懵然一字不能上口過西廊問之西廊者曰題驗矣我乃不能記子幸無𨼆東廊者曰我亦然正欲問子耳於是二子交相怒曰臨利害之際乃見平生且此神賜而獨私以自用天其福爾耶各憤怒不得意草草信筆而出及唱名二子皆𬒳黜狀元乃徐奭也既見印賣賦持比廟中所記無一字異二子歎息始悟凡得失皆有假手者遂皆罷筆入山不復事進取云天聖初宋元憲公在場屋日夢魁天下故事四方舉人集京師當入見而宋公姓名偶為衆人之首禮部奏舉人宋郊等公大惡之以為夢徴止此矣然其後卒為大魁紹興初張子韶亦夢魁天下比省試類榜坐位圖出其第一人則張九成也公殊怏怏及廷試唱名亦冠多士取士至仁宗時始有糊名考校之律雖號至公然尚有識認字畫之弊其後𡊮州人李彝賓上言請别加謄録因著為令仁宗賜進士及第詩云恩袍草色動仙籍桂香浮黃冕仲謝及第啓全用以為一聨云恩袍色動迷芳草之依依仙籍香浮惹春風之拂拂東坡戲之曰好作聞喜燕酸文𡊮州自國初時解額以十三人為率仁宗時查拱之郎中知郡日因秋試進士以黃花如散金為詩題蓋取文選詩青條若聚翠黃華如散金也學子多以秋景賦之惟六人不失詩意由是止解六人後遂為額無名子嘲之云誤認黃華作菊華張藝叟治平初赴春試時馮當世主文柄以公生明為賦題藝叟誤叠押明字試罷自分黜矣及榜出乃居第四藝叟每竊自念省場中鹵莾乃爾然未嘗以語人也當世後不相聞至元祐中藝叟以祕書監使契丹當世留守北門經由始修門生之敬置酒甚歡酒半當世謂藝叟曰京頃知舉時祕監賦中重叠用韻以論策佳因自為改去擢置優等尚記憶否藝叟方飲不覺杯覆懷中於是再三愧謝而去前輩成人之美有如此者張舜民字藝叟邠州人馮京字當世元祐中東坡知貢舉李方叔就試將鎖院坡緘封一簡令送方叔值方叔出其僕受簡置几上有頃章子厚二子曰持曰援者來取簡竊觀乃揚雄優於劉向論一篇二章驚喜攜之以去方叔歸求簡不得知為二章所竊悵惋不敢言已而果出此題二章皆模倣坡作方叔幾於閣筆及拆號坡意魁必方叔也乃章援第十名文意與魁相似乃章持坡失色二十名間一卷頗竒坡謂同列曰此必李方叔視之乃葛敏修時山谷亦預校文曰可賀內翰得人此乃僕宰太和時一學子相從者也而方叔竟下第坡出院聞其故大歎恨作詩送其歸所謂平生漫說古戰場過眼終迷日五色者是也其母歎曰蘇學士知貢舉而汝不成名復何望哉抑鬱而卒東坡帥武定諸館職餞於惠濟宫坡舉白浮歐陽叔弼陳伯修二校理常希古少尹曰三君但飲此酒酒釂當言所罰飲竟東坡曰三君為主司而失李方叔兹可罰也三君慚謝而已張文潛舍人在坐輒舉白浮東坡曰先生亦當飲此先生昔知舉而遺之與三君之罰均也舉坐大笑神宗理㑹得文字極喜陳師錫文嘗於太學中取其程文閲之每得則貯之錦􅌩中及殿試排卷子奏御神宗疑非師錫之文從頭閲之至中間見一卷子曰此必陳某之文也置之第三已而果然徐遹閩人博學尚氣纍舉不第久困場屋崇寧二年為特奏名魁時已老矣赴聞喜集賜宴於璚林苑歸騎過平康同年所簮花多為羣娼丐取惟遹花獨存因戲題一絶云白馬青衫老得官瓊林宴罷酒腸寬平康過盡無人問留得宫花醒後看後仕至朝官知廣德軍謝事而歸劉器之晚居南京馬巨濟涓作少尹巨濟廷試日器之作詳定官所取也而巨濟每見器之未嘗修門生之敬器之不平因以語客客以諷巨濟巨濟曰不然凡省闈解送則有主文故所取士得以稱門生殿試蓋天子自為座主豈可復稱門生於人幸以此謝劉公客以告器之器之歎服其說自是甚歡紹興間黃公度榜第三人陳修福州人解試四海想中興之美賦第五韻隔對曰葱嶺金堤不日復廣輪之土泰山玉牒何時清封禪之塵時諸郡試卷多經御覽髙宗親書此聨於幅紙黏之殿壁及唱名玉音云卿便是陳修吟誦此聫淒然出涕問卿年幾何對曰臣年七十三問卿有幾子對曰臣尚未娶乃詔出內人施氏嫁之年三十資奩甚厚時人戲為之語曰新人若問郎年幾五十年前二十三清漳楊汝南少年時以鄉貢試臨安待捷旅邸夜夢有人以油沃其首驚而悟榜既出輒不利如是者三竊怪之紹興乙丑復與計偕懼其復夢也揭曉之夕招同邸市酒殽明燭張博具劇飲以逹旦夜向闌四壁咸寂有僕卧西牖下呻吟如魘亟振而呼之醒乃具言初以執炙之勩視博方酣竊就枕忽夢有二人者扛油鼎自樓而登蒼皇若有所索顧見主之在坐也執而注之我怒而爭是以魘汝南聞之大慟曰二千里逺役今復已矣同邸亦相與歎詫為之罷博及明漫強之觀榜而其名儼然中焉第覺榜署間黯然有跡振衣拂之油漬其上蓋御史蒞書淡墨時夜中倉猝覆燈碗吏不敢以告耳宛陵吳勝之柔勝淳熙辛丑得雋於南宫將赴廷對去家數十里有地名朱唐舟行之所必經里之士夜夢有語之者曰吳勝之入都至朱唐而反矣起而告諸人時吳有親在垂白意其或尼於行也私憂之既而無他集英賜第乃在第三甲上曰朱端常聫之者曰唐廙始悟所夢里士怒曰吳勝之登科何與我事鬼乃侮我耶雷申錫江西人紹興中一舉中南省髙第廷試前三日客死都下捷音與訃踵至其妻日夜悲哭忽一夕夢申錫自言我宿生為大吏有功德於民故纍世為士大夫然嘗誤入死囚故地下罰我凡三世如意時暴死如此已兩世矣須更一世乃足以償宿譴耳其事可以為治獄者之戒鍾照之字彥照樂平人長於詞賦紹興己卯春夜讀書窗下聞有吟哦者曰霖作商巖雨薰來舜殿風誦至再啓戶視之無所見以為神物所告謹志於策至秋試以膏澤多豐年為詩題鍾押豐字韻用此二句入第五聫考官讀之擊節稱賞批其側曰形容得膏澤意好置之髙列此與唐錢起夜宿客舍聞有吟於庭中曰曲終人不見江上數峰青及就試日作湘靈鼓瑟詩用為末聫禮部侍郎李麟謂之絶唱遂擢第甚相類也程敦厚子山東坡表兄士元之孫也秦檜喜之為中舍時一日呼至第請入內閣俟之終日一室蕭然獨案上有紫綾褾一册書聖人以日星為紀賦末後有學士類貢進士秦暄呈文采富艷子山兀坐靜觀反覆成誦雖酒殽問勞沓至及晚竟不出乃退子山叵測也後數日差知貢舉宣押入院始大悟即以是命題其孫果首選翀峰蕭公登科嵗第一人本丞相忠定趙公故事設科以待草茅士凡預屬籍挂仕版者法當遜避唱名日遂升蕭為榜首故蕭對御吟有名傳玉陛星辰曉澤霈金枝雨露春之句其謝啓云預飛龍之選淮安論次以當先無汗馬之勞鄼侯何功而居上蓋用宗室及蕭氏事人多稱之趙忠定公汝愚初登第謁趙德莊德莊故餘干令因家焉故與忠定父兄遊語之曰謹毋以一魁置胸中又曰士大夫多被富貴誘壞又曰今日於上前得一二語獎諭明日於宰相處得一二語褒拂往往喪其所守者多矣忠定拱手曰謹受教前輩於後進如此金陵有僧嗜酒佯狂時言人禍福人謂之風和尚陳瑩中未第時問之云我作狀元否即應之曰無時可得瑩中復謂之曰我决不可得耶又應如初明年時彥御試第一人而瑩中第二方悟其無時可得之說畢漸為狀元趙諗第二初唱第而都人急於𫝊報以蠟刻印漸字所模㸃水不著墨𫝊者厲聲呼云狀元畢斬第二人趙諗識者皆云不祥而後諗以謀逆被誅則是畢斬趙諗也淳熙中王季海為相奏起汪玉山為大宗伯知貢舉且以書速其來玉山將就道有一布衣友平生極相得屢黜於禮部心甚念之乃以書約其胥㑹於富陽一蕭寺中與之對榻夜分密語之曰某此行或典貢舉當特相牢籠省試程文易義冒子中可用三古字以此為驗其人感喜玉山既知舉搜易卷中果有冒子內用三古字者遂置之前列及拆號非其友也竊怪之數日友來見玉山怒責之曰此必足下輕名重利售之他人何相負如此友指天自誓曰某以暴疾幾死不能就試何敢泄之於他人玉山終不釋然未幾以古字得者來謁玉山因問頭場冒子中用三古字何也其人沉吟久之對曰兹事頗怪先生既問不敢不以實對某之來就試也假宿於富陽某寺中與寺僧閒步廡下見室陬一棺塵埃漫漶僧曰此一官員女也殯於此十年矣杳無親戚來問因相與默然是夕夢一女子行廡下謂某曰官人赴省試頭場冒子中可用三古字必登髙科但幸勿忘使妾朽骨早得入土既覺甚怪之遂用其言果獲叨濫近已往寺中葬其女矣玉山驚歎王淮字季海金華人諡文定汪應辰字聖錫玉山兵家子李德逺發解本強則精神折衝賦一聫云虎在山而藜藿不採威令風行金鑄鼎而魑魅不逢奸邪影滅主司大喜乃全用汪玉溪作黃潛相麻制士人經禮部訟之時樊茂實為侍郎乃云此一聫當初汪內翰用時却未甚當今李解元用此賦中方工慶元癸酉秋試兩浙運司幹官臨州龔孟鍨為考官龔道出慈溪忽夢有人以杯酒飲之且作四字於掌中曉起便覺目視昏昏及入院發策第一道中誤以一祖十三宗為十四宗於是士子大閧徑排試官房闥悉遭箠辱至有負笈而逃者龔偶得一兵負去而免劉制使良貴親至院外撫諭遂權宜以策題第二道為首篇續撰其三久之始定於是好事者作隔聫云龔運翰出題踈脫以十三宗作十四宗劉制使下院調停用第二道為第一道明年秋度宗賔天於是十四宗之語遂驗吳人孫山滑稽有才赴舉時鄉人託以子偕往鄉人子失意山綴榜末先歸鄉人問其子得失山曰解名盡處是孫山賢郎更在孫山外三山蘇大璋顒之治易有聲戊午鄉舉夢為第十一人數為人言之既試將揭榜同經人訴於郡謂其自許之確必與試官有成約及拆號第十一名果易也帥攜此狀入院遍示考官謂設如所言諸公將何以自解不若以待𥙷首卷易之衆皆以為然既拆號則自待𥙷為正解者大璋也由正解而易為待𥙷之人者乃訴牒之人也次年蘇遂冠南宫莆田方翥試南宫第三場欲出納卷有物礙其足視之則一卷子止有前二篇其文亦通暢不解何以不終卷而棄於地也翥筆端俊甚以其緒餘足成之併攜出中門投之幕中一時不暇記其姓名翥既中第亦不復省問他年翥為館職偶論試闈異事間及之有同年在坐默不一語翼日具冠裳造方自叙本末言試日疾不能支吾扶曵而出試卷莫記所在已絶望矣一旦榜出乃在選中恍然疑姓名之偶同幸未嘗與人言亟入京物色之良是借真卷觀之儼然有續成者竟莫測所以今日乃知出君之筆君吾恩人也方笑謝而已黃致一初進科場方十三嵗出腐草為螢賦題未審有何事跡同場皆以其童年忽之漫告之曰螢則有若所謂聚螢讀書草則若所謂青青河畔草又若所謂君子之德風小人之德草皆可用也致一乃用此為一隔句曰昔年河畔嘗叨君子之風今日􅌩中復照聖人之典遂發解利無言年十七嵗在太學時稱俊才先季試讀司馬穰苴𫝊曰將在軍君命有所不受乃謂同舍曰某明日策中必用此句明日問神宗日録所同乃與昨日事殊無言乃對曰秉筆權猶將也雖君命有所不受遂作魁此皆一時英妙可喜故事無工拙顧在下筆何如耳進士科試文字學究科試墨義凡試一大經者兼一小經每假舉一句令寫上下文以通不通為去取應者多是齊魯河朔間人只能記誦未曉文義故當時有董五經黃二傳之稱正如和尚轉經相似有司入試日於進士則設案焚香垂簾講拜至學究則撤幕以防傳義其法極嚴有渴至飲研水而黔其口者𫝊以為笑歐陽公詩云焚香禮進士撤幕待明經其取厭薄如此荆公所以罷之宋稗類鈔卷五
