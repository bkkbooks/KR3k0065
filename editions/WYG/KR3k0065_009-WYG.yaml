body:
  text: 宋稗𩔖鈔卷九常熟潘永因編厚徳第六徐鼎臣歸朝後坐事出陜右柳開時為刺史開性豪不為加禮又事多不法朝廷命鄭文寶治罪文寶素師事鼎臣開詣鼎臣求解鼎臣曰彼昔為鉉弟子然時異事背安能必其心開再拜力懇鼎臣許之頃文寶至未見開即屏從者步趨入委巷詣鼎臣許覲省立庭下鼎臣徐出坐文寶拜竟升自西階通温凊復降拜鼎臣乃邀文寶上立談道舊且戒文寶以持節之重而鉉閒慢廢棄後勿復來文寶力詢其所欲鼎臣曰柳開甚相畏文寶黙出其事立散太祖與符彦卿有舊常推其善用兵知大名十餘年有告以謀叛者亟徙之鳯翔而以王晉公祐為代且委以宻訪其事戒曰得實吾當以趙普所居命汝面授㫖徑使上道祐到察知其妄數月無所聞驛召面問因力為辨曰臣請以百口保之太祖不樂徙祐知襄州彦卿竟亦無他祐後創居第於曹門外手植三槐於庭曰吾雖不為趙普後世子孫必有登三公者已而魏公果為太保祐字景叔大名莘人其明彦卿無罪且曰五代之君因猜忌殺無辜故享國不永願以為戒云文正公旦祐子也太平興國中趙普再入相盧多遜已罷為兵部尚書一日普召錢惟濬至中書謂曰朝廷知盧多遜求取元帥曹彬財物甚多今未亟行者為元帥也請具所遺之物列狀上之辭意重叠冀在必致惟濬歸而白之且曰侍中之言未必不是上旨彬曰主上英明大臣有過行即自行何假吾狀惟濬懼因與僚吏等又堅請曰逆侍中意恐致不測彬不聴乃取當時所與大臣財物之籍悉焚之既而召謂曰我受主上非常之恩是以入朝之日上所顧過者皆以金帛為之土物耳且非有他求為上故也況侍中而下皆有之何獨盧相豈有見人之將溺而又加石焉汝等少年勿為此按籍已焚禍福吾自當之惟濬等惕息而退後果知其事非太宗意太宗征遼直抵幽州圍其城俄一夕大風軍中虚驚南北兵皆潰散而諸將不知車駕所在惟節度使髙瓊隨駕上於倉卒中大怒諸将不赴行在翼日欲行軍法髙奏曰夜來出不意諸將若有知陛下所在豈陛下之福耶臣𫉬在左右亦偶然耳諸將不可罪責上悟皆釋之髙之門出太皇為天下母儀者以為有陰徳之助李文靖公沆為相專以方嚴重厚鎮服浮躁尤不樂人論説短長附已胡秘監旦謫商州久未召嘗與文靖同為知制誥聞其拜㕘政以啟賀之歴詆前居職罷去者云吕㕘政以無功為左丞郭㕘政以失酒為少監辛㕘政非材謝病優拜尚書陳㕘政新任失㫖退歸两省而譽文靖甚力意將以附之文靖愀然不樂命小吏封置篋曰吾豈真有優於是者亦適遭遇耳乘人之後而譏其非吾所不為況欲揚一已而短四人乎終為相旦不復用真廟時有卜者上封事言干宫禁上怒令捕之繫獄坐以法因籍其家得朝士徃還書尺上曰此人狂妄果臣僚與之遊盡可付御史獄案劾王文正公旦得之以歸翼日獨對曰臣看卜者家藏文字皆與之算命選日草本即無言及朝廷事臣託徃來亦曽令步推星辰其狀尚存因出以奏曰果行乞以臣此狀同問上曰卿意如何公曰臣不欲因以卜祝賤流累及朝臣上乃解公至政府即時焚去繼有大臣力言乞行欲因而擠之上令中使再取其狀公曰得㫖已寢焚去之陳龍學從易天禧中坐失舉送宰相冦凖素惡之遂除知吉州及凖貶道州從易為河南轉運使或謂曰可忘廬陵及凖至從易以故相禮敬之言者為慙西蜀亂後官府多不挈家以行張忠定公詠知益州單騎赴任是時一府官屬憚張威嚴莫敢蓄媵使張不欲絶人情遂自買一婢以侍巾櫛自是官屬稍稍置姬張在蜀四年被召還闕呼婢父母出資以嫁之仍處女也趙忠簡公鼎平政日使臣闗永堅亦西人趨承云久乃丐官淮上貧不能辦行欲質息女公憐之隨給所需永堅乞納女公却之請力不得已姑留之後永堅解秩還公一見語云爾女無恙堅謂宿逋未償公笑不答且助資送費囑求良配遂歸監平江梅里鎮宗室汝霖女言雖屢年曰侍丞相巾櫛及嫁尚處子也沈詹事持要坐與葉丞相論恢復貶筠州沈方售一妾年十七携與俱行處筠凡七年既歸呼妄父母以女歸之猶處子也時人以比張忠定公㑹稽潘方仲矩為安吉尉獻詩云昔年單騎向筠州覔得歌姬共逺游去日正宜供夜直歸來渾未識春愁禪人尚有香囊媿道士猶懐炭婦羞鐡石心腸延壽藥不風流處却風流夫人之所最難制者欲忠定忠簡賢者或能自勉沈詹事何人而所操若此張忠定帥蜀時擇良家處子十人執澣濯紉綴之役張始不肯用既而恐不便於後人遂留之執事偶悦一姬中夜心動而起繞屋而行但云張詠小人張詠小人後趙清獻繼之慕其風然已不敢親近置之他所有宴集則呼之一日偶喜其中一人酒罷置之外舍公先入宅曰俟來呼汝則入女不勝喜孔目官以下皆通名謁見求庇覆矣公入不出或覘之則周行室中連聲自叱其名曰趙扑不得無禮如是一時頃乃呼吏云適間女子可支錢五百千明日便令嫁人毛義夫云清獻公既留此女入而濯足且將復出天大寒熾炭命老兵持盆水至忽舉盆澆炭上烟火飛揚滿室公悟乃遣女去趙叔平槩與歐陽公同在館趙重厚寡言公意輕之公知制誥日韓范在中書以趙為不文除天章閣侍制趙不以屑意㑹公甥女淫亂事覺語連公時疾韓范者皆欲文致公罪云與甥亂上怒獄急羣臣莫敢言趙乃上言修以文章為近臣不可以閨房曖昧之事輕加汙衊臣與修踪跡素疎修之待臣亦薄所惜者朝廷大體耳書奏上不悦人皆為之懼趙澹然如平日趙康靖公槩厚徳長者口未嘗言人短歐公被謗宻申辨理至欲納平生誥勅以保之而文忠不知也中嵗嘗置黄黒二豆於几案間自旦數之每興一善念為一善事則投一黄豆於别器惡則投黒豆暮𤼵視之初黒多於黄漸久反之既謝事歸南京二念不興遂撤豆無可數云慶厯三年有李京者為小官呉鼎臣在侍從二人相與通家一日京薦其友人於鼎臣求聞達於朝廷鼎臣即繳其書奏之京坐貶官未行京妻謁鼎臣妻取别鼎臣妻慚不出京妻立􅆹事召鼎臣幹僕語之曰我來為往還之久欲求一别亦既為乃公嘗有數帖與吾夫囑私事恐汝家終以為疑索火焚之而去太尉陳堯咨為翰林學士日有惡馬不可馭蹄嚙傷人多矣一日其父諫議入廏不見是馬因詰圉人乃曰内翰賣之商人矣諫議遽謂翰林曰汝為貴臣左右尚不能制商人安能畜此是移禍於人也亟命取馬而歸其值蘇子美以饗客得罪言事者欲因子美以動一二大臣彈擊甚急宦者操文符捕人所逮皆一時名士都下為之紛駭左右無敢救解韓魏公從容言於仁宗曰舜欽一醉飽之過止可付有司治之何至如此帝悔見於色歐陽文忠公初以范希文事得罪於吕相文靖坐黨人逺貶三峽流落累年比吕公罷相公始被進擢其後為范公作神道碑言西事吕公擢用希文盛稱二人之賢能釋私憾而共力於國家希文子純仁大以為不然刻石時輒削去此一節云我父至死未嘗解仇公歎曰我亦得罪於吕丞相者惟其言公所以信於後世也吾嘗聞范公自言平生無怨惡於人兼其與吕公解仇書現在范集中豈有父子之性相逺如此公知潁州時吕公著為通判為人有賢行而深自晦黙時人未甚知公後還朝力薦之由是漸見進用又陳恭公執中素不喜公其知陳州時公自頴移南京過陳拒而不見後公還朝作學士陳為首相公遂不造其門已而陳出知亳州尋罷使相公當草制自謂必不得好詞及制出詞甚美至云杜門却掃善避權貴以逺嫌處事執心不為毁譽而更變陳大驚喜曰使與我相知深者不能道此此得我之實也手録一本寄門下客李師中曰吾恨不早識此人江鄰幾與歐陽公契分不疎晩著雜誌詆公尤力梅聖俞以為言而公終不問鄰幾既死公徃弔哭之慟且告其子曰先公埋石修當任其責矣故公叙銘鄰幾無一字貶之前輩云非特見公能容又使天下後世讀公之文知公與鄰幾始終如一且将不信其所詆矣龎相醇之籍判太原日司馬温公適倅并州一日被檄廵邊温公因便宜命諸將築堡於窮鄙而不以聞後為西𦍑所敗殺一副將朝廷深訝龎公擅興詰責不已龎公既素重温公畧弗自言久之遂落使相以觀文殿學士罷歸龎公益黙不一語温公用是得免莊敏固不可及然温公亦守闕三上書乞獨坐時人两賢之司門郎中王繕濰州人治三𫝊春秋中第再調沂州録事㕘軍時魯肅簡公宗道方為司户㕘軍家貧食口衆禄俸不給每貸於王猶不足則又懇王預貸俸錢魯御下嚴庫吏深怨之訴魯私貸緡錢并劾王王諭魯曰苐歸罪某君無承也魯曰某貧不給以干於公過實自某公何辜焉王曰某碌碌經生仕無他志茍仰俸入以養妻子得罪無害矧以官物貸人過不及免君年少有志節明爽方正實公輔器無以輕過輒累逺業并得罪何益卒明魯不知而獨受私貸之罪魯深愧謝不自容王處之裕如無慊恨色由是沉困二十餘年晚用薦者引對吏部狀其功過奏内有魯姓名時魯已㕘大政立侍殿中仁廟目魯曰豈卿耶魯遽稱謝且具陳其實仁廟歎曰長者也先是有私過者例改次等由是得不降等詔改大理寺丞仕至省郎累典名郡晚年田園豐腆子孫蕃衍壽八十九卒亦庇賢為善之報也魯肅簡公勁正不徇愛憎出於天性素與曹襄悼不協天聖中因議茶法曹力擠肅簡因得罪去賴上察其情寢前命止從罰俸獨三司使李諮奪職謫洪州及肅簡病有人宻報肅簡但云今日有佳事魯聞之顧壻張昷之曰此必曹利用去也試徃偵之果襄悼謫隨州肅簡曰得上殿乎張曰已差人押出門矣魯大驚曰諸公誤也利用何罪至此進退大臣豈宜如此之遽利用在樞宻院盡忠於朝廷但素不學問倔强不識好惡耳此外無大過也嗟惋久之遽覺氣塞急召醫視之曰此必有大不如意事動其氣脉已絶不可復治是夕薨李諮在洪州聞肅簡薨有詩曰空令抱恨歸泉壤不見崇山謫去時葢未知肅簡臨終之言也王武恭公自樞宻使謫知隨州孔道輔所論也道輔死或有告武恭害公者死矣武恭愀然出涕曰可惜朝廷又喪一直臣至和中范景仁為諫官趙閱道為御史以論陳恭公事有隙熙寧中王介甫執政恨景仁數毁之於上且曰陛下問趙抃即知其為人他日上以問閱道對曰忠臣上曰卿何由知其忠對曰嘉祐初仁宗違豫鎮首請立皇嗣以安社稷豈非忠乎既退介甫謂閱道曰公不與景仁有隙乎閱道曰不敢以私害公神宗時以陜西用兵失利内批出令斬一漕臣明日宰相蔡􅃀奏事上曰昨日批出斬某人已行否􅃀曰方欲奏知上曰此事何疑􅃀曰祖宗以來未嘗殺士人臣等不欲自陛下始上沉吟久之曰可以刺面配逺邊處門下侍郎章惇曰如此即不若殺之上曰何故曰士可殺不可辱上失色曰快意事更做不得一件惇曰如此快意事不做得也好韓許公億在中書日嘗見天下諸路有職司捃拾官吏小過輒顔色不懌曰今天下太平主上之心雖蟲魚草木皆欲得所夫仕者大則望為公卿次則望為侍從職司其下亦望京朝幕職奈何錮之於聖世東坡元祐間出帥錢塘視事初都商稅務押到匿稅人南劍州鄉貢進士吴味道以二巨卷作公名銜封至京師蘇侍郎宅公呼詢其卷中何物味道恐蹙而前曰味道今秋忝冐鄉薦鄉人集錢為赴省之贐以百千就置建陽紗得二百端因計道路所經塲務盡行抽稅則至都下不存其半竊計當今負天下重名而愛奨士𩔖惟内翰與侍郎耳縱有敗露必能情貸遂假先生名銜緘封而來不知先生已臨鎮此邦罪實難逃公熟視笑呼掌牋吏去其􅃇封換題新銜附至東京竹竿卷并手書子由書一紙付之曰先輩這囘將上天去也無妨明年味道及第來謝公甚喜為延欵數日而去曾魯公公亮布衣游京師舍於市側旁舍泣聲甚悲詰朝過而問之旁舍生意􅆭愴欲言而色媿公曰若第言之或遇仁人戚然動心免君於難不然繼以血無益也旁舍生顧視左右欷歔久之曰僕頃官於某以某事而用官錢若干吏督之且急視其家無以償之乃謀於妻以女鬻於商人得錢四十萬行與父母訣别此所以泣之悲也公曰商人轉徙不常且無義愛弛色衰則委為溝中矣吾士人孰若與我旁舍生跽曰不意君之厚貺小人如此且以女與君不𫉬一錢猶愈於商人之數然僕已書劵納值不可退公曰第償其值索其劵彼不可則訟於官旁舍生然之即與錢四十萬約曰後三日以其女來吾且登舟矣俟君於水門之外旁舍生如公教商人果不敢争携女如期以徃覓公之舟無有也詢旁舟之人則曰其舟已去三日矣其女後嫁為士人妻公墓石獨遺此事羅可沙陽碩儒也性度寛𢎞詞學贍麗嘗預鄉薦見黜於禮部遂不復進取疎放自適鄉人共以師禮事焉有竊刈其園中蔬者可適見因躡足伏草間避之以俟其去又有攘殺其雞者可乃携壺就之其人慚悚伏罪可執其手曰與子幸同閭里不能烹雞以待子我誠自愧乃設席呼其妻孥環坐盡醉而歸終不以語人人由是相誡無犯嘗作百韻雪詩有斜侵潘岳鬢横上馬良眉誠佳句也正獻吕公嘗薦常􅂜甫秩後差改節吕對程伯淳有悔薦之意伯淳曰願侍郎寧受人欺不可使好賢之心少替吕公著字晦叔贈申國公字正獻簡池劉光祖平生好施不顧有無來謁者皆周之一日晨坐暖閣夫人方梳沐有舊友來訪公令夫人入内夫人從窻隙中見士人拾所遺􅁫入懐未穏公將出夫人掣公衣袖止之少頃公乃出客退問其故夫人曰偶遺小􅁫彼方收拾未穏士貧得之可以少濟不欲遽恐之耳張知常在上庠日家以金千两附致於公同舍生因公之出發篋而取之學官集同舍檢索因得其金公不認曰非吾金也同舍生至夜袖以還公公知其貧以半遺之前輩謂公遺人以金人所能也倉卒得金而不認人所不能也王和甫嘗言蘇子瞻在黄州上數欲用之王禹玉輒曰軾詩有世間惟有蟄龍知之句陛下龍飛在天乃不敬反欲求蟄龍乎章子厚曰龍者非獨人君人臣皆可以言龍也上曰自古稱龍者多矣如荀氏八龍孔明卧龍豈人君耶及退子厚詰之曰相公乃欲覆人家族耶禹玉曰聞舒亶言爾子厚曰亶之唾亦可食乎姚雄初為將以女許一寨主之子無何寨主物故妻及子皆淪落後雄以邊帥赴闕奏事呼一媪浣衣喜其有士人家風問所從來媪曰昔良人守官邊寨有將姚其姓者許以女歸妾子今夫既喪無以自存子亦貨餅餌以自給姚曰汝尚記姚形容否媪曰流落困苦不復省記姚曰某即是也女自許歸之後不與他族日望壻來豈以父之存没為間耶媪泣下氣咽不語者久之因留媪呼其子至浣濯衣服之載還鎮而畢其禮雄字毅夫紹聖間人宣和用兵燕雲厚賦天下緡錢督責甚峻民無貧富皆被其害時海州楊六秀才之妻劉氏寡居謂二子曰國家用兵斂及下戸期㑹促迫刑法􅆭酷吾家積錢列屋坐視鄉黨之困與官吏之負罪而晏然不顧於心安乎遂請於官願以緡錢一百萬獻之以免下戸之輸於是一郡數縣之官吏得以逃責而下戸得免於流離死亡者皆劉氏之賜也趙忠簡鼎既以忤相檜讁吉陽軍門人故吏皆不敢通問廣帥張宗元時遣使渡海以醪米遺之檜令本軍月具存亡申省公知遣人呼其子汾至謂之曰檜必欲殺我我不死一家當誅惟我死爾曹無患乃不食而死汾䕶喪歸𦵏於衢州守臣章傑知中外士大夫平時與公有簡牘徃來至是又携酒㑹𦵏意可為竒貨乃遣官兵下縣同縣尉翁蒙之以搜私釀為名馳徃掩取復疑蒙之漏言潜戒左右伺察之䝉之書片紙走僕自後垣出宻以告汾趨令盡焚篋中書及弓刀之屬比官兵至一無所得公之家賴以紓禍傑丞相章惇諸孫雅怨趙公當國時奉詔治惇罪故欲敗趙氏快私忿且媚檜取矣官因翁漏言又亷知翁女弟適胡寅實當時草詔罪狀悸者益怒並誣翁以他罪劾之翁字子功崇安人楊誠齋夫人羅氏年七十餘每寒月􅀺明即起詣厨躬作粥一釡遍享奴婢然後使之服役其子東山啟曰天寒何自苦如此夫人曰奴婢亦人子也清晨寒冷須使其腹中畧有火氣乃堪服役耳東山曰夫人老且賤事何倒行而逆施乎夫人怒曰我自樂此不知寒也汝為此言必不能如吾矣東山守呉夫人嘗於郡圃種苧以為衣時年八十餘矣平居首飾止於銀衣止於紬絹生四子三女悉自乳曰饑人之子以哺吾子是誠何心哉誠齋東山清介絶俗固皆得之天資而内助母儀所禆亦已多矣舒之望江有富翁曰陳國瑞以鐵冶起家嘗為其母卜地青烏之徒輻集莫適其意有建寧王生者以術聞延之踰年始得吉於近村有張翁者業之國瑞治家未嘗問有無一以諉其子王生乃與其子計所以得地且曰陳氏卜𦵏環數百里莫不聞若以實言則壟斷取資未易厭也於是偽使其冶之𨽻如張翁家議圈豕若以禱者因眺其山木之美而譽之曰吾冶方乏炭此可以薪而得資翁許之乎張翁固弗疑也曰諾居數日遂以錢三萬成約國瑞始來相其山大喜築垣繕廬三閲月而大備遂𦵏之明年清明拜墓上王與子偕忽顧其子曰此山得之何人厥直凡幾子以實告又顧王曰使不以計勝則為直當幾何曰以時價商之雖亷猶三十萬也國瑞亟歸命治具鞚馬謁張翁而邀之至則館焉盛殽醖相與欵洽者幾月語不及他翁既久留將告歸復張正堂而醼之酒五行輦錢三百緡置之阼實縑於篚酌酒於斚而告之曰予𦵏予母人謂其直之朘請以此為翁壽翁錯愕曰吾他日伐山而薪不盈千焉三萬過矣此惡敢當國瑞曰不然𦵏而買地宜也詭以為冶則非也余子利一時之㣲以是紿翁人皆曰直實至是用敢以為請凡余之為將以媿吾子之見利忘義者翁卒辭曰當時固已許之實又過直子欲為君子老夫雖賤可强以非義之財耶固授之徃反撑拒詰旦拂衣去國瑞乃怒其子曰汝實為是必為我致之不得已宻召其子畀焉曰是猶翁也翁竟不知嗟夫世之人以市道相交一錢之争至於死而不悔聞二人之風亦可以少媿乎京師人有以金銀繒錦二篋託付於其相知數年而死彼人歸詣其子子曰我父平日未嘗一言及此且無劵契之驗殆長者之誤也其人曰我躬受之爾父豈待劵契與汝必預聞哉两人相推無敢當其人遂持以白於官時包孝肅公尹京究驗其實斷與其子昌化章氏昆弟二人皆未有子其兄先抱育族人一子未幾其妻得子其弟言兄既有子盍以所抱子與我兄告其妻妻猶在蓐曰不然未有子而抱之甫得子而棄之人其謂我何且新生那可保也弟請不已嫂曰不得已寧以吾新生者與之弟初不敢當嫂即與之已而二子皆成立長曰翃字景韓季曰詡字景虞翃之子樵槱詡之孫鑄鑑皆相繼登第遂為名族孝友睦婣之報如此婦人有識尤可尚也臨安府江夏陳宫幹家饒資財偶買一婢一日令揩浴若不用力然顧之則見其以一手拭淚陳疑之與妻言其事妻呼之不至尋至後閣見其婢猶垂淚未巳扣其故婢曰妾本宦家女妾父性暴居官時令一婢揩浴誤以指爪傷背重加之罪妾今乃𫉬此報言訖涕淚俱下妻還白之即擇偶嫁出維揚秦君昭妙年游京師其執友鄧載酒祖餞既而舁一殊色小鬟至前令拜秦因指之曰此吾為部主事某人所買妾也幸君便航可以附達秦弗敢諾鄧作色曰縱君自得之亦不過二百五十緡耳何峻辭乃爾秦勉强從命迤􅆔至臨清天漸暄夜多蟲蚋可畏内之帳中同寢直抵都下置舍館主婦處持書徃見主事問曰足下與家眷來耶曰無有主事意極不悦隨以小車取歸踰三日謁謝曰足下長者也昨已作答簡附便驛報吾鄧公且使知足下果能不負公付託之意矣遂相與痛飲盡歡而散夫栁下惠顔叔子之事千古以為美談今秦之於此女子也相從數千里飲食起居無適而不同又非造次顛沛者之比可謂厚徳君子矣後秦之子孫咸至顯宦宋稗𩔖鈔卷九
