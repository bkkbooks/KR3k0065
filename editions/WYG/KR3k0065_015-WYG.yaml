body:
  text: 宋稗𩔖鈔卷十五常熟潘永因編豪曠第二十五柳仲塗開赴舉時宿驛中夜聞婦人私哭聲婉而哀曉起詢之乃臨淮令之女令在任貪墨委一僕主獻納及代還為僕所持逼其女為室令度勢難免因許之女故哭柳徃見令詰之得其實怒曰願假此僕一日為子除害僕至柳室即令往市酒果鹽梅等物俟夜闌呼僕人叱問曰脅主人女為婦是汝耶即奮匕首殺而烹之翼日召令及同舍飲云共食衛肉飲散亟行令追謝問僕安在柳曰適共食者乃其肉也又張乖崖布衣時客長安旅次聞鄰家夜聚哭甚悲訊之其家無他故乖崖諸其主人力叩之主人遂以實告曰某在官不自慎常私用官錢為家僕所持欲强娶長女拒之則畏禍從之則失節匪𩔖約在朝夕所以舉家悲泣耳乖崖明日至門側俟其僕出即曰我白汝主假汝一至親舊家僕意尚遲遲强之而去出城使導馬前行至一懸崖間下馬數其罪僕倉皇未及對輒以刀揮墜崖中歸告其鄰曰僕已不復來矣速歸汝鄉後當謹於事也張齊賢為布衣時倜儻落魄有羣盜攻刼聚飲逆旅居人惶恐竄匿齊賢獨徑前揖之曰賤子貧困欲就一飽盜曰秀才肯自屈耶齊賢曰盜者非齷齪兒所為皆世之英雄耳乃取大杯滿酌而飲取豚肩𤓰分為數段㗖之勢若狼虎羣盜相視嗟嘆曰真宰相也他日宰制天下當念吾曹競以金帛相遺齊賢皆受不讓重負而返宋子京博學能文章天資醖藉好游宴自喜晚年知成都府帶唐書於本任刋修每宴罷盥潄畢開寢門燃二椽燭媵婢夾侍和墨伸紙逺近皆知為尚書修唐書宋子京修唐書嘗一日大雪添㡩幕燃椽燭左右熾炭两巨爐諸姬環侍方磨墨濡毫以澄心堂紙草一傳未成顧諸姬曰汝輩俱曽在人家頗見主人如此否皆曰無有其間一人來自宗子家子京曰汝太尉遇此天氣亦復如何對曰只是擁爐命歌舞間以雜劇引滿大醉而已如何比得内翰子京㸃頭曰也自不惡乃閣筆掩卷起索酒飲之幾達晨明日對賓客自言其事後每讌集必舉以為笑陶學士榖買得党太尉故妓取雪水烹團茶謂妓曰党家應不識此妓曰彼麄人安得有此但能銷金帳下淺酌低唱飲羊羔美酒耳陶媿其言党太尉進嘗食飽捫腹嘆曰我不負汝左右曰将軍固不負此腹此腹負将軍未嘗少出智慧也鄧州花蠟燭名著天下雖京師不能造相𫝊是寇萊公燭法公嘗知鄧州而早貴事豪侈每飲賓席常闔扉輟驂以留之尤好夜宴劇飲未嘗㸃油雖溷軒馬厩亦燒燭達旦每罷官去後人至官舍見厠溷間燭淚凝地徃徃成堆杜祁公為人清儉在官未嘗燃官燭油燈一炷熒熒然欲滅與客相對清談而已二公皆名臣而奢儉不同如此然祁公壽考終吉而萊公晚有南遷之禍遂殁不返雖其不幸亦可以為戒也韓魏公喜營造所臨之郡必有改作皆宏壯雄深稱其度量在大名於正寢後稍西為堂五楹其間洞然不為房屋號善養堂葢平日宴息之地許慎選學士放曠不拘小節多與親友結宴花圃中未嘗設帷幄坐具但使僕輩聚落花鋪於坐下曰吾自有花裀歐陽公在揚州作平山堂壯麗為淮南第一堂在髙岡下臨江南數百里真潤金陵三州𨼆𨼆可見公凌晨携客徃遊遣人走邵伯埭取荷花千餘朶分插百許盆與客相間遇酒行即遣一妓取一花傳客以其葉盡處則飲酒徃徃侵夜載月而歸滕章敏達道字元發布衣時嘗為范文正公客時范尹京滕少年頗不羈往往潜出從狹邪縱飲范公病之一夕至滕書室中明燭觀書以俟其至意將媿之滕夜分大醉而歸范公陽不視以觀其所為滕畧無懾懼長揖問曰公所讀何書公曰漢書復問漢髙祖何如人公逡巡而入滕達道慷慨豪邁不拘小節少嗜酒浮沉里市與鄭毅夫獬為忘形交議論風采照映一時嘗與毅夫及楊繪元素同試京師自必謂魁天下與二人約若其言不驗當厚致其罰已而鄭居榜首楊次之公在第三責所約之金答曰一人解一人㑹吾安得不居第三俱一笑而罷公平生不妄交游嘗作結客詩云結客結英豪休同兒女曹黄金装背鏃猛獸畫旂旄北闕芒星落中原王氣髙終令賀蘭賊不著赭黄袍其立志可見矣蘇子美舜欽豪放不羈好飲酒在外舅杜祁公家每夕讀書以一斗為率公深以為疑使子弟宻覘之聞子羙讀漢書張良傳至良與客狙撃秦皇帝誤中副車遽撫掌曰惜乎撃之不中遂滿引一大白又讀至良曰始臣起下邳與上會於留此天以授陛下又撫案曰君臣相遇其難如此復舉一大白公聞之大笑曰有如此下物一斗不足多也洪覺範至儋耳嘗謁姜唐佐唐佐不在見其母母迎笑食以檳榔覺範問母識蘇公否曰識之然無奈其好吟詩公嘗杖而來指西壁木榻自坐其上問曰秀才何徃我言入邨落未還有包燈心紙公以手展開書滿紙祝曰秀才歸當示之今尚在覺範索讀之醉墨欹傾曰張㫿陽生猶駡賊嚼齒穿齦顔平原死不忘君握拳透爪歌者𡊮綯宣政間供奉九重嘗言東坡公昔與客游金山適中秋夕天宇四􅂷一碧無際加江流􅐓湧月色如晝遂共登金山山頂之妙髙䑓命綯歌其水調歌頭曰明月幾時有把酒問青天歌罷公為起舞張于湖孝祥知京口王宣子代之時多景樓落成于湖為書樓扁公庫送銀三百星為潤筆于湖却之但需紅羅百匹於是大宴合樂酒酣于湖製詞命諸妓合唱甚歡因以紅羅遍賞之石曼卿謫海州日使人拾桃核數斛人跡不到處以彈弓種之不數年桃花遍山谷中建炎四年正月十五日上在章安鎮忽有二航為風所飄直犯御舟問之乃販柑客也上聞盡令買之分散禁衛令食瓤取其皮為椀是日元夕放燈乃命貯油於柑皮置燈其中隨潮放之時風息波平如數萬㸃紅星浮漾海面居人皆登金鼇峯望之陳同甫名亮號龍川始聞辛稼軒名訪之將至門過小橋三躍而馬三却同甫怒拔劍斬馬首推馬仆地徒步而進稼軒適倚樓望見之大驚遣人詢之則已及門遂定交稼軒帥淮時同甫與時落落家甚貧訪稼軒於治所相與談天下事酒酣稼軒言南北之利害南之可以并北者如此北之可以并南者如此且言錢塘非帝王居斷牛頭之山天下無援兵決西湖之水滿城皆魚鼈飲罷􅀫同甫於齋中同甫夜思稼軒沉重寡言醒必思其誤将殺我以滅口遂盜其駿馬而逃月餘致書稼軒假十萬緡以紓困稼軒如數與之放誕簡傲附第二十六馮惟一吉不持撿操雅好琵琶曲盡其妙教坊供奉號名手者亦莫能及父道戒令弗習吉性所好亦不能改能欲辱之因家宴令吉奏琵琶為壽賜以束帛吉置於肩左抱琵琶按膝再拜如伶官狀了無怍色馮惟一為太常頗不得意以杯酒自娱每朝士宴集雖不召亦常自至酒酣即彈琵琶彈罷賦詩詩成起舞時人愛其俊逸謂之三絶郭恕先放曠不羈尤不與俗人伍宋太宗聞其名召赴闕館於内侍省竇神興舍恕先長髯而美一日忽盡去之神興驚問其故曰聊以效顰郭從義鎮岐下延置山館岐有富人子喜畫日給醇酒待之甚厚久乃以情言且致匹素郭為畫小童持線車放風鳶引線數丈滿之富人子大怒遂與之絶又嘗時與小民販夫入市肆飲食曰吾所與游皆子𩔖也种明逸放至性嗜酒嘗種秫自釀每曰空山清寂聊以養和因號雲溪醉侯吕文穆公未第時薄游一縣胡大監旦方隨其父宰是邑遇吕甚薄客有譽吕曰吕君工於詩宜少加禮胡問詩之警句客舉一篇其卒章云桃盡寒燈夢不成胡笑曰乃是一渇睡漢爾吕聞之甚恨而去明年首中甲科使人寄聲語胡曰渇睡漢狀元及第矣胡答曰待我明年第二人及第輸君一籌既而次榜亦中首選李誠之師中為童子時論其父緯之功於朝久不報自詣漏舍以狀白韓魏公公曰君果讀書自當取科名不用紛紛論賞誠之云先人功罪未辨深恐先犬馬填溝壑無以見於地下故忍痛自言若欲求官稍識字第二人及第不難葢魏公於王堯臣榜第二人登科故也魏公徳量服一世於誠之此語終身不能平石曼卿磊落竒材知名當世氣貌雄偉飲酒過人有劉潜者亦忠義之士常與曼卿為酒敵聞京師沙行王氏新開酒樓遂徃造焉對飲終日不交一言王氏怪其所飲過多非常人之量稍獻肴果益取名酒奉之惟謹二人飲噉自若慠然不顧至夕殊無酒色相揖而去明日都下喧傳有二仙來飲久之乃知為劉石也石曼卿通判海州劉潜來訪之曼卿與劇飲中夜酒欲竭顧船中有醋斗餘乃傾入酒中併飲之至明日酒醋俱盡每與客痛飲露髮跣足著械而坐謂之囚飲飲於木杪謂之巢飲以藳束之引首出飲復就束謂之鱉飲其狂縱大率如此又夜不燒燭謂之鬼飲挽歌哭泣而飲謂之了飲飲一杯復登樹下再飲謂之鶴飲仁宗愛其才嘗對輔臣言欲其戒飲攝生聞之因不飲遂成疾而卒石曼卿以館職出判海州官滿日載私鹽两船至壽春託知州王子野貨之時禁網疎濶曼卿亦不為人所忌市中公然賣學士鹽石曼卿一日語僧秘演曰館俸清薄恨不得痛飲演曰非久當引一酒主人奉謁不數日引一納粟牛監簿來以宫醪十石為質列醖於庭演為傳刺曼卿愕然延之乃問中第何許生曰一别舍介繁䑓之側曼卿閒語演曰繁䑓寺閣虚爽可愛久不一登其生曰學士與大師果欲登閣當具酒􅉡迎侯曼卿因許之一日休沐約演同登演預戒生生陳具閣下器皿肴核冠於都下石演髙歌禠帶飲至落景曼卿醉喜曰此游可紀乃以盆漬墨濡巨筆題曰石延年曼卿同空門詩友老演登此生拜叩曰塵賤之人幸𫉬陪侍乞掛一名以光賤迹曼卿大醉握筆沉慮目演揚聲諷曰大武生捧研用事可也演以為言竟題曰牛某捧研永叔後以詩戲曰捧研得全牛張丞相天覺召自荆湖適劉跛子與客飲市橋聞車騎過甚都起觀之跛子挽丞相衣使且共飲因作詩曰遷客湖湘召赴京車蹄迎迓一何榮争如與子市橋飲且免人間寵辱驚一時賞其俊爽劉跛子青州人常拄一拐每嵗必一至洛陽看花館范家園春盡即還為人談劇有味范家子弟多狎之會子固性矜汰多所傲忽元豐中為中書舍人嘗白事都堂時章子厚為門下侍郎謂之曰向見舍人賀明堂禮成表真天下竒作子固一無辭讓但復問曰比班固典引如何章不答米元章守漣水地接靈壁畜石甚富一一品目加以美名入書室則終日不出時楊次公為察使知米好石廢事因徃亷焉至郡正色言曰朝廷以千里郡邑付公汲汲公務猶懼有闕那得終日㺯石都不省録爾後當録郡事不然按牘一上悔亦何及米徑前以手於左袖中取一石其狀嵌空玲瓏峯巒洞穴皆具色極清潤米舉石宛轉翻覆以示楊曰如此石安得不愛楊殊不顧迺納之左袖又出一石叠嶂層巒竒巧又勝又納之左袖最後出一石盡天劃神鏤之巧又顧楊曰如此石安得不愛楊忽曰非獨公愛我亦愛也即就米手攫得之徑登車去米芾嘗為書博士後遷禮部員外郎數遭白簡逐出一日以書抵蔡京訴其流落且言舉室百指行至陳留獨得一舟如許大遂畫一艇於行間京哂焉京子絛得是帖而藏之時彈文正謂其顛而米又歴言諸執政自謂久列中外並被大臣知遇舉主數十百皆用吏能為稱首一無有以顛蒙者世遂𫝊米老辨顛帖又嘗以書抵西府蔣頴叔云芾老矣先生勿恤浮議薦之曰襄陽米芾在蘇軾黄庭堅之間自負其才不入他黨今者老矣困於資格不幸一旦而死不得潤色皇猷黼黻王度臣僚實共惜之願聖天子去常格料理之先生以為何如米元章一日囘人書親舊有宻於窻隙窺其寫至芾再拜即放筆於案整衿端下两拜米元章洗手帖有云每得一書背訖入奩印以米氏秘玩書印閲書之法二案相比某濯手親取展以示客客拱而憑几案從容細閲某趨走於其前客曰展某展客曰卷某卷客據案甚尊某執事甚卑舍佚執卑者止不欲以手衣振拂之耳書史云洛陽有書畫友每約不借出各各相過賞閱是宋子房言其人屢與王詵尋購得書余嘗目為太尉書駔慎東美伯筠秋夜待月於錢塘江沙上露坐設大酒尊懐一盃對月獨飲意象傲逸吟嘯自若顧子敦適遇之亦懐一盃就其尊對酌伯筠不問子敦亦不與語酒盡各散去錢明逸每有宿戒必詰其謁者曰是喫酒是筵席筵席客無數一巡酒一味食也喫酒客不過三五人酒數斗瓷琖一隻青鹽幾粒席地而坐終飲不交一談恐多酒氣也不食恐分酒味也翼日問其旨否徃徃不知其志不在味也終日傾注無涓滴揮灑始可謂之酒客其視揖讓而飲如牢獄中張子通既貴其弟子游好吹薤露暑月衣犢鼻納凉門廡值里巷喪車過必徑趨羣挽中聲調清壯抑遏中節或至郊外通夕而歸喪家以子通故揖至賓位常享醉飽子通雖屢戒朂終不能止喻明仲妙於長笛持節數郡每出按行至山水佳處馬上臨風輒快作數㺯趙子固清放不羈好飲酒醉則以手濡髮歌古樂府自執紅牙以節曲宋稗𩔖鈔卷十五
