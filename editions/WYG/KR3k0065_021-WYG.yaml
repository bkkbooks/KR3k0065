body:
  text: 宋稗𩔖鈔卷二十一常熟潘永因編詞品第三十四孫何帥錢塘柳􅂄卿作望江潮詞贈之曰東南形勝三呉都㑹錢塘自古繁華烟桞畵橋風簾翠幙參差十萬人家雲𣗳繞堤沙怒濤卷霜雪天塹無涯市列珠璣户盈羅綺競豪奢重湖疊巘清佳有三秋桂子十里荷花羗管弄晴菱歌泛夜嬉嬉釣叟蓮娃千騎擁髙牙乗醉聴蕭鼓吟賞烟霞異日圖將好景歸去鳯池誇此詞流播金主亮聞歌欣然有慕於三秋桂子十里荷花遂起投鞭渡江之志近時謝處厚詩云誰把杭州曲子謳荷花十里桂三秋那知卉木無情物牽動長江萬里愁廬陵羅大經謂此詞雖牽動長江之愁然海陵因此役而見􅆷未足恨也至於荷艶桂香粧㸃湖山之清麗使士大夫流連於歌舞嬉逰之樂遂忘中原是則深可恨耳此論甚快柳􅂄卿蘓長公各以填詞名而二家不同當時士論各有所主東坡一日問一優人曰我詞何如柳學士優曰學士那比得相公坡驚曰如何優曰公詞湏用丈二將軍銅琵琶銕綽板唱相公大江東去柳學士却著十七十八女郎唱楊柳外曉風殘月坡為之撫掌優人之言便具褒彈胡致堂之論則日詞曲至於眉山蘓氏一洗綺羅香澤之態擺脫綢繆宛轉之度使人登高望逺舉首髙歌而逸懐浩氣超乎塵垢之外於是花間為皂𨽻而柳􅂄卿為輿臺矣然世必有知言者柳永字􅂄卿為舉子時多遊狹邪善為歌辭敎坊樂工每得新腔必求永為辭始行於世聲𫝊一時舉進士登科為睦州􅁺永初為上元辭有樂府兩籍神仙梨園四部絃筦之句𫝊禁中多稱之後因秋晩張樂使作醉蓬萊以獻語不稱㫖永亦善為他文詞而偶先以是得名始悔為己累後改名三變而終不能救嘗見一西夏歸明官云凡有井水飲處即能歌柳詞永終屯田員外郎死旅殯􅃳州僧寺王和甫為守時求其後不得乃為出錢葬之辛稼軒以詞名守南徐日每燕必命侍伎歌其所作尤得意賀新郎一詞自誦其警句曰我見青山多嫵媚青山見我應如是又曰不恨古人吾不見恨古人不見吾狂耳每至此輙拊髀自笑顧問坐客何如皆歎譽如出一口既而又作一永遇樂序北府事首章曰千古江山英雄無覔孫仲謀處又曰尋常巷陌人道寄奴曾住其寓感慨者則曰不堪回首佛狸祠下一片神鴉社鼓憑誰問亷頗老矣尚能飰否特置酒召數客使妓迭歌益自擊節徧問客必使摘其疵孫謝不可客或措一二辭不契其意又弗答然揮羽四視不止時相臺岳珂預坐年少勇於言率然對曰待制詞句脱去古今軫轍每見集中有解道此句真宰上訴天應嗔耳之序嘗以為其言不誣童子何知而敢有議然必欲如范文正以千金求嚴陵祠記一字之昜則晩進尚竊有疑也稼軒喜促膝亟使畢其説岳曰前篇豪視一世獨首尾二腔警語差相似新作㣲覺用事多耳於是大喜酌酒謂坐中曰夫君寔中余痼乃改其語日數十易屢月猶未竟其刻意如此辛㓜安摸魚兒晩春詞云更能消幾畨風雨匆匆春又歸去惜春長怕花開早何况落紅無數春且住見説道天涯芳草迷歸路怨春不語􅄸只有殷勤畵簷蛛網盡日惹飛絮長門事准擬佳期又悞蛾眉曽有人妒千金縱買相如賦脉脈此情誰訴君莫舞君不見玊環飛燕皆塵土閒愁最苦休去倚危欄斜陽正在烟柳斷腸處詞意殊怨斜陽烟柳之句其與未須愁日暮天際乍輕隂者異矣使在漢唐時寧不賈種豆種桃之禍㦲然聞夀皇見此詞頗不悦終不加以罪可謂盛徳也矣其題江西造口詞云鬱孤亭下清江水中間多少行人淚西北是長安可憐無數山青山􅃒不住畢竟東流去江晩正愁予山深聞鷓鴣葢南渡之初金人追隆祐太后御舟至造口不及而還㓜安自此起興聞鷓鴣之句謂恢復之事行不得也又北固亭懷古永遇樂詞寄丘宗卿云千古江山英雄無覓孫仲謀處舞榭歌臺風流總被雨打風吹去斜陽草𣗳尋常巷陌人道寄奴曽住想當年金戈鐵馬氣呑萬里如虎元嘉草草封狼居胥贏得倉黄北顧四十三年望中猶記􅇏火揚州路可堪回首佛狸寺下一片神鴉社鼓憑誰問亷頗老矣尚能飰否又自述賀新郎云甚矣吾衰矣悵平生交逰零落只今餘幾白髪空垂三千丈一笑人間萬事問何物能令公喜我見青山多嫵媚料青山見我應如是情與貎畧相似一尊搔首東牕裏想淵明停雲詩就此時風味江左沉酣求名者豈識濁醪妙理回首呌雲飛風起不恨古人吾不見恨古人不見吾狂耳知我者二三子自序云邑中園亭皆為賦此調一日獨坐停雲水色山聲競來相娯意溪山欲援例者遂作數語庻幾彷佛淵明思親友之意云數詞俱雋壯可喜朱文公云辛㓜安陳同甫若朝廷賞罰明此等人皆可用劉過字改之廬陵人能詩詞酒酣耳熱出語豪縱嘉泰癸酉寓中都時辛稼軒帥越聞其名遣介招之􅆘以事不及行作書歸輅者因傚辛體沁園春一詞併緘徃下筆便逼真其詞曰斗酒彘肩醉渡浙江豈不快哉被香山居士約林和靖與蘓公等駕勒吾回坡謂西湖正如西子濃抹淡粧臨照臺諸人者都掉頭不顧只管𫝊杯白云天竺去來圗畵裏崢嶸樓觀開看縱横一澗東西水遶兩山南北髙下雲堆逋曰不然暗香疎影只可孤山先探梅蓬萊閣訪稼軒未晩且此徘徊辛得之大喜竟邀之去館燕彌月賙贈千緡改之竟蕩於酒不問也嘗以此詞語岳侍郎倦翁掀髯有得色岳曰詞句固佳但恨無刀圭藥療君白日見鬼症耳一座為之嗢噱改之尤好作沁園春黄子由帥蜀中閤乃胡給事晉臣之女過雪堂行書赤壁二賦於壁間改之從後題一闋云按轡徐驅兒童聚觀神仙畵圖正芹塘雨過泥香路軟金蓮自折小小籃輿傍桞題詩穿花覓句嗅蕋攀條得自如經行處有蒼松夾道不用𫝊呼清泉怪石盤紆信風景江淮各異殊想東坡賦就紗籠素壁西山句好簾捲晴珠白玉堂深黄金印大無此文君載後車揮毫處㸔淋漓雪壁真草行書後黄知為劉所作厚有饋貺夀皇鋭意親征大閲禁旅軍容肅甚郭杲為殿巖從駕還内都人喜見一時之盛改之賦一詞與郭云玉𢃄猩袍遥望翠華馬去似龍擁千官鱗集貂蟬爭出􅆛貅不斷萬騎雲從細柳營開團花袍窄人指汾陽郭令公山西將􅄸韜鈐有種五世元戎旌旗蔽滿寒空魚陣整從容虎帳中想刀明似雪縱横按矟箭飛如雨霹􅋬鳴弓威撼邉城氣呑漠北􅃤淡塵沙吹落日中興事㸔君王神武駕馭英雄郭餉劉亦踰數十萬錢又寄孫季和云問信竹湖孫自號竹如之何如何不歸道呉山越水無非佳處來無定止去亦何為莫是秋來未能忘耳心與孤雲相伴飛闗情處向南山寄傲北澗題詩人生了事成癡􅄸世上終無真是非㸔雲臺􅋓兀無君子者雪堂零落有羙人兮踈雨梧桐㣲雲河漢鍾鼎山林無限悲山陽縣問昌黎負汝汝負昌黎又嘗賦賀新郎與一老娼云老去相如倦向文君説似而今如何消遣衣袂京塵曾染處空有香紅尚軟料彼此魂消腸斷一枕新凉眠客舍聴梧桐疎雨秋風戰燈暈冷記重見樓低不放珠簾捲晩装殘翠蛾狼籍涙痕留臉人道愁來須殜酒無柰愁多酒淺但託意焦桐紈扇莫鼓琵琶江上曲怕荻花楓葉俱凄怨雲萬叠寸心逺劉改之赴試别妾天僊子云别酒醺醺渾易醉回過頭來三十里馬兒不住去如飛行一憇牽一憇斷送殺人山共水是則是功名終可喜不道恩情抛得未梅邨雪店酒旗斜去也是住也是煩惱自家煩惱你曹東􅅕赴試歩行戲作紅牕逈慰其足云春闈期近也望帝鄉迢迢猶在天際懊恨這一雙脚底一日厮趕上五六十里争氣扶持我上轉得官歸時賞你穿對朝靴安排你在轎兒裡更𨕖對宫様鞋兒夜睡間伴你東􅅕名幽字西士徐淵子有詩云俸餘擬辦買山錢却買端州古研磚依舊被渠驅使在買山之事竟何年徐除直院劉改之賀啟云以載鶴之船載書入覲之清標如此以買山之錢買研平生之雅好可知淵子復有夜泊廬山詞云風𦂳浪花生蛟吼鼉鳴家人睡著怕人驚只有一翁捫蝨坐依約三更雪又打殘燈欲暗還明有誰知我此時情獨對梅花傾一醆却又詩成樞相張公昪字杲卿陽翟人大中祥符八年蔡齊下及第仕亦晩逹作樞相退歸陽翟生計不豐短􅏩輕縧翛然自􅆘乃結菴於嵩陽紫虚谷每晨起焚香讀華嚴菴中無長物荻簾紙帳布被草􅂂而已年八十餘自撰滿江紅一首聞者莫不慕其曠逹詞曰無利無名無榮無辱無煩無惱夜燈前獨歌獨酌獨吟獨笑况值群山初雪滿又明月交光好假饒百歳擬如何從他老知富貴誰能保知功業何時了􅄸簞瓢金玉所爭多少一瞬光隂何足道但思行樂常不早待春來擕酒殢東風眠芳草東坡滿庭芳詞曰蝸角虛名蠅頭㣲利􅄸來著甚干忙事皆前定誰弱又誰強且趁閒身未老儘放我些子疎狂百年裡渾教是醉三萬六千塲思量能幾許憂愁風雨一半相妨又何湏抵死校短論長幸對清風朗月苔茵滿雲幕高張江南好千鍾羙酒一曲滿庭芳此二詞使競進之徒讀之可以解體恬淡之士歌之可以娛生張康節公居江南有詞云一𢃄江山如畵風物向秋瀟灑水浸碧天何處斷翠色冷光相射蓼岸荻花中𨼆映竹籬茅舍天際客帆髙掛門外酒旗低迓多少六朝興廢事盡入漁樵閒話悵望倚危欄紅日無言西下公晩年鰥居有侍妾晏康奉公甚謹未嘗少違意公薨妾亦相繼以死錢塘周羙成邦彦踈雋少檢不為州里推重而博渉百家元豐初逰京師獻汴都賦神宗竒之累官徽猷閣侍制提舉能自度曲製樂府長短句詞韻清蔚名其居曰顧曲堂其所製意難忘云衣染鶯黄愛停歌駐拍勸酒持觴低鬟蟬影動私語口脂香簷露滴竹風凉判劇飲淋浪夜漸深籠燈就月子細端詳知音見說無􅀟解移宫換羽未怕周郎長顰知有恨貪耍不成粧些個事惱人腸試說與何妨又恐伊尋消問息瘦减容光其詞格大率𩔖此周美成晩歸錢塘夢中得瑞鶴仙詞一闋云悄郊原帶郭行路永客去車塵漠漠斜陽映山落歛餘紅猶戀孤城欄角凌波歩弱過短亭何用素約有流鶯勸我重解繡鞍緩引春酌不記歸時早暮上馬誰扶醒眠朱閣驚颷動幕猶殘醉遶紅藥嘆西園已是花深無地東風何事又惡任流光過却歸來洞天自樂未幾方臘亂自桐廬入杭時羙成方晏客倉皇出奔趨於西湖墳菴􅆘際殘冬落日在山忽逢故人之妾奔逃而來乃與小飲於道旁旗亭聞鶯聲於木杪少焉分背抵菴尚有餘醺困卧小閣之上恍如詞中所云逾月入城故居皆遭焚毁矣後得請提舉洞霄宫而終老焉張志和漁父詞曰青篛笠緑蓑衣斜風細雨不須歸顧况漁父詞曰新婦磯邉月明女兒浦口潮平黄魯直取二詞合為浣溪沙曰新婦磯邉眉黛愁女兒浦口眼波秋驚魚錯認月沉鈎青篛笠前無限事緑蓑衣底一時休斜陽細雨轉船頭東坡云魯直此詞清新婉麗其最得意處以山光水色賛玉肌花貎真得漁父家風然纔出新婦磯便入女兒浦此漁父無乃太濶浪乎政和中中貴人使越州得詞於古碑隂録進御命大晟府填腔因詞中語賜名魚游春水云秦樓東風裏燕子還來尋舊壘餘寒猶褪紅日薄侵羅綺嫩草方抽碧玉茵媚柳輕窣黄金縷鶯囀上林魚游春水㡬回欄干遍倚又是一畨新桃李佳人應怪歸遲梅粧淚洗鳯簫聲絶無孤鴈望斷清波沉􅀟鯉雲山萬重寸心千里王逐客送鮑浩然逰浙東作長短句云水是眼波横山是眉峯聚欲問行人去那邉眉眼盈盈處才始送春歸又送君歸去若到江東趕上春千萬留春住日月無根天不老浮生總􅀍消磨了陌上紅塵常􅅰􅅰昏復曉一塲大夢誰先覺洛水東流山四遶路傍幾個新華表見說在身官職好争信道冷烟寒雨埋荒草王輔道侍郎漁家傲詞歌之使人有遺世之意王在徽宗朝常奏天神降其家徽宗欲出幸左右奏以恐有不測宜有以審其真偽既中使至其家無有也因坐誣以死世謂輔道乃曉人不應爾葢輔道韶之子韶熈河用兵其濫殺者多故􅁈以致其禍耳又有浣溪沙兩詞一云扇影輕揺一線香斜紅匀過晩來粧嬌多無事做凄凉借問誰家春昜老幾時能彀夜何長舊歡新恨總思量二云珠箔臨簷一向垂繡屏􅃒枕四邉移春歸人静日遲遲舊事只將雲入夢新歡重借月為期晩來花動隔墻枝又玉樓春兩詞一云秋歸思入江南逺簾幙低垂閑不捲玉珂聲斷曉屏空好夢驚回還起嬾風輕只覺香烟短隂重不知天色晩隔窗人語趂朝歸旋整宿粧匀睡眼二云繡屏曉夢鴛鴦被可惜夜來歡記取幾聲低語却曽聞一叚新愁㸔怎覷繁紅流盡胭脂雨春被楊花勾引去多情只有舊時香衣上經年留得住紹興戊辰信州鉛山驛壁有題玉樓春不著姓氏云東風楊桞闗前路畢竟雕鞍留不住柔情勝似嶺頭雲别淚多如花上露青樓畫幕無重數聴得樓邉車馬去若將眉黛染情深直到丹青難畵處金沙潘武子文虎少有俊才善賦嘗作四禽言詞云交交桑扈交交桑扈桑滿墻隂三月暮去年􅁞時處深閨今年蠶時渉逺路路傍忽聞人採桑恨不相與携傾筐一身不蠶甘凍死祗憶兒女無衣裳不如歸去不如歸去家在浙江東畔住離家一程逺一程飲食不同言語異今之眷聚皆㓂讎開口強笑心懷憂家鄊欲歸歸未得不如狐死猶首丘泥滑滑泥滑滑脫了繡鞋脫羅襪前營上馬忙起行後隊搭駝疾催𤼵行來數里日已低北望燕京在天末朝來𫝊令更可怪落後行遲都斫殺鵓鴣鴣鵓鴣鴣帳房徧野常前呼阿姊含羞對阿妹大嫂揮涕㸔小姑一家不幸俱被擄猶幸同處為妻孥願言相憐莫相妒這箇不是親丈夫梁棟隆吉亦作四禽言云不如歸去錦官宫殿迷烟𣗳天津橋邉呌一聲呌破中原無住處不如歸去脱却布袴貧家能有幾尺布寒機織盡無得裁可人不來亷叔度脱却布袴提葫蘆近來酒賤頻頻沽衆人皆醉我亦醉湘江喚起醒三閭提葫蘆行不得也哥哥湖南湖北春意多九嶷山前呌虞舜柰此乾坤無路何行不得也哥哥汪彦章在京師嘗作小闋云新月涓涓夜寒江静山㴠斗起來搔首梅影横牕瘦好箇霜天閒却傳盃手君知否亂鴉啼後歸興濃如酒紹興中彦章知徽州仍令席間聲之坐客有挾怨者亟納檜相指為新製以譏檜檜怒諷言者遷之於永陸放翁在蜀日曽有所盻嘗賦詩云碧玉當年未破𤓰學成歌舞入侯家如今顦顇蓬􅆤底飛上青天妒落花出蜀後每懷舊逰多見之題詠有云金鞭珠彈憶佳逰萬里橋西罨畫樓夢倩曉風吹不㫁書慿歸鴈寄無由鏡中顔髪今如此席上賔朋好在否篋有吳牋三百箇擬將細字寫春愁又云裘馬清狂錦水濵最繁華地作閒人金壺投箭銷長日翠䄂𫝊杯領好春幽鳥語隨歌處拍落花鋪作舞時茵悠然自􅆘君知否身與浮名孰是親仍以前詩櫽括作風入松云十年裘馬錦江濵酒𨼆紅塵黄金選勝鶯花海倚踈狂驅使青春吹笛魚龍盡出題詩風月俱新自憐華髪滿紗巾猶是官身鳯樓曽記當年語問浮名何似身親欲寫吳箋説與這回真箇閒人蜀娼𩔖能文葢薛濤遺風也放翁有客自蜀挾一妓歸蓄之别室率數日一徃偶以病少踈妓頗疑之客作詞自解妓即韻答之云説盟説誓説情説意動便春愁滿紙多應念得脱空經是那箇先生教底不茶不飰不言不語一味供他憔悴相思已是不曽閒又那得工夫呪你或謗翁嘗挾蜀尼以歸即此妓也放翁少時嘗逰禹跡寺南之沈園為􅁫頭鳯一詞題壁間以寓意云紅酥手黄藤酒滿城春色宫墻柳東風惡歡情薄一懷愁緒幾年離索錯錯錯春如舊人空瘦淚痕紅挹鮫鮹透桃花落閒池閣山盟猶在錦書難託莫莫莫陸娶唐氏閎之女於其母夫人為姑姪伉儷相得而弗𫉬於姑既出而未忍絶之則為之别館時時徃焉其姑知而掩之雖先知挈去然事不得𨼆竟絶之亦人倫之大變也唐後改􅆘同郡宗子士程嘗以春日出逰相遇於禹跡寺南之沈氏園唐以語趙遣致酒肴陸悵然乆之為賦此詞其後尚有律詩絶句數首光堯一日御舟經斷橋橋旁有小酒肆頗雅潔中設素屏風書風入松一詞上駐目稱賞乆之宣問何人所作乃太學生俞國寳醉筆也其詞云一春長費買花錢日日醉湖邉玉騘慣識西湖路驕嘶過沽酒樓前紅杏香中歌舞緑楊影裡鞦韆暖風十里麗人天花壓􅁂雲偏畫船載取春歸去餘情付湖水湖烟明日重擕殘酒來尋陌上花鈿上笑曰此詞甚好但末句未免儒酸因為改云明日重扶殘醉即日命解褐云文及翁登第後期集游西湖一同年戲之曰西蜀有此景否及翁即席賦賀新郎云一勺西湖水渡江来百年酣醉回首洛陽花世界烟渺黍離之地更不復新亭墮淚簇樂紅粧揺畵舫問中流撃楫何人是千古恨幾時洗余生自負澄清志更有誰磻溪未遇傅巖未起國事如今誰倚仗衣𢃄一江而已便都道江神堪恃借問孤山林處士但掉頭笑指梅花蕋天下事可知矣三山蕭軫登第榜下娶再壻之婦同舍張任國以柳梢青詞戯之曰掛起招牌一聲喝采舊店新開熟事孩兒家懷老子畢竟招財當初合下安排又不豪門買獃自古道正身替代見任􅄈差一人娶妻無元紅𡊮可潛贈之如夢令云今夜盛排筵宴准擬尋芳一遍春去已多時問甚紅深紅淺不見不見還你一方白絹四明倪君奭臨終賦夜行船詞云年少疎狂今已老筵席散雜劇打了生向空來死從空去有何喜有何煩惱説與無常二鬼道福亦不作禍亦不造地獄閻王天堂玉帝㸔你去那裡押到有賦長相思詞云晴也行雨也行雨也行時不似晴天晴終快人名也成利也成利也成時不似名名成天下驚有心為名名亦利也可警矣一户曹之妻與太守有私府學一士子知其事戸曹任滿將去守招其夫婦飲士子作祝英臺近付妓令歌之其詞云抱琵琶臨别語把酒淚如洗似恁春時倉卒去何意牡丹恰則開園荼䕷厮勾便下得一帆千里好無謂復道明年行呵如何戀得你一葉船児休要更沉醉後梅子青時楊花飛絮側耳聴喜鵲哩守與此婦俱墮淚其夫不悟雲間酒淡有作行香子云浙右華亭物價亷平一道㑹買過三斤打開瓶後滑辣光馨敎君霎時飲霎時醉霎時醒聴得淵明説與劉伶這一瓶約迭三斤君還不信把秤來秤恰有一斤酒一斤水一斤瓶今世樂府傳沁園春詞按後漢書竇憲女弟立為皇后憲恃宫掖聲勢遂以賤直奪沁水公主園然則沁園春者公主之園也唐人𩔖用之豐城南禪寺壁間有秋社㸃絳唇云燕子依依曉來總為誰歸去淡雲生處已覺賔鴻度淺笑深顰便靣機中素乗鸞女瑣􅆤瓊女㑹有明年暑蔡州𤓰陂舖有用箆刀刻青泥為浣溪紗詞云剪碎香羅浥淚痕鷓鴣聲斷不堪聞馬嘶人去近黄昏整整斜斜楊柳陌疎疎宻宻杏花村一畨風月更消魂儷語第三十五宋人制誥章表四六駢儷多用經書句謂之天生自然對如天惟顯思民亦勞止惟女一徳於今三年有能奮庸爰立作相行此四徳弼予一人文王之徳之純周公之才之羙皇極錫五福大臣慮四方閒暇而明政刑㑹通以行典禮禮樂自天子出􅇼豆則有司存於緝熈殫厥心念終始典於學欣欣然有喜色蕩蕩乎無能名睦族以和萬邦明倫以察庶物率百官若帝之初於萬年受天之祐發號施令㒺不臧陳善閉邪謂之敬知㣲知彰不俟終日有嚴有翼以奏膚功上帝臨女無貳無虞三事就公不留不處聞爼豆未學軍旅之事聴鼔鼙則思將帥之臣兵於五材誰能去之臣無二心天之制也亶聰明而有作不作聰明由仁義以安行非行仁義玉帛萬國干舞已格於七旬簫韶九成肉味遽忘於三月夙夜浚明入則宣其三徳文武是憲出則柔此萬邦五百里采五百里衛外包有截之區八千嵗春八千嵗秋上祝無疆之夀君子有酒多且㫖得盡羣心化國之日舒以長對揚萬夀黛耜載耕於帝籍廣十千維耦之疆青圭徃袚於髙禖兆則百斯男之慶皆膾炙人口對偶之絶佳者曰九州四海悉主悉臣億載萬年為父為母平生能著㡬䩫􅄚長曰惟消一局棋有文事有武􅊀與神為謀無智名無勇功惟聖時若數㸃雨聲風約在一枝花影月移來柳揺臺榭東風軟花壓欄干春晝長勸君更盡一杯酒與爾同消萬古愁梨園弟子白髪新江州司馬青衫濕臨邛道士鴻都客錦里先生烏角巾屋簷下天燈樓板上地舖丈夫不學曹孟徳生子當如孫仲謀人言盧杞是奸邪我覺魏徵更嫵媚三代夏商周四詩風雅頌二十四考中書令八千萬户冠軍侯無可柰何花落去似曽相識燕歸來天若有情天亦老月如無恨月長圓公獨未知其趣耳臣今時復一中之天之未䘮斯文也我獨何為不豫哉風定花猶落鳥鳴山更幽槐花黄舉子忙促織鳴懶媍驚真宗聖性好學尤愛文士即位之初王禹偁為知制誥坐事責守黄州謝上表有宣室鬼神之問豈望生還茂陵封禪之書唯期身後之語上覽表驚其詞之悲方欲内徙㑹黄州有二虎鬬而食其一占者以為咎在守土之臣遽有㫖移守蘄州以避其變勅下而禹偁死矣年四十八遺表云豈知逰岱之魂遂恊生桑之夢元之精四六有同時與之在翰林而大拜者以啓賀之曰三神山上曾陪鶴駕之逰六學士中獨有漁翁之嘆白樂天有詩云元和六學士五相一漁翁故也楊文公為執政所忌母病謁告不俟朝㫖徑歸韓城與弟倚居踰年不調公有啓謝朝中親友曰介推母子願歸綿上之田伯􅂜弟兄甘受首陽之餓後除知汝州而希旨言事者攻撃不已公又啓曰已擠溝壑猶下石而弗休方困蒺藜尚闗弓而相射范文正公㓜孤隨母􅆘朱氏因冐朱姓名說後復本姓以啓謝時宰曰志在投秦入境遂稱於張禄名非覇越乘舟乃效於陶朱以范睢范蠡亦嘗改姓名故也又偽蜀翰林學士范禹偁亦嘗冐張姓謝啓云昔年上第誤摽張禄之名今曰故園復作范睢之裔然不若文正之精切文本心典淮郡蕭條過甚謝賈相啓有云人家如破寺十室九空太守若頭陀兩粥一飰為帥守而踵父祖嘗所居位自昔衣冠以為盛事李文饒獻替記稱開成二年自淛西觀察授淮西節度國朝二百年未嘗有自潤遷揚者况兩地皆是舊封倍懷榮感葢其父亦並領揚潤故也本朝如此比者亦時有之多見於謝上表啓歐陽叔弼知蔡州其父文忠公之舊治也其謝宰執啓曰惟近輔之名邦實先人之徃跡高城不改自疑華表之歸老吏幾希尚守朱門之舊追懷今曩倍劇悲歡靖康中翟公㢲自翰苑出守㑹稽亦其父思之舊治也其謝表曰惟昔先臣再臨東粤豈期暮齒乃踵前修朱邑世祠猶有蒸嘗之奉石侯家法自憐孝謹之衰敢不慰問􅂄年覽觀謡俗無忘遺愛之厚永念教忠之餘皆謂是也滕逹道未遇時讀書僧舍盗其犬烹之僧聞於郡守守素聞其能賦因諭之曰汝能作盗犬賦則釋之即口占曰僧既無狀犬誠可偷輟梵宫之夜吠充絳帳之晨羞摶飯引來喜掉續貂之尾索綯牽去驚回顧兎之頭守大笑即置不問吕恵卿之讁詞頭始下劉貢父當草制東坡呼曰貢父平生作劊子今日纔殺人也貢父引疾謁告東坡一揮而就𫝊寫都下紙為之貴其中警句云始以帝堯之明姑試伯鯀終焉孔子之聖不信宰予李易安賀人㝈生啓中有云無午未二時之分有伯仲兩楷之似既繫臂而繫足寔難弟而難兄玉刻􅀟璋錦挑對褓注曰任文二子㝈生徳卿生於午道卿生於未張伯楷仲楷兄弟形狀無二白汲兄弟母不能辨以五綵繩一繫於臂一繫於足陸佃謝吏部尚書表六燕相停試銓衡其輕重乙鴻遼逺欲審别其飛翔九章筭術五雀六燕飛集於衡衡􅆘平一雀一燕而異處則雀重而燕輕張融曰鴻飛天首遼逺難明楚人以為鳬越人以為乙鴻常乙耳崇寧中髙麗自明州海道入貢偶乗風自江路至豫章其申狀云泛槎馭以尋河逺朝天闕望桃源而迷路誤入仙鄉自驚漂泊之餘𫉬奉笑談之雅李光祖元亮野夫學士之孫少有俊聲與蔡薿同學舍薿既貴元亮猶蹉跎塲屋薿在金陵以同舍故先謁之元亮謝以啓事云洗足而見長者古猶非之輕身以先匹夫今無是事翟公㢲宣和末蔡約之攸用事外召從官七人公㢲再以瑣闥召力辭之未至闕有旨落職宫祠繼而復還待制公㢲作謝表有云弹貢禹之冠誠非本志奪伯氏之邑其又何言又云惟一與一奪之命無有二三而三仕三已之心敢懷喜愠人多稱之又謝賜衣金𢃄鞍馬表云顧臣非緇衣之宜敝予又改以臣從大夫之後不可徒行葉少藴謝賜厯日表云豈特千嵗之日可坐而致將使百畆之田勿奪其時汪彦章賀進築隆兑二州及城塞表云我陵我阿不以山谿之險有民有社在吾邦域之中皆用經書全語而工者汪彦章工於四六崇寧三年霍端友榜下及第瓊林苑晏頒氷彦章作謝表有云既潄潤而吮清得除煩而解穢順時致養俯同􅃎雅之春開受命知榮固異衛人之夕飲又云深防履薄之危不昧至堅之漸子孫傳誦記御林金盌之香生死不忘效宫井玉壺之潔靖康之亂元祐皇后手詔曰漢家之厄十世宜光武之中興獻公之子九人唯重耳之獨在事詞的切讀之感動葢中興之一助也建炎登極之詔曰亹亹萬幾難以一日而曠位皇皇四海詎可三月而無君又曰聖人何以加孝朕每懷問寢之思天子必有所尊朕欲救在原之急嗟我文武之烈若時忠義之家不食而哭秦庭士當勇於報國左袒而為劉氏人咸樂於愛君期一徳而一心佇立功而立事同傒兩宫之復終圖萬世之安其詞明白亦占地歩甄龍友嘗逰僧舍具饌延欵僧有雌鷄乆畜請烹為供僧曰公能作鷄頌當不靳也甄援筆題云頭上無冠不報四時之曉脚根欠距難全五徳之名不解雄飛但能雌伏汝生卵卵復生子種種無窮人食畜畜又食人􅁈􅁈何已若要解除業障必湏先去本根大衆先取波羅􅁡水推去頭􅆕皮毛次運菩薩慧刀割去心腸肝膽咄香水源源化為霧鑊湯滚滚成甘露引此甘露成此霧直入佛牙深處去化生彼國極樂土僧笑曰鷄死無憾矣即烹以侑酒盡歡而去李公甫謁真西山西山留之小飲指竹夫人為題曰蘄春縣君姓竹氏可封衛國夫人公甫援筆立成其中頌徳云常居大厦之間多為凉徳之助剖心析肝陳數條之風刺摩頂放踵無一節之瑕疵末聨云於戲保抱擕持朕不忘五夜之寢展轉反側爾尚形四方之風西山擊節葢八字用詩書全語皆婦人事而形四方之風又見竹夫人玲瓏嘗得一誥詞云朕眷禮勲臣既極異姓王之貴疏恩私室併侈如夫人之榮以爾脩態横生芳性和􅆘㑹膺無䘏之慶終隆絡秀之家爰錫命書靡拘常典用肇封於大郡俾正位於小君徃服寵光益循柔􅂂紹興間權外制某人行陸伯麟側室生子友人陸象翁以啟戯賀日犯簾前禁尋竈下盟玉雖種於藍田珠將還於合浦移夜半鷺鶿之歩幾度驚惶得天上麒麟之兒這回喝采既可續詩書禮樂之􅍺深齅得油塩醬醋之香白屋同愁已失鳯鳴之侣朱門自樂難容烏合之人唐鄭光鎮河中宣宗欲封其妾為郡夫人上表辭焉書記田絢之辭也此表視前誥則受者多愧矣鄧安恵自翰􅁐出守成都謝表云捫參厯井方知蜀道之難就日望雲已覺長安之逺又嘗有啓云三山已到輙為風引而還九闕神逰不覺夢驚而失前軰風流文采藴藉如此薛制機言有賀自長沙移鎮南昌者啓云夜醉長沙曉行湘水難教檣燕之留杜詩朝飛南浦暮捲西山來聴佩鸞之舞王勃上已請客云三月三日長安水邉多麗人一觴一詠㑹稽山隂脩褉事又云良晨羙景賞心樂事四者難并崇山峻嶺茂林脩竹羣賢畢至寳祐甲申江東多虎有司行襘􅓙之典青詞末聨云雖曰寅年之足或有數存去其乙字之威尚祈神力葢古詩有寅年足虎狼之句傳謂虎威如乙字對屬甚切楊誠齋答周益公恵鳩兎橘酒小簡云錦羽在桑翩翩二七褐衣缺口躍躍一􅀟挾歡伯以俱來與木奴而偕至恭惟某官文章􅅅酒儒學鳯麟逰梁王之兎園夙推能賦賜漢庭之鳩杖晩冠􅂄英橘頌續騷酒箴飽徳填然四羙萃此一翁觀此具見善於體物者景炎末造狼狽海上固無暇文物典章矣然詔語亦或有可觀如云雖鳥獸之迹不無交於中國之時然馬牛其風何嘗及諸南海之逺又云今南方已定兵甲已足豈今歲不戰來年不征不知為何人筆也宋稗𩔖鈔卷二十一
