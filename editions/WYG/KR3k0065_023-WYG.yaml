body:
  text: 宋稗𩔖鈔卷二十三常熟潘永因編格言第三十八真宗召陳摶至京師士大夫多求其言摶曰優游之所勿乆戀得意之所勿再往聞者以為至言康節嘗三復之故詩云珍重至人嘗有語落便宜處得便宜宋景文言為文是靜中一業又言莊周云送君者皆自涯而返君自兹逺每讀至此令人蕭寥有遺世之意梅摯公儀龍圖景祐初以叚中丞知昭州昭號二廣烟瘴水土惡弱處公常為之說其畧曰仕亦有瘴急催暴歛剥下奉上此租賦之瘴也深文以逞良惡不白此刑獄之瘴也侵牟民利以實私儲此貨財之瘴也盛陳姬妾以娱聲色此帷簿之瘴也有一於此民怨神怒安者必疚疚者必隕雖在輦下亦不可免何但逺方而已仕者或不自知乃歸咎於土瘴不亦謬乎張乖崖嘗言事無大小皆須用智智如水也不流則腐士君子一日不用智臨大事之際寧有智來趙清獻公座右銘云依本分莫妄想爭先徑路機闗惡退後語言滋味長爽口物多須作病快心事過必為殃得便宜處莫再去怕人知事莫萌心盛喜中勿許人物盛怒中勿答人簡人有不及可以情恕非意相干可以理遣良田萬頃日食二升大厦千間夜卧八尺說得一尺行得一寸天道尚左星辰左轉地道尚右𤓰瓠右纍蟻穴知雨烏鵲知風燕避戊巳鵲背太歲魚聚北道鍼浮南指葵知向日菊知隕霜此物之靈也人有不節醉飽不謹寒暑孰謂人為萬物之靈因書為座右銘朱新仲舍人常云人生天地間夀夭不齊姑以七十為率十歲為兒童父母膝下視寒煖燥濕之節調乳哺衣食之宜以須成立其名曰生計二十為丈夫骨強志健問津名利之塲秣馬厲兵以取我勝如驥子伏􅇫志在千里其名曰身計三十至四十日夜注思擇利而行位欲高財欲厚門欲大子息欲盛其名曰家計五十之年心怠力疲俯仰世間智術用盡西山之日漸迫過隙之駒不留常隨緣任運息念休心善刀而藏如􅁞作繭其名曰老計六十以往甲子一周夕陽銜山倐爾就木内觀一心要使絲毫無慊其名曰死計朱公每以語人以身計則喜以家計則大喜以老計則不答以死計則不勝大笑且曰子之計拙也朱不勝笑者之衆則亦自疑其拙曰豈皆惡老而諱死耶因為南華長老作大死菴記遂識其語范文正公書曰舉世不好名則聖人之權去矣公又云常調官好做家常飯好吃羅大經謂人能甘於吃家常飯然後甘於做常調官司馬溫公保身說有曰天下有道君子揚於王庭以正小人之罪而莫敢不服天下無道君子括囊不言以避小人之禍而猶或不免倘人生昏亂之世不在其位四海横流而欲以口舌救之􅆇否人物激濁揚清撩蛇虺之頭踐虎狼之尾以至身被淫刑禍及朋友士𩔖殱滅而國隨以亡不亦悲乎夫惟郭泰既明且哲以保其身申屠蟠見機而作不俟終日卓乎不可及也司馬文正公云登山有道徐行則不困措足於實地則不危邵康節嘗言善人固可親未能知不可急合惡人固可䟱未能逺不可急去韓魏公一日至諸子讀書堂見卧榻邊有一劍公問儀公何用儀公言夜間以備緩急公笑曰使汝果能手刃賊賊死於此汝何以處萬一奪入賊手汝不得為完人矣古人青氊之說汝不記乎何至於是也吾嘗聞前輩云夜行切不可以刃物自隨吾輩安能害人徒起惡心非所以自重也學不必博要之有用仕不必達要之無媿學而無用塗車芻靈也仕而有媿鶴軒虎冠也王荆公論末世風俗云賢者不得行道不肖者得行無道賤者不得行禮貴者得行無禮其論精矣晁文元逈嘗云陸象先言天下本無事祇是庸人擾之始為煩耳吾亦曰心間本無事率由妄念擾之始為煩耳逈字明逺澶州人楊待制安國邇英閣講周易至節卦有慎言語節飲食之句楊以語朴仁宗又問賈魏公曰慎何言語節何飲食魏公從容進曰在君子言之則出口之言皆慎入口之食皆節在王者言之則命令為言語燕樂為飲食君天下者當慎命令節燕樂上大喜東坡書俚語有可取者處貧賤易耐富貴難安勞苦易安閒散難忍痛易忍癢難人能安閒散耐富貴忍癢真有道之士也儋耳進士黎子雲言城北十五里許有唐村莊民之老曰允從者年七十餘問子雲言宰相何苦以青苗乆困我於官有益乎子雲言官患民貧富不均富者逐什一益富貧者取倍稱至鬻田質口不能償故為是法以均之允從笑曰貧富之不齊自古已然雖天公不能齊也子欲齊之乎民之有貧富猶器用之有厚薄也子欲磨其厚等其薄厚者未動而薄者先穴矣元符三年二月二十一日子雲過予言此負薪能談王道正謂允從輩耶東坡言子由言有一人死而復生問冥官如何修身可以免罪答曰子宜置一卷厯旦晝之所為暮夜必記之但不記者是不可言不可作也無事靜坐便覺一日似兩日若能處置此生常似今日得至七十便是百四十歲人世間何藥可能有此效既無反惡又省藥錢此方人人收得但苦無好湯使多嚥下耳晁無咎云司馬温公有言吾無過人者但平生所為未嘗有不可對人言者耳予亦記前軰有詩云怕人知事莫萌心皆至言可終身守之王充論衡曰貧人與富人並為客受賜於主人富人不慚貧人常媿者富人有以復之貧人不能故也以此觀之自昔交際之禮亦貴夫往返王景文云有心於避禍不若無心於任運斯言固達矣然必自反無愧自省無憾乃可安之於命伊川曰人之於患難只有一箇處置盡人事然後理足無憾物之有成必有壊譬人之生必有死而國之有興必有亡也雖知其然而君子之養身者凡可以乆生而緩死者無不用其治國也凡可以存存而救亡者無不為至於不可奈何而後已不得盡委之於命青城山上官道人嘗言為國家致太平與養生求不死皆非常人所能且當守國使不亂以待奇才之出衛生使不夭以須異人之至不亂不夭皆不假異術惟謹而已黄太史魯直云士大夫三日不讀書則理義不交於胸中便覺面貌可憎語言無味􅄯以道客語中有云富人有子不自乳而使人棄其子而乳之貧人有子不得自乳而棄之以乳他人之子富人􅂴行而使人肩輿貧人不得自行而又肩輿他人以行是皆習以為常而不察之者推此亦多矣而人不以為異悲夫章伯鎮珉學士云任京有兩般日月望月初請料錢覺日月長到月終供房錢覺日月短人之操行莫先於無偽能不為偽雖小善亦有可觀其積累之必可成其大茍出於偽雖有甚善不特乆之終不能欺人亦必自有怠而不能終掩者即一時作為大言以掠美牽率矯厲之行以誇衆或能竊取須㬰之譽因以得利然外雖未知未有不先為奴婢窺其後而竊笑者雖欲乆可乎歐陽公與其弟姪書有云凡人勉強於外何所不至惟考之其私乃見真偽此非其家人無與知者可以書諸紳也賈文元公戒子孫文云古人重厚朴實乃能立功立事享悠乆之福又士人所貴節行為大軒冕失之有時而復來節行失之終身不可得矣搢紳以為格言賈昌朝字子明真定人封魏國公諡文元龍洲劉改之詩云退一步行安樂法道三箇好喜歡緣真西山每喜誦之張徳逺座右銘云夫血氣不可以勝人勝人者理也剛不可以屈物屈物者柔也懐疑於人人未必疑而已先疑矣逆詐於人人未必詐而已先詐矣揚人之善人將揚其善掩人之惡人將掩其惡待我以不誠而我應之以誠則彼自媿犯我以非禮而我服之以禮則彼自服我以容人則易人以容我則難望人太深則生怨察物太明則取憎洪容齋云易乾坤之下六卦皆有坎此聖人防患備險之意也余謂屯蒙未出險者也訟師方履險者也戒之宜矣若夫需者燕樂之象比者親附之象乃亦有險焉葢斧斤鴆毒每在於衽席杯觴之間而詡詡笑語者未必非闗弓下石者於此二卦其戒尤不可不嚴焉陸放翁戲言曰名園甲第力不能有歌童舞女婦不能容高文大册才不能為高官厚禄命不能做楊誠齋云人皆以饑寒為患不知所患者正在於不饑不寒爾此語殊有味乞食於野人晉重耳之所以霸燎衣破竈而啜豆粥漢光武之所以興况下此者其可不知饑寒之味哉廖徳明字子晦朱晦菴高弟也少夢有所謁刺題宣教郎廖某後登第改秩以宣教郎宰閩思前夢恐官止此不欲行親友相勉為質之文公因指案上物曰人與器不同如筆止能為筆不能為研劍止能為劍不能為琴故其成毁乆逺有一定不易之數惟人不然有朝為跖暮為舜者故其吉凶禍福亦隨而變難以一定言今子赴官但當力行好事前夢不足芥􅎞廖拜而受教後把麾持節官至正郎諺有之殺人償命欠債還錢理也近世豪家巨室威力使令遏人致死但捐財賄餌血屬坦然無事至如人或逋負督迫取償必使投溺自經然後已由此觀之乃是殺人還錢欠債償命今人米榖登塲則去米製衣及至後來糧竭復典衣而食謂之著飯吃衣楊醫官傳食絹方為神仙上藥又寒疾者葢稻席當愈或嘲曰君吃衣著飯大是奇方士大夫欲永保富貴動有拘忌尤諱言死獨溺於聲色一切無所顧避聞人家姬侍有惠麗者伺其主翁屬纊之際已設計賄牙儈俟其放出以售之雖俗有熱孝之嫌不恤也又佩玉以尸沁為貴酬價増數倍墟墓之物反為生人寳玩是皆不可以理詰内繕已性當如紀渻之養雞外順物性當如顔闔之養虎士大夫若愛一文不直一文陳簡齋詩云從來有名士不用無名錢術者云近世乃下元甲子正直天市垣所以人多好利為市井之行鮮于伯機云揚州上應天市垣所以兩浙之地市易浩瀚非他處比箴規第三十九宋齊丘鎮鍾陵有布衣李匡堯屢贄謁見宋知其忤物託以他故不見一日宋喪子匡堯隨弔客造謁賓司復却之乃就賓次大書二十八字云安排唐祚強吞呉盡見先生啟廟謨一箇孩兒判不得讓皇百口復何如吕文靖有總髻交王至清以屢試不第𨼆遯山壑後以子簿畿縣薄游京師吕折簡招之不赴會仁宗詔廢郭后吕實賛之至清寓書文靖曰僕初與坦夫讀書山寺論家人一卦坦夫獨以孔子反身二字為此卦證語乃今天子苐有取於威如之吉使天下夫婦之主不得終始其義坦夫獨不可以反身之說諫之而將順至此乎安在其有證於尼父之言耶僕今知讀書與仕宦自是兩截事幸哉天以布衣終我身也雖然坦夫自今永保祿位矣何者有所廢必有所愛能從人主所愛處有勲力焉亦必不愛爵祿以愛其人於衆人之外也此一牘也先為相業唁後為相位賀惟坦夫兩受之文靖大怒併其子逐焉丁謂有才智然多希合上旨天下目為奸邪及稍進用即啟迪真宗以神仙之事又作玉清昭應宫耗費國帑不可勝計謂既為宫使夏竦以知制誥為判官一日宴官僚於齋㕔有雜手技俗謂弄盌注者獻藝於庭丁顧語夏曰古無詠盌注詩舍人可作一篇夏即席賦詩云舞拂挑珠復弄丸遮藏巧便百千般主人端坐無由見却被傍人冷眼看丁覽讀變色趙南仲以誅李全功見忌於鄭清之史揆每左右之得留於朝其後恢復事起遂分委邊面赴鎮之日朝紳餞之適有逞竿技者曹垔賦詩云又被鑼聲催上竿這畨難似舊時難勸君著脚須教穏多少傍人冷眼看後師卒無功韓􅇑胄以冬月携家游西湖遍覽南北兩山之勝末乃置宴南園族子院判與焉有獻牽絲傀儡為土偶負小兒者名為迎春黄胖韓顧謂族子曰汝名能詩可詠之即賦一絶云脚踏虛空手弄春一人頭上要安身忽然線斷兒童手骨肉俱為陌上塵􅇑胄怫然不終宴而歸不乆禍作石林詩話載晏元獻題竿伎詩於中書㕔壁云百尺竿頭裊裊身足跟騰挂駭傍人漢隂有叟君知否抱甕區區亦未貧王荆公他日復書一首於後云賜也能言未識真誤將心許漢隂人桔橰俯仰何妨事抱甕區區老此身觀此二詩晏乃質實王好更張二公心地即此占知矣近日有人作竿戲詩曰人皆歡喜上高竿上去難時下亦難若到上頭須把捉幾多人在下頭看此與宋人諷賈似道詩同意賈當國日人有作詩云收拾乾坤一擔擔上肩容易下肩難勸君高著擎天手多少傍人冷眼看陳恭公執中判亳州遇生日親族多獻老人星圖姪世修獨獻范蠡游五湖圗且賛曰賢哉陶朱霸越平呉名隨身後扁舟五湖公即日納節執中字昭譽陳恕字嘉祐中除張堯佐節度陳秀公升之作巾丞上殿爭之仁宗初盛怒作色待之既進見迎謂之曰豈欲論張堯佐不當授節度耶節度使本麄官何用力爭時唐質肅介作御史裏行在衆人後越次進曰節度使太祖太宗總曾做來上竦然而罷洛中有一僧欲開堂說法司馬君實夜過邵堯夫曰聞富彦國吕晦叔欲往聽此甚不可晦叔貪佛已不可勸人亦不怪如何勸得彦國堯夫曰今已日暮姑任之明日二人果偕往後月餘彦國招數客共飯堯夫在坐因問彦國曰主上以裴晉公禮起公公何不應命又聞三遣使公皆卧内見之彦國曰衰病如此豈能復起否堯夫曰上三命公不起一僧開堂以片紙見呼即出恐亦未是彦國曰弼亦不曾思量至此李清臣平日多於韓魏公前論釋氏貴定力謂無定力則不能主善公每然之後朝廷斥異論者清臣頗持兩端公因書問之曰比來臺閣斥逐紛紛吾親得不少加定力耶公之善諭人如此王樂道二子實字仲弓寜字幼安實是韓持國壻一日訪蘇端明端明因問訊持國王曰公自致政來尤好為歡嘗謂身已癃老且以聲樂自娱不爾無以度日端明曰殘年正不應爾願為某𫝊一語於持國頃有一老人未嘗叅禪而雅合禪理死生之際極為了然一日置酒大會酒闌語衆曰老人即今且去因攝衣正坐奄奄欲逝諸子惶遽呼號曰大人今日乃與世訣願留一言為教老人曰本欲無言今為汝懇只且第一五更起諸子未諭老人曰惟五更可以幹當自家事諸子曰家中幸豐何用早起舉家諸事皆是自家豈有分别老人曰所謂自家事是死時將得去者吾平時治生今日就化可將何者去諸子頗悟今持國自謂殘年請二君言與持國但言某請持國幹當自家事與其勞心聲酒不若為可以死時將得去者計也蘇文忠以作詩下獄自黄州再起遍厯侍從然其詩為不知者咀味以為有譏訕遂出守錢塘來别文潞公公曰願君至杭少作詩恐為不喜者誣謗再三言之臨别上馬潞公笑曰若還興也便有箋云時呉處厚取蔡安州詩作注以上安州遂遇禍故潞公有箋云之戲范祖禹淳父極為司馬文正公奨識嘗為進論求教於公公每見則未始有可否淳父疑而質於公公乆而言曰子之進論非不美也顧念世人應甲科者絶少子既得已在列而復習進論以應賢良由我觀之但有貪心耳光之不喜者為進論也不喜子有貪心也淳父於是焚去進論不應賢良王荆公乞罷機政待命幾兩月神宗未許呼看命老僧化成至作一課更為看命化成曰三十年前與相公看命今仕至宰相矣更復何問公微作色曰安石問命不在做官但力求去上未許只看旦夕便去得否化成曰相公得意濃時正好休要去在相公不在上不疑何卜公有慚色唐子方一日見王介甫誦華嚴經因勸介甫不若早休官去介甫問之子方曰公之為官正是作業更做執政數年和佛也費力介甫不答一日子方在朝介甫乃以子方之言白於上將以危之上大笑而止晁伯字載之少作閔吾廬賦黄魯直以示蘇長公曰此晁家十郎作年未二十也長公答曰此賦甚奇麗信是晁家多異材耶凡人至足之餘自溢為奇怪乃可今晁傷奇太早可作魯直微意諭之勿傷其邁往之氣魯直以語􅄯􅄯自是文章大進張芸叟舜民云頃游京師嘗聽司馬温公王荆公之論於行義文史為多惟歐陽公多談吏事余言學者見公莫不欲聞道徳文章今先生何教人以吏事公曰吾子皆時才異日臨事當自知之大抵文學止於潤身政事可以及物吾昔貶官彛陵方壯年未厭學欲求史漢一觀公私無有因取架閣陳年公案反覆觀之見其枉直乖錯不可勝數違法狥情滅情害義無所不有且彛陵荒逺僻小尚如此天下固可知也當時仰天誓心自爾遇事不敢忽時蘇明允父子亦在共聞此語李伯時善畫馬法秀師讓之曰伯時為士大夫而以畫行已可恥又作馬忍為之耶伯時恚曰作馬無乃例能蕩人心墮惡道乎師曰公業已習此則日夕思其情狀求為神駿繋念不忘一日眼花落地必入馬胎無疑非惡道而何伯時大驚不覺身去坐榻曰今當何以洗此過師曰但當畫大士像伯時遂畫此像妙絶天下一時公卿多師之善誘法秀師嘗語黄魯直曰公作􅃩歌小詞可罷之魯直曰空中語耳非殺非偷不至坐此墮惡道師曰君以筆墨誨淫於我法中當墮泥犂之獄豈止墮惡道而已魯直由此不作詞曲王元澤病亟介甫命道流作醮大陳楮泉平甫啟介甫曰兄在位要須令天下後世人取法雱雖疾丘之禱乆矣為此奚益且兄常以倉法繩吏奸今乃以楮泉徼福安知三清門下不行倉法耶紹聖初陳瑩中用章惇薦為太學博士先是惇之妻嘗勸惇無脩怨惇作相專務報復起朋黨之禍惇妻死惇悼念不已瑩中見惇容甚戚謂之曰公與其徒自悲傷曷若念其平生之言惇以為忤不復用蘇養直𨼆居京口紹興間與徐師川同召養直不起師川造朝時便道過養直留飲甚歡二公平日對奕徐高於蘇是日養直拈一子笑視師川曰今日還須讓老夫下此一著師川有愧色洪景盧在翰苑日嘗入直值制詔沓至凡視二十餘草事竟小步庭間一老人負暄花隂問之是京師人累世為院吏今已八十餘幼時及識元祐間諸學士今子孫復為吏故養老於此因言聞今日文書甚多學士必大勞神洪喜其言告以今日草二十餘制皆事畢老人復頌曰學士才思敏速真不多見洪矜之云蘇學士想亦不過如此速耳老人復首肯咨嗟曰蘇學士敏速亦不過此但不曾檢閱書册洪為赧然自恨失言朱文公與慶國卓夫人書云聞尊意欲為五哥經營幹官差遣某竊以為不可人家子弟多因此壊却心性葢其生長富貴不知艱難一旦仕宦便為此官逐司只有使長一人可相拘轄又多寛厚長者不欲以法度見繩上無職事了辦之責下無吏民繫縶之憂而州縣守令勢反出已下可以陵轢故後生子弟為此官者無不傲慢縱恣觸事懵然愚意以為可且為營一稍以下職事喫人打罵差遣乃所以成就之若必欲與求幹官乃是置之有過之地誤其終身前軰愛人以徳至於如此卓夫人乃少傅劉公子羽之妃樞密共公之母五哥即平甫朱與劉葢姻婭初文公之父韋齋疾革以家事屬少傅韋齋殁文公年十四少傅為築室於其里俾奉母居焉少傅手書與白水劉致中云於緋溪得屋五間器用完備在七倉前有地可樹有圃可蔬有池可魚朱家人口不多可以居文公視卓夫人稱母云楊誠齋為零陵丞以弟子禮謁張魏公時公以遷謫謝客公嗣南軒為之介紹數日乃得見因跪請教公曰元符貴人腰金紆紫者何限惟鄒志完陳瑩中姓名與日月爭光誠齋得此語終身厲清直之操王嘉叟與王龜齡别語龜齡曰吾軰會合不可常但令常留面目異日可以相見龜齡每歎賞此言姚鏞為吉州判官以平冦論功不數年擢守章貢為人豪雋喜作詩自號雪蓬嘗令畫工肖其像騎牛於澗谷之間索郡人趙東野題詩東野題云騎牛無笠又無簔斷隴横岡到處過暖日暄風不常有前村雨暗却如何葢規切之也居無何忤帥臣以貪劾之時端平更化之初施行特重貶衡陽人皆服東野之先見淳熙甲辰省元徐霖狀元留夢炎皆三衢人一時士林歆羡時楊彦瞻以工部侍郎守衢遂大書狀元坊以表其廬既以為未足則又揭雙元坊以誇大之鄉曲以為至榮而二公不欲其成各以書謝且辭焉彦瞻答之云嘗聞前軰之言曰吾鄉昔有及第奉常而歸旗者鼔者饋者迓者往來而觀者闐路駢陌如堵牆既而閨門賀焉宗族賀焉婣者及友者客者交賀焉至怙讐者亦茹恥戴愧而賀且謝焉獨鄰屋一室扄鐍逺引若避㓂然余因怪而問之愀然曰所貴乎衣錦之榮者謂其得時行道也將有以庇吾鄉里也今也或竊一名得一官即起朝貴暮富之想名愈高官愈穹而用心愈謬武斷者有之兼并者有之庇姦慝把持州縣者有之是一身之榮一害之增也其居日以廣隣日以促吾將入山林深密之地以避之是可弔何以賀為吾聞而異其言因黙識而謹書之凡交游間必道此語相摩切而非心相知者不道也執事於不肖可謂心相知如是而不以告罪也且今日此扁之揭所以獨異於尋常者葢僕之望於執事者亦異焉人於此時每以諛獻僕乃獨以忠告非異於人也所冀進執事之徳而逺執事之器也執事不以僕之言為然則已若以為然則兩坊之建可以無愧矣前之不受賀者亦必將先衆人而賀矣今得雋南宫者皆執事友也幸亦以是語之焉二公得書為之􅋺然其後徐以道學名留以功業顯世以為彦瞻有以發之孔某者皇慶癸丑間為江浙省掾吏身軀短小僅與堂上公案等凡呈署牘文必用低凳閣足令高脫歡丞相以其先聖子孫而且才學優長甚禮遇之時有詔許文正公從祀孔子廟庭公之子參知政事惡孔風度不雅因小過叱之退丞相曰他祖公容得參政父親坐參政反不容他一箇子孫立耶許大慚宋稗𩔖鈔卷二十三
