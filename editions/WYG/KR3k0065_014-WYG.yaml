body:
  text: 宋稗𩔖鈔卷十四常熟潘永因編志尚第二十四晏元獻公雖早貴而奉養極約唯喜賔客未嘗一日不晏飲盤饌皆不預辦客至旋營之蘇丞相頌嘗在公幕見每有佳客必留但人設一空案一杯既命酒果實蔬茹漸至亦必以歌樂相佐談笑雜至數行之後案上已燦然矣稍闌即罷遣聲伎曰汝曹呈藝已畢吾亦欲呈藝乃具筆札相與賦詩率以為常前輩風流未之有比趙清獻公好焚香尤喜薰衣所居既去輒數月杳不􅌍章子厚嘗言神仙昇舉事云形滯難脱臨行亦須假名香百餘斤焚以佐之坐客或疑而未和公舉近嵗廬山有崔道人者積香數斛一日盡𤼵置五老峯下徐焚之黙坐其傍烟盛不相辨忽躍起已在峯頂上語雖近竒亦或有是趙清獻公每夜嘗燒天香必擎爐黙告若有所秘祝者客有疑而問公公曰無他吾自少晝日所為夜必裒歛奏知上帝已而復曰蒼蒼眇冥吾一夫區區之誠安能必其盡達姑亦自防檢使不可奏者知有所畏不敢為耳金陵賞心亭丁晉公出鎮日重建也秦淮絶致清在軒檻取家篋所寳𡊮安卧雪圖張於亭之屏乃唐周昉絶筆凡經十四守雖極愛而不敢輒覬偶一帥遂竊去以市畵蘆雁掩之後君玉王公琪守是郡登亭留詩曰千里秦淮在玉壺江山清麗壯吳都昔人已化遼天鶴舊畵難尋卧雪圖冉冉流年去京國蕭蕭華髮老江湖殘蟬不㑹登臨意又噪西風入座隅此詩與江山相表裏為貿畵者之蕭斧也一云晉公始典金陵陛辭日真宗出周昉袁安卧雪圖曰付卿到金陵可選一絶景處張之公遂張于賞心亭鼎州甘泉寺介官道之側嘉泉也便於潄酌行客未有不停車而留者始㓂萊公南遷日題於東檻曰平仲酌泉經此回望北闕黯然而行未幾丁晉公又過之復題於西檻曰謂之酌泉禮佛而去後范補之諷安撫湖南留詩於寺云平仲酌泉回北望謂之禮佛向南行烟嵐翠鎖門前路轉使高僧厭寵榮錢文僖公留守西洛嘗對竹思鶴寄李和文公詩云痩玉蕭蕭伊水頭風宜清夜露宜秋更教仙􅂹傍邊立盡是人間第一流寧府城上莎猶是公所植公在鎮每宴客命㕔藉分行剗襪步於莎上𫝊唱􅂿莎行一時勝事至今稱之陳堯佐退居鄭圃尤好詩什張士遜判西京以牡丹花及酒遺之堯佐答曰有花無酒頭慵舉有酒無花眼懶開正向西園念蕭索洛陽花酒一時來當時稱其韻致楊褒華陽人家雖甚貧特好書畵竒玩充實中槖家姬數人布裙糲食而歌舞妙絶歐陽公贈之詩云三脚木牀坐調曲葢紀實也宋次道家書皆校讎三五遍世之藏書以次道家為善本住在春明坊昭陵時士大夫喜讀書多僦居其側以便於借置故也當時春明宅子僦直比他處常高一倍陳叔易常歎此事曰此風豈可復見耶宋敏求字次道父宣獻綬父子繼世掌史人以為榮韓魏公為相兼容小人善惡黑白不大分故小人忌之亦少范富歐陽過於别白所以怨忌日至朋黨亦起方諸公斥逐公獨安焉後扶持諸公復起皆公力也公嘗作乆旱喜雨詩斷句云須㬰慰滿三農望收歛神功寂似無人謂此真做出宰相事業也在北門重陽有詩云不羞老圃秋容淡且看寒花晚節香公居常謂保初節昜保晚節難故晚節事事尤著力所立特全又作喜雪詩云危石蓋深鹽虎重老枝擎重玉龍寒人謂公身在外自任以天下之重如此司馬文正公嘗與人書曰草妨步則薙之木礙冠則芟之其他任其自然相與同生天地間亦各使遂其生耳司馬温公優游洛中不屑世務棄物我一窮通自稱齊物子元豐中秋與樂令子訪親洛汭竝轡過韓城抵登封憇峻極下院趨嵩陽造崇福宫至紫極觀尋㑹善寺過轘轅遽達西洛少留廣度寺歴龍門至伊陽訪奉先寺登華嚴閣觀千佛巖躡徑山瞻髙公真堂歩潛溪還保應觀文富二公之廣化寺拜邠陽堂下涉伊水登香山到白公影堂詣黄龕院倚石樓臨八節灘還伊口凡所經游𤼵為詠歌歸叙之以為遊録士大夫爭𫝊之范蜀公鎮居許下於所居造大堂以長嘯名之前有荼䕷架髙廣可容數十客每春季花繁盛時燕客於其下約曰有花飛墮酒中者為釂一大白或語笑諠譁之際微風過之則滿座無遺者當時號為飛英㑹𫝊之四逺無不以為美談洛中邵康節先生術數既髙而心術亦自過人所居有圭竇甕牗圭竇者墻上鑿門上鋭下方如圭之狀甕牗者以敗甕口安於室之東西用赤白紙糊之象日月也其所居謂之安樂窩先生以春秋天色温凉之時乗安車駕黄牛出游於諸公家諸公者欲其來各置安樂窩一所先生將至其家無老少婦女良賤咸迓於門迎入窩爭前問勞且聼先生之言凡其家婦姑妯娌婢妾有爭競經時不能決者自陳於前先生逐一為分别之人人皆得其懽心於是酒殽競進厭飫數日徐游一家月餘乃歸非獨見其心術之妙亦可想見洛中士風之美康節居洛陽宅契司馬温公户名園契富鄭公户名莊契王郎中户名若使今人為之得不貽寄户漏粮之譏乎或謂田宅乃三公所予者時未知王之名當亦是元祐間人范堯夫每仕京師早晚二膳自己身以至婢妾皆治於家往往鐫削過為簡儉有不飽者雖晚登政府亦然補外則付之外厨加料幾倍無不厭餘或問其故曰人進退雖在己然未有不累於妻孥者吾欲使居中則勞且不足在外則逸而有餘故處吾左右者朝夕所言必以外為樂而不顧戀京師於吾亦一助也程丞相性嚴毅無所推下出鎮大名每晨起據案決事左右皆惴恐無敢喘息及開宴召僚佐飲酒則笑歌歡謔釋然無間於是人畏其剛果而樂其曠達韓黄門持國典藩觴客早食則凛然談經史節義及政事設施晚集則命妓勸飲盡歡而罷雖簿尉小官悉令登車上馬而去沈翰林文通喜吏事每覺有疾藥餌未騐亟取難決詞狀連判數百紙落筆如風雨意便欣然韓持國喜聲樂遇極暑屢徙不如意則卧一榻使婢執板緩歌展轉徐聼或頷首撫掌與之相應往往不復揮扇范徳孺喜琵琶暮年苦夜不得睡家有琵琶筝二婢每就枕即使雜奏於前至熟寐乃方得去人性固不容無嗜好亦是不能處閒故必待一物而後遣耳徳孺名純粹文正季子蔡魯公喜賔客終日酬酢不倦家居少閒亦必至子弟學舍與塾師從容燕笑蔡元度禀氣弱畏於延接不得已一再見則疲惙不支如啜茶多退必嘔吐嘗云家兄一日無客則病某一日對客則病韓持國居潁昌程伯淳自洛往訪之時范右丞􅂜叟純禮亦居潁昌持國嘗戲作詩示二公云閉門讀易程夫子清坐焚香范使君顧我未能忘世事緑尊紅妓對斜曛王荆公不耐静坐非卧即行晩居鍾山謝公墩自山距城適相半謂之半山嘗畜一驢每旦食罷必一至鍾山縱步山間倦則即定林寺而卧往往至日昃乃歸率以為常有不及終往亦必跨驢中道而還蘇子瞻在黄州及嶺表每旦起不招客相與語則必出而訪客所與游者亦不盡擇各隨其人髙下談諧放蕩不復為畛畦有不能談者則強之説鬼或辭無有則曰姑妄言之於是聞者無不絶倒皆盡歡而後去設一日無客則歉然若有疾謝公墩乃謝安石居東山之所作也荆公有詩云我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公人謂與死人爭地界其後公捨宅為報寧寺寺今亦廢而墩巋然獨存王荆公領觀使歸金陵居鍾山下出即乘驢王鞏嘗謁之既退見其乗之而出一卒牽之而行問其指使相公何之曰若牽卒在前聼牽卒若牽卒在後即聼驢矣或相公欲止即止或坐松石之下或憇田野耕鑿之家或入寺隨行未嘗無書或乗而誦之或憇而誦之仍以囊盛餅十數枚相公食罷即遺牽卒牽卒之餘即飼驢矣或田野間人持飯飲獻者亦為食之葢初無定所或數步復歸近於無心者也荆公性簡率不事脩飾奉養衣服垢汚飲食粗惡一無所擇自少已然為館職日韓玉汝嘗拉與同浴於僧寺潜備新衣一襲易其弊衣俟其浴出俾從者舉以衣之而不以告公服之如固有初不以為異也及為執政或言其喜食獐脯者其夫人聞而疑之曰公平日於食肴未嘗有所擇何獨嗜此因令問左右執事者曰何以知公之嗜獐脯也曰每日不顧他物而獐脯獨盡是以知之復問其食時置獐脯何所曰在近匕筯處夫人曰明日姑易他物近匕箸既而果食他物盡而獐脯固在然後人知其特以近故食之初非有所嗜也人見其太甚或多疑其偽云子瞻初讁黄州布衣芒屩出入阡陌多挾弹撃江水與客為娛樂每數日必一泛舟江上聽其所往乗興或入旁郡界經宿不返為守者極病之晚貶嶺外無一日不游山􅄯以道嘗為宿州教授㑹公出守錢塘夜過之入其書室見壁間多張古畫愛其鍾隐雪雁欲為題字而挂適髙因重二卓以上忽失脚墮地大笑南唐李後主善畵尤工翎毛所畵親筆題鍾隐筆三字後主嘗自號鍾上隠士故晦其名謂之鍾隐非姓鍾人也今世𫝊鍾畫凡無後主題筆者皆非也一云畫家實有鍾隠其人東坡言嶺南氣候不嘗吾謂菊花開時乃重陽凉天佳月即中秋不須以日月為斷十月初菊始開與客作重九因次韻淵明九日詩登游盡醉而返王定國嶺外歸出歌者勸東坡酒歌兒曰柔奴姓宇文氏眉目媚麗家世住京師坡間柔奴廣南風土應是不好柔奴對曰此心安處便是吾鄉萬松亭在某山始麻城縣令張殷植萬松於道用以庇行者且以名其亭去未十年而松之存者十不及三四東坡元豐二年謫居黄州過而賦之云十年裁種百年稀好徳無人助我儀縣令若同倉庫氏亭松應長子孫枝天公不救斧斤厄野火解憐氷雪姿為問幾株能合抱􅇻勤記取角弓詩崇寧以還坡文既禁故詩碑不復見而經過題詠者多不勝記鄱陽倪佐司濤傷之以詩云舊韻無儀字蒼髯有恨聲正謂此也蘇黄門轍南遷既還居許下多杜門不通賔客有鄉人自蜀來見之伺候於門彌旬不得通宅南有叢竹竹中為小亭遇風日清美或徜徉亭中鄉人既不得見謀之閽人閽人使待於亭旁後旬日果出鄉人因趨進黄門見之大驚慰勞乆之曰子姑待我於此翩然而入迨夜竟不復出東坡聞之曰子由直欲踰垣閉門矣信州鉛山縣治之北二里間石井資福院有泉湧於山壁之下澄澈如鑑本朝詩人潘閬移太平州參軍過而留絶云炎炎畏日𣗳將焚却恨都無一㸃雲強跨蹇驢來到得皆疑渇殺老參軍蘇黄門過而䟦之云東坡先生稱眉山矮道士好為詩格亦不能髙往往有竒語如夜過脩竹院醉打老僧門之句皆可喜也此頗有前輩風味不在石曼卿蘇子羙下若老參軍矮道士自是一對特恐漫􅌍失𫝊不知即真師能刻之石否姚舜明廷輝知杭州有老姥自言故娼也及事東坡先生云公春時每遇休暇必約客湖上早食於山水佳處飯畢每客一舟令隊長一人各領數妓任其所適晡後鳴鑼以集之復㑹望湖樓或竹閣之間極歡而罷至一二鼔夜市猶未散列燭以歸城中士女雲集夾道以觀千騎之還實一時之勝事也張文潜云范丞相堯夫司馬太師君實俱以閒官居洛中余時待次洛下一日春寒中謁之先見温公時寒甚天欲雪温公命至一小室中坐談乆之爐不設火語移時主人設栗湯一杯而退後至留司御史臺見范公􅂊見主人便言天寒逺來不易趨命温酒大杯滿釂三杯而去此事可見二公之􅃐各異劉季孫初以殿直監饒州酒税王荆公提刑至饒按酒務始至㕔事見屏間有題小詩云呢喃燕子語梁間底事來驚夢裏閒説與旁人渾不解杖藜携酒看芝山問知是季孫作大稱賞之適郡學生持狀請差官攝州學事公判監酒殿直一郡大驚遂知名云盧秉侍郎嘗為江西小郡司户叅軍於𫝊舍中題詩云青衫白髮病叅軍旋糶黄梁置酒尊但得有錢留客醉也勝騎馬傍人門荆公見而稱之立薦於朝不數年遂超顯仕賈魏公為相日有方士姓許對人未嘗稱名無貴賤皆稱我時人謂之許我言談頗可採然傲視公卿公欲見邀之數四卒不至使門人苦邀致之許騎驢徑欲造丞相㕔事門吏止之曰此丞相㕔門雖丞郎亦須下許曰我無求於丞相丞相召我來若如此我即去耳不下驢而去門吏急追之不還以白公又使人謝而召之終不至公歎曰許市井人耳惟其無所求於人尚不可以勢屈况其以道義自任者乎賈昌朝字明逺真定人謚文元謝康樂云良辰美景賞心樂事四者難并韓魏公在北門作四并堂公功名富貴無一不滿所欲故無時不可樂亦以是為貴乎韓持國守許昌每入春常日設十客之具於西湖且以郡事委僚吏即造湖上使吏之湖門有士大夫過即邀之入滿九客而止輒與樂飲終日不問其何人也曾存之常以問公曰無乃有不得已者乎公曰汝年少安知此吾老矣未知復有幾春若待可與飲者而後從吾之為樂無幾而時亦不吾待也崔唐臣閩人也與蘇子容吕晉叔同學相好二公先登第唐臣遂罷舉乆不相聞嘉祐中二公在館下一日忽見艤舟汴岸坐於船窓者唐臣也亟就見之邀與歸不可問其别後事曰初倒篋中有錢百千以其半買此舟往來江湖間意所欲往則從之初不為定止以其半居貨間取其贏以自給粗足即已不求有餘差愈於應舉覔官時也二公相顧太息而去翼日自局中還唐臣有留刺乃携酒具再往謁之則舟已不知所在矣歸視其刺之末有細字小詩一絶云集仙仙客問生涯買得漁舟度嵗華案有黄庭尊有酒少風波處便為家訖不復再見李易安名清照濟南李格非之女適趙挺之子明誠字徳甫在太學時每朔望告謁出質衣取半千錢步入相國寺市碑文菓實歸相對咀嚼展玩有持徐熙牡丹圖求錢二十萬留信宿計無所得卷還之夫婦相向惋悵者累日及連守兩郡竭俸入以事鉛槧每𫉬一書即日勘校裝輯得名畫􅂜器亦摩玩舒卷指摘疵病盡一燭為率故紙扎精緻字畫全整冠於諸家每飯罷坐歸來堂烹茶指堆積書史言某事在某書某卷第幾葉第幾行以中否勝負為飲茶先後中則舉盃大笑或至茶覆懐中不得飲而起靖康中遭亂奔徙所蓄漸散盡未幾明誠死再適張汝舟時至反目有啓與綦處厚云猥以桑榆之晚景配兹駔儈之下材時皆笑之有潄玉集三卷行于世其聲聲慢一詞尤婉妙詞云尋尋覔覔冷冷清清凄凄􅃤􅃤戚戚乍煖還寒時候最難將息三盃兩盞淡酒怎敵他晚來風急雁過也正傷心却是舊時相識滿地黄花堆積憔悴損如今有誰忺摘守著窓兒獨自怎生得黑梧桐更兼細雨到黄昏㸃㸃滴滴這次第怎一箇愁字了得韓忠武以元樞就第絶口不言兵自號清凉居士時乗小騾放浪西湖泉石間一日至香林園蘇仲虎尚書方宴客王徑造之賔主歡甚盡醉而歸明日王餉以羊羔且手書二詞遺之臨江仙云冬日青山瀟灑春來山暖花濃少年衰老與花同世間名利客富貴與貧窮榮華不是長生藥清閒是不死門風勸君識取主人翁丹方只一味盡在不言中南鄉子云人有幾何般富貴榮華總是閒自古英雄多是夢為官寳玉妻兒宿業纒年事已衰殘鬂髮蒼蒼骨髓乾不道山林多好處貪歡只恐癡迷悞了賢王生長兵間初不知書晚嵗忽若有悟能作字及小詩詞皆有見􅃐信乎非常之才也韓世忠嘗議買新淦縣官田高宗聞之御札特以賜世忠其詞云卿遇敵必克克且無擾聞卿買新淦田為子孫計今舉以賜卿旌卿之忠故其莊號旌忠葢當時諸將各以姓為軍號如張家軍岳家軍之𩔖朝廷頗疑其䟦扈聞其買田葢以為喜故特賜之世忠之買田亦未必非蕭何之意也克且無擾四字可謂要言如王全斌輩非不克奈擾何信能行此四字雖古名將何以加諸有一士貧甚夜則露香祈天日乆不懈一夕忽聞空中語曰帝閔汝誠使我問汝所欲士答曰某所欲甚㣲非敢過望但願此生衣食粗足逍遥山水間以終其身足矣空中大笑曰此上界神仙之樂何可易得若求富貴則可矣予因歴數古人極貴念歸而終不遂者皆是葢清樂天所靳惜百倍於功名爵禄也葉少藴夢得言余家舊藏書三萬餘卷䘮亂以來所亡幾半山居狹隘餘地置書囊無幾雨漏䑕齧日復蠧敗今嵗出曝之閲兩旬􅂊畢其間往往多余手抄日取所喜觀者數十卷命門生從旁讀之不覺日至仄舊得釀法極簡易盛夏三日輒成色如潼醴不减玉友每晚凉即相與飲三盃而散亦復盎然讀書避暑固是佳事况有此釀忽記歐陽公詩有一生勤苦書千卷萬事消磨酒十分輒慨然有當於心也陳少卿亞畜書數千卷名畵數十軸平生之所寳者晚年退居有華亭雙鶴唳怪石一株尤竒峭與異花數十本列植於所居為詩戒子孫云滿室圖書雜典墳華亭仙客岱雲根他年若不和花賣便是吾家好子孫亞死未幾皆散落民間矣有僧住山或謀攘之僧乃掛草鞵一雙於方丈前題詩云方丈前頭掛草鞵流行坎止任安排老僧脚底從來濶未必枯髏就此埋凡士大夫去就亦當如此楊誠齋立朝時計料自京還家之費貯以一篋鑰而置之卧所戒家人不許市一物恐累歸擔日日若促裝者又聞昔有京尹忘其名不携家惟弊篋一擔每晨起則撤帳卷席食畢則洗鉢收箸以拄棒撐弊篋於㕔事之前常若逆旅人將行者故搏擊豪強拒絶宦寺悉無所畏曾有一貴人一日命市薪六百劵有卒微哂謂其徒曰朝士今日不知明日事乃買柴六百貫耶竊歎士大夫之見有不如此卒者多矣許安仁尉順昌郡㕔事之後創吏隐堂植竹題詩云斸破中庭一􅅕苔主人白髮手親裁即今誰識清貞節須向三冬雪裏來又云珍重勞君慰逺游繁聲疎影一堂秋主人看即官期滿分付風烟與子猷林時隠霆博學多聞深明象緯聚書數千卷皆自校讎語子孫曰吾與汝曹𫉬良産矣宋稗𩔖鈔卷十四
