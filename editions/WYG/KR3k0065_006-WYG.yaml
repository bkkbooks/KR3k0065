body:
  text: 宋稗𩔖鈔卷六常熟潘永因編隱逸第十一錢文僖公惟演生貴家而文雅樂善出於天性晩年以使相留守西京時通判謝絳掌書記尹洙留守推官歐陽修皆一時文士遊宴吟咏未嘗不同洛下多水竹竒花凡園囿之勝無不到有郭延卿居水南少與張文定吕文穆遊累舉不第以文行稱於鄉閭張吕作相更薦之得宫職然延卿未嘗就葺幽亭藝花足跡不及城市時年八十餘一日文僖率僚屬往遊去其居一里外即屏騶從徒歩訪之延卿道服延接相與晤談􅁆公疎俊爽闓天下之選延卿笑曰陋居罕有過從所接之人亦無若􅁆君者老夫甚愜願少留對花小酌遂進陶尊果䔩文僖愛其野逸為引滿不辭既而吏報申牌府史牙兵排列庭中延卿徐曰公等何官而從吏之多也尹洙指而告曰留守相公也延卿笑曰不圖相國肻顧野人相與大笑復曰尚能飲否文僖欣然更為􅁆舉盤筵禮節無少加於前而談笑自若日入辭去延卿送之門顧曰老病不能造謝希勿訝也文僖登車茫然自失翼日語僚屬曰此真隱者彼視富貴為何物耶因稱歎屢日治平中􅅬達道錢醇老孫莘老孫巨源同在館中花時各厯􅁆京師花最盛處膝曰不足道約旬休日相率同遊三人者如其言達道前行出封丘門入一小巷中行􅁆歩至一門陋甚又􅁆歩至大門特壯麗造􅆹下馬主人戴道㡌衣紫半臂徐歩而出達道素識之因曰今日風埃特甚主人曰此中不覺諸公宜往小􅆹至則雜花盛開雕攔畵楯樓觀甚麗水陸畢陳皆京師所未嘗見主人云此未足佳頤指開後堂門坐上己聞樂聲矣莘老時在制中固辭之衆遂起去莘老嘗語人云平生看花只此一處山谷題𤣥真子圖詞所謂人間底是無波處一日風波十二時者固己妙矣張仲宗詞云釣笠披雲青嶂曉橛頭細雨春江𣺌白鳥飛來風滿棹収綸了漁童拍手樵青笑明月太虚同一照浮家泛宅忘昏曉醉眼冷看朝市閙烟波老誰能惹得間煩惱語意尤飄逸仲宗年逾四十即挂冠後因作詩送胡澹菴貶新州忤秦檜亦得罪具標致如此宜其能道𤣥真子心事唐子西詩云山靜似太古日長如小年余家深山之中每春夏之交蒼蘚盈階落花滿徑門無剥啄松影參差禽聲上下午睡初足旋汲山泉拾松枝煑苦茗啜之隨意讀周易國風左氏𫝊離騷太史公書及陶杜詩韓蘇文􅁆篇從容歩山徑撫松竹與麝犢共偃息於長林豐草間坐弄流泉潄齒濯足既歸竹窗下則山妻雅子作筍蕨供麥飯欣然一飽弄筆窗間隨大小作􅁆十字展所藏法怗筆蹟畵卷縱觀之興到則吟小詩或草玉露一兩叚再烹苦茗一杯出歩溪邊邂逅園翁溪友問桑麻説秔稻量晴較雨探節􅁆時相與劇談一餉歸而倚杖柴門之下則夕陽在山紫緑萬狀變幻頃刻恍可人目牛背笛聲兩兩來歸而月印前溪矣味子西此句可謂妙絶然此句妙矣識其妙者葢少彼牽黄臂蒼馳獵於聲利之塲者但見衮衮馬頭塵匆匆駒隙影耳鳥知此句之妙哉人能真知此妙則東坡所謂無事此靜坐一日勝兩日若活七十年便是百四十所得不已多乎松江一漁父每棹小舟往來長橋扣舷飲酒酣歌自若紹聖中閩人潘裕自京師調官過呉因就與語且曰先生澡身浴徳今聖明在上盍出而仕父笑曰君子之道或出或處吾雖不能棲隱岩穴追園綺之蹤竊慕老氏曲全之義且養志者忘形養形者忘利致道者忘心心形俱忘其視軒冕如糞土耳與子出處異趣無與吾事車溪贇上人言嘗與其徒月夜登閣聴江貫道參鼓琴貫道信手忘言曲盡其妙於是㨿琴而弗彈坐客莫不自失超然得意於絲桐之表隆茂宗乃畵為據琴圖僧梵隆字茂宗號無住呉興人善白描人物山水師伯時髙宗極重其畵田承君有廬在亂山中前有竹旁有溪溪畔有大石前後樹以梨􅀥日與二弟穿竹渡溪倦則坐石上或藉以草葛巾草屨吟諷而歸以是遺老而忘憂劉十功字子民濱州安定人弱不好弄及長築室於環堵之間不語不出者三十餘年或不食徽宗聞其名􅁆遣郡縣津致間馳近侍召之對曰吾有嚴願不出此門上知不可奪賜號髙尚先生王子常侍郎問以修行之術書云非道亦非律又非虚空禪獨守一畆宅惟耕己心田又云以手捫胸欲心清淨以手上下欲氣升降又云常人以嗜欲殺身以財貨殺子孫以政事殺民以學術殺天下後世吾無是四者豈不快哉靖康之變不知所終以嗜欲殺身貨財殺子孫舉世之通患以政事殺民雖能吏有不自覺者以學術殺天下後世當時其有感於王安石之事乎康譽之叔聞云宣政間楊可試可弼可輔兄弟喜讀書精通易􅁆兼明風角鳥占雲祲孤虛之術於兵法尤䆳三人皆名將也自燕山囘語先人曰吾􅁆載前在西京山中遇一老人語甚欵勸余勿仕隱去可也問何地可隱老人笑曰欲知之否乃引余入山有一穴焉老人入余從之穴漸小挾服以入約三四十歩即就寛少頃出穴見土田雞犬陶冶居民大聚落也至一家有人來迎笑謂老人久不來矣乃為設酒味薄而醇其香郁烈更殺雞進􅁰意極欵洽老人謂曰此公欲來能相容否對曰此中地頗濶民居苦少何為不可但居是地者皆信厚和睦雖異姓猶同氣也今觀子神宇毛骨非貴官即名士是翁肻相引至此則子必賢者矣此間凡衣服飲食牛畜絲枲之𩔖皆不私藏與衆均之故可共處子果來勿攜金珠錦繡珍異諸物在此俱無用且起爭端徒手而來可也指一家云彼來亦未久有綺縠珠璣之屬衆共焚之所享者惟薪米魚肉果布此殊不闕也唯計口授地以耕以蠶不可取衣食於他人耳余謝而從之又戒曰子或來遲則以一丸泥封穴不可復入矣迫暮與老人同出比吾兄弟皆休官以往矣公能相從否於是三楊自中山歸洛乃盡捐囊箱所有易絲與布絹等先寄穴中俟天下果擾攘便共入穴後聞可試布􅂁賣卜於市二弟築室山中不出自是杳不聞問先人嘗遣人至其地偵之則屋已三易主三楊所向不可得而知矣及紹興和好之成金人歸我三京余至故都訪舊居忽有人問此有康通判家否出一書相示則楊手札也書中致問殷勤且云余居山中甘食安寢終日無一毫事何必更求仙乎公能來甚善余報以先人歿於辛亥嵗今移家宜興俟三京帖然然後奉老母北還先生再能寄聲以命諸孤則可尋髙躅於清淨境中矣未㡬金人渝盟余顛頓還江南從此遂絶蘇翁者初不知何許人紹興兵火末來豫章東湖南岸結廬獨居待鄰右有恩禮無良賤老穉皆不失其懽心故人愛且敬之稱曰蘇翁身長九尺美􅂡髯寡言笑布􅄄草履終嵗不易未嘗疾病筋力􅁆倍於人食啖與人亦倍巨鍤長柄畧與身等披荆􅁄轉瓦礫闢廢地為圃或區或架或籬且堘應四時蔬莱不使一闕藝植耘芟皆有法度灌注培壅時刻不差雖隆暑極寒土石焦灼草木凍死圃中根荄芽甲滋鬱暢茂以故蔬不絶圃味眎他圃蔬為最勝市鬻者利倍而售速每先期輸直不二價而人無異辭晝爾治圃宵爾織履履堅靭革舄可穿屨不可敗織未脱手人爭貿之以饋逺號曰蘇公履薪米不至匱乏且有餘羡喜周急人有貸假隨力所及應之負償一不經意閉門髙卧或危坐終日人莫測識先是髙宗南渡急賢如饑渇時張公浚為相馳書函金幣且移書屬豫章漕及帥曰余鄉人蘇雲卿管樂流亞遁跡湖海有年矣近聞灌園東湖其髙風偉節非折簡所能屈幸親造其廬為我必致之漕帥密諭物色彼人曰此有灌園蘇翁者無雲卿也漕帥即相與變服為遊客入其圃翁運鋤不顧二客前揖與語翁良久問客何從來乃延入室土銼竹几輝光溢然地無纎塵案上留西漢書一册二客神融意消恍若自失黙計曰此為蘇雲卿也必矣既而汲泉煮茗意稍欵接客遂叩曰翁仙里何地徐曰廣漢客曰張徳逺廣漢人翁當識之曰識之客又問徳逺何如人曰賢人也苐長於知君子短於知小人徳有餘而才不足因問徳逺今何官二客曰今朝廷起張公欲了此事翁曰此􅂲怕他未便了得來葢其初不料張公使其訪己而欲致之也二客遂笑謂翁曰某等備乏漕帥實非遊者張公今秉相權令某等造廬以禮致公共濟大業出書函金幣於其案上翁色遽變喉中隱隱有聲似怨張公暴己者至是始知翁廣漢人即雲卿是已然終不知雲卿其字耶抑名耶繼旌旗填委堅請翁同載以歸再三謝不可許詰朝上謁越夕遣使迎伺則扄戸閴然從他徑排闥入惟書幣留案上儼然如昨日室空而人不可得而見矣形迹􅈙絶莫知所終劉先生者河朔人年六十餘居衡岳紫葢􅄘下間出衡山縣市從人乞得錢則市鹽酪徑歸盡則更出日攜一竹籃中貯大小筆㯶帚麻拂􅁆事遍遊諸寺廟拂拭神佛塑像鼻耳竅有塵土即以筆燃出之率以為常環百里人皆熟識之縣市一富人嘗贈以一衲􅂁劉欣謝而去越􅁆日見之則故褐如初問之云吾㡬為子所累吾常日出庵有門不掩既歸就寢門亦不扄自得􅂁之後不衣而出則心繋念因市一鎻出則鎻之或衣以出夜歸則牢闗以備盗􅁆日營營不能自决今日偶衣至市忽自悟以一􅂁故使方寸如此是大可笑適遇一人過前即解􅂁與之吾心方坦然無復繋念嘻吾㡬為子所累矣嘗至上封歸路遇雨視道邊一塜有穴遂入以避㑹昏暮因就寢夜將半睡覺雨止月明透穴照壙中厯厯可見甓甃甚光潔比璧惟白骨一具自頂至足俱全餘無一物劉方起坐少近視之白骨倐然而起急前抱劉劉極力奮擊乃零落墮地不復動矣劉出每與人談此異或曰此非怪也劉真氣壯盛足以翕附枯骨耳僧法一宗杲自東都避亂渡江各攜一笠杲笠中有黄金􅁫每自檢視一伺知之杲起奏厠一亟探􅁫擲江中杲還亡􅁫不敢言而色變一叱之曰與汝共學了生死大事乃眷眷此物耶我適己為汝投之江流矣杲展坐具作禮而行潁州陽翟縣有杜生者邑人謂之杜五郎所居去縣三十里惟有屋兩間一間自居一間其子居之室之前有空地丈餘即是籬門杜生不出籬門凡三十年矣􅀺陽尉孫軫曽往訪之見其人頗瀟灑自陳村民無所能何辱下訪孫問其不出門之因其人笑曰以告者過也指門外一桑曰十五年前亦曽到此桑下納涼問其何以為生曰昔時居邑之南有田五十畆與兄同耕後兄之子娶婦度所耕不足贍乃推田與兄攜妻子至此偶鄉人借此屋遂居之惟為人擇日又賣藥以具饘粥亦有時不繼鄉人見憐與田三十畆令子耕之尚有餘力又為人傭耕自此食足鄉人貧以醫自給者甚多自念食既足不當更兼鄉人之利自爾擇日賣藥一切不為又問嘗日何所為曰端坐耳問頗觀書否曰二十年前亦曽觀書問觀何書曰曽有人惠一册書無題號其間多説淨名經亦不知淨名經何書也當時極愛其議論今亦忘之并書亦不知所在久矣氣韻閒曠言詞精簡有道之士也盛寒但布􅂁草履室中􅑎然一榻而己問其子之為人曰村童也然質性淳厚未嘗妄言嬉遊惟買鹽酪則一至邑中可􅁆其行跡以待其歸徑往徑還未嘗旁遊一歩也南安翁者漳州陳元忠嘗赴省試過南安投宿茅茨􅁆椽竹樹茂密可愛主翁麻衣草履舉止談對宛若士人几案間文籍散亂陳叩之曰翁訓子讀書乎曰種園為生耳入城市乎曰不出十五年矣問藏書何用曰偶有之耳少焉風雨暴作其二子歸捨鉏揖客不𩔖農家子翁進豆羮享客遲明别去陳以事留城中見翁蒼黄行陳追詰何以到此曰大兒鬻果失税為闗吏所拘陳為謁監征至則己捕送郡翁與小兒偕詣庭下長子當杖翁懇白郡守若渠不勝杖則翼日乏食矣願以身代小兒曰大人豈可受杖某願代大兒又以罪在己甘心焉三人爭不决小兒來父耳旁語若將有所請翁斥之兒必欲前郡守疑之呼問所以對曰大人原係帯職正郎宣和間屢典州郡翁急拽其衣使退曰兒狂妄言守詢誥勑在否曰見作一束置甕中埋山下立遣隨兒𤼵取果得之即延翁上坐謝而釋其子次日訪之室已空矣陳觀國字用賓永嘉勝士也丙戌之夏寓越夢訪友於杭壁間有古畵􅁆幅岩壑聳峭竹樹茂密瀑飛絶巘滙為大池池中菡蓞方盛開一翁曵杖坐巨石上仰瞻飛鶴翔舞烟雲空􅄥中髣髴有字􅁆行體雜真草其辭曰水聲兮激激雲容兮茸茸千松拱緑萬荷凑紅爰宅兹岩以逸放翁屹萬仞與世隔峻一極而天通予乃控野鶴追𡨕鴻往來乎蓬萊之宫披海氛而一笑以覩九州之同傍人指曰此放翁詩也詩語清古非思想之所及異哉孫仲益山居上梁文云老蟾駕月上千崖紫翠之間一鳥呼風嘯萬木丹青之表又云衣百結之衲捫虱自如挂九節之笻送鴻而去竒語也楊誠齋年未七十退休南溪之上老屋一區僅庇風雨聰明强健間退十有六年寧皇初與朱文公同召公獨不起文公與公書云更能不以樂天知命之樂而忘與人同憂之憂母過於優遊毋决於遁思則區區猶有望於斯世也公己决於髙蹈遂自贊曰江風索我吟山月喚我飲醉倒落花前天地為衾枕又云青白不形眼底雌黄不出口中只有一罪不赦唐突明月清風劉宰字平國號漫塘潤之金壇人早有經世志以㣲疾不樂出或言其面䵟㸃不欲應詔起者力辭以免嘗大書其印厯以示終身不起云怪矣面容無食肉相介然褊性無容物量智淺而慮不周材疎而用則曠不返初服輒啟榮望豈特二不可七不堪正恐一不成萬有喪故俛以自適超然自放衣敝褞􅂁可無三禠之辱飯疏飲水何用八珍之餉隱几餘情杖藜獨往或從田夫瓦盆之飲或聴漁人滄浪之唱顧盻而花鳥呈伎言笑而川谷傳響優遊嵗月逍遥天壤路逢扁舟而去者語之曰汝非覇越之人乎陶天下之中從子致富亟去毋亂吾樂遇籃輿而來者揖之曰汝非不肻見督郵者乎有謁於道者縱得錢付酒家終不若髙卧北窗日傲羲皇之上也吕徽之家仙居萬山中博學能詩文而安貧樂道常逃其名耕漁以自給一日詣富家易榖種大雪立門下人弗之顧徐至庭前聞東閣中有人分韻作雪詩一人得滕字苦吟弗就先生不覺失笑諸貴遊子弟軰聞得遣左右詰之先生初不言衆愈疑親自出見先生露頂短褐布襪草屨輒侮之詢其見笑之由先生不得已乃曰我意舉滕王蛺蝶事耳衆始歎服邀先生入坐先生曰我如此形狀安可厠諸君子間請之益堅遂入閣衆以藤滕二字請先生足之即援筆書曰天上九龍施法水人間二鼠嚙枯藤鶩鵝聲亂功収蔡蝴蜨飛來妙過滕復請和曇字韻詩又隨筆寫云萬里闗河凍欲含渾如天地尚函三橋邊驢子詩何惡帳底羔兒酒正酣竹委長身寒郭索松埋短髪老瞿曇不如乗此擒元濟一洗江南草木慚寫訖便出門留之不可得問其姓字亦不答皆驚訝曰嘗聞吕處士名欲一見而不能先生豈其人耶曰我農家安知吕處士為何如人惠之榖怒曰我豈取不義之財必易之刺船而去遣人遥尾其後路甚僻逺識其所而返雪晴往訪焉惟草屋一間家徒壁立忽米桶中有人乃先生妻也因天寒故坐其中試問徽之先生何在答曰在溪上捕魚始知真為先生矣至彼果見之告以特來候謝之意隔溪謂曰諸公先到舍下我得魚當換酒飲諸公也少頃攜魚與酒至盡歡而散翼旦再躡其蹤則先生己遷居矣鐵脚道人者虬髯玉貌倜儻不羇嘗愛赤脚雪中興𤼵則朗誦南華秋水篇又愛嚼梅花滿口和雪嚥之或問嚥此何為曰吾欲寒香沁入肺腑其後去採藥衡嶽夜半登祝融􅄘觀日出乃仰天大呌曰雲海盪吾心胸居無何飄然而去纂有九字經勿欺心勿妄語守亷恥系之語曰此經字約而義博知之甚易行之甚難茍能實踐可謂君子趙景道質隱居燕南教授為業金章宗遊春水過焉聞絃誦聲幸其齋舍見壁間所題詩諷詠久之賞其志趣不凡召至行殿命之官固辭曰臣僻性野逸志在長林豐草金鑣玉絡非所願也况聖明在上可不容巢由為外臣乎章宗益竒之賜田千畆復之終身躁競忿狷附第十二陶榖自五代至國初文翰為一時之冠然具為人傾險狠媚自漢初始得用即致李崧赤族之禍由是縉紳莫不畏而忌之太祖雖心知不善然藉其詞華足用故尚置於翰苑榖自以久次舊人意希大用建隆以後為宰相者往往不由文翰而聞望出穀下榖不能平乃俾其黨與因事薦引以為久在詞禁宣力實多亦以㣲伺上㫖太祖笑曰頗聞翰林草制皆檢前人舊本改換詞語此乃俗所謂依様畵葫蘆耳何宣力之有榖聞之乃作詩書於玉堂之壁曰官職須由生處有才能不管用時無堪笑翰林陶學士年年依様畵葫蘆太祖益薄其怨望遂决意不用矣世以陶穀文雅清致之士多稱賞之然諸書所載穢徳頗衆畧舉一二已見大節榖乃唐彦謙後也避石普諱改曰陶後納唐氏為壻已可怪矣初因李崧得位後乃排之此負恩也袖中禪詔不忠孰甚奉使兩浙獻詩錢俶云此生頭已白無路掃王門辱命無恥可知又出使􅁋婦而有好姻縁之詞卧病思金鍾而有乞與金鍾病眼明之句至欺待詔使書密㫖以取良馬此何等人也史稱遇名望者巧言以詆之嗚呼一人之身衆醜備焉亦何貴於文雅哉蘇易簡特受太宗顧遇在翰林恩禮尤渥然性特躁進罷參政以禮部侍郎知鄧州纔逾壯嵗而其心鬱悒有不勝閒冷之歎鄧州有老僧獨處郊寺蘇贈詩曰憔悴二毛三十六與師氣味不爭多又移書於舊友曰退位菩薩難做竟不登强仕而卒時有夏侯嘉正以右拾遺為館職平生好燒銀而樂文字之職常語人曰吾得見水銀銀一錢知制誥一日無恨矣然二事俱不諧而卒錢文僖公維演自樞密使為使相勲階品皆第一而恨不得真宰居常歎曰使我得於黄紙盡處押一箇字足矣亦竟不登此位㓂萊公年三十餘太宗欲大用尚以其少凖遽服地黄兼餌蘆菔以反之未㡬皓白舊制學士以上並有一人朱衣吏引馬所服帯用金而無魚至入兩府則朱衣二人引馬謂之雙引金帯懸魚謂之重金矣世𫝊館閣望為學士者賦詩云眼前何日赤腰下㡬時黄及為學士又作詩曰眼赤何時兩腰黄㡬日重隋唐嘉話云崔日知恨不為八座及為太常卿於􅆹事前起一樓正與尚書省相望時號崔公望省樓又御史久次不得為郎者道過南宫輒囘首望之俗號抝項橋鄭畋作學士時金鑾坡上南望詩云玉晨鍾韻上空虛畵㦸祥烟擁帝居極目向南無限地緑烟虚處認中書乃知朝士妄想古今一轍王文康公曙苦淋百療不差洎為樞密副使疾頓除及罷而疾復作或戱之曰欲治淋疾唯用一味樞密副使仍須常服始得不𤼵梅金華詢久為侍從急於進用晩年多病石參政中立戱之曰公欲安乎唯服一清凉散即差也葢兩府在京許張青葢耳曙字晦叔㓂萊公之壻拜同中書門下平章事逾月卒謚文康劉子儀侍郎三入翰林意望入兩府頗不懌作詩云蟠桃三竊成何事上盡鰲頭跡轉孤稱疾不出朝士問候者繼至詢之云虚熱上攻石中立在坐中云只消一服清凉散意謂兩府始得用清凉傘也梅侍讀詢晩年躁於禄位嘗朝退過閣門見箱中有錦軸云是胡侍郎則致仕告身同列取視梅逺避而過曰幣重而言甘誘我也何以視為時人多笑之詢年七十餘又病足常撫其足而詈之曰是中有鬼令我不得至兩府者汝也皇祐嘉祐中未有謁禁士人多馳鶩請託而法官尤甚有一人號望火馬又一人號日遊神葢以其日有奔趨聞風即至未嘗暫息故也晏元獻早八政府逮出鎮皆近畿名藩未嘗逺去王室自南都移陳離席官妓有歌千里傷行客之詞公怒曰予平生守官未嘗去王畿五百里是何千里傷行客耶陳彭年􅀍章宗􅃂遇每帝文述作俾加潤飾彭年竭精盡思以固恩寵贊佞符瑞急希進用當其役慮時雖寒暑燥溼不知也休澣日閒歩於宅之廊廡忽見紅英墮地訝曰何花也左右對曰石榴花耳彭年曰此乃有石榴耶即彌年所居之僦地也其鋭進專一如此時人目為九尾狐言其非國祥而媚惑多岐也及參毗宰政未㡬而亡彭年在翰林所兼十餘職皆文翰清秘之目時人謂其署銜為一條冰孔道輔自以為聖人之後常髙自標置性剛介急於進用或有勸其少通者答曰吾豈姓張姓李者耶聞者每笑之趙稹厚結劉美人家婢以干進用天聖中以為樞密副使命未下有馳告者稹問東頭西頭葢意在中書也聞者以為笑談蘇舜元為京西轉運使􅅟宇在許州舜元好進不喜為外官常怏怏不自足每語親識人生稀及七十而吾乃許州過了二年矣宋朝翰林學士多以知制誥久次而稱職者充之劉原父居外制最久既譽望最髙一時咸以為宜充此選劉亦雅以自負然久不升進出典兩郡還朝復居舊職頗怏怏不自得一日顧官屬曰諸君聞殿前指揮使郝質已拜翰林學士矣或以為疑者徐笑曰以今日之事凖之固當然耳宋稗𩔖鈔卷六
