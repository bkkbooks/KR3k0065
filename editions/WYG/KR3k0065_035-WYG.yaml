body:
  text: 宋稗𩔖鈔卷三十五常熟潘永因編草木第五十八張約齋種花法云春分和氣盡接不得夏至陽氣盛種不得立春正月中旬宜接櫻桃木樨徘徊黄薔薇正月下旬宜接桃梅李杏半丈紅臘梅梨棗栗柿楊栁紫薇二月上旬可接紫笑緜橙匾橘已上種接並於十二月間沃以糞壤二次至春時花果自然結實立秋後可接金林檎川海棠黄海棠寒毬轉身紅祝家棠梨葉海棠南海棠以上接種法並要接時將頭與木身皮對皮骨對骨用麻皮𦂳纒上用箬葉寛覆之如萌茁稍長即撤去箬葉無有不成也滕處士昌祐字勝華攻書畫畫花竹鳥獸體物像形巧妙入格所居州東北隅竹樹交蔭景像幽寂有園圃池亭徧蒔花菓凡壅培種植皆得其法以藥苗為蔬藥粉為饌年八十五書畫未嘗輟焉㕔壁懸一大粉板題園中花草品格名目百餘件亦有逺方怪草竒花葢欲資其畫藝爾園中有一柿樹夏中團坐十餘人敷張如葢無暑氣云柿有七絶頗宜種之一有壽二多陰三無禽窠四無蟲蠧五有嘉實六本固七霜葉紅而堪翫有一盆池云初埋大盆致細土拌勻入生葱酒糟各少許深二尺餘以水漬之候春初掘取藕根麄者和顛三節已上四五莖埋入深泥令近盆底纔及春分葉生當年有花夫藕有四美根為菜花為翫實為果葉為杓池沼亭檻之前為瑞草萍蘋藻荇不得與侔也園中有慈竹藂生根不離母故名以慈也有釣絲竹以其弱杪低而垂至地也有絲竹葉細而青莖瘦而紫亦謂之墨竹有對青竹身黄色有一脉青節節相對故謂之對青也有苦竹葉穠多陰笋髙之時粉香籜翠有柱竹扶疎藂茂瀟灑亭䑓無出此數君也俗以五月十三日種竹多遭烈日晒乾園中竹以八月社前後是月天色多陰土潤竹以此月行根也凡欲移竹先掘坑令寛大以水調細土作稀泥即掘竹四面鑿斷大根科連根以繩錮定舁時勿令動著根鬚間土舁入坑致泥漿中令泥漿周匝徧滿乃東西搖之復南北搖之令泥漿入至鬚間便以細土覆之勿令土壅過竹本根也若竹稍長者芟去顛葉纒竹架之恐風搖動即死每窠相去二尺餘不須實劚只以一脚踏之則來年生笋速也宜於園東北軟土上種之竹性多西南行根不用頻澆水水多則肥死園中有梨名車轂圍一尺摘時先以布囊盛之落地即碎有金桃色深黄剖之至核紅翠如金味美為桃之最有林檎色如玉向陽處有朱㸃如纈顆有重四两者其栽果法以冬至後立春前斫美果直枝須有鶴膝大如母指者長可二尺劄于芋魁中掘泥令寛調泥漿細切生葱一升許攪於泥中將芋塊致泥中以細土覆之勿令堅實即當年有花來年始實絶勝種核接果樹法凡欲接果先得野樹子酸澁不美者如臂已上然後尋美果枝選隔年有鶴膝向陽者枝長不過二尺過則難治至時剪下便劄于蘿蔔中欲不􅂥其氣也冬至後十日立春前七日其野樹皮潤萌芽未發時將野樹以鋸截之去地五七寸中心劈破深二寸許取美枝或一枝或两枝斜􅧠勿傷其皮挿于野樹罅中外與野樹皮𦂳宻相齊用牛糞泥封之與笋籜包裹其接處以麻紉纒定上更以黄土泥塔頭裹之勿使雨水透入野樹或旁生芽葉即取去之若依此法則當年有花必矣楊文公談苑記江南後主患清暑閣前草生徐鍇令以桂屑布甎縫中宿草盡死吕氏春秋云桂枝之下無雜木葢桂枝味辛螫故也雷公炮炙論云以桂為丁以釘木中其木即死一丁至㣲未必能螫大木自其性相制耳元豐間禁中有果名鴨脚子者四大樹皆合抱其三在翠芳亭之北嵗收實至數斛而託地陰翳無可臨玩之所其一在太清樓之東得地顯曠可以就賞而未嘗著一實裕陵嘗指而嘉歎謂事有不能適人意者如此明年此木遂花而得實數斛上大悦命宴太清以賞之仍分頒侍從又朝廷問罪西夏五路舉兵秦鳳路圖上師行營憩形便之次至闗嶺有秦時栢一株雖質幹不枯而枝葉略無存者既標圖間裕陵披圖顧問左右偶以御筆㸃其枝間而歎其閲嵗之久也後郡奏秦朝栢忽復一枝再榮殿中有記當時奏圖歎賞之語私相聳異謂天人筆澤所加囘枯起死便同雨露之施昔唐明皇曉起臨苑中時春候已深而林花未放顧視左右曰是須我一判斷耳亟命取羯鼔一曲未終而桃杏盡開即棄杖而詫曰是豈不以我為天公耶由是觀之凡為人君者其一言動固自與造化宻契雖於草木之㣲偶加眷矚而榮謝從之若響應聲況於陞黜賢否意所與奪生殺貴賤之間哉馬塍藝花如藝粟槖駞之技名天下非時之品真足以侔造化通仙靈凡花之早放者名曰堂花其法以紙飾宻室鑿地作坎編竹置花其上糞土以牛溲硫黄盡培溉之法然後筧沸湯於坎中少俟湯氣薫蒸則扇之以㣲風盎然盛春融淑之氣經宿則花放矣若牡丹梅桃之𩔖無不然獨桂花則反是葢桂必凉而後放法當置之石洞巖竇間暑氣不到處鼓以凉風養以清氣竟日乃開此雖揠而助長然必適其寒温之性而後能臻其妙耳洛陽牡丹之品見於花譜然未若陳州之盛且多也園戸植花如種黍粟動以頃計政和壬辰園户牛氏家忽開一枝色如鵝雛而澹其面一尺三四寸髙尺許柔葩重疊約千百葉其本姚黄也而於葩英之端有金粉一暈縷之其心紫蕋亦金粉縷之牛氏乃以縷金黄名之以籧篨作棚屋圍幛復張青㡩䕶之於門首遣人約止遊人人輸千錢乃得入觀旬日間其家𫉬數百千郡守聞之欲剪以進内衆園户皆言不可曰此花之變易者不可為常他時復來索此品何以應之又欲移其根亦以此為辭乃已明年花開果如舊品矣閩廣多異花悉清芬郁烈而末利花為衆花之冠嶺外人或云抹麗謂能掩衆花也至暮則尤香今閩人以陶盎種之轉海而來浙中人家以為嘉玩然性不耐寒極難愛䕶經霜雪則多死亦地土之異宜也顔博文持約讁官嶺表愛而賦詩云竹梢脱青錦榕葉隨黄雲嶺頭暑正煩見此蕚緑君欲言嬌不吐藏意久未分最憐月初上濃香夢中聞蕭然六曲屏西施帶㣲醺叢深珊瑚帳枝轉翡翠裙譬如追風騎一抹萬馬羣銅瓶汲清泚聊復為子勤願言少須㬰對此髯㕘軍觀此詩則花之清淑柔婉風味不言可知矣凡松葉皆雙股故世以為松􅁫獨栝松每穂三鬚而髙麗所産每穂乃五鬛焉今所謂華山松是也李賀有五粒小松歌陸龜蒙詩云松齋一夜懐貞白霜外空聞五粒風李義山詩松暄翠粒新劉夢得詩翠粒照晴露皆以粒言松也酉陽雜俎云五粒者當言鬛自有一種名五粒皮無鱗而結實多新羅所種云然則所謂粒者鬛也凡欲松偃葢栽時當去松中大根惟留四傍鬚根則無不偃葢竹有雌雄雌者多筍故種竹當種雌自根生上至生稍一節𤼵者為雌物無逃於陰陽可不信哉梅之早花者皆嫩樹故得春最早樹老則得春漸遲亦猶人之氣血衰旺老少之異也此説前所未聞朝議大夫李冠卿説揚州所居堂前杏一株極大花多而不實適有一媒姥至見如此笑謂家人曰來春與嫁了此杏冬深忽携酒一尊來云是婚家撞門酒索處子裙一腰繋杏上已而奠酒辭祝再三家人莫不笑之至明春此杏結子無數江淛間亦聞有嫁橘法南方雖産橘然亦畏霜吴中洞庭霜最多即無所損詢彼人云洞庭四面皆水水氣上騰尤能辟霜所以洞庭橘最佳嵗收不耗朝奉郎劉國均言侍其父吏部公罷官成都行李中有水銀一篋偶過溪渡篋塞遽脱急求不𫉬即攬取渡傍叢草塞之而渡至都久之偶欲汞用傾之不出而斤重如故破篋視之盡成黄金矣國初征澤潞時軍士於澤中鎌取馬草晚歸鎌刃透成金色臨安僧法堅言有歙客經於潛山中見一蛇其腹脹甚蜿蜒草中徐遇一草便嚙破以腹就磨頃之脹消如故蛇去客念此草必消漲藥也取置篋中夜宿旅邸鄰房有過客方呻吟牀第間客就詢之云為腹脹所苦即取藥就釜煎一杯湯飲之頃之不復聞聲意謂良已至曉但聞鄰房滴水聲呼其人不復應急起排戸視之則其血肉俱化為水獨遺骸卧牀客大駭挈裝而逃逮明主人視之了不測其所以及潔釜炊飯則釜通體成金矣乃宻􅄟其屍既久經赦客至邸語其事方傳外人也菌不可妄食建寧縣山石間忽生一菌大如車葢鄉民異之取以為饌食者輒死凡菌為羮照人無影者不可食食之殺人菌每生於幽𨼆下溼之地或蛇虺嘘氣所成食之皆能害人人每輕不貲之身以嘗試之嘉定乙亥楊和王墳上感慈菴僧徳明遊山得竒菌歸作糜供衆毒𤼵僧行死者十餘人徳明亟嘗不潔𫉬免有日本僧定心者寧死不汙至膚理拆裂而死其度牒尚藏菴中年有久定保安治象等號僧衘有法勢大和尚威儀從儀少屬少録等稱是嵗其國度僧萬人定心姓平氏日本國京東相州行香縣上守鄉光勝寺僧也咸淳壬申臨安民家因出郊得佳菌作羮恣食是夜鄰人聞其家撞突有聲久乃寂然疑有他故遂率衆排闥而入則其夫婦一女皆殞越嘔血倚壁抱柱而死矣案間尚餘杯羮以俟其子適以未還幸免於毒囘囘國數千里地産一物極毒全𩔖人形若人参之狀其國名之曰押不蘆生土中深數丈人或誤觸其毒氣必死取之法先於四旁開大坎可容人然後以皮條絡之皮條之系則繋於犬之足既而用杖撃逐犬犬逸而根㧞起犬感毒氣隨斃就埋土坎中經嵗然後取出曝乾别用他藥製之每以少許磨酒飲人則通身麻痺而死雖加以刀斧亦不知也至三日後别以少藥投之則活葢古華佗能刳腸滌胃以治疾者必用此藥也今聞御藥院中亦儲之宋景文筆記謂蜀中有蓮大如雀鷇葉舒如錢幹亦有絲其蕚盛開則向日朝指東停午遡南夕則西指隨日所至蜀人名曰朝日蓮按鄭熊番禺雜記海南有向日蓮花似木芙蓉而極香其花東西向日至暮而謝一呼夜合然則朝日蓮不特蜀中有也京師中太乙宫道士房有楮結子如楊梅徽宗車駕臨觀之題擬梅軒李似矩呉正仲皆有詩正仲詩云陰隂緑葉不勝垂著子全多欲壓枝却得君王留一顧故應雨露亦饒滋五月霏霏雨不開若耶溪畔摘楞梅朱凡忽向靈窻見疑是雲根越嶺來雖將􅁡漬借㣲酸小摘曽聞飣玉盤争似江南風致在瓶紅初向緑陰看越中楊梅最佳土人謂之楞梅又北人以梅汁漬楮實益以􅁡假作楊梅故仲至後二篇皆及之鳥獸第五十九彭蠡小龍顯異至多人人能道之熙寧中王師南征有軍仗數十船泛江而南自離真州即有一小蛇登船船師識之曰此彭蠡小龍也當是來䕶軍仗耳典者以潔器薦之蛇伏其中船乘便風日棹數百里未嘗有波濤之恐不日至洞庭蛇乃附一商人船囘南康世傳其封域止於洞庭未嘗踰洞庭而南也有司以狀聞詔封神為順濟王遣官林希言子中致詔子中至祠下焚香畢空中忽有一蛇墜祝肩上祝曰龍君至矣其重一臂不能勝徐下至几案間首如龜不𩔖蛇首也子中致詔意曰使人至此齋三日然後致祭王受天子命不可以不齋戒蛇徑入銀香奩中蟠三日不動祭之日既酌酒蛇乃自奩中引首吸之俄出循案行色如溼胭脂爛然有光穿一剪綬花過其尾尚赤其前已變為黄矣正如雌黄色又過一花復變為緑如嫩草色少頃行上屋梁復乘紙旛脚而下輕若鴻毛倐忽入帳中遂不見明日子中還船在船後送之踰彭蠡而囘此龍恒遊舟檝間與常蛇無辨但蛇行必蜿蜒而此乃直行江人以此辨之銕圍山叢談曰小龍靈異見諸傳説甚悉崇寧中淮水暴漲而汴口檣舟不能進一日昩爽小龍出運綱之舟尾有柁工之婦不識也謂是蜥蜴撥置之則又縁柁而上婦怒舉火柴撃其首隨撃霹􅋬大震一聲汴口官私船七百隻皆自相撞撃至碎死數十百人朝廷聞而不樂苐命官為賑䘏焉㑹𤼵運使上訃而小龍復出大漕窘懼乃焚香祝之願與王偕上計入覲天子可乎龍即作喜悦狀因舉身入香奩中不動大漕遂携至都輦先以示魯公得奏聞上遣使索入内為具酒核以祝之龍輒躍出匳中两爪據金杯飲幾釂於是天子異之取大琉璃􅇲貯龍為親加封識焉降付都門外汴水龍祠中一夕封識宛如故視􅇲中則已變化去矣上喜加封四字仍大厰其祠宇至大觀末魯公讁東南舟行始抵汴口而小龍又出迓魯公然小龍所𨽻南北當江湖間素不至两浙也政和壬辰魯公在錢塘居鳯山之下私第以正月七日小龍忽出佛堂中於是家人大小咸歎異疑必有故明日而召命至復加六字王及靖康之初家破魯公貶嶺外余從行至江陵將遵陸至鼎灃間公畏暑因改舟行憩渚宫之沙頭一倉官􅅟舍纔弛擔則小龍復出見魯公為之涕下且感念龍神乃不忘恩舊如此余戲公曰固知小龍之必來爾公愕詢其故余曰此亦出公之門也茍每每加意於是無世情者則今日必來使此龍一出世間有世情當又不來是烏足辱人懐抱耶公乃收淚而笑處士李璞居壽春一日登樓見淮灘雷雨中一龍騰拏而上雨霽行灘上得一蚌頗大偶拾視之其中有龍蟠之跡宛然鱗鬛爪角悉具雁宕山中有潭深窅不測石壁上鎸螺龍郡三字不知何時書也晴晝日光下注髣髴見一螺殼大如數石甕龍出其中與此政𩔖横海清池縣尉張澤居於鄆州東城夜自莊舍還而月色昏暗殆不辨跡偶遇道傍木枝奕然有光因折以燭路至家挿壁間醉不復省矣晨起取視則枝間一龍蛻大如新蟬之殻頭角爪尾皆具中空而堅扣之有聲如玉石且光瑩奪目遇暗則光燭於室遂寶之傳玩好事沈中老云紹聖間其從兄為青州幕官因修庭前葡萄架亦得一蛻形體皆如張者獨無光彩耳神龍變化故無巨細但不知有光無光又何謂也成都府園西樓有大蟒居之率嘗扄鎖虞經臣作帥宴客樓下蟒忽遺溺正中一武臣之肩須㬰皮肉潰爛成瘡得妙藥治之方愈經臣為文遣吏祭之即日毁樓蟒亦不見太宗朝府州折御卿貢馬特異格不甚髙而日行千里口傍有碧紋如雲霞因名曰碧雲霞上征太原徃來乘之上下山嶺如履平地上則屈前足下則屈後足上下如坐安輿不知登降髙下之勞圉人供芻粟或少倨則嘶鳴奮躍踶齧不已此尤異他馬也上崩悲鳴不食骨立人不忍視真宗遣從靈駕至永熙陵乃斃詔與桃花犬同坎􅄟義騟者九江戍校王成之鎧騎也成家世𨽻赤籍開禧間金大入淮甸成以卒從戎四方山屢戰有功稍遷將候騎方淮民習安倉卒間賊至而逃畜孽滿野成徇地至花靨見病騟焉疥而瘠骨如堵墻行逐水草步且僵烏鳶啄其上流血赭髀莫適為主縶而得之㑹罷兵歸飼以豐秣幾半年膚革僅完毛耏復生日置之槽􅌴憖憖然與羣馬不相顧時一出繋廡下顧景嘶鳴若自慶其有所遇成亦未始異之牙治在城陬每旦與同列之𨽻帳下者率夜漏未盡二刻騎而徃屏息庭槐下執撾候晨雁鶩行立俟頤指午退以為常馬或䠞薾不任相通融為假借一日有告馬病從成請騟徃始命鞍踶鳴人立左右驤拒不可制易十數健卒莫能孰何乃以歸之成成曰安有是呼常馭羸卒持鞚來則帖耳馴服如平時振迅通衢罄鞚緩亟無少忤者自是惟成乘則受之他人則復弗受雖日浴於河羣馬皆裼而騎相望後先騟之馭者終莫敢竊睨其膺鬛稍前即噬囓之軍中咸指為駑悍擯弗齒嘉定庚午峒冦李元礪盜弄潢池兵庚符下統府調兵三千人以徃成與行﨑嶇山澤坦若方􅁤至吉之月餘冦來犯龍泉柵成出摶鬬四五合幾敗之矣或以鈎出其腋及鞬而墜死焉官軍亟鳴鉦騟屹立不去躑躅徘徊悲鳴屍側賊將顧曰良馬也取之元礪有弟悍狠恃勢每出掠率强取十二三適見之色動曰我欲之將不敢逆遂試之蹴踘進退折旋良愜即不勝喜貯以上廏煮豆粟濯泉翦􅎗用金玉為鎧華韉沃續極其鮮明羣渠皆釃酒來賀輜重卒有為賊掠取者知之曰騟他日未嘗若是彼畜也而亦畏賊耶竊怪之於是日遊其騟於峒􅀈間上下峻坂無不如意恨得之晚思一快意馳騁而地多阻且不可得後旬浹復犯永新柵官軍聞有冦至拔鹿角出迎撃鼓聲始殷果乘騟以來騟識我軍旗幟亟馳賊覺有異大呼挽勒不止則怒以鐵槊撃之胯盡傷騟不復顧冐陣以入軍士識之者曰此王校之騟也是異服者必其魁相與逐之執以下訊而得其實則縛以徇於軍曰得元礪之弟矣譟而進賊軍大駭軍士踴躍争奮遂敗之急露羽書以出竒𫉬醜聞檻送江右道朝廷方患其跳梁日徯吉語聞而嘉之第賞有差衆恥其功之出於馬也没騟之事騟之義遂不聞於時居二日騟歸病傷不秣而死稗官氏曰孔子曰驥不稱其力稱其徳也今視騟之事信然夫不茍受以為正報施以為仁㢲以用其權而決以致其功又卒不失其義以死非徳其孰能稱之耶彼仰秣而戀豆厯跨下而不知恥因人而成事者雖有奔塵絶景之技才不勝徳嫓之駑駘何足􅈫乎余意君子之將有取也而居是鄉詳其事故私掇取著於篇唐興元有知馬者曰李㓜清暇日常取適於馬肆有致悍馬於肆者結繅交落其頭二力士以木挺叉其頤三四輩執撾而從之馬氣色如將噬有不可馭之狀㓜清迫而察之訊於主者且曰馬惡無不具也將貨焉惟其所酬耳㓜清以三萬易之馬主慚其多既而聚觀者數百輩詰㓜清㓜清曰此馬氣色駿異體骨徳度了非几馬是必主者不知俾雜駑輩槽棧陷敗糞穢狼籍刷滌不時芻秣不適蹄齧蹂奮蹇跂唐􅋓志性鬱塞終不得伸久無所賴𤼵而狂躁則無不為也既晡觀者少間乃别市以新絡頭㓜清自持徐而語之曰爾才性不為人知吾為汝易是鏁結穢雜之物馬弭耳引首㓜清自負其知乃湯沐剪刷别其槽棧異其芻秣數日而神氣小變踰月而大變志性如君子步驟如俊又嘶如龍顔如鳯乃天下之駿乘也畢再遇兖州驍將也開禧用兵屢立戰功金人認其旗幟即避之屢遷至鎮江都統制揚州承宣使驍衛上将軍後以老病致仕始居於霅有戰馬號黒大蟲駿駔異常獨主翁能馭之再遇既死其家以鐵絙羈之闌中適遇嶽祠迎神聞金鼓聲意為赴敵於是長嘶奮迅斷絙而出其家慮傷人命健卒十餘挽之而歸乃好言戒之云将軍已死汝莫生事累我家馬聳耳以聴汪然出涕喑啞長鳴數聲而斃熊居山中雖行數千里悉有潛伏之所必在石嵓枯木中山民謂之熊館惟虎出百里外則迷不知路世傳補助竒僻之品有所謂山獺者云以少許磨酒飲之立驗然本草醫方皆所不載止見桂海虞衡志云出宣州溪峒峒人云獺性淫毒山中有此物凡牝獸悉避去獺無偶抱木而枯峒獠尤貴重之能解箭毒中箭者研其骨少許傅之立消其土人號之曰挿翹一枚值黄金數两抱木枯死者土人自稀得之殺死者功少劣私貨出界者罪至死方春時􅍹女數十歌嘯山谷以尋藥挑菜為事獺一聞婦人氣輒躍升其身粘骨而入牢不可脱因扼殺而藏之土人驗之之法令婦人摩手極熱取置掌心以氣呵之即趯然而動然其地亦不常有或累數嵗得其一則其人可立致富矣范忠宣宰襄邑有二鳥𩔖鸛􅁅羽赤喙數遊囿中衆見其異以計羅得畜而馴之愛食虵虺纔入口中即為水半年一縣虵虺幾盡竟不知其名也有廣南賈者過見之曰此檀雞毒鳥也後其一死居無何忠宣閲廣南異物志曰檀雞鴆鳥之别名始大駭即命殺而焚􅄟之至和中彭乘赴任邕至金城驛方具食聞如以手搭腰鼓聲問郵卒曰何處作樂曰非也乃鴆鳥禁蛇鬼車俗稱九頭鳥陸長源辨疑志又名渠逸鳥世傳此鳥昔有十首為犬噬其一至今血滴人家為災咎故聞之者必叱犬滅燈以速其過澤國風雨之夕徃徃聞之六一翁有詩曲盡其悲哀之聲然鮮有睹其形者淳熙間李壽翁守長沙嘗募人捕得之身圓如箕十脰環簇其九有頭其一獨無而鮮血㸃滴如世所傳每脰各生两翅當飛時十八翼霍霍競進不相為用至有爭抝折傷者景定間周漢國公主下降賜第嘉會門之左飛樓􅃨道近接禁篽主嘗得疾一日正晝忽有九頭鳥踞主第擣衣石上其狀𩔖野鳬而大如箕哀鳴啾啾畧不畏憚命弓射之不中而去是夕主薨鼔山有老僧曽登靈源洞見一禽自海上至身大如牛翼廣二丈餘下村疃間低飛掠食俄攫二大羖羊復望海而去識者云是虎鷹能捉捕虎豹紹興二十六年淮宋之地將秋收粟稼如雲而蝗蟲大起翻飛蔽天所過田畝頃刻而盡未幾有水鳥名曰鶖形如野鶩而髙且大脰有長嗉可貯數斗物千百為羣更相呼應共啄蝗盈其嗉不食而吐之既吐復啄連城數十邑皆若是才旬日蝗靡孑遺嵗以大熟徐泗上其事於金廷下制封鶖為䕶國大將軍萬安軍南並海石崖中有道士年八九十嵗自言本交趾人渡海船壊於此崖因庵焉養一雞大如倒挂日置枕中啼即夢覺又畜玉獅小於蝦蟆風度清癯以線繋几案間道士喚則跳躑登几唇危坐分殘顆而食之又有龜狀如錢置合中時掲其葢使出戲衣袖間予謁之出此三物從予乞詩余熟視曰公小人國中引道者吾詩俚詎能募寫髙韻邕宜以西南丹諸蠻皆居窮崖絶谷間有獸名曰埜婆黄髮椎髻跣足裸形儼然一媪也上下山谷如飛猱自腰以下有皮纍垂盖膝若犢鼻力敵數壯夫喜盜人子女然性多疑畏罵已盜必復至失子家窺伺之其家知為所竊則集鄰里大罵不絶口徃徃不勝罵者之衆則挾以還之其羣皆雌無匹偶每遇男子必負去求合嘗為健夫設計擠之大壑中展轉哮吼脛絶不可起集衆刺殺之至死以手䕶腰間不置剖之得印方寸瑩若蒼玉字𩔖符不可識非鎸非鏤葢自然之文然亦竟莫知其所寶何用也河州有禽名骨托狀𩔖雕髙三尺許常以名自呼能食鐵石郡守每置酒輒出以示坐客或疑鐵石至堅非可食之物乃取三寸白石繋以絲繩擲其前即啄而吞之良久牽出視石已軟爛如泥矣夔峽間有子母鵲比常鵲差大雌雄未嘗相離虞者必雙得之閉雌於籠中縱雄出食食飽輒歸縱雌亦然若雙縦則徑去不復返矣髙廟駐蹕建康有大赤鸚鵡自江北來集行在承塵上口呼萬嵗宦者以手承之鼓翅而下足繫小金牌有宣和二字因以索架置之畧不驚怪比上膳時行在草草無樂鸚鵡大呼卜尚樂起方響久之曰卜娘子不敬萬嵗葢道君時掌樂宫人以方響引樂者故猶以舊格相呼髙廟為罷膳泣下後此鳥持至臨安忽死髙宗親為文祭之云金距絳裳何意朱紫乘軒駭散纒羅鬬死不逺長江來自汴水匪饑則附曰忠自矢謝跡雲端投身禁裏每呼舊人以勵近侍禽言若斯鳥官誰似云胡委羽歸魂鶉尾借號有烏來朝無雉漸肯為儀厯仍輝紀尚饗宸翰灑灑一時大手當為閣筆髙宗宫中養鸚鵡數百髙宗一日問之曰頗思鄉否鸚鵡曰思鄉遂遣中使送歸龍山後數年有使臣過隴山鸚鵡問曰上皇安否使臣曰上皇崩矣鸚鵡聞之皆悲鳴不已使臣賦詩曰隴口山深草木黄行人到此斷肝腸耳邊不忍聴鸚鵡猶在枝頭説上皇蔡丞相持正謫新州侍兒從焉善琵琶遂名之素養一鸚鵡甚慧丞相欲召琵琶即一扣響板鸚鵡𫝊呼琵琶逝後一日誤扣響板鸚鵡猶傳言丞相大慟感疾不起嘗為詩云鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸宋時有秦吉了能人言倭蠻欲以錢十萬貨之主人告吉了曰貧故貨汝吉了云戀主人不願向他去因不食死厓山宋亡時有白鷴在籠見帝入水遂躑躅哀鳴竟與籠同墜水中竹雞之性遇其儔必鬬取之者掃落葉為城置媒其中而𨼆身於後操網馬激媒使之鳴聞者隨聲必至閉目飛入城直前欲鬬而網已起無脱者葢目既閉則不復見人鷓鴣性好潔獵人於茂林間浄揮掃地稍散榖於上禽徃來行遊且步且啄則以粘竿取之麂行草莽中畏人見其跡但循一逕無問逺近也村民結繩為繯置其所行處麂足一絓則倒懸於枝上乃生𫉬之閩中好食蜂子人不能識其穴徃來以長紙帶粘於肉蜂見之必銜入穴乃躡尋得之熏取其子蟲鳥之智自謂周身矣如人之不仁何鸂鶒能勅水故水宿而物莫能害鴆能巫步禁蛇啄木遇蠧穴以嘴畫字成符印蟲自出鵲有𨼆巢木故鷙莫能見燕啣泥避戊巳日故巢不傾鸛有長水石故能於巢中養魚而水不涸燕惡艾雀欲奪其巢即啣艾置巢中燕輒避去淮南諺曰雞寒上樹鴨寒下水驗之皆不然有一媪曰雞寒上距鴨寒下嘴耳上距謂縮一足下嘴謂藏其咮於翼間廣陵牛氏家堂燕方育雛而雌為猫所斃雄啁唽久之翻然而逝少選引一雌偕來共哺其子明日有雛墜地至晚羣雛畢死取視之滿吭皆卷耳實葢為雌所毒也嗟乎禽鳥嫉其前雛一至於此羅州山中多孔雀雌者尾短無金翠雄者尾大而緑光翠奪目然自愛其尾欲棲息必先擇致尾之地南人捕者先施網􅅈須俟甚雨尾霑而重不能髙翔初為所擒則雀欲展其翅恐傷其尾至死尚愛䕶之土人有活取其尾者持刃於叢篁幽閴處藏蔽其身伺其過則急斷其尾不急斷􅂞首一顧即金彩無復光翠故生者為貴也為婦人首飾及扇拂之𩔖或生擒𫉬者餉饋如京洛間鵝雁以充口腹其味亦如之解百毒人食其肉飲藥無驗其首與血解大毒蛇與孔雀偶得其卵者使雞伏即成其名曰都䕶初年生緑毛三年生小尾生小火眼五年生大火眼大尾乃成始春而生三四月後復彫與花蕚相榮衰每至晴明軒翥其尾自􅂞顧視之謂之朝尾須以一間房前開窻牖面向明方東西照映向裏横以木架令棲息其性愛向明飼之以米榖豆麥勿令闕水與養雞無異每至秋夏於田野中拾螽斯蟋蟀活蟲餵飼之凡欲餵飼引於􅈦事上令慣見賓客又盛夏或患眼痛可以鵝翎筒子灌少生油以新汲水洗之如眼不開則擘口餤以小魚鰕不爾餓損及切蒻少許餤之貴其涼冷如食有餘則愈切不可與鹹酸物食食則減精神昏暗毛色馴養頗久見婦女童􅆆彩衣綬帶必逐而啄之或芳時媚景聞絲竹歌吹之聲必舒張翅尾眄睞而舞若有意焉五臺山有鳥名寒號蟲四足有肉翅不能飛其糞即五靈脂當盛暑時文彩絢爛乃自鳴曰鳯凰不如我比至深冬嚴寒之際毛羽脱落索然如鷇雛遂自鳴曰得過且過嗟夫世之人中無所守者率不甘湛涪鄉里必振拔自豪求尺寸名詫九族儕𩔖則便志滿意得出肆入揚以為天下無復我加矣及乎稍遇貶抑遽若喪家之狗垂首貼耳搖尾乞憐惟恐人不我恤視寒號蟲何異哉是可哀已北方凡皂鵰作巢所在官司必令人窮巢探卵較其多寡如一巢而三卵者置卒守䕶日覘視之及其成鷇一乃狗耳取以飼養進之於朝其狀與狗無異但耳尾多毛羽數根而已田獵之際鵰則戾天狗則走陸所逐同至名曰鷹背狗養鷹鸇者其𩔖相語謂之㕲潄㕲音以麥反三館書有㕲潄三卷皆養鷹鸇法度及其醫療之術杜詩江湖多白鳥天地亦青蠅人多指白鳥為鷺非也説者謂是蚊蚋梁元帝金樓子云齊威公卧于栢寢白鳥營饑而求飽公開翠紗之厨而進焉有知禮者不食而退有知足者雋永而退有不知足者長嘘短吸而食及其飽也腹為之潰葢戒夫貪也内庫書中金樓子有李後主手題曰梁元帝謂王仲宣昔在荆州著書數十篇荆州壊盡焚其書今在者一篇知名之士咸重之見虎一毛不知其斑後西魏破江陵帝亦盡焚其書曰文武之道盡今夜矣何荆州焚書一語前後一轍也詩以弔之曰牙籖萬軸裹紅綃王粲書同付火燒不是祖龍留面目遺篇那得到今朝卷皆薛濤箋所鈔惟今朝字誤作金朝徽廟惡之以筆抹去後書竟如䜟入金也處士劉易𨼆居王屋山嘗於齋中見一大蜂􅇢於蛛網蛛徃逼蜂反為所螫墜地俄頃蛛鼓腹欲裂乃徐徐行入草嚙芋梗㣲破以瘡就嚙處磨之良久漸消輕捷如故闗中無螃蠏元豐中秦州人家收得一乾蠏土人怖其形狀以為怪物每人家有病瘧者借去挂門戸上徃徃遂差不但人不識鬼亦不識也蝗飛或墜陂浸中輒化為蝦有漁人置網湖側蝗墜壓網至没漁人輒有喜色明日舉網得蝦數斗狗最畏寒凡卧必以尾掩其鼻方能熟睡或欲其夜警則翦其尾鼻寒無所蔽則終夕警吠宋稗𩔖鈔卷三十五
