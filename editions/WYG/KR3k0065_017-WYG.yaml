body:
  text: 宋稗𩔖鈔卷十七常熟潘永因編頤養第二十八東坡云養生之方以胎息為本此固不刋之語更無可議但以氣若不閉任其岀入則𣺌綿滉漭無卓然近效待其兀然自住􅂲終無此期若閉而留之不過三五十息奔突而岀雖有微暖養下丹田此一於迂決非延世之術近日沉思似有所得盖因看孫真人養生門中調氣第五篇反覆尋究􅂲是如此其畧曰和神之道當得宻室閉户安床暖席枕髙二寸半正身偃仆暝目閉氣於胸膈間以鴻毛着鼻上而不動經三百息耳無所聞目無所見心無所思則寒暑不能侵蜂蠆不能毒夀三百六十嵗此鄰於真也此一叚要訣且静心細意字字研究看既云閉氣於胸膈中令鼻端鴻毛不動初學之人安能持三百息之久哉􅂲是元不閉鼻中氣只是意堅守此氣於胸膈中令出入息似動不動氤氲縹緲如香爐盖上烟湯餅嘴上氣自在出入無呼吸之重煩則鴻毛可以不動若心不起念雖過三百息可也仍須一切依此本訣卧而為之仍須真以鴻毛粘着鼻端以意守氣於胸中遇欲吸時不免微吸及其呼時不免微呼但任其氤氲縹緲微微自出出盡氣平則又吸入如此出入元不斷而鴻毛自不動動亦極微覺其極微動則又加意則勒之以不動為度雖云則勒然終不閉至數百息出者多則内守充盛血脉流通下相灌輸而生理備矣余悟此𤣥意甚以為竒又記張安道養生訣云此法比之服藥其力百倍非言語所能形容其訣大畧具于右以子時後三更三四㸃至五更以来披衣坐床上擁被坐亦可面東或南盤足坐叩齒三十六通握固兩母指揑第三指手文或以四指都握毋指兩手拄腰腹間亦可閉息閉息最是道家要妙先須閉目静慮除滅妄想使心源湛然諸念不起自覺出入調均徼細即閉口并鼻不令出氣方是工夫也内視五臓肺白肝青脾黄心赤腎黒當先求五臓圖或烟蘿子之𩔖常掛壁上使目常熟識五臓六肺之形状也次想心為光明洞徹入下丹田丹田在臍下三寸是時腹滿氣極則徐徐出氣不得令耳聞聲侯出息均調即以舌攪唇齒内外潄煉津液若有鼻涕亦湏潄煉不可嫌其穢潄煉良久自然甘美即此真炁也未得嚥下復前法閉息觀納心丹田調息潄津皆依前法如此者三津液滿口即低頭嚥下丹田中須用意精猛令津與氣谷谷然有聲徑入丹田中又依前法為之凡九閉息三嚥津而止然後以左右手熱摩兩脚心此湧泉空徹頂門氣訣之妙及臍下腰脊間皆令熱徹徐徐摩手微汗不可力不可喘次以兩手摩熨眼面耳頂皆令極熱仍按揑鼻左右五七次梳頭百餘梳散髪而卧熟寝分明右其法至簡易惟在常久不廢即有深功且試行二十日精神便自不同覺臍下實熱脚力輕快面目有光久之不已去仙不逺但當存閉息使漸能持久以脉候之五至一息某近来閉漸久毎一閉一百二十至而開盖已閉得二十餘息也又不可强閉多時使氣錯亂或奔突而出則反為害也慎之慎之又須常節晚食令腹中寛虚氣得回轉晝日無事亦得閉目内觀潄煉津液嚥之摩熨耳面以助真氣但清静為法専一易見功矣神仙至術不可學者三一忿躁二隂險三貪慾道家胎息之法以𤣥牝為鼻鼻者氣之所由出入以為息也佛蔵中有安般守意經云其法始於調身簡息以為凡出入鼻中而有聲者風也雖無聲而結滯猶粗悍而不細者氣也去是二者乃謂之息然後自鼻端至臍下一二數之至於十周而復始則有所繫而趨於定則又數以心隨息聴其出入如是反復調和一定而不可亂則生滅道斷一切三昧無不現前道士陳彦真常教人令常寄其心納之臍中想心火烈烈下注丹田如是坐卧起居不廢行之既久覺臍腹間如火則舊疾盡除矣東坡謂李方叔與李祉言曰某生平於寝寐時自得三昧吾初睡時且於床上安置四體無一不稳處有一未稳須再安排令稳既稳或有些小倦痛處畧按摩訖便瞑目聴息既匀直宜用嚴整其天君四體雖復有疴癢亦不可少有蠕動務在定心勝之如此食頃則四肢百骸無不和通睡思既至雖寐不昏吾毎日須於五更初起櫛髪數百頮面盡服裳衣畢須於一浄榻上再用此法假寐數刻其味甚美無涯通夕之味殆非可比平明吏徒既集一呼即興冠帯上馬率以為常二君試用吾法自當識其􅃐慎無以語人也天下之理能戒然後能慧盖慧性圓通必從戒謹中入未有天君不嚴而能覺悟圓通者此也二君試識之東坡云嶺南天氣卑陋氣蒸溽而海南尤甚秋夏之交物無不腐壊者人非金石其何以能久然儋耳頗有老人百有餘嵗者往往皆是八九十歲者不論也乃知夀夭無定習而安之則氷蠶火鼠皆可以生吾當湛然無思寓此覺於物表使折膠之寒無所施其洌流金之暑無所措其毒百餘歲何足道哉彼愚老人初不知此特如蠶䑕生於其中兀然受之而已一呼之温一吸之凉相續亡有間斷雖長生可也荘子曰天之穿之日夜無間人則固塞其竇豈不然哉九月二十七日秋霖不已顧視幃帳間有螻蟻帳已腐爛感歎不已信手書此時戊寅嵗也孟子曰養心莫善於寡欲老子曰不見可欲使心不動聖賢拳拳然以欲為害道可不慎乎劉元城南遷日嘗求教於涑水翁曰聞南地多瘴設有疾以貽親憂奈何翁教以絶欲少疾元城時盛年乃毅然持戒惟謹趙清獻張乖崖至撫劒自誓甚至以父母影像設之帳中盖遣欲之難如此坡翁亦云服氣養生難在去欲蘇子卿嚙雪啖氊蹈背出血無一語少屈可謂了然生死之際然不免於娶婦生子窮海之上且如此况洞房綺紈之下乎乃知此事未易消除香山翁佛地位人晚年病風放妓猶賦不能忘情吟王處仲兇悖小人知體敝於色乃能一旦感悟開閤放妓盖天下事勇决為之乃可進道坡公云前日與歐陽叔弼􅄯無咎張文潛同在戒壇予病目昏将以熱水洗之文潛曰目忌㸃洗目有病當存之齒有病當勞之不可同也又記魯直語云治目當如治民治齒當如治軍治民當如􅈠参之治齊治軍當如商鞅之治秦頗有理故追録之􅄯文元公年四十始娶前此未嘗知有女色早從劉海蟾自言得長生之術六十後即兼窮佛理嘗聞天樂和雅之音有不可勝言者自見其形毎毎在前既久而加小𩔖數寸不違眉睫之間此􅂲是所得於海蟾者弁陽老人曰飽食緩行初睡覺一甌新茗侍兒煎脱巾斜倚䋲床坐風送水聲来耳邉丁崖州詩也細書妨老讀長簟惬昏眠取簟且一息抛書還少年半山翁詩也相對蒲團睡味長主人與客兩相忘須㬰客去主人覺一半西窓無夕陽放翁詩也讀書已覺眉稜重就枕方欣骨節和睡起不知天早晚西窓斜日已無多吳僧有規詩也老讀書文興易闌須知養病不如閒竹床瓦枕虚堂上卧看江南雨後山吕滎陽詩也紙屏瓦枕竹方床手倦抛書午夢長睡起莞然成獨笑數聲漁笛在滄浪蔡持正詩也余習懶成癖毎遇暑晝必須偃息客有嘲孝先者必哦此以自觧然毎苦枕熱展轉數四後見前輩言荆公嗜睡夏月常用方枕或問何意曰睡久氣蒸枕熱則轉一方冷處此非真知睡味未易語此也杜牧有睡癖夏侯𨼆號睡仙其亦知此乎又云花竹幽窓午夢長此中與世暫相忘華山處士如容見不覓仙方覓睡方然則睡亦有方耶希夷之説不過謂舉世以為息魂離神不動耳遺教經有煩惱毒蛇睡在汝心睡蛇既出乃可安眠之説近世西山蔡季通有睡訣云睡側而屈覺正而伸早晚以時先睡心後睡眼晦菴以為此古今未發之妙然睡心睡眼之語本出千金方季通特引之耳鄭景望䝉齋筆談云余中年少睡盖老人之常無足怪者毎夜寐過分輒不能再睡展轉一榻間胸中既無纎塵頗覺心志和悦神宇凝静有不能名者時聞䑕嚙唧唧有聲亦是一樂事當聞老僕鼻如雷間亦為囈語或悲或喜或歌聴之為啟齒意其亦必自以為得而余不得與也昔在頴州時居後圃三間小屋旁無與隣左右惟一黥意况已如此嘗有詩云城頭曉漏已丁丁窓間落月却未明衡陽歸雁過欲盡汝南􅂽雞初一鳴悠悠㫁夢了不記草草微吟還獨成人生得意須㡬許一睡稍足無餘情迨今四十年了無異者毎自料非世間享福人平生大得志處不過如是耳佛與波斯匿王論見恒河性有味其言也䕶聖楊老説被當令正方則或坐或睡更不須覓枝頭此言大是又云平旦粥後就枕粥在腹中暖而宜睡天下第一樂也官中𨼆士駱耕文道常言修養之士當書月令置坐左右夏至宜節嗜欲冬至宜禁嗜欲盖一陽初生其氣微矣如草木萌生易於傷伐故當禁之不特節也且嗜欲四時皆損人但冬夏二至隂陽相争之時大損人耳僕曰不獨月令如此唐栁公度年八十有强力人問其術對曰吾生平未嘗以脾胃熟生物暖冷物以元氣佐喜怒此亦可為座右銘也耕道曰然李博宣和間仕大府卿因職事陛對徽宗問曰知卿年彌髙而色不衰中外稱卿有内丹之術可具術以進博曰陛下盛徳廣淵睿智日新學有緝熙於髙明臣雖不學敢以誠對謹領聖訓容臣具術以進明日乃進曰臣聞内觀所以存其心也外觀所以養其氣也存其心養其氣則真火爐鼎日炎神水華池日盛矣長生久視上下與天地同流天道運而不積聖人知而行之太道甚易知其易行以簡以簡易而天下之理得也人之所恃以生者氣也氣住則神住神住則形住形住則長生久視自此始矣盖日月運轉寒暑往来天地所以長久吹嘘呼吸吐故納新真人所以治世故丹元子曰形以神住神以氣集氣體之充也形神之舍也氣實則成氣虚則敚氣住則生氣耗則滅此廣成子所以保氣而煙蘿子所以煉氣也然則一言而盡保煉之妙者其惟嚥納乎故曰一嚥二嚥雲蒸雨至三嚥四嚥内景充實七嚥九嚥心火下降腎水上升水火既濟則内丹成可以已疾可以保生可以延年可以超昇臣謹刪其繁紊撮其樞要直書其妙以著於篇上篇曰進火侯毎日子後午前若於五更初陽盛時尤佳就坐榻上面東或南握固盤足合目拄腰而坐澄心静慮内藏五藏仰面合口鼻中引出清氣氣極則生要而嚥之毎一嚥縮榖道一縮再引則再如之至再至三若氣極不能任則低頭㣲開口以吹寧出勿令耳聞出氣之聲如此凡三次是為進火一周天俟氣調匀然後行水下篇曰行水候進火鼻中取鼻涕口中取液聚為一處多多益辦俟甘而熱即閉口仰面亞腰左顧一嚥正中一嚥分三嚥而下内想一直下丹田毎一嚥亦縮榖道一縮如此一遍是為行水一周天毎進火行水畢然後下榻行履自如後敘曰五行水火為初人生水火為急此是極易之要法上奪天地造化學道修真之士初行頓覺臍下如火飲食添進四肢䡖快是其騐也行而久之則髪白再黒齒落重生精神全具復歸嬰児寒暑不能侵鬼神不能冦千二百嵗夀比彭老漸為真人矣徽宗見而嘉納之梁師成録其說以示人乃簡易之道苐行之者不能悠久耳或曰虞謨君明修養有得亦祗行此法也唐仲俊年八十五六極康寕自言少時因讀千字文有所悟謂心動神疲四字也平生遇事未嘗動心故老而不衰導引家云心不離田手不離宅此語極有理又云真人之心如珠在淵衆人之心如泡在水此善譬喻者葉石林曰天下真理日見於前未嘗不昭然與人相接但人役於外與之俱馳自不見耳惟静者乃能得之余少嘗與方士論養生因及子午氣升降累數百言猶有祕而不肯與衆共者有道人守榮在傍笑曰此何難吾嘗坐禪至静定之極毎子午覺氣之升降往来於腹中如飢飽有常節吾豈知許事乎惟心内外無一物耳非止氣也凡寒暑燥濕有犯於外而欲為疾者亦未嘗悠然不逆知其萌余長而騐之知其不誣也在山居久見老農候雨𤾉十中七八問之無他曰所更多耳問市人則不知也余無事常早起毎旦必步户外往往僮僕皆未興其中既洞然無事仰觀雲物景象與山川草木之秀而志其一日為隂為晴為風為霜為寒為温亦未嘗不十中七八老農以所更吾以所見其理一也乃知惟一静大可以察天地近可以候一身而况理之至者乎豐城李仲武嘗言丹徒令以捕冦徙官令初尉臨海得冦魁年八十筋力絶人盛寒卧地飲氷了不畏人皆妖妄疑之既就捕令訊無他自言年三十許時有道人告云凡物經火乃能夀土赴水即潰為瓦礫乃至千年木仆地即朽炭之埋沒更堅緻人之灼艾猶是也用其語嵗炙丹田百炷行之盖四十餘年矣盗既坐棄市令宻使人决其腹視之有白膜總於臍臍若芙蕖状披之凡數十重豈一嵗一膜耶閒情第二十九李煜在國微行娼家遇一僧張席煜遂為不速之客僧酒令謳吟吹弹莫不髙了見煜明俊醖藉甚契合相愛重煜乗醉大書右壁曰淺斟低唱偎紅倚翠大師鴛鴦寺主𫝊持風流教法久之僧擁妓之屏帷煜徐步而出僧妓竟不知煜嘗宻諭徐鉉鉉言於所親焉宋子京多内寵後庭曳綺羅者甚衆嘗宴於錦江偶微寒命取半臂諸婢各送一枚凡十餘枚俱至子京視之茫然恐有厚薄之嫌竟不敢服忍凍而歸潁妓􅈠蘇竒往嵗與悦己者宻約相從而其母禁之至苦不勝抑悒以盛春美景邀同約者聨騎出城登髙塜相對慟哭既而酣飲諸客聞之賞其曠絶於流輩晏元獻聞之為戯題絶句曰蘇竒風味逼天真􅂲是文君向上人何日九原芳草緑大家携酒哭青春丁諷病廢常令兩妓女挟侍見客於堂中諷以好色致疾既廢無賴益求妙年殊質以厭其心客至不能送令一婢子送至中門曰謝訪以故賔客之至者加多乃數倍於未病時歐陽永叔任西京留守推官時親一妓錢文僖一日開宴客集而永叔與妓俱不至移時方来公責妓曰未至何也妓曰患暑往凉堂睡着覺失金􅁫竟未覓得公曰得歐陽推官一詞當為償汝永叔即席云栁外䡖雷池上雨雨聲碎滴荷聲小樓西角㫁虹明闌干倚遍待得月華生燕子飛来棲畫棟玉鈎垂下簾旌凉波不動簟紋平水晶􅀟枕傍有墮􅁫横坐客皆稱善遂命妓滿酌賞永叔而令公庫償􅁫歐陽公坐甥女事謫知滁州時劉煇挟省闈見黜之恨作醉蓬莱詞以醜之其事之誣不待辨也然世所𫝊甥適張氏夫死携孤女歸父家年方七嵗公見而笑曰年方七嵗正是學簸錢時也公有辭云江南栁葉小未成隂人為絲䡖那忍折鶯憐枝嫩不勝吟留取待春深十四五閒抱琵琶尋堂上簸錢堂下走恁時相見已留心何况到如今此詞載錢氏私誌當是錢世昭因公五代史中多毁吳越故假作以汚之耳歐公閒居汝隂時二妓甚穎而文公歌詞盡記之筵上戲約他年當来作守後數年公自維揚果移汝隂其人已不復見矣視事之明日飲同官湖上種黄楊𣗳子有詩留擷芳亭云栁絮已将春色去海棠應恨我来遅後三十年東坡作守見詩笑曰杜牧之緑葉成隂之句耶王都尉晉卿詵既喪蜀國貶均州姬侍盡逐有歌者號囀春鶯色藝雙絶平居屬念不知流落何許後二年内徙汝隂過許昌市傍小樓聞泣聲甚怨晉卿異之問乃囀春鶯也恨不可復得因賦一聫云美人已屬沙叱利義士今無古押衙晉卿毎話此事客有足其章者晉卿覽之尤愴然其詞云㡬年流客在天涯萬里歸来兩鬂華翠袖香殘空悒淚青樓雲𣺌定誰家佳人已屬沙叱利義士今無古押衙回首音塵兩沉絶春鶯休囀沁園花囀春鶯為宻縣馬氏所得後晉卿還朝尋訪微知之作詩云云此云過許昌見之𫝊訛也范文正公守鄱陽郡剏慶朔堂而妓籍中有小鬟妓尚㓜公頗屬意既去以詩寄魏介曰慶朔堂前花自裁便携官去未曽開年年長有别離恨已託東風幹當来介因鬻以遺公今州治有石刻司馬才仲初在洛下晝寝夢一美姝牽惟而歌曰妾本錢塘江上住花落花開不管流年度燕子啣将春色去紗窓㡬陣黄梅雨才仲愛其詞因詢曲名云是黄金縷且曰後日相見於錢塘江上及才仲以東坡先生薦應制舉中等遂為錢塘幕官其􅅟舍後堂乃蘇小小墓在焉時秦少章為錢塘尉續其詞後云斜挿犀梳雲半吐檀板䡖􅃻唱徹黄金縷夢斷綵雲無覓處夜凉明月生南浦不逾年而才仲得疾所乗畫舫􅋈泊河塘柁工遽見才仲携一麗人登舟即前聲喏繼而大起舟尾狼狽走報家已慟哭矣蜀路泥溪驛天聖中有女郎盧氏者隨父往漢州作縣令歸題於驛舍之壁其序畧云登山臨水不廢於謳吟易羽移商聊紓於羈思因成鳳棲梧一曲書之驛壁後之君子覽之者無以婦人竊弄翰為罪詞曰蜀道青天烟靄翳帝里繁華迢逓何時至回望錦川揮粉淚鳳􅁫斜嚲烏雲膩鈿帶雙垂金縷玉珮珠璫露滴寒如水從此鸞粧添逺意畫眉學得遥山翠晁無咎謫玉山過徐州時陳無已廢居里中無咎置酒出小姬娉娉舞梁州無已作减字木蘭花云娉娉裊裊芍藥稍頭紅様小舞袖低徊心到郎邉客已知金尊玉酒勸我花間千萬夀莫莫休休白髪簮花我自羞無咎歎曰人疑宋開府梅花賦清艷不𩔖其為人無已此詞過於梅花賦矣長沙義妓者不知其姓氏善謳尤喜秦少㳺樂府得一篇輒手筆口哦不置久之少㳺坐鉤黨南遷道經長沙訪潭土風俗妓籍中可與言者或舉妓遂往訪少㳺初以潭去京師數千里其俗山獠陋劣雖聞妓名意甚易之及覩其姿容既美而所居復瀟灑可人即京洛間亦未易得咄咄稱異坐語間見几上文一編就視之目曰秦學士詞因取閲皆已平日所作者環視無他文少㳺竊怪之故問曰秦學士何人也妓不知即少㳺具道其才品少㳺曰能歌乎曰素所習也少㳺益怪之曰樂府名家無慮數百若何獨愛此不惟愛之而又習之歌之似情有獨鍾者彼秦學士亦嘗遇若乎曰妾僻陋在此彼秦學士京師貴人焉得至此即至此豈顧妾哉少㳺乃戲曰若愛秦學士徒悦其詞耳使親見其貌未必然也妓歎曰嗟乎使得見秦學士雖為之妾御死復何恨少逰察其誠因謂曰若果欲見之即我是也以貶黜道經於此妓大驚色若不懌者稍稍引退入告母媪媪出設位坐少㳺於堂妓冠陂立坐下北面拜少㳺起且避媪掖之坐以受拜已乃張筵飲虚左席示不敢抗母子左右侍觴酒一行率歌少㳺詞一闋以侑之飲卒甚歡比夜乃罷止少㳺宿衾枕席褥必躬設夜分寝定妓乃寝平明先起飾冠帔奉沃匜立帳外以俟少㳺感其意為留數日妓不敢以燕惰見愈加敬禮将别囑曰妾不肖之身幸侍左右今學士以王命不可久留妾懼貽累又不敢從行惟誓潔身以報他日北歸幸一過妾妾願畢矣少㳺許之一别數年少㳺竟死於藤妓自與少㳺别閉門謝客獨與媪處官府有召辭不𫉬然後往誓不失身以負少㳺一日晝寝寤驚曰吾與秦學士别未嘗見夢今夢来别非吉兆也亟遣僕沿途覘之數日得報乃謂媪曰吾昔以此身許秦學士今不可以死故背之遂衰服以赴行數百里遇於旅館将入門者禦焉告之故而後入臨其喪拊棺繞之三週舉聲一號而絶左右驚救之已死矣秦少㳺侍児朝華姓邉氏京師人元祐癸酉納之嘗為詩云天風吹月入闌干烏鵲無聲子夜閒織女明星来枕上了知身不在人間時朝華年十九後三年少㳺欲修真斷世縁遂遣歸父母家以金帛嫁之朝華臨别涕泣不已少㳺作詩云月霧茫茫曉柝悲玉人揮手㫁腸時不須重向燈前泣百嵗終當一别離朝華既去二十餘日使其父来云不願嫁却乞歸少㳺憐而復取歸明年少㳺出倅錢塘至淮上因與道友議論嘆流光之遄速謂朝華曰汝不去吾不得修真矣亟使人走京師呼其父来遣隨去復作詩云玉人前去却重来此度分携更不回腸㫁龜山别離處夕陽孤塔自崔巍時紹聖元年五月十一日少㳺嘗手書記其事未㡬遂竄南􅂽張文潛初官通許喜營妓劉淑女為作詩曰可是相逢意便深為郎巧笑不須金門前一尺春風髻窓外三更夜雨衾别燕從教燈見淚夜船惟有月知心東西芳草渾相似欲望髙樓何處尋又云未説蝤蠐如素領固應新月學蛾眉引成宻約因言笑認得真情是别離尊酒且傾濃琥珀淚痕更著舊臙脂北城月落烏啼夜便是孤舟腸斷時劉貢父知長安妓有茶嬌者以色慧稱貢父惑之事𫝊一時貢父􅀍召造朝茶嬌逺送之為夜宴痛飲有别詩曰畫堂銀燭徹宵明白玉佳人唱渭城唱盡一盃須起舞闗河風月不勝情至闕歐陽永叔出城迓貢父貢父適病酒未起永叔問故貢父曰自長安路中親識留飲頗為酒病永叔戲之曰貢父非獨酒能病人茶亦能病人多矣國香荆渚田氏侍兒名也山谷自南溪召為吏部員外郎留荆州乞守當塗待報所居與此女為鄰偶見之以為幽閑端羙目所未見後其家以嫁下里貧民因賦水仙花詩寓意云淤泥解出白蓮藕糞壤能開黄土花可惜國香天不管隨縁流落小民家俾高子勉和之後數年山谷卒當時賔客雲散此女既生二子矣㑹荆南嵗荒其夫鬻之田氏家田氏一日邀子勉置酒出之掩袂困瘁無復故態坐間話當時事相與感歎子勉請田氏名曰國香以成太史之志政和三年春子勉客京師㑹王性之問山谷詩中本意因道其詳且為賦詩云南溪太史還朝晩息駕江陵頗婉欵綵毫曾詠水仙花可惜國香天不管將花托意為羅敷十七未有十五餘宋玉門墻迂貴從藍橋庭户怪貧居十年目色遥成處公更不来天上去已嫁鄰姬􅆼窕姿空𫝊墨客􅇻勤句聞道離鸞别鵠悲藳砧無賴鬻蛾眉桃花結子風吹後巫岟行雲夢足時田郎好事知渠久酬贈明月同石友憔悴猶疑洛浦妃風流固可章臺栁寳髻犀梳金􅃫翹尊前初識董嬌嬈来遲杜牧應須恨愁殺蘇州也合消却把水仙花説似猛省西家黄學士乃能知妾妾當時悔不書空作黄字王子初聞此語詳索詩裁與漫淒凉只今驅遣無方法徒使田郎號國香豫章先生弟黄元明宰廬陵縣赴郡㑹座上巾帶偶脱太守諭妓令綴之既畢且俾元明撰詞云銀燭畫堂明如晝見林宗巾墊羞蓬首斜揷花枝線賒羅袖須臾兩帶還依舊倒帶休今後也不須更漉淵明酒寳箧深藏濃香薰透為經十􅃌如葱手葢七娘子也豫章寓荆州除吏部郎中再辭守當塗才到官七日而罷又數日乃去有詩云歐借腰枝栁一渦大梅酌酒小梅歌舞餘細㸃梨花雨奈此當塗風月何葢歐梅當塗營妓也李之儀曰人之幸不幸歐梅偶見録於豫章遂𫝊不朽與杜詩黄四娘何異然豫章又有木蘭花令序云庭堅假守當塗故人庾元鎮窮巷讀書不出入州縣因作此以勸庾酒云庾郎三九常安樂便有萬錢無處著徐熙小鴨水邊花明月清風都占却朱顔老盡心如昨萬事休休莫莫尊前見在不饒人歐舞梅歌君更酌自批云歐梅當時二妓也龍舒人阮閎字閎休能為長短句見稱於世政和間官於宜春官妓有趙佛奴籍中之錚錚也嘗為洞仙歌贈之云趙家姊妹合在昭陽殿因甚人間有飛燕見伊的盡道獨步江南便江北也何曽慣見惜伊情性不解瞋人長帶桃花笑時臉向尊前酒底得見皆特似恁地好能得㡬回細看待不貶眼兒覷着伊將貶眼的工夫看一遍阮官至中大夫累任監司郡守他詞皆𩔖此政和間一貴人未達時嘗游妓崔念四之館因其行第作踏青游詞云識個人人恰正年年歡㑹似賭賽六隻渾四向巫山重重去如魚水兩情美同倚畫樓十二倚畫樓又還重倚兩日不来時時在人心裏擬問卜常占歸計􅂸三八清齋望永同鴛被驀然被人驚覺夢也有頭無尾都下盛𫝊徐幹臣伸三衢人政和初以知音律為太常典樂出知常州嘗自製轉調二郎神祠云悶来彈鵲又攪碎一簾花影謾試着春衫還思纎手薰徹金虬燼冷動是愁端如何向更怪得新来多病嗟舊曰沉腰而今潘鬂怎堪臨鏡重省别時淚滴羅襟猶凝料為我懨懨日髙慵起長託春酲未醒雁足不来馬蹄難駐門掩一亭芳景空佇立盡日闌干倚遍晝長人静既成㑹開封尹李孝夀来牧吳門李以嚴治京兆人號閻羅道出郡下幹臣合樂大燕勞之諭羣娼令謳此詞必待其問乃止娼如戒歌至三四李果詢之幹臣蹙頞云某頃有一侍婢色藝冠絶前歳以亡室不容逐去今聞在蘇州一官兵處屢遣信欲復来而主人靳之感慨賦此詞中所叙多其書中語今適有天幸公擁旄於後不審能為我之地否李云此甚不難可無慮也既次無錫賔賛者請受謁次第李云郡官當至楓橋距城十里而逺翼日艤舟其所官吏上下望風股栗李一閲刺忽大怒云都監在法不許出城迺亦至此使郡中萬一有火盗之虞豈不殆哉斥都監下堦荷校送獄又數日取其供牘判奏字其子震懼求援宛轉哀鳴致懇李笑云且還徐典樂之妾了来理㑹即日承命然後舍之崇寕中有王生者貴家子也隨計入都嘗薄暮􅀍酒至延秋坊過一宅有女子甚麗獨立於門徘徊徙倚若有所俟生方注目際忽有騶騎呵衛而至下馬於此女子亦避去匆匆遂行抵夜歸復過之則寂然無人聲循墻而東有隙地丈許忽自内擲一瓦出拾視之有字云夜於此相候生以墻上剥粉戲書瓦背云三更後宜出也復擲入焉因稍退十餘步竢之少頃有一男子至周視地上無所見㣲數而去既而三鼓月髙霧合生已倦睡欲歸矣忽墻門軋然而開一女子先出一老媪負箧從後生遽就之乃適門間所覩者熟視生愕然曰非也回顧嫗嫗亦曰非也將復入生挽其袂而劫之曰汝為女子夜與人期天明執告官辱門戸矣今邂逅􅇜合亦是前縁不若從我去女泣而從之生携歸逆旅匿小樓中女自言曺氏父早喪獨有已一女母鍾愛之為擇良配女素悦姑之子使乳媼達意於母以其無官弗許遂私約宵奔墻下㣲歎而去者當是也生既南宫不利遷延數月無歸意其父使人詢之頗知有女子共居大怒促生歸扄之别室女所齎甚豐强半為生費餘與媪坐食垂罄更遣偵其母則以女逸故抑鬰而死久矣女不得已與嫗謀下汴訪生所在時生侍父官閩中女至廣陵資盡不能進遂𨽻樂籍易姓名為蘇媛生後宦遊四方亦不知女消息數年自淛幕召赴闕過廣陵女以娼侍燕識生生亦訝其似屢目之酒半女捧觴勸釂不覺雙淚墮酒中生凄然曰汝何以至此具以本末告生亦媿歎流涕不終席稱疾而起宻召女納為側室其後生子仕至尚書郎厯數郡章子厚惇初来京師赴省試年少美丰姿當日晚獨步御街見雕輿數乗從衛甚都最後一輿有一美人美而艷掲簾以目挑章章因信步隨之不覺至夕婦人以手招與同輿載至一甲第甚雄壮婦人者蔽章雜衆人以入一院甚深􅃉若無人居者少選前婦人始至備酒饌甚珍章因問其所婦人笑而不答自是婦人引儕輦迭相往来甚衆俱亦姝麗訽之皆不顧而言他毎去則以巨鎻扄之如是累日夕章體為之疲意甚徬徨一姬年差長忽發問曰此豈郎所游之地何為至此耶我主翁行迹多不循道理寵婢多而無嗣息毎鉤至少年之徒與羣婢合久則斃之此地數人矣章惶駭曰果爾為之奈何姬曰觀子之容葢非碌碌者似必能脱主人翊日入朝甚早今夕解我之衣以衣子我且不復鎻門俟至五鼓吾来呼子亟隨我登㕔事我當以厮役之服被子隨前騶以出可以無患矣爾後慎勿以語人亦勿復由此街不然吾與若皆禍不旋踵矣詰旦果来扣户章用其術遂免於難及既貴始以語族中所厚善者云後得其主翁之姓名但不欲曉於人耳少年輩不可不知戒也周美成為江寕府溧水令主簿之室有色而慧美成毎欵洽於尊席之間世所𫝊風流子葢所寓意焉新緑小池塘風簾動碎影舞斜陽金屋去来舊時巢燕主花繚繞前度莓薔綉閣鳯幃深㡬許聴得理絲簧欲説又休慮乖芳信未歌先噎愁轉清商暗想新粧了開朱户應自待月西廂最苦夢魂今宵不到伊行問甚時説與佳音宻耗擬將秦鏡偷換韓香天便教人霎時厮見何妨新緑待月皆簿㕔亭軒之名也道君幸李師師家偶周邦彦先在焉知道君至匿於床下道君自携新振一顆云江南初進来遂與師師謔語邦彦悉聞之櫽括成少年游云并刀如水吳鹽勝雪纎手破新棖錦帳初温獸烟不斷相對坐調笙低聲問問誰家宿城上巳三更馬滑霜濃不如休去直是少人行他日師師因歌此詞道君問誰作師師云周邦彦詞道君大怒坐朝語蔡京云開封府有監税周邦彦課税不登如何京尹不按𤼵来京罔知所以奏云容臣退朝呼京尹叩問京尹至蔡以聖意諭知京尹云惟邦彥課増羡蔡云上意如此只得遷就将上得旨邦彥職事廢弛可日下押出國門隔一二日道君復幸李師師家不見師師問之知送周監税道君方以邦彦出國門為喜坐久至更深始歸愁眉淚􅊿憔悴可掬道君怒云汝從何往師師奏臣妾萬死知周邦彦得罪押出國門畧致杯酒相别不知官家来道君問有詞云李奏云有蘭陵玉詞道君云試唱一遍李云容臣妾獻一觴歌此詞云栁隂直烟裏絲絲弄碧隋堤上㡬畨拂水飄綿送行色登臨望故國誰惜京華倦客長亭路年去嵗来折柔條過千尺閒尋舊踪跡酒趂哀絃燈照離席梨花榆火催寒食愁一帆風快半篙波暖回頭迢逓便數驛望人在天北凄惻恨堆積漸别浦縈洄津堠岑寂斜陽冉冉春無極念月榭携手吹笛沉思前事夢裏涙偷滴曲終道君大喜復召為大晟樂正後官至大晟樂府待制張安國守臨川王宣子解廬陵郡歸安國置酒郡齋招郡士陳漢卿参㑹適散樂一妓言學作詩漢卿語之曰太守呼為五馬今日兩州使君對席遂成十馬汝體此意做八句妓即髙吟曰同是天邊侍從臣江頭相遇轉情親瑩如臨汝無瑕玊暖作廬陵有脚春五馬今朝成十馬兩人前日壓千人便看飛詔催歸去共坐中書秉化鈞安國為之嗟賞竟日賞以萬錢宋宗室趙不敏與錢塘名娼盻奴甚洽久之不敏日益貧盻奴周給之使篤於業遂㨗南省得官授襄陽府司戸赴官三載想念成疾而卒有禄俸餘貲囑其弟院判某均分之一以膳院判一以遺盻奴且言盻奴有妹小娟俊雅能詩可謀致佳偶也院判至錢塘則盻奴亦以憶司户一月前死矣小娟以於潜官絹誣攀繫獄院判素與杭倅善託倅從獄中召出詰之曰汝誘商人官絹百疋何以償之小娟叩頭言此亡姊盻奴事乞賜周全倅喜其詞氣婉順以趙司户所寄付之小娟啟柬惟一詩云當時名妓鎮東吳不好黄金只好書借問錢塘蘇小小風流還似大蘇無小娟得書黙然倅索和援筆書云君住襄江妾住吳無情人寄有情書當年若也来相訪還有於潜絹也無倅大喜盡以所寄物與之免其償絹且言於太守謀為脱籍歸院判得偕老焉方務徳侍郎帥紹興赴召士人姚某以書投誠自陳失身娼館歳月滋深生育男女義不可負望為脱籍無任哀祈方題其書後云姚某解元文詞英麗早以後稱杯酒流連至於忘返露由𠂻之懇不媿多言遂成家之名何愛一妓韓公之於戎昱既狥所求竒章之望牧之更宜自愛馬光祖尹京日有士人踰墻盗人室女事覺到官勘令當㕔面試光祖出踰東家墻摟處子詩士人操筆云花栁平生債風流一叚愁踰墻乗興下處子寓心摟謝砌應潜越韓香計暗偷有情還愛欲無語强嬌羞不負秦樓約安知漢獄囚玊顔麗如此何用讀書求光祖判云多情多愛還了平生花栁債好箇檀郎室女為妻也不妨傑才髙作聊贈青蚨三百索燭影搖紅記取媒人是馬公宣和中有題於陜府驛壁者云幼卿少與表兄同研席雅有文字之好未笄兄欲締姻好父母以兄未禄難其請遂適武弁公明年兄登甲科職敎洮而良人統兵陕右相與邂逅於此兄鞭馬畧不相顧豈前憾未平耶因作浪淘沙以寄情云目送楚雲空前事無踪漫留遺恨鎖眉峯自是荷花開較晚辜負東風客館笑飄蓬聚散匆匆揚鞭那忍驟花驄望斷斜陽人不見滿袖啼紅開封富民楊氏子館客頗豪俊有女未笄竊慕之遂有偷香之説宻約登第結姻既過省乃棄前盟屢約相㑹了不可得登第後宻遣人諭女曰若遂成㛰好則先奸後娶在法當離必不能久爾或落髮則我亦不娶朝夕游處庻能長久女信之然思慕已成疾遂懇請於父母求祝髪焉或告客於某氏結㛰者女聞之悶絕良久索筆書曰黄葉無風自落彩雲不雨空歸就歸字落筆放手而絶近時有士人不欲書名嘗於錢塘江漲橋為狭邪之游作樂府名玊瓏璁云城南路橋南𣗳玊鈎簾捲香横霧新相識舊相識淺顰低笑嫰紅輕碧惜惜惜劉郎去阮郎住為雲為雨朝還暮心相憶空相憶露荷心性栁花踪跡得得得其後朝廷復收河南士人䧟而不返其友不欲書名作詩寄之且附以龍涎香云江漲橋邊花𤼵時故人曾共著征衣請君莫唱橋南曲花已飄零人不歸士人在河南得詩酬之云認得吳家心字香玉窻春夢紫羅囊餘薰未歇人何許洗破征衣更斷膓唐仲友平生恃才輕朱晦菴而陳同甫頗為朱所進與唐毎不相下同甫游台嘗狎一妓屬唐為脱籍許之偶郡集唐語妓云汝果欲從陳官人耶妓謝唐曰汝須能受飢忍凍乃可妓聞大恚自是陳至妓家無復前之欵接矣陳知為唐所賣亟往見朱朱問近見小唐云何答曰唐謂公尚不識字如何作監司朱銜之遂以部内有􅁈獄乞再廵按既之台適唐出迎少稽朱益以陳言為信立索郡印付其倅乃撫唐罪具奏而唐亦作奏馳上時唐鄉相王淮當軸上問王王奏此秀才争閒氣耳遂兩平其事朱按唐事或曰吕伯恭嘗與仲友同書㑹有隙朱主吕故抑唐實不然也天台營妓嚴蘂字幼芳善琴奕歌舞絲竹書畫色藝冠一時間作詩詞有新語頗通古今善逢迎四方承其名有不逺千里而登門者唐與正守台日酒邉嘗命賦紅白桃花即成如夢令云道是梨花不是道是杏花不是白白與紅紅别是東風情味曽記曽記人在武陵㣲醉與正賞之雙縑七夕郡齋開宴坐有謝元卿者豪士也夙聞其名即席命綴詞以己姓為韻酒方行而已成鵲橋仙云碧梧初墜桂香􅂊吐池上水花㣲謝穿針人在合歡樓正月露玉盤髙㵼蛛忙鵲懶耕慵織倦空做古今佳話人間剛道隔年期天上方􅂊隔夜元卿為之心醉留其家半載盡客囊贈之而歸其後朱晦菴以庾節行部至台欲摭與正之罪遂􅃌其嘗與蘂為濫繫獄月餘蘂雖備受箠楚而一語不及唐然猶不免受杖移籍紹興且復就越置獄鞫之乆不得其情獄吏以好言誘之曰汝何不早認罪不過杖况前已經斷法無重科何為枉受此慘毒耶蘂答云身為賤妓縱令與太守有濫料亦不至死然是非真偽豈可妄言以汚士大夫雖死不可誣也其辭既堅於是復痛杖之仍繋於籍兩月之間一再受罰委頓幾死然蘂聲價愈騰至徹阜陵之聼未幾朱公改除而邱霖商卿為憲因賀朔之際憐其病瘁命之作詞自陳蘂畧不搆思即口占卜􅄸子云不是愛風塵似被前縁悞花落花開自有時總賴東君主去也終須去住也如何住若得山花挿滿頭莫問奴歸處即日判令從良既而宗室近屬納為小婦以終身焉嘉㤗間内臣李侯大謙於行都九里松玉泉寺側建功徳寺役工數内有漆匠章生者乃天台人偶春夜出浴回於道中遇一老嫗挽入一小門暗中以手摸壁隨嫗而行且覺是布為幙轉經數曲至一室中使就暗坐此嫗乃去繼有一尼擕燈而至又見四壁皆青赤衣幃􅃒䕶終不知何地尼又引經數曲又至一室燈燭帷帳酒殽􅄊皿一一畢具俱非中下人家所有之物章生見之驚異不敢問其所以且疑且喜尼師往頃時有一婦人隨至容質非常惟不冠飾章生畏懼尼逼使共坐遂召前嫗命酒殽數盃婦人更不一語尼師云已曉矣章生但懇禱尼師云匠者無錢尼師終不顧允遂令就寢尼師執燈扄户而去章生屢詢所来及姓名而斯人竟無一言疑為瘖疾至鐘動其尼復至啟鑰喚起章生出令前嫗引出亦捫布壁而行覺至一門非先来所經此嫗令出街可至役所章生如夢寐中行至一街至曉即離所造之寺二里許後循路歸其董役者怪責其不歸及具此語使徧訪之終不得其元所入門域衆皆謂遇鬼物而有一木匠云此固寵借種耳湘人陳詵登第授岳陽教官夜踰墻與妓江栁狎頗為人所知時孟之經守岳聞其故一日公燕江栁不侍呼至杖之文其眉鬂間以陳詵二字乃押𨽻辰州妓之父母詣學宫咎詵云自岳去辰州八百里且求資粮陳且泣且悔罄其所有并質衣物得千緍以六百贈栁餘付監押吏卒令善視之且以詞錢别云髩邊一㸃似飛鴉休把翠鈿􅃒二年三載千欄百就今日天涯楊花又逐東風去隨分入人家要不思量除非酒醒休照菱花栁將行㑹陸雲西以荆湖制司幹官霑檄至岳與陳有舊將至陳先出迎以情告陸陸即取空名制幹劄填陳姓名檄入制幕既而孟迎陸入即開宴陸曰聞籍中有江栁者善謳誰是也孟既呼至栁花鈿𨼆眉間所文飲間陸戲語孟曰能以栁見予否孟曰唯命陸笑曰君尚不能容一陳教豈能予我孟因叙詵之過陸歎慨既而酒罷陸呼栁問其事栁出詵送别詞陸大嗟賞而再登席舉詞示孟且誚之曰君試目此作可謂不知人矣今制司檄詵入幕將若之何孟求解於陸并召詵同宴明日列薦詵且除栁名陸遂將詵如江陵見之閫公秋壑俾充幕僚至今巴陵傳為佳話謝希孟在臨安狎倡陸氏象山責之曰士君子乃朝夕與賤娼女居獨不愧于名教乎希孟敬謝請後不敢他日復為娼造鴛鴦樓象山聞之又以言責希孟復謝曰非特建樓且有記象山喜其文不覺曰樓記云何即口占首句云自遜抗機雲之死而天地英靈之氣不鍾於世之男子象山黙然希孟在娼所忽起歸意遂不告而行娼追送江滸涕泣戀戀希孟毅然取領巾書一詞與之云雙漿浪花平夹岸青山鎖你自歸家我自回説著如何過我斷不思量你莫思量我將你從前愛我心付與傍人可希孟與鄉友陳伯益好相調戲伯益黑面身狭多髯希孟見其寫真挂壁上題云伯益之靣大無兩指髭髯不仁侵􅅰乎其旁而不已於是乎伯益之面所餘無㡬此語喧𫝊伯益病之而莫能報希孟後避寕宗諱改名直字古民伯益於是以兩句咏其名云炊餅担頭挑取去典衣舖上唱將来聞者絶倒伯益又嘗冩真衣皂道服躡僧鞵希孟賛之曰禪鞵髭鬚鬂髪道衣行藏梗直烏肌狭小面皮秋水長天一色陸放翁宿驛中見題壁云玉階蟋蟀閙清夜金井梧桐辭故枝一枕凄凉眠不得呼燈起作感秋時詢之驛卒女也遂納為妾方餘半載夫人逐之妾賦卜􅄸子云只知眉上愁不識愁来路窻外有芭蕉陣陣黄昏雨曉起理殘粧整頓教愁去不合畫春山依舊留愁住婺州劉鼎臣赴省試瀕行其妻自製彩花一枝贈之侑以鷓鴣天詞云金屋無人夜剪繒寳􅁫翻過齒㾗輕臨行執手慇懃送襯與蕭郎兩􅁂青聴嘱付好看承千金不抵此時情明年宴罷瓊林晚酒面㣲明相映明潭州易彦章袚以優等為前廊久不歸其妻作一剪梅寄之云染淚修書寄彦章貪却前廊忘却回廊功名成遂不還鄉石做心腸鐵做心腸紅日三竿懶畫粧虗度韶光瘦損容光不知何日得成雙羞對鴛鴦懶對鴛鴦秀州鄭文為太學生久寓行都其妻寄以憶秦蛾詞云花深深一勾羅襪行花隂閒將栁帶試結同心日邊消息空沉沉畫眉樓上愁登臨海棠開後望到而今此詞為同舍見者𫝊揚酒樓妓館皆歌之洞庭劉氏夫葉正甫久客都門因寄衣侑以詩云情同牛女隔天河又喜秋来得一過嵗嵗寄郎身上服絲絲是妾手中梭剪聲自覺和腸斷線脚那能抵淚多長短只依先去様不知肥瘦近如何歌兒珠簾秀姓朱氏姿容姝麗雜劇當時獨步胡紫山宣慰極鍾愛之嘗擬沉醉東風小曲以贈云錦織江邊翠竹絨穿海上明珠月淡時風清處都隔斷落紅塵土一片閒情任卷舒挂盡朝雲暮雨馮海粟亦有鷓鴣天云十二欄杆映逺眸醉香空斷楚天秋鰕鬚影薄㣲㣲見龜背紋輕細細浮香霧斂翠雲收海霞為帶月為鈎夜来捲盡西山雨不著人間半㸃愁皆咏珠簾寓意也由是聲譽益彰歌妓順時秀姓郭氏性資聰敏色藝超絶翰林學士王元鼎甚眷之偶有疾思得馬板腸充􅄿公殺所騎千金五花馬取腸以供都下𫝊為佳話時中書參政阿魯温尤屬意焉因戲謂曰我比元鼎如何對曰參政宰相也學士才人也爕理隂陽致君澤民則學士不及參政嘲風咏月惜玉憐香則㕘政不如學士㕘政付之一笑而罷宋稗𩔖鈔卷十七
