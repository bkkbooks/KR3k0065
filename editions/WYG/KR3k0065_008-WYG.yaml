body:
  text: 宋稗𩔖鈔卷八常熟潘永因編叛逆第十四景祐末有二狂生曰張曰呉皆華州人薄遊塞上覘覽山川風俗慨然有志於經略耻於自售放意詩酒語皆絶豪險驚人而邉帥豢安皆莫之知倀無所􅆘聞西夏有意窺中國遂叛而徃二人自念不力出奇無以動其聽乃自更其名即其都門酒家劇飲終日引筆書壁曰張元呉昊來飲此樓邏者見之知其非國人也迹其所憩執之元昊詰以入國問諱之義二人大言曰姓尚不理㑹乃理㑹名耶時曩霄未更名且用中國賜姓也於是竦然異之日尊寵用事寳元西事葢始此其事國史不書洪文敏謂二人名偶與元昊同寔不詳其所以更之意云宣和二年十月睦州青溪縣堨村居人方臘託左道以惑衆知縣事陳光不即鉏治臘自號聖公改元永樂置偏裨將以巾飾為别自紅巾而上凡六等無甲胄惟以鬼神詭秘事相扇揺數日聚惡少千餘焚民居掠金帛子女提㸃刑獄張􅁐通判州事葉居中不能招致欲盡殺之以故賊得脇擄良民為兵旬日有衆數萬䧟睦歙杭處衢婺六州五十二縣朝廷遣領樞密院童貫率禁旅及京畿關右河東蕃漢兵至四年三月討平之用兵十五萬斬賊十五萬殺平民不下二百萬改睦為嚴州歙為徽州始唐永徽四年睦州女子陳碩真反自稱文佳皇帝故梓桐相𫝊有天子基萬年樓方臘因得憑藉以起又以沙門寳誌讖記誘惑愚民而貧窮遊手之徒相乘為亂青溪為睦大邑梓桐幫源等號山谷幽僻處東北趨睦西近歙民物繁庶有漆楮林木之饒地勢迂險羣黨據險以守因謂之洞而浙人安習太平不嫺兵革一聞金鼓聲則歛手聴命不逞小民徃徃反為賊鄉導劫富室殺官吏士人以邀貨利所掠婦女自洞迯出裸而雉經於林中者由湯嵓榴𣗳嶺一帶凡八十五里九村山谷相望不知其數方臘之亂愚民望風響應其間聚黨劫掠者皆竊臘名字人人曰方臘來矣所至瓦解臘之婦紅粧盛飾如后妃象以鏡置胸懷間就日中行則光彩爛然競𫝊以為祥瑞張邦昌僣位國號大楚坐罪貶昭化軍節度副使潭州安置寓居於郡之天寧寺寺有平楚樓葢取唐沈𫝊師詩目傷平楚虞帝魂之句也朝廷遣殿中侍御史馬緋賜死讀詔猶徘徊顧望不能引决執事者促之登樓及仰首忽覩三字長歎就縊靖康末金人立張邦昌為帝顔博文作赦書云無徳者亡知謳歌之已去當仁不讓信厯數之有歸等語無非吠堯之辭聞者駭愕其尊元祐皇后為宋太后策語有曰尚念宋氏之初首崇西宫之禮葢用太祖即位迎周太后入西宫故事及以大寳歸上表云孔子從佛肸之召意在尊周紀信乗漢王之車誓將誑楚施宜生福人也少逰鄉校有僧過焉與之言引之鱣堂下風簷杲日援手周視曰余善風鑑子有奇相故欲驗予術耳歸他日當語子又數年遇諸􅂗宜生方躓塲屋不勝困欲投筆漫徴前説以所向扣之僧出酒一壺與之藉草飲復援其手曰靣有權骨可公可卿而視子身之毛皆逆上且覆腕然則必有以合乎此而後可貴也時范汝為訌建劒宜生心欲以嚴莊尚讓自期而未脱諸口聞其言大喜杖策徑謁干以秘策汝為恨得之晚亟尊用之亡何而汝為敗變服為傭渡江至泰有大姓呉翁者家僮數千指擅魚鹽之饒宜生傭其間三年人莫之覺也翁獨心識之一日屏人問曰天下方亂英雄鏟跡亦理之常我視汝非傭必以寔告不然且捕汝於官宜生不服曰我服傭事惟恭主人乃爾置疑請辭而已翁固詰之則請其故翁曰汝動作皆傭而㣲有未盡同者余日者燕客執事咸駿而汝獨遜諸儕撤器有噫聲若欿然不怡此魚服而角也我固將全汝而何以文為宜生驚汗亟拜曰主寔生我不敢匿遂告之繇翁曰官購方急圖形遍城野汝安所迯龜山有僧可託以心余交之舊矣介之入北策之良也從之翁贐之金𨼆之衲至寺服緇童之服以求納主僧者出儼然鄉校之所見也啟緘而留之餘數旬持橈夜濟宜生於淮曰大丈夫富貴命耳予無求報心天寔命汝知復如何必得志母忘中國逆而順天所祐也金法無驗不可行遂殺一人於道而奪其符以至於燕上書自言道國虚實不見用縻而致之黄龍㑹赦得釋因以敎授自業金有附試畔歸之士謂之歸義試遭捷海陵時有意南伐校獵國中一日而𫉬熊三十六廷試多士遂以命題葢用唐體宜生奏賦曰聖天子講武功雲屯八百萬騎日射三十六熊亮覽而喜擢為第一不數年仕至禮部尚書紹興三十年金來賀正旦宜生以翰林侍講學士為之使朝廷聞之命張忠定燾以吏部尚書侍讀館之都亭時北盟方堅國備大弛而諜者𫝊造舟調兵之事無虚日上意不深信館者因以首丘風之至天竺㣲問其的宜生顧其介不在旁忽廋語曰今日北風甚勁又取几間筆扣之曰筆來筆來於是始大警及髙景山告釁而我麤有備矣宜生寔先漏師焉歸為介所告烹而死宜生方顯時龜山僧至其國言之於亮而尊顯之俾乗驛至京東視海舟號天使國師不知所終僧蹤跡有異淮人能言之出入兩境如跳河輕財結客又有至術髠而俠者也逆而顯順而戮豈非其相然耶椎埋於先一折枝而贖其惡固神理之所不容也建賊范汝為猖獗建士如歐陽頴士施逵呉綜者善文章多材藝或巳登科皆望風往從之建人陸業謝尚有鄉曲譽賊聲言使二人來招即降朝廷遣之既而拘係二人反為賊用賊敗歐陽頴士呉綜先誅死陸謝施逵以檻車送行在至中途逵謂二人曰吾軰去必死與其戮於市朝極痛楚􅂚若早自裁逵乃密令人為藥三丸小大形色俱相似一乃無毒者逵取無毒者服之二人服藥即死既至行在歸罪於二人理官無所攷證迄從末減但編置湖南中途又逸去或為行者或為道人或為人典庫藏迤􅆔望淮去有喜其才者以女妻之住數月復北走降金改名宜生登偽科擢用甚峻海陵將犯淮時為之奉使北來海㓂鄭廣陸梁莆福間颿駛兵犀雲合亡命無不以一當百官軍莫能制自號滚海蛟有􅇉弗捕命以官使主福之延祥兵以徼南溟延祥𨽻帥閩廣朔望趨府羣僚以其故所為徧賔次無與立譚者廣欝欝弗言一日晨入未衙羣僚偶語風簷或及詩句廣矍然起於坐曰鄭廣麄人欲有拙詩白之諸官可乎衆屬耳乃長吟曰鄭廣有詩上衆官文武㸔來總一般衆官做官却做賊鄭廣做賊却做官滿座慚噱去熙寧中福建賊廖恩聚黨山林招撫乆之方出降朝廷貰其罪授右班殿直既至有司供脚色一項云厯任以來並無公私過犯見者無不笑之逆曦未叛時嘗歳校獵塞上一百夜歸笳鼓競奏轔載雜襲方垂鞭四視時盛秋天宇澄霽仰見月中有一人焉騎而垂鞭與已惟肖問左右所見皆符殊以為駭黙自念曰我當貴月中人其我也揚鞭而揖之其人亦揚鞭乃大喜異謀由是益决從事郎錢鞏之嘗夢曦禱神祠以銀杯為珓擲之神起立謂曰公何疑後政事已分付安子文矣曦未省神又曰安子文有才足能辦此鞏之覺以語䂀故召丙用事曦年十許嵗時其父挺嘗問其志曦有不臣之語其父怒蹴之爐火中灼其靣號呉巴子云李順與曦先後叛於蜀俱僣即蜀王位説者析順字謂居川之旁一百八日析曦字謂三十八日我乃被戈較其即位受策之日不差毫髪安子文丙與楊巨源合謀誅逆曦旋殺巨源而專其功乆之朝廷疑其䟦扈俾帥長沙子文盡室出蜀在長沙廣事貲積㕔事前豢豕成羣糞穢狼藉肥腯則烹而賣之罷政捆載西歸厥後楊九鼎帥蜀以刻剥失軍心牙校莫簡倡亂殺九鼎刳其腹寔以金銀曰使其貪腹飫飽時子文家居散財結士生擒莫簡剖心以祭九鼎再平蜀難蜀父老言王小皤之亂自言我土鍋村民也豈能霸一方有李順者孟大王之遺孤初蜀亡有晨興過摩訶池上者見錦箱錦衾覆一襁褓嬰兒有片紙在其中書曰國中義士為我飬之人知其出於宫中因收飬焉順是也故蜀人惑而從之未幾小皤戰死衆推順為主下令復姓孟及王師𫝊城城且破矣順忽飯城中僧數千人以祈福又度其童子亦數千人皆就府治削髪僧衣䀯後分東西兩門出出盡順亦不知所在葢自髠而遯矣明日王師入城捕得一髯士狀頗𩔖順遂誅之而寔非也天禧初竟𫉬於嶺南即獄中殺之蜀人又謂順迯至荆渚入一僧寺有僧熟視曰汝有異相當為百曰偏霸之主何自在此汝宜急去今年不死尚有數十年夀亦可怪也邦交第十五元豐間注輦國使人入貢乞依本國俗撒殿詔從之使人以金盤盛珠跪捧於殿楹之間更以金蓮花酌珠向御座撒之謂之撒殿乃其國至敬之禮也朝退有司掃徹得珠十餘両分賜是日侍殿閤門使副内臣注輦在廣州海行四千里至廣州李丞相士羙嘗言將命䀻􅈙赴其花燕時􅈙主坐御牀上後有烏熊皮䝉一物頗高大乆而似疲則以身倚之意其如古設扆狀耳俄而烏皮間時露一二人手足罔測其故及日晏乃見數小兒在其中此葢其舊俗也昔髙歡立孝武帝以黒氊䝉七人歡居其一而帝於氊上西向拜天殆亦𩔖是􅈙人劉六符所謂劉燕公者建議於其國謂燕薊雲朔本皆中國地不樂屬我非有以大收其心必不能乆􅈙主宗真問曰如何收其心曰斂於民者十減其四五則民惟恐不為北朝人矣􅈙主曰如國用何曰臣願使南朝求割闗南地而増戍閲兵以脇之南朝重於割地必求増歳幣我姑為不得已而受之俟得幣則以其數對減民賦可也宗真大以為然卒用其策得増幣而它大臣背約纔以幣之十二減賦民固已喜矣及洪基嗣立六符為相復請用原議洪基亦仁厚遂盡用銀絹二十萬之數減燕雲租賦其後􅈙政雖亂而人心不離豈可謂􅈙無人哉于闐國朝貢使每來必􅂝其寳鐺以徃返厯乆皆然我主客備見之乃一鐡鐺爾葢其來道渉流沙踰三日程無薪水獨挈其水而行是鐺投以水頃輒已百沸矣用是得不乏故寳之章惇之貶􅈙主方食聞之放箸而起稱善者再謂南朝錯用此人又問何為只若是行遣及聞温公之相敕其邉吏曰中國相司馬矣慎無生事開邉釁粘罕在西京尋冨鄭公文潞公司馬温公子孫時惟潞公第九子殿􅁧維申老年杖屨先奔出城遺一妾一嬰兒粘罕撫慰良乆贈衣物珠玉壓驚復令歸宅司馬朴至金問知為温公之後嘆曰使司馬公在朝我亦不敢至城下及立異姓遂欲擁朴朴力辭而免拘刷三館書籍凡王氏經説字説皆棄去之道君在南郡猶詰問李綱朝廷何故追贈司馬光粘罕諸人却如元祐舊臣老於中朝熟聞國論者良可笑也熙寧中王韶熙河之役番部俞龍珂率衆内附歸朝自言平生聞包中丞朝廷忠臣乞賜姓包氏宣和中路允廸自高麗還言髙麗國主問楊龜山先生安在正人之見重於外國如此韓魏公在魏州乆􅈙使每過移牒必書名曰以韓公在此故也其子忠彦使􅈙􅈙主聞其貌𩔖父命工圖之趙相挺之使金方盛寒在殿上金主忽顧挺之耳愕然急呼小奴指示之葢閹也俄持一小玉合子至合中有藥色正黄􅂗挺之兩耳周匝而去其熱如火既出殿門主客者揖賀曰大使耳無患矣若用藥遲且拆裂缺落甚則全耳皆墜而無血叩其玉合中藥為何物乃不肻言但云此藥市中亦有之價甚貴方匕直錢數千某輩早朝遇極寒即􅂗少許吏卒軰則别有藥以狐溺調􅂗之亦效粘罕相金滅􅈙擾宋復欲肆志於夏夏人隂為之備忽開釁索馬萬疋夏人從其請先以所練精兵每一馬以二人御之紿言金人曰萬馬雖具然本國乏人牽攏今以五千人押送請遣人交之粘罕遣人往取皆善騎射者其寔欲以窺之也至境未及交馬夏人羣起金兵悉斃夏人復持馬歸國粘罕氣沮自此不敢西向發一矢金宗翰本名粘没喝漢語訛為粘罕紹興辛巳冬海陵戕滅随行帑藏舟車多為王師所掠有淮甸客亦從而奮𫉬一生首將揮之以劔其人哀鳴乞命曰舟中有寳當取獻以自贖乃釋其縳遣二卒從之以徃少頃􅂝一匣來啟視皆金玉装飾第三匣内一石三稜上尖而下大色㣲黄石之腰有玉龍旋繞仰首左𤓰撲一玉珠𤓰牙鱗鬛獰雄熟視如生不與世間繪畵者𩔖其人云金主以此寳為鎮國尋嘗欲觀其變化則用淨盆貯水候夜半置於水中須叟間黒雲䝉覆其上必急収之稍緩恐或飛去如所言試之果然遂爾珍藏常以隨行海陵末年自製尖鞾頭極長鋭云便於鐙而足指所不及謂之没頭下鞘其後渝盟南伐果為其下所戕於江上海陵永簒時封岐王為平章政事頗知書好為詩詞語出輒崛疆愸愸有不為人下之意境内多𫝊之嘗得其數篇初岐王以事出使道驛有竹輒詠之曰孤驛瀟瀟竹一叢不同凡卉媚春風我心正與君相似只待雲梢拂碧空又書壁述懷曰蛟龍潛匿𨼆滄波且與蝦蟆作混和等待一朝頭角就撼揺霹􅋬震山河既而過汝隂復作詩曰門掩黄昏染緑苔那囘踪跡遍塵埃空亭日暮烏争噪幽徑草深人未來數仞假山當户牖一池春水遶樓臺繁花不識興亡地猶倚䦨干次第開又嘗作雪詞昭君怨曰昨日樵村漁浦今日瓊川玉渚山色捲簾㸔老峰巒錦帳羙人貪睡不覺天花剪水驚問是楊花是蘆花一日至卧内見其妻几間有岩桂植瓶中索筆賦曰緑葉枝頭金縷裝秋深自有别般香一朝揚汝名天下也學君王著赭黄味其詞㫖己多圭角葢其蓄已不小矣及得志將圖南牧遣我叛臣施宜生來賀使圖臨安之城邑及呉山西湖之勝以歸瞷然有垂涎杭越之想亟命撤坐間軟屏更設所獻而於呉山絶頂貎已之狀策馬而立題其上曰萬里車書盍混同江南豈有别疆封提兵百萬西湖上立馬呉山第一峰遷汴之嵗中秋待月不至賦鵲橋仙曰停杯不舉停歌不發等候銀蟾出海不知何處片雲來做許大通天障礙虬髯撚斷星眸睜裂惟恨劔鋒不快一揮截斷紫雲腰子細看嫦娥體態明年竟遂前謀使御前都統驃騎衛大將軍韓邪將射鵰軍二萬三千圍子細軍一萬先下兩淮臨發賜所製喜遷鶯以為􅃂曰旌麾初舉正駃騠力健嘶風江渚射虎將軍落鵰都尉繡㡌錦袍翹楚怒磔㦸髯爭奮捲地一聲鼙鼓笑談頃合長江齊楚六師飛渡此去無自堕金印如斗獨把功名􅂝取斷鎖機謀垂鞭方略人事本無今古試展卧龍韜韞果見成功且莫問江左想雲霓切望𤣥黄迎路觀其所存寓一二於十百其桀驁之氣己溢於辭表他葢可知也金熈宗亶皇統十年夏龍見御寨宫中雷雨大至破柱而去亶大懼左右以為當肆赦以禳之遂召當制學士張均視草其中有顧兹寡昧及眇予小子之言譯者不曉其義乃曰漢児疆知識託文字以詈我主上耳亶驚問故譯釋其義曰寡者孤獨無親昧者不曉人事眇為瞎子小子為小孩児亶大怒亟召均至詰其説未及對以手劍􅋇其口棘而􅊽之竟不知譯之為愚為姦也開禧用兵金人元帥紇石烈子仁領兵據濠梁大書一詞於濠之倅􅆹壁間詞名上平南即上西平之調云蠆蜂揺螳臂振舊盟寒恃洞庭彭蠡狂瀾天兵小試萬蹄一飲楚江乾捷書飛上九重天春滿長安舜山川周禮樂唐日月漢衣冠洗五州妖氣闗山已平全蜀風行何用一泥丸有人𫝊喜日邉都䕶先還子仁葢亦北地之能文者元起沙漠日塞上有一山形勢雄偉金人望氣者謂此山有王氣非彼之利謀欲厭勝之計無所出時國已多事乃遣使通好既而曰他無所冀願得某山以鎮壓我土耳衆皆笑而許之金人乃大𤼵卒鑿掘輦運至幽州城北積累成山因開桃海子栽植花木營搆宫殿以為遊幸之所名瓊花島未幾金亡世皇徙居之至元四年興築宫城山􅆘在禁中遂賜名萬嵗山回回地有七八十嵗人自願捨身濟衆者絶不飲食唯澡身啖蜜經月便溺皆蜜既死國人以石棺仍滿用蜜浸鐫志嵗月於棺葢􅄟之俟百年後啟之則蜜劑也凡人損折肢體食少許立愈雖彼中亦不多得俗曰蜜人番言木乃伊宋稗𩔖鈔卷八
