body:
  text: 宋稗𩔖鈔卷十九常熟潘永因編博識第三十二僧錄賛寜洞古博物著書數百卷王元之禹偁徐騎省鉉有疑則就而質焉二公皆拜之柳仲塗開因曰余頃守維揚郡堂後菜圃纔隂雨則青􅆋夕起觸近則散何也寜曰此燐火也兵戰血或牛馬血著土則凝結為此氣雖千載不散柳遽拜之曰掘之皆斷鎗折鏃乃古戰地也因贈以詩中有空門今日見張華之句太宗時一日後苑象斃上令取膽剖腹不𫉬上異之以問徐鉉鉉奏曰請於前足求之如言果得以進亟召鉉問對曰象膽隨四時在足今方二月故臣知在左足也朝廷皆歎其博識徐常侍鉉仕江南日嘗直澄心堂復被入直至飛虹橋馬輒不進裂鞍斷轡箠之血流掣韁却立鉉遺書問於餘杭沙門賛寜答曰下必有海馬骨水火俱不能毁惟漚以腐糟隨毁者乃是鉉劚之去土丈餘果得巨獸骨上脛可長一丈膝而下長三尺腦骨若股柱積薪焚三日不動以腐糟纔漚之遂爛江南徐鍇嘗奉命撰文與其兄鉉共論猫事鉉疏得二十事鍇曰未也適已憶七十餘事鉉曰楚金大能記明旦云夜來復得數事鉉撫掌稱美宣和中蔡居安攸提舉秘書省夏日㑹館職於道山食𤓰居安令坐客徵𤓰事各疏所憶每一條食一片坐客不敢盡言居安所徵為優欲畢校書郎董彦逺連徵數事皆所未嘗聞坐客咸歎服之識者謂彦逺必不能安後數日果補外吕徽之與陳剛中治中遇於道治中策蹇驢時猶布衣見先生風神高簡問曰得非吕徽之乎曰然足下非陳剛中乎曰然握手若平生歡共論驢故事先生言一事治中答一事互至四十餘事治中止矣先生曰我尚記得有某出某書某出某𫝊又三十餘事治中深敬之江南徐知諤嘗得畫牛一軸晝則嚙草欄外夜則歸卧欄中知諤獻後主煜煜持貢闕下太宗張後苑以示羣臣俱無知者僧錄賛寜曰南倭海水或減則灘磧微露倭人拾方諸蚌腊中有餘淚數滴得之和色著物則晝𨼆而夜顯沃焦山時或風撓飄擊有石落海岸得之滴水磨色染物則晝顯而夜晦諸學士皆以為無稽寜曰見張騫海外異物記後杜鎬檢三館書目果於六朝舊本書中載之一言用大蚌含胎結珠未就如淚者瀝取和色欲日見者於日中畫欲夜見者於月下畫葢珠蚌乃日精月華所成今以未就之淚布於日月之下則受此之精於色各以時見理或有之也李建勲罷相江南出鎮豫章一日與賓僚游東山各事寛履輕衫携酒殽引步於漁溪樵塢間遇佳處則飲或平田間一茆舍有兒童讀書聲相君携策就之乃一老叟教數村童叟驚􅋺離席改容趨謝而翔雅有體氣調瀟灑丞相愛之遂觴於其廬置之客右叟亦不敢輒談李以晚渇連食數梨賓僚有曰此不宜多食號為五臓刀斧叟竊笑丞相曰先生之哂必有異聞叟謝曰小子愚賤偶失容於鈞重然實無所聞李堅質之仍脅以巨觥曰無說則沃之叟不得已問說者曰敢問刀斧之說有稽乎曰舉世盡云必有其稽叟曰見鶡冠子所謂五臓刀斧者非所食之梨乃離别之離耳葢言人之别離􅆷伐胸懐甚若刀斧遂就架取一小册振拂以呈丞相乃鶡冠子也檢之如其說李特加重宋制科題有堯舜禹湯所舉如何乃漢時宫中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬各職天子所服也又湯周福祚乃張湯杜周也當時士子以唐虞三代為對遂無一人合者宋子京用伏奉手畢南人謂筆曰畢因效之以為手畢手簡宋謂爾雅簡謂之畢學記曰呻其佔畢宋景文博學多聞著名當世詩正義曰絡緯鳴􅂴婦驚子京詩云西風已飄上林葉北斗直掛建章城人間底事最堪恨絡緯啼時無婦驚其用事如此又詩云蟹美持螯日魴甘抑鮓天用楊淵五湖賦云連瓶抑鮓又詩云何但魚知丙非徒字識丁唐張𢎞靖云天下無事汝軰挽兩石弓不如識一丁字丙者左太冲蜀都賦云嘉魚出於丙穴注丙穴在漢中􅃆陽北有魚穴二所常以二八月取之丙地名也或云魚以丙日出穴丙者向陽穴多生魚酈善長云穴口向丙又引栢枝山中有丙穴穴大數丈有嘉魚嘗以春末游渚冬入穴故知丙穴之魚不獨漢有也老杜詩云魚知丙穴由來美江西俚俗罵人曰客作兒陳從易寄荔枝與盛參政詩云櫻桃真小子龍眼是凡姿橄欖為下軰枇杷客作兒盛問其說云櫻桃味酸小子也龍眼無文采凡姿也橄欖初澁後甘下軰也枇杷肉少核大客作兒也凡言客作兒者傭夫也夏英公鎮襄陽遇大赦賜酺宴詔中有致仕高年各賜束帛時胡大監旦瞽廢在襄英公依詔㫖選精縑十疋贈之胡得縑以手捫之笑曰寄語舍人何寡聞至此奉還五疋請檢韓詩外𫝊及服䖍賈誼諸儒所解束帛戔戔賁於丘園之義自可見證英公檢之果見三代束帛束脩之制若束脩則十挺之脯其實一束也若束帛則卷其帛屈為二端五疋遂見十端表王者屈折於𨼆淪之道也夏有愧色杜學士鎬博聞強記凡有檢閱先戒小吏某事在某書第幾行取視無差士大夫有所著撰多以古事詢之無不知者雖末學卑品應對不倦時人號為杜萬卷性和易有懿行士論推之餘杭能萬卷者浮圖之真儒介然持古人風節有奥學王冀公深所禮重一時儒者皆抱經授業師嘗喜讀唐韻諸生長竊笑一日出題於法堂曰楓為虎賦其韻曰脂入於地千年成虎諸生皆不喻固請之不說凡月餘檢經史百家小說俱無見者閣筆以聽教師曰聞諸君笑老僧酷嗜唐韻兹事止在東字韻第二板請詳閱諸生檢之果見楓字註中云黄帝殺􅃖尤棄其桎梏變為楓木脂入地千年化為虎魄後諸生始敬此書又有云松液入地為虎魄者唐李嶠咏魄詩云曾為老伏苓本是寒松液蚊蚋落其中千年猶可覿未知孰是然每見虎魄中蚊蚋數枚凝結在内信嶠詩不誣魏收有庯峭就為之語人多不知其義文潞公以問蘇子容子容曰向聞之宋元憲云事見木經葢梁上短柱取其有曲折峻峭之勢耳言人之儀矩可喜者曰庯峭就乃用此事作詩為謝曰高晏初陪聽鼔鼙清談仍許奏揮犀自知伯起難庯峭不及淳于善滑稽舞奏未終花十八酒行先困玉東西荷公徳度容狂簡故敢忘懐去町畦文潞公為相日赴秘書省曝書晏令堂吏視閣下芸草乃公往守蜀日以此草寄植館中也因問芸草之辟蠧出何書一坐黙然蘇子容對以魚豢典略公甚喜即借以歸歐陽文忠公寄荆公詩云翰林風月三千首吏部文章二百年吏部葢謂南史謝朓於宋明帝朝為尚書郎長五言詩沈約嘗云二百年來無此詩也而荆公答之云他日若能窺孟子終身安敢望韓公則竟指吏部為退之矣吏部文章日月光自然以吏部為退之但二百年不切耳慶厯後歐陽文忠以文章擅天下世莫敢有􅎨衡者劉原父雖出其後以博學通經自許文忠亦以是推之作五代史新唐書凡例多問春秋於原父及書梁入閤事之𩔖原父即為剖析辭辨風生文忠論春秋多取平易而原父每深言經㫖文忠有不同原父間以謔語酬之文忠乆或不能平原父復忤韓魏公終不得為翰林學士將死戒其子弟無得遽出其集曰後百餘年世好定當有知我者故貢父次其集藏之不肯出私諡曰公是先生貢父亦好諧謔慢侮公卿與王荆公素厚坐是亦相失及死子弟次其文亦私諡曰公非先生人言是其所是易非其所非難劉原父在詞掖歐陽文忠公嘗折簡問入閤起於何年閤是何殿開延英起何年五日一起居遂廢正衙不坐起何年三者孤陋所不詳乞示本末原父方與客對食曰明當為對已而復追回令立竣報原父就坐中疏入閤事詳盡無遺原父私謂所親曰好箇歐九極有文章可惜不甚讀書東坡後聞此言笑曰軾軰將如之何歐陽公五代史李琪𫝊曰自唐末喪亂朝廷之禮壊天子未嘗視朝而入閤之制亦廢常參之官日至正衙者𫝊聞不坐即退獨大臣奏事日一見便殿而侍從内諸司日再朝而已明宗初即位乃詔羣臣五日一隨宰相入見便殿謂之起居琪以為非唐故事請罷五日起居而復朔望入閤明宗曰五日起居吾思所以數見羣臣也不可罷而朔望入閤可復然唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寝有思慕之心不能臨前殿則御便殿見羣臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入百官俟朝於衙者因隨以入見故謂之入閤然衙朝也其禮尊閤晏見也其事殺自乾符以後因亂禮闕天子不能日見羣臣而見朔望故正衙常日廢仗而朔望入閤有仗其後習見遂以入閤為重至出御前殿猶謂之入閤其後亦廢至是而復然有司不能講正其事凡羣臣五日一入見中興殿便殿也此入閤之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閤琪皆不能正也劉原父博物多聞前世無及在長安日有得古鐵刃以獻製作極巧下為大環以纒龍為之而其首𩔖鳥人莫能識原父曰此赫連勃勃所鑄龍雀刀所謂大夏龍雀者也鳥首葢雀云問之乃种世衡築青澗城掘地所得正夏故􅆠也又有𫉬玉印遺之者其文曰周惡夫印原父曰此漢侯印尚存於今耶或疑而問之曰古亞惡二字通用史記盧綰之孫他人封亞谷侯而漢書作惡谷是矣聞者始大服長安李世衡觀察家藏一端研當時以為寳下有刻字云天寳八年冬端州東溪石刺史李元書劉原父知長安取視之大笑曰天寳安得有年自改元即稱載矣且是時州皆稱郡刺史皆稱太守至徳後始易今安得獨爾耶取唐書示之無不驚歎李氏研遂不敢復出酈道元水經注曰赫連龍昇七年於黑水之南遣將作大匠梁公叱干阿梨改築大城名曰統萬城蒸土加功雉堞雖乆崇墉若新并造五兵乃咸百鍊為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懐逺可以柔邇如風靡草威服九區世甚珍之韓持國謝邵堯夫九日逺寄新酒詩云有客忽𫝊龍坂至開樽如對馬軍嘗自註云錦屏山題名有記河南府使馬軍送新酒乃知杜詩有洗盞開嘗對馬軍東坡嘗誦鬼詩有織烏西飛客還家不解織烏何義王銍性之少年博學問之乃云織烏日也往來如梭之義酉陽雜俎曰于襄陽在鎮時選人劉某入京逢一舉人年二十許言語明悟同行數里意甚相得因藉草劉有酒傾數盃日暮舉人指支徑曰某敝止從此數里能左顧乎劉辭以程期迫舉人因賦詩曰流水涓涓芹努牙織烏西飛客還家荒邨無人作寒食殯宫空對棠梨花至明年劉歸襄州尋訪舉人則殯宫存焉打揲字見聞錄云須當打揲先往排辦東坡與潘彦明書云雪堂如要偃息且與打揲相伴皆使揲字今俗只使叠字誤也元豐中高麗使朴寅亮至明州象山尉張中以詩送之寅亮答詩序有花面艶吹愧鄰婦青唇之動桑間陋曲續郢人白雪之音之語事聞神宗詢左右以青唇事皆不能對乃問趙元老元老奏不經之語不敢以聞再三諭之元老誦太平廣記云有覩鄰夫見婦吹火贈詩云吹火朱唇動􅄈薪玉腕斜遥看烟裏面恰似霧中花其妻告其夫曰君豈不能學耶夫曰君當吹火吾亦效之夫乃為詩云吹火青唇動􅄈薪墨腕斜遥看烟裏面恰似鳩盤荼元老之強記雖怪僻小說無不該覽杜詩云江蓮揺白羽天棘夢青絲下句殊不可曉說者曰天棘柳也或曰天門冬也夢當作弄既無考據意亦短淺譚浚明嘗言此出佛書終南長老入定夢天帝賜以青棘之香葢言江蓮之香如所夢天棘之香爾此詩為僧齊已賦故引此事葉石林過庭錄亦言此句出佛書則浚明之言宜可信但未知果出何經耳梅和勝執禮宣和初為給事中與時相王黼論事不合改禮部侍郎遂黜守蘄復落職責守滁黼罷相復職知鎮江靖康初以翰林學士召其謝表有曰喜照壁間而見蝎乍離楓下而聞鐘葢照壁喜見蝎此韓退之詩句也離楓下聞鐘事則劉夢得自武陵例召赴京詩曰雲雨湘江起卧龍武陵樵客躡仙踪十年楚水楓林下今日乍聞長樂鐘葢用夢得詩語也和勝浦江人方未冠時家極貧而親老無以為養大雪中以詩謁邑宰云有令可干難閉户無人堪訪􅂴移舟邑令延之令訓其子弟方應舉未捷有詩自遣云天之未喪斯文也吾亦何為不豫哉後蔡薿榜登科終户部尚書死於靖康之難西漢諸儒楊子雲獨稱識字韓文公云凡為文者宜畧識字則識字豈易哉晁景迂晩年日課識十五字楊誠齋云無事好㸔韻書楊誠齋在館中與同舍談及晉于寳一吏進曰乃干寳非于也問何以知之吏取韻書以呈干字下注云晉有干寳誠齋大喜曰汝乃吾一字之師包遜字敏道有六子名皆從心其間名協者舍人指曰此非從心乃是從十有館客李肩留心字學特叩之云其義有二從十乃衆人之和是謂協和萬邦之協從心乃此心之和是謂三后恊心之恊宋人送使臣使􅆻丹詩以青瑣對紫濛多不知其出處按晉書慕容氏自云有熊氏之裔邑於紫濛之野葢以慕容比遼是時南北方結好故雖送别紀行之語畧不涉譏刺之言此用紫濛字亦𨼆而妙方虚谷以為􅆻丹館名妄猜之言爾道藏經云蝶交則粉退蜂交則黄退周美成詞云蝶粉蜂黄渾退了正用此也而說者以為宫粧且以退為褪誤矣少卿章岵嘗官於蜀持呉綾湖羅至官與川帛同染紅後還京師經黴潤呉湖帛色皆渝變惟蜀産者如舊後詢蜀人之由云蜀地畜􅁞與他邦異當其眠將起時以桑􅁅煨之故帛成宜色然世之重川紅以為染之良葢不知由􅁞所致也世謂太守為五馬人罕知其故事或言詩云孑孑干旟在浚之都素絲組之良馬五之鄭注謂周禮州長建旟漢太守比州長法御五馬故云後見龎幾先朝奉云古乘駟馬車至漢時太守出則增一馬事見漢官儀也左傳晉使子貢謂鄭人曰君有楚命亦不使一介行李告於寡人註行李謂行人也今人乃謂行李為行装非也長安故宫闕前有唐肺石尚在其制如佛寺所撃響石而甚大可長八九尺形如垂肺亦有欵誌但漶剥不可讀按秋官大司冦以肺石達窮民原其義乃伸􅁈者擊之立其下然後士聽其詞如今之撾登聞鼔也所以肺形者便於垂又肺主聲聲所以達其􅁈也東南之美有㑹稽之竹箭竹為竹箭為箭葢二物也今採箭以為矢而通謂矢為箭者因其材名之也至於用木為矢而謂之箭則謬矣人之年壯而髮斑白者俗曰筭髮以為心多思慮所致葢髮乃血之餘心主血血為心役不能上䕃乎髮也然本草云蕪菁子壓油塗頭能變蒜髮則亦可作蒜易說卦巽為寡髮陸徳明曰寡本作宣黑白雜曰宣髮據此則當用宣字為是衛山齋云凡字皆有對如饑之對飽寒之對暖悲之對歡之𩔖是也獨有渇字無不渴一字對之此雖戲言亦似有理又云向見鄉先生言關雎后妃之徳註家皆指后為太姒非也葢后即君耳妃乃夫人以夫人為后乃自秦始耳生曰名死曰諱載之禮經可覆禮部韻載先帝廟諱曰諱稱今上皇帝御名只曰名生人名乃曰諱不祥之甚也支干原作枝幹後人省文以幹為干以枝為支非也錢塘陳鑑如以寫神見推一時嘗持趙文敏公真像來呈公援筆改其所未然者因謂曰唇之上何以謂之人中若曰人身之中半則當在臍腹間葢自此而上眼耳鼻皆雙竅自此而下口暨二便皆單竅三畫隂三畫陽成泰卦也錢穆父試賢良對策日東坡晩往迓其歸置酒相勞各舉令為文穆父得傀儡除鎮南軍節度使制首句云某官勤勞王家出入幕府東坡見此兩句大加嗟賞葢世以傀儡起於王家也東坡詩留我同行木上坐贈君無語竹夫人昔慧日至夾山夾山問與甚麽人同行慧日云有个木上坐葢謂拄杖也山谷送曹子方赴閩漕詩子魚過印蠔破山不但蕉黄荔子丹子魚出於興化軍通應廟前字訛以應為印或曰子魚以容印者為佳故王荆公詩云長魚俎上通三印新茗齋中試一旗則此說容可信也東坡詩亦云通印子魚猶帶骨然山谷於蠔而云破山理不可曉蠔有高四五尺者水底見之如崖岸然故呼為山山谷謂之破山豈取蠔肉之謂耶京師東華門外景明坊有酒樓人謂之􅈨樓或以為樓主之姓非也本商賈鬻􅈨於此後為酒樓本名􅈨樓物纔數年不用便忘之建興間升朝官出入有柱斧其制是水晶小斧頭子在轎前至宣政間方罷之後人遂不識此物亦不聞其名矣前人畫像有執者今人呼墓前地為明堂伊川書為劵臺南軒欲改之後見唐人文字中言某朝詔改為劵臺王者各以其行盛日為祖衰日為臘故漢火徳以午日為祖戊日為臘魏土徳以辰日為臘晉金徳以丑日為臘祭名雖同而祭日則異祖長生也終墓庫也道家有五臘正月一日天臘五月五日地臘七月七日道徳臘十月一日民歲臘十二月正臘日為王侯臘陸士衡兄弟産於崑山後人因稱兄弟為崑玉言其如崑山之玉也宋稗𩔖鈔卷十九
