body:
  text: 宋稗類鈔卷二十二常熟潘永因編辭命第三十六太祖幸相國寺至佛像前燒香問當拜與不拜僧録贊寧奏曰不拜問其何故曰見在佛不拜過去佛遂以為定制議者以為得體雷德驤判大理寺便殿奏事太祖方燕服見之因問曰古者以官奴婢賜臣下遂與本家姓其意安在對曰古人制貴賤之分使不可瀆恐後世譜牒不明有以奴主為婚者太祖大喜曰卿深得古人立法意由是嘆重久之自後每德驤奏事雖在燕處必御𫀆帶以見德驤深於易酷嗜吟咏王元之出其門下同子有鄰有終俱為名臣張僕射齊賢以吏部尚書知青州六年其治安靜民甚懷之好事者或謗其居官弛慢朝廷召還公語人曰向作宰相幸無大過今典一郡乃招物議正是監御厨三十年臨老反煮粥不了冦萊公鎮大名北使至語冦曰相公望重何故不在中書冦曰主上以朝廷無事北門鎖鑰非準不可耳丁崖州雖險詐然亦有長者言真宗嘗怒一朝士再三語之丁輒逡巡不答上作色曰如此叵測問輒不應丁進曰雷霆之下臣何容更進一言上怒頓霽真宗朝每嵗賞花釣魚羣臣應制偶一日垂綸久之而御餌不食時丁晉公詩云鶯驚鳯輦穿花去魚畏龍顔上釣遲上既激賞羣臣亦自嘆不及南唐元宗釣魚不上優人李嘉明進詩云玉甃垂鈎興正濃碧池春暖水溶溶凡魚不敢吞香餌知是君王合釣龍謂换骨更佳丁晉公之南遷也行過潭州自作齋僧疏云補仲山之衮雖曲盡於我心和傅説之羮實難調於衆口公少以文稱晚年詩筆尤精在海外篇咏甚多如草解忘憂憂底事花名含笑笑何人尤為人所傳誦世傳王文穆欽若遭遇章聖本由一言之寤章聖踐祚之初天下宿逋數百萬計時文穆判三司理欠司一日抗疏請盡蠲放以惠民上遽召詰之曰此若可以惠民曷為先帝不行公對曰先帝所以不行者欲以遺陛下使結天下人心於是上戚然頷之不數年遂大拜有水先生者頗能前知禍福王子野待制甚敬信之子野正食羅列珍品甚盛水生適至子野指謂生曰試觀之何物可以下飰生遍視良久曰此皆未可惟飢可以下飰爾李資政邦直有與韓魏公書云前書戲問玉梳金箆者侍白髮翁幾欲淡死矣然常山頗多老伶人吹彈甚熟日使教此五六人近者稍便串異時當令傳飲期一釂觴也玉梳金箆蓋邦直侍姬人或問命名之意邦直笑曰此俗所謂沙門置梳箆洪駒父集侍兒小名録三卷王性之續一卷好事者復益所未備頗足為樽俎諧謔之助士大夫昵裙𥚑之樂每苦侍巾櫛輩得之維難或得一焉不問色藝如何雖資至凡下必極加以美稱名浮于實類有可笑者豈故為是矜衒特賞平日妄想不足則夸爾文潞公帥長安見石才叔蒼舒所藏禇河南聖教序墨迹愛玩不已令子弟臨一本休日宴僚屬出二本令坐客别之客盛稱公臨本為真才叔不出一語辨答啓潞公云今日方知蒼舒孤寒王荆公作相裁損宗室恩數宗子相率馬首陳狀云均是宗廟子孫那得不看祖宗面荆公厲聲曰祖宗親盡亦須祧何况賢輩於是皆散去王荆公居鍾山日與金華俞秀老紫芝過故人家飲飲罷小憩水亭顧水際沙間有饌器數件皆黃白物意吏卒所竊使人問之乃小兒適聚於此食棗栗盡棄之而去荆公謂秀老曰士欲任大事閲富貴如羣兒作息乃可耳嘉祐初李仲昌議開六漯河王荆公時為館職頗右之既而功不成仲昌以贓敗劉侍讀原甫戲荆公曰要當如宗人彛甫不與世事可也荆公答曰天下之事所以易壞而難合者正以諸賢無意如鄙宗彛甫也但神聖在上故公家元海未敢跋扈耳東坡性不忍事嘗云如食中有蠅吐之乃已又公嘗自言性不慎言語與人無親踈輒輸瀉肝膽有所不盡如茹物不下必吐盡乃已而世或記疏以為怨咨東坡在儋耳因試筆嘗自書云吾始至南海環視天水無際悽然傷之曰何時得出此島耶已而思之天地在積水中九州在大瀛海中中國在少海中有生孰不在島者覆盆水於地芥浮於水蟻附於芥茫然不知所濟少焉水涸蟻即徑去見其類出涕曰幾不復與子相見豈知俯仰之間有方軌八達之路乎念此可為一笑蘇長公自黃移汝道出金陵見介甫甚歡長公曰某欲有言於公介甫色動意長公辨前日事長公曰某所言天下事介甫色定長公曰大兵大獄漢唐滅亡之兆祖宗以仁厚治天下正欲革此今西方用兵東南數起大獄公獨無一言乎介甫舉兩指示長公曰二事皆惠卿啓之某在外安敢言長公曰在朝則言在外則不言事上之常禮耳上所以待公者非常禮公豈得以常禮自處介甫厲聲曰某須説又言出在安石口入在子瞻耳蓋介甫畏惠卿恐長公泄之也介甫又語長公人須是知行一不義殺一不辜而得天下弗為乃可長公曰今之君子爭減半年磨勘雖殺人亦為之介甫笑而不言蘇長公云元豐六年十月二日夜解衣欲睡月色入户欣然起行念無與樂者遂至承天寺尋張懷民懷民亦未寐相與步於中庭庭中如積水空明水中藻荇橫交蓋竹柏影也何夜無月何處無竹柏但少間人如吾兩人耳蘇子曕云嵗行盡矣風雨凄然紙窗竹屋燈青熒熒時於此間得少佳趣一日舉以似劉貢父貢父曰前數句是夜行迷路誤入田螺精家中來蘇長公云久在江湖不見偉人前在金山見滕元發乘小舟破巨浪來相訪出船巍然使人神聳元祐中遼使劉霄入賀蘇公與狄詠館伴錫燕回始行公馬小蹶劉即前詢云馬驚無苦否公應曰銜勒在御雖小失無傷也詠武襄子也頗美丰姿神宗大長公主哲宗朝重於求配遍士族中求之莫中聖意近臣奏曰不知要如何人物哲宗曰人物要如狄詠者天下謂咏為人樣子班行李質人材魁岸磊落甚偉徽廟朝欲求一人相稱者為對竟無可儷當時同列目為察隻子京師俚語謂無對曰察隻劉壯輿羲仲嘗摘歐陽公五代史之訛誤為紏謬以示東坡東坡曰往嵗歐陽著此書初成王荆公謂余曰歐陽公修五代史而不修三國志非也子盍為之余固辭不敢當夫為史者網羅數十百年之事以成一書其間豈能無小得失余所以不敢當荆公之託者正畏如公之徒掇拾其後耳壯輿父劉恕字道原以史學自名壯輿世其家學東坡謂劉壯輿曰三國志注中好事甚多道原欲修之而不果君不可辭也壯輿曰端明曷不為之坡曰某雖工於語言亦不是當行家王定國寄詩於東坡坡答書云新詩篇篇皆竒老拙此回真不及矣窮人之具輒欲交割與公魏道輔泰見而笑曰定國亦難作交代祗是且權攝耳蔣頴叔之竒既貴項上大贅每忌人視之為六路大漕至金山寺僧了元即佛印與蔣相善一日見蔣即手捫其贅蔣心惡之了元徐曰沖卿在前頴叔在後蔣大喜慈聖皇后嘗夢神人語云太平宰相項安節神宗密求諸朝臣無有此人久之吳沖卿為上相瘰癤生頸間一日立朝項上腫如拳后見之告上曰此真項安癤也嶽武穆嘗入見帝從容問曰卿得良馬不武穆答曰臣有二馬日啖芻豆數斗飲泉一斛然非精潔即不受介而馳初不甚疾比行百里始奮迅自午至酉猶可二百里禠鞍甲而不息不汗此其受大而不茍取力裕而不求逞致逺之材也不幸相繼以死今所乘者日不過數升而秣不擇粟飲不擇泉攬轡未安踊躍疾驅甫百里力竭汗喘殆欲斃然此其寡取易盈好逞易窮駑鈍之材也帝稱善曰卿今議論極進孝宗留心經術無所不􅍱奏對官𬒳顧問者每致失措有王過者蜀人上殿上驟問曰李融字若川謂何過即對曰天地之氣融而為川結而為山李融之字若川如元結之字次山也上大喜遂詔改官密院編修甄龍友字雲卿永嘉人滑稽辨捷為近世之冠樓宣獻自西掖出守以首春觴客甄預坐席間謂公曰今年春氣一何太甚公問其故甄曰以果奩甘蔗知之根在公前而末已至此公為罰長吏衆訾其猥率嘗遊天竺寺集詩句贊大士大書於壁云巧笑倩兮美目盻兮彼美人兮西方之人兮孝宗臨幸一見賞之詔侍臣物色其人或以甄姓名聞曰是溫州狂生用之恐敗風俗上曰惟此一人朕舉之甄時為邑宰趨召登殿上迎問曰卿何故名龍友甄罔然不知所對既退乃得之曰君為堯舜之君故臣得與夔龍為友由是不稱旨淳熙中孝宗及皇太子朝上皇於德夀宮置酒賦詩為樂從臣皆和周益公詩云一丁扶火德三合鞏皇基蓋髙宗生於大觀丁亥孝宗生於建炎丁未光宗生於紹興丁卯故也隂陽家以亥卯未為三合一時用事可為切當其後楊誠齋為光宗宫僚時寧宗方在平陽邸其賀夀詩云祖堯父舜真千載禹子湯孫更一家又云天意分明昌火德誕辰三世總丁年蓋祖益公語也嘉熙己亥四月誕皇子告廟祝文學士李劉功甫當制內用四柱作一聨云亥年已月無長蛇封豕之虞午日丑時有歸馬放牛之意蓋當時方有蜀警其用事可謂中的丁常任毗陵人淳熙間為郎冬至日上殿奏對玉音曰晚來雲物甚竒卿曽見否常任實不曾見即對曰豈惟臣見之四海萬姓皆見之孝宗大喜曰卿對甚偉命除淮漕溫陽之山有老人行年一百二十二矣淳熙登號之三年朝廷舉行曠世之典有采樵者進而問之曰今天子朝太上皇德夀宫奉玉巵上千萬嵗夀肆大赦加恩區內無問於已仕未仕之父母第其年之如詔者而授之官叟何為弗與老人對曰吾未及其年樵者曰叟年踰期頥若為而未及對曰天有二日人有二年有富貴之年有貧賤之年富貴之年舒以長貧賤之年促以短吾自幼至老未嘗識富貴之事身不具毛褐不知氷綃霧縠之為麗服也口不厭藜藿不知熊蹯豹胎之為珍羞也目不覩靡曼之色而蓬頭齞脣之與居耳不聽絲竹之音而蕘歌牧嘯之為樂今吾雖閲一百二十二年之寒暑而不離貧賤若不二當一則吾之年始六十有一與詔不相應是以為未及又何敢冒其官曰今之世有年未及益其數求以應詔者朝廷亦官之何也對曰彼富貴者也吾固言之矣是所謂以一而當二者也其學寧越之徒歟吾儕小人不敢求其比樵者笑而退潘良貴字子賤自少有氣節數忤權貴自少至老出入三朝而前後在官不過八百六十餘日所居僅蔽風雨郭外無寸尺之田有磨鏡帖行於世言讀書者將以治心養性如用藥以磨鏡也若積藥鏡上而不加磨治未必不反為鏡纍張禹孔光是已其大意如此世以為名言子賤自號默成居士金國與西夏議和翰林待制馮延登為使時李獻甫以書表官從行夏使有口辨延登不能折往復數日至以嵗幣為言獻甫不能平從旁進曰夏國與我和好百年今易君臣之名為兄弟之國兄輸弟幣寧有據耶使者曰兄弟且不論宋嵗輸吾國幣二十五萬匹典故具在金朝必欲修舊好非此例不可獻甫作色曰使者尚忍言耶宋以嵗幣餌君家而賜之姓岸然以君父自居夏國君臣無一悟者誠謂使者當以為諱乃今公言之使者果能主此議以從賜姓之例弊邑雖嵗捐五十萬獻甫請以身任之夏使語塞和議乃定中書丞相史忠武王天澤髭髯已白一朝忽盡黑世皇見之驚問曰史拔都汝之髯何乃更黑耶對曰臣用藥染之故也上曰染之欲何如曰臣覽鏡見髭髯白竊傷年且暮盡忠於陛下之日短矣因染之使玄而報效之心不異疇昔耳上大喜人皆以王捷於奏對漢人賜稱拔都者惟王與張𢎞範及張興祖耳元文敏公明善參議中書日副蒙古大臣使交趾將還國主賚以金蒙古受之公固辭國主曰彼使臣已受矣公獨何為公曰彼所以受者安小國之心我所以不受者全大國之體國主嘆服許魯齋衡中統元年應召赴都道謁劉靜修因謂曰公一聘而起毋乃太速乎答曰不如此則道不行至元二十年徴劉公至以為贊善大夫未幾辭去又召為集賢學士復以疾辭或問之曰不如此則道不尊尚論第三十七栁開少好任氣大言淩物應舉時以文章投主司於簾前多至千軸載以獨輪車引試日衣襴自擁車入欲以此駭衆取名時張景能文有名惟袖一書簾前獻之主司大稱賞擢景優等時人為之語曰栁開千軸不如張景一書冦忠愍拜相白麻楊大年之詞其間四句曰能斷大事不拘小節有干將之器不露鋒鋩懷照物之明而能包納冦得之甚喜曰正得我胸中事例外别贈白金百兩張乖崖嘗稱使冦公治蜀未必如詠至於澶淵一擲詠不敢為夏英公言楊文公文如錦繡屏風但無骨耳議者謂英公之文譬諸泉水迅急湍悍至于浩蕩汪洋不如文公六一居士曰聖俞子美齊名於一時而二家詩體特異子美筆力豪俊以超邁橫絶為竒聖俞覃思精微以深逺間淡為意各極其長雖善論者不能優劣也李文叔嘗有雜書論左馬班范韓之才云司馬遷之視左丘明如麗倡黠婦長歌緩舞間以諧笑傾蓋立至亦可喜矣然而不如絶代之女方且却鉛黛曵縞紵施帷帳徘徊微吟於髙堂之上使淫夫穴隙而見之雖失氣疾歸不食以死而終不敢意其一啓齒而笑也班固之視馬遷如韓魏之壯馬短鬛大腹服千鈞之重以䇿隨之日夜不休則亦無所不至矣而曽不如騕􅒁之馬方且脫驤逸駕驕嘶顧影俄而縱轡一騁千里即至也范曄之視班固如勤師勞政手胝簿版口倦呼叱毫舉縷詰自以為工不可復加而僅足為治曾不如武健之吏不動聲色提一二綱目羣吏為之趨走而境內晏如也韓愈之視范曄如千室之邑百家之聚有儒生崛起於蓬蓽之下詩書傳記鏘鏘然常欲鳴於齒頰間忽遇夫奕世公卿不學無術之子弟乘髙車從虎士而至數顧其左右偃蹇侮笑無少敬其主之容雖鄙惡而體已下之矣文叔易安之父蕭注字巖夫臨川新喻人熙寧中上殿奏對上問今臣僚中孰貴曰文彥慱又問其次曰韓琦上曰文彥慱跛履韓琦嘶聲何為皆貴注曰兩人若不跛履嘶聲陛下將不得而臣又問韓綘王安石馮京曰安石牛耳虎頭視物如射意往直行敢當天下大事然不如綘得和氣多惟和氣能養萬物京得五行之秀逺之若可愛近之則亷隅韓魏公聲雌文潞公步碎相者以為二公無此二事皆非人臣之相慶厯中河北道士賈衆妙善相以為曾魯公脊骨如龍王荆公目晴如龍蓋人能得龍之一體者皆貴極人爵見豫章黃庠手曰左手得龍瓜雖當魁天下而不仕若右手得之則貴矣庠果為南省第一不及廷對而死黃魯直嘗言人心動則目動王介甫終日目不停轉大凡應大變處大事須是定靜凝重如周公之赤舄几几是也漢武帝因不移步識霍光因不轉盻識金日磾亦是窺見他定靜凝重處故逆知其可以托孤寄命韓魏公之凝立亦此意也歐陽公謂其垂紳正笏不動聲色而措天下於泰山之安形容得最好蘇端明平生寢卧時巳就枕則安然不復翻動劉元城對賓客或晏居雖暗室嘗端坐略無欹仄至於終日蘇叔黨嘗讀南史東坡卧聽之因語叔黨曰王僧虔居建康禁中里馬糞巷子孫賢實謙和時人稱馬糞諸王為長者東漢贊論李固云觀胡廣趙戒如糞土糞之穢也一經僧虔便為佳話而以比胡趙則糞土有時而不幸汝可不知乎吳子經臨川人荆公之舅歐陽文忠公集所載五言古詩送吳生即子經也嘗著語録數卷其論孟子楊雄荀卿論性不同曰稚子夜啼拊背以哀之而不止取果以與之而不止許之以早市物而不止於是其母滅燭其父伏户下為鬼嘯出垣後為狐鳴則其口如窒此事所以貴乎權也韓子蒼云此等語絶似莊子王平甫閲韓退之送石洪溫造二處士詩序言退之善與處士作牙吕晦叔王介甫同為館職當時閣中皆名士每評論古今人物治喪衆人之論必止於介甫介甫之論又為晦叔止也一日論劉向當漢末言天下事反復不休或以為知忠義或以為不達時變議未決介甫來衆問之介甫卒對曰劉向強䀨人耳衆意未滿晦叔來又問之則曰同姓之卿歟衆乃服朝祕監美叔以集句示劉貢父貢父曰君髙明之識輔以家世文學何至作此等伎倆殊非我素所期也吾嘗謂集古人句譬如蓬蓽之士適有佳客既無自己庖厨而器皿肴􅉡悉假貸於人收拾餖飣意欲強學豪奢而寒酸之氣終是不去何如貴公供帳不移水陸之珍咄嗟而辦昔人云腹不飽詩書甚於餒目不接前輩謂之瞽身不逺聲利甚於穽骨不脫俗氣甚於痼楊敬仲先生曰仕宦以孤寒為安身讀書以飢餓為進道居家以無事為平安朋友以相見迹為久要理到之言也劉器之待制對客多默坐往往不交一談至於終日客意甚倦或請去輒不聽至留之再三有問之者曰人能終日危坐而不欠伸欹側蓋百無一二其能之者必貴人也以其言試人皆驗徐師川俯曰東坡山谷瑩中三君皆余所畏然各有可笑東坡議論諫諍真能殺身成仁者夫死生旦暮爾而欲學長生不死山谷赴官姑熟既至未視事聞當罷不去竟俯就之七日符至乃去問其故曰不爾無舟吏可遷夫士之進退極欲分明豈可以舟吏為纍瑩中大節昭著是能必行其志者當視爵祿如糞土然猶時對日者説命曾子固與王荆公友善後神宗以問子固云卿與王安石相知最早安石果何如子固曰安石文章行誼不減楊雄以吝故不及神宗遽曰安石輕富貴似不吝也子固曰臣所謂吝者以安石勇於有為而吝於改過耳神宗頷之唐子西在惠州名酒之和者曰養生主徑者曰齊物論楊誠齋退居名酒之和者曰金盤露徑者曰椒花雨嘗言余愛金盤露甚於椒花雨唐子西言司馬遷敢亂道却好班固不敢亂道却不好不亂道又好是左傳亂道又不好是唐書八識田中若有一毫唐書亦為來生種子矣宋世嘗目莊周為道家之儀秦王通孔門之操莾洪文敏邁曰士之處世視富貴利祿當如優伶之為參軍方其據几正坐噫嗚呵箠羣優拱而聽命戲罷則亦已矣見紛華盛麗當如老人之撫節物以上元清明言之方少年壯盛晝夜出遊若恐不暇燈收花暮輒悵然移日不能忘老人則不然未嘗置欣戚於胸中也覩金珠珍玩當如小兒之弄戲劇方雜然前陳疑若可悅即委之以去了無戀想遭橫逆機穽當如醉人之受罵辱耳無所聞目無所見酒醒之後所以為我者自若也何所加損哉吕東萊言凡事只須平心尋常犯權貴取禍者多是張大其事邀不畏強禦之名所以彼不能平若處得平穩妥帖彼雖不樂視前則有間矣然所以不欲拈出者非以避禍蓋此乃職分之常若特然看做一件事則發處已自不是矣朱文公告陳同甫云真正大英雄人却從戰戰兢兢臨深履薄處做將出來若是血氣粗豪却一點使不著也此論於同甫可謂頂門上一針矣余觀大禹不矜不伐愚夫愚婦皆謂一能勝豫而鑿龍門排伊闕明德美功被千萬世周公不驕不吝勞謙下士而東征三年赤舄几几履讒厯變卒安周室孔子恂恂於鄉黨在宗廟朝廷似不能言者而却萊裔墮三都誅少正邜便有一變至道氣象此皆所謂真正大英雄也後世之士殘忍刻核能聚斂能殺戮者則謂之有才閙鄰罵坐無忌憚無顧藉者則謂之有氣計利就便善押闔善傾覆者則謂之有智一旦臨利害得喪生死禍福之際鮮有不顛沛錯亂震懼隕越而失其度者况望其立大節彌大變撑拄乾坤昭洗日月乎此無他任其氣稟之偏安其識見之陋驕恣傲誕不知有所謂戰戰兢兢臨深履薄之工夫故也林行已曰天將祚其國必祚其國之君子視其君子之衆多如林則知其國之盛視其君子落落如晨星則知其國之衰視其君子之康寧福澤如山如海則知其為太平之象視其君子之摧折頓挫如湍舟如霜木則知其為衰亂之時又曰天將使建中為崇寧則不使范忠宣復相於初元天將使宣和為靖康則不使劉陳二忠肅憗遺於數嵗皆至論也羅大經云張耳陳餘變姓名為里監門餘不受里吏笞耳責而數之耳之見過餘逺矣餘卒敗死泜水上而耳事漢富貴夀考福流子孫非偶然也大智大勇必能忍小恥小忿彼其雲蒸龍變欲有所會豈與瑣瑣者校乎東坡論子房潁濱論劉項專説一忍字張公藝九世同居亦只是得此一字之力杜牧之云包羞忍耻是男兒宣和中有反語云冦萊公之知人則哲王子明之將順其美包孝肅之飲人以和王介甫之不言所利此皆賢者之過人皆得而見之者也黨籍偽學之禁雖小人無忌憚亦君子有以釀之劉安世嘗云願士大夫有此名節不願士大夫立此門户此元祐之士病也黃履翁云願士大夫務道學之實不願士大夫立道學之名此淳熙以後士病也陳同甫與朱子書略云因吾眼之偶開便以為得不傳之絶學三三兩兩附耳而語有同告密畫界而立一似結壇盡絶一世之人於門外而謂二千年之君子皆盲眼不可點洗二千年之天地日月若有若無世界皆是利欲亦過矣世言歐陽永叔每誇政事不誇文章蔡君謨不誇書吕濟叔不誇棋何公南不誇飲酒司馬君實不誇清約大抵不足則誇也劉須溪會孟題蘇李泣别圖云事已矣泣何為蘇武節李陵詩噫馮海粟子振題楊妃病齒圖云華清宫一齒痛馬嵬坡一身痛漁陽鼙鼓動地來天下痛陳伯敷繹曾題楊妃上馬嬌圖云此索清平調詞赴沉香亭時耶抑聞漁陽鼙鼓聲赴馬嵬坡時也上馬固相似情狀大不同觀者當審諸觀三公跋語痛快嚴峻抑揚感傷使後世之為人君而荒於色為人臣而失其節者見之寧不知懼乎宋稗類鈔卷二十二
