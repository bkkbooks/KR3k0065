body:
  text: 宋稗𩔖鈔卷四常熟潘永因編誅讁第七盧相多遜素與趙韓王不協韓王為樞密使盧為翰林學士一日偶同奏事上初改元乾徳因言此號從古未有韓王從旁稱美盧曰此偽蜀時號也帝大驚遽令檢史視之信然遂怒以筆抺韓王靣曰汝爭得如他韓王經宿不敢洗靣翼日奉對帝方命滌去自此隙益深以及於禍多遜朱崖謝表末云班超生入玉門非敢望也子牟心存魏闕何日忘之天下聞而哀焉寇忠愍公之貶也初以列卿知安州既而又貶衡州副使又貶道州别駕遂貶雷州司戸時丁晉公與馮相拯在中書丁當秉筆初欲貶崖州而丁忽自疑語馮曰崖州再渉鯨波如何馮唯唯而已丁乃徐擬雷州及丁之貶也馮遂擬崖州當時好事者相語曰若見雷州寇司戸人生何處不相逢比丁之南也冦復移道州聞丁當來遣人以蒸羊逆於境上而收其僮僕杜門不放出聞者多以為得體王文正公嘗曰好人懐惠又欲人畏威皆大臣所宜避而㓂凖自以為己任此其短也丁晉公既傾李公廸將草責詞時宋宣憲知制誥當直請其罪名謂曰春秋無將漢法不道皆其事也宋不得已從之詞既成謂猶嫌其不切多所改定其言上前爭議曰罹此震驚遂至沉頓謂所定也及謂貶朱崖宋猶掌詞命即為之詞曰無將之戒深著於魯經不道之誅難迯於漢法天下快之杜祁公作相其壻蘇子美為館職兼進奏院每嵗院中賽神例賣故紙錢為燕飲之費蘇承例賣故紙因出已錢添助為費請館閣諸名勝而分别流品非其侣者皆不得與㑹李定願與而蘇不肻於是盡招兩軍女妓作樂爛飲共為傲歌王直柔句云欲倒太極遣帝扶周公孔子驅為奴諸不與者専探伺敗缺方聞此句王拱辰即以白上仁宗大怒即令中官捉捕諸公皆已散走逃匿而上盛怒捕捉甚峻韓魏公上言怒少解而館閣之士遂罷一空吕惠卿元祐間貶建州紹聖初復起語人曰吾在讁籍九年雖冷水亦不敢飲設有疾病則好事者必謂吾戚戚所致矣蔡京懐奸固位屢𬒳逐而不肯退王黼切忌之百方欲其去乃稱㫖遣童貫偕其子攸往取表京以攸𬒳詔同至乃置酒留貫攸亦預焉京以事出不意一時失措酒行自陳曰京衰老宜去而不忍遽乞身者以上恩未報此二公所知也時左右聞京併呼其子為公莫不竊笑欲取宰輔乞表自京始嘗攷晁錯更漢令諸侯喧譁錯父聞之從潁川來謂錯曰上初即位公為政用事侵削諸侯疏人骨肉口語多怨公何謂也錯曰固也不如此天子不尊宗廟不安父曰劉氏安矣晁氏危吾去公歸矣凡三呼其子為公史筆書之亦以表其失言蘇子瞻元豐間赴詔獄與其長子邁俱行與之期送食惟菜與肉有不測則撤二物而送魚使伺外間以為候邁謹守踰月忽糧盡出謀於陳留委其親戚代送而忘語其約親戚偶得魚鮓送之不兼他物子瞻大駭知不免將以祈哀於上而無以自逹乃作二詩寄子由祝獄吏致之葢意獄吏不敢𨼆則必以聞已而果然神宗初固無殺意見詩益心動自是遂欲從寛釋凡為深文者皆拒之其詩云栢臺霜氣夜淒淒風動琅璫月向低夢繞雲山心似鹿魂飛湯火命如雞額中犀角真吾子身後牛衣愧老妻他日神遊定何所桐鄉應在浙江西聖主如天萬物春小臣愚暗自亡身百年未了須還債十口無家更累人是處青山可蔵骨他年夜雨獨傷神與君世世為兄弟更結來生未了因靖康中蔡元長父子既敗言者攻之𤼵其奸惡不遺餘力葢其門下士如楊中立孫仲益之𩔖是也李泰𤼵是時為侍御史獨不露章且勸勿為太甚坐讁監汀州酒税謝表云當垂涕止彎弓之射人以為狂然臨危多下石之徒臣則不敢士大夫多稱之王黼一日在相國寺行香見蔡京以太師魯國公揭榜序立其下深有羡慕之色曰不謂元長有許大官職或因言太宰若能承當一大事元長官職不難至黼識其意乃身任伐燕之責後亦致位太傅楚國公寵遇埒於京及事敗適開封尹聶山有宿怨遣武吏追躡戕於雍丘固村民家取其首以獻以遇盗聞議者惜不與童貫軰明正典刑同時蔡攸翛亦賜死翛聞命曰誤國如此死又何憾乃飲藥而攸猶豫不能决左右授以繩乃自縊而死蔡攸副童貫出師北伐徽宗與其父京曰攸陛辭日奏功成後要問朕覔念四五都知其英氣如此京但謝以小子無狀二人乃上寵嬪念四者閻媫妤也童貫既有詔誅之欽宗論宰執云貫素姦狡須得熟識其靣目者銜命即所在行刑庶免差誤時宰命御史張逹明徴持詔行將至南雄州逹明恐其聞而引决不及明正典刑乃先遣親事官一人馳往見貫至則通謁拜賀於庭曰有詔遣中使賜茶藥宣召大王赴闕且聞已有河北宣撫之命主上與大臣熟議以為有威望習邊事無如大王者貫乃大喜顧左右曰又却是少我不得明日逹明乃至貫既伏誅其死所忽有物在地如水銀鏡徑三四尺俄而歛縮不見逹明復命函貫首自隨以生油水銀浸之而以生牛皮固函或言勝㨗兵有欲奪貫首逹明恐亡之乃置首於竹轎中坐其上然所傳葢妄也貫狀貌魁梧瞻視壯偉頥下生鬚十數莖皮骨勁如鐵不𩔖閹人紹興壬戌夏顯仁太后自沙漠南歸詔遣叅知政事王慶曽次翁與后弟韋淵迓於境上時金主亦遣其近臣與内侍凡五軰䕶后行既次燕山北使憚於暑行后察其意虞有他變稱疾請於金少須秋凉進𤼵許之因稱貸於金之副使得黄金三百星且約至對境倍息以還后既得金營辦佛事之餘盡以犒從者悉皆懽然中途無間言由此力也既抵境上金使必欲先得所負然後進后喻指於韋淵淵辭以朝廷有大臣在可徴索之遂詢於慶曽初慶曽之行也事之纖細悉受指於秦丞相獨此偶出不料金使趣金甚急慶曽雖所賫甚厚然心懼秦疑其私相結納歸欲攘其位必貽秦怒堅執不肯償相持界上者三日九重初不知曲折但與先報后渡淮之日既愆期人情洶洶謂金已背盟中變秦適以疾在告朝廷遂為備邊計中外大恐時王􅀈以江東轉運副使為奉迎提舉知事急力為慶曽言之不從􅀈乃自裒其隨行所有僅及其數以與之金使喜后即日南渡疑懼釋然而慶曽不預也慶曽歸白秦謂所以然者以未始禀命故不敢専秦以為畏已果大喜已而后泣訴於上王某大臣不顧國家利害如此萬一數日間生變則使我母子不相見矣上震怒欲暴其罪而誅之秦力為營捄回䕶時正欲遣柄臣謝金乃以為報謝使以避上怒逮歸上怒稍霽然終惡之秦喻使辭位遂以職名奉祠已而引年安居於四明秦終憐之餽問不絶秦之擅國凡居政府者莫不以㣲過忤其指例以罪行獨慶曽以此情好不替慶曽卒特為開陳贈䘏加厚諸子與壻親戚族人添差浙東者又數人以便其私議者謂秦居政府二十年間終始不二者獨慶曽一人而已即此一節見顯仁之能用智術以囘轅王慶曽之専心於權要至違命天子之母於患難之際而不恤秦之威福能使天子以慈母之故終不能加誅於一人時事可知矣史彌逺與楊后謀殺韓侂胄著作王居安右丞張鎡皆與議已定始以告叅政李璧時外間已藉藉一日侂胄在都堂忽謂李叅政曰聞有人欲變局相公知否李疑事洩面𤼵赤徐答曰恐無是事而王居安在館中與同舍大言曰數日之後耳目當一新矣其不密如此彌逺聞之大懼然亦未决意殺之更訪於張鎡鎡曰勢不兩立不如殺之無後患彌逺撫几曰君真將種也吾計决矣時開禧三年十一月二日侂胄愛姬號滿頭花者生辰張鎡素與之通家至是移庖侂胄府酣飲至五鼓其夕周筠以覆帖告變時侂胄已𬒳酒視之曰這漢又來胡説於燭上焚之明日早朝筠復白其事侂胄叱之曰誰敢誰敢升車而去甫至六部橋夏震時以中軍統制權殿司公事選兵三百竢於此忽聲喏道傍曰有㫖太師罷平章事日下出國門侂胄曰有㫖吾為何不知語未竟夏挺王斌等令健卒百餘人擁其轎以出至玉津園夾墻内撾殺之侂胄既誅函首送金乞和當時太學諸生有詩曰自古和戎有大權未聞函首可安邊生靈肝腦空塗地祖父冤仇共戴天晁錯已誅終叛漢於期未遣尚存燕廟堂自謂萬全䇿却恐防邊未必然明年閤門舍人周登出聘金主令引南使觀忠繆侯墓且釋曰忠於為國繆於為身詢之乃韓也韓侂胄封平原郡王官太師一時獻佞者皆稱師王時叅知政事錢象祖嘗諌用兵與侂胄有隙史彌逺遂與合謀殺之寧宗實不知也都下為之語曰釋迦佛中間坐羅漢神立兩傍文殊普賢自鬬象祖打殺師王聞者絶倒景定庚申履齋呉相循州安置由賈似道憾之未幾除承節郎劉宗申知循州劉江湖士専以口舌嚇迫當路要人貨賄官爵士大夫畏其口姑厚飽彌縫之其得官亦由此守循之際廟堂意責之以黄祖之事宗申至郡所以捃摭履齋者無不至隨行吏僕以次並亡或謂置毒所居井中故飲水者皆患足軟而死履齋亦不免暨似道遭鄭虎臣之辱時趙介如守漳賈門下客也宴虎臣於公舍介如欲客似道似道不可口口稱天使唯謹虎臣不答似道遂坐於下介如察其有殺賈意私命館人以辭挑之於時似道衣服飲食皆為鄭減抑介如作緜衣等餽之見其行李輜重令截寄其處伺得命放回日就取館人語鄭云天使今日押送至此度必無生理曷若令速殞免受許多苦惱鄭即云便是這物事受得欲死而不死未幾遂殞趙往哭鄭不許趙固争鄭怒云汝欲檢我耶趙云汝也直得一檢趙經紀棺歛且致祭其辭云嗚呼履齋死循死於宗申先生死閩死於虎臣天乎人乎莫得而詢嗚呼云云似道遭貶時人題其壁云去年秋今年秋湖上人家樂復憂西湖依舊流呉循州賈循州十五年間一轉頭人生放下休呉履齋潛為人豪雋代丁大全為相其兄弟多以附麗登庸似道與潛有隙遂為飛謡以上曰大蜈蚣小蜈蚣盡是人間業毒蟲夤緣攀附百蟲叢若使飛天能食龍語聞罷相讁循州中毒死賈師憲柄國日嘗夢一金紫人相逢迎傍有客謂之曰此人姓鄭是能制公之死命時大璫鄭師望方用事意疑其人竟以他故擯逐之及魯港失律逺讁南荒就紹興差官押送則攝山隂尉鄭虎臣也鄭武弁嘗為賈所惡適有是役遂甘心焉賈臨行歴言前夢且云向在維揚日襄鄧間有人善相一日來值某跣足卧因歎惜再三私謂客曰相公位極人臣而足心内陷是名猴形恐異時不免有萬里行耳是知今日竄逐之事雖滿盈招咎葢亦有數存焉及抵清漳之次日泣謂押行官曰某夜來得夢大不祥離此地必死幸保全之遂留連三日逗遛不行而官吏迫促之離城方五里許小泊木緜菴竟以疾殂虎臣有力焉先是林僉樞存儒久為賈所擯讁之南州道死於漳漳有富民蓄油杉甚佳林氏子弟欲求之而價穹不可得因撫其木曰收取收取留與賈丞相自用葢一時憤悵之語耳至是郡守與經營竟將此木以歛可謂異矣一云秋壑在前有術者言平章不利姓鄭人自是凡此姓居位者多𬒳窘抑武學生鄭虎臣登科輙以罪配之後遇赦得還秋壑喪師陳静觀諸公欲置之死遂尋其平日極仇者監押虎臣遂請行乃假以武功大夫押解一路備見凌辱至漳州木緜菴病泄虎臣知其服腦子求死乃云好教你只恁地死遂趯數下而殂賈似道既敗事聞臺臣交章攻之詔曰大臣具四海之瞻罪莫大於誤國都督専閫外之寄律尤重於䘮師告九廟以奉辭詔羣工而聽命具官似道小才無取大道未聞昔相穆陵徒以邊將而自詭逮事先帝又以國事而自専謂宜開誠布公以扶皇極并謀合智以盡輿情乃恣行胸臆不恤人言以吏道沮格人材以兵術剸裁機務括田之令行而農不得耕於野權利之法變而旅不願出其途矧當任閫之驅馳不度戎事之緩急戰功曠嵗而不舉兵事愒日而不修纖悉於文法之捜求濶畧於邊政之急切遂令戎馬倐度長江迺者抗表出師請身戡難人方期以孔明之志朕亦望以裴度之功謂當纓冠而疾趨何為抱頭而䑕竄遂致三軍解體百將離心彼披甲之謂何乃聞聲而奔潰孟子曰吾何畏彼左氏云我不成夫社稷之勢綴旒是誰之過縉紳之言切齒罪安得辭姑示薄罰俾爾奉祠可罷平章軍國重事都督諸路軍馬頃之讁髙州團練使賈秋壑敗後有人刺以詩曰深院無人草已荒漆屏金字尚煇煌祇知事去身宜去豈料人亡國亦亡理考𤼵身端有似鄭人應夢更何祥卧龍不肯留渠住空使晴光滿畫墻又云事到窮時計亦窮此行難倚鄂州功木緜菴上千年恨秋壑堂中一夢空石砌苔稠猿步月松庭葉落鳥呼風客來未用多惆悵試向呉山望故宫傷西樓詩云檀板歌殘陌上花過墻荆棘刺簷牙指揮已失鐵如意賜與寜存玊辟邪破屋春歸無主燕壊池雨産在官蛙木緜菴外尤愁絶月黒夜深聞鬼車復有和者云榮華富貴等浮花膂力難為國爪牙漢世祇知光擁立唐朝誰識把奸邪綺羅化作春風蝶絃管翻成夜雨蛙縱有清漳人百死碧天難挽紫雲車秋壑賜第正在蘇堤時有遊騎過其門每為偵事者密報必致羅織有官者𬒳黜有財者𬒳禍逮世變而後已近有題其養樂園云老壑曽居葛嶺西遊人誰敢問蘇堤勢將覆餗不回首事到出師方噬臍廢圃久無人作主敗垣惟有客留題算來祇有孤山耐依舊梅花片月低又過葛嶺二詩云當年誰敢此經過相國門前衛士多諸葛功名猶未滿周公事業竟如何雕梁雨蠧蔵狐䑕花礎雲蒸長薜蘿萬死莫酬亡國恨空留遺跡在山阿樓臺􅊳兀妓成圍正是襄樊失援時王氣暗隨檀板歇江山流入玊簫悲姓名不在功臣𫝊家廟徒存御賜碑誤國誤民還自誤滿庭秋草露垂垂開禧用兵追貶秦檜周南仲代草制云兵於五材誰能去之首弛邊疆之禁臣無二心天之制也忍忘君父之仇又曰一日縱敵遂貽數世之憂百年為墟誰任諸人之責讒險第八咸興間宰相怙權尤不喜士大夫之論事趙中令普當國每臣僚上殿先於中書供狀不敢詆斥時政方許登對田錫為諌官極論此事後方少息士大夫有口者多外𥙷王禹偁在揚州以詩送人曰若見鰲頭為借問為言棖也減剛腸又丁謂留滯外郡甚久及為知制誥以啟謝時宰有効慎密於孔光不言温𣗳體風流於謝客但詠蒼苔是也穆修有詩名多遊京洛有題其詩於禁中壁間者真宗一見大加賞歎問為誰詩左右以穆修對上曰有文如此公卿何不薦來時丁普公在側從容答曰此人行不逮文由此上不復問李士衡之父以豪恣不法誅死士衡方進用王欽若欲言之而未有路㑹真宗論時文之弊因言路振文人也然不識體法上曰何也曰李士衡父誅死而振為贈誥曰世有顯人上頷之士衡以故不大用舊説臺諌當上殿未有題目五更不寐平生親舊一一上心葢惟親舊可得其詳庶免風聞之誤紹興間某任言責欲論一人未得出處偶一鄉人來訪私謂得其人矣叙契濶接殷勤甚歡其人大喜過望意汲引可必也越兩日章疏上乃同行欲論者降㫖即日押出國門語云寧逢惡賓莫逢故人又云故人相逢不吉則凶蘇頌子容皇祐間進士累官門下侍郎以父紳嘗直史館極言時政與梁適同在兩禁人以為險詖故語曰草頭木脚陷人倒卓木脚是梁字而草頭則蘇字陷人倒卓者傾險之甚也又云蘇紳梁適謂之草頭木脚其害在士大夫薛居極胡榘謂之草頭古天下苦其害在民紹聖初逐元祐黨人禁中疏出當讁人姓名及廣南州郡以水土之美惡較量罪之輕重而貶竄焉執政聚議至劉安世器之時蔣之竒潁叔云劉某平昔人推其命極好時相章惇子厚即以筆於昭州上㸃之云劉某命好且去昭州試命一廵其他蘇子瞻貶儋州子由貶雷州黄山谷貶宜州俱配其字之偏傍皆惇所為也惇恨安世必欲見殺人言春循梅新與死為鄰髙竇雷化説着也怕八州惡地安世歴遍七州所以當時有鐵漢之稱張天覺在熙寧中自選人受章子厚知引為察官為舒信道𤼵其私書貶斥流落於外紹聖初子厚秉鈞再薦登言路攻擊元祐諸賢不遺餘力至欲𤼵温公吕正獻公之墓賴曾文肅公力啟於泰陵始免其為慘酷甚矣晩既免相末年以校讐道蔵復職又有二蘇狂率三孔疏濶之表詩有每聞同列進不覺寸心忙之句常希古亦力言其奸後來閩中書坊開骨鯁集輙刋靖康詔書於首由此天下翕然推尊之事有僥倖乃如此者可𤼵一歎商英為相有商霖之賜姓名又入元祐黨籍復以悟道在𫝊燈録何其幸也章惇用林希作御史希擊伊川只俟邢恕救便擊之恕言於哲宗臣於程某嘗事之以師友今便以程某斬作千段臣亦不救紹聖間章子厚為相立元祐黨籍初止七十三人其間已自相矛盾如川洛二黨之𩔖未始同心也及蔡元長為政使其徒再行編𩔖黨人刋之於石名之曰元祐奸黨播告天下但與元長異意者人無賢否官無大小悉列其中屏而棄之殆三百餘人有前日力闢元祐之政者亦饕厠名愚智混淆莫可分别元長意欲連根固本牢甚然而無益也徒使其子孫有榮耀焉識者恨之如近日揚州重刻元祐黨碑至以蘇逈為蘇過叔黨在元祐年猶未褁頭豈非字畫之誤乎逈字彦遠東坡族子登進士第元符末應日食上言尤為切直徽宗因星變即令衛士仆黨碑云莫待明日引得蔡京又來炒蔡元度對客嬉笑溢於顔靣雖見所甚憎者亦加親厚無間人莫能測謂之笑靣夜叉盛章尹京典藩以慘毒聞殺人如刈草菅然婦態雌聲欲語先笑未嘗正視或置人死地時亦不異平日蔡元長始以紹述兩字刧持上下擅權久之知公論之不可久鬱也宣和間始令其子招致習為元祐學者是以楊中立洪玉父諸人皆官於中都又使其門下客著西清詩話以載蘇黄語亦欲為他日張本耳終之禍起朔方其謀徒巧亦何益哉蔡京童貫用事當時謠曰打破筒潑了菜便是人間好世界靖康間秦㑹之為御史中丞金人陷都城議立張邦昌以主中國監察御史馬先覺伸抗言於稠人廣坐中曰吾曹職為諌臣豈可坐視緘黙不吐一詞當共入議狀乞存趙氏㑹之不答少焉屬藁遂就呼臺吏連名書之㑹之既為臺長則當列於首以狀呈㑹之猶豫先覺率同僚合辭力請㑹之不得巳始肻書名先覺遣人疾馳以逹金營先覺中興初任殿中侍御史以亮直稱一時為汪黄所擠讁監濮州酒税高宗後思之以九列召示將大用而先覺死㑹之自金還揚言已功盡掠其美遂取富貴先覺子孫漂泊閩中有甥何珫者得其元藁屢欲上之而馬氏子止之紹興乙亥春珫忽夢先覺衣冠如平生云秦氏將敗趨使往陳之珫即以其藁叩閽㑹之大怒誣以他罪下珫大理竄嶺外抵流所未幾而㑹之果殂其家訟冤詔復珫故官而先覺忠績遂别於時云秦檜擅權久大誅殺以脇善𩔖末年因趙忠簡鼎之子汾以起獄謀盡覆張忠獻浚胡文定安國諸族棘寺奏牘上矣檜時已病坐格天閣下吏以牘進欲落筆手顫竟不能字其妻王氏在屏後揺手曰勿勞太師檜猶自力竟仆於几數日而卒獄事大解諸公僅得全初汾就逮自分必死囑其家曰此行無全理脱幸有恩言當於餽食中置肉笑靨一以為信毋忘既入獄月餘無所問日施慘酷求死不可得一日忽外致食於槖滿其中皆笑靨汾泣曰吾約以一而今乃多如是殆紿我既而獄吏皆來賀即日脱械出則檜聲鍾給􅉠矣忠獻是時居永亦㣲聞當路意昕夕不自安且念為太夫人憂不敢明言忽外間報中都有人至亟出視一男子喘卧􅉉下殆不能言方吉凶叵測衆環睨縮頸忠獻素堅定於是亦色動有傾掖之坐稍灌以湯餌而甦猶未出語亶數指腰間索之得片紙葢故吏聞檜訃走介星馳至近郊益奔程欲速是以顛䠞頃刻之間堂序懽聲如雷王盧溪在夜郎郡守承風㫖待以囚𨽻適郵筒至張燕公堂以召之盧溪怪前此未之有不敢赴邀者系踵不得已趨詣罷燕之明日始聞其事守葢先得之矣故盧溪既得自便之命題詩壁間曰辰州更在武陵西每望長安信息稀二十年興縉紳禍一朝終失相公威外人初説哥奴病逺道俄聞逐客歸當日弄權誰敢指如今憶得姓依稀葢志喜也同時謝任伯之子景思伋家在天台為郡守劉景所捕既至而改禮與夜郎守略同是知檜稔惡得斃為善𩔖之福不貲要非幸災也胡忠簡銓既以乞斬秦檜掇新州之禍直聲振天壤一時士大夫畏罪箝口莫敢與之立談獨王盧溪廷珪作詩送之曰囊封初上九重闗是日清都虎豹閒百辟動容觀奏牘幾人回首愧朝班名髙北斗星辰上身墮南州瘴海間豈待他年公議出漢庭行召賈生還大厦元非一木支欲將獨力拄傾危癡兒不了官中事男子要為天下竒當日姦諛皆膽落平生忠義只心知端能飽喫新州飯在處江山足䕶持於是有以聞於朝者檜大怒坐以謗訕流夜郎時年七十既而檜死尋許自便因讀韓文公猛虎行復作詩寓意曰夜讀文公猛虎詩云何虎死忽悲啼人生未省向來事虎死方羞前所為昨日猶能食熊豹今朝無計奈狐狸我曽道汝不了事喚作癡兒果是癡葢復前説也秦丞相晩嵗權尤重嘗有數卒皂衣持挺立府門外行路過者稍顧視謦欬皆呵止之嘗病告一二日他執政獨對既不敢他語唯盛稱秦公勲業而已明日入堂忽問曰聞昨奏事甚久執政惶恐曰某唯頌太師勲徳曠世所無語終而退實無他言秦嘻笑曰甚荷葢已嗾言事官上章執政甫歸閤子彈章副本已至矣其忮刻如此檜性隂險同列論事上前未嘗力辨但以一二語傾擠之俾帝自怒丁晉公執政不許同列留身惟王文正一切委順未嘗忤其意文正謂丁曰欲一靣求恩澤又不敢留身丁曰如公不妨一日留身王於是進文字一卷具道丁事丁去數武大悔之不數日丁遂有朱崖之行文正公曽字孝先封沂國公秦檜妻王氏素隂險出其夫上方岳飛獄具一日檜獨居書室食柑玩皮以爪劃之若有思者王窺見笑曰老漢何一無决耶捉虎易放虎難也檜掣然當心付片紙入獄是日岳王薨棘寺檜之秉軸屏塞人言蔽上耳目凡一時獻言者非誦檜功徳則訐人苛細以中傷善𩔖稍涉忌諱率噤而不𤼵僅論禁銷金鋪翠鹿胎冠之𩔖耳晚年殘忌尤甚數興大獄又喜諛佞不避嫌疑張扶請檜乘金根車及檜封益國公又有乞置益國官屬及議九錫者檜聞之坦然不駭静江有秦城驛知府吕愿中賦秦城王氣詩以媚檜得召京秩沈長卿芮煜共賦牡丹詩有寧令漢社稷變作莾乾坤之句為鄰人所告編置化州趙令衿觀檜家廟口誦君子之澤五世而斬為汪召錫所告下獄死至於開門受賂富敵王家外國珍竒死猶踵閾其子熺無日不煆酒具治書畫特其細故耳檜之死帝謂楊存中曰朕今日始免靴中置刀矣其畏之如此宣和中進士永福呉元美三山文士作夏二子𫝊略云天命商以伐夏是以伊尹相湯伐桀而聲其刻剝之罪當是時清商颷起義氣播揚勁風四掃宇宙清廓夏告終於鳴條二子之族無大小長少皆望風隕滅殆無遺𩔖天下之民始得安食酣飲而鼓舞於清世矣夏二子謂蚊蠅也其鄉人鄭瑋得之往訴秦檜謂其譏毁大臣其家立潛光亭商𨼆堂怨家亦摘以告云亭號潛光實有心於黨李堂名商𨼆本無意於事秦李謂泰𤼵也檜怒編管容州尋讁死於南雄按韓昌黎詩曰朝蠅不可驅暮蚊不可拍蠅蚊滿八區可盡與相格得時能幾時與汝恣啖咋涼風九月到掃不見踪跡正如元美所云又鄭文表江表志楊鸞詩曰白日蒼蠅滿飯盤夜間蚊子又成團每到更深人静後定來頭上咬楊鸞鸞即南唐湯悦校文時舉子問欲用堯舜字不知是幾事者也高宗初至磁州時磁人不欲其北行諫不從宗忠簡欲假神道以止之曰此有崔府君廟甚靈可以卜珓仍言其廟有馬更顯應遂入燒香其馬啣車輦等物塞了去路遂止不往後感其事就玉津園路口造崔府君廟令曹泳作記一日北使來秦檜出接少憇廟廡不知何神上告以故檜曰金以為功今却歸功於神恐不便即日毁之曹泳湯思退皆檜晚年所信用者曹凶狡尤甚檜妻兒親黨皆為其所離間檜信愛之如子凡事皆在其籠絡中檜死其妻兒啣之泣訴於上遂編置海外而死其妻更狡要一軍將取泳喪恐其不從先教一婢子云待我使某軍不從時汝便仆地作侍郎語云平日受我多少恩今若不行即有禍及汝及使其人果不肻行婢遂倒地如其教其人遂行殺岳武穆范同謀也胡銓上封事檜怒甚問范如何處置范曰只莫採半年他冷了若重行遣讁必成𥪡子之名檜甚畏范後竟出之宋稗𩔖鈔卷四
